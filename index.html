          {q:"NRV of a by-product = Sales Value $15,000, Additional Processing Costs $3,000. NRV =",o:["$15,000","$18,000","$12,000","$3,000"],a:2,e:"NRV = Estimated Sales Price - Additional Processing Costs = $15,000 - $3,000 = $12,000."},
          {q:"The Production Method differs from the Sales Method because Production Method:",o:["Recognizes by-product only when sold","Records by-product NRV at time of production","Treats by-product as a joint product","Requires no journal entries"],a:1,e:"Production Method recognizes by-product AT PRODUCTION — deducting NRV from WIP (main product). Sales Method waits until the by-product is actually SOLD to recognize any value."},
          {q:"Under Production Method, the sale of a by-product (NRV $12,000, sold for $15,000) results in:",o:["Dr. Cash $15,000 | Cr. Revenue $15,000","Dr. Cash $15,000 | Cr. By-Product Inventory $12,000 + Gain $3,000","Dr. Cash $12,000 | Cr. Revenue $12,000","No entry — already recorded at production"],a:1,e:"At sale: Dr. Cash $15,000 / Cr. By-Product Inventory (cost) $12,000 / Cr. Revenue or Gain $3,000. The inventory was recorded at NRV ($12,000) at production. The additional $3,000 above NRV is recognized as a gain/revenue at sale."},
          {q:"Which method provides a more CONSERVATIVE income statement in the period of production?",o:["Production Method","Sales Method","Both are identical","Neither — depends on NRV"],a:1,e:"Sales Method is more CONSERVATIVE — it defers revenue recognition until actual sale. Production Method recognizes the by-product value immediately at production, reducing main product cost and potentially affecting income sooner."},
          {q:"Sawdust produced from a lumber mill is best classified as:",o:["A joint product","A main product","A by-product","An overhead cost"],a:2,e:"Sawdust has LOW relative value compared to the main product (lumber). It emerges naturally from the lumber production process. This matches the definition of a BY-PRODUCT — low-value output from a joint production process."},
          {q:"Under the Sales Method, joint production costs are:",o:["Reduced by by-product NRV at production","Fully assigned to the main product until the by-product is sold","Split equally between main and by-products","Expensed immediately"],a:1,e:"Sales Method: ALL joint costs remain assigned to the MAIN PRODUCT. No reduction occurs at production. Only when the by-product is sold does the company recognize income — as Other Income, not as a reduction in main product cost."},
          {q:"The PRIMARY criterion distinguishing a by-product from a joint product is:",o:["Whether further processing is required","The relative sales value compared to other products","Whether it can be separately produced","The timing of revenue recognition"],a:1,e:"The key distinction: RELATIVE SALES VALUE. By-products have LOW relative sales value. Joint products are those with SIGNIFICANT relative sales value that justify separate costing. There's no precise cutoff — management judgment determines the classification."}
        ]},
      {id:"4-6",title:"Costing Systems: Process Costing",dur:"30 min",
        blocks:[
          {t:"h",v:"What Is Process Costing?"},
          {t:"p",v:"Process Costing is used when companies produce LARGE QUANTITIES of IDENTICAL products continuously through a series of processes. Examples: chemicals, paint, beverages, paper, cement, and food processing."},
          {t:"h",v:"Key Difference from Job Costing"},
          {t:"tbl",h:["Feature","Job Order Costing","Process Costing"],r:[["Products","Unique / custom","Identical / homogeneous"],["Cost tracking","Per job","Per process/department"],["Unit cost","Calculated per job","Average cost per equivalent unit"],["Examples","Custom furniture, construction","Oil refining, beverages, cement"]]},
          {t:"h",v:"Equivalent Units of Production (EUP)"},
          {t:"p",v:"Since some units are partially complete at period-end (Work-in-Process), we convert them to EQUIVALENT UNITS — the number of complete units that could have been produced with the same effort."},
          {t:"f",l:"Equivalent Units (Weighted Average)",v:"EUP = Completed Units + (Ending WIP Units x % Completion)"},
          {t:"p",v:"IMPORTANT: Materials and Conversion costs may have DIFFERENT completion %s. Materials are often added at the START (100%) while conversion (labor + overhead) accumulates gradually."},
          {t:"h",v:"Weighted Average Method vs FIFO"},
          {t:"b",v:["Weighted Average: Combines beginning WIP costs with current period costs. Simpler. EUP = units completed + ending WIP x %complete.","FIFO: Keeps beginning WIP costs separate. EUP = (Beginning WIP x % left to complete) + Units started and completed + (Ending WIP x % complete)."]},
          {t:"h",v:"5-Step Process Costing Procedure"},
          {t:"s",v:["Step 1: Summarize the flow of physical units","Step 2: Calculate Equivalent Units of Production (EUP)","Step 3: Summarize total costs to account for","Step 4: Calculate cost per equivalent unit","Step 5: Assign costs to completed units and ending WIP"]},
          {t:"h",v:"Example (Weighted Average)"},
          {t:"p",v:"Completed: 3,800 units. Ending WIP: 700 units (60% conversion). Total costs: DM $42,000, Conversion $28,000. DM added at start (100%)."},
          {t:"s",v:["EUP (DM): 3,800 + (700 x 100%) = 4,500 units","EUP (Conversion): 3,800 + (700 x 60%) = 4,220 units","Cost/EUP (DM): $42,000 / 4,500 = $9.33","Cost/EUP (Conv): $28,000 / 4,220 = $6.64","Total Cost/Unit: $9.33 + $6.64 = $15.97"]},
          {t:"tip",v:"Exam Tips: Process costing = identical products. Job costing = unique products. Weighted average is simpler. FIFO is more accurate. Materials at START = 100% complete. Conversion accumulates gradually. Normal spoilage = product cost. Abnormal spoilage = period cost (loss)."}
        ,
          {t:"h",v:"Weighted Average vs FIFO Method"},
          {t:"tbl",h:["Feature","Weighted Average","FIFO"],r:[["EUP","Combines prior + current period work","Separates prior from current"],["Cost per EUP","Averages ALL costs (prior + current)","Uses ONLY current period costs"],["Simplicity","Simpler","More complex"],["Accuracy","Less accurate when costs change","More accurate — reflects current period"],["BWIP","Mixed into current costs","Kept separate — completed first"]]},
          {t:"p",v:"CMA Exam Note: Calculation of EUP is NOT required — understand the CONCEPT and DIFFERENCE between methods."},
          {t:"h",v:"Normal vs Abnormal Spoilage — Detailed"},
          {t:"tbl",h:["Type","Definition","Cost Treatment","Controllable?"],r:[["Normal Spoilage","Expected — part of the process","Allocated to GOOD units — product cost","No — unavoidable"],["Abnormal Spoilage","Exceeds normal — should NOT occur","Expensed as LOSS on income statement","Yes — management can prevent"]]},
          {t:"tip",v:"Exam Tips: Weighted Average = simpler, mixes periods. FIFO = more accurate, separates periods. Normal spoilage = product cost (in good units). Abnormal spoilage = period cost (loss on income statement). CMA exam focuses on concept, not detailed EUP calculation."}
        ],
        quizzes:[
          {q:"Process costing is MOST appropriate for:",o:["Building construction","Custom aircraft manufacturing","Oil refining","Audit engagements"],a:2,e:"Oil refining produces homogeneous (identical) products continuously. Process costing is designed for mass production of identical items."},
          {q:"Completed units 5,000. Ending WIP 800 units at 50% conversion completion. EUP (Conversion) =",o:["5,400","5,800","5,000","4,600"],a:0,e:"EUP = 5,000 + (800 x 50%) = 5,000 + 400 = 5,400 equivalent units of conversion."},
          {q:"DM added at the start. Ending WIP is 500 units. EUP for DM (Weighted Avg) includes ending WIP at:",o:["0%","50%","75%","100%"],a:3,e:"Materials added at the START means all units in process have 100% of their materials. Ending WIP completion % applies only to conversion costs."},
          {q:"Total conversion costs $84,000. EUP conversion 4,200 units. Conversion cost per EUP =",o:["$15","$20","$18","$25"],a:1,e:"Cost per EUP = Total Costs / EUP = $84,000 / 4,200 = $20 per equivalent unit."},
          {q:"Under the FIFO method (vs Weighted Average), beginning WIP costs are:",o:["Added to current costs and averaged together","Ignored completely","Kept SEPARATE from current period costs","Transferred directly to COGS"],a:2,e:"FIFO keeps beginning WIP costs separate from current period costs. This gives a more accurate picture of current period performance."},
          {q:"Normal spoilage in process costing is treated as:",o:["Period cost — expensed immediately","Extraordinary loss","Product cost — included in cost of good units","Contra-revenue"],a:2,e:"Normal spoilage (expected waste) = PRODUCT COST — spread over good units. Abnormal spoilage (unexpected) = PERIOD COST (loss on income statement)."},
          {q:"If Direct Materials are added at the START, ending WIP (30% conversion complete) has DM completion of:",o:["30%","70%","0%","100%"],a:3,e:"Materials added at START = 100% complete for all units in process, regardless of conversion completion %."},
          {q:"Cost per EUP: DM $12, Conversion $8. Units completed = 4,000. Cost assigned to completed units =",o:["$48,000","$32,000","$80,000","$40,000"],a:2,e:"Total cost per complete unit = DM + Conversion = $12 + $8 = $20. Cost for completed units = $20 x 4,000 = $80,000."},
          {q:"The 5 steps of process costing begin with:",o:["Calculate cost per EUP","Assign costs to units","Summarize the flow of PHYSICAL units","Calculate equivalent units"],a:2,e:"Step 1 is always: Summarize the flow of PHYSICAL units. This is the foundation — you must track physical units before calculating EUP."},
          {q:"What is the main ADVANTAGE of process costing for mass production?",o:["More accurate cost per individual job","Simpler — costs are averaged across all equivalent units","Better for custom orders","Eliminates the need for overhead allocation"],a:1,e:"Process costing is simpler for mass production because costs are averaged over all equivalent units. No need to track costs per individual unit when all units are identical."}
        ,
          {q:"Under FIFO process costing, beginning WIP costs are:",o:["Mixed with current period costs","Kept separate and completed first","Ignored","Allocated to ending WIP"],a:1,e:"FIFO: Beginning WIP costs are kept SEPARATE. BWIP units are completed first using their prior period costs plus current period costs needed to finish them. This gives a more accurate picture of current period efficiency."},
          {q:"The Weighted Average method combines:",o:["Only current period costs","Prior period and current period costs into one average","Direct materials only","Fixed costs only"],a:1,e:"Weighted Average COMBINES beginning WIP costs with current period costs to get ONE average cost per EUP. Simpler than FIFO but less accurate when costs change between periods."},
          {q:"Abnormal spoilage costs are treated as:",o:["Product costs added to good units","Period costs expensed as a loss","Allocated to ending WIP","Deducted from revenue"],a:1,e:"Abnormal spoilage EXCEEDS expected normal amounts, is CONTROLLABLE by management, and is expensed as a LOSS on the income statement. It is NOT absorbed into product costs — this highlights the inefficiency to management."}
        ]},

      {id:"4-8",title:"Job-Order and Life-Cycle Costing",dur:"30 min",
        blocks:[
          {t:"h",v:"What Is Job Order Costing?"},
          {t:"p",v:"Job Order Costing accumulates costs separately for each unique job, order, or batch. It is used when products are distinct and customizable — such as custom furniture, construction projects, printing, or professional services."},
          {t:"h",v:"Three Components of Product Cost"},
          {t:"b",v:["Direct Materials (DM): Raw materials traced directly to the job","Direct Labor (DL): Labor wages directly associated with the job","Manufacturing Overhead (MOH): Indirect costs applied using a predetermined rate"]},
          {t:"f",l:"Total Job Cost",v:"Total Job Cost = Direct Materials + Direct Labor + Applied Overhead"},
          {t:"h",v:"Predetermined Overhead Rate (POHR)"},
          {t:"p",v:"Since actual overhead is not known during production, companies calculate a POHR at the start of the year to apply overhead to jobs."},
          {t:"f",l:"Predetermined Overhead Rate",v:"POHR = Estimated Total Manufacturing Overhead / Estimated Total Activity Base (e.g., Direct Labor Hours)"},
          {t:"f",l:"Applied Overhead",v:"Applied OH = POHR x Actual Activity Used by the Job"},
          {t:"h",v:"Over/Under Applied Overhead"},
          {t:"f",l:"Over/Under Applied Overhead",v:"Difference = Applied Overhead - Actual Overhead | Over-applied: Applied > Actual | Under-applied: Applied < Actual"},
          {t:"p",v:"At year-end, the difference is disposed of — typically closed to Cost of Goods Sold (COGS) for small amounts, or prorated between WIP, FG, and COGS for large amounts."},
          {t:"h",v:"Job Cost Sheet"},
          {t:"p",v:"Each job has a Job Cost Sheet tracking all DM, DL, and OH charges. This is the subsidiary ledger for Work-in-Process (WIP) inventory."},
          {t:"h",v:"Worked Example"},
          {t:"p",v:"Estimated MOH: $240,000. Estimated DL Hours: 60,000. POHR = $240,000 / 60,000 = $4 per DLH. Job #101: DM $5,000, DL $3,000 (750 hrs), Applied OH = 750 x $4 = $3,000. Total Job Cost = $5,000 + $3,000 + $3,000 = $11,000."},
          {t:"tbl",h:["Item","Amount","Notes"],r:[["Direct Materials","$5,000","Traced to job via requisition"],["Direct Labor","$3,000","750 hrs x $4/hr"],["Applied Overhead","$3,000","750 DLH x $4 POHR"],["Total Job Cost","$11,000","Cost of Job #101"]]},
          {t:"tip",v:"Exam Tips: Job costing = UNIQUE products. Process costing = IDENTICAL products. POHR is set at YEAR START using estimates. Over-applied = CREDIT balance in MOH account. Under-applied = DEBIT balance. Closed to COGS at year-end."},
          {t:"h",v:"Life-Cycle Costing"},
          {t:"p",v:"Life-cycle costing accumulates ALL costs associated with a product during its ENTIRE LIFE — from design through disposal. Used for pricing decisions and profitability analysis."},
          {t:"b",v:["Upstream Costs (before production): R&D, design, prototyping, testing","Manufacturing Costs: DM, DL, MOH, purchasing","Downstream Costs (after production): Marketing, distribution, customer service, warranties, disposal"]},
          {t:"p",v:"Key difference: Life-cycle costing treats pre-production and after-sale costs as PRODUCT COSTS. Traditional costing treats them as period costs expensed when incurred."},
          {t:"h",v:"Customer Life-Cycle Costing"},
          {t:"p",v:"Looks at total cost of ownership from the CUSTOMER's perspective: purchase price + installation + operating costs + maintenance + disposal."},
          {t:"p",v:"Example: Machine costs $50,000. Energy $20,000, maintenance $15,000, disposal $5,000 over 10 years. Customer life-cycle cost = $90,000 — not just $50,000."},
          {t:"h",v:"Target Costing"},
          {t:"f",l:"Target Cost Formula",v:"Target Cost = Target Selling Price - Desired Profit Margin"},
          {t:"p",v:"Market-driven approach: start with what customers will pay, subtract required profit, result = maximum allowable cost. Engineers design the product to hit this cost target."},
          {t:"b",v:["80-90% of product costs are LOCKED IN during the design phase","Value Engineering: systematically redesign to achieve target cost without sacrificing quality","Traditional costing = cost-plus pricing (cost + markup). Target costing = price-minus approach"]},
          {t:"tip",v:"Exam Tips: Life-cycle costing includes ALL phases including pre-production and disposal. 80-90% of costs locked in at DESIGN — cheapest time to reduce costs. Customer LCC = buyer's total ownership cost. Target Cost = Price - Profit. Value engineering bridges gap between estimated and target cost."}
        ],
        quizzes:[
          {q:"Job Order Costing is most appropriate for:",o:["Mass production of identical products","Petroleum refining","Custom furniture manufacturing","Grain processing"],a:2,e:"Job costing is used when each unit or batch is unique and distinct. Custom furniture is made to order. Mass/identical production uses Process Costing."},
          {q:"Estimated overhead $300,000. Estimated machine hours 50,000. POHR per machine hour =",o:["$4","$5","$6","$7"],a:2,e:"POHR = Estimated MOH / Estimated Activity = $300,000 / 50,000 MH = $6 per machine hour."},
          {q:"POHR = $8/DLH. A job uses 200 DLH. Applied Overhead =",o:["$200","$800","$1,600","$400"],a:2,e:"Applied OH = POHR x Actual Activity = $8 x 200 DLH = $1,600."},
          {q:"Actual overhead incurred $180,000. Applied overhead $175,000. Result:",o:["$5,000 over-applied","$5,000 under-applied","$355,000 total overhead","No difference"],a:1,e:"Under-applied = Applied < Actual. $175,000 - $180,000 = -$5,000. We applied $5,000 LESS than actual. Under-applied = DEBIT balance in MOH."},
          {q:"Applied overhead $220,000. Actual overhead $200,000. The MOH account has a:",o:["$20,000 debit balance","$20,000 credit balance","$420,000 balance","Zero balance"],a:1,e:"Over-applied: Applied ($220,000) > Actual ($200,000). Over-applied = CREDIT balance of $20,000 in MOH account."},
          {q:"Job Cost Sheet: DM $8,000, DL $4,000, Applied OH $6,000. Total Job Cost =",o:["$12,000","$14,000","$18,000","$10,000"],a:2,e:"Total Job Cost = DM + DL + Applied OH = $8,000 + $4,000 + $6,000 = $18,000."},
          {q:"Under-applied overhead at year-end is typically:",o:["Added to Retained Earnings","Closed to Cost of Goods Sold (COGS)","Carried forward to next year","Subtracted from Sales Revenue"],a:1,e:"Small over/under-applied OH is closed to COGS. Large amounts are prorated between WIP, Finished Goods, and COGS."},
          {q:"The source document used to charge Direct Materials to a specific job is a:",o:["Time ticket","Materials Requisition Form","Purchase Order","Receiving Report"],a:1,e:"Materials Requisition Form: authorizes release of materials from the storeroom to production and identifies which job they belong to."},
          {q:"Job Cost Sheets are the subsidiary ledger for:",o:["Accounts Payable","Finished Goods Inventory","Work-in-Process (WIP) Inventory","Cost of Goods Sold"],a:2,e:"Job Cost Sheets = subsidiary ledger for WIP. Each job has its own sheet tracking DM, DL, and OH. The sum of all job cost sheets = total WIP balance."},
          {q:"A company uses DL cost as the overhead base. DL cost $50,000. Overhead rate 80%. Applied overhead =",o:["$40,000","$50,000","$62,500","$90,000"],a:0,e:"Applied OH = OH Rate x DL Cost = 80% x $50,000 = $40,000. When using DL cost as the base, the rate is a percentage of DL cost."},
          {q:"Life-cycle costing differs from traditional costing because it:",o:["Only includes production costs","Treats pre-production and after-sale costs as product costs","Ignores overhead costs","Is required by GAAP"],a:1,e:"Life-cycle costing treats ALL costs across the entire product life — R&D, design, production, marketing, customer support, disposal — as product costs. Traditional costing treats pre-production and after-sale costs as PERIOD costs expensed when incurred."},
          {q:"Target Selling Price $200. Required profit margin 20%. Target Cost =",o:["$160","$200","$240","$40"],a:0,e:"Target Cost = Target Price - Desired Profit = $200 - (20% x $200) = $200 - $40 = $160. Engineers must design the product to cost $160 or less."},
          {q:"Approximately what % of life-cycle costs are locked in during the DESIGN phase?",o:["20-30%","40-50%","60-70%","80-90%"],a:3,e:"80-90% of a product's life cycle costs are COMMITTED during the design phase, even though actual spending occurs later. This is why cost management during design is critical — it's the cheapest time to reduce costs."}
        ]},
      {id:"4-9",title:"Overhead Costs and Allocation",dur:"30 min",
        blocks:[
          {t:"h",v:"What Is Manufacturing Overhead?"},
          {t:"p",v:"Manufacturing Overhead (MOH) includes ALL manufacturing costs that cannot be directly traced to specific products. Unlike Direct Materials and Direct Labor, overhead must be ALLOCATED using a systematic method."},
          {t:"b",v:["Examples: Factory rent, utilities, depreciation, indirect labor, insurance, maintenance","Cannot be traced directly to a product — must be allocated","Includes BOTH fixed and variable components"]},
          {t:"h",v:"Departmental vs Plant-wide Overhead Rates"},
          {t:"tbl",h:["Approach","Description","When to Use"],r:[["Single Plant-wide Rate","One rate for entire factory","Simple products, homogeneous processes"],["Departmental Rates","Separate rate for each department","Products pass through different departments with different overhead levels"],["Activity-Based Costing","Rate per activity driver","Diverse products, modern manufacturing"]]},
          {t:"h",v:"Overhead Allocation Bases"},
          {t:"b",v:["Direct Labor Hours (DLH): Most traditional — works when labor-intensive","Direct Labor Cost: % of DL cost","Machine Hours: Best for automated/capital-intensive operations","Units Produced: Simple but only valid for single-product companies"]},
          {t:"h",v:"Departmental Overhead Rate Example"},
          {t:"p",v:"Dept A (Labor-intensive): Overhead $200,000, DLH 40,000. Rate = $5/DLH. Dept B (Automated): Overhead $300,000, MH 60,000. Rate = $5/MH. Job uses 10 DLH in Dept A and 5 MH in Dept B. Applied OH = (10 x $5) + (5 x $5) = $50 + $25 = $75."},
          {t:"h",v:"Service Department Cost Allocation"},
          {t:"p",v:"Service departments (HR, IT, Maintenance) support production departments but don't directly make products. Their costs must be allocated to production departments before calculating product costs."},
          {t:"tbl",h:["Method","Description","Accuracy"],r:[["Direct Method","Allocates service costs directly to production departments only","Simplest — ignores inter-service usage"],["Step-down Method","Allocates in sequence; once allocated, a dept receives no more","Moderate accuracy"],["Reciprocal Method","Recognizes ALL inter-service relationships using simultaneous equations","Most accurate — most complex"]]},
          {t:"h",v:"Over/Under Applied Overhead — Year-End Disposition"},
          {t:"b",v:["Small amount: Close entire balance to Cost of Goods Sold","Large amount: Prorate between WIP Inventory, Finished Goods Inventory, and COGS based on their relative balances"]},
          {t:"tip",v:"Exam Tips: Direct Method is simplest — ignores reciprocal services between service depts. Reciprocal Method is most accurate. Step-down is in between. Machine hours best for automated plants. DLH best for labor-intensive. Under-applied OH = costs UNDERSTATED in products — adjust COGS upward. Over-applied OH = costs OVERSTATED — adjust COGS downward."}
        ,
          {t:"h",v:"Overhead Variances"},
          {t:"tbl",h:["Variance","Formula","Favorable When"],r:[["Variable OH Spending","Actual VOH - (Standard Rate x Actual Hours)","Actual rate < Standard rate"],["Variable OH Efficiency","(Actual Hours - Std Hours Allowed) x Standard Rate","Fewer hours used than standard"],["Fixed OH Budget (Spending)","Actual Fixed OH - Budgeted Fixed OH","Actual costs < Budget"],["Fixed OH Volume","Budgeted Fixed OH - Applied Fixed OH","Produced more than planned"]]},
          {t:"f",l:"Total OH Variance",v:"Total = Actual OH - Applied OH | Favorable: Applied > Actual (over-applied) | Unfavorable: Actual > Applied (under-applied)"},
          {t:"tip",v:"Exam Tips: Variable OH Efficiency Variance driven by LABOR hours (same driver as DL efficiency variance). Fixed OH Volume Variance = production more/less than capacity level in POHR. Over-applied OH = credit balance in MOH = favorable. Under-applied = debit balance = unfavorable."}
        ],
        quizzes:[
          {q:"Which overhead allocation base is MOST appropriate for a highly automated factory?",o:["Direct Labor Hours","Direct Labor Cost","Machine Hours","Units Produced"],a:2,e:"Machine Hours is most appropriate for automated factories where machines drive overhead costs (depreciation, maintenance, utilities). DLH is more appropriate for labor-intensive operations."},
          {q:"The Direct Method of service department allocation:",o:["Allocates to other service departments first","Ignores inter-service department usage","Uses simultaneous equations","Is the most accurate method"],a:1,e:"The Direct Method allocates service department costs ONLY to production departments, IGNORING any services provided between service departments. It is the simplest method but least accurate."},
          {q:"Which service cost allocation method is MOST accurate but most complex?",o:["Direct Method","Step-down Method","Reciprocal Method","Physical Units Method"],a:2,e:"The Reciprocal Method is MOST ACCURATE because it recognizes ALL mutual services between service departments using simultaneous equations. It is the most complex but captures the most complete picture."},
          {q:"Dept A: $150,000 overhead, 30,000 DLH. Dept B: $90,000 overhead, 18,000 MH. A job uses 4 DLH in A and 2 MH in B. Applied overhead =",o:["$20","$30","$30","$30"],a:1,e:"Rate A = $150,000/30,000 = $5/DLH. Rate B = $90,000/18,000 = $5/MH. Applied = (4 x $5) + (2 x $5) = $20 + $10 = $30."},
          {q:"Under-applied overhead means:",o:["Applied overhead > Actual overhead","Applied overhead < Actual overhead","No difference between applied and actual","Overhead was not allocated"],a:1,e:"Under-applied: Applied OH < Actual OH. The company charged LESS overhead to products than was actually incurred. Results in a DEBIT balance in the MOH account. At year-end, this increases COGS."},
          {q:"At year-end, a large amount of over-applied overhead should be:",o:["Written off entirely to COGS","Carried forward to next year","Prorated between WIP, Finished Goods, and COGS","Added to Retained Earnings"],a:2,e:"LARGE over/under-applied overhead should be PRORATED (allocated) between WIP Inventory, Finished Goods Inventory, and COGS based on their relative balances. Small amounts go entirely to COGS."},
          {q:"A single plant-wide overhead rate is MOST appropriate when:",o:["Products are diverse and complex","The factory is fully automated","Products are similar and processes are homogeneous","Multiple service departments exist"],a:2,e:"A single plant-wide rate works best when products are SIMILAR and pass through homogeneous processes with similar overhead consumption. For diverse products, departmental rates or ABC provide more accuracy."},
          {q:"The Step-down method of service cost allocation differs from the Direct Method because it:",o:["Uses simultaneous equations","Allocates to other service departments before production departments","Ignores all inter-service relationships","Only allocates variable costs"],a:1,e:"The Step-down method allocates service department costs to OTHER SERVICE DEPARTMENTS (in order) before allocating to production departments. Once a service dept has been allocated, it receives no more. More accurate than Direct, less accurate than Reciprocal."},
          {q:"Over-applied overhead creates a _____ balance in the Manufacturing Overhead account:",o:["Debit","Credit","Zero","Contra"],a:1,e:"Over-applied = Applied > Actual. The MOH account is credited when overhead is applied and debited when actual overhead is incurred. If applied exceeds actual, there are more credits than debits = CREDIT balance."},
          {q:"Why do companies use predetermined overhead rates instead of actual overhead rates?",o:["Actual rates are always too high","Products need a cost before actual overhead is known at year-end","GAAP requires predetermined rates","Actual overhead cannot be measured"],a:1,e:"Companies use POHR because actual overhead is only known at year-end, but products need costs throughout the year for pricing, billing, and financial statements. POHR allows timely cost assignment."}
        ,
          {q:"The Fixed Overhead Volume Variance measures:",o:["Actual fixed costs vs budgeted","Budgeted fixed OH vs fixed OH applied to production","Variable rate x actual hours","Actual hours vs standard hours"],a:1,e:"Fixed OH Volume Variance = Budgeted Fixed OH - Applied Fixed OH. Measures whether production volume was more or less than the capacity level used to set the POHR. More production = favorable (more fixed costs absorbed)."},
          {q:"A credit balance in the Manufacturing Overhead account means overhead is:",o:["Under-applied","Over-applied","In balance","Being accumulated"],a:1,e:"MOH is DEBITED when actual overhead is incurred, CREDITED when applied to production. Credit balance = Applied > Actual = OVER-APPLIED. Debit balance = Actual > Applied = UNDER-APPLIED."},
          {q:"Budgeted fixed OH $60,000. Applied fixed OH $65,000. Fixed OH Volume Variance =",o:["$5,000 Unfavorable","$5,000 Favorable","$60,000 Favorable","$65,000 Favorable"],a:1,e:"Volume Variance = Budgeted - Applied = $60,000 - $65,000 = $5,000 FAVORABLE. Applied > Budgeted means actual production EXCEEDED planned capacity — favorable because more units absorbed the fixed overhead."}
        ]},
      {id:"4-10",title:"Accounting for Overhead",dur:"25 min",
        blocks:[
          {t:"h",v:"Accounting for Overhead — Complete Flow"},
          {t:"p",v:"Factory overhead includes ALL manufacturing costs that cannot be directly traced to specific units. The accounting flow involves two accounts: Manufacturing Overhead Control (actual) and Manufacturing Overhead Applied (applied)."},
          {t:"f",l:"Predetermined OH Rate (POHR)",v:"POHR = Budgeted Manufacturing Overhead / Budgeted Activity Level"},
          {t:"h",v:"Step 1 — Record Actual Overhead"},
          {t:"s",v:["Dr. Manufacturing Overhead Control (actual OH incurred)","Cr. Cash / Accounts Payable / Accumulated Depreciation / etc.","Example: Actual OH $51,000 → Dr. MOH Control 51,000 | Cr. Various 51,000"]},
          {t:"h",v:"Step 2 — Apply Overhead to Production"},
          {t:"s",v:["Dr. Work-in-Process (applied OH)","Cr. Manufacturing Overhead Applied","Example: POHR $20/DLH x 2,400 actual DLH = $48,000 applied → Dr. WIP 48,000 | Cr. MOH Applied 48,000"]},
          {t:"h",v:"Step 3 — Determine Under/Overapplied"},
          {t:"f",l:"Under/Overapplied",v:"Under-applied: Actual OH > Applied OH → Debit balance in MOH | Over-applied: Applied OH > Actual OH → Credit balance"},
          {t:"h",v:"Step 4 — Dispose of Variance"},
          {t:"tbl",h:["Situation","Method","Journal Entry"],r:[["Small (immaterial)","Write off to COGS","Dr/Cr COGS for full variance amount"],["Large (material)","Prorate to WIP, FG, COGS","Allocate based on ending balances of each account"]]},
          {t:"p",v:"Proration Example: Underapplied $3,000. WIP $20,000 (10%), FG $30,000 (15%), COGS $150,000 (75%). WIP gets $300, FG gets $450, COGS gets $2,250."},
          {t:"h",v:"Overhead Variances"},
          {t:"tbl",h:["Variance","Formula","Favorable When"],r:[["Variable OH Spending","Actual VOH - (Std Rate x Actual Hrs)","Actual rate < Standard"],["Variable OH Efficiency","(Actual Hrs - Std Hrs Allowed) x Std Rate","Fewer hours than standard"],["Fixed OH Budget","Actual Fixed OH - Budgeted Fixed OH","Actual < Budget"],["Fixed OH Volume","Budgeted Fixed OH - Applied Fixed OH","Produced more than planned"]]},
          {t:"tip",v:"Exam Tips: MOH Control = actual (debit). MOH Applied = applied (credit). Under-applied = debit balance. Over-applied = credit balance. Immaterial → close to COGS. Material → prorate to WIP/FG/COGS. Fixed OH Volume Variance = production more/less than budgeted capacity."}
        ],
        quizzes:[
          {q:"The POHR is calculated as:",o:["Actual OH / Actual activity","Budgeted OH / Budgeted activity level","Actual OH / Budgeted activity","Budgeted OH / Actual activity"],a:1,e:"POHR = Budgeted Manufacturing Overhead / Budgeted Activity Level. Both numerator and denominator use BUDGETED amounts. This is calculated BEFORE the period starts to allow timely product costing."},
          {q:"When overhead is APPLIED to production, the journal entry is:",o:["Dr. MOH Control / Cr. Cash","Dr. WIP / Cr. MOH Applied","Dr. COGS / Cr. MOH","Dr. MOH Applied / Cr. WIP"],a:1,e:"Applying overhead: Dr. Work-in-Process / Cr. Manufacturing Overhead Applied. This moves applied overhead into the cost of production (WIP)."},
          {q:"Under-applied overhead means:",o:["Applied > Actual","Actual > Applied","Applied = Actual","Overhead was not allocated"],a:1,e:"Under-applied: Actual OH > Applied OH. Products were UNDERCOSTED (not enough overhead charged). Results in a DEBIT balance in the MOH account. At year-end, this increases COGS."},
          {q:"A large (material) under-applied overhead balance should be:",o:["Closed entirely to COGS","Carried forward to next year","Prorated among WIP, FG, and COGS","Added to retained earnings"],a:2,e:"LARGE (material) variance should be PRORATED among WIP, FG, and COGS based on their relative ending balances. This allocates the variance proportionally to all inventory that absorbed overhead. Small amounts go entirely to COGS."},
          {q:"POHR $20/DLH. Actual DLH 2,400. Actual OH $51,000. Under/Overapplied =",o:["$3,000 under-applied","$3,000 over-applied","$51,000 under-applied","In balance"],a:0,e:"Applied = $20 x 2,400 = $48,000. Actual = $51,000. Variance = $51,000 - $48,000 = $3,000 UNDER-APPLIED (actual > applied)."},
          {q:"The Fixed Overhead Volume Variance measures:",o:["Actual vs budgeted spending","Budgeted fixed OH vs applied fixed OH","Variable rate efficiency","Actual vs standard hours"],a:1,e:"Fixed OH Volume Variance = Budgeted Fixed OH - Applied Fixed OH. Measures production volume vs the capacity level used in the POHR. More production = favorable (more fixed OH absorbed per the rate)."},
          {q:"Which account has a CREDIT balance when overhead is over-applied?",o:["WIP","MOH Control","COGS","MOH Applied (or combined MOH)"],a:3,e:"MOH is CREDITED when overhead is applied and DEBITED when actual overhead is incurred. Over-applied = applied > actual = more credits than debits = CREDIT balance in the MOH account."},
          {q:"WIP $40,000 (20%), FG $60,000 (30%), COGS $100,000 (50%). Under-applied OH $10,000. Amount allocated to FG =",o:["$2,000","$3,000","$5,000","$6,000"],a:1,e:"FG's share = 30% x $10,000 = $3,000. Under-applied means we need to INCREASE costs: Dr. FG $3,000 / Cr. MOH $3,000 (along with other allocations to WIP and COGS)."},
          {q:"Variable Overhead Efficiency Variance is driven by:",o:["The overhead spending rate","Labor hours used vs standard hours allowed","Actual fixed costs vs budget","Production volume vs capacity"],a:1,e:"VOH Efficiency Variance = (Actual Hours - Standard Hours Allowed) x Standard Rate. It is driven by LABOR EFFICIENCY — same driver as the DL Efficiency Variance. If fewer hours are used than standard, the variance is favorable."},
          {q:"Actual overhead incurred is recorded by:",o:["Dr. WIP / Cr. MOH Control","Dr. MOH Control / Cr. Various (Cash, A/P, Accum. Depreciation)","Dr. MOH Applied / Cr. Cash","Dr. COGS / Cr. MOH Control"],a:1,e:"Actual overhead: Dr. Manufacturing Overhead Control / Cr. Various accounts (Cash, Accounts Payable, Accumulated Depreciation, etc.). MOH Control accumulates actual overhead on the DEBIT side."}
        ]},
      {id:"4-11",title:"Activity-Based Costing (ABC)",dur:"30 min",
        blocks:[
          {t:"h",v:"Why ABC? The Problem with Traditional Costing"},
          {t:"p",v:"Traditional costing uses a SINGLE overhead rate based on volume (e.g., direct labor hours). This works when products are simple. But in modern manufacturing with diverse products, a single rate DISTORTS costs — high-volume products get over-costed, low-volume/complex products get under-costed."},
          {t:"h",v:"What Is Activity-Based Costing?"},
          {t:"p",v:"ABC assigns overhead costs more accurately by identifying ACTIVITIES that consume resources and using MULTIPLE cost drivers to trace costs to products. It answers: What actually causes costs?"},
          {t:"h",v:"ABC vs Traditional Costing"},
          {t:"tbl",h:["Feature","Traditional Costing","Activity-Based Costing"],r:[["Overhead rates","One plant-wide rate","Multiple rates (one per activity)"],["Cost drivers","Volume-based (DLH, units)","Activity-based (setups, orders, inspections)"],["Accuracy","Lower — distorts costs","Higher — reflects actual resource use"],["Complexity","Simple","More complex"],["Best for","Simple, single-product firms","Diverse products, modern manufacturing"]]},
          {t:"h",v:"4 Levels of Activity in ABC"},
          {t:"b",v:["Unit-level: Activities performed FOR EACH unit (e.g., machine hours, direct labor)","Batch-level: Activities performed FOR EACH BATCH (e.g., machine setups, quality inspections)","Product-level: Activities supporting a specific PRODUCT LINE (e.g., product design, engineering changes)","Facility-level: Activities supporting the ENTIRE FACILITY (e.g., plant security, building maintenance) — NOT assigned to products"]},
          {t:"h",v:"ABC Process — Step by Step"},
          {t:"s",v:["Step 1: Identify the major activities (cost pools)","Step 2: Determine the cost driver for each activity","Step 3: Calculate Activity Rate = Pool Cost / Cost Driver Quantity","Step 4: Apply to each product: Activity Rate x Product Usage of Cost Driver","Step 5: Calculate total overhead per unit"]},
          {t:"h",v:"Example"},
          {t:"p",v:"Machine setup pool $60,000 with 300 setups. Activity rate = $60,000/300 = $200/setup. Product A needs 60 setups: $200 x 60 = $12,000. Product B needs 240 setups: $200 x 240 = $48,000. Traditional costing based on DL hours would distort this significantly."},
          {t:"h",v:"Benefits and Limitations of ABC"},
          {t:"b",v:["Benefits: More accurate product costs, better pricing decisions, identifies non-value-added activities, supports process improvement","Limitations: Expensive to implement, requires significant data collection, not required by GAAP for external reporting, may be too complex for simple companies"]},
          {t:"tip",v:"Exam Tips: ABC uses MULTIPLE cost pools and drivers. Traditional uses ONE rate. Unit-level varies with units. Batch-level with batches. Product-level with product line. Facility-level is NOT assigned to products. ABC corrects: high-volume = over-costed, low-volume/complex = under-costed under traditional costing."}
        ,
          {t:"h",v:"The 4 ABC Activity Levels"},
          {t:"tbl",h:["Level","Driven By","Examples","Cost Driver"],r:[["Unit-level","Each unit produced","DM, DL, machine power","Units produced"],["Batch-level","Each batch/setup","Machine setups, purchase orders, inspection per batch","Number of batches/setups"],["Product-level","Each product line","Product engineering, product advertising","Number of products"],["Facility-level","Overall facility","Plant rent, general management, building depreciation","Cannot be traced — allocated arbitrarily"]]},
          {t:"b",v:["Unit-level: varies with EVERY unit","Batch-level: varies with every BATCH (not every unit) — high-volume products benefit from batch economies","Product-level: supports a product line regardless of how many batches or units","Facility-level: necessary for overall operations — most difficult to assign to products"]},
          {t:"f",l:"Two-Stage ABC",v:"Stage 1: Resource Consumption Driver → allocates resources TO activities | Stage 2: Activity Consumption Driver → allocates activity costs TO products"},
          {t:"tip",v:"Exam Tips: Facility-level costs CANNOT be meaningfully traced to individual products. Batch-level costs driven by number of setups/batches, NOT units. Resource Consumption Driver = resources to activities. Activity Consumption Driver = activities to products/cost objects."}
        ],
        quizzes:[
          {q:"ABC differs from traditional costing primarily because ABC uses:",o:["One plant-wide overhead rate","Direct labor hours as the only base","Multiple cost pools and multiple cost drivers","Only variable costs"],a:2,e:"ABC uses MULTIPLE cost pools (activities) and MULTIPLE cost drivers, one for each activity. This provides more accurate cost allocation than a single plant-wide overhead rate."},
          {q:"Machine setup cost is an example of a:",o:["Unit-level activity","Batch-level activity","Facility-level activity","Product-level activity"],a:1,e:"Batch-level: Machine setups occur once per BATCH/production run, not per unit. Whether the batch is 10 or 10,000 units, only one setup is needed."},
          {q:"Plant security and building maintenance are examples of:",o:["Unit-level activities","Batch-level activities","Product-level activities","Facility-level activities"],a:3,e:"Facility-level (plant-level) activities support the entire facility and CANNOT be traced to individual products. These are not assigned to products in ABC."},
          {q:"Activity pool: Quality Inspection $90,000. Cost driver: 1,500 inspections. Activity rate =",o:["$45","$50","$60","$75"],a:2,e:"Activity Rate = Pool Cost / Total Cost Driver = $90,000 / 1,500 = $60 per inspection."},
          {q:"Activity rate $60/inspection. Product X uses 200 inspections. Inspection cost assigned to X =",o:["$6,000","$8,000","$12,000","$15,000"],a:2,e:"Cost Assigned = Activity Rate x Usage = $60 x 200 = $12,000."},
          {q:"Under traditional costing, high-volume standard products tend to be:",o:["Accurately costed","Under-costed","Over-costed","Priced correctly"],a:2,e:"Traditional costing over-costs high-volume products (too much overhead allocated based on DLH) and under-costs low-volume/complex products. ABC corrects this."},
          {q:"Engineering changes to support a specific product line are which type of activity?",o:["Unit-level","Batch-level","Product-level","Facility-level"],a:2,e:"Product-level activities support a SPECIFIC PRODUCT LINE. Engineering changes, product design, and product-specific advertising are product-level activities."},
          {q:"A major BENEFIT of ABC over traditional costing is:",o:["It is simpler to implement","It is required by GAAP","It provides more accurate product costs for diverse product lines","It eliminates overhead costs"],a:2,e:"ABC provides MORE ACCURATE cost information, especially when a company produces diverse products with different complexity and resource consumption patterns."},
          {q:"ABC identifies non-value-added activities (NVA). This helps management to:",o:["Increase NVA to improve quality","Eliminate or reduce NVA to lower costs","Price products higher","Increase batch sizes"],a:1,e:"Identifying NVA activities (e.g., rework, waiting, excessive inspection) allows management to ELIMINATE or REDUCE them, reducing costs without affecting customer value."},
          {q:"A product with LOW volume but HIGH complexity will be _____ under traditional costing vs ABC.",o:["Over-costed","Accurately costed","Under-costed","Not affected"],a:2,e:"Traditional costing bases overhead on volume. Low-volume complex products use fewer DLH but consume lots of batch/product-level activities. Traditional assigns them TOO LITTLE overhead — they are UNDER-COSTED."}
        ,
          {q:"Machine setup costs incurred once per production run are:",o:["Unit-level","Batch-level","Product-level","Facility-level"],a:1,e:"Machine setup costs occur once per BATCH/PRODUCTION RUN regardless of batch size. They are BATCH-LEVEL costs. Cost driver = number of setups/batches, not number of units."},
          {q:"Plant rent and general management costs are classified as:",o:["Unit-level","Batch-level","Product-level","Facility-level"],a:3,e:"Facility-level (sustaining) costs support the ENTIRE FACILITY and cannot be meaningfully traced to individual products, batches, or product lines. They are allocated somewhat arbitrarily."},
          {q:"A resource consumption cost driver allocates:",o:["Activity costs to products","Resources to activities","Products to customers","Overhead to departments"],a:1,e:"Stage 1 — Resource Consumption Driver: allocates RESOURCE costs TO ACTIVITIES. Stage 2 — Activity Consumption Driver: allocates ACTIVITY costs TO PRODUCTS/COST OBJECTS. Together they form the two-stage ABC allocation process."},
          {q:"Product engineering costs that support an entire product line are:",o:["Unit-level","Batch-level","Product-level","Facility-level"],a:2,e:"Product-level costs support an entire PRODUCT LINE regardless of how many batches or units are produced. Examples: product engineering, product design changes, product advertising. Cost driver = number of products/product lines."}
        ]},
      {id:"4-12",title:"Variable and Absorption Costing",dur:"30 min",
        blocks:[
          {t:"h",v:"Variable Costing vs Absorption Costing"},
          {t:"p",v:"Two methods exist for treating Fixed Manufacturing Overhead (Fixed MOH) in product costing. The difference affects inventory valuation and operating income when production differs from sales."},
          {t:"tbl",h:["Feature","Variable Costing","Absorption Costing"],r:[["Fixed MOH treatment","PERIOD cost — expensed immediately","PRODUCT cost — included in inventory"],["Required by GAAP/IFRS","No (internal use only)","Yes (external reporting)"],["Income affected by","Sales volume only","Both sales AND production volume"],["Inventory includes","DM + DL + Variable MOH only","DM + DL + Variable MOH + Fixed MOH"]]},
          {t:"h",v:"Key Formulas"},
          {t:"f",l:"Absorption Costing Unit Cost",v:"Unit Cost = DM + DL + Variable MOH + (Fixed MOH / Units Produced)"},
          {t:"f",l:"Variable Costing Unit Cost",v:"Unit Cost = DM + DL + Variable MOH only (Fixed MOH is a period cost)"},
          {t:"h",v:"Income Difference — The Key Rule"},
          {t:"f",l:"Reconciliation",v:"Absorption NI - Variable NI = Fixed MOH in Ending Inventory - Fixed MOH in Beginning Inventory"},
          {t:"b",v:["Production > Sales: Absorption NI > Variable NI (fixed MOH deferred in inventory)","Production < Sales: Absorption NI < Variable NI (fixed MOH released from inventory)","Production = Sales: Absorption NI = Variable NI (no difference)"]},
          {t:"h",v:"Example"},
          {t:"p",v:"Fixed MOH $60,000. Produced 10,000 units. Sold 8,000 units. Fixed MOH/unit = $6. Ending inventory = 2,000 units."},
          {t:"s",v:["Absorption: Fixed MOH in ending inventory = 2,000 x $6 = $12,000 (deferred)","Variable: All $60,000 expensed immediately","Absorption NI is $12,000 HIGHER than Variable NI"]},
          {t:"h",v:"Contribution Margin Income Statement (Variable Costing)"},
          {t:"tbl",h:["Line","Amount"],r:[["Sales Revenue","$XXX"],["- Variable Cost of Goods Sold","($XXX)"],["= Gross Contribution Margin","$XXX"],["- Variable Selling & Admin","($XXX)"],["= Contribution Margin","$XXX"],["- Fixed Manufacturing Overhead","($XXX)"],["- Fixed Selling & Admin","($XXX)"],["= Net Operating Income","$XXX"]]},
          {t:"tip",v:"Exam Tips: Absorption = GAAP required. Variable = management use only. When production > sales, absorption shows HIGHER income. Fixed MOH is the ONLY difference between the two methods. Contribution Margin format = variable costing income statement. Gross Profit format = absorption costing income statement."}
        ,
          {t:"h",v:"Advantages & Limitations"},
          {t:"tbl",h:["","Absorption","Variable"],r:[["Advantages","GAAP required · Full cost per unit · Matches costs to revenue","Transparent profit impact · Better CVP · No production manipulation"],["Limitations","Income manipulated by overproduction · Misleading when sales are low","Not GAAP-compliant · Requires fixed/variable separation"]]},
          {t:"h",v:"Super-Variable (Throughput) Costing — The 3rd Method"},
          {t:"p",v:"Throughput costing treats ONLY direct materials as product costs. ALL other costs (DL, variable OH, fixed OH) are period costs expensed immediately."},
          {t:"tbl",h:["Method","Product Costs","Inventory Value"],r:[["Absorption","DM + DL + Variable MOH + Fixed MOH","Highest"],["Variable","DM + DL + Variable MOH","Middle"],["Throughput","Direct Materials ONLY","Lowest"]]},
          {t:"f",l:"Throughput Contribution",v:"Throughput = Sales Revenue - Direct Materials | Used in Theory of Constraints (TOC)"},
          {t:"tip",v:"Exam Tips: 3 methods ranked by inventory: Absorption > Variable > Throughput. Throughput = DM only as product cost. Absorption manipulation: produce MORE than you sell → defer fixed costs → higher income. Variable costing eliminates this manipulation since all fixed OH is expensed immediately."}
        ],
        quizzes:[
          {q:"Under absorption costing, fixed manufacturing overhead is treated as a:",o:["Period cost","Product cost","Sunk cost","Opportunity cost"],a:1,e:"Absorption costing treats fixed MOH as a PRODUCT cost — it goes into inventory and is only expensed when the product is sold. This is required under GAAP/IFRS for external reporting."},
          {q:"Under variable costing, fixed manufacturing overhead is:",o:["Added to inventory","A product cost","Expensed in the period incurred","Allocated based on units sold"],a:2,e:"Variable costing treats fixed MOH as a PERIOD cost — expensed immediately in the period incurred, regardless of how many units were sold."},
          {q:"Production 12,000 units. Sales 10,000 units. Compared to variable costing, absorption costing net income is:",o:["The same","Lower","Higher","Cannot be determined without more data"],a:2,e:"Production (12,000) > Sales (10,000) — 2,000 units in ending inventory. Under absorption, some fixed MOH is DEFERRED in inventory, making absorption NI HIGHER than variable NI."},
          {q:"Fixed MOH $80,000. Produced 8,000 units. Sold 6,000 units. Difference in NI (Absorption vs Variable) =",o:["$10,000","$20,000","$60,000","$80,000"],a:1,e:"Fixed MOH/unit = $80,000/8,000 = $10. Ending inventory = 2,000 units. Difference = 2,000 x $10 = $20,000. Absorption NI is $20,000 higher."},
          {q:"When production EQUALS sales, absorption and variable costing net income are:",o:["Absorption higher","Variable higher","Equal","Cannot be determined"],a:2,e:"When production = sales, there is no change in inventory. All fixed MOH is expensed under both methods in the same period. Therefore NI is EQUAL."},
          {q:"Variable costing is primarily used for:",o:["External financial reporting","Tax reporting","Internal management decisions","GAAP compliance"],a:2,e:"Variable costing is used for INTERNAL management decisions — CVP analysis, break-even analysis, and short-term pricing decisions. It is NOT accepted for external GAAP/IFRS reporting."},
          {q:"The contribution margin income statement format is associated with:",o:["Absorption costing","Variable costing","Job order costing","Process costing"],a:1,e:"The Contribution Margin income statement separates variable and fixed costs — this is the variable costing format. Absorption costing uses the traditional Gross Profit format (Sales - COGS = Gross Profit)."},
          {q:"Fixed MOH per unit = $5. Beginning inventory 1,000 units. Ending inventory 3,000 units. Absorption NI vs Variable NI:",o:["Absorption $10,000 higher","Absorption $10,000 lower","Absorption $5,000 higher","They are equal"],a:0,e:"Inventory INCREASED by 2,000 units (3,000 - 1,000). Fixed MOH deferred in ending inventory = 2,000 x $5 = $10,000. Absorption NI is $10,000 HIGHER."},
          {q:"Which costing method results in a lower net income when inventory DECREASES?",o:["Variable costing","Absorption costing","Both are equal","Depends on fixed cost level"],a:1,e:"When inventory decreases, fixed MOH previously deferred in beginning inventory is now RELEASED and expensed under absorption. This means absorption shows LOWER income when inventory decreases."},
          {q:"Under variable costing, which cost is NOT included in product cost?",o:["Direct Materials","Direct Labor","Variable Manufacturing Overhead","Fixed Manufacturing Overhead"],a:3,e:"Fixed Manufacturing Overhead is the ONLY cost excluded from product cost under variable costing. DM, DL, and Variable MOH are included in both variable and absorption costing product costs."}
        ,
          {q:"Under throughput (super-variable) costing, which are product costs?",o:["DM + DL","DM only","All manufacturing costs","Variable manufacturing costs only"],a:1,e:"Throughput costing: ONLY Direct Materials are product costs. DL, variable OH, and fixed OH are ALL period costs expensed immediately. This gives the LOWEST possible inventory value of all three methods."},
          {q:"Ranked HIGHEST to LOWEST inventory value:",o:["Variable > Absorption > Throughput","Throughput > Variable > Absorption","Absorption > Variable > Throughput","All three are equal"],a:2,e:"Absorption (DM+DL+Variable MOH+Fixed MOH) > Variable (DM+DL+Variable MOH) > Throughput (DM only). More costs in inventory = higher inventory value."},
          {q:"Absorption costing income can be manipulated by:",o:["Reducing selling prices","Producing more units than are sold","Using FIFO inventory method","Increasing direct labor efficiency"],a:1,e:"Produce MORE than you sell → fixed MOH per unit decreases → more fixed costs deferred in ending inventory → COGS is lower → income is HIGHER. Variable costing prevents this because ALL fixed OH is expensed immediately regardless of production volume."}
        ]},
      {id:"4-13",title:"Shared Service Cost Allocation: Single",dur:"25 min",
        blocks:[
          {t:"h",v:"What Are Shared Service Departments?"},
          {t:"p",v:"HR, IT, Legal, Maintenance — support multiple operating departments but don't produce products. Their costs must be allocated to user departments for accurate product costing and fair performance evaluation."},
          {t:"h",v:"Single-Rate vs Dual-Rate Method"},
          {t:"tbl",h:["Feature","Single-Rate","Dual-Rate"],r:[["Fixed costs allocated by","Actual usage","BUDGETED usage"],["Variable costs allocated by","Actual usage","ACTUAL usage"],["Complexity","Simple","More accurate"],["Cost signal","May distort fixed cost signals","Accurate — fixed = committed capacity"]]},
          {t:"h",v:"Single-Rate Method — Example"},
          {t:"f",l:"Single Rate",v:"Rate = Total Budgeted Cost / Budgeted Activity Base | Allocation = Rate x Actual Usage"},
          {t:"p",v:"Example: IT total cost $120,000. Budgeted hours 12,000. Rate = $10/hr. Dept A uses 3,000 hrs → $30,000 allocated."},
          {t:"h",v:"Dual-Rate Method — Example"},
          {t:"p",v:"IT fixed costs $80,000. Variable rate $0.50/hr. Total budgeted hours 12,000."},
          {t:"s",v:["Dept A budgeted 3,000 hrs, actual 3,200 hrs","Fixed allocation = $80,000 x (3,000/12,000) = $20,000 (BUDGETED usage)","Variable allocation = $0.50 x 3,200 = $1,600 (ACTUAL usage)","Total = $21,600"]},
          {t:"h",v:"Why Dual-Rate Is Better"},
          {t:"p",v:"Single-Rate problem: If Dept A REDUCES actual usage, its fixed cost allocation drops — but the company's total fixed IT costs don't change. This sends a WRONG signal."},
          {t:"p",v:"Dual-Rate solution: Fixed costs based on BUDGETED usage (committed capacity). Reducing actual usage doesn't change fixed allocation — correct economic signal."},
          {t:"tip",v:"Exam Tips: Single-Rate = one rate for ALL costs based on actual usage. Dual-Rate = FIXED by BUDGETED, VARIABLE by ACTUAL. Key insight: fixed costs are COMMITTED — they don't change when actual usage changes. Dual-rate prevents gaming — managers can't reduce fixed allocation by cutting actual service usage."}
        ],
        quizzes:[
          {q:"Under Single-Rate allocation, costs are allocated based on:",o:["Budgeted usage only","Actual usage for all costs","Budgeted usage for fixed, actual for variable","Equal shares"],a:1,e:"Single-Rate: ONE rate combining all costs (fixed + variable) allocated based on ACTUAL USAGE. Simple but may distort fixed cost signals."},
          {q:"Under Dual-Rate, FIXED shared service costs are allocated based on:",o:["Actual usage","Budgeted (planned) usage","Equal shares","Total actual costs"],a:1,e:"Dual-Rate FIXED costs = allocated by BUDGETED usage. This reflects committed capacity — the capacity planned for each department. Actual usage fluctuations don't change the fixed cost allocation."},
          {q:"IT total cost $150,000. Budgeted hours 15,000. Dept A used 4,000 actual hours. Single-Rate allocation =",o:["$37,500","$40,000","$30,000","$45,000"],a:1,e:"Single Rate = $150,000 / 15,000 = $10/hr. Dept A = $10 x 4,000 = $40,000."},
          {q:"Fixed IT $90,000. Budgeted: A=3,000, B=6,000, C=1,000 (total 10,000). Variable $2/hr. Dept A actual = 3,500 hrs. Dual-Rate total =",o:["$27,000","$34,000","$35,000","$30,000"],a:1,e:"Fixed: $90,000 x (3,000/10,000) = $27,000. Variable: $2 x 3,500 = $7,000. Total = $34,000."},
          {q:"A key advantage of Dual-Rate over Single-Rate is:",o:["Simpler to calculate","Fixed costs don't change with actual usage fluctuations","Uses only one allocation base","Eliminates all overhead"],a:1,e:"Single-Rate problem: less actual usage → lower fixed allocation → wrong economic signal. Dual-Rate: fixed by BUDGETED usage = fixed cost allocation stays constant regardless of actual fluctuations."},
          {q:"Shared service costs are allocated to user departments to:",o:["Simplify bookkeeping","Achieve accurate product costing and fair performance evaluation","Reduce total costs","Meet GAAP requirements"],a:1,e:"Allocation ensures: (1) ACCURATE product costing — full cost includes service costs, (2) FAIR performance evaluation — departments bear costs of services they consume, (3) Incentivizes efficient use of shared resources."},
          {q:"Which method is simpler to calculate?",o:["Dual-Rate","Single-Rate","Reciprocal","Step-Down"],a:1,e:"Single-Rate is SIMPLER — one pool, one rate, one calculation. Dual-Rate requires separating fixed and variable costs and using two different allocation bases (budgeted vs actual usage)."},
          {q:"Under Dual-Rate, if Dept B's actual usage is LESS than budgeted, its fixed cost allocation:",o:["Decreases proportionally","Stays the same (based on budgeted)","Increases to compensate","Cannot be determined"],a:1,e:"Dual-Rate fixed costs are based on BUDGETED usage — actual usage doesn't affect the fixed allocation. Dept B committed to a certain capacity level, and the fixed costs reflect that commitment regardless of actual usage."},
          {q:"The main weakness of Single-Rate allocation is:",o:["Too complex to calculate","Fixed costs vary with actual usage changes — misleading signal","Cannot handle multiple service departments","Does not comply with GAAP"],a:1,e:"Single-Rate weakness: fixed costs are allocated based on actual usage, so when actual usage changes, fixed cost allocation changes too. But fixed costs DON'T CHANGE with usage in reality — misleading signal to department managers."},
          {q:"IT fixed costs $60,000. Variable $1/hr. Budgeted hours: A=4,000, B=2,000, C=4,000 (total 10,000). Dept A actual = 3,500 hrs. Dual-Rate: Dept A fixed allocation =",o:["$21,000","$24,000","$20,000","$28,000"],a:1,e:"Fixed: $60,000 x (4,000/10,000) = $60,000 x 40% = $24,000. Based on BUDGETED usage (4,000 hrs out of 10,000), not actual usage."}
        ]},
      {id:"4-14",title:"Shared Service Cost Allocation: Multiple",dur:"25 min",
        blocks:[
          {t:"h",v:"What Are Shared Service Departments?"},
          {t:"p",v:"HR, IT, Legal, Maintenance — support multiple operating departments but don't produce products. Their costs must be allocated to user departments for accurate product costing and fair performance evaluation."},
          {t:"h",v:"Single-Rate vs Dual-Rate Method"},
          {t:"tbl",h:["Method","Fixed Costs","Variable Costs","Best For"],r:[["Single-Rate","Allocated by actual usage","Allocated by actual usage","Simple situations"],["Dual-Rate","Allocated by BUDGETED usage","Allocated by ACTUAL usage","Accurate cost signals"]]},
          {t:"p",v:"Single-Rate Example: IT cost $120,000. Budgeted hours 12,000. Rate = $10/hr. Dept A uses 3,000 hrs → $30,000 allocated."},
          {t:"p",v:"Dual-Rate Example: IT fixed $80,000, variable $0.50/hr. Dept A budgeted 3,000 hrs (of 12,000 total), actually used 3,200 hrs. Fixed = $80,000 x (3,000/12,000) = $20,000. Variable = $0.50 x 3,200 = $1,600. Total = $21,600."},
          {t:"h",v:"Three Methods for Multiple Service Departments"},
          {t:"tbl",h:["Method","Reciprocal Services?","Accuracy","Complexity"],r:[["Direct","Ignored","Lowest","Simplest"],["Step-Down","Partial (sequence matters)","Moderate","Medium"],["Reciprocal","Fully recognized via simultaneous equations","Highest","Most complex"]]},
          {t:"h",v:"Direct Method Example"},
          {t:"p",v:"IT ($60,000): HR 20%, Production 80%. Maintenance ($40,000): HR 10%, Production 90%. Direct Method ignores inter-service. IT to Production = $60,000 x 80% = $48,000. Maintenance to Production = $40,000 x 90% = $36,000."},
          {t:"h",v:"Step-Down Method"},
          {t:"p",v:"Allocate the department that serves the most other departments FIRST. Once closed, it receives no more costs. More accurate than Direct — less accurate than Reciprocal."},
          {t:"h",v:"Reciprocal Method"},
          {t:"p",v:"Uses simultaneous equations to fully recognize mutual services. Example: Total IT = IT incurred + % of Maintenance total. Total Maintenance = Maint incurred + % of IT total. Solve simultaneously → allocate totals to operating departments."},
          {t:"tip",v:"Exam Tips: Direct = ignores all inter-service (simplest). Step-Down = partial, ORDER matters. Reciprocal = most accurate, uses algebra. Single-Rate = one rate. Dual-Rate = fixed by BUDGETED, variable by ACTUAL. Key: Dual-Rate prevents gaming — managers can't reduce fixed allocation by cutting actual usage."}
        ],
        quizzes:[
          {q:"The Direct Method of service department allocation:",o:["Recognizes all reciprocal services","Allocates costs only to operating departments ignoring inter-service","Uses simultaneous equations","Allocates in order from largest department"],a:1,e:"Direct Method allocates service costs ONLY to operating departments, completely IGNORING any services between service departments. Simplest but least accurate."},
          {q:"The Reciprocal Method is most accurate because:",o:["It is simplest to calculate","It fully recognizes mutual services via simultaneous equations","It uses actual costs only","It requires fewer allocations"],a:1,e:"Reciprocal Method uses SIMULTANEOUS EQUATIONS to fully recognize ALL mutual services between service departments. Most accurate but most complex."},
          {q:"Under Dual-Rate, variable costs are allocated by:",o:["Budgeted usage","Actual usage","Equal shares","Department headcount"],a:1,e:"Dual-Rate: Variable costs = ACTUAL usage (consume what you use). Fixed costs = BUDGETED usage (committed capacity). This provides accurate economic signals for both cost components."},
          {q:"IT total cost $150,000. Budgeted hours 15,000. Dept A used 4,000 hours. Single-Rate allocation =",o:["$37,500","$40,000","$30,000","$45,000"],a:1,e:"Single Rate = $150,000 / 15,000 = $10/hr. Dept A = $10 x 4,000 = $40,000."},
          {q:"Step-Down differs from Direct Method because Step-Down:",o:["Fully recognizes reciprocal services","Partially recognizes inter-service by allocating in sequence","Ignores all inter-service","Requires simultaneous equations"],a:1,e:"Step-Down allocates service departments IN SEQUENCE — the first dept allocated can assign costs to other service depts. Once closed, a dept receives no more. More accurate than Direct, less than Reciprocal."},
          {q:"A key advantage of Dual-Rate over Single-Rate is:",o:["Simpler calculation","Fixed costs don't change with actual usage fluctuations","Uses only one base","Eliminates all overhead"],a:1,e:"Single-Rate problem: less actual usage → lower fixed allocation → wrong signal (fixed costs are committed). Dual-Rate: fixed costs based on BUDGETED usage stay constant regardless of actual usage fluctuations."},
          {q:"Fixed IT costs $90,000. Budgeted: A=3,000, B=6,000, C=1,000 hrs (total 10,000). Variable $2/hr. Dept A actual = 3,500 hrs. Dual-Rate total for Dept A =",o:["$27,000","$34,000","$35,000","$30,000"],a:1,e:"Fixed: $90,000 x (3,000/10,000) = $27,000. Variable: $2 x 3,500 = $7,000. Total = $34,000."},
          {q:"Which method requires solving simultaneous equations?",o:["Direct Method","Step-Down Method","Reciprocal Method","Dual-Rate Method"],a:2,e:"Reciprocal Method uses SIMULTANEOUS EQUATIONS to determine each service department's total cost (including reciprocal services received). Then allocates these totals to operating departments."},
          {q:"In Step-Down, the order of allocation:",o:["Never matters","Must be alphabetical","Affects final allocation amounts","Must start with smallest dept"],a:2,e:"Order MATTERS in Step-Down. Different sequences = different results. Once a dept is closed, it can't receive more costs. Common: allocate the dept that serves the MOST other service departments first."},
          {q:"Shared service costs are allocated primarily to:",o:["Simplify bookkeeping","Achieve accurate product costing and fair performance evaluation","Reduce total costs","Meet government regulations"],a:1,e:"Shared service cost allocation ensures: (1) ACCURATE PRODUCT COSTING — full cost includes service costs, (2) FAIR PERFORMANCE EVALUATION — depts bear costs of services they consume, (3) Incentivizes efficient use of shared resources."}
        ]},
      {id:"4-15",title:"Estimating Fixed and Variable Costs",dur:"30 min",
        blocks:[
          {t:"h",v:"Why Cost Estimation?"},
          {t:"p",v:"Managers need to predict future costs for budgeting, pricing, and decisions. Cost estimation methods determine the fixed and variable components of a mixed cost. The three main methods are: High-Low, Scatter Diagram, and Regression Analysis."},
          {t:"h",v:"Comparison of Methods"},
          {t:"tbl",h:["Method","Data Used","Accuracy","Complexity"],r:[["High-Low","2 data points only","Lowest — may be distorted by outliers","Very simple"],["Scatter Diagram","All data points (visual)","Moderate — subjective line fitting","Simple"],["Regression Analysis","All data points (statistical)","HIGHEST — objective, uses all data","More complex but standard"]]},
          {t:"h",v:"Regression Analysis"},
          {t:"p",v:"Regression analysis uses statistical techniques to fit the BEST LINE through all data points. It gives the most accurate cost equation by minimizing the sum of squared deviations."},
          {t:"f",l:"Regression Cost Equation",v:"Y = a + bX   |   a = Fixed Cost (intercept), b = Variable Cost Rate (slope), X = Activity Level"},
          {t:"h",v:"Key Regression Statistics"},
          {t:"tbl",h:["Statistic","Meaning","Good Value"],r:[["R² (Coefficient of Determination)","% of cost variation EXPLAINED by the activity driver","Close to 1.0 (100%) is best"],["R (Correlation Coefficient)","Strength and direction of relationship","Close to +1 or -1"],["t-statistic","Statistical significance of each variable","> 2 is generally significant"],["p-value","Probability the result is due to chance","< 0.05 (5%) is significant"]]},
          {t:"h",v:"Multiple Regression"},
          {t:"p",v:"Simple regression uses ONE independent variable (e.g., machine hours). Multiple regression uses TWO OR MORE variables to predict cost — more accurate when costs are driven by multiple factors."},
          {t:"p",v:"Example: Total cost = $5,000 + $3(machine hours) + $2(labor hours). Both machine hours AND labor hours drive costs."},
          {t:"h",v:"Learning Curve Effect"},
          {t:"p",v:"As workers gain experience producing a product, labor time per unit DECREASES. Each time CUMULATIVE production DOUBLES, average labor hours per unit decrease by a fixed percentage (the learning rate)."},
          {t:"f",l:"Learning Curve",v:"If learning rate = 80%: When cumulative output doubles, average time per unit = previous average x 80%"},
          {t:"tip",v:"Exam Tips: Regression is MOST accurate — uses all data points. High-Low is LEAST accurate — only 2 points. R² close to 1.0 = strong relationship. R² = 0.85 means 85% of cost variation is explained by the activity. Learning curve: output doubles → average time drops by learning %. 80% learning curve is common exam example."}
        ],
        quizzes:[
          {q:"Which cost estimation method uses ALL available data points and provides the MOST accurate results?",o:["High-Low Method","Scatter Diagram","Regression Analysis","Accounts Analysis"],a:2,e:"Regression Analysis uses ALL data points and the least-squares statistical technique to find the best-fit line. It is the MOST ACCURATE method because it uses all available information objectively, unlike High-Low (2 points) or Scatter Diagram (subjective)."},
          {q:"The High-Low method's main weakness is that it:",o:["Requires advanced software","Only uses 2 data points which may not be representative","Cannot separate fixed and variable costs","Only works for variable costs"],a:1,e:"High-Low only uses 2 data points — the highest and lowest activity levels. If either point is an outlier (unusual), the entire calculation is distorted. Regression Analysis avoids this by using ALL data points."},
          {q:"In regression analysis, R² = 0.92 means:",o:["The cost estimate is 92% accurate","92% of the variation in cost is explained by the activity driver","The variable cost rate is $0.92","The fixed cost is 92% of total cost"],a:1,e:"R² = Coefficient of Determination. R² = 0.92 means 92% of the VARIATION in total cost is explained by the chosen activity driver. The remaining 8% is explained by other factors. Higher R² = better fit."},
          {q:"Regression equation: Y = $8,000 + $4.50X. At 3,000 machine hours, estimated cost =",o:["$13,500","$21,500","$12,000","$19,000"],a:1,e:"Y = $8,000 + ($4.50 x 3,000) = $8,000 + $13,500 = $21,500."},
          {q:"Multiple regression differs from simple regression because multiple regression:",o:["Uses only the highest and lowest data points","Uses two or more independent variables to predict cost","Requires a computer to calculate","Is less accurate than simple regression"],a:1,e:"Multiple regression uses TWO OR MORE independent variables (cost drivers) to predict cost. Example: Y = a + b₁(machine hours) + b₂(labor hours). This is more accurate when costs are driven by multiple factors simultaneously."},
          {q:"In the learning curve concept, when cumulative production DOUBLES, average labor time per unit:",o:["Doubles","Stays the same","Decreases by a fixed percentage","Increases by a fixed percentage"],a:2,e:"Learning curve: each time cumulative production DOUBLES, average labor time per unit DECREASES by a constant percentage (the learning rate). Example: 80% learning rate — if it takes 100 hours for 1 unit, 2 units average 80 hours, 4 units average 64 hours."},
          {q:"An 80% learning curve means:",o:["Labor cost is 80% of total cost","When output doubles, average time per unit becomes 80% of previous average","Fixed costs are 80% of total costs","80% of workers meet productivity standards"],a:1,e:"80% learning curve: when cumulative output DOUBLES, average time per unit = 80% of previous average. Example: 1st unit = 100 hrs. 2 units (doubled): average = 80 hrs. 4 units (doubled again): average = 64 hrs (80% of 80)."},
          {q:"The scatter diagram method of cost estimation is:",o:["The most accurate method","Objective and mathematical","A visual method where a line is drawn through plotted data points","Based on only the highest and lowest observations"],a:2,e:"Scatter diagram: plot all data points on a graph (activity on X-axis, cost on Y-axis), then visually draw a best-fit line through the points. More accurate than High-Low but SUBJECTIVE (different people draw different lines). Less accurate than regression."},
          {q:"A high R² value in regression analysis indicates:",o:["High fixed costs","A strong relationship between the cost driver and total cost","A complex cost structure","High variable costs"],a:1,e:"High R² (close to 1.0) indicates a STRONG relationship between the independent variable (cost driver) and the dependent variable (total cost). The chosen cost driver explains most of the variation in cost — it is a good predictor."},
          {q:"The learning curve effect is MOST significant for:",o:["Highly automated, machine-intensive processes","Labor-intensive processes involving complex, repetitive tasks","Simple, short production runs","Commodity manufacturing"],a:1,e:"Learning curve is most significant for LABOR-INTENSIVE, COMPLEX, REPETITIVE tasks. As workers repeat the process, they become more efficient. Highly automated processes show little learning effect because machines don't 'learn' — humans do."}
        ]},
      {id:"4-16",title:"Supply Chain & Lean Resource Management",dur:"30 min",
        blocks:[
          {t:"h",v:"What Is Supply Chain Management?"},
          {t:"p",v:"Supply Chain Management (SCM) coordinates the flow of materials, information, and money from RAW MATERIAL SUPPLIERS through MANUFACTURERS to END CUSTOMERS. The goal is to optimize the entire chain — not just individual companies."},
          {t:"h",v:"Key SCM Concepts"},
          {t:"tbl",h:["Concept","Description"],r:[["Supply Chain","All companies involved from raw materials to end customer"],["Upstream activities","Suppliers and raw materials (before the company)"],["Downstream activities","Distribution, retailers, end customers (after the company)"],["Bullwhip Effect","Small demand variations amplified upstream — causing excess inventory"],["Vendor-Managed Inventory","Supplier monitors and replenishes customer's inventory automatically"]]},
          {t:"h",v:"The Value Chain (Porter's Model)"},
          {t:"p",v:"Michael Porter's Value Chain identifies PRIMARY and SUPPORT activities that create value for customers. Cost management focuses on optimizing each activity."},
          {t:"b",v:["Primary Activities (directly create value): Inbound Logistics → Operations → Outbound Logistics → Marketing & Sales → Service","Support Activities (enable primary activities): Firm Infrastructure, HR Management, Technology Development, Procurement"]},
          {t:"h",v:"Value-Added vs Non-Value-Added Activities"},
          {t:"tbl",h:["Type","Definition","Action"],r:[["Value-Added (VA)","Customer WILLINGLY pays for it — changes form, fit, or function","Keep and optimize"],["Non-Value-Added (NVA)","Customer would NOT pay for it if they knew — waste","Eliminate or reduce"],["Business Non-Value-Added","Required by business but not valued by customer (e.g., accounting, compliance)","Minimize"]]},
          {t:"h",v:"Business Process Improvement Tools"},
          {t:"b",v:["Process Mapping / Flowcharts: Visualize the current process to identify waste and bottlenecks","Benchmarking: Comparing performance to best-in-class competitors or industry standards","Business Process Reengineering (BPR): Radical redesign of processes for dramatic improvement","Kaizen: Continuous small improvements by all employees","Six Sigma (DMAIC): Define, Measure, Analyze, Improve, Control"]},
          {t:"tip",v:"Exam Tips: Value Chain = Primary + Support activities. Primary activities directly create value. Non-value-added activities = waste → eliminate. Bullwhip effect = demand distortion growing upstream. Benchmarking = comparing to best practices. BPR = radical redesign (vs Kaizen = gradual improvement). SCM goal = optimize the ENTIRE chain, not just one company. Customer defines what is value-added."},
          {t:"h",v:"What Is Lean Management?"},
          {t:"p",v:"Lean management is a philosophy focused on ELIMINATING WASTE and creating value for the customer. Originating from the Toyota Production System, lean identifies seven types of waste (TIMWOOD) and works to eliminate them."},
          {t:"h",v:"7 Types of Waste (TIMWOOD)"},
          {t:"b",v:["T — Transportation: Moving materials unnecessarily","I — Inventory: Excess stock tying up capital","M — Motion: Unnecessary worker movement","W — Waiting: Idle time between processes","O — Overproduction: Making more than needed","O — Over-processing: More work than required","D — Defects: Errors requiring rework or scrap"]},
          {t:"h",v:"Just-in-Time (JIT) System"},
          {t:"p",v:"JIT is a pull-based production system where materials and products are produced or purchased ONLY when needed — in the exact quantity needed, at the exact time needed."},
          {t:"tbl",h:["Feature","Traditional System","JIT System"],r:[["Inventory","Large safety stock","Minimal — near zero",""],["Production trigger","Push (produce to forecast)","Pull (produce on demand)",""],["Defects","Acceptable defect rate","Zero defects goal",""],["Supplier relationship","Many suppliers, competitive","Few trusted suppliers, long-term",""],["Setup time","Long","Minimized",""],["Quality","Inspect after production","Built-in quality (TQM)"," "]]},
          {t:"h",v:"JIT Benefits & Risks"},
          {t:"b",v:["Benefits: Reduced inventory costs, less waste, faster production, higher quality, lower storage costs","Risks: Supply chain disruptions can halt production (no buffer stock), requires reliable suppliers, needs stable demand"]},
          {t:"h",v:"Kanban System"},
          {t:"p",v:"Kanban is the signal system used in JIT. Cards (kanban) authorize production or movement of materials only when needed — preventing overproduction."},
          {t:"h",v:"Theory of Constraints (TOC)"},
          {t:"p",v:"TOC focuses on identifying and managing the BOTTLENECK (constraint) — the process limiting overall throughput. The 5 steps: Identify → Exploit → Subordinate → Elevate → Repeat."},
          {t:"f",l:"Throughput Contribution",v:"Throughput = Sales Revenue - Direct Materials (variable costs only)"},
          {t:"tip",v:"Exam Tips: JIT = pull system (demand-driven). Traditional = push system (forecast-driven). JIT goal: zero inventory, zero defects. 7 wastes = TIMWOOD. Kanban = authorization card for JIT. TOC bottleneck = the WEAKEST LINK — focus all improvement efforts here. JIT requires reliable suppliers and stable demand. Main JIT risk = supply disruption."}
        ,
          {t:"h",v:"Lean Thinking — The 5 Principles"},
          {t:"b",v:["1. Specify Value: Define value from the CUSTOMER'S perspective — what are they willing to pay for?","2. Identify the Value Stream: Map ALL processes delivering the product — identify waste in the entire flow","3. Create Continuous Flow: Production flows SMOOTHLY without interruption or queuing","4. Establish Pull: Produce ONLY what is needed, WHEN it is needed — demand-driven (JIT)","5. Pursue Perfection: Continuously strive for zero waste, zero defects — kaizen mindset"]},
          {t:"h",v:"SMED — Single Minute Exchange of Dies"},
          {t:"p",v:"Reduces machine SETUP/CHANGEOVER time to under 10 minutes (single-digit minutes)."},
