<script>
// Capture install prompt as early as possible
window.__installPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  window.__installPrompt = e;
  if(window.__onInstallReady) window.__onInstallReady();
});
</script>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f0eb;color:#1a1a1a;overscroll-behavior:none}
#app{display:flex;flex-direction:column;height:100vh;max-width:600px;margin:0 auto;background:#fff;position:relative;overflow:hidden}
@media(min-width:620px){#app{border-radius:16px;margin:16px auto;height:calc(100vh - 32px);box-shadow:0 8px 40px rgba(0,0,0,.12)}}
/* ── Desktop Sidebar Layout (900px+) ── */
@media(min-width:900px){
  body{background:#dde3ea}
  #app{flex-direction:row;max-width:1280px;border-radius:16px;margin:16px auto;height:calc(100vh - 32px)}
  #bottom-nav{flex-direction:column;width:190px;min-width:190px;border-right:.5px solid #e0e0d8;border-bottom:none;padding:16px 8px 16px;overflow-x:visible;overflow-y:auto;justify-content:flex-start;align-items:stretch;gap:2px;flex-shrink:0}
  #bottom-nav .nav-btn{flex-direction:row;justify-content:flex-start;padding:10px 14px;gap:10px;font-size:13px;min-width:auto;border-radius:10px;width:100%;text-align:left}
  #bottom-nav .nav-btn.active{background:#E6F1FB;color:#0C447C}
  #bottom-nav .nav-btn.active::after{display:none}
  #bottom-nav .nav-btn:hover:not(.active){background:#f5f5f0}
  #bottom-nav .nav-icon{font-size:20px;flex-shrink:0}
  .content{flex:1;min-width:0;overflow:hidden}
  .stat-grid{grid-template-columns:repeat(4,1fr)}
}
@media(min-width:1200px){
  #app{max-width:1440px}
  #bottom-nav{width:210px;min-width:210px}
}
/* Desktop brand header in sidebar */
.desktop-brand{display:none}
@media(min-width:900px){
  .desktop-brand{display:block;padding:8px 14px 16px;border-bottom:.5px solid #e0e0d8;margin-bottom:8px;flex-shrink:0}
}
.content{flex:1;overflow:hidden;display:flex;flex-direction:column}
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:16px}
.pad{padding:0 16px}
/* Nav */
.bottom-nav{display:flex;background:#fff;border-bottom:.5px solid #e0e0d8;flex-shrink:0;padding-top:env(safe-area-inset-top);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}.bottom-nav::-webkit-scrollbar{display:none}
.nav-btn{flex:1;min-width:64px;padding:10px 0 8px;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;color:#999;font-family:inherit;transition:color .15s;position:relative}
.nav-btn.active{color:#185FA5}
.nav-btn.active::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:24px;height:2.5px;background:#185FA5;border-radius:2px}
.nav-icon{font-size:24px;line-height:1}
/* Screen headers */
.sh{padding:16px 16px 12px;border-bottom:.5px solid #e0e0d8;flex-shrink:0}
.sh h2{font-size:18px;font-weight:500}
.sh p{font-size:12px;color:#888;margin-top:3px}
.bh{padding:13px 16px 11px;border-bottom:.5px solid #e0e0d8;display:flex;align-items:center;gap:10px;flex-shrink:0;background:#fff}
.bh-back{background:none;border:none;cursor:pointer;font-size:26px;color:#888;padding:0;line-height:1;font-family:inherit}
/* Cards */
.card{background:#fff;border:.5px solid #e0e0d8;border-radius:12px;padding:14px 16px;margin-bottom:10px}
.card:last-child{margin-bottom:0}
/* Info sections */
.info-section{margin-bottom:20px}
.info-title{font-size:16px;font-weight:500;color:#1a1a1a;margin-bottom:10px;padding-bottom:8px;border-bottom:2px solid #185FA520;display:flex;align-items:center;gap:8px}
.info-p{font-size:14px;color:#555;line-height:1.65;margin-bottom:8px}
/* Stats */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.stat{background:#f5f5f0;border-radius:10px;padding:12px 8px;text-align:center}
.stat-l{font-size:10px;color:#888;margin-bottom:3px}
.stat-v{font-size:20px;font-weight:500}
.stat-s{font-size:10px;color:#888;margin-top:2px}
/* Progress bars */
.pb{height:6px;background:#ebebea;border-radius:3px;overflow:hidden}
.pb-fill{height:100%;border-radius:3px;transition:width .5s ease}
/* Buttons */
.btn{padding:13px;border-radius:10px;font-size:14px;cursor:pointer;font-weight:500;width:100%;border:none;font-family:inherit;transition:opacity .15s}
.btn:active{opacity:.8}
.btn-primary{background:#185FA5;color:#fff}
.btn-outline{background:transparent;border:.5px solid #ccc;color:#333}
.btn-danger{background:#E24B4A;color:#fff}
.btn-sm{padding:9px 0;font-size:13px;border-radius:9px;cursor:pointer;font-weight:500;font-family:inherit;flex:1;border:none}
/* CBQ embedded styles */
.hidden{display:none!important}
.cbq-sec-tabs{display:flex;gap:6px;padding:10px 16px;background:#fff;border-bottom:.5px solid #e0e0d8;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
.cbq-sec-tabs::-webkit-scrollbar{display:none}
.cbq-sec-tab{padding:6px 14px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;border:none;font-family:inherit;transition:all .15s}
.cbq-sec-tab.active{background:#0C447C;color:#fff}
.cbq-sec-tab:not(.active){background:#f0f0eb;color:#555}
.cbq-list{padding:12px 16px}
.cbq-card{background:#fff;border:.5px solid #e0e0d8;border-radius:14px;padding:16px;margin-bottom:10px;cursor:pointer;transition:all .2s}
.cbq-card:hover{border-color:#185FA5;box-shadow:0 2px 12px rgba(24,95,165,.1)}
.cbq-card-top{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.cbq-num{width:38px;height:38px;border-radius:10px;background:#E6F1FB;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#0C447C;flex-shrink:0}
.cbq-badge{padding:4px 10px;border-radius:20px;font-size:12px;font-weight:500}
.case-box{background:#f8f8f6;border:.5px solid #e0e0d8;border-radius:12px;padding:16px;margin:12px 16px 0}
.case-label{font-size:11px;font-weight:700;color:#185FA5;letter-spacing:.8px;margin-bottom:8px}
.case-text{font-size:14px;color:#444;line-height:1.7}
.exhibit-wrap{overflow-x:auto;margin-top:12px;border-radius:8px;border:.5px solid #d0d0d8}
.exhibit-tbl{width:100%;border-collapse:collapse;font-size:13px}
.exhibit-tbl th{padding:8px 12px;text-align:left;font-weight:600;background:#E6F1FB;color:#0C447C;border-bottom:1px solid #c0d4ea}
.exhibit-tbl td{padding:7px 12px;border-bottom:.5px solid #e0e0d8;color:#444}
.exhibit-tbl .num{text-align:right;font-family:'Courier New',monospace}
.q-block{margin:14px 16px 0;border:.5px solid #e0e0d8;border-radius:12px;overflow:hidden}
.q-header{padding:12px 14px;background:#fafaf8;border-bottom:.5px solid #e0e0d8;display:flex;gap:10px;align-items:flex-start}
.q-num{width:24px;height:24px;border-radius:50%;background:#185FA5;color:#fff;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.q-type-badge{font-size:10px;padding:2px 8px;border-radius:10px;background:#EEEDFE;color:#534AB7;font-weight:700;letter-spacing:.5px;flex-shrink:0;margin-top:3px}
.q-text{font-size:14px;color:#1a1a1a;line-height:1.55;font-weight:500;flex:1}
.q-body{padding:12px 14px}
.calc-wrap{display:flex;align-items:center;gap:8px}
.calc-prefix{font-size:16px;color:#555;font-weight:500}
.calc-input{border:.5px solid #d0d0d8;border-radius:8px;padding:10px 12px;font-size:16px;font-family:'Courier New',monospace;color:#1a1a1a;background:#fafaf8;outline:none;width:170px;text-align:right;transition:border-color .15s}
.calc-input:focus{border-color:#185FA5;background:#fff}
.calc-input.correct{border-color:#639922;background:#EAF3DE;color:#27500A}
.calc-input.wrong{border-color:#E24B4A;background:#FCEBEB;color:#791F1F}
.select-opts{display:flex;flex-direction:column;gap:7px}
.select-opt{padding:11px 14px;border-radius:8px;border:.5px solid #d0d0d8;cursor:pointer;font-size:14px;color:#444;transition:all .15s;background:#fafaf8;user-select:none;line-height:1.4}
.select-opt:hover{border-color:#185FA5;background:#f0f6ff}
.select-opt.selected{border-color:#185FA5;background:#E6F1FB;color:#0C447C;font-weight:500}
.select-opt.correct{border-color:#639922;background:#EAF3DE;color:#27500A;font-weight:500}
.select-opt.wrong{border-color:#E24B4A;background:#FCEBEB;color:#791F1F}
.drag-source{display:flex;flex-wrap:wrap;gap:7px;padding:8px 0 12px}
.drag-area{display:flex;gap:10px;flex-wrap:wrap}
.drag-col{flex:1;min-width:120px}
.drag-col-label{font-size:11px;font-weight:700;color:#888;letter-spacing:.5px;margin-bottom:7px;text-align:center}
.drop-zone{min-height:46px;border:1.5px dashed #c0c8d8;border-radius:8px;padding:6px;background:#fafaf8;transition:all .2s;display:flex;flex-direction:column;gap:5px}
.drop-zone.over{border-color:#185FA5;background:#EEF5FF}
.drop-zone.correct{border-color:#639922;border-style:solid;background:#EAF3DE}
.drop-zone.wrong{border-color:#E24B4A;border-style:solid;background:#FCEBEB}
.drag-chip{padding:7px 11px;border-radius:7px;background:#E6F1FB;color:#0C447C;font-size:13px;font-weight:500;cursor:grab;user-select:none;border:.5px solid #b0c8e0;text-align:center;touch-action:none}
.drag-chip:active{cursor:grabbing}
.blank-sentence{font-size:14px;color:#444;line-height:2}
.blank-sel{border:.5px solid #185FA5;border-radius:6px;padding:4px 8px;font-size:13px;font-family:inherit;color:#0C447C;background:#E6F1FB;outline:none;cursor:pointer;font-weight:500}
.blank-sel.correct{border-color:#639922;background:#EAF3DE;color:#27500A}
.blank-sel.wrong{border-color:#E24B4A;background:#FCEBEB;color:#791F1F}
.q-fb{margin-top:10px;padding:10px 12px;border-radius:8px;font-size:13px;line-height:1.55;display:none}
.q-fb.show{display:block}
.q-fb.ok{background:#EAF3DE;border-left:3px solid #639922;color:#27500A}
.q-fb.no{background:#FCEBEB;border-left:3px solid #E24B4A;color:#791F1F}
.cbq-bottom-bar{padding:12px 16px;border-top:.5px solid #e0e0d8;background:#fff;flex-shrink:0;display:flex;gap:10px;align-items:center}
.score-pill{background:#E6F1FB;border-radius:20px;padding:6px 14px;font-size:13px;font-weight:700;color:#0C447C;white-space:nowrap;flex-shrink:0}
.btn-success{background:#639922;color:#fff}
.cbq-btn{padding:13px;border-radius:10px;font-size:15px;cursor:pointer;font-weight:600;border:none;font-family:inherit;transition:opacity .15s;flex:1}
.cbq-btn:active{opacity:.8}
.cbq-btn-primary{background:#185FA5;color:#fff}
.cbq-btn-success{background:#639922;color:#fff}
.res-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:16px 0}
.res-stat{background:#f5f5f0;border-radius:10px;padding:12px 8px;text-align:center}
.res-stat-l{font-size:11px;color:#888;margin-bottom:4px}
.res-stat-v{font-size:22px;font-weight:700}
/* Lesson content */
.lh{font-size:19px;font-weight:500;margin:20px 0 8px;color:#1a1a1a}
.lp{font-size:16px;color:#555;line-height:1.7;margin-bottom:14px}
.formula{border-radius:8px;padding:12px 16px;margin:12px 0}
.formula-lbl{font-size:14px;font-weight:500;letter-spacing:.8px;text-transform:uppercase;margin-bottom:5px}
.formula-txt{font-family:'Courier New',monospace;font-size:15px;font-weight:500;line-height:1.5}
.tip{background:#FAEEDA;border-left:3px solid #EF9F27;border-radius:0 8px 8px 0;padding:12px 16px;margin:14px 0}
.tip-lbl{font-size:14px;font-weight:500;color:#854F0B;letter-spacing:.8px;margin-bottom:5px}
.tip-txt{font-size:15px;color:#633806;line-height:1.6}
.blist{list-style:none;margin:8px 0 14px}
.blist li{display:flex;gap:8px;margin-bottom:10px;font-size:16px;color:#555;line-height:1.55}
.slist{list-style:none;margin:8px 0 14px}
.slist li{display:flex;gap:10px;margin-bottom:12px;font-size:16px;color:#555;line-height:1.55;align-items:flex-start}
.snum{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0;margin-top:1px}
/* Table */
.tbl-wrap{overflow-x:auto;margin:12px 0;border-radius:8px;border:.5px solid #e0e0d8}
.tbl{width:100%;border-collapse:collapse;font-size:15px}
.tbl th{padding:9px 12px;text-align:left;font-weight:500;border-bottom:1px solid rgba(0,0,0,.1)}
.tbl td{padding:8px 12px;border-bottom:.5px solid #e0e0d8;color:#555}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:nth-child(even) td{background:#f8f8f6}
/* Quiz */
.q-opt{padding:12px 14px;border-radius:10px;cursor:pointer;display:flex;gap:10px;align-items:flex-start;margin-bottom:10px;transition:all .2s;border:.5px solid #e0e0d8;background:#f5f5f0}
.q-opt:active{opacity:.8}
.q-circle{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0;margin-top:1px;border:.5px solid #bbb;background:#e5e5e0;color:#666}
.q-text{font-size:16px;color:#1a1a1a;line-height:1.5;flex:1}
/* Chat */
.chat-wrap{display:flex;align-items:flex-end;gap:8px;margin-bottom:14px}
.chat-wrap.user{flex-direction:row-reverse}
.chat-av{width:28px;height:28px;border-radius:50%;background:#E6F1FB;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.chat-bub{max-width:78%;padding:10px 14px;font-size:14px;line-height:1.55;white-space:pre-wrap;word-break:break-word}
.chat-bub.user{border-radius:18px 18px 4px 18px;background:#185FA5;color:#fff}
.chat-bub.assistant{border-radius:4px 18px 18px 18px;background:#f0f0eb;color:#1a1a1a}
/* Intro specific */
.profile-hero{background:linear-gradient(135deg,#0C447C 0%,#185FA5 60%,#378ADD 100%);padding:30px 20px 24px;text-align:center;color:#fff}
.profile-img{width:100px;height:100px;border-radius:50%;border:3px solid rgba(255,255,255,.8);object-fit:cover;margin-bottom:12px;display:block;margin-left:auto;margin-right:auto}
.profile-name{font-size:20px;font-weight:500;margin-bottom:4px}
.profile-title{font-size:13px;opacity:.85;margin-bottom:8px}
.profile-creds{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;margin-top:8px}
.cred-badge{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);border-radius:20px;padding:4px 12px;font-size:11px;font-weight:500}
.welcome-box{background:#EAF3DE;border-left:4px solid #639922;border-radius:0 10px 10px 0;padding:14px 16px;margin:16px 0}
.welcome-box p{font-size:14px;color:#27500A;line-height:1.65}
.part-card{border-radius:10px;overflow:hidden;margin-bottom:10px;border:.5px solid #e0e0d8}
.part-header{padding:12px 14px;display:flex;align-items:center;justify-content:space-between}
.part-topics{padding:2px 14px 12px}
.part-topic{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:.5px solid rgba(255,255,255,.15);font-size:13px}
.part-topic:last-child{border-bottom:none}
.cost-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:.5px solid #e0e0d8;font-size:14px}
.cost-row:last-child{border-bottom:none}
.cost-total{background:#E6F1FB;border-radius:8px;padding:12px 14px;margin-top:10px;display:flex;justify-content:space-between;font-weight:500;font-size:14px;color:#0C447C}
.window-card{display:flex;align-items:center;gap:12px;padding:12px 14px;background:#f5f5f0;border-radius:10px;margin-bottom:8px}
.window-month{font-size:13px;font-weight:500;color:#185FA5;width:120px;flex-shrink:0}
.action-step{display:flex;gap:12px;margin-bottom:14px;align-items:flex-start}
.action-num{width:28px;height:28px;border-radius:50%;background:#185FA5;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;flex-shrink:0;margin-top:1px}
.action-content h4{font-size:14px;font-weight:500;color:#1a1a1a;margin-bottom:3px}
.action-content p{font-size:13px;color:#555;line-height:1.5}
.score-circle{width:80px;height:80px;border-radius:50%;border:4px solid #185FA5;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 12px}
.ellipsis{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row{display:flex;align-items:center;gap:10px}
.row-sb{display:flex;align-items:center;justify-content:space-between}
.badge{font-size:11px;font-weight:500;padding:3px 9px;border-radius:6px;white-space:nowrap}
.sect-icon{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
</style>

<div id="app">
  <nav class="bottom-nav" id="bottom-nav"></nav>

  {id:1,title:"External Financial Reporting",weight:15,emoji:"📋",bar:"#185FA5",bg:"#E6F1FB",text:"#1A5A9E",strong:"#0C447C",
    lessons:[
      {id:"1-1",title:"IFRS vs US GAAP — Key Differences",dur:"25 min",
        blocks:[
          {t:"h",v:"Why Two Sets of Standards?"},
          {t:"p",v:"US GAAP (Generally Accepted Accounting Principles) is issued by the FASB and used in the United States. IFRS (International Financial Reporting Standards) is issued by the IASB and used in 140+ countries. The CMA exam tests BOTH — you must know where they agree and where they differ."},
          {t:"h",v:"Key Philosophy Difference"},
          {t:"tbl",h:["Feature","US GAAP","IFRS"],r:[["Approach","Rules-based — detailed specific rules","Principles-based — broader concepts, more judgment"],["Inventory methods","FIFO, LIFO, Weighted Average allowed","LIFO PROHIBITED — only FIFO & Weighted Average"],["PP&E after acquisition","Cost model only","Cost model OR Revaluation model (mark up to FV)"],["Development costs","Expensed as incurred (R&D)","Capitalize when technical feasibility established"],["Inventory write-down","Cannot reverse once written down","Can REVERSE if NRV recovers"],["Extraordinary items","Eliminated (no longer used)","Never existed under IFRS"],["Discontinued operations","Specific criteria","Similar but some differences"]]},
          {t:"h",v:"Common Ground"},
          {t:"b",v:["Both use ACCRUAL basis for external reporting","Both require the four core financial statements","Both use historical cost as primary measurement basis","Both follow going concern and consistency assumptions","Revenue recognition (ASC 606 / IFRS 15) now substantially converged"]},
          {t:"tip",v:"Exam Tips: LIFO = GAAP only — IFRS prohibits it. IFRS allows PP&E revaluation upward; GAAP does not. IFRS allows reversal of inventory write-downs; GAAP does not. Development costs capitalized under IFRS when feasibility established; always expensed under GAAP. Rules-based = GAAP. Principles-based = IFRS."}
        ],
        quizzes:[]},
      {id:"1-2",title:"Users of Financial Information",dur:"20 min",
        blocks:[
          {t:"h",v:"Who Uses Financial Statements?"},
          {t:"p",v:"Financial statements are prepared for EXTERNAL users who cannot access internal management information. Understanding who uses the statements and what decisions they make is fundamental to financial reporting."},
          {t:"tbl",h:["User","Primary Interest","Key Decision"],r:[["Investors (equity)","Profitability, growth, dividends","Buy, hold, or sell shares"],["Creditors / Lenders","Ability to repay debt","Extend credit, set interest rates"],["Regulators (SEC, IRS)","Compliance and tax","Enforcement, tax collection"],["Employees","Job security, wages","Continue employment"],["Customers","Going concern, reliability","Long-term purchase decisions"],["Suppliers","Creditworthiness","Extend trade credit"],["General Public","Economic impact","Social and environmental decisions"]]},
          {t:"h",v:"Qualitative Characteristics of Financial Information"},
          {t:"p",v:"For financial information to be USEFUL, it must have these characteristics (FASB Conceptual Framework):"},
          {t:"tbl",h:["Characteristic","Description"],r:[["Relevance","Information that makes a difference in decisions (materiality, predictive & confirmatory value)"],["Faithful Representation","Complete, neutral, and free from error"],["Comparability","Consistent across periods and companies"],["Verifiability","Independent observers can confirm the amounts"],["Timeliness","Available before it loses its ability to influence decisions"],["Understandability","Classified, characterized, and presented clearly"]]},
          {t:"h",v:"Objectives of Financial Reporting"},
          {t:"b",v:["Provide information useful for INVESTMENT and CREDIT decisions","Report cash flow prospects — ability to generate future cash","Report enterprise resources, claims against them, and changes in them","Help users assess management stewardship of resources"]},

        blocks:[
          {t:"h",v:"The Four Core Financial Statements"},
          {t:"tbl",h:["Statement","What It Shows","Time Period"],r:[["Balance Sheet","Assets, liabilities, and equity at a POINT IN TIME","As of a specific date"],["Income Statement","Revenues and expenses over a PERIOD","For a period (month, quarter, year)"],["Statement of Cash Flows","Cash inflows and outflows — 3 activities","For a period"],["Statement of Changes in Equity","Changes in all equity components","For a period"]]},
          {t:"h",v:"How the Statements Are Interrelated"},
          {t:"b",v:["Net Income (IS) → increases Retained Earnings → flows to Balance Sheet equity","Dividends declared → reduces Retained Earnings on BS","Ending cash (SCF) = Cash on the Balance Sheet","Changes in BS accounts drive the adjustments in the SCF (indirect method)","Statement of Changes in Equity bridges beginning and ending equity on the BS"]},
          {t:"h",v:"The Accounting Equation"},
          {t:"f",l:"Accounting Equation",v:"Assets = Liabilities + Shareholders' Equity | Assets = Liabilities + (Paid-in Capital + Retained Earnings + OCI)"},
          {t:"h",v:"Elements of Financial Statements"},
          {t:"tbl",h:["Element","Definition","Statement"],r:[["Assets","Probable future economic benefits controlled by the entity","BS"],["Liabilities","Probable future sacrifices of economic benefits","BS"],["Equity","Residual interest in assets after deducting liabilities","BS"],["Revenues","Inflows from delivering goods/services — core operations","IS"],["Expenses","Outflows or consumption of assets in delivering goods/services","IS"],["Gains","Increases in equity from peripheral activities","IS"],["Losses","Decreases in equity from peripheral activities","IS"]]},
          {t:"tip",v:"Exam Tips: Balance Sheet = POINT IN TIME (date). IS, SCF, SCE = PERIOD (from/to dates). Net Income flows from IS to Retained Earnings on BS. Ending Cash on SCF = Cash on BS. Assets = Liabilities + Equity ALWAYS. Revenues/Gains increase equity; Expenses/Losses decrease equity."}
        ],
        quizzes:[]},
      {id:"1-4",title:"Elements of Financial Statements",dur:"20 min",
        blocks:[
          {t:"h",v:"Recognition Criteria"},
          {t:"p",v:"An item is RECOGNIZED (recorded) in the financial statements when it meets the definition of an element AND can be measured with sufficient reliability. Recognition means including the item on the face of the statements — not just in the notes."},
          {t:"h",v:"Measurement Bases"},
          {t:"tbl",h:["Basis","Description","Common Use"],r:[["Historical Cost","Amount paid at acquisition","PP&E, inventory (most common)"],["Current Cost (Replacement Cost)","Cost to replace the asset today","Rare — some insurance valuations"],["Net Realizable Value (NRV)","Estimated selling price minus completion/selling costs","Inventory write-down (LCNRV)"],["Present Value","PV of future cash flows","Long-term liabilities, impaired assets"],["Fair Value","Price in an orderly transaction between market participants","Investments, some derivatives, impairment"]]},
          {t:"h",v:"Key Assumptions in Financial Reporting"},
          {t:"tbl",h:["Assumption","Meaning"],r:[["Going Concern","Entity will continue operations indefinitely — not liquidating"],["Accrual Basis","Record when earned/incurred, not when cash flows"],["Periodicity","Report for regular time periods (month, quarter, year)"],["Monetary Unit","Express transactions in money (stable purchasing power assumed)"]]},
          {t:"h",v:"Constraints in Financial Reporting"},
          {t:"b",v:["Cost-Benefit Constraint: Benefits of providing information must exceed the cost of providing it","Materiality: Only information significant enough to affect decisions needs full disclosure","Conservatism (Prudence): When uncertainty exists, choose the option least likely to overstate assets/income"]},
          {t:"tip",v:"Exam Tips: Historical cost = most common measurement basis. Fair value = for investments and impairment. NRV = inventory write-down to LCNRV. Going concern = assumed unless evidence suggests otherwise. Accrual basis = required for external reporting. Conservatism = don't overstate assets/income when uncertain."}
        ],
        quizzes:[]},
      {id:"1-5",title:"Recognition, Measurement & Valuation of FS Items",dur:"25 min",
        blocks:[
          {t:"h",v:"Recognition vs Disclosure"},
          {t:"p",v:"RECOGNITION = recording on the face of the financial statements. DISCLOSURE = presenting in the notes. Not all items that are disclosed are recognized — e.g., contingent liabilities may only be disclosed if not probable/measurable."},
          {t:"h",v:"Asset Valuation — Key Principles"},
          {t:"b",v:["Current Assets: Reported at the LOWER of cost or NRV (inventory) or carrying value","Investments: Reported at fair value (trading/AFS) or amortized cost (HTM)","PP&E: Historical cost minus accumulated depreciation (GAAP); or fair value under IFRS revaluation","Intangibles: Historical cost minus accumulated amortization (limited-life); indefinite-life tested for impairment"]},
          {t:"h",v:"Liability Measurement"},
          {t:"b",v:["Current liabilities: Face value (AP, accrued expenses)","Long-term debt: Amortized cost (present value of future payments)","Bonds payable: Face value adjusted for unamortized premium/discount","Contingent liabilities: Recorded if probable AND reasonably estimable"]},
          {t:"h",v:"Equity Measurement"},
          {t:"b",v:["Common stock: Par value × shares issued","APIC (Additional Paid-in Capital): Amount received ABOVE par value","Retained Earnings: Cumulative net income minus dividends","Accumulated OCI: Unrealized gains/losses on AFS securities, foreign currency translation, pension adjustments","Treasury Stock: Deducted from equity at COST (reduces equity)"]},
          {t:"h",v:"Contingencies"},
          {t:"tbl",h:["Probability","Treatment"],r:[["Probable AND estimable","RECORD a liability (accrue)"],["Probable but NOT estimable","DISCLOSE in notes only"],["Reasonably possible","DISCLOSE in notes only"],["Remote","No disclosure required (generally)"]]},
          {t:"tip",v:"Exam Tips: Contingent liability: record only when PROBABLE and ESTIMABLE. Reasonably possible = notes only. Remote = no action. Treasury stock = deducted from equity (not an asset). Bonds at amortized cost. Investments — trading & AFS at FV; HTM at amortized cost. LCNRV for inventory."}
        ],
        quizzes:[]},
      {id:"1-6",title:"The Balance Sheet — Structure & Components",dur:"30 min",
        blocks:[
          {t:"h",v:"Balance Sheet Structure"},
          {t:"p",v:"The Balance Sheet (Statement of Financial Position) presents assets, liabilities, and equity as of a SPECIFIC DATE. It is classified (current vs non-current) for most companies."},
          {t:"h",v:"Current Assets"},
          {t:"tbl",h:["Asset","Description","Order"],r:[["Cash & Cash Equivalents","Currency and highly liquid investments with maturity ≤ 3 months","1st"],["Marketable Securities (Trading)","Short-term investments at fair value","2nd"],["Accounts Receivable (net)","AR minus allowance for credit losses","3rd"],["Inventory","Goods held for sale — FIFO, LIFO, or WA cost","4th"],["Prepaid Expenses","Payments made for future benefits (insurance, rent)","Last"]]},
          {t:"p",v:"Current assets are listed in ORDER OF LIQUIDITY (most liquid first)."},
          {t:"h",v:"Non-Current Assets"},
          {t:"b",v:["PP&E (net): Historical cost minus accumulated depreciation","Intangible Assets: Patents, trademarks, goodwill — net of amortization","Long-term Investments: Equity method investments, HTM securities","Other Assets: Deferred tax assets, other long-term items"]},
          {t:"h",v:"Current Liabilities"},
          {t:"b",v:["Accounts Payable: Amounts owed to suppliers","Accrued Liabilities: Expenses incurred but not yet paid (wages, interest)","Current portion of long-term debt: Due within one year","Deferred Revenue: Cash received but revenue not yet earned","Short-term borrowings: Lines of credit, notes payable < 1 year"]},
          {t:"h",v:"Non-Current Liabilities & Equity"},
          {t:"b",v:["Non-Current Liabilities: Long-term debt, deferred tax liabilities, pension obligations, long-term lease liabilities","Shareholders' Equity: Common stock (par), APIC, Retained Earnings, AOCI, minus Treasury Stock"]},
          {t:"f",l:"Working Capital",v:"Working Capital = Current Assets − Current Liabilities"},
          {t:"f",l:"Current Ratio",v:"Current Ratio = Current Assets / Current Liabilities"},
          {t:"tip",v:"Exam Tips: Current = due/convertible within 1 year (or operating cycle if longer). Assets listed: most liquid first. Working Capital = CA − CL. Deferred revenue = LIABILITY (cash received, service not yet performed). Prepaid expense = ASSET (paid but not yet used). Current portion of LTD = current liability."}
        ],
        quizzes:[]},
      {id:"1-7",title:"Comprehensive Income & the Income Statement",dur:"30 min",
        blocks:[
          {t:"h",v:"The Income Statement"},
          {t:"p",v:"The Income Statement reports REVENUES and EXPENSES over a period, showing whether the company was profitable. It can be presented in SINGLE-STEP or MULTI-STEP format."},
          {t:"h",v:"Multi-Step Income Statement Format"},
          {t:"s",v:["Net Sales Revenue","− Cost of Goods Sold","= Gross Profit","− Operating Expenses (SGA, R&D, Depreciation)","= Operating Income (EBIT)","± Non-operating items (Interest expense, gains/losses)","= Income Before Tax","− Income Tax Expense","= Net Income"]},
          {t:"h",v:"Comprehensive Income"},
          {t:"f",l:"Comprehensive Income",v:"Comprehensive Income = Net Income + Other Comprehensive Income (OCI)"},
          {t:"h",v:"What Goes Into OCI?"},
          {t:"tbl",h:["OCI Item","Description"],r:[["Unrealized G/L on AFS securities","FV changes on available-for-sale investments — not yet sold"],["Foreign currency translation adjustments","Translating foreign subsidiary FS into reporting currency"],["Pension liability adjustments","Actuarial gains/losses and prior service costs"],["Effective portion of cash flow hedges","Derivative hedging gains/losses until hedged transaction occurs"]]},
          {t:"h",v:"Discontinued Operations"},
          {t:"b",v:["Presented SEPARATELY at the bottom of the income statement — AFTER income from continuing operations","Shown NET OF TAX","Includes: results of discontinued component + gain/loss on disposal","Component must meet specific criteria: strategic shift that has major effect on operations"]},
          {t:"tip",v:"Exam Tips: OCI items BYPASS the income statement but affect equity (AOCI). Comprehensive Income = Net Income + OCI. AFS security FV changes = OCI (not income). Trading security FV changes = NET INCOME. Discontinued operations = separate line item, net of tax. Multi-step IS: Gross Profit → Operating Income → Net Income."}
        ],
        quizzes:[]},
      {id:"1-8",title:"Statement of Comprehensive Income",dur:"20 min",
        blocks:[
          {t:"h",v:"Two Presentation Approaches"},
          {t:"tbl",h:["Approach","Description","Components"],r:[["One-Statement","Combined Statement of Comprehensive Income","Net Income section followed by OCI section in one document"],["Two-Statement","Separate IS + Separate SCI","Income Statement → then a separate Statement of Comprehensive Income starting with Net Income"]]},
          {t:"p",v:"Under both US GAAP and IFRS, companies can choose either approach. The TWO-STATEMENT approach is most common in practice."},
          {t:"h",v:"Format of the Statement of Comprehensive Income"},
          {t:"s",v:["Net Income (from the Income Statement)","Other Comprehensive Income (OCI):","  + Unrealized gains/losses on AFS securities (net of tax)","  + Foreign currency translation adjustments","  + Pension adjustments (net of tax)","  + Cash flow hedge adjustments","= Total Other Comprehensive Income","= COMPREHENSIVE INCOME"]},
          {t:"h",v:"Reclassification Adjustments"},
          {t:"p",v:"When OCI items are eventually REALIZED (e.g., AFS security is sold), they must be RECLASSIFIED from AOCI to Net Income. A RECLASSIFICATION ADJUSTMENT prevents double-counting — the amount was in OCI before; now it moves to Net Income."},
          {t:"b",v:["Example: AFS bond held for 2 years with $5,000 unrealized gain in AOCI. When sold: gain of $5,000 recognized in Net Income AND subtract $5,000 from OCI (reclassification adjustment)","Net effect: $5,000 in comprehensive income in the year of sale (via net income) — not counted again in OCI"]},
          {t:"tip",v:"Exam Tips: Both one-statement and two-statement approaches are acceptable. OCI items shown NET OF TAX. Reclassification adjustment prevents double-counting when OCI items move to Net Income. Items that NEVER get reclassified: foreign currency translation of foreign subsidiary (only reclassified on complete liquidation)."}
        ],
        quizzes:[]},
      {id:"1-9",title:"Statement of Owners' Equity & Notes to FS",dur:"25 min",
        blocks:[
          {t:"h",v:"Statement of Changes in Stockholders' Equity"},
          {t:"p",v:"This statement shows ALL CHANGES in each component of equity during the period. It connects the beginning and ending Balance Sheet equity figures."},
          {t:"tbl",h:["Component","Increases","Decreases"],r:[["Common Stock + APIC","New stock issuances","Stock buybacks (treasury)"],["Retained Earnings","Net income","Net losses, dividends declared"],["AOCI","OCI gains","OCI losses, reclassifications to NI"],["Treasury Stock","Stock repurchases (shown negative)","Reissuance of treasury stock"]]},
          {t:"h",v:"Notes to Financial Statements"},
          {t:"p",v:"Notes are an INTEGRAL PART of the financial statements — not optional extras. They provide essential context and detail that cannot be presented on the face of the statements."},
          {t:"h",v:"Required Notes Include"},
          {t:"b",v:["Summary of Significant Accounting Policies — ALWAYS FIRST: describes basis of accounting, inventory method, depreciation method, consolidation policy","Specific disclosures: contingencies, debt covenants, segment information, related party transactions","Detail of estimates: allowance for credit losses, useful lives of assets, pension assumptions","Fair value hierarchy disclosures (Level 1, 2, 3)","Subsequent events: significant events after BS date but before FS issuance"]},
          {t:"h",v:"Subsequent Events"},
          {t:"tbl",h:["Type","Treatment"],r:[["Recognized subsequent event","Condition EXISTED at BS date — ADJUST the FS"],["Non-recognized subsequent event","New condition AROSE after BS date — DISCLOSE in notes only"]]},
          {t:"tip",v:"Exam Tips: Summary of significant accounting policies = ALWAYS the first note. Subsequent events: if condition existed at BS date → adjust FS. If new condition arose after BS date → disclose only. Notes are required, not optional. Fair value hierarchy: Level 1 = quoted prices (most reliable); Level 2 = observable inputs; Level 3 = unobservable (least reliable)."}
        ],
        quizzes:[]},
      {id:"1-10",title:"Statement of Cash Flows — Introduction",dur:"30 min",
        blocks:[
          {t:"h",v:"Purpose of the Statement of Cash Flows"},
          {t:"p",v:"The SCF explains the CHANGE IN CASH during a period. A company can be profitable but still run out of cash. The SCF shows WHERE cash came from and WHERE it went — essential for assessing liquidity and financial flexibility."},
          {t:"h",v:"The Three Sections"},
          {t:"tbl",h:["Section","Includes","Examples"],r:[["Operating Activities","Core business transactions","Cash from customers, cash to suppliers, wages paid, taxes paid"],["Investing Activities","Long-term asset transactions","Purchase/sale of PP&E, purchase/sale of investments, making/collecting loans"],["Financing Activities","Debt and equity transactions","Borrowing/repaying debt, issuing/buying back stock, paying dividends"]]},
          {t:"h",v:"Direct vs Indirect Method for Operating Activities"},
          {t:"tbl",h:["Method","Approach","Required?"],r:[["Indirect Method","Start with Net Income, adjust for non-cash items and WC changes","Permitted — most common in practice"],["Direct Method","Show actual cash receipts and payments","Preferred by FASB — but indirect more common; if direct used, reconciliation still required"]]},
          {t:"h",v:"Key Classification Rules"},
          {t:"b",v:["Interest RECEIVED: Operating (GAAP); Operating or Investing (IFRS)","Interest PAID: Operating (GAAP); Operating or Financing (IFRS)","Dividends RECEIVED: Operating (GAAP); Operating or Investing (IFRS)","Dividends PAID: Financing (GAAP); Operating or Financing (IFRS)","Taxes paid: Operating (generally, unless specifically identifiable with investing/financing)"]},
          {t:"f",l:"Cash Flow Formula",v:"Beginning Cash + Cash from Operations + Cash from Investing + Cash from Financing = Ending Cash"},
          {t:"tip",v:"Exam Tips: Interest paid = Operating (GAAP). Dividends paid = Financing (GAAP). IFRS allows more flexibility for classification. Indirect method: start with Net Income, add back depreciation, adjust for WC changes. Non-cash investing/financing disclosed separately (e.g., equipment acquired through financing)."}
        ],
        quizzes:[]},
      {id:"1-11",title:"Operating Activities — the Indirect Method",dur:"30 min",
        blocks:[
          {t:"h",v:"The Indirect Method — Step by Step"},
          {t:"p",v:"The indirect method converts Net Income (accrual basis) to Cash from Operations. It is the most commonly used method in practice."},
          {t:"h",v:"Standard Adjustments"},
          {t:"tbl",h:["Adjustment","Why","Direction"],r:[["Add back Depreciation & Amortization","Non-cash expense — reduced income but no cash paid","ADD BACK"],["Add back Impairment losses","Non-cash expense","ADD BACK"],["Add back Loss on asset sale","Non-cash item in operations (cash from sale = investing)","ADD BACK"],["Subtract Gain on asset sale","Non-cash in operations (cash from sale = investing)","SUBTRACT"],["Increase in AR","Sold on credit but cash not collected — earned > collected","SUBTRACT"],["Decrease in AR","Collected more cash than sold — collected > earned","ADD"],["Increase in Inventory","Bought more than sold — cash used for inventory","SUBTRACT"],["Decrease in Inventory","Sold more than bought — cash inflow","ADD"],["Increase in AP","Didn't pay all purchases — delayed cash outflow","ADD"],["Decrease in AP","Paid more than purchased — extra cash used","SUBTRACT"]]},
          {t:"f",l:"Operating CF (Indirect)",v:"Net Income | + Non-cash charges (depreciation, amortization, impairment, loss on sale) | − Non-cash credits (gain on sale) | − Increase in current assets (AR, inventory, prepaid) | + Decrease in current assets | + Increase in current liabilities (AP, accrued) | − Decrease in current liabilities"},
          {t:"h",v:"Key Memory Rule"},
          {t:"b",v:["Current Asset increases = USE OF CASH = SUBTRACT from Net Income","Current Asset decreases = SOURCE OF CASH = ADD to Net Income","Current Liability increases = SOURCE OF CASH = ADD to Net Income","Current Liability decreases = USE OF CASH = SUBTRACT from Net Income"]},
          {t:"tip",v:"Exam Tips: Depreciation is the MOST COMMON add-back. Gain on sale = subtract (cash from sale goes to Investing). Loss on sale = add back. AR increase = subtract (earned but not collected). AP increase = add (bought but didn't pay yet). Always adjust working capital accounts EXCLUDING cash itself."}
        ],
        quizzes:[]},
      {id:"1-12",title:"Investing & Financing Activities, SCF Disclosures",dur:"25 min",
        blocks:[
          {t:"h",v:"Investing Activities"},
          {t:"p",v:"Investing activities relate to LONG-TERM ASSETS and INVESTMENTS in other companies."},
          {t:"tbl",h:["Transaction","Cash Effect"],r:[["Purchase of PP&E","OUTFLOW"],["Sale of PP&E","INFLOW (full proceeds, not just book value)"],["Purchase of investments (AFS, HTM)","OUTFLOW"],["Sale/maturity of investments","INFLOW"],["Making a loan to another party","OUTFLOW"],["Collection of loan principal","INFLOW"],["Purchase of business (acquisition)","OUTFLOW (net of cash acquired)"]]},
          {t:"h",v:"Financing Activities"},
          {t:"tbl",h:["Transaction","Cash Effect"],r:[["Issuing bonds/long-term debt","INFLOW"],["Repaying principal on debt","OUTFLOW"],["Issuing common or preferred stock","INFLOW"],["Repurchasing treasury stock","OUTFLOW"],["Paying cash dividends","OUTFLOW"],["Receiving dividends is NOT financing — it's Operating (GAAP)","—"]]},
          {t:"h",v:"Important: Proceeds from PP&E Sale"},
          {t:"p",v:"When PP&E is sold, the FULL CASH PROCEEDS appear in Investing Activities — not just the book value or gain. In the Indirect Method, the gain/loss is removed from operations (as it's not an operating item), and the full proceeds go to investing."},
          {t:"h",v:"SCF Disclosures"},
          {t:"b",v:["Non-cash investing & financing activities disclosed SEPARATELY (supplementary schedule or footnote)","Examples: Equipment purchased by issuing note payable; land received in exchange for stock; conversion of debt to equity","Cash paid for interest and taxes must be disclosed (if indirect method used)"]},
          {t:"tip",v:"Exam Tips: Full cash PROCEEDS from PP&E sale = Investing inflow (not gain — full amount). Repayment of debt PRINCIPAL = Financing outflow (interest payment = Operating). Dividends PAID = Financing. Non-cash transactions disclosed in supplementary schedule — do NOT appear in the three main sections."}
        ],
        quizzes:[]},
      {id:"1-13",title:"Integrated Reporting",dur:"25 min",
        blocks:[
          {t:"h",v:"What Is Integrated Reporting?"},
          {t:"p",v:"Integrated Reporting (IR) is a reporting framework that goes BEYOND traditional financial reporting to show how an organization creates VALUE over time across multiple capitals — not just financial capital."},
          {t:"h",v:"Development of IR"},
          {t:"b",v:["Growing recognition that traditional FS don't capture all value drivers","IIRC (International Integrated Reporting Council) founded in 2010","Published the International IR Framework in 2013","Widely adopted especially in South Africa (mandated for JSE-listed companies)","Now overseen by the IFRS Foundation's Value Reporting Foundation"]},
          {t:"h",v:"The Six Capitals"},
          {t:"tbl",h:["Capital","Description"],r:[["Financial","Funds available (equity, debt)"],["Manufactured","Physical infrastructure, equipment, technology"],["Intellectual","Patents, IP, R&D, brand value"],["Human","Employees' skills, experience, motivation"],["Social & Relationship","Community relationships, stakeholder networks"],["Natural","Environmental resources, biodiversity, ecosystem services"]]},
          {t:"h",v:"The Seven Guiding Principles of the IR Framework"},
          {t:"b",v:["1. Strategic focus and future orientation","2. Connectivity of information (how capitals connect)","3. Stakeholder relationships","4. Materiality (what matters to the organization's value creation)","5. Conciseness","6. Reliability and completeness","7. Consistency and comparability"]},
          {t:"h",v:"Eight Content Elements"},
          {t:"b",v:["1. Organizational overview and external environment","2. Governance","3. Business model","4. Risks and opportunities","5. Strategy and resource allocation","6. Performance","7. Outlook","8. Basis of preparation and presentation"]},
          {t:"tip",v:"Exam Tips: 6 Capitals: Financial, Manufactured, Intellectual, Human, Social & Relationship, Natural. 7 Principles include: strategic focus, connectivity, materiality, conciseness. IR = VALUE CREATION over short, medium, and long term. Traditional FS only captures financial capital."}
        ],
        quizzes:[]},
      {id:"1-14",title:"Accounts Receivable",dur:"35 min",
        blocks:[
          {t:"h",v:"Valuing Accounts Receivable"},
          {t:"p",v:"AR is reported at NET REALIZABLE VALUE (NRV) = gross AR minus the allowance for credit losses. The allowance estimates amounts that will NOT be collected."},
          {t:"h",v:"Cash Discounts and Initial Recording"},
          {t:"tbl",h:["Method","Description","Common?"],r:[["Gross Method","Record AR at full invoice amount; record discount when taken","Most common"],["Net Method","Record AR net of discount immediately; record discount NOT taken as revenue","Less common"]]},
          {t:"p",v:"Example (2/10, n/30 = 2% discount if paid within 10 days, full amount due in 30 days): Gross method records $10,000 AR; if customer takes discount, record $200 discount as Sales Discount."},
          {t:"h",v:"Allowance for Credit Losses"},
          {t:"b",v:["GAAP requires the ALLOWANCE METHOD (not direct write-off) for GAAP financial reporting","Allowance for Credit Losses (or Allowance for Doubtful Accounts) = contra-asset to AR","Two approaches to estimate:","  1. Percentage of Net Sales: Credit loss expense = % × Credit sales","  2. Aging of AR: Different % applied to each age bucket — more accurate"]},
          {t:"h",v:"Journal Entries"},
          {t:"tbl",h:["Transaction","Debit","Credit"],r:[["Estimate bad debts","Credit Loss Expense (IS)","Allowance for Credit Losses (BS)"],["Write off specific bad debt","Allowance for Credit Losses","Accounts Receivable"],["Recovery of previously written off debt","Accounts Receivable","Allowance for Credit Losses"],["Recovery — cash collected","Cash","Accounts Receivable"]]},
          {t:"h",v:"Sales Returns and Allowances"},
          {t:"p",v:"When customers return goods or receive price reductions: Debit Sales Returns & Allowances (contra-revenue), Credit AR (or Cash)."},
          {t:"h",v:"Factoring Receivables"},
          {t:"tbl",h:["Type","Description","Treatment"],r:[["Without Recourse","Buyer assumes all credit risk — true sale","Recognize gain or loss; remove AR from BS"],["With Recourse","Seller retains credit risk — contingent liability","May be treated as borrowing; retain AR on BS"]]},
          {t:"tip",v:"Exam Tips: AR on BS = Gross AR − Allowance = NET REALIZABLE VALUE. Write-off: debit Allowance, credit AR (no income statement effect when writing off). Recovery: reverse the write-off, then record cash. CECL model (current expected credit losses) = forward-looking estimate of lifetime losses. Factoring without recourse = sale. With recourse = possible borrowing."}
        ],
        quizzes:[]},
      {id:"1-15",title:"Inventory & Inventory Tracking Methods",dur:"35 min",
        blocks:[
          {t:"h",v:"Costs Included in Inventory"},
          {t:"p",v:"Inventory is recorded at COST, which includes ALL costs to bring the inventory to its present location and condition: purchase price + freight-in + insurance in transit + import duties. EXCLUDE: freight-out (selling expense), storage after receipt, abnormal spoilage."},
          {t:"h",v:"Which Goods Are Included in Inventory?"},
          {t:"b",v:["Goods in transit: FOB SHIPPING POINT → buyer's inventory (ownership transfers when shipped)","Goods in transit: FOB DESTINATION → seller's inventory until delivered","Consigned goods: Remain in CONSIGNOR's inventory (consignee does not own them)","Bill-and-hold arrangements: Remain in seller's inventory until delivery criteria met"]},
          {t:"h",v:"Cost Flow Assumptions"},
          {t:"tbl",h:["Method","COGS","Ending Inventory","Best For"],r:[["FIFO","Oldest costs","Newest costs (approximates replacement cost)","Rising prices — lower COGS, higher income"],["LIFO (GAAP only)","Newest costs","Oldest costs (may be outdated)","Rising prices — higher COGS, lower taxes"],["Weighted Average","Average cost of all units available","Average cost","Simple — smooths out price fluctuations"],["Specific Identification","Exact cost of each unit sold","Exact cost of units on hand","Unique, high-value items (jewelry, cars)"]]},
          {t:"h",v:"Effect of Rising Prices (Inflation)"},
          {t:"tbl",h:["Metric","FIFO","LIFO","Weighted Avg"],r:[["COGS","Lowest","Highest","Middle"],["Gross Profit","Highest","Lowest","Middle"],["Ending Inventory (BS)","Highest","Lowest","Middle"],["Tax Expense","Highest","Lowest","Middle"]]},
          {t:"h",v:"LIFO Reserve"},
          {t:"f",l:"LIFO Reserve",v:"LIFO Reserve = FIFO Inventory − LIFO Inventory | Convert: LIFO inventory + LIFO Reserve = FIFO inventory"},
          {t:"h",v:"Perpetual vs Periodic Systems"},
          {t:"tbl",h:["System","When COGS Calculated","Record-keeping"],r:[["Perpetual","Continuously — at each sale","Detailed — tracks every unit"],["Periodic","At PERIOD END via physical count","Simple — COGS = Beginning + Purchases − Ending"]]},
          {t:"tip",v:"Exam Tips: FOB Shipping Point → buyer owns in transit. FOB Destination → seller owns in transit. FIFO in rising prices = higher income, higher taxes. LIFO in rising prices = lower income, lower taxes (tax advantage). LIFO prohibited under IFRS. LIFO Reserve converts LIFO to FIFO equivalent. Weighted Average smooths prices."}
        ],
        quizzes:[]},
      {id:"1-16",title:"Inventory Count, Errors & Valuation",dur:"30 min",
        blocks:[
          {t:"h",v:"Physical Inventory Count"},
          {t:"p",v:"Companies must perform a PHYSICAL COUNT of inventory to verify quantities on hand. Under the PERPETUAL system, the count adjusts book records to actual. Under PERIODIC, the count determines ending inventory (and thus COGS)."},
          {t:"h",v:"Inventory Errors — Effect Over Two Periods"},
          {t:"p",v:"Inventory errors are SELF-CORRECTING over two years (if no other errors). But each year's FS are misstated until corrected."},
          {t:"tbl",h:["Error","Year 1 Effect","Year 2 Effect"],r:[["Ending inventory OVERSTATED","COGS understated → NI overstated; Assets overstated","COGS overstated → NI understated; Corrects itself"],["Ending inventory UNDERSTATED","COGS overstated → NI understated; Assets understated","COGS understated → NI overstated; Corrects itself"]]},
          {t:"h",v:"Lower of Cost or Net Realizable Value (LCNRV)"},
          {t:"p",v:"Inventory must be written DOWN if NRV (estimated selling price − completion/selling costs) falls below cost. GAAP uses LCNRV; IFRS uses the same concept."},
          {t:"f",l:"NRV",v:"Net Realizable Value = Estimated Selling Price − Estimated Costs to Complete − Estimated Selling Costs"},
          {t:"b",v:["If NRV < Cost → write down to NRV; recognize LOSS (cost of goods sold or write-down expense)","Under GAAP: write-down is PERMANENT — cannot be reversed","Under IFRS: write-down CAN BE REVERSED if NRV recovers (up to original cost)","LIFO/Retail methods use different market value concepts (replacement cost for LIFO)"]},
          {t:"tip",v:"Exam Tips: LCNRV — write DOWN if NRV < cost, never up. GAAP: no reversal. IFRS: reversal allowed up to original cost. Inventory error self-corrects over 2 years. Ending inventory overstated → COGS understated → NI overstated (overstates equity/RE). Remember: Ending inventory Year 1 = Beginning inventory Year 2."}
        ],
        quizzes:[]},
      {id:"1-17",title:"Investments Overview & Debt Securities",dur:"35 min",
        blocks:[
          {t:"h",v:"Investment Classification Overview"},
          {t:"p",v:"How an investment is classified determines its ACCOUNTING TREATMENT. The classification depends on ownership percentage and INTENT."},
          {t:"tbl",h:["Method","Ownership/Intent","Measurement"],r:[["FV through NI (Trading)","<20%; intent to sell soon","Fair Value; changes in NI"],["FV through NI (Equity, no influence)","<20%; no intent to hold for influence","Fair Value; changes in NI"],["FV through OCI (AFS)","<20%; intent to hold but not trading","Fair Value; changes in OCI"],["HTM — Held to Maturity","Debt only; POSITIVE intent & ability to hold to maturity","Amortized Cost"],["Equity Method","20%–50%; significant influence","Cost + share of investee NI − dividends"],["Consolidation",">50%; control","Full consolidation"]]},
          {t:"h",v:"Debt Securities — Three Categories"},
          {t:"tbl",h:["Category","Measurement","Unrealized G/L"],r:[["Trading","Fair Value","Net Income (current earnings)"],["Available-for-Sale (AFS)","Fair Value","OCI (bypasses NI until sold)"],["Held-to-Maturity (HTM)","Amortized Cost","No unrealized G/L reported"]]},
          {t:"h",v:"HTM Securities — Amortized Cost"},
          {t:"p",v:"HTM securities are carried at AMORTIZED COST — original cost adjusted for premium/discount amortization. Only DEBT securities can be HTM; equity securities CANNOT."},
          {t:"f",l:"Bond at Premium",v:"Purchase price > Face value → Premium. Amortize (reduce) premium over life → reduces interest income"},
          {t:"f",l:"Bond at Discount",v:"Purchase price < Face value → Discount. Amortize (increase) discount over life → increases interest income"},
          {t:"h",v:"CECL Model — Current Expected Credit Losses"},
          {t:"p",v:"Under ASC 326 (CECL), companies must estimate LIFETIME expected credit losses on HELD debt instruments at purchase — a forward-looking model. No longer wait for 'probable' threshold."},
          {t:"tip",v:"Exam Tips: TRADING → NI. AFS → OCI. HTM → amortized cost (no FV changes). Only DEBT can be HTM. Equity securities (ASC 321) always at FV through NI (no AFS for equity). AFS unrealized gains → OCI → AOCI. When AFS security sold → reclassify gain/loss from AOCI to NI (reclassification adjustment)."}
        ],
        quizzes:[]},
      {id:"1-18",title:"Equity Investments",dur:"35 min",
        blocks:[
          {t:"h",v:"Equity Securities — No Significant Influence (<20%)"},
          {t:"p",v:"Under ASC 321, equity investments WITHOUT significant influence are measured at FAIR VALUE through NET INCOME. There is NO AFS option for equity securities (unlike debt securities)."},
          {t:"b",v:["Dividends received = Income (Dividend Income in NI)","Unrealized FV changes = NI each period","Exception: Equity securities without readily determinable FV may use Measurement Alternative (cost minus impairment + observable price changes)"]},
          {t:"h",v:"Equity Method — Significant Influence (20%–50%)"},
          {t:"p",v:"When the investor has SIGNIFICANT INFLUENCE over the investee (but not control), the EQUITY METHOD is used."},
          {t:"f",l:"Equity Method",v:"Investment Account = Cost + % of Investee NI − % of Dividends − Amortization of excess FV"},
          {t:"b",v:["Record investor's SHARE of investee's net income → increases Investment account","Record investor's SHARE of investee's dividends received → DECREASES Investment account (dividends are a RETURN OF INVESTMENT, not income)","Amortize any excess purchase price over book value (FV differences)"]},
          {t:"h",v:"Equity Method — Example"},
          {t:"p",v:"Buy 30% of XYZ for $200,000. XYZ earns $50,000. XYZ pays $20,000 dividends. Your share: Income = $15,000 (30% × $50,000); Dividends = $6,000 (30% × $20,000). Investment account: $200,000 + $15,000 − $6,000 = $209,000."},
          {t:"h",v:"Consolidation — Control (>50%)"},
          {t:"p",v:"When investor has CONTROL (generally >50% voting power), CONSOLIDATION is required. The parent and subsidiary are reported as ONE ECONOMIC ENTITY."},
          {t:"h",v:"Changes in Ownership Level"},
          {t:"tbl",h:["Change","Treatment"],r:[["Increase from <20% to 20–50%","Switch to equity method; apply retroactively"],["Increase from 20–50% to >50%","Switch to consolidation; apply acquisition method"],["Decrease from >50% to 20–50%","Deconsolidate; switch to equity method"],["Decrease to <20%","Switch to FV method; recognize any gain/loss"]]},
          {t:"tip",v:"Exam Tips: <20% (no influence) → FV through NI. 20–50% (significant influence) → Equity Method. >50% (control) → Consolidation. Equity method: Dividends REDUCE investment (return of investment), NOT income. Investee NI → increases investment. Consolidation: eliminate intercompany transactions."}
        ],
        quizzes:[]},
      {id:"1-19",title:"Business Combinations & Consolidations",dur:"35 min",
        blocks:[
          {t:"h",v:"Business Combinations — Acquisition Method"},
          {t:"p",v:"Under US GAAP (ASC 805) and IFRS (IFRS 3), ALL business combinations are accounted for using the ACQUISITION METHOD (formerly called purchase method)."},
          {t:"b",v:["Identify the ACQUIRER (entity that obtains control)","Determine the ACQUISITION DATE","Recognize and measure IDENTIFIABLE ASSETS AND LIABILITIES at FAIR VALUE","Recognize GOODWILL or a bargain purchase gain"]},
          {t:"f",l:"Goodwill",v:"Goodwill = Purchase Price Paid − Fair Value of Net Identifiable Assets Acquired | (FV of Net Assets = FV Assets − FV Liabilities)"},
          {t:"h",v:"Example"},
          {t:"p",v:"Company A buys 100% of Company B for $800,000. B's FV of assets = $700,000. FV of liabilities = $200,000. FV of net assets = $500,000. Goodwill = $800,000 − $500,000 = $300,000."},
          {t:"h",v:"Goodwill Treatment"},
          {t:"b",v:["Goodwill = INDEFINITE-LIFE intangible — NOT amortized","Tested for IMPAIRMENT annually (or when triggering events occur)","If impaired, write down (loss recognized in NI) — cannot be reversed","Under IFRS, goodwill can be allocated to cash-generating units (CGUs) for impairment testing"]},
          {t:"h",v:"Consolidated Financial Statements"},
          {t:"p",v:"After a business combination, the PARENT (acquirer) prepares CONSOLIDATED FS combining parent and subsidiary as one entity. Intercompany transactions must be ELIMINATED."},
          {t:"h",v:"Intercompany Eliminations"},
          {t:"b",v:["Eliminate intercompany sales/purchases (parent sold to subsidiary or vice versa)","Eliminate intercompany receivables/payables","Eliminate subsidiary's equity accounts against parent's Investment account","Eliminate intercompany profit in inventory or PP&E"]},
          {t:"h",v:"Non-Controlling Interest (NCI)"},
          {t:"p",v:"When the parent owns less than 100%, the remaining equity is NCI. NCI is shown as a SEPARATE COMPONENT of equity in the consolidated BS."},
          {t:"tip",v:"Exam Tips: Goodwill = Purchase Price − FV of net identifiable assets. Goodwill is NOT amortized — tested for impairment. Bargain purchase (FV net assets > price) = gain in NI. Intercompany transactions are ELIMINATED on consolidation. NCI = minority equity shown separately in consolidated equity."}
        ],
        quizzes:[]},
      {id:"1-20",title:"Recording Fixed Assets",dur:"25 min",
        blocks:[
          {t:"h",v:"Initial Recognition of PP&E"},
          {t:"p",v:"Fixed assets (PP&E) are recorded at COST — all costs necessary to bring the asset to its INTENDED USE in a suitable condition and location."},
          {t:"h",v:"Costs INCLUDED in PP&E"},
          {t:"b",v:["Purchase price (net of discounts)","Import duties and non-refundable taxes","Delivery and installation costs","Site preparation costs (for land)","Professional fees (architects, engineers)","Estimated costs of dismantling/removing and restoring site (ARO — Asset Retirement Obligation)"]},
          {t:"h",v:"Costs EXCLUDED from PP&E (Expensed Immediately)"},
          {t:"b",v:["Training costs for employees to use the asset","Administrative overheads","Repair and maintenance during use (routine)","Costs of opening a new facility (if not directly related to bringing asset into use)","Initial operating losses before commercial production"]},
          {t:"h",v:"Land vs. Building"},
          {t:"tbl",h:["Asset","Depreciable?","Special Notes"],r:[["Land","NO — indefinite life","Appreciated; includes purchase + clearing + landscaping + legal fees"],["Building","YES","Cost includes construction + capitalized interest during construction"],["Land Improvement","YES — separate account","Parking lot, fencing, sidewalks — limited life"]]},
          {t:"h",v:"Capitalized Interest"},
          {t:"p",v:"When a company constructs an asset for its OWN USE, interest on qualifying debt during the CONSTRUCTION PERIOD is CAPITALIZED (added to PP&E cost), not expensed. Capitalization ends when the asset is ready for its intended use."},
          {t:"h",v:"Net Book Value"},
          {t:"f",l:"Net Book Value (NBV)",v:"NBV = Historical Cost − Accumulated Depreciation"},
          {t:"tip",v:"Exam Tips: Land is NOT depreciated. Land Improvements ARE depreciated. Capitalized interest = interest during self-construction only. ARO cost = added to PP&E at inception. Training costs = EXPENSE. Repair & maintenance = EXPENSE. Betterments/improvements that extend useful life or add capacity = CAPITALIZE."}
        ],
        quizzes:[]},
      {id:"1-21",title:"Depreciation of Fixed Assets & Impairment",dur:"35 min",
        blocks:[
          {t:"h",v:"Depreciation Overview"},
          {t:"p",v:"Depreciation systematically allocates the DEPRECIABLE COST of a long-lived asset over its USEFUL LIFE. Depreciable cost = Historical Cost − Salvage Value."},
          {t:"h",v:"Common Depreciation Methods"},
          {t:"tbl",h:["Method","Formula","Pattern","Best For"],r:[["Straight-Line (SL)","(Cost − Salvage) / Useful Life","Equal each year","Default — most common"],["Double Declining Balance (DDB)","2 × SL Rate × Book Value","Accelerated — higher early years","Assets that lose value quickly"],["Sum-of-Years-Digits (SYD)","Remaining Life / Sum of Years × (Cost − Salvage)","Accelerated","Moderate acceleration"],["Units of Production","(Cost − Salvage) / Total Units × Actual Units","Based on usage","Usage-driven assets (machines, vehicles)"]]},
          {t:"h",v:"DDB Example"},
          {t:"p",v:"Cost = $100,000. Salvage = $10,000. Life = 5 years. SL Rate = 20%. DDB Rate = 40%. Year 1: $100,000 × 40% = $40,000. Year 2: $60,000 × 40% = $24,000. NOTE: never depreciate below salvage value."},
          {t:"h",v:"Depreciation for Tax Purposes — MACRS"},
          {t:"p",v:"MACRS (Modified Accelerated Cost Recovery System) is used for TAX purposes in the US. It uses prescribed recovery periods and accelerated methods. MACRS IGNORES salvage value. Creates TEMPORARY DIFFERENCES between book and tax → deferred taxes."},
          {t:"h",v:"Impairment of Long-Lived Assets"},
          {t:"p",v:"An asset is IMPAIRED when its carrying amount is NOT RECOVERABLE. Test when impairment indicators exist (significant decline in market value, adverse change in use, etc.)."},
          {t:"b",v:["GAAP 2-step test: 1) Recoverability test: if Carrying Value > Sum of Undiscounted Future Cash Flows → impaired; 2) Measure impairment: write down to FAIR VALUE (or PV of future CF)","IFRS: Compare Carrying Value to Recoverable Amount (higher of FV less costs of disposal OR Value in Use); write down to Recoverable Amount","Impairment loss recognized in Net Income","GAAP: no reversal. IFRS: reversal PERMITTED in later periods (except goodwill)"]},
          {t:"tip",v:"Exam Tips: SL = equal expense. DDB = accelerated (2× SL rate applied to book value, ignores salvage). SYD = accelerated but diminishes faster. MACRS = tax depreciation — ignores salvage, prescribed periods. Impairment: GAAP = 2-step (undiscounted then FV). IFRS = compare to recoverable amount. GAAP impairment: NO reversal. IFRS: reversal allowed (not goodwill)."}
        ],
        quizzes:[]},
      {id:"1-22",title:"Intangible Assets",dur:"30 min",
        blocks:[
          {t:"h",v:"What Are Intangible Assets?"},
          {t:"p",v:"Intangible assets lack physical substance but have long-term economic value: patents, trademarks, copyrights, customer lists, trade names, non-compete agreements, and GOODWILL."},
          {t:"h",v:"Initial Recording"},
          {t:"tbl",h:["Type","Treatment"],r:[["Purchased separately","Capitalized at COST (purchase price + legal fees)"],["Acquired in business combination","Recognized at FAIR VALUE at acquisition date"],["Internally developed — general (R&D)","GAAP: EXPENSED as incurred. IFRS: Research = expense; Development = capitalize when feasibility established"],["Internally developed — software for sale","GAAP: Expense before technological feasibility; capitalize after"],["Internally developed — internal use software","Capitalize costs after preliminary project stage"]]},
          {t:"h",v:"Amortization — Limited-Life Intangibles"},
          {t:"b",v:["Amortize over USEFUL LIFE (typically straight-line unless another method better reflects consumption)","Patent: legal life 20 years — amortize over SHORTER of legal or economic life","Copyright: legal life = author's life + 70 years — amortize over economic useful life","Franchise: amortize over franchise agreement term"]},
          {t:"h",v:"Indefinite-Life Intangibles — NO Amortization"},
          {t:"b",v:["Trademarks with indefinite useful life — NOT amortized","Tested for IMPAIRMENT annually or when events indicate possible impairment","Impairment: carry value > FV → write down to FV, recognize loss in NI"]},
          {t:"h",v:"Goodwill"},
          {t:"b",v:["Only recognized when arising from a BUSINESS COMBINATION","Not amortized — tested for impairment annually (ASC 350)","Private companies may elect to amortize goodwill over 10 years (optional simplified method)","Goodwill impairment: carrying value > FV → write down to FV (single-step test under ASU 2017-04)"]},
          {t:"tip",v:"Exam Tips: R&D (general) = always expensed under GAAP. Goodwill = not amortized (public companies), tested annually. Impairment loss = write down to FV. Patent = capitalized at cost; amortized over shorter of legal/economic life. Trademarks with indefinite life = not amortized. IFRS: development phase costs capitalized when feasibility met."}
        ],
        quizzes:[]},
      {id:"1-23",title:"Reclassification of Short-Term Liabilities",dur:"20 min",
        blocks:[
          {t:"h",v:"When Is Long-Term Debt Reclassified as Current?"},
          {t:"p",v:"Long-term debt is reclassified as a CURRENT LIABILITY when it becomes DUE WITHIN ONE YEAR of the Balance Sheet date. This is important for liquidity analysis — users need to know which obligations require near-term cash."},
          {t:"h",v:"Automatic Reclassification"},
          {t:"b",v:["Any portion of long-term debt due within 12 months from the BS date → reclassify to current liabilities","Balloon payments, scheduled installments — each portion due within 1 year = current"]},
          {t:"h",v:"Debt Covenant Violations"},
          {t:"p",v:"When a company VIOLATES a debt covenant (e.g., minimum current ratio, maximum debt-to-equity), the lender may have the right to demand immediate repayment. This accelerates the debt → RECLASSIFY to current."},
          {t:"tbl",h:["Situation","Classification"],r:[["Covenant violated BEFORE BS date; lender has right to accelerate","CURRENT liability (demand could occur within 1 year)"],["Covenant violated before BS date; but lender waives right after BS date (before FS issuance)","Can remain LONG-TERM if waiver period > 12 months from BS date"],["Refinancing agreement signed BEFORE BS date for long-term replacement","Can remain LONG-TERM"],["Refinancing completed AFTER BS date but before FS issuance","Under GAAP: CURRENT (refinancing after BS date doesn't help). Under IFRS: may stay long-term"]]},
          {t:"h",v:"GAAP vs IFRS Difference"},
          {t:"p",v:"Under GAAP, if debt is refinanced on a long-term basis AFTER the BS date, it stays CURRENT. Under IFRS, if refinancing is completed before the FS are authorized for issue (even if after BS date), it can be classified as NON-CURRENT. Important exam difference."},
          {t:"tip",v:"Exam Tips: Reclassify to current if: matures within 1 year OR covenant violated without waiver. GAAP: refinancing must be completed BEFORE BS date to avoid current classification. IFRS: refinancing before FS authorized = can be non-current. Waivers: must cover 12 months from BS date to stay long-term."}
        ],
        quizzes:[]},
      {id:"1-24",title:"Warranties",dur:"25 min",
        blocks:[
          {t:"h",v:"Two Types of Warranties"},
          {t:"tbl",h:["Type","Description","Accounting"],r:[["Assurance-Type","Assures product works as promised — does not add a service beyond the sale","Expense as incurred (accrue estimated warranty liability)"],["Service-Type","Provides an additional service beyond the basic product warranty — customer can often buy separately","Treat as SEPARATE PERFORMANCE OBLIGATION — defer revenue and recognize over service period"]]},
          {t:"h",v:"Assurance-Type Warranty"},
          {t:"p",v:"Most basic product warranties are ASSURANCE-TYPE. The seller must estimate the future warranty costs and accrue a WARRANTY LIABILITY at the time of sale (matching principle)."},
          {t:"b",v:["At sale: Dr. Warranty Expense / Cr. Warranty Liability (estimated)","When claim paid: Dr. Warranty Liability / Cr. Cash or Parts Used"]},
          {t:"h",v:"Example"},
          {t:"p",v:"Sell 1,000 products at $100 each. Estimate 5% will be returned for warranty work at average cost of $30. Warranty expense = 1,000 × 5% × $30 = $1,500. Entry: Dr. Warranty Expense $1,500 / Cr. Warranty Liability $1,500."},
          {t:"h",v:"Service-Type Warranty"},
          {t:"p",v:"When a warranty provides an ADDITIONAL SERVICE (e.g., extended warranty sold separately, or warranty covering more than assurance of basic functionality), it is treated as a SEPARATE PERFORMANCE OBLIGATION under ASC 606."},
          {t:"b",v:["Allocate transaction price between product and extended warranty","Recognize warranty revenue OVER THE EXTENDED WARRANTY PERIOD (straight-line or pattern of service delivery)","Recognize warranty costs as incurred during the warranty period"]},
          {t:"tip",v:"Exam Tips: Assurance warranty = accrue at time of sale (Dr Warranty Expense, Cr Warranty Liability). Service warranty = defer revenue, recognize over warranty period. Key question: Can the customer buy the warranty separately? If yes → service-type. Matching principle drives assurance warranty accounting."}
        ],
        quizzes:[]},
      {id:"1-25",title:"Accounting for Income Taxes",dur:"40 min",
        blocks:[
          {t:"h",v:"Book Income vs Taxable Income"},
          {t:"p",v:"BOOK INCOME (accounting income) follows GAAP. TAXABLE INCOME follows the tax code (IRC). They DIFFER because some items are recognized in different periods for book vs tax purposes → creating DEFERRED TAXES."},
          {t:"h",v:"Temporary vs Permanent Differences"},
          {t:"tbl",h:["Type","Definition","Deferred Tax Effect"],r:[["Temporary Difference","Recognized in DIFFERENT PERIODS for book vs tax — will REVERSE over time","Creates Deferred Tax Asset or Liability"],["Permanent Difference","NEVER reverses — tax treatment and book treatment are permanently different","NO deferred tax; only affects effective tax rate"]]},
          {t:"h",v:"Common Examples"},
          {t:"tbl",h:["Item","Book","Tax","Effect"],r:[["Accelerated Depreciation (MACRS)","Straight-line (slower)","MACRS (faster)","Deferred Tax LIABILITY (taxable income < book income early)"],["Warranty Expense","Accrued at sale","Deducted when PAID","Deferred Tax ASSET (book expense > tax deduction early)"],["Installment Sales","Recognize at sale","Recognize as collected","Deferred Tax LIABILITY"],["Tax-exempt interest income","Recognized as income (book)","Not taxable","PERMANENT difference — no DT"]]},
          {t:"h",v:"Deferred Tax Asset vs Liability"},
          {t:"tbl",h:["Type","When Arises","Balance Sheet"],r:[["Deferred Tax Liability (DTL)","Taxable income < book income (will pay MORE tax later)","Long-term LIABILITY"],["Deferred Tax Asset (DTA)","Taxable income > book income (will pay LESS tax later — prepaid)","Long-term ASSET"]]},
          {t:"f",l:"Income Tax Expense",v:"Income Tax Expense = Current Tax Payable + Change in Deferred Tax Liability − Change in Deferred Tax Asset"},
          {t:"h",v:"Valuation Allowance"},
          {t:"p",v:"If it is MORE LIKELY THAN NOT (>50%) that some or all of a DTA will NOT be realized (company won't have enough future taxable income), a VALUATION ALLOWANCE is recorded: Dr. Income Tax Expense / Cr. Valuation Allowance (contra-asset)."},
          {t:"h",v:"Net Operating Loss (NOL)"},
          {t:"b",v:["NOL Carryforward: Unused tax losses carried forward to offset future taxable income (indefinite carryforward under TCJA 2017, limited to 80% of taxable income)","Creates a Deferred Tax ASSET (future tax savings)","Subject to valuation allowance if realization uncertain"]},
          {t:"tip",v:"Exam Tips: Accelerated depreciation → DTL (paid less tax now, more later). Warranty expense → DTA (paid more tax now, less later). Permanent differences: tax-exempt interest, meals & entertainment, life insurance = NO deferred tax. Valuation allowance: >50% chance DTA won't be realized. NOL carryforward → DTA."}
        ],
        quizzes:[]},
      {id:"1-26",title:"Leases",dur:"30 min",
        blocks:[
          {t:"h",v:"What Is a Lease? (ASC 842)"},
          {t:"p",v:"A contract contains a lease if it conveys the RIGHT TO CONTROL THE USE of an identified asset for a period of time in exchange for consideration. The lessee has both: (1) the right to obtain substantially all economic benefits, AND (2) the right to direct the use of the asset."},
          {t:"h",v:"Two Types of Leases for Lessees"},
          {t:"tbl",h:["Type","Criteria","Accounting"],r:[["Finance Lease","Meets any of 5 criteria (ownership transfer, purchase option, 75%+ life, 90%+ FV, specialized asset)","ROU Asset amortized (SL); separate interest expense — front-loaded total expense"],["Operating Lease","Does not meet finance lease criteria","Single straight-line LEASE EXPENSE each period; ROU asset amortized as a 'plug'"]]},
          {t:"h",v:"Lessee Accounting — Initial Recognition"},
          {t:"b",v:["Both finance and operating leases: RECOGNIZE on Balance Sheet at commencement","Right-of-Use (ROU) Asset = Present Value of lease payments + initial direct costs + prepaid rent","Lease Liability = Present Value of future lease payments (using incremental borrowing rate or rate implicit in lease)","KEY CHANGE from old rules: Operating leases NOW on balance sheet (previously off-balance-sheet)"]},
          {t:"h",v:"Subsequent Measurement"},
          {t:"tbl",h:["Lease Type","ROU Asset","Lease Liability","Income Statement"],r:[["Finance","Amortized (usually SL over shorter of life or lease term)","Reduced by principal payments","Amortization expense + Interest expense (separate)"],["Operating","Reduced as 'plug' (total lease cost minus interest on liability)","Reduced by principal payments","Single lease expense (SL) — no separate interest"]]},
          {t:"h",v:"Lessor Accounting"},
          {t:"b",v:["Finance/Sales-type lease: derecognize asset; recognize net investment in lease","Operating lease: keep asset on books; recognize lease income SL"]},
          {t:"tip",v:"Exam Tips: ASC 842 brought operating leases onto the balance sheet (ROU Asset + Lease Liability). Finance lease: front-loaded expense (interest + amortization). Operating lease: straight-line single expense. 5 criteria — if ANY met → finance lease. PV of lease payments = lease liability = ROU asset (approx). Short-term leases (<12 months) can be excluded from balance sheet."}
        ],
        quizzes:[]},
      {id:"1-27",title:"Owners' Equity & Retained Earnings",dur:"30 min",
        blocks:[
          {t:"h",v:"Components of Shareholders' Equity"},
          {t:"tbl",h:["Component","Description"],r:[["Common Stock","Par value × shares issued"],["Additional Paid-in Capital (APIC)","Proceeds above par value from stock issuances"],["Retained Earnings","Cumulative net income minus dividends since inception"],["Accumulated OCI (AOCI)","Cumulative OCI items: unrealized AFS gains, FX translation, pension"],["Treasury Stock","Cost of shares repurchased — DEDUCTED from equity"]]},
          {t:"h",v:"Retained Earnings Rollforward"},
          {t:"f",l:"Retained Earnings",v:"Ending RE = Beginning RE + Net Income − Dividends Declared ± Prior Period Adjustments"},
          {t:"h",v:"Cash Dividends"},
          {t:"b",v:["Three important dates:","  Declaration Date: Liability created — Dr. Retained Earnings / Cr. Dividends Payable","  Record Date: Determines WHO receives the dividend (no entry)","  Payment Date: Cash paid — Dr. Dividends Payable / Cr. Cash"]},
          {t:"h",v:"Stock Dividends"},
          {t:"tbl",h:["Size","Treatment","Effect"],r:[["Small (<20–25%)","FV transferred from RE to Paid-in Capital","RE decreases, APIC increases; total equity unchanged"],["Large (≥20–25%)","Par value only transferred from RE to Common Stock","RE decreases, Common Stock increases; total equity unchanged"]]},
          {t:"h",v:"Appropriations of Retained Earnings"},
          {t:"p",v:"Companies may RESTRICT (appropriate) part of retained earnings for specific purposes (bond covenants, legal requirements). Appropriated RE is disclosed in notes — it does NOT represent cash. It simply reduces the amount available for dividends."},
          {t:"h",v:"Prior Period Adjustments"},
          {t:"p",v:"Corrections of MATERIAL ERRORS from prior periods are made as PRIOR PERIOD ADJUSTMENTS to the BEGINNING BALANCE of Retained Earnings — NOT through the current income statement. Comparative FS are restated."},
          {t:"tip",v:"Exam Tips: Cash dividend: Declaration creates liability (Dr RE, Cr Div Payable). Stock dividend: small = FV to APIC; large = par value to Common Stock. Both types of stock dividends do NOT change total equity — just reclassify among equity accounts. Prior period error = adjust beginning RE, restate prior FS."}
        ],
        quizzes:[]},
      {id:"1-28",title:"Common Stock",dur:"25 min",
        blocks:[
          {t:"h",v:"Common Stock — Key Concepts"},
          {t:"tbl",h:["Term","Definition"],r:[["Authorized Shares","Maximum shares the company is permitted to issue (in charter)"],["Issued Shares","Shares that have been sold to shareholders (= outstanding + treasury)"],["Outstanding Shares","Issued shares minus treasury shares (currently held by shareholders)"],["Treasury Shares","Issued shares repurchased by the company — not outstanding"]]},
          {t:"h",v:"Issuance of Common Stock"},
          {t:"p",v:"When stock is issued for cash above par: Dr. Cash / Cr. Common Stock (par × shares) + Cr. APIC (excess)"},
