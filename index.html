          {q:"Residual Income solves the ROI problem by:",o:["Measuring profitability as a ratio","Focusing on absolute dollar profit above a minimum return","Ignoring invested capital","Using market values instead of book values"],a:1,e:"RI measures ABSOLUTE DOLLARS earned above the minimum required return. Any project with positive RI adds value and should be accepted, regardless of its effect on the division's average ROI percentage."},
          {q:"The MINIMUM acceptable transfer price from the selling division's perspective is:",o:["The market price","Full absorption cost","Variable cost + opportunity cost","Negotiated price"],a:2,e:"Minimum TP = Variable Cost + Opportunity Cost. The selling division must at minimum recover its variable costs AND any contribution margin given up from external sales (opportunity cost)."},
          {q:"When a competitive external market exists, the BEST transfer price is:",o:["Variable cost","Full cost","Market price","Negotiated price"],a:2,e:"Market price is the most OBJECTIVE transfer price when an external competitive market exists. It reflects the true economic value of the transfer and avoids distorting divisional profits."},
          {q:"EVA differs from Residual Income primarily because EVA uses:",o:["Book value of assets","Required rate of return","WACC and NOPAT (after-tax operating profit)","Gross profit instead of operating income"],a:2,e:"EVA = NOPAT - (WACC x Invested Capital). EVA uses NOPAT (after-tax) and WACC (weighted average cost of capital), while RI uses pre-tax operating income and a single required rate of return."},
          {q:"A manager controls both revenues and costs but NOT investment decisions. This is a:",o:["Cost Center","Revenue Center","Profit Center","Investment Center"],a:2,e:"A Profit Center manager controls both REVENUES and COSTS but NOT the level of invested capital. Performance measured by operating profit/income. Examples: product lines, store managers with P&L responsibility."},
          {q:"Controllable costs in responsibility accounting are costs that:",o:["Are variable in nature","The manager can DIRECTLY INFLUENCE within a reasonable time","Are allocated from headquarters","Appear on the income statement"],a:1,e:"Controllable costs are those the manager can DIRECTLY INFLUENCE. A production manager controls direct materials and direct labor but NOT allocated corporate overhead or depreciation on assets chosen by top management."}
        ]},
      {id:"4-11",title:"Cost of Goods Manufactured & COGM Statement",dur:"25 min",
        blocks:[
          {t:"h",v:"The Manufacturing Cost Flow"},
          {t:"p",v:"Understanding how costs flow through a manufacturing company is fundamental to cost accounting. Costs flow through three inventory accounts before becoming an expense on the income statement."},
          {t:"f",l:"Cost Flow",v:"Raw Materials → Work-in-Process (WIP) → Finished Goods → Cost of Goods Sold"},
          {t:"h",v:"The Cost of Goods Manufactured (COGM) Statement"},
          {t:"s",v:["Start: Beginning WIP Inventory","+ Direct Materials Used (Beginning RM + Purchases - Ending RM)","+ Direct Labor","+ Manufacturing Overhead Applied","= Total Manufacturing Costs","+ Beginning WIP","- Ending WIP","= Cost of Goods Manufactured (COGM)"]},
          {t:"h",v:"Cost of Goods Sold (COGS) Calculation"},
          {t:"f",l:"COGS Formula",v:"COGS = Beginning Finished Goods + COGM - Ending Finished Goods"},
          {t:"h",v:"Full Example"},
          {t:"p",v:"Raw Materials: Beginning $10,000, Purchases $40,000, Ending $8,000. DL $25,000. MOH $15,000. WIP: Beginning $5,000, Ending $7,000. FG: Beginning $12,000, Ending $9,000."},
          {t:"s",v:["DM Used = $10,000 + $40,000 - $8,000 = $42,000","Total Mfg Costs = $42,000 + $25,000 + $15,000 = $82,000","COGM = $82,000 + $5,000 - $7,000 = $80,000","COGS = $12,000 + $80,000 - $9,000 = $83,000"]},
          {t:"h",v:"Prime Cost vs Conversion Cost"},
          {t:"tbl",h:["Cost Category","Components","Purpose"],r:[["Prime Cost","DM + DL","Direct/traceable manufacturing costs"],["Conversion Cost","DL + MOH","Costs to CONVERT RM into finished product"],["Total Product Cost","DM + DL + MOH","Full cost to manufacture a unit"]]},
          {t:"tip",v:"Exam Tips: COGM flows to COGS through Finished Goods. Three inventory accounts: Raw Materials → WIP → Finished Goods. Prime Cost = DM + DL. Conversion Cost = DL + MOH (DL appears in BOTH). Period costs (selling & admin) do NOT flow through inventory — expensed immediately. Manufacturing costs are ALWAYS product costs."}
        ],
        quizzes:[
          {q:"The correct order of cost flow in manufacturing is:",o:["WIP → Raw Materials → Finished Goods → COGS","Raw Materials → Finished Goods → WIP → COGS","Raw Materials → WIP → Finished Goods → COGS","Finished Goods → WIP → Raw Materials → COGS"],a:2,e:"Costs flow: Raw Materials (purchased) → WIP (during production — DM + DL + MOH added) → Finished Goods (completed) → COGS (when sold)."},
          {q:"Beginning RM $8,000. Purchases $35,000. Ending RM $6,000. Direct Materials Used =",o:["$29,000","$37,000","$41,000","$43,000"],a:1,e:"DM Used = Beginning RM + Purchases - Ending RM = $8,000 + $35,000 - $6,000 = $37,000."},
          {q:"Total Mfg Costs $90,000. Beginning WIP $10,000. Ending WIP $14,000. COGM =",o:["$76,000","$86,000","$94,000","$104,000"],a:1,e:"COGM = Total Mfg Costs + Beginning WIP - Ending WIP = $90,000 + $10,000 - $14,000 = $86,000."},
          {q:"COGM $75,000. Beginning FG $20,000. Ending FG $15,000. COGS =",o:["$70,000","$80,000","$75,000","$110,000"],a:1,e:"COGS = Beginning FG + COGM - Ending FG = $20,000 + $75,000 - $15,000 = $80,000."},
          {q:"Conversion Cost includes:",o:["DM + DL","DL + MOH","DM + MOH","DM + DL + MOH"],a:1,e:"Conversion Cost = Direct Labor + Manufacturing Overhead. These are the costs to CONVERT raw materials into finished products. DM is excluded because it is the material being converted, not the conversion cost itself."},
          {q:"Prime Cost includes:",o:["DM + DL","DL + MOH","DM + MOH","DM + DL + MOH"],a:0,e:"Prime Cost = Direct Materials + Direct Labor. These are the PRIMARY direct costs that can be traced to the product. MOH is excluded because it is indirect and must be allocated."},
          {q:"Selling expenses and administrative salaries are:",o:["Product costs — go through WIP","Product costs — go through Finished Goods","Period costs — expensed immediately","Manufacturing overhead — allocated to products"],a:2,e:"Selling and administrative costs are PERIOD COSTS — expensed in the period incurred, NOT added to inventory. Only manufacturing costs (DM, DL, MOH) are product costs that flow through inventory."},
          {q:"DM Used $30,000. DL $20,000. MOH $15,000. Beginning WIP $8,000. Ending WIP $12,000. COGM =",o:["$61,000","$65,000","$69,000","$73,000"],a:0,e:"Total Mfg Costs = $30,000 + $20,000 + $15,000 = $65,000. COGM = $65,000 + $8,000 - $12,000 = $61,000."},
          {q:"Which of the following is a PRODUCT cost?",o:["Sales commissions","CEO salary","Factory supervisor salary","Advertising expense"],a:2,e:"Factory supervisor salary is a PRODUCT cost (manufacturing overhead) — it is incurred in the factory to produce goods. Sales commissions, CEO salary, and advertising are period costs expensed immediately."},
          {q:"Direct Labor appears in both:",o:["COGM and COGS","Prime Cost and Conversion Cost","Fixed and Variable costs","Product and Period costs"],a:1,e:"Direct Labor is included in BOTH Prime Cost (DM + DL) AND Conversion Cost (DL + MOH). It is the only cost that appears in both categories, which is why it is sometimes called a 'bridge' cost."}
        ]},
      {id:"4-12",title:"Quality Costs",dur:"25 min",
        blocks:[
          {t:"h",v:"What Are Quality Costs?"},
          {t:"p",v:"Quality costs are costs associated with PREVENTING, DETECTING, and CORRECTING poor quality. The CMA exam extensively tests the four categories of quality costs and the trade-offs between them."},
          {t:"h",v:"Four Categories of Quality Costs"},
          {t:"tbl",h:["Category","When Incurred","Examples","Goal"],r:[["Prevention","Before defects occur","Quality training, process design, supplier evaluation, quality circles","Prevent defects from happening"],["Appraisal","During/after production to DETECT defects","Inspection, testing, auditing, statistical quality control","Find defects before shipping"],["Internal Failure","Defects found BEFORE delivery to customer","Rework, scrap, downtime, re-inspection","Cost of defects caught internally"],["External Failure","Defects found AFTER delivery to customer","Warranty, returns, recalls, lost customers, legal costs","Most expensive — customer already affected"]]},
          {t:"h",v:"The Quality Cost Trade-off"},
          {t:"p",v:"Investing MORE in Prevention and Appraisal REDUCES Failure costs. The goal is to find the optimal total quality cost level."},
          {t:"b",v:["Prevention + Appraisal = Costs of CONFORMANCE (doing it right)","Internal Failure + External Failure = Costs of NON-CONFORMANCE (fixing mistakes)","External failure is the MOST EXPENSIVE category — defects reach the customer","Prevention is the CHEAPEST long-term strategy"]},
          {t:"h",v:"Total Quality Management (TQM)"},
          {t:"b",v:["TQM philosophy: Build quality IN from the start — everyone is responsible","Zero defects goal: Continuous improvement toward perfection","Kaizen: Japanese philosophy of continuous small improvements","Six Sigma: Statistical approach targeting 3.4 defects per million opportunities"]},
          {t:"h",v:"Quality Cost Report"},
          {t:"p",v:"Companies prepare quality cost reports showing the % of each category to total sales. A well-managed quality program has HIGH prevention/appraisal costs and LOW failure costs. Total quality costs should decrease over time as quality improves."},
          {t:"tip",v:"Exam Tips: 4 categories — Prevention, Appraisal, Internal Failure, External Failure. Prevention + Appraisal = Conformance costs. Internal + External Failure = Non-conformance costs. External failure is MOST EXPENSIVE. Prevention is CHEAPEST long-term. TQM = everyone responsible, zero defects goal. Kaizen = continuous improvement. More prevention spending → less failure spending."}
        ],
        quizzes:[
          {q:"Employee quality training is an example of which quality cost category?",o:["Appraisal","Internal Failure","External Failure","Prevention"],a:3,e:"Quality training is a PREVENTION cost — it is incurred BEFORE defects occur to prevent them from happening. Prevention costs are proactive investments in quality."},
          {q:"Product inspection during production is an example of:",o:["Prevention","Appraisal","Internal Failure","External Failure"],a:1,e:"Inspection during or after production is an APPRAISAL cost — its purpose is to DETECT defects before they reach the customer. Appraisal costs include testing, inspection, and auditing."},
          {q:"Scrap and rework costs are classified as:",o:["Prevention costs","Appraisal costs","Internal Failure costs","External Failure costs"],a:2,e:"Scrap and rework are INTERNAL FAILURE costs — defects discovered INSIDE the company before reaching the customer. These are costly but less expensive than external failures."},
          {q:"Customer warranty claims and product recalls are:",o:["Prevention costs","Appraisal costs","Internal Failure costs","External Failure costs"],a:3,e:"Warranty claims and recalls are EXTERNAL FAILURE costs — defects that reached the customer. These are the MOST EXPENSIVE quality costs because they damage customer relationships and company reputation."},
          {q:"Costs of CONFORMANCE include:",o:["Internal and External Failure","Prevention and Appraisal","Scrap and Rework","Warranty and Returns"],a:1,e:"Costs of CONFORMANCE = Prevention + Appraisal. These are costs of DOING IT RIGHT — investing to prevent defects and detect them early. Non-conformance costs = Internal + External Failure (cost of doing it wrong)."},
          {q:"According to TQM philosophy, the responsibility for quality belongs to:",o:["Only the quality control department","Only top management","Every employee throughout the organization","Only production workers"],a:2,e:"TQM (Total Quality Management) philosophy holds that quality is EVERYONE'S responsibility — from top management to front-line workers. Quality is built in from the start, not inspected in at the end."},
          {q:"Kaizen is best described as:",o:["A statistical quality tool targeting 3.4 defects per million","A philosophy of continuous small improvements","A method for allocating quality costs","A Japanese inventory management system"],a:1,e:"Kaizen is the Japanese philosophy of CONTINUOUS SMALL IMPROVEMENTS. 'Kai' = change, 'Zen' = good/better. It emphasizes constant incremental improvements by all employees rather than occasional large changes."},
          {q:"If a company increases spending on PREVENTION costs, the expected long-term effect is:",o:["Total quality costs increase","External failure costs increase","Internal and external failure costs DECREASE","Appraisal costs increase proportionally"],a:2,e:"More prevention spending → fewer defects → LESS rework, scrap, warranty claims, and recalls. Prevention is the most cost-effective quality investment. Total quality costs should DECREASE over time with a strong prevention program."},
          {q:"The MOST EXPENSIVE category of quality costs is:",o:["Prevention","Appraisal","Internal Failure","External Failure"],a:3,e:"External Failure is the MOST EXPENSIVE category because defects have already reached customers. Costs include warranty repairs, returns, recalls, legal liability, and — most expensively — LOST CUSTOMERS and damaged reputation."},
          {q:"Six Sigma quality standard targets:",o:["Zero defects — perfect quality","3.4 defects per million opportunities","5% defect rate","1 defect per thousand units"],a:1,e:"Six Sigma targets 3.4 defects per MILLION opportunities — statistically 6 standard deviations from the mean. It uses DMAIC (Define, Measure, Analyze, Improve, Control) methodology for process improvement."}
        ]},
      {id:"4-13",title:"Lean Management & Just-in-Time (JIT)",dur:"25 min",
        blocks:[
          {t:"h",v:"What Is Lean Management?"},
          {t:"p",v:"Lean management is a philosophy focused on ELIMINATING WASTE and creating value for the customer. Originating from the Toyota Production System, lean identifies seven types of waste (TIMWOOD) and works to eliminate them."},
          {t:"h",v:"7 Types of Waste (TIMWOOD)"},
          {t:"b",v:["T — Transportation: Moving materials unnecessarily","I — Inventory: Excess stock tying up capital","M — Motion: Unnecessary worker movement","W — Waiting: Idle time between processes","O — Overproduction: Making more than needed","O — Over-processing: More work than required","D — Defects: Errors requiring rework or scrap"]},
          {t:"h",v:"Just-in-Time (JIT) System"},
          {t:"p",v:"JIT is a pull-based production system where materials and products are produced or purchased ONLY when needed — in the exact quantity needed, at the exact time needed."},
          {t:"tbl",h:["Feature","Traditional System","JIT System"],r:[["Inventory","Large safety stock","Minimal — near zero",""],["Production trigger","Push (produce to forecast)","Pull (produce on demand)",""],["Defects","Acceptable defect rate","Zero defects goal",""],["Supplier relationship","Many suppliers, competitive","Few trusted suppliers, long-term",""],["Setup time","Long","Minimized",""],["Quality","Inspect after production","Built-in quality (TQM)"," "]]},
          {t:"h",v:"JIT Benefits & Risks"},
          {t:"b",v:["Benefits: Reduced inventory costs, less waste, faster production, higher quality, lower storage costs","Risks: Supply chain disruptions can halt production (no buffer stock), requires reliable suppliers, needs stable demand"]},
          {t:"h",v:"Kanban System"},
          {t:"p",v:"Kanban is the signal system used in JIT. Cards (kanban) authorize production or movement of materials only when needed — preventing overproduction."},
          {t:"h",v:"Theory of Constraints (TOC)"},
          {t:"p",v:"TOC focuses on identifying and managing the BOTTLENECK (constraint) — the process limiting overall throughput. The 5 steps: Identify → Exploit → Subordinate → Elevate → Repeat."},
          {t:"f",l:"Throughput Contribution",v:"Throughput = Sales Revenue - Direct Materials (variable costs only)"},
          {t:"tip",v:"Exam Tips: JIT = pull system (demand-driven). Traditional = push system (forecast-driven). JIT goal: zero inventory, zero defects. 7 wastes = TIMWOOD. Kanban = authorization card for JIT. TOC bottleneck = the WEAKEST LINK — focus all improvement efforts here. JIT requires reliable suppliers and stable demand. Main JIT risk = supply disruption."}
        ],
        quizzes:[
          {q:"Just-in-Time (JIT) is best described as a:",o:["Push production system based on forecasts","Pull production system based on actual demand","System for maximizing inventory levels","Method for allocating overhead costs"],a:1,e:"JIT is a PULL system — production is triggered by actual customer demand, not forecasts. Materials and products are made only when needed, in the exact quantity needed. Traditional systems are PUSH (produce to forecast)."},
          {q:"The PRIMARY goal of JIT inventory management is to:",o:["Maximize inventory to avoid stockouts","Minimize inventory to near-zero levels","Maintain 30-day safety stock","Balance production with maximum capacity"],a:1,e:"JIT aims to reduce inventory to NEAR-ZERO levels — having inventory only at the exact moment needed. Excess inventory is considered WASTE (ties up capital, hides problems, takes storage space)."},
          {q:"In the 7 wastes (TIMWOOD), 'I' stands for:",o:["Inefficiency","Inspection","Inventory","Inaccuracy"],a:2,e:"In TIMWOOD, I = INVENTORY. Excess inventory is waste because it ties up capital, requires storage space, can become obsolete, and hides production problems. JIT aims to eliminate excess inventory."},
          {q:"Kanban is best described as:",o:["A quality improvement methodology","A signal/card system authorizing production or material movement","A method for calculating overhead rates","A supplier evaluation system"],a:1,e:"Kanban is the SIGNAL SYSTEM used in JIT — cards (kanban) that authorize the production or movement of materials only when needed. It prevents overproduction by limiting work-in-process."},
          {q:"The Theory of Constraints (TOC) focuses on:",o:["Eliminating all waste in the system","Identifying and managing the bottleneck constraint","Reducing direct material costs","Improving supplier relationships"],a:1,e:"TOC focuses on identifying and managing the BOTTLENECK — the single constraint limiting overall system throughput. Improving non-bottleneck processes provides no benefit unless the bottleneck is addressed first."},
          {q:"Compared to traditional manufacturing, JIT typically requires:",o:["More suppliers with competitive bidding","Fewer long-term trusted suppliers","Higher inventory safety stock","Longer production lead times"],a:1,e:"JIT requires FEWER, HIGHLY RELIABLE SUPPLIERS with long-term partnerships. Since JIT operates with minimal inventory, any supply disruption halts production. Supplier reliability and quality are critical."},
          {q:"The MAIN RISK of JIT is:",o:["Higher inventory carrying costs","Production halted by supply chain disruptions","Lower product quality","Excess inventory buildup"],a:1,e:"JIT's main risk is SUPPLY CHAIN DISRUPTION. With near-zero inventory, any supplier delay or quality problem can immediately halt production. This was dramatically demonstrated during COVID-19 supply chain disruptions."},
          {q:"Lean management originated from:",o:["General Electric's Six Sigma program","The Toyota Production System","US military logistics","Harvard Business School research"],a:1,e:"Lean management originated from the TOYOTA PRODUCTION SYSTEM (TPS), developed by Taiichi Ohno and Shigeo Shingo at Toyota. It became known as 'lean' when documented by MIT researchers studying Toyota's superior manufacturing."},
          {q:"Overproduction is considered a waste in lean management because:",o:["It increases quality defects","It produces more than customer demand requires, tying up resources","It requires more direct labor","It increases machine downtime"],a:1,e:"Overproduction is waste because it produces MORE than customers need NOW — creating excess inventory, tying up capital, consuming materials and labor unnecessarily, and potentially leading to obsolescence."},
          {q:"In TOC, 'throughput' is defined as:",o:["Total sales revenue","Sales revenue minus all variable costs","Sales revenue minus direct material costs","Gross profit"],a:2,e:"TOC Throughput = Sales Revenue - Direct Material costs (the truly variable costs). TOC considers only direct materials as truly variable in the short run. Labor and overhead are treated as fixed. Maximizing throughput at the bottleneck maximizes profits."}
        ]},
      {id:"4-14",title:"Supply Chain Management & Value Chain",dur:"25 min",
        blocks:[
          {t:"h",v:"What Is Supply Chain Management?"},
          {t:"p",v:"Supply Chain Management (SCM) coordinates the flow of materials, information, and money from RAW MATERIAL SUPPLIERS through MANUFACTURERS to END CUSTOMERS. The goal is to optimize the entire chain — not just individual companies."},
          {t:"h",v:"Key SCM Concepts"},
          {t:"tbl",h:["Concept","Description"],r:[["Supply Chain","All companies involved from raw materials to end customer"],["Upstream activities","Suppliers and raw materials (before the company)"],["Downstream activities","Distribution, retailers, end customers (after the company)"],["Bullwhip Effect","Small demand variations amplified upstream — causing excess inventory"],["Vendor-Managed Inventory","Supplier monitors and replenishes customer's inventory automatically"]]},
          {t:"h",v:"The Value Chain (Porter's Model)"},
          {t:"p",v:"Michael Porter's Value Chain identifies PRIMARY and SUPPORT activities that create value for customers. Cost management focuses on optimizing each activity."},
          {t:"b",v:["Primary Activities (directly create value): Inbound Logistics → Operations → Outbound Logistics → Marketing & Sales → Service","Support Activities (enable primary activities): Firm Infrastructure, HR Management, Technology Development, Procurement"]},
          {t:"h",v:"Value-Added vs Non-Value-Added Activities"},
          {t:"tbl",h:["Type","Definition","Action"],r:[["Value-Added (VA)","Customer WILLINGLY pays for it — changes form, fit, or function","Keep and optimize"],["Non-Value-Added (NVA)","Customer would NOT pay for it if they knew — waste","Eliminate or reduce"],["Business Non-Value-Added","Required by business but not valued by customer (e.g., accounting, compliance)","Minimize"]]},
          {t:"h",v:"Business Process Improvement Tools"},
          {t:"b",v:["Process Mapping / Flowcharts: Visualize the current process to identify waste and bottlenecks","Benchmarking: Comparing performance to best-in-class competitors or industry standards","Business Process Reengineering (BPR): Radical redesign of processes for dramatic improvement","Kaizen: Continuous small improvements by all employees","Six Sigma (DMAIC): Define, Measure, Analyze, Improve, Control"]},
          {t:"tip",v:"Exam Tips: Value Chain = Primary + Support activities. Primary activities directly create value. Non-value-added activities = waste → eliminate. Bullwhip effect = demand distortion growing upstream. Benchmarking = comparing to best practices. BPR = radical redesign (vs Kaizen = gradual improvement). SCM goal = optimize the ENTIRE chain, not just one company. Customer defines what is value-added."}
        ],
        quizzes:[
          {q:"The Bullwhip Effect in supply chain management refers to:",o:["Products being damaged during shipping","Small demand changes causing amplified inventory fluctuations upstream","The effect of price discounts on demand","Supply chain disruptions caused by weather"],a:1,e:"The Bullwhip Effect: small variations in end-customer demand become AMPLIFIED as you move upstream in the supply chain. Retailers order more → wholesalers order even more → manufacturers overproduce → excess inventory throughout the chain."},
          {q:"In Porter's Value Chain, Operations is classified as a:",o:["Support activity","Primary activity","Overhead activity","Administrative activity"],a:1,e:"Operations is a PRIMARY activity in Porter's Value Chain. Primary activities directly create value: Inbound Logistics → Operations → Outbound Logistics → Marketing & Sales → Service. Support activities (HR, IT, Procurement) enable primary activities."},
          {q:"A customer waiting in line at a bank is an example of:",o:["A value-added activity","A business non-value-added activity","A non-value-added activity (waste)","A support activity"],a:2,e:"Customer waiting is a NON-VALUE-ADDED activity — the customer gets no value from waiting and would not pay for it if given the choice. It is pure waste that should be eliminated or minimized."},
          {q:"Benchmarking is best defined as:",o:["Setting internal budget targets","Comparing performance against best-in-class standards or competitors","Measuring quality defect rates","Analyzing customer satisfaction scores"],a:1,e:"Benchmarking = comparing your performance, processes, or products against BEST-IN-CLASS standards (internal benchmarks, competitor benchmarks, or industry best practices) to identify improvement opportunities."},
          {q:"Business Process Reengineering (BPR) differs from Kaizen because BPR involves:",o:["Small continuous improvements","Radical redesign for dramatic performance improvement","Statistical quality control","Employee suggestion systems"],a:1,e:"BPR = RADICAL, fundamental redesign of processes to achieve dramatic improvements (50%+ gains). Kaizen = small, continuous, incremental improvements. BPR asks 'Should we do this at all?' Kaizen asks 'How can we do this better?'"},
          {q:"Procurement (purchasing) in Porter's Value Chain is classified as a:",o:["Primary activity","Support activity","Non-value-added activity","Core competency"],a:1,e:"Procurement is a SUPPORT activity in Porter's Value Chain. Support activities enable primary activities: Firm Infrastructure, HR Management, Technology Development, and Procurement. They don't directly create customer value but are necessary."},
          {q:"The GOAL of Supply Chain Management is to:",o:["Minimize the company's own costs only","Maximize the profits of each individual supply chain member","Optimize the performance of the ENTIRE supply chain","Eliminate all suppliers and vertically integrate"],a:2,e:"SCM goal = optimize the ENTIRE supply chain from raw materials to end customer. This may require individual companies to accept slightly higher costs if it benefits the overall chain performance (speed, reliability, total cost)."},
          {q:"Vendor-Managed Inventory (VMI) means:",o:["The company manages all its own inventory internally","The supplier monitors and replenishes the customer's inventory","Inventory is managed by a third-party logistics provider","Customers track their own orders online"],a:1,e:"VMI = the SUPPLIER takes responsibility for monitoring and replenishing the customer's inventory levels. The supplier has access to inventory data and ensures stock is always available. This reduces customer ordering burden and can reduce bullwhip effect."},
          {q:"The DMAIC methodology is associated with:",o:["JIT implementation","Lean manufacturing","Six Sigma process improvement","TQM quality circles"],a:2,e:"DMAIC (Define, Measure, Analyze, Improve, Control) is the structured problem-solving methodology used in SIX SIGMA projects. It provides a systematic approach to improving processes by identifying root causes and implementing data-driven solutions."},
          {q:"An activity that the customer would willingly pay for because it changes the product's form, fit, or function is called:",o:["A support activity","A non-value-added activity","A value-added activity","A period cost"],a:2,e:"VALUE-ADDED activities are those customers recognize as important and would willingly pay for — they change the product's form, fit, or function. Non-value-added activities consume resources but add no customer value."}
        ]},
      {id:"4-15",title:"Capacity Management & Relevant Costing",dur:"30 min",
        blocks:[
          {t:"h",v:"Types of Capacity"},
          {t:"tbl",h:["Capacity Type","Definition","Use"],r:[["Theoretical Capacity","Maximum output under PERFECT conditions — 24/7, no breaks, no defects","Theoretical benchmark only"],["Practical Capacity","Theoretical capacity minus NORMAL downtime (breaks, maintenance, holidays)","Realistic maximum achievable"],["Normal Capacity","Average expected capacity over 2-3 years considering seasonal fluctuations","Used for budgeting and POHR calculation"],["Actual Capacity","Capacity actually used in the current period","Actual results"]]},
          {t:"h",v:"Relevant Costing for Short-term Decisions"},
          {t:"p",v:"Relevant costs are FUTURE costs that DIFFER between alternatives. Irrelevant costs are the same regardless of the decision and should be IGNORED."},
          {t:"tbl",h:["Cost Type","Relevant?","Reason"],r:[["Sunk costs","NEVER","Already incurred — cannot be changed"],["Opportunity costs","ALWAYS","Real economic cost of choosing one alternative"],["Future differential costs","YES","Differ between alternatives — affect the decision"],["Allocated fixed costs","Usually NO","Same total regardless of decision"],["Avoidable costs","YES","Can be eliminated by choosing an alternative"]]},
          {t:"h",v:"Make or Buy Decision"},
          {t:"p",v:"Should we make a component internally or buy it from an outside supplier?"},
          {t:"f",l:"Make or Buy Rule",v:"Buy if: Outside Price < Avoidable Cost to Make | Consider qualitative factors (quality, reliability, strategic importance)"},
          {t:"h",v:"Special Order Decision"},
          {t:"p",v:"Should we accept a one-time order below normal selling price?"},
          {t:"f",l:"Special Order Rule",v:"Accept if: Special Order Price > Variable Cost per unit (AND there is excess capacity) | Fixed costs are irrelevant if capacity exists"},
          {t:"h",v:"Keep or Drop a Segment"},
          {t:"p",v:"Should we eliminate an unprofitable product, division, or segment?"},
          {t:"f",l:"Keep or Drop Rule",v:"Drop ONLY if: Avoidable fixed costs + lost CM > 0 (i.e., dropping improves profit) | Allocated fixed costs are IRRELEVANT"},
          {t:"h",v:"Constrained Resource Decision"},
          {t:"p",v:"When production is limited by a scarce resource, maximize contribution margin PER UNIT OF CONSTRAINT (not per unit of product)."},
          {t:"f",l:"Ranking with Constraint",v:"Rank products by: CM per unit of scarce resource = CM per unit / Resource units required per unit"},
          {t:"tip",v:"Exam Tips: Relevant costs = future + differential. Sunk costs NEVER relevant. Opportunity costs ALWAYS relevant. Special order: accept if price > variable cost AND excess capacity exists. Make or Buy: compare outside price to AVOIDABLE costs only. Keep or Drop: allocated fixed costs are IRRELEVANT. Constraint decision: rank by CM per unit of constraint, not CM per unit."}
        ],
        quizzes:[
          {q:"Which capacity concept represents the maximum output under perfect conditions with no downtime?",o:["Practical Capacity","Normal Capacity","Theoretical Capacity","Actual Capacity"],a:2,e:"Theoretical Capacity = maximum output 24/7 under PERFECT conditions — no breakdowns, no scheduled maintenance, no employee breaks. It is a theoretical benchmark never actually achieved in practice."},
          {q:"A sunk cost is:",o:["A future cost relevant to the decision","An opportunity cost","A past cost that cannot be changed — always irrelevant","A variable cost that changes with production"],a:2,e:"Sunk costs are PAST costs already incurred that cannot be recovered regardless of the decision made. They are ALWAYS IRRELEVANT in decision-making because they do not differ between alternatives."},
          {q:"Outside purchase price $18/unit. Variable cost to make $14/unit. Avoidable fixed costs $3/unit. Should the company make or buy?",o:["Buy — saves $4/unit","Make — saves $1/unit","Buy — saves $1/unit","Make — saves $4/unit"],a:1,e:"Avoidable cost to make = $14 variable + $3 avoidable fixed = $17/unit. Outside price = $18. Make costs LESS ($17 < $18) → MAKE and save $1/unit."},
          {q:"A special order should be ACCEPTED when:",o:["The special price exceeds the full absorption cost","The special price exceeds variable cost AND excess capacity exists","The special price equals the regular selling price","Fixed costs are covered by the special order"],a:1,e:"Accept special order if: Special price > Variable cost per unit AND there is EXCESS CAPACITY. Fixed costs are irrelevant (already covered by regular sales). The order contributes positive CM."},
          {q:"When deciding to DROP a product line, which costs are IRRELEVANT?",o:["Avoidable fixed costs","Variable costs","Contribution margin lost","Allocated (common) fixed costs"],a:3,e:"Allocated (common) fixed costs are IRRELEVANT in keep-or-drop decisions because they continue regardless of whether the segment is dropped — they will just be reallocated to remaining segments. Only AVOIDABLE costs matter."},
          {q:"When a company has a scarce resource (constraint), products should be ranked by:",o:["Highest selling price","Highest gross margin","Highest CM per unit","Highest CM per unit of the scarce resource"],a:3,e:"With a constraint, rank by CM PER UNIT OF THE SCARCE RESOURCE. A product with lower CM per unit may be more profitable if it uses less of the constrained resource. Example: CM $10 using 5 machine hours = $2/MH vs CM $8 using 2 MH = $4/MH → prefer the second."},
          {q:"Opportunity cost is:",o:["A sunk cost from a previous decision","The cost of the next best alternative foregone","Always irrelevant to decision-making","Equal to the variable cost of production"],a:1,e:"Opportunity cost = the benefit GIVEN UP by choosing one alternative over the next best option. It is ALWAYS relevant because it represents the true economic cost of a decision. Example: using a machine for Product A means foregoing the contribution margin from Product B."},
          {q:"Normal capacity is used to calculate POHR because:",o:["It is the maximum possible capacity","It smooths out seasonal fluctuations over a longer period","It equals actual capacity","It minimizes overhead per unit"],a:1,e:"Normal capacity (2-3 year average) is used for POHR because it smooths out seasonal and cyclical fluctuations, providing a stable overhead rate. Using actual capacity would cause overhead rates to fluctuate wildly between periods."},
          {q:"Variable cost $20/unit. Fixed costs $50,000 (total). Special order 1,000 units at $24/unit. Excess capacity exists. Accept or reject?",o:["Reject — price below full cost","Accept — contributes $4,000 to profit","Reject — fixed costs not covered","Accept — only if fixed costs are waived"],a:1,e:"Special order analysis: Price ($24) > Variable cost ($20) → CM = $4/unit. Total contribution = $4 x 1,000 = $4,000. Fixed costs are IRRELEVANT (already covered). Accept the order — it adds $4,000 to profit."},
          {q:"Product A: CM $30, requires 3 machine hours. Product B: CM $40, requires 5 machine hours. Machine hours are the constraint. Which product should be prioritized?",o:["Product B — higher CM per unit","Product A — higher CM per machine hour","Equal priority","Product B — requires more machine hours"],a:1,e:"Product A: CM per MH = $30/3 = $10/MH. Product B: CM per MH = $40/5 = $8/MH. Product A generates MORE contribution margin per machine hour → PRIORITIZE Product A when machine hours are constrained."}
        ]},
      {id:"4-16",title:"Target Costing & Life Cycle Costing",dur:"25 min",
        blocks:[
          {t:"h",v:"Target Costing"},
          {t:"p",v:"Target costing starts with the MARKET — not with costs. The company determines what customers will pay, then works backward to set a cost target. It is a market-driven cost management approach used primarily during product DESIGN."},
          {t:"f",l:"Target Cost Formula",v:"Target Cost = Target Selling Price - Desired Profit Margin"},
          {t:"p",v:"Example: Market research shows customers will pay $200 for a product. Management requires a 20% profit margin. Target Cost = $200 - ($200 x 20%) = $200 - $40 = $160. Engineers must design the product to cost $160 or less."},
          {t:"h",v:"Target Costing vs Traditional Costing"},
          {t:"tbl",h:["Feature","Traditional Costing","Target Costing"],r:[["Starting point","Internal cost structure","External market price"],["Process","Design → Cost → Price","Price → Target Cost → Design"],["Cost reduction","After production (difficult)","During design phase (easy)",""],["Focus","Cost control","Cost design"],["Used when","Product already exists","New product development"]]},
          {t:"h",v:"Value Engineering"},
          {t:"p",v:"When actual estimated cost exceeds the target cost, companies use VALUE ENGINEERING — systematically reviewing every design feature, material, and process to achieve the target cost WITHOUT sacrificing quality or functionality."},
          {t:"h",v:"Life Cycle Costing"},
          {t:"p",v:"Life Cycle Costing tracks ALL costs associated with a product across its ENTIRE LIFE — from design through disposal. It reveals the TRUE total cost of ownership."},
          {t:"tbl",h:["Phase","Cost Examples"],r:[["R&D / Design","Engineering, prototypes, testing — 80-90% of costs LOCKED IN here"],["Production","Manufacturing, quality control, overhead"],["Marketing & Sales","Advertising, distribution, sales force"],["Customer Support","Warranty, repairs, technical support"],["Disposal / End-of-life","Environmental cleanup, recycling, decommissioning"]]},
          {t:"b",v:["80-90% of a product's life cycle costs are LOCKED IN during the design phase","This is why target costing focuses on design — costs are easiest to reduce BEFORE production begins","Post-production cost reduction is expensive and limited"]},
          {t:"tip",v:"Exam Tips: Target Cost = Target Price - Desired Profit. Market price is GIVEN — profit is required — cost must be achieved. Traditional costing = cost-plus pricing (cost + markup). Target costing = price-minus approach. 80-90% of costs locked in at design. Value engineering = redesign to hit target cost. Life cycle costing includes ALL phases including disposal."}
        ],
        quizzes:[
          {q:"Target Selling Price $250. Required profit margin 25%. Target Cost =",o:["$187.50","$200.00","$62.50","$312.50"],a:0,e:"Target Cost = Target Selling Price - Desired Profit = $250 - (25% x $250) = $250 - $62.50 = $187.50. Engineers must design the product to cost $187.50 or less."},
          {q:"Target costing differs from traditional costing because target costing:",o:["Starts with internal costs and adds a markup","Starts with the market price and works backward","Ignores customer preferences","Is used only after production begins"],a:1,e:"Target costing starts with the MARKET PRICE customers will pay, then subtracts the required profit to determine the maximum allowable cost. Traditional costing starts with costs and adds a markup (cost-plus pricing)."},
          {q:"When estimated product cost exceeds the target cost, companies use:",o:["Activity-Based Costing","Value Engineering","High-Low Method","Process Costing"],a:1,e:"VALUE ENGINEERING: systematic review of every component, material, and process to find ways to reduce cost to the target level WITHOUT sacrificing required quality or customer value."},
          {q:"Approximately what percentage of a product's life cycle costs are locked in during the design phase?",o:["20-30%","40-50%","60-70%","80-90%"],a:3,e:"80-90% of a product's life cycle costs are COMMITTED (locked in) during the design phase, even though actual spending occurs later. This is why cost management during design is so critical — it is the cheapest time to reduce costs."},
          {q:"Life cycle costing is unique because it:",o:["Focuses only on production costs","Tracks ALL costs from design through disposal","Allocates overhead using multiple cost drivers","Uses market prices to determine costs"],a:1,e:"Life cycle costing tracks ALL costs across the ENTIRE product life — R&D, design, production, marketing, customer support, and disposal. This gives a true picture of total cost of ownership, unlike traditional costing that focuses on production costs only."},
          {q:"Traditional cost-plus pricing means:",o:["Price = Market Rate - Required Profit","Price = Variable Costs only","Price = Cost + Required Profit Markup","Price is set by competitors"],a:2,e:"Traditional cost-plus pricing: start with production cost, add a markup percentage for profit → selling price. Target costing is the REVERSE: start with market price, subtract required profit → maximum allowable cost."},
          {q:"Which phase of the product life cycle typically involves the HIGHEST cost commitment decisions?",o:["Production phase","Marketing phase","R&D and Design phase","Customer support phase"],a:2,e:"R&D and DESIGN phase: although actual cash spending is relatively low, 80-90% of total life cycle costs are COMMITTED here through design choices (materials selected, processes chosen, features included). Changes after production starts are extremely expensive."},
          {q:"Target costing is MOST useful during:",o:["The production phase","New product design and development","Annual budgeting","Post-production cost reduction"],a:1,e:"Target costing is most useful during NEW PRODUCT DESIGN because this is when the greatest opportunity to influence costs exists. Once production begins, costs are largely locked in and difficult to reduce significantly."},
          {q:"Customer warranty and repair costs are part of which life cycle phase?",o:["R&D phase","Production phase","Customer support phase","Design phase"],a:2,e:"Warranty and repair costs occur during the CUSTOMER SUPPORT phase — after the product has been sold and is in use. Life cycle costing captures these post-sale costs, which traditional costing often ignores."},
          {q:"A company estimates production cost at $180 but the target cost is $160. The BEST next step is:",o:["Raise the selling price","Reduce the required profit margin","Apply value engineering to reduce cost by $20","Cancel the product"],a:2,e:"VALUE ENGINEERING: systematically analyze every component and process to eliminate $20 of cost without reducing customer value. This is the purpose of value engineering — bridge the gap between estimated cost and target cost."}
        ]},
      {id:"4-17",title:"Regression Analysis & Cost Estimation",dur:"25 min",
        blocks:[
          {t:"h",v:"Why Cost Estimation?"},
          {t:"p",v:"Managers need to predict future costs for budgeting, pricing, and decisions. Cost estimation methods determine the fixed and variable components of a mixed cost. The three main methods are: High-Low, Scatter Diagram, and Regression Analysis."},
          {t:"h",v:"Comparison of Methods"},
          {t:"tbl",h:["Method","Data Used","Accuracy","Complexity"],r:[["High-Low","2 data points only","Lowest — may be distorted by outliers","Very simple"],["Scatter Diagram","All data points (visual)","Moderate — subjective line fitting","Simple"],["Regression Analysis","All data points (statistical)","HIGHEST — objective, uses all data","More complex but standard"]]},
          {t:"h",v:"Regression Analysis"},
          {t:"p",v:"Regression analysis uses statistical techniques to fit the BEST LINE through all data points. It gives the most accurate cost equation by minimizing the sum of squared deviations."},
          {t:"f",l:"Regression Cost Equation",v:"Y = a + bX   |   a = Fixed Cost (intercept), b = Variable Cost Rate (slope), X = Activity Level"},
          {t:"h",v:"Key Regression Statistics"},
          {t:"tbl",h:["Statistic","Meaning","Good Value"],r:[["R² (Coefficient of Determination)","% of cost variation EXPLAINED by the activity driver","Close to 1.0 (100%) is best"],["R (Correlation Coefficient)","Strength and direction of relationship","Close to +1 or -1"],["t-statistic","Statistical significance of each variable","> 2 is generally significant"],["p-value","Probability the result is due to chance","< 0.05 (5%) is significant"]]},
          {t:"h",v:"Multiple Regression"},
          {t:"p",v:"Simple regression uses ONE independent variable (e.g., machine hours). Multiple regression uses TWO OR MORE variables to predict cost — more accurate when costs are driven by multiple factors."},
          {t:"p",v:"Example: Total cost = $5,000 + $3(machine hours) + $2(labor hours). Both machine hours AND labor hours drive costs."},
          {t:"h",v:"Learning Curve Effect"},
          {t:"p",v:"As workers gain experience producing a product, labor time per unit DECREASES. Each time CUMULATIVE production DOUBLES, average labor hours per unit decrease by a fixed percentage (the learning rate)."},
          {t:"f",l:"Learning Curve",v:"If learning rate = 80%: When cumulative output doubles, average time per unit = previous average x 80%"},
          {t:"tip",v:"Exam Tips: Regression is MOST accurate — uses all data points. High-Low is LEAST accurate — only 2 points. R² close to 1.0 = strong relationship. R² = 0.85 means 85% of cost variation is explained by the activity. Learning curve: output doubles → average time drops by learning %. 80% learning curve is common exam example."}
        ],
        quizzes:[
          {q:"Which cost estimation method uses ALL available data points and provides the MOST accurate results?",o:["High-Low Method","Scatter Diagram","Regression Analysis","Accounts Analysis"],a:2,e:"Regression Analysis uses ALL data points and the least-squares statistical technique to find the best-fit line. It is the MOST ACCURATE method because it uses all available information objectively, unlike High-Low (2 points) or Scatter Diagram (subjective)."},
          {q:"The High-Low method's main weakness is that it:",o:["Requires advanced software","Only uses 2 data points which may not be representative","Cannot separate fixed and variable costs","Only works for variable costs"],a:1,e:"High-Low only uses 2 data points — the highest and lowest activity levels. If either point is an outlier (unusual), the entire calculation is distorted. Regression Analysis avoids this by using ALL data points."},
          {q:"In regression analysis, R² = 0.92 means:",o:["The cost estimate is 92% accurate","92% of the variation in cost is explained by the activity driver","The variable cost rate is $0.92","The fixed cost is 92% of total cost"],a:1,e:"R² = Coefficient of Determination. R² = 0.92 means 92% of the VARIATION in total cost is explained by the chosen activity driver. The remaining 8% is explained by other factors. Higher R² = better fit."},
          {q:"Regression equation: Y = $8,000 + $4.50X. At 3,000 machine hours, estimated cost =",o:["$13,500","$21,500","$12,000","$19,000"],a:1,e:"Y = $8,000 + ($4.50 x 3,000) = $8,000 + $13,500 = $21,500."},
          {q:"Multiple regression differs from simple regression because multiple regression:",o:["Uses only the highest and lowest data points","Uses two or more independent variables to predict cost","Requires a computer to calculate","Is less accurate than simple regression"],a:1,e:"Multiple regression uses TWO OR MORE independent variables (cost drivers) to predict cost. Example: Y = a + b₁(machine hours) + b₂(labor hours). This is more accurate when costs are driven by multiple factors simultaneously."},
          {q:"In the learning curve concept, when cumulative production DOUBLES, average labor time per unit:",o:["Doubles","Stays the same","Decreases by a fixed percentage","Increases by a fixed percentage"],a:2,e:"Learning curve: each time cumulative production DOUBLES, average labor time per unit DECREASES by a constant percentage (the learning rate). Example: 80% learning rate — if it takes 100 hours for 1 unit, 2 units average 80 hours, 4 units average 64 hours."},
          {q:"An 80% learning curve means:",o:["Labor cost is 80% of total cost","When output doubles, average time per unit becomes 80% of previous average","Fixed costs are 80% of total costs","80% of workers meet productivity standards"],a:1,e:"80% learning curve: when cumulative output DOUBLES, average time per unit = 80% of previous average. Example: 1st unit = 100 hrs. 2 units (doubled): average = 80 hrs. 4 units (doubled again): average = 64 hrs (80% of 80)."},
          {q:"The scatter diagram method of cost estimation is:",o:["The most accurate method","Objective and mathematical","A visual method where a line is drawn through plotted data points","Based on only the highest and lowest observations"],a:2,e:"Scatter diagram: plot all data points on a graph (activity on X-axis, cost on Y-axis), then visually draw a best-fit line through the points. More accurate than High-Low but SUBJECTIVE (different people draw different lines). Less accurate than regression."},
          {q:"A high R² value in regression analysis indicates:",o:["High fixed costs","A strong relationship between the cost driver and total cost","A complex cost structure","High variable costs"],a:1,e:"High R² (close to 1.0) indicates a STRONG relationship between the independent variable (cost driver) and the dependent variable (total cost). The chosen cost driver explains most of the variation in cost — it is a good predictor."},
          {q:"The learning curve effect is MOST significant for:",o:["Highly automated, machine-intensive processes","Labor-intensive processes involving complex, repetitive tasks","Simple, short production runs","Commodity manufacturing"],a:1,e:"Learning curve is most significant for LABOR-INTENSIVE, COMPLEX, REPETITIVE tasks. As workers repeat the process, they become more efficient. Highly automated processes show little learning effect because machines don't 'learn' — humans do."}
        ]},
      {id:"4-18",title:"ERP, MRP & Manufacturing Information Systems",dur:"25 min",
        blocks:[
          {t:"h",v:"Enterprise Resource Planning (ERP)"},
          {t:"p",v:"ERP systems integrate ALL business functions — finance, manufacturing, HR, sales, procurement, and inventory — into ONE unified database. This eliminates data silos and provides real-time information across the organization."},
          {t:"tbl",h:["Feature","Traditional Systems","ERP System"],r:[["Data","Separate databases per department","Single integrated database"],["Information flow","Manual transfers between systems","Automatic, real-time"],["Consistency","Data conflicts between departments","One version of the truth"],["Examples","Separate accounting, HR, inventory","SAP, Oracle, Microsoft Dynamics"]]},
          {t:"h",v:"Material Requirements Planning (MRP)"},
          {t:"p",v:"MRP is a PUSH-based production planning system that uses the Master Production Schedule (MPS) to determine WHAT materials to order, HOW MUCH to order, and WHEN to order them."},
          {t:"b",v:["Master Production Schedule (MPS): What finished products to make and when","Bill of Materials (BOM): List of all components needed to make each product","Inventory Records: Current stock on hand and on order","MRP Output: Purchase orders and production orders"]},
          {t:"f",l:"Net Requirements",v:"Net Requirements = Gross Requirements - On-hand Inventory - Scheduled Receipts"},
          {t:"h",v:"MRP II (Manufacturing Resource Planning)"},
          {t:"p",v:"MRP II extends MRP to include CAPACITY PLANNING, labor scheduling, machine scheduling, and financial planning. It integrates manufacturing with the broader business."},
          {t:"h",v:"ERP vs MRP vs MRP II"},
          {t:"tbl",h:["System","Scope","Focus"],r:[["MRP","Materials only","What/when to order materials"],["MRP II","Manufacturing resources","Materials + capacity + labor + finance"],["ERP","Entire enterprise","All business functions integrated"]]},
          {t:"h",v:"Benefits & Risks of ERP"},
          {t:"b",v:["Benefits: Real-time data, eliminates duplicate entry, better decision-making, improved inventory management, integrated financial reporting","Risks: Very expensive to implement, long implementation time (1-3 years), requires major process changes, data migration challenges, high training costs, implementation failures are common"]},
          {t:"tip",v:"Exam Tips: MRP = materials planning only (push system). MRP II = adds capacity and labor. ERP = entire enterprise integration. MRP uses BOM + MPS + inventory records. Net Requirements = Gross Requirements - On Hand - Scheduled Receipts. ERP biggest risk = implementation failure (cost overruns, disruption). JIT = pull system; MRP = push system."}
        ],
        quizzes:[
          {q:"An ERP system differs from traditional separate systems primarily because ERP:",o:["Focuses only on financial accounting","Integrates all business functions into one unified database","Is used only for manufacturing companies","Replaces the need for management accountants"],a:1,e:"ERP integrates ALL business functions (finance, manufacturing, HR, sales, procurement) into ONE unified database, eliminating data silos and providing real-time, consistent information across the entire organization."},
          {q:"The Master Production Schedule (MPS) in MRP specifies:",o:["The list of all materials needed per product","What finished products to produce and when","The company's overall strategic plan","Current inventory levels"],a:1,e:"The MPS specifies WHAT finished products to produce, in what QUANTITIES, and WHEN. It is the primary input to MRP, which uses the MPS to calculate material requirements."},
          {q:"The Bill of Materials (BOM) contains:",o:["Supplier prices for raw materials","The complete list of components and quantities needed to make one unit of a product","Current inventory levels","Customer order information"],a:1,e:"BOM = complete list of ALL components, subassemblies, and raw materials (with quantities) needed to produce ONE unit of the finished product. It is a key input to MRP calculations."},
          {q:"Gross Requirements 500 units. On-hand inventory 120. Scheduled receipts 80. Net Requirements =",o:["500","300","380","420"],a:1,e:"Net Requirements = Gross - On Hand - Scheduled Receipts = 500 - 120 - 80 = 300 units need to be ordered or produced."},
          {q:"MRP II extends MRP by adding:",o:["Customer relationship management","Capacity planning, labor scheduling, and financial integration","Internet-based ordering","Quality control inspection"],a:1,e:"MRP II extends MRP beyond materials to include CAPACITY PLANNING (are machines/labor available?), labor scheduling, machine scheduling, and financial planning — integrating manufacturing with the broader business."},
          {q:"MRP is classified as a _____ production system:",o:["Pull system","Push system","JIT system","Lean system"],a:1,e:"MRP is a PUSH system — production is based on FORECASTS and schedules. Products are pushed through production based on planned demand. JIT is a PULL system — production is triggered by actual customer demand."},
          {q:"The BIGGEST risk of implementing an ERP system is:",o:["The system will automate too many jobs","Implementation failure causing cost overruns and business disruption","The system will not connect to the internet","Accounting standards will not be followed"],a:1,e:"ERP implementation failure is a major risk — projects frequently exceed budget (sometimes by 100%+), take longer than planned, and can disrupt business operations. Many high-profile ERP failures have caused significant financial damage to companies."},
          {q:"Which of the following is an example of an ERP system?",o:["Microsoft Excel","QuickBooks","SAP S/4HANA","Google Sheets"],a:2,e:"SAP S/4HANA is a major ERP system. Other examples: Oracle ERP Cloud, Microsoft Dynamics 365. QuickBooks is a small business accounting system (not a full ERP). Excel is a spreadsheet tool."},
          {q:"In an MRP system, 'Scheduled Receipts' refers to:",o:["Orders already placed and expected to arrive","Future customer orders","Materials currently in production","Inventory adjustment entries"],a:0,e:"Scheduled Receipts = orders already placed with suppliers (or already in production) that are expected to ARRIVE during the planning period. They reduce net requirements because they represent incoming supply."},
          {q:"What is the correct order of scope from narrowest to broadest?",o:["ERP → MRP II → MRP","MRP → ERP → MRP II","MRP → MRP II → ERP","MRP II → MRP → ERP"],a:2,e:"MRP (materials only) → MRP II (materials + manufacturing resources) → ERP (entire enterprise — all business functions). Each builds on and extends the previous, with ERP being the most comprehensive."}
        ]},
      {id:"4-19",title:"Process Analysis & Value Stream Mapping",dur:"20 min",
        blocks:[
          {t:"h",v:"What Is Process Analysis?"},
          {t:"p",v:"Process analysis examines how work flows through an organization to identify inefficiencies, waste, and opportunities for improvement. It is a core tool in lean management and business process improvement."},
          {t:"h",v:"Process Mapping (Flowcharts)"},
          {t:"p",v:"Process maps visually document every step in a process — showing inputs, activities, decisions, and outputs. They reveal where waste occurs and where improvements can be made."},
          {t:"b",v:["Current State Map: Documents the process AS IT IS TODAY — reveals all waste and inefficiencies","Future State Map: Shows the IDEAL process after improvements are implemented","Gap Analysis: Identifies what needs to change to move from current to future state"]},
          {t:"h",v:"Value Stream Mapping (VSM)"},
          {t:"p",v:"VSM is a lean tool that maps the ENTIRE flow of materials and information from supplier to customer. It shows both value-added and non-value-added time, identifying waste in the entire value stream."},
          {t:"tbl",h:["Metric","Definition"],r:[["Cycle Time","Time to complete ONE unit from start to finish"],["Lead Time","Total time from customer order to delivery (includes waiting)"],["Process Time","Actual time spent working on the product (value-added)"],["Takt Time","Available production time / Customer demand rate — the production PACE needed"],["Value-Added Ratio","Process Time / Lead Time — higher is better"]]},
          {t:"h",v:"Takt Time"},
          {t:"f",l:"Takt Time",v:"Takt Time = Available Production Time / Customer Demand Rate"},
          {t:"p",v:"Example: Available time = 480 minutes/day. Customer demand = 120 units/day. Takt Time = 480/120 = 4 minutes/unit. Production must complete one unit every 4 minutes to meet demand."},
          {t:"h",v:"Throughput & Bottleneck Analysis"},
          {t:"b",v:["Throughput: Rate at which the system produces output","Bottleneck: The slowest process step — limits overall throughput","Improving any non-bottleneck step does NOT improve overall throughput","Only improving the bottleneck increases overall system output"]},
          {t:"tip",v:"Exam Tips: Takt Time = Available Time / Demand Rate — sets the production pace. Cycle Time = time per unit. Lead Time includes ALL time (including waiting). Value-Added Ratio = Process Time / Lead Time. VSM shows material AND information flows. Bottleneck limits throughput — focus improvement there first (Theory of Constraints). Current state map shows waste; future state map shows the ideal."}
        ],
        quizzes:[
          {q:"Takt Time is calculated as:",o:["Total production time / Number of workers","Available production time / Customer demand rate","Cycle time x Number of units","Process time / Lead time"],a:1,e:"Takt Time = Available Production Time / Customer Demand Rate. It sets the PRODUCTION PACE needed to meet customer demand. If takt time = 4 minutes, one unit must be completed every 4 minutes."},
          {q:"Available time 600 minutes/day. Customer demand 150 units/day. Takt Time =",o:["2 minutes","4 minutes","6 minutes","250 minutes"],a:1,e:"Takt Time = 600 / 150 = 4 minutes per unit. The production process must complete one unit every 4 minutes to exactly meet customer demand without overproducing."},
          {q:"Lead Time differs from Cycle Time because Lead Time:",o:["Only measures value-added processing time","Includes total time from order to delivery, including waiting","Is always shorter than cycle time","Measures machine uptime only"],a:1,e:"Lead Time = TOTAL time from customer order to delivery — including all waiting, inspection, transport, and processing time. Cycle Time = time to complete one unit in production. Lead Time is almost always longer than Cycle Time due to non-value-added waiting."},
          {q:"Value Stream Mapping (VSM) shows:",o:["Only financial costs of production","Both material and information flows from supplier to customer","Machine breakdown frequencies","Employee performance metrics"],a:1,e:"VSM maps the ENTIRE flow of BOTH materials (physical product flow) AND information (orders, schedules, signals) from supplier through the company to the customer. It reveals waste in the entire value stream."},
          {q:"The Value-Added Ratio is calculated as:",o:["Lead Time / Process Time","Process Time / Lead Time","Cycle Time / Takt Time","Throughput / Demand"],a:1,e:"Value-Added Ratio = Process Time / Lead Time. It shows what percentage of total lead time is actually spent adding value. A ratio of 10% means only 10% of time is value-added — 90% is waste (waiting, transport, inspection, etc.)."},
          {q:"In process analysis, a 'Current State Map' documents:",o:["The ideal future process","The process as it exists TODAY — including all waste","Only value-added activities","The company's strategic plan"],a:1,e:"Current State Map documents the process AS IT IS TODAY — including all waste, inefficiencies, waiting time, excess inventory, and non-value-added activities. It is the starting point for identifying improvement opportunities."},
          {q:"The BOTTLENECK in a process is:",o:["The fastest operation","The most expensive operation","The slowest step that limits overall throughput","The step with the most workers"],a:2,e:"The bottleneck is the SLOWEST step — the constraint that limits the rate of the entire system. Overall throughput cannot exceed the bottleneck's capacity. All upstream processes accumulate inventory waiting for the bottleneck."},
          {q:"Improving a non-bottleneck process step will:",o:["Increase overall throughput","Have no effect on overall throughput","Reduce lead time significantly","Eliminate all waste"],a:1,e:"Improving a NON-BOTTLENECK step does NOT increase overall throughput — the bottleneck still limits output. It may create more inventory piling up in front of the bottleneck. Only improving the BOTTLENECK increases system throughput."},
          {q:"Process Time 30 minutes. Lead Time 300 minutes. Value-Added Ratio =",o:["10%","30%","90%","300%"],a:0,e:"Value-Added Ratio = Process Time / Lead Time = 30 / 300 = 10%. Only 10% of total lead time is spent adding value. The remaining 90% is non-value-added (waiting, transport, inspection, etc.) — a major lean improvement opportunity."},
          {q:"The Future State Map in Value Stream Mapping represents:",o:["Current process performance metrics","The IDEAL process after waste elimination and improvements","Customer demand forecasts","Supplier delivery schedules"],a:1,e:"The Future State Map shows the IDEAL PROCESS after implementing lean improvements — eliminating identified waste, reducing lead time, improving flow. It is the TARGET to work toward after documenting the current state."}
        ]},
      {id:"4-20",title:"Outsourcing & Strategic Cost Management",dur:"25 min",
        blocks:[
          {t:"h",v:"Outsourcing Decisions"},
          {t:"p",v:"Outsourcing means having an EXTERNAL supplier perform an activity previously done internally. It is a strategic decision that goes beyond simple cost comparison — it involves competitive advantage, risk, and long-term strategy."},
          {t:"h",v:"Financial Analysis: Make vs Outsource"},
          {t:"f",l:"Outsource Decision Rule",v:"Outsource if: Outside Cost < Total Avoidable Internal Cost (variable + avoidable fixed costs)"},
          {t:"p",v:"Key: Only AVOIDABLE costs are relevant. Allocated fixed costs that continue regardless are IRRELEVANT."},
          {t:"h",v:"Qualitative Factors in Outsourcing"},
          {t:"b",v:["Quality control: Can supplier maintain required quality standards?","Reliability: Will deliveries be on time? Supply chain risk?","Confidentiality: Will proprietary information be protected?","Core competency: Is this activity a strategic competitive advantage? (Don't outsource core competencies!)","Flexibility: Can we quickly switch back if needed?","Workforce impact: Effect on employee morale and retention"]},
          {t:"h",v:"Strategic Cost Management"},
          {t:"p",v:"Strategic cost management aligns COST MANAGEMENT decisions with the company's COMPETITIVE STRATEGY. There are two basic strategies:"},
          {t:"tbl",h:["Strategy","Focus","Cost Management Emphasis"],r:[["Cost Leadership","Be the lowest-cost producer","Aggressive cost reduction, efficiency, economies of scale"],["Differentiation","Offer unique value customers pay premium for","Invest in quality, R&D, service — don't cut costs that support differentiation"]]},
          {t:"h",v:"Customer Profitability Analysis"},
          {t:"p",v:"Not all customers are equally profitable. Using ABC principles, customer profitability analysis assigns costs to CUSTOMERS (not products) based on the resources they consume."},
          {t:"b",v:["High-maintenance customers (many orders, returns, calls) cost more to serve","Simple analysis: Contribution Margin from customer - Cost to serve that customer","Result: Identify profitable vs unprofitable customers — consider dropping or repricing for unprofitable ones"]},
          {t:"h",v:"Balanced Scorecard & Strategy"},
          {t:"p",v:"The Balanced Scorecard (BSC) translates strategy into MEASURABLE objectives across 4 perspectives: Financial, Customer, Internal Process, and Learning & Growth. It connects daily operations to long-term strategic goals."},
          {t:"tip",v:"Exam Tips: Outsource if outside cost < avoidable internal cost. Allocated fixed costs IRRELEVANT. Don't outsource CORE COMPETENCIES. Cost leadership = minimize costs. Differentiation = invest to maintain uniqueness. Customer profitability = CM - cost to serve. BSC = 4 perspectives (Financial, Customer, Process, Learning). Strategy drives cost management decisions."}
        ],
        quizzes:[
          {q:"When evaluating an outsourcing decision, which costs are RELEVANT?",o:["All fixed costs including allocated overhead","Only direct materials cost","Avoidable variable and fixed costs only","Historical sunk costs"],a:2,e:"Only AVOIDABLE costs are relevant in outsourcing decisions — costs that will be eliminated if production stops (variable costs + avoidable fixed costs). Allocated/unavoidable fixed costs continue regardless and are IRRELEVANT."},
          {q:"Variable cost to make $25/unit. Avoidable fixed cost $3/unit. Allocated fixed cost $5/unit. Outside price $30. Should the company outsource?",o:["Yes — saves $2/unit","No — costs $2 more to outsource","Yes — saves $7/unit","No — costs $7 more to outsource"],a:1,e:"Avoidable cost to make = $25 + $3 = $28/unit (allocated $5 is irrelevant). Outside price = $30. Keep making ($28 < $30) — outsourcing costs $2 MORE per unit."},
          {q:"A company should generally NOT outsource activities that are:",o:["Routine and administrative","Core competencies providing competitive advantage","Commodity-like services","Low-skill repetitive tasks"],a:1,e:"CORE COMPETENCIES — activities that provide strategic competitive advantage — should NOT be outsourced. Outsourcing them risks losing the capability, sharing proprietary knowledge with competitors, and losing strategic differentiation."},
          {q:"A cost leadership strategy focuses on:",o:["Offering unique products customers pay premium for","Being the lowest-cost producer in the industry","Serving only niche markets","Maximizing product quality regardless of cost"],a:1,e:"Cost Leadership strategy = being the LOWEST-COST PRODUCER. Companies like Walmart pursue cost leadership by aggressively reducing costs through efficiency, economies of scale, and tight cost control throughout the value chain."},
          {q:"A differentiation strategy implies that cost management should:",o:["Cut all costs aggressively","Avoid all investments in quality","Invest in costs that support the unique value offered to customers","Minimize R&D spending"],a:2,e:"Differentiation strategy: INVEST in costs that support the unique value customers pay a premium for — quality, R&D, customer service, brand. Cutting these costs would undermine the differentiation and destroy competitive advantage."},
          {q:"Customer profitability analysis assigns costs to customers based on:",o:["Revenue generated only","Resources (activities) each customer consumes","Equal allocation per customer","Geographic location"],a:1,e:"Customer profitability uses ABC principles to assign costs based on RESOURCES CONSUMED by each customer — ordering frequency, returns, customer service calls, special requirements, etc. Some customers are highly profitable; others are unprofitable despite high revenue."},
          {q:"The Balanced Scorecard's FINANCIAL perspective answers the question:",o:["How do customers see us?","What must we excel at internally?","How do we look to shareholders?","Can we continue to improve?"],a:2,e:"Financial perspective asks: 'How do we look to SHAREHOLDERS?' — focusing on financial results like revenue growth, profitability, and ROI. The other perspectives are Customer ('How do customers see us?'), Internal Process ('What must we excel at?'), and Learning & Growth ('Can we continue to improve?')."},
          {q:"Supply chain disruption risk is a major QUALITATIVE factor against:",o:["Keeping production in-house","Outsourcing to external suppliers","Increasing safety stock","Implementing JIT"],a:1,e:"Supply chain disruption is a key RISK OF OUTSOURCING. When an external supplier fails to deliver (due to financial problems, natural disasters, capacity issues), the buying company has no backup production capability. This is especially critical for JIT manufacturers."},
          {q:"A customer generates $100,000 revenue with 40% gross margin but requires $45,000 in special service costs. This customer is:",o:["Highly profitable at $40,000 profit","Marginally profitable at $5,000 profit","Breaking even","Unprofitable — losing $5,000"],a:3,e:"Gross margin = 40% x $100,000 = $40,000. Cost to serve = $45,000. Customer profitability = $40,000 - $45,000 = -$5,000. This customer is UNPROFITABLE — the company should consider repricing, reducing service levels, or dropping this customer."},
          {q:"The Learning & Growth perspective of the Balanced Scorecard focuses on:",o:["Short-term financial results","Customer satisfaction scores","Employee skills, training, and innovation capacity","Internal process efficiency metrics"],a:2,e:"Learning & Growth perspective: 'Can we continue to improve and create value?' — focuses on EMPLOYEE CAPABILITIES, training hours, innovation rate, technology infrastructure, and organizational learning. It is the FOUNDATION that enables the other three perspectives."}
        ]},
      {id:"4-21",title:"Introduction to Costing Methods",dur:"20 min",
        blocks:[
          {t:"h",v:"Why Do We Need Costing Methods?"},
          {t:"p",v:"Before diving into specific costing systems, it is essential to understand the FRAMEWORK of cost measurement and cost accumulation. Two fundamental decisions drive how a company designs its costing system."},
          {t:"h",v:"Two Key Decisions in Costing"},
          {t:"b",v:["Decision 1 — Cost Accumulation: How are costs collected? Job Order Costing (by job) OR Process Costing (by department/process)","Decision 2 — Cost Measurement: How are costs measured? Actual Costing, Normal Costing, OR Standard Costing"]},
          {t:"h",v:"Cost Accumulation Systems"},
          {t:"tbl",h:["System","Products","Cost Tracking","Examples"],r:[["Job Order Costing","Unique/custom","Per job or batch","Construction, custom furniture, printing"],["Process Costing","Identical/homogeneous","Per process/department","Oil refining, beverages, cement"],["Hybrid (Operation Costing)","Partially standardized","Batch level","Clothing with custom finishing"]]},
          {t:"h",v:"Cost Measurement Methods"},
          {t:"tbl",h:["Method","DM & DL","Overhead","Pros / Cons"],r:[["Actual Costing","Actual costs","Actual overhead","Most accurate / Overhead only known at year-end — slow"],["Normal Costing","Actual costs","Predetermined rate x actual activity","Timely / Small over/under-applied OH difference"],["Standard Costing","Standard costs","Standard rate x standard activity","Best for control / Variances reveal inefficiencies"]]},
          {t:"h",v:"Product Costs vs Period Costs — Quick Review"},
          {t:"tbl",h:["Cost Type","Definition","Examples","Treatment"],r:[["Product Costs","Costs to MAKE the product","DM, DL, MOH","Inventory → COGS when sold"],["Period Costs","All other costs — NOT manufacturing","Selling, G&A, interest","Expensed immediately"]]},
          {t:"h",v:"The Cost of Quality Framework — Integration"},
          {t:"p",v:"All costing methods must consider quality costs. Whether using job order, process, or ABC costing, prevention and appraisal costs are product costs while failure costs are typically period costs (unless internal failures occur during production)."},
          {t:"tip",v:"Exam Tips: Job Order = unique products. Process Costing = identical products. Operation Costing = hybrid (both). Normal Costing uses POHR — most common in practice. Standard Costing = budgeted costs used for variance analysis. Product costs = DM + DL + MOH only. Period costs = everything else. All three measurement methods end up at the same point: actual costs — they just get there differently."}
        ],
        quizzes:[
          {q:"A company that makes both standardized shoes and custom finishes on each pair would MOST likely use:",o:["Pure Job Order Costing","Pure Process Costing","Operation Costing (Hybrid)","Activity-Based Costing"],a:2,e:"Operation Costing (Hybrid) is used when products are partially standardized (standardized production process — use process costing) but have some customization (custom finishing — use job order costing for that batch). Shoes are a classic example."},
          {q:"Under Normal Costing, overhead is applied using:",o:["Actual overhead rate x actual activity","Predetermined overhead rate x actual activity","Standard overhead rate x standard activity","Budgeted overhead rate x budgeted activity"],a:1,e:"Normal Costing: DM and DL at ACTUAL costs, Overhead at PREDETERMINED rate x ACTUAL activity. This provides timely product costs during the year without waiting for actual overhead to be known at year-end."},
          {q:"Standard Costing is MOST useful for:",o:["Tax reporting","External financial statements","Performance control and variance analysis","Calculating actual product costs"],a:2,e:"Standard Costing is primarily used for PERFORMANCE CONTROL — comparing actual costs to standard (budgeted) costs reveals VARIANCES that highlight inefficiencies or savings. It is the foundation of management control systems."},
          {q:"Under Actual Costing, the main DISADVANTAGE is:",o:["It requires too many journal entries","Overhead rates fluctuate and are only known at year-end","It ignores direct labor costs","It overstates product costs"],a:1,e:"Actual Costing's main disadvantage: actual overhead is only known at YEAR-END (after all overhead is incurred). This makes it impossible to know product costs during the year — too slow for timely pricing and decision-making."},
          {q:"Factory depreciation on production equipment is classified as:",o:["A period cost — expensed immediately","A product cost — manufacturing overhead","A period cost — selling expense","A product cost — direct labor"],a:1,e:"Factory depreciation is a PRODUCT COST — specifically Manufacturing Overhead. It is incurred in the factory to produce goods, so it flows through WIP → Finished Goods → COGS. (Office equipment depreciation would be a period cost.)"},
          {q:"Which costing method results in the MOST timely product cost information during the year?",o:["Actual Costing","Normal Costing","Standard Costing","Both Normal and Standard Costing"],a:3,e:"Both Normal and Standard Costing provide timely product costs because they use predetermined rates — overhead is applied throughout the year without waiting for actual totals. Actual Costing cannot provide product costs until year-end when actual overhead is known."},
          {q:"Sales commissions paid to the sales team are classified as:",o:["Product costs — part of COGS","Manufacturing overhead","Period costs — selling expense","Product costs — direct labor"],a:2,e:"Sales commissions are PERIOD COSTS — selling expenses. They are not related to manufacturing and are expensed in the period incurred. Only manufacturing costs (DM, DL, MOH) are product costs that flow through inventory."},
          {q:"Operation Costing (hybrid system) is appropriate when:",o:["All products are identical","All products are completely unique","Products share common processes but have different finishing/customization","The company has only one product"],a:2,e:"Operation Costing combines Process Costing (for common/standardized processing stages) with Job Order Costing (for unique customization batches). Ideal when products share most manufacturing steps but differ in some customization."},
          {q:"The DIFFERENCE between Normal and Standard Costing is:",o:["Normal uses actual DM/DL; Standard uses standard DM/DL","Normal uses predetermined overhead; Standard uses actual overhead","Normal costing does not calculate variances; Standard always does","They are identical in all respects"],a:0,e:"Normal Costing: Actual DM + Actual DL + (POHR x Actual Activity). Standard Costing: Standard DM + Standard DL + (Standard Rate x Standard Activity). The key difference is that Standard Costing uses STANDARD quantities and rates for ALL cost elements, enabling full variance analysis."},
