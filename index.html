     exhibit:{headers:['Finding','Description'],rows:[['Finding 1','AP clerk can both APPROVE vendor invoices AND record the payment in the system'],['Finding 2','IT system access has not been reviewed in 24 months — 12 terminated employees still have active access'],['Finding 3','No formal process exists to identify and assess business risks that could affect financial reporting'],['Finding 4','Management has overridden controls 3 times this year without documented justification']]},
     questions:[
      {type:'drag',id:'E1Q1',text:'Match each finding to the COSO component it primarily violates:',items:['Finding 1 — AP clerk dual role','Finding 2 — Stale IT access','Finding 3 — No risk process','Finding 4 — Management override'],zones:['Control Activities','Information & Communication','Risk Assessment','Control Environment'],correct:{'Finding 1 — AP clerk dual role':'Control Activities','Finding 2 — Stale IT access':'Information & Communication','Finding 3 — No risk process':'Risk Assessment','Finding 4 — Management override':'Control Environment'},fb:'Control Activities = policies that prevent/detect errors (segregation of duties). Information & Communication = accurate and timely data flows (access management is information security). Risk Assessment = identifying and analyzing risks. Control Environment = tone at the top, integrity, management philosophy — management override undermines the entire control environment.'},
      {type:'select',id:'E1Q2',text:'Who bears PRIMARY responsibility for designing, implementing, and maintaining internal controls?',opts:['External auditors','The internal audit department','Management (CEO and CFO)','The board of directors'],ans:2,fb:'COSO is clear: MANAGEMENT is responsible for establishing and maintaining internal controls. The board provides oversight. Internal audit assesses and advises. External auditors attest (for public companies under SOX 404). Management cannot delegate this responsibility.'},
      {type:'select',id:'E1Q3',text:'Which COSO component is considered the FOUNDATION of all other components?',opts:['Risk Assessment','Control Activities','Control Environment','Monitoring Activities'],ans:2,fb:'The Control Environment is the foundation — it sets the "tone at the top." It reflects management\'s commitment to integrity, ethical values, and competence. Without a strong control environment, other components are ineffective. COSO describes it as the "atmosphere" in which controls operate.'},
      {type:'select',id:'E1Q4',text:'Finding 1 (AP clerk approves AND records payments) is BEST classified as:',opts:['An inconsequential deficiency — no action needed','A control deficiency only if it results in an actual error','A significant deficiency or material weakness because it creates an unmitigated risk of material misstatement','A compliance issue only — not an internal control matter'],ans:2,fb:'Lack of segregation of duties in AP (authorization + recording by one person) is a classic SIGNIFICANT DEFICIENCY or MATERIAL WEAKNESS. It creates a direct opportunity for fraud or error with no compensating control. The severity depends on mitigating controls elsewhere — but as described, it is at minimum a significant deficiency.'},
      {type:'drag',id:'E1Q5',text:'Classify each deficiency severity:',items:['Minor data entry error caught by reconciliation','AP clerk approves AND records — no compensating control','Risk assessment process completely absent — could affect all financial reporting'],zones:['Control Deficiency','Significant Deficiency','Material Weakness'],correct:{'Minor data entry error caught by reconciliation':'Control Deficiency','AP clerk approves AND records — no compensating control':'Significant Deficiency','Risk assessment process completely absent — could affect all financial reporting':'Material Weakness'},fb:'Control Deficiency: deviation unlikely to result in material misstatement. Significant Deficiency: less severe than material weakness but important — requires attention by those charged with governance. Material Weakness: reasonable possibility that material misstatement will not be prevented or detected on a timely basis.'},
      {type:'blank',id:'E1Q6',text:'The COSO framework has [B1] components and [B2] underlying principles across those components.',blanks:[{id:'B1',opts:['3','5','8'],ans:'5'},{id:'B2',opts:['10','17','20'],ans:'17'}],fb:'COSO IC (2013): 5 components (Control Environment, Risk Assessment, Control Activities, Information & Communication, Monitoring) and 17 principles total. Each principle maps to a component. All 17 must be present and functioning for IC to be effective. Contrast with COSO ERM (2017) which has 5 components and 20 principles.'},
     ]},
    {id:'E2',num:2,title:'Enterprise Risk Management — NovaTech Manufacturing',topics:'ERM · Inherent Risk · Risk Response · Risk Appetite',
     case:'NovaTech Manufacturing is implementing COSO ERM. The risk committee has compiled the annual risk register, scoring each risk by its probability of occurrence and financial impact.\n\nManagement must calculate inherent risk scores, prioritize responses, and understand residual risk after controls are applied.',
     exhibit:{headers:['Risk','Probability','Potential Impact','Risk Response Being Evaluated'],rows:[['IT System Failure','70%','$500,000','Disaster recovery plan (reduces probability to 20%)'],['Key Supplier Bankruptcy','20%','$800,000','Dual-source supplier strategy'],['Regulatory Fine','40%','$200,000','Compliance training program'],['Currency Fluctuation','60%','$50,000','Accept — cost of hedging exceeds benefit']]},
     questions:[
      {type:'calc',id:'E2Q1',text:'Calculate the Inherent Risk Score (Expected Value) for IT System Failure.',hint:'Inherent Risk = Probability × Financial Impact (before any controls)',exact:350000,tol:0,pre:'$',suf:'',fb:'Inherent Risk = 70% × $500,000 = $350,000. Inherent risk is the risk level BEFORE any controls or responses are applied. It represents the raw exposure to the risk event.'},
      {type:'calc',id:'E2Q2',text:'Calculate the Inherent Risk Score for Key Supplier Bankruptcy.',hint:'Inherent Risk = Probability × Financial Impact',exact:160000,tol:0,pre:'$',suf:'',fb:'Inherent Risk = 20% × $800,000 = $160,000. Note: although the impact is highest ($800K), the LOW probability (20%) makes this the second-highest risk score. Risk prioritization must consider BOTH dimensions — not just impact.'},
      {type:'calc',id:'E2Q3',text:'If NovaTech implements the disaster recovery plan for IT, what is the RESIDUAL Risk Score?',hint:'Residual Risk = New Probability (20%) × Impact. The impact stays at $500,000.',exact:100000,tol:0,pre:'$',suf:'',fb:'Residual Risk = 20% × $500,000 = $100,000. The control REDUCES probability from 70% to 20%, cutting the risk score from $350,000 to $100,000 — a $250,000 risk reduction. Residual risk is what remains AFTER controls are applied.'},
      {type:'select',id:'E2Q4',text:'Accepting the Currency Fluctuation risk (60% probability, $50K impact) is BEST justified because:',opts:['Currency risk is never significant enough to manage','The cost of the hedging control likely exceeds the expected loss of $30,000','Currency fluctuations always resolve themselves','Only high-probability risks need to be managed'],ans:1,fb:'Risk ACCEPTANCE is appropriate when the cost of control > benefit. Expected loss = 60% × $50,000 = $30,000. If hedging costs more than $30,000, acceptance is rational. This is within management\'s risk appetite. Acceptance is a valid risk response — it doesn\'t mean ignoring the risk.'},
      {type:'drag',id:'E2Q5',text:'Match each risk response strategy to its correct definition:',items:['Risk Avoidance','Risk Reduction','Risk Sharing','Risk Acceptance'],zones:['Exit the activity entirely — eliminate the risk','Implement controls to lower probability or impact','Transfer risk to another party (insurance, outsourcing)','Acknowledge the risk and take no action'],correct:{'Risk Avoidance':'Exit the activity entirely — eliminate the risk','Risk Reduction':'Implement controls to lower probability or impact','Risk Sharing':'Transfer risk to another party (insurance, outsourcing)','Risk Acceptance':'Acknowledge the risk and take no action'},fb:'COSO ERM four risk responses: Avoid = stop the activity (exit a risky market). Reduce = controls that lower probability or impact. Share = insurance, hedging, outsourcing (transfer to third party). Accept = do nothing — appropriate when risk is within appetite or cost of control exceeds benefit.'},
      {type:'blank',id:'E2Q6',text:'Risk [B1] is the total amount of risk an organization is willing to accept in pursuit of its objectives. Residual risk = Inherent risk MINUS the effect of [B2].',blanks:[{id:'B1',opts:['appetite','tolerance','capacity'],ans:'appetite'},{id:'B2',opts:['controls/responses','market changes','audits'],ans:'controls/responses'}],fb:'Risk Appetite: broad statement of how much risk the entity is willing to accept (strategic). Risk Tolerance: acceptable variation around specific objectives (operational level). Residual risk is what remains after management responds — it should fall within risk tolerance. If residual risk > appetite → additional controls needed.'},
     ]},
    {id:'E3',num:3,title:'Fraud & the Fraud Triangle — RetailMax Inc.',topics:'Fraud Triangle · Asset Misappropriation · Detection Controls · Red Flags',
     case:'RetailMax Inc. discovered that a warehouse manager had been stealing inventory worth $180,000 over two years. The investigation revealed the following facts about the perpetrator and the environment that allowed the fraud to occur.\n\nManagement must analyze the fraud triangle elements and identify which controls were absent.',
     exhibit:{headers:['Finding','Detail'],rows:[['Perpetrator profile','Had significant gambling debts — under severe financial pressure'],['Access structure','Was the ONLY person responsible for receiving inventory AND maintaining inventory records'],['Justification found','Personal notes read: "I\'ll pay it back next month — just borrowing from the company"'],['Control gap 1','No physical inventory count had been performed for 18 months'],['Control gap 2','Inventory records were not reconciled to purchases for 6 months'],['Fraud type','Inventory stolen and sold for personal gain']]},
     questions:[
      {type:'drag',id:'E3Q1',text:'Match each finding to the element of the Fraud Triangle it represents:',items:['Gambling debts — financial pressure','Sole custody of inventory AND records','Viewed theft as temporary borrowing'],zones:['Pressure (Incentive)','Opportunity','Rationalization'],correct:{'Gambling debts — financial pressure':'Pressure (Incentive)','Sole custody of inventory AND records':'Opportunity','Viewed theft as temporary borrowing':'Rationalization'},fb:'The Fraud Triangle (Donald Cressey): PRESSURE = personal financial need or incentive. OPPORTUNITY = weak controls that allow the fraud without detection. RATIONALIZATION = the perpetrator justifies the act to themselves ("I deserve it," "I\'ll pay it back"). All three elements are typically present in occupational fraud.'},
      {type:'select',id:'E3Q2',text:'Which type of occupational fraud did the warehouse manager commit?',opts:['Financial Statement Fraud — manipulating reported earnings','Corruption — bribery or kickbacks to/from vendors','Asset Misappropriation — theft of company assets','Management Override — bypassing controls'],ans:2,fb:'Asset Misappropriation = theft or misuse of company assets (cash, inventory, equipment). It is the MOST COMMON type of fraud (89% of cases) but typically involves the smallest dollar losses. Financial statement fraud is rarest but most costly. Corruption (bribery, kickbacks) falls in between.'},
      {type:'select',id:'E3Q3',text:'Which control would have BEST PREVENTED this fraud from occurring?',opts:['Annual external audit of financial statements','Segregation of duties — separate the receiving function from inventory recordkeeping','Installing security cameras in the warehouse','Requiring manager to take annual vacation'],ans:1,fb:'SEGREGATION OF DUTIES is the primary PREVENTIVE control. The manager had BOTH custody (physical inventory) AND recordkeeping — the classic incompatible duties. Separating these roles means one person cannot steal AND cover it up. Cameras and audits are detective. Vacation is also detective (forces someone else to perform the role, revealing discrepancies).'},
      {type:'select',id:'E3Q4',text:'Which control would have DETECTED this fraud EARLIER?',opts:['Requiring the manager to sign an ethics code annually','Performing periodic physical inventory counts and reconciling to records','Background checks at the time of hiring','Encrypting the inventory database'],ans:1,fb:'Periodic PHYSICAL INVENTORY COUNTS reconciled to records is a DETECTIVE control — it would have revealed the shrinkage. The fraud went undetected for 18 months partly because no count was performed. Background checks prevent hiring bad actors (preventive). Ethics codes reduce rationalization but don\'t detect theft.'},
      {type:'drag',id:'E3Q5',text:'Classify each control as Preventive or Detective:',items:['Segregation of duties in AP','Monthly bank reconciliation','Pre-employment background check','Surprise cash counts','Dual authorization for large payments'],zones:['Preventive Control','Detective Control'],correct:{'Segregation of duties in AP':'Preventive Control','Monthly bank reconciliation':'Detective Control','Pre-employment background check':'Preventive Control','Surprise cash counts':'Detective Control','Dual authorization for large payments':'Preventive Control'},fb:'Preventive: stop errors/fraud BEFORE they occur (segregation, authorization, background checks). Detective: identify errors/fraud AFTER they occur (reconciliations, audits, counts, exception reports). BOTH types are needed — prevention reduces risk, detection catches what slips through.'},
      {type:'blank',id:'E3Q6',text:'The three elements of the Fraud Triangle are [B1], Opportunity, and [B2]. Removing any one element makes fraud significantly less likely.',blanks:[{id:'B1',opts:['Pressure (Incentive)','Greed','Deception'],ans:'Pressure (Incentive)'},{id:'B2',opts:['Rationalization','Capability','Access'],ans:'Rationalization'}],fb:'Pressure (Incentive): the "why" — financial stress, greed, lifestyle. Opportunity: the "how" — weak controls that allow fraud without detection. Rationalization: the "justification" — why the person convinces themselves it is acceptable. Controls primarily address OPPORTUNITY. Management culture addresses RATIONALIZATION.'},
     ]},
    {id:'E4',num:4,title:'Control Activities — BrightStar Corp.',topics:'Segregation of Duties · Authorization · Preventive vs Detective · Physical Controls',
     case:'BrightStar Corp. is an internal audit client with a manufacturing and retail division. During the annual controls assessment, the internal audit team documented the control environment in the revenue and expenditure cycles.\n\nManagement must evaluate whether proper control activities are in place for each function.',
     exhibit:{headers:['Function','Current Practice','Risk if Control Absent'],rows:[['Customer credit approval','Sales rep approves AND records credit sales','Fictitious sales, bad debt losses'],['Vendor payments','Controller reviews all payments over $50,000','Unauthorized disbursements'],['Petty cash','One cashier manages fund AND approves requests','Theft of petty cash'],['Inventory access','Warehouse key held only by receiving manager','Theft reduced — but no second verification'],['Bank reconciliation','Performed monthly by someone who does NOT handle cash','Errors and fraud could go undetected']]},
     questions:[
      {type:'drag',id:'E4Q1',text:'Classify each control by type:',items:['Controller review of payments > $50,000','Monthly bank reconciliation by independent party','Requiring dual signatures on checks > $10,000','Periodic surprise inventory counts','Physical lock on the warehouse'],zones:['Preventive Control','Detective Control'],correct:{'Controller review of payments > $50,000':'Preventive Control','Monthly bank reconciliation by independent party':'Detective Control','Requiring dual signatures on checks > $10,000':'Preventive Control','Periodic surprise inventory counts':'Detective Control','Physical lock on the warehouse':'Preventive Control'},fb:'Preventive: STOP the error/fraud before it happens (authorization, dual signatures, locks). Detective: IDENTIFY errors after they occur (reconciliations, surprise counts, exception reports). Important: No system of controls is perfect — you need BOTH types. Detective controls are the safety net when preventive controls fail.'},
      {type:'select',id:'E4Q2',text:'The sales rep approving AND recording credit sales violates which fundamental control principle?',opts:['Authorization control — no approval at all','Segregation of duties — one person has incompatible functions','Physical control — no safeguarding of assets','Performance review — no monitoring of variances'],ans:1,fb:'SEGREGATION OF DUTIES requires separating: (1) Authorization, (2) Custody of assets, and (3) Recordkeeping. When one person has two or more of these functions, they can commit AND conceal errors or fraud. The sales rep both authorizes the credit (creates the transaction) and records it (hides it).'},
      {type:'select',id:'E4Q3',text:'The bank reconciliation being performed by someone who does NOT handle cash is an example of:',opts:['A detective control AND proper segregation of duties','Only a preventive control — it stops errors before they happen','A physical control — protecting assets','An information technology control'],ans:0,fb:'The bank reconciliation is DETECTIVE (finds discrepancies after the fact). The independence of the preparer (someone who doesn\'t handle cash) is SEGREGATION OF DUTIES — preventing the same person from handling cash AND hiding discrepancies. This combination (detective + independent) is best practice.'},
      {type:'select',id:'E4Q4',text:'Which of the following is the BEST compensating control for the petty cash weakness (single person manages and approves)?',opts:['Increase the petty cash fund to reduce replenishments','Have the same cashier perform monthly counts','Require a second person to approve petty cash requests AND conduct surprise counts','Post the petty cash policy on the wall'],ans:2,fb:'A COMPENSATING CONTROL addresses a risk when the ideal control (segregation) cannot be fully implemented. Here: requiring a second signature for approvals PLUS surprise counts by management or internal audit reduces the risk that a sole cashier will steal. Compensating controls are acceptable but are generally considered weaker than primary controls.'},
      {type:'drag',id:'E4Q5',text:'Classify each function as compatible (can be combined) or incompatible (must be separated):',items:['Custody of cash AND bank reconciliation','Preparing purchase orders AND approving them','Approving time cards AND distributing paychecks','Recording transactions AND reconciling accounts','Receiving goods AND updating inventory records'],zones:['Incompatible — Must Separate','Compatible — Can Combine'],correct:{'Custody of cash AND bank reconciliation':'Incompatible — Must Separate','Preparing purchase orders AND approving them':'Incompatible — Must Separate','Approving time cards AND distributing paychecks':'Incompatible — Must Separate','Recording transactions AND reconciling accounts':'Incompatible — Must Separate','Receiving goods AND updating inventory records':'Incompatible — Must Separate'},fb:'All five pairs are INCOMPATIBLE — each combines two duties that should be separated. The rule: if two functions allow someone to commit AND conceal a fraud or error, they must be separated. In practice, small companies struggle with this and must rely on compensating controls (management review, surprise audits).'},
      {type:'blank',id:'E4Q6',text:'Segregation of duties separates three incompatible functions: [B1], custody of assets, and [B2].',blanks:[{id:'B1',opts:['Authorization','Monitoring','Reporting'],ans:'Authorization'},{id:'B2',opts:['Recordkeeping','Budgeting','Planning'],ans:'Recordkeeping'}],fb:'The three incompatible functions: AUTHORIZATION (approving transactions), CUSTODY (physical control over assets), RECORDKEEPING (recording in the books). Separating these three prevents one person from initiating, possessing, and concealing a theft or error. This is the cornerstone of internal control over assets.'},
     ]},
    {id:'E5',num:5,title:'SOX Compliance & IT Controls — PublicCo Corp.',topics:'SOX Sections 302 & 404 · IT General Controls · Application Controls',
     case:'PublicCo Corp. is a publicly traded company preparing its annual SOX compliance assessment. The IT audit team also conducted a review of the IT control environment.\n\nManagement must demonstrate understanding of SOX requirements and classify IT control findings correctly.',
     exhibit:{headers:['Finding','Area','Detail'],rows:[['SOX 302','Certification','CEO and CFO must certify accuracy of financial statements each quarter'],['SOX 404','ICFR Assessment','Management must assess internal controls over financial reporting annually'],['IT Finding 1','Access Management','User access privileges not reviewed in 12 months — stale accounts exist'],['IT Finding 2','Change Management','System updates deployed to production without testing or approval'],['IT Finding 3','Input Validation','The accounts payable system accepts negative dollar amounts — no edit check'],['IT Finding 4','Duplicate Check','No automated control to detect duplicate vendor invoice numbers']]},
     questions:[
      {type:'drag',id:'E5Q1',text:'Classify each IT finding as IT General Control or Application Control:',items:['User access not reviewed — stale accounts','System updates deployed without approval','AP system accepts negative amounts','No duplicate invoice check'],zones:['IT General Control (ITGC)','Application Control'],correct:{'User access not reviewed — stale accounts':'IT General Control (ITGC)','System updates deployed without approval':'IT General Control (ITGC)','AP system accepts negative amounts':'Application Control','No duplicate invoice check':'Application Control'},fb:'IT General Controls (ITGCs): govern the overall IT environment — affect ALL applications. Include: access management, change management, computer operations, data center security. Application Controls: specific to each application/system. Include: input edits, processing controls, output controls. Weak ITGCs undermine ALL application controls — a key CMA exam point.'},
      {type:'select',id:'E5Q2',text:'Under SOX Section 404, who must assess the effectiveness of Internal Controls over Financial Reporting (ICFR)?',opts:['Only the external auditor','Only the internal audit department','Management — AND for large accelerated filers, the external auditor also attests','Only the audit committee'],ans:2,fb:'SOX Section 404 requires TWO assessments: (1) MANAGEMENT must assess ICFR effectiveness and include the assessment in the annual report. (2) For large accelerated filers, the EXTERNAL AUDITOR must ATTEST to management\'s assessment (not just provide an opinion on FS). Non-accelerated filers are exempt from auditor attestation.'},
      {type:'select',id:'E5Q3',text:'A programmed edit check that rejects negative dollar amounts in the AP system is best classified as:',opts:['An IT General Control — affects all system users','An Application Control — input validation specific to AP','A physical control — safeguards company assets','A detective control only — finds errors after posting'],ans:1,fb:'Input validation is an APPLICATION CONTROL — specifically an INPUT control. It prevents bad data from entering the system (PREVENTIVE). Application controls are embedded within specific systems/applications to ensure complete, accurate, authorized, and timely processing. Three types: Input, Processing, and Output controls.'},
      {type:'select',id:'E5Q4',text:'Under SOX Section 302, who must certify the accuracy and completeness of financial statements?',opts:['The board of directors and audit committee','The chief accounting officer and controller','The CEO AND CFO','Only the independent external auditor'],ans:2,fb:'SOX Section 302: the CEO AND CFO must personally CERTIFY each quarterly and annual report, confirming: (1) they have reviewed the report, (2) it contains no material misstatements, (3) the financial statements fairly present the company\'s condition, and (4) they have disclosed all significant IC deficiencies to auditors and the audit committee. Criminal penalties apply for false certifications.'},
      {type:'drag',id:'E5Q5',text:'Match each SOX provision to its requirement:',items:['Section 302','Section 404','Section 409','Audit Committee Independence'],zones:['CEO/CFO certification of FS accuracy','Annual management assessment of ICFR','Real-time disclosure of material events','Board members must be independent; must include financial expert'],correct:{'Section 302':'CEO/CFO certification of FS accuracy','Section 404':'Annual management assessment of ICFR','Section 409':'Real-time disclosure of material events','Audit Committee Independence':'Board members must be independent; must include financial expert'},fb:'SOX key sections: 302 = CEO/CFO sign off on FS. 404 = management assesses ICFR, auditor attests (large filers). 409 = disclose material changes in financial condition or operations in real time (4 business days under SEC rules). Audit committee must be independent and include at least one financial expert.'},
      {type:'blank',id:'E5Q6',text:'IT General Controls affect [B1] applications in the IT environment. Weak ITGCs can [B2] the effectiveness of application controls built on top of them.',blanks:[{id:'B1',opts:['all','only financial','selected'],ans:'all'},{id:'B2',opts:['undermine','strengthen','have no effect on'],ans:'undermine'}],fb:'This is critical for IT audit: ITGCs are the foundation. If access management, change management, or computer operations are weak, ANY application control relying on that system is also unreliable. An auditor finding weak ITGCs must expand testing of ALL applications — they cannot rely on programmed controls built on a weak infrastructure.'},
     ]},
  ],
  F:[
    {id:'F1',num:1,title:'Data Analytics — InsightRetail Corp.',topics:'Analytics Types · Descriptive · Diagnostic · Predictive · Prescriptive · ROI',
     case:'InsightRetail Corp. processes 500 invoices with data quality errors every month. Each error costs $50 to investigate and correct. Management is evaluating a data analytics platform costing $120,000 per year that would eliminate these errors AND provide advanced analytical capabilities.\n\nThe analytics team must calculate the ROI and match each analytics use case to the correct type.',
     exhibit:{headers:['Analytics Type','Question It Answers','Complexity'],rows:[['Descriptive','What HAPPENED?','Low — baseline'],['Diagnostic','WHY did it happen?','Medium — root cause'],['Predictive','What WILL happen?','High — statistical models'],['Prescriptive','What SHOULD we do?','Highest — optimization'],['Current Use Cases at InsightRetail','Sales reports, trend charts, variance alerts, demand forecasting, pricing optimizer','—']]},
     questions:[
      {type:'calc',id:'F1Q1',text:'Calculate the annual cost of data quality errors BEFORE implementing the analytics platform.',hint:'Annual cost = Errors per month × 12 months × Cost per error',exact:300000,tol:0,pre:'$',suf:'',fb:'Annual error cost = 500 × 12 × $50 = $300,000. Poor data quality is a significant hidden cost — this is sometimes called the "cost of bad data." Data governance and analytics tools help reduce this waste.'},
      {type:'calc',id:'F1Q2',text:'Calculate the Net Annual Savings from implementing the analytics platform.',hint:'Net Savings = Annual Error Cost Eliminated − Annual Platform Cost',exact:180000,tol:0,pre:'$',suf:'',fb:'Net savings = $300,000 − $120,000 = $180,000. ROI = $180,000 ÷ $120,000 = 150%. The platform pays for itself and generates an additional $180,000 in value per year — before even counting benefits from predictive and prescriptive analytics.'},
      {type:'drag',id:'F1Q3',text:'Match each InsightRetail use case to the correct analytics type:',items:['Monthly sales summary dashboard','Root cause analysis of a sudden sales drop','Demand forecast for next quarter','AI-driven dynamic pricing optimization'],zones:['Descriptive','Diagnostic','Predictive','Prescriptive'],correct:{'Monthly sales summary dashboard':'Descriptive','Root cause analysis of a sudden sales drop':'Diagnostic','Demand forecast for next quarter':'Predictive','AI-driven dynamic pricing optimization':'Prescriptive'},fb:'Descriptive = what happened (reports, dashboards). Diagnostic = why it happened (drill-down, root cause). Predictive = what will happen (regression, ML forecasting). Prescriptive = what SHOULD we do (optimization, decision models). Each builds on the previous — prescriptive requires a solid foundation of good descriptive and predictive data.'},
      {type:'select',id:'F1Q4',text:'InsightRetail wants to predict which customers are likely to churn in the next 90 days. Which analytics type is this?',opts:['Descriptive — it summarizes historical churn rates','Diagnostic — it explains why customers churned in the past','Predictive — it uses models to forecast future behavior','Prescriptive — it tells managers which customers to call'],ans:2,fb:'PREDICTIVE analytics uses historical data and statistical/ML models to forecast future events. Predicting which customers will churn = predictive. Deciding WHICH action to take (call them, offer discount) = prescriptive. The line between predictive and prescriptive is: "what will happen" vs "what should we DO about it."'},
      {type:'select',id:'F1Q5',text:'Which statement about data analytics in management accounting is MOST accurate?',opts:['Analytics only adds value for large corporations with big data','Descriptive analytics alone is sufficient for strategic decision-making','Prescriptive analytics requires clean, reliable data at lower levels before it can function effectively','Predictive analytics eliminates the need for professional judgment'],ans:2,fb:'Data quality is foundational: garbage in, garbage out. Prescriptive and predictive models are only as reliable as the data they are built on. Descriptive analytics must be accurate before diagnostics are meaningful. Analytics AUGMENTS professional judgment — it does not replace it. Management accountants must critically evaluate model outputs.'},
      {type:'blank',id:'F1Q6',text:'The four types of data analytics in ascending order of complexity and value are: [B1] → Diagnostic → [B2] → Prescriptive.',blanks:[{id:'B1',opts:['Descriptive','Predictive','Comparative'],ans:'Descriptive'},{id:'B2',opts:['Prescriptive','Predictive','Normative'],ans:'Predictive'}],fb:'The analytics maturity ladder: Descriptive (hindsight) → Diagnostic (insight) → Predictive (foresight) → Prescriptive (action). As complexity and data requirements increase, so does business value. Most organizations start with descriptive and gradually build toward prescriptive capabilities.'},
     ]},
    {id:'F2',num:2,title:'Big Data & Data Governance — MegaData Corp.',topics:'5 Vs of Big Data · Structured vs Unstructured · Data Governance',
     case:'MegaData Corp. processes customer transactions, social media mentions, IoT sensor readings, and supplier emails daily. The CDO (Chief Data Officer) is presenting the Big Data strategy to the board.\n\nThe board needs to understand the five dimensions of big data (5 Vs), data classification, and why data governance is essential.',
     exhibit:{headers:['Data Source','Daily Volume','Update Frequency','Format'],rows:[['Point-of-sale transactions','2.5 million records','Real-time','Structured (database)'],['Customer social media mentions','850,000 posts','Continuous stream','Unstructured (text/images)'],['IoT warehouse sensors','12 million readings','Every 5 seconds','Semi-structured (JSON)'],['Supplier contracts & emails','3,000 documents','Daily','Unstructured (text/PDF)'],['Financial ledger entries','45,000 records','Daily batch','Structured (database)']]},
     questions:[
      {type:'drag',id:'F2Q1',text:'Match each "V" of Big Data to its correct description:',items:['Volume','Velocity','Variety','Veracity','Value'],zones:['Massive scale of data generated','Speed at which data is created and must be processed','Different formats: structured, semi-structured, unstructured','Accuracy, reliability, and trustworthiness of data','Business benefit extracted from data'],correct:{'Volume':'Massive scale of data generated','Velocity':'Speed at which data is created and must be processed','Variety':'Different formats: structured, semi-structured, unstructured','Veracity':'Accuracy, reliability, and trustworthiness of data','Value':'Business benefit extracted from data'},fb:'5 Vs of Big Data: Volume (scale — terabytes/petabytes), Velocity (speed — real-time vs batch), Variety (format — SQL tables, text, images, video), Veracity (quality — can we trust the data?), Value (the "so what" — what business decisions can we improve?). Value is the ultimate goal; the first four Vs are challenges to achieving it.'},
      {type:'drag',id:'F2Q2',text:'Classify each data source as Structured, Semi-structured, or Unstructured:',items:['POS transactions in a SQL database','Customer social media posts','IoT sensor data in JSON format','Supplier contracts in PDF','Financial ledger entries'],zones:['Structured','Semi-structured','Unstructured'],correct:{'POS transactions in a SQL database':'Structured','Customer social media posts':'Unstructured','IoT sensor data in JSON format':'Semi-structured','Supplier contracts in PDF':'Unstructured','Financial ledger entries':'Structured'},fb:'Structured: organized in rows/columns (relational databases) — easy to query. Semi-structured: has tags or markers (JSON, XML, CSV) — not in tables but has organization. Unstructured: no predefined format (text, images, video, audio) — hardest to analyze. 80% of enterprise data is unstructured — AI/NLP tools are needed to extract value.'},
      {type:'select',id:'F2Q3',text:'IoT sensors updating every 5 seconds present primarily which Big Data challenge?',opts:['Volume — the sheer number of sensors','Velocity — data arrives so fast it must be processed in near-real-time','Variety — sensor data uses unusual formats','Veracity — sensor readings are often unreliable'],ans:1,fb:'When data arrives continuously and must be processed immediately (streaming analytics), VELOCITY is the primary challenge. Traditional batch processing (run reports overnight) cannot keep pace. Technologies like Apache Kafka and Apache Spark handle high-velocity streaming data. Real-time dashboards and alerts require velocity management.'},
      {type:'select',id:'F2Q4',text:'The PRIMARY purpose of Data Governance in an organization is to:',opts:['Reduce the volume of data collected','Ensure data quality, security, privacy, and accountability through defined policies and ownership','Eliminate the need for data analysts','Convert unstructured data to structured format automatically'],ans:1,fb:'Data Governance = the framework of policies, processes, and responsibilities that ensures data is accurate, consistent, secure, and used appropriately. Key components: data ownership (who is responsible), data quality standards, data privacy (GDPR, HIPAA), data lifecycle management, and access controls. Without governance, organizations cannot trust their analytics outputs.'},
      {type:'select',id:'F2Q5',text:'MegaData Corp. discovers that 12% of customer records have duplicate entries. This is primarily a problem of which Big Data "V"?',opts:['Volume — too many records to manage','Velocity — records were entered too quickly','Variety — customer data has too many formats','Veracity — data accuracy and reliability is compromised'],ans:3,fb:'VERACITY = data trustworthiness. Duplicates, missing values, inconsistencies, and errors are veracity problems. Poor veracity undermines ALL analytics — even the most sophisticated AI models produce wrong outputs with bad input data. Data cleansing, deduplication, and master data management address veracity challenges.'},
      {type:'blank',id:'F2Q6',text:'Data that is organized in rows and columns in a relational database is called [B1] data. Data with no predefined structure, such as social media text or emails, is called [B2] data.',blanks:[{id:'B1',opts:['structured','semi-structured','unstructured'],ans:'structured'},{id:'B2',opts:['structured','semi-structured','unstructured'],ans:'unstructured'}],fb:'Structured: SQL databases, spreadsheets — easy to query and analyze with traditional BI tools. Unstructured: text, images, video, audio — requires NLP, computer vision, or AI to extract meaning. Semi-structured: JSON, XML, email headers — has some organization but not relational. The shift to unstructured data is driving AI/ML adoption in analytics.'},
     ]},
    {id:'F3',num:3,title:'Business Intelligence & Dashboards — ClearVision Corp.',topics:'BI · OLAP vs OLTP · Data Warehouse · KPI Dashboards',
     case:'ClearVision Corp. is implementing a Business Intelligence (BI) platform. The CFO wants an executive dashboard and the IT team must choose the right database architecture.\n\nThe analytics team must distinguish between operational systems and analytical systems, and design effective dashboards for different audiences.',
     exhibit:{headers:['System / Feature','Description'],rows:[['OLTP System','Processes daily transactions — sales, inventory, AP, AR'],['Data Warehouse','Integrated historical data from multiple sources for analysis'],['OLAP Cube','Multi-dimensional analysis with drill-down, slice, dice capabilities'],['Executive Dashboard','High-level KPIs — updated daily'],['Operational Dashboard','Real-time metrics for day-to-day decisions'],['Data Mart','Subject-specific subset of data warehouse (e.g., Sales mart, Finance mart)']]},
     questions:[
      {type:'drag',id:'F3Q1',text:'Match each use case to the correct system:',items:['Record a customer sale in real time','Analyze 5 years of sales trends by region and product','View today\'s production output vs. target','Generate quarterly financial statements for the board'],zones:['OLTP — Operational System','OLAP / Data Warehouse — Analytical System'],correct:{'Record a customer sale in real time':'OLTP — Operational System','Analyze 5 years of sales trends by region and product':'OLAP / Data Warehouse — Analytical System','View today\'s production output vs. target':'OLTP — Operational System','Generate quarterly financial statements for the board':'OLAP / Data Warehouse — Analytical System'},fb:'OLTP (Online Transaction Processing): real-time, row-level, many small transactions, normalized database, current data. OLAP (Online Analytical Processing): historical, aggregated, complex queries, denormalized/star schema, supports drill-down. A Data Warehouse integrates OLTP data from multiple sources to enable OLAP analysis.'},
      {type:'select',id:'F3Q2',text:'A manager "drills down" from total company revenue to individual store revenue, then to product category. This is a feature of which system?',opts:['OLTP — it handles all transaction-level queries','Data entry system — for recording real-time events','OLAP — multi-dimensional analysis with drill-down capability','ERP — enterprise resource planning module'],ans:2,fb:'OLAP supports: Drill-down (go from summary to detail), Roll-up (go from detail to summary), Slice (filter one dimension — show only Q3), Dice (filter multiple dimensions — Q3 + North Region + Electronics). These multi-dimensional views require a pre-aggregated, denormalized data structure — not possible efficiently in OLTP systems.'},
      {type:'drag',id:'F3Q3',text:'Match each chart type to its BEST use case:',items:['Bar / Column Chart','Line Chart','Pie / Donut Chart','Scatter Plot','Heat Map'],zones:['Compare categories at a point in time','Show trends over time','Show proportions of a whole','Show correlation between two variables','Show intensity across a matrix (e.g., risk grid)'],correct:{'Bar / Column Chart':'Compare categories at a point in time','Line Chart':'Show trends over time','Pie / Donut Chart':'Show proportions of a whole','Scatter Plot':'Show correlation between two variables','Heat Map':'Show intensity across a matrix (e.g., risk grid)'},fb:'Choosing the right visualization is critical for clear communication. Common mistakes: using pie charts with too many slices, using bar charts for trend data (line is better), using 3D charts that distort data. The rule: choose the chart type that makes the insight IMMEDIATELY obvious to the audience.'},
      {type:'select',id:'F3Q4',text:'Which statement about a Data Warehouse is MOST accurate?',opts:['It replaces OLTP systems for all transaction processing','It stores only current-period data to keep queries fast','It integrates historical data from multiple source systems for analytical querying','It is the same as a database used for daily operations'],ans:2,fb:'Data Warehouse: integrates data from ERP, CRM, HRM, and other sources into a single analytical repository. Characteristics: subject-oriented, integrated, time-variant (historical), non-volatile (data not updated after loading). ETL (Extract, Transform, Load) is used to populate it. Data Marts are smaller, subject-specific subsets.'},
      {type:'select',id:'F3Q5',text:'An executive dashboard shows Revenue, Gross Margin, and Customer Satisfaction trending below target with red indicators. These are examples of:',opts:['Operational metrics only — not suitable for executive view','Key Performance Indicators (KPIs) — strategic measures linked to organizational objectives','Raw data feeds — should be in the data warehouse','Diagnostic analytics outputs — explain why targets were missed'],ans:1,fb:'KPIs = Key Performance Indicators. They are strategic measures that reflect progress toward organizational goals. Effective KPIs are: specific, measurable, achievable, relevant, time-bound (SMART). Dashboard design: strategic KPIs for executives (high-level), operational metrics for managers (more detail), transactional data for staff.'},
      {type:'blank',id:'F3Q6',text:'OLTP systems are optimized for [B1] transactions in real time. Data warehouses are optimized for [B2] queries across large historical datasets.',blanks:[{id:'B1',opts:['processing small','running complex','aggregating'],ans:'processing small'},{id:'B2',opts:['complex analytical','real-time transactional','batch entry'],ans:'complex analytical'}],fb:'OLTP: many users, small transactions, normalized schema (reduces redundancy), optimized for INSERT/UPDATE speed. Data Warehouse: few users, complex queries, denormalized/star schema (faster reads), optimized for SELECT aggregation speed. This fundamental difference drives the ETL process — transforming OLTP data into a warehouse-friendly format.'},
     ]},
    {id:'F4',num:4,title:'Cloud Computing & ERP — TechManufacturing Inc.',topics:'IaaS · PaaS · SaaS · TCO Analysis · Cloud Migration',
     case:'TechManufacturing Inc. is evaluating whether to replace their on-premise ERP system with a cloud-based SaaS solution. The CFO has compiled a 3-year Total Cost of Ownership (TCO) comparison.\n\nThe IT team must also classify cloud service models and understand the risk and control implications of each.',
     exhibit:{headers:['Cost Item','On-Premise Year 1','On-Premise Year 2–3 (each)','Cloud Year 1','Cloud Year 2–3 (each)'],rows:[['Software License / Subscription','$300,000','$0','$0','$0'],['Implementation / Migration','$80,000','$0','$60,000','$0'],['Annual Maintenance (15% of license)','$0','$60,000','$0','$0'],['Annual Subscription Fee','$0','$0','$0','$120,000'],['IT Infrastructure & Staff','$40,000','$20,000','$0','$0'],['Vendor Support & Updates','$0','$0','$100,000','$10,000'],['Year Total','$420,000','$80,000','$160,000','$130,000']]},
     questions:[
      {type:'calc',id:'F4Q1',text:'Calculate the 3-Year Total Cost of Ownership for the On-Premise solution.',hint:'TCO = Year 1 + Year 2 + Year 3',exact:580000,tol:0,pre:'$',suf:'',fb:'On-Premise 3yr TCO = $420,000 + $80,000 + $80,000 = $580,000. On-premise has high upfront costs (license + hardware) but lower annual costs in years 2+. The large Year 1 investment creates a long payback period.'},
      {type:'calc',id:'F4Q2',text:'Calculate the 3-Year Total Cost of Ownership for the Cloud solution.',hint:'TCO = Year 1 + Year 2 + Year 3',exact:420000,tol:0,pre:'$',suf:'',fb:'Cloud 3yr TCO = $160,000 + $130,000 + $130,000 = $420,000. Cloud has lower upfront cost (no license) and predictable annual subscription fees — converting capital expenditure (CapEx) to operating expenditure (OpEx). This improves cash flow in Year 1 significantly.'},
      {type:'calc',id:'F4Q3',text:'What are the total 3-year cost savings of choosing Cloud over On-Premise?',hint:'Savings = On-Premise TCO − Cloud TCO',exact:160000,tol:0,pre:'$',suf:'',fb:'Cloud savings = $580,000 − $420,000 = $160,000 over 3 years. Note: the cloud ALSO saves $260,000 in Year 1 alone ($420K vs $160K) — critical for cash flow. However, in years 4+ the on-premise may become cheaper since license is already paid — the long-term analysis is important.'},
      {type:'drag',id:'F4Q4',text:'Match each cloud service model to its correct description:',items:['IaaS (Infrastructure as a Service)','PaaS (Platform as a Service)','SaaS (Software as a Service)'],zones:['Rent virtual servers, storage, networking — manage your own OS and applications','Rent development platform — build and deploy your own applications','Rent complete software application — provider manages everything'],correct:{'IaaS (Infrastructure as a Service)':'Rent virtual servers, storage, networking — manage your own OS and applications','PaaS (Platform as a Service)':'Rent development platform — build and deploy your own applications','SaaS (Software as a Service)':'Rent complete software application — provider manages everything'},fb:'IaaS: most control, most responsibility (AWS EC2, Azure VMs). PaaS: middle ground — build apps without managing servers (AWS Elastic Beanstalk, Heroku). SaaS: least control, least responsibility — fully managed (Salesforce, SAP ByDesign, Microsoft 365). Cloud ERP is typically SaaS — the vendor handles upgrades, security patches, and infrastructure.'},
      {type:'select',id:'F4Q5',text:'Which cloud model gives the organization the MOST control over the computing environment?',opts:['SaaS — the vendor manages everything','PaaS — developer controls the application code','IaaS — the organization controls OS, middleware, and applications','All three models provide equal control'],ans:2,fb:'IaaS provides the most control: you manage OS, runtime, middleware, and applications. The vendor only manages the physical hardware and virtualization. SaaS is the opposite — you control only data and user configuration. The more control → more responsibility for security and maintenance. Organizations with compliance requirements (banking, healthcare) often prefer IaaS for sensitive workloads.'},
      {type:'blank',id:'F4Q6',text:'Cloud computing converts capital expenditure (CapEx) to [B1] expenditure (OpEx). A key risk of SaaS is [B2] on the vendor for data access, uptime, and security.',blanks:[{id:'B1',opts:['operating','investing','financing'],ans:'operating'},{id:'B2',opts:['vendor lock-in and dependency','complete independence','elimination of risk'],ans:'vendor lock-in and dependency'}],fb:'CapEx → OpEx conversion is a major cloud benefit: no large upfront investment, subscription is expensed immediately, improves balance sheet (no large asset). Key SaaS risks: vendor lock-in (hard to migrate data), data security (data leaves your premises), internet dependency (outage = no access), and reduced customization. Organizations must assess these trade-offs carefully.'},
     ]},
    {id:'F5',num:5,title:'Emerging Technologies — FinanceForward Inc.',topics:'RPA · Artificial Intelligence · Blockchain · Technology Selection',
     case:'FinanceForward Inc. is a finance transformation team evaluating three emerging technologies to automate and improve finance operations: Robotic Process Automation (RPA), Artificial Intelligence / Machine Learning (AI/ML), and Blockchain.\n\nThe team must match each technology to the right finance use case and understand the implications for internal controls.',
     exhibit:{headers:['Technology','Core Capability','Key Characteristic'],rows:[['RPA (Robotic Process Automation)','Automates repetitive, rule-based digital tasks','Follows EXACT rules — no learning or judgment'],['AI / Machine Learning','Learns patterns from data — improves over time','Handles unstructured data, exceptions, predictions'],['Blockchain','Distributed, immutable ledger shared across a network','Decentralized, transparent, tamper-proof records'],['Smart Contracts','Self-executing contracts coded on blockchain','Automatic execution when predefined conditions are met'],['Natural Language Processing (NLP)','AI subfield: understands and generates human language','Text analysis, chatbots, document extraction']]},
     questions:[
      {type:'drag',id:'F5Q1',text:'Match each finance task to the BEST technology:',items:['Automatically reconcile 10,000 bank transactions daily using fixed matching rules','Detect unusual journal entries that deviate from normal patterns (fraud detection)','Record an asset transfer on a shared ledger visible to all parties simultaneously','Automatically pay a supplier when goods receipt is confirmed in the system'],zones:['RPA','AI / Machine Learning','Blockchain','Smart Contract'],correct:{'Automatically reconcile 10,000 bank transactions daily using fixed matching rules':'RPA','Detect unusual journal entries that deviate from normal patterns (fraud detection)':'AI / Machine Learning','Record an asset transfer on a shared ledger visible to all parties simultaneously':'Blockchain','Automatically pay a supplier when goods receipt is confirmed in the system':'Smart Contract'},fb:'RPA: rule-based repetitive tasks (reconciliation, data entry, report generation). AI/ML: pattern recognition, anomaly detection, prediction — learns from data. Blockchain: shared trusted ledger for multi-party transactions. Smart Contracts: self-executing on blockchain when conditions are met (goods received → payment released automatically).'},
      {type:'select',id:'F5Q2',text:'Which finance process is MOST suitable for RPA implementation?',opts:['Evaluating the creditworthiness of a new customer (requires judgment)','Extracting invoice data from unstructured vendor emails','Matching purchase orders to invoices to goods receipts (3-way match) using predefined rules','Predicting which accounts receivable will become uncollectible'],ans:2,fb:'RPA works best for: high-volume, repetitive, rule-based, digital processes with structured data. 3-way PO matching = perfect RPA candidate. Creditworthiness requires judgment → AI or human. Extracting from unstructured emails → NLP (AI). Predicting bad debts → ML. RPA does NOT learn or adapt — if the rule changes, the bot must be reprogrammed.'},
      {type:'select',id:'F5Q3',text:'A blockchain record that has already been confirmed CANNOT be altered. This property is called:',opts:['Decentralization — no single point of control','Immutability — records cannot be changed once added to the chain','Transparency — all participants can view all transactions','Consensus — all nodes must agree before adding a record'],ans:1,fb:'IMMUTABILITY is the defining feature of blockchain for audit and control purposes. Once a block is added and confirmed, changing it would require altering every subsequent block AND achieving consensus from 51%+ of the network — computationally infeasible. This makes blockchain ideal for audit trails, supply chain provenance, and financial settlement.'},
      {type:'select',id:'F5Q4',text:'An AI model trained on 3 years of expense reports flags a new expense claim as suspicious because it deviates from the employee\'s historical patterns. This is an example of:',opts:['RPA — following a programmed rule to flag exceptions','Descriptive analytics — summarizing past expense patterns','Machine Learning — the model learned patterns from historical data to detect anomalies','Blockchain — recording the expense on an immutable ledger'],ans:2,fb:'This is MACHINE LEARNING (anomaly detection). The model was trained on historical data and LEARNED what "normal" looks like for each employee. It can flag deviations without being explicitly programmed with rules for every possible fraud scenario. This is a key differentiator from RPA — ML can handle complexity and novel patterns that rules cannot anticipate.'},
      {type:'drag',id:'F5Q5',text:'Classify each statement as describing RPA or AI/Machine Learning:',items:['Follows exact rules — fails if data format changes','Improves accuracy the more data it processes','Cannot handle unstructured data (images, emails)','Can detect patterns humans cannot see in large datasets','Best for high-volume, stable, well-defined processes'],zones:['RPA','AI / Machine Learning'],correct:{'Follows exact rules — fails if data format changes':'RPA','Improves accuracy the more data it processes':'AI / Machine Learning','Cannot handle unstructured data (images, emails)':'RPA','Can detect patterns humans cannot see in large datasets':'AI / Machine Learning','Best for high-volume, stable, well-defined processes':'RPA'},fb:'RPA = automation without intelligence. It does exactly what it is programmed to do — efficiently and tirelessly — but breaks when inputs change. AI/ML = automation WITH intelligence. It learns, adapts, and improves. Together they are powerful: RPA handles structured automation, AI handles exceptions and complexity. "Intelligent Automation" combines both.'},
      {type:'blank',id:'F5Q6',text:'RPA automates [B1], rule-based tasks and cannot handle exceptions or learn. AI/ML learns from [B2] and improves performance over time as more data is available.',blanks:[{id:'B1',opts:['repetitive structured','creative complex','strategic'],ans:'repetitive structured'},{id:'B2',opts:['historical data and patterns','programmed rules','human instructions only'],ans:'historical data and patterns'}],fb:'CMA exam summary: RPA = digital worker following rules (reconciliation, data entry, report distribution). AI/ML = pattern recognition, prediction, anomaly detection (fraud, forecasting, credit risk). Blockchain = immutable shared ledger (supply chain, asset transfers, smart contracts). NLP = text understanding (invoice extraction, contract review, chatbots). Finance professionals must understand when each applies.'},
     ]},
  ]
};

const CBQ_SEC_KEYS = ['C','D','A','B','E','F'];
const CBQ_SEC_META = {
  C:{title:'Performance Management',color:'#7B3FA0'},
  D:{title:'Cost Management',color:'#854F0B'},
  A:{title:'External Financial Reporting',color:'#0C447C'},
  B:{title:'Planning, Budgeting & Forecasting',color:'#185FA5'},
  E:{title:'Internal Controls',color:'#639922'},
  F:{title:'Technology & Analytics',color:'#534AB7'},
};

let CBQ_S = { secIdx:0, view:'list', cbqIdx:0, answers:{}, checked:false, scores:{} };
let cbqDragItem=null, cbqDragFromZone=null, cbqDragQid=null;

function renderCBQ(){
  return `<div style="display:flex;flex-direction:column;height:100%;overflow:hidden">
    <div style="padding:14px 16px 12px;border-bottom:.5px solid #e0e0d8;flex-shrink:0;background:#fff">
      <div style="display:flex;align-items:center;gap:10px">
        <button style="background:none;border:none;cursor:pointer;font-size:26px;color:#888;padding:0;line-height:1;font-family:inherit;flex-shrink:0" onclick="cbqGoBack()">‹</button>
        <div style="flex:1"><div id="hTitle" style="font-size:17px;font-weight:600;color:#1a1a1a">🧩 CBQ Practice</div><div id="hSub" style="font-size:13px;color:#888;margin-top:3px">Case-Based Questions — New 2026 Format</div></div>
      </div>
    </div>
    <div class="cbq-sec-tabs" id="secTabs">
      <button class="cbq-sec-tab active" onclick="cbqSetSection(0)">📊 Section C</button>
      <button class="cbq-sec-tab" onclick="cbqSetSection(1)">💰 Section D</button>
      <button class="cbq-sec-tab" onclick="cbqSetSection(2)">📋 Section A</button>
      <button class="cbq-sec-tab" onclick="cbqSetSection(3)">📅 Section B</button>
      <button class="cbq-sec-tab" onclick="cbqSetSection(4)">🔒 Section E</button>
      <button class="cbq-sec-tab" onclick="cbqSetSection(5)">💡 Section F</button>
    </div>
    <div id="scrollArea" style="flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:20px">
      <div id="listView"></div>
      <div id="detailView" class="hidden"></div>
      <div id="resultsView" class="hidden"></div>
    </div>
    <div class="cbq-bottom-bar hidden" id="bottomBar">
      <span class="score-pill" id="scorePill">0 / 0</span>
      <button class="cbq-btn cbq-btn-primary" id="mainBtn" onclick="cbqMainAction()">Check Answers</button>
    </div>
  </div>`;
}

function cbqInit(){ CBQ_S.view='list'; cbqRenderList(); }

function cbqShow(id){const e=document.getElementById(id);if(e)e.classList.remove('hidden');}
function cbqHide(id){const e=document.getElementById(id);if(e)e.classList.add('hidden');}
function cbqSet(id,txt){const e=document.getElementById(id);if(e)e.textContent=txt;}
function cbqSetBtn(label,cls,fn){const b=document.getElementById('mainBtn');if(!b)return;b.textContent=label;b.className=cls;b.onclick=fn;}

function cbqSetSection(i){
  CBQ_S.secIdx=i; CBQ_S.view='list'; CBQ_S.checked=false;
  document.querySelectorAll('.cbq-sec-tab').forEach((t,j)=>t.classList.toggle('active',i===j));
  cbqRenderList();
}

function cbqGoBack(){
  if(CBQ_S.view==='list') navTo('intro');
  else cbqRenderList();
}

function cbqRenderList(){
  CBQ_S.view='list';
  cbqShow('listView'); cbqHide('detailView'); cbqHide('resultsView');
  cbqShow('secTabs'); cbqHide('bottomBar');
  cbqSet('hTitle','🧩 CBQ Practice');
  cbqSet('hSub','Case-Based Questions — New 2026 Format');

  const key=CBQ_SEC_KEYS[CBQ_S.secIdx];
  const meta=CBQ_SEC_META[key];
  const cbqs=CBQ_DATA[key];

  if(!cbqs||!cbqs.length){
    document.getElementById('listView').innerHTML=`<div style="text-align:center;padding:50px 20px"><div style="font-size:40px;margin-bottom:12px">🚧</div><div style="font-size:17px;font-weight:600;margin-bottom:8px">Coming Soon</div><div style="font-size:14px;color:#888">CBQs for Section ${key} are being prepared.</div></div>`;
    return;
  }
  const totalQs=cbqs.reduce((a,c)=>a+c.questions.length,0);
  document.getElementById('listView').innerHTML=`<div class="cbq-list">
    <div style="margin-bottom:12px"><div style="font-size:13px;font-weight:600;color:${meta.color}">Section ${key} — ${meta.title}</div><div style="font-size:13px;color:#888;margin-top:3px">${cbqs.length} Case-Based Questions · ${totalQs} sub-questions</div></div>
    ${cbqs.map((c,i)=>{const sc=CBQ_S.scores[c.id];const pct=sc?Math.round(sc.s/sc.t*100):null;const badge=sc?(pct>=70?`<span class="cbq-badge" style="background:#EAF3DE;color:#27500A">✓ ${sc.s}/${sc.t} (${pct}%)</span>`:`<span class="cbq-badge" style="background:#FAEEDA;color:#854F0B">⚑ ${sc.s}/${sc.t} (${pct}%)</span>`):`<span class="cbq-badge" style="background:#E6F1FB;color:#185FA5">Not attempted</span>`;
    return`<div class="cbq-card" onclick="cbqOpen(${i})"><div class="cbq-card-top"><div class="cbq-num">${c.num}</div><div style="flex:1"><div style="font-size:15px;font-weight:600;color:#1a1a1a;margin-bottom:2px">${c.title}</div><div style="font-size:13px;color:#888">${c.topics}</div></div><span style="font-size:22px;color:#ccc">›</span></div><div style="display:flex;gap:8px;flex-wrap:wrap">${badge}<span class="cbq-badge" style="background:#f0f0eb;color:#555">${c.questions.length} questions</span></div></div>`;
    }).join('')}
  </div>`;
}

function cbqOpen(i){CBQ_S.cbqIdx=i;CBQ_S.view='detail';CBQ_S.checked=false;CBQ_S.answers={};cbqRenderDetail();}

function cbqRenderDetail(){
  const cbq=CBQ_DATA[CBQ_SEC_KEYS[CBQ_S.secIdx]][CBQ_S.cbqIdx];
  cbqHide('listView');cbqHide('resultsView');cbqShow('detailView');cbqHide('secTabs');cbqShow('bottomBar');
  cbqSet('hTitle',`CBQ ${cbq.num} / ${CBQ_DATA[CBQ_SEC_KEYS[CBQ_S.secIdx]].length}`);
  cbqSet('hSub',cbq.title);
  cbqSetBtn('Check Answers','cbq-btn cbq-btn-primary',cbqMainAction);
  cbqUpdatePill(cbq);
  document.getElementById('detailView').innerHTML=cbqRenderCase(cbq)+cbq.questions.map((q,i)=>cbqRenderQ(q,i)).join('')+'<div style="height:8px"></div>';
  cbqSetupDrag();
  document.getElementById('scrollArea').scrollTop=0;
}

function cbqRenderCase(cbq){
  const ex=cbq.exhibit?`<div class="exhibit-wrap"><div style="font-size:11px;font-weight:700;color:#185FA5;letter-spacing:.6px;padding:6px 12px;background:#E6F1FB;border-bottom:.5px solid #c0d4ea">📊 EXHIBIT</div><table class="exhibit-tbl"><tr>${cbq.exhibit.headers.map(h=>`<th>${h}</th>`).join('')}</tr>${cbq.exhibit.rows.map(r=>`<tr>${r.map((c,i)=>`<td class="${i>0?'num':''}">${c}</td>`).join('')}</tr>`).join('')}</table></div>`:'';
  return`<div class="case-box"><div class="case-label">📄 CASE STUDY</div><div class="case-text">${cbq.case.replace(/\n/g,'<br>')}</div>${ex}</div>`;
}

function cbqRenderQ(q,idx){
  const types={calc:'CALCULATION',select:'SELECT FROM LIST',drag:'DRAG & DROP',blank:'FILL IN BLANK'};
  let body='';
  if(q.type==='calc') body=`<div class="calc-wrap"><span class="calc-prefix">${q.pre||'$'}</span><input type="number" class="calc-input" id="inp_${q.id}" placeholder="0" step="any" oninput="CBQ_S.answers['${q.id}']=this.value"><span style="font-size:14px;color:#888">${q.suf||''}</span></div>`;
  else if(q.type==='select') body=`<div class="select-opts">${q.opts.map((o,i)=>`<div class="select-opt" id="so_${q.id}_${i}" onclick="cbqPickOpt('${q.id}',${i})">${o}</div>`).join('')}</div>`;
  else if(q.type==='drag') body=cbqRenderDragQ(q);
  else if(q.type==='blank') body=cbqRenderBlankQ(q);
  return`<div class="q-block" id="qb_${q.id}"><div class="q-header"><div class="q-num">${idx+1}</div><div style="flex:1"><div style="display:flex;gap:8px;align-items:center;margin-bottom:5px"><span class="q-type-badge">${types[q.type]}</span></div><div class="q-text">${q.text}</div>${q.hint?`<div style="font-size:12px;color:#888;margin-top:4px;font-style:italic">💡 ${q.hint}</div>`:''}</div></div><div class="q-body">${body}<div class="q-fb" id="fb_${q.id}"></div></div></div>`;
}

function cbqRenderDragQ(q){
  const chips=q.items.map(it=>`<div class="drag-chip" data-qid="${q.id}" data-item="${it}" id="chip_${q.id}_${it.replace(/\W/g,'_')}" draggable="true">${it}</div>`).join('');
  const zones=q.zones.map(z=>`<div class="drag-col"><div class="drag-col-label">${z}</div><div class="drop-zone" id="zone_${q.id}_${z.replace(/\W/g,'_')}"></div></div>`).join('');
  return`<div id="dsrc_${q.id}" class="drag-source">${chips}</div><div class="drag-area">${zones}</div>`;
}

function cbqRenderBlankQ(q){
  let txt=q.text;
  q.blanks.forEach(b=>{
    const opts=b.opts.map(o=>`<option value="${o}">${o}</option>`).join('');
    txt=txt.replace(`[${b.id}]`,`<select class="blank-sel" id="bl_${q.id}_${b.id}" onchange="cbqSetBlank('${q.id}','${b.id}',this.value)"><option value="">—select—</option>${opts}</select>`);
  });
  return`<div class="blank-sentence">${txt}</div>`;
}

function cbqPickOpt(qid,i){
  if(CBQ_S.checked)return;
  CBQ_S.answers[qid]=i;
  document.querySelectorAll(`[id^="so_${qid}_"]`).forEach((el,j)=>el.classList.toggle('selected',j===i));
}

function cbqSetBlank(qid,bid,val){
  if(!CBQ_S.answers[qid])CBQ_S.answers[qid]={};
  CBQ_S.answers[qid][bid]=val;
}

function cbqSetupDrag(){
  document.querySelectorAll('.drag-chip').forEach(chip=>{
    chip.addEventListener('dragstart',e=>{
      cbqDragItem=chip.dataset.item; cbqDragQid=chip.dataset.qid;
      cbqDragFromZone=chip.parentElement.id.startsWith('zone_')?chip.parentElement:null;
      e.dataTransfer.effectAllowed='move'; chip.style.opacity='.4';
    });
    chip.addEventListener('dragend',e=>{chip.style.opacity='1';});
  });
  document.querySelectorAll('.drop-zone').forEach(zone=>{
    zone.addEventListener('dragover',e=>{e.preventDefault();zone.classList.add('over');});
    zone.addEventListener('dragleave',()=>zone.classList.remove('over'));
    zone.addEventListener('drop',e=>{
      e.preventDefault();zone.classList.remove('over');
      if(!cbqDragItem)return;
      const parts=zone.id.split('_');parts.shift();parts.shift();
      const q=CBQ_DATA[CBQ_SEC_KEYS[CBQ_S.secIdx]][CBQ_S.cbqIdx].questions.find(x=>x.id===cbqDragQid);
      const matchedZone=q?q.zones.find(z=>z.replace(/\W/g,'_')===parts.join('_')):null;
      if(!matchedZone)return;
      if(!CBQ_S.answers[cbqDragQid])CBQ_S.answers[cbqDragQid]={};
      CBQ_S.answers[cbqDragQid][cbqDragItem]=matchedZone;
      const chip=document.getElementById(`chip_${cbqDragQid}_${cbqDragItem.replace(/\W/g,'_')}`);
      if(chip)zone.appendChild(chip);
      cbqDragItem=null;cbqDragQid=null;
    });
  });
}

function cbqMainAction(){
  if(!CBQ_S.checked) cbqCheck();
  else cbqNextOrResults();
}

function cbqCheck(){
  CBQ_S.checked=true;
  const cbq=CBQ_DATA[CBQ_SEC_KEYS[CBQ_S.secIdx]][CBQ_S.cbqIdx];
  let score=0;
  cbq.questions.forEach(q=>{
    let ok=false;
    const a=CBQ_S.answers[q.id];
    if(q.type==='calc'){
      const n=parseFloat((a+'').replace(/,/g,''));
      ok=!isNaN(n)&&Math.abs(n-q.exact)<=(q.tol||1);
      const el=document.getElementById(`inp_${q.id}`);
      if(el){el.classList.add(ok?'correct':'wrong');el.disabled=true;}
    } else if(q.type==='select'){
      ok=parseInt(a)===q.ans;
      document.querySelectorAll(`[id^="so_${q.id}_"]`).forEach((el,i)=>{
        if(i===q.ans)el.classList.add('correct');
        else if(i===parseInt(a)&&!ok)el.classList.add('wrong');
      });
    } else if(q.type==='drag'){
      const placed=a||{};
      ok=q.items.every(it=>placed[it]===q.correct[it]);
      q.zones.forEach(z=>{
        const zEl=document.getElementById(`zone_${q.id}_${z.replace(/\W/g,'_')}`);
        if(zEl){const exp=q.items.filter(it=>q.correct[it]===z);const got=q.items.filter(it=>(placed[it]||'')===z);const zOk=exp.length===got.length&&exp.every(it=>got.includes(it));zEl.classList.add(zOk?'correct':'wrong');}
      });
    } else if(q.type==='blank'){
      const placed=a||{};
      ok=q.blanks.every(b=>placed[b.id]===b.ans);
      q.blanks.forEach(b=>{
        const el=document.getElementById(`bl_${q.id}_${b.id}`);
        if(el){el.classList.add(placed[b.id]===b.ans?'correct':'wrong');el.disabled=true;}
      });
    }
    if(ok)score++;
    const fb=document.getElementById(`fb_${q.id}`);
    if(fb){fb.textContent=(ok?'✅ Correct! ':'❌ Incorrect. ')+q.fb;fb.className=`q-fb show ${ok?'ok':'no'}`;}
  });
  CBQ_S.scores[cbq.id]={s:score,t:cbq.questions.length};
  cbqUpdatePill(cbq);
  const hasNext=CBQ_S.cbqIdx<CBQ_DATA[CBQ_SEC_KEYS[CBQ_S.secIdx]].length-1;
  cbqSetBtn(hasNext?'Next Case →':'View Results',`cbq-btn ${score/cbq.questions.length>=0.7?'cbq-btn-success':'cbq-btn-primary'}`,cbqMainAction);
}

function cbqNextOrResults(){
  const cbqs=CBQ_DATA[CBQ_SEC_KEYS[CBQ_S.secIdx]];
  if(CBQ_S.cbqIdx<cbqs.length-1){CBQ_S.cbqIdx++;CBQ_S.checked=false;CBQ_S.answers={};cbqRenderDetail();}
  else cbqRenderResults();
}

function cbqUpdatePill(cbq){
  const sc=CBQ_S.scores[cbq.id];
  const el=document.getElementById('scorePill');
  if(el)el.textContent=sc?`${sc.s} / ${sc.t}`:`0 / ${cbq.questions.length}`;
}

function cbqRenderResults(){
  CBQ_S.view='results';
  cbqHide('listView');cbqHide('detailView');cbqShow('resultsView');cbqHide('secTabs');cbqShow('bottomBar');
  cbqSet('hTitle','Results');cbqSet('hSub',CBQ_SEC_META[CBQ_SEC_KEYS[CBQ_S.secIdx]].title);
  const key=CBQ_SEC_KEYS[CBQ_S.secIdx];const cbqs=CBQ_DATA[key];
  let ts=0,tt=0;
  cbqs.forEach(c=>{const sc=CBQ_S.scores[c.id];if(sc){ts+=sc.s;tt+=sc.t;}});
  const pct=tt?Math.round(ts/tt*100):0;
  const icon=pct>=80?'🏆':pct>=60?'📈':'📚';
  const msg=pct>=80?'Excellent!':pct>=60?'Good progress!':'Keep practicing!';
  document.getElementById('resultsView').innerHTML=`<div style="padding:20px 16px;text-align:center">
    <div style="font-size:52px;margin-bottom:10px">${icon}</div>
    <div style="font-size:22px;font-weight:700;color:#1a1a1a;margin-bottom:4px">${msg}</div>
    <div style="font-size:14px;color:#888;margin-bottom:18px">Section ${key} — ${CBQ_SEC_META[key].title}</div>
    <div class="res-grid">
      <div class="res-stat"><div class="res-stat-l">Score</div><div class="res-stat-v" style="color:#185FA5">${pct}%</div></div>
      <div class="res-stat"><div class="res-stat-l">Correct</div><div class="res-stat-v" style="color:#639922">${ts}</div></div>
      <div class="res-stat"><div class="res-stat-l">Questions</div><div class="res-stat-v">${tt}</div></div>
    </div>
    ${cbqs.map(c=>{const sc=CBQ_S.scores[c.id];const p=sc?Math.round(sc.s/sc.t*100):0;
    return`<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:.5px solid #f0f0eb;text-align:left">
      <div style="width:32px;height:32px;border-radius:8px;background:#E6F1FB;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#0C447C;flex-shrink:0">${c.num}</div>
      <div style="flex:1"><div style="font-size:14px;font-weight:500;margin-bottom:4px">${c.title}</div>
      <div style="height:5px;background:#f0f0eb;border-radius:3px;overflow:hidden"><div style="height:100%;width:${p}%;background:${p>=70?'#639922':'#E24B4A'};border-radius:3px"></div></div></div>
      <div style="font-size:13px;font-weight:700;color:${p>=70?'#27500A':'#791F1F'};flex-shrink:0">${sc?sc.s+'/'+sc.t:'—'}</div>
    </div>`;}).join('')}
  </div>`;
  const sp=document.getElementById('scorePill');if(sp)sp.textContent=`${ts} / ${tt}`;
  cbqSetBtn('Try Again','cbq-btn cbq-btn-primary',()=>{CBQ_S.scores={};cbqRenderList();});
}
// ════ END CBQ ════

auth.onAuthStateChanged(async(user)=>{
  if(user){
    STATE.user=user;
    STATE.authLoading=false;
    try{
      const pd=await db.collection('progress').doc(user.uid).get();
      if(pd.exists){STATE.progress=pd.data();try{localStorage.setItem('cma-html-v2',JSON.stringify(pd.data()));}catch{}}
    }catch{}
    try{
      const sd=await db.collection('students').doc(user.uid).get();
      if(sd.exists){try{localStorage.setItem('cma-student-v1',JSON.stringify(sd.data()));}catch{}}
    }catch{}
    try{
      const td=await db.collection('tracker').doc(user.uid).get();
      if(td.exists){try{localStorage.setItem('cma-tracker-v1',JSON.stringify(td.data()));}catch{}}
    }catch{}
    const st=loadStudent();const fb=loadFeedback();
    const isComplete=st&&st.name&&st.mobile&&st.email&&st.country&&st.examdate&&st.photo&&st.university&&st.faculty&&st.gradyear;
    STATE.tab=isComplete?'intro':'register';
    STATE.showProfileWarning=!isComplete;
  } else {
    STATE.user=null;STATE.tab=localStorage.getItem('cma-visited')?'login':'onboarding';STATE.authLoading=false;
  }
  render();
});
</script>
