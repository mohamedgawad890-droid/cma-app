<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CMA Prep — Mohamed Abdelgawad</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f0eb;color:#1a1a1a;overscroll-behavior:none}
#app{display:flex;flex-direction:column;height:100vh;max-width:600px;margin:0 auto;background:#fff;position:relative;overflow:hidden}
@media(min-width:620px){#app{border-radius:16px;margin:16px auto;height:calc(100vh - 32px);box-shadow:0 8px 40px rgba(0,0,0,.12)}}
.content{flex:1;overflow:hidden;display:flex;flex-direction:column}
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:16px}
.pad{padding:0 16px}
/* Nav */
.bottom-nav{display:flex;background:#fff;border-bottom:.5px solid #e0e0d8;flex-shrink:0;padding-top:env(safe-area-inset-top);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}.bottom-nav::-webkit-scrollbar{display:none}
.nav-btn{flex:1;min-width:64px;padding:10px 0 8px;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;color:#999;font-family:inherit;transition:color .15s;position:relative}
.nav-btn.active{color:#185FA5}
.nav-btn.active::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:24px;height:2.5px;background:#185FA5;border-radius:2px}
.nav-icon{font-size:19px;line-height:1}
/* Screen headers */
.sh{padding:16px 16px 12px;border-bottom:.5px solid #e0e0d8;flex-shrink:0}
.sh h2{font-size:18px;font-weight:500}
.sh p{font-size:12px;color:#888;margin-top:3px}
.bh{padding:13px 16px 11px;border-bottom:.5px solid #e0e0d8;display:flex;align-items:center;gap:10px;flex-shrink:0;background:#fff}
.bh-back{background:none;border:none;cursor:pointer;font-size:26px;color:#888;padding:0;line-height:1;font-family:inherit}
/* Cards */
.card{background:#fff;border:.5px solid #e0e0d8;border-radius:12px;padding:14px 16px;margin-bottom:10px}
.card:last-child{margin-bottom:0}
/* Info sections */
.info-section{margin-bottom:20px}
.info-title{font-size:16px;font-weight:500;color:#1a1a1a;margin-bottom:10px;padding-bottom:8px;border-bottom:2px solid #185FA520;display:flex;align-items:center;gap:8px}
.info-p{font-size:14px;color:#555;line-height:1.65;margin-bottom:8px}
/* Stats */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.stat{background:#f5f5f0;border-radius:10px;padding:12px 8px;text-align:center}
.stat-l{font-size:10px;color:#888;margin-bottom:3px}
.stat-v{font-size:20px;font-weight:500}
.stat-s{font-size:10px;color:#888;margin-top:2px}
/* Progress bars */
.pb{height:6px;background:#ebebea;border-radius:3px;overflow:hidden}
.pb-fill{height:100%;border-radius:3px;transition:width .5s ease}
/* Buttons */
.btn{padding:13px;border-radius:10px;font-size:14px;cursor:pointer;font-weight:500;width:100%;border:none;font-family:inherit;transition:opacity .15s}
.btn:active{opacity:.8}
.btn-primary{background:#185FA5;color:#fff}
.btn-outline{background:transparent;border:.5px solid #ccc;color:#333}
.btn-danger{background:#E24B4A;color:#fff}
.btn-sm{padding:9px 0;font-size:13px;border-radius:9px;cursor:pointer;font-weight:500;font-family:inherit;flex:1;border:none}
/* Lesson content */
.lh{font-size:16px;font-weight:500;margin:20px 0 8px;color:#1a1a1a}
.lp{font-size:14px;color:#555;line-height:1.65;margin-bottom:12px}
.formula{border-radius:8px;padding:12px 16px;margin:12px 0}
.formula-lbl{font-size:10px;font-weight:500;letter-spacing:.8px;text-transform:uppercase;margin-bottom:5px}
.formula-txt{font-family:'Courier New',monospace;font-size:13px;font-weight:500;line-height:1.5}
.tip{background:#FAEEDA;border-left:3px solid #EF9F27;border-radius:0 8px 8px 0;padding:12px 16px;margin:14px 0}
.tip-lbl{font-size:10px;font-weight:500;color:#854F0B;letter-spacing:.8px;margin-bottom:5px}
.tip-txt{font-size:13px;color:#633806;line-height:1.55}
.blist{list-style:none;margin:8px 0 14px}
.blist li{display:flex;gap:8px;margin-bottom:8px;font-size:14px;color:#555;line-height:1.5}
.slist{list-style:none;margin:8px 0 14px}
.slist li{display:flex;gap:10px;margin-bottom:10px;font-size:14px;color:#555;line-height:1.5;align-items:flex-start}
.snum{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0;margin-top:1px}
/* Table */
.tbl-wrap{overflow-x:auto;margin:12px 0;border-radius:8px;border:.5px solid #e0e0d8}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{padding:9px 12px;text-align:left;font-weight:500;border-bottom:1px solid rgba(0,0,0,.1)}
.tbl td{padding:8px 12px;border-bottom:.5px solid #e0e0d8;color:#555}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:nth-child(even) td{background:#f8f8f6}
/* Quiz */
.q-opt{padding:12px 14px;border-radius:10px;cursor:pointer;display:flex;gap:10px;align-items:flex-start;margin-bottom:10px;transition:all .2s;border:.5px solid #e0e0d8;background:#f5f5f0}
.q-opt:active{opacity:.8}
.q-circle{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0;margin-top:1px;border:.5px solid #bbb;background:#e5e5e0;color:#666}
.q-text{font-size:14px;color:#1a1a1a;line-height:1.45;flex:1}
/* Chat */
.chat-wrap{display:flex;align-items:flex-end;gap:8px;margin-bottom:14px}
.chat-wrap.user{flex-direction:row-reverse}
.chat-av{width:28px;height:28px;border-radius:50%;background:#E6F1FB;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.chat-bub{max-width:78%;padding:10px 14px;font-size:14px;line-height:1.55;white-space:pre-wrap;word-break:break-word}
.chat-bub.user{border-radius:18px 18px 4px 18px;background:#185FA5;color:#fff}
.chat-bub.assistant{border-radius:4px 18px 18px 18px;background:#f0f0eb;color:#1a1a1a}
/* Intro specific */
.profile-hero{background:linear-gradient(135deg,#0C447C 0%,#185FA5 60%,#378ADD 100%);padding:30px 20px 24px;text-align:center;color:#fff}
.profile-img{width:100px;height:100px;border-radius:50%;border:3px solid rgba(255,255,255,.8);object-fit:cover;margin-bottom:12px;display:block;margin-left:auto;margin-right:auto}
.profile-name{font-size:20px;font-weight:500;margin-bottom:4px}
.profile-title{font-size:13px;opacity:.85;margin-bottom:8px}
.profile-creds{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;margin-top:8px}
.cred-badge{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);border-radius:20px;padding:4px 12px;font-size:11px;font-weight:500}
.welcome-box{background:#EAF3DE;border-left:4px solid #639922;border-radius:0 10px 10px 0;padding:14px 16px;margin:16px 0}
.welcome-box p{font-size:14px;color:#27500A;line-height:1.65}
.part-card{border-radius:10px;overflow:hidden;margin-bottom:10px;border:.5px solid #e0e0d8}
.part-header{padding:12px 14px;display:flex;align-items:center;justify-content:space-between}
.part-topics{padding:2px 14px 12px}
.part-topic{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:.5px solid rgba(255,255,255,.15);font-size:13px}
.part-topic:last-child{border-bottom:none}
.cost-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:.5px solid #e0e0d8;font-size:14px}
.cost-row:last-child{border-bottom:none}
.cost-total{background:#E6F1FB;border-radius:8px;padding:12px 14px;margin-top:10px;display:flex;justify-content:space-between;font-weight:500;font-size:14px;color:#0C447C}
.window-card{display:flex;align-items:center;gap:12px;padding:12px 14px;background:#f5f5f0;border-radius:10px;margin-bottom:8px}
.window-month{font-size:13px;font-weight:500;color:#185FA5;width:120px;flex-shrink:0}
.action-step{display:flex;gap:12px;margin-bottom:14px;align-items:flex-start}
.action-num{width:28px;height:28px;border-radius:50%;background:#185FA5;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;flex-shrink:0;margin-top:1px}
.action-content h4{font-size:14px;font-weight:500;color:#1a1a1a;margin-bottom:3px}
.action-content p{font-size:13px;color:#555;line-height:1.5}
.score-circle{width:80px;height:80px;border-radius:50%;border:4px solid #185FA5;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 12px}
.ellipsis{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row{display:flex;align-items:center;gap:10px}
.row-sb{display:flex;align-items:center;justify-content:space-between}
.badge{font-size:11px;font-weight:500;padding:3px 9px;border-radius:6px;white-space:nowrap}
.sect-icon{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
</style>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  {id:1,title:"External Financial Reporting",weight:15,emoji:"📋",bar:"#185FA5",bg:"#E6F1FB",text:"#1A5A9E",strong:"#0C447C",

      {id:"1-1",title:"Overview of Financial Statements",dur:"30 min",
        blocks:[
          {t:"h",v:"The Four Core Financial Statements"},
          {t:"p",v:"External financial reporting communicates a company's financial position and performance to outside stakeholders — investors, creditors, regulators, and the public. The CMA exam tests deep knowledge of four core statements and how they interrelate."},
          {t:"b",v:["Balance Sheet (Statement of Financial Position): Snapshot of assets, liabilities, and equity at a point in time","Income Statement (P&L): Revenues and expenses over a period — shows profitability","Statement of Cash Flows: Cash inflows/outflows from Operating, Investing, and Financing activities","Statement of Changes in Equity: Changes in retained earnings, paid-in capital, and other equity components"]},
          {t:"h",v:"The Balance Sheet — Accounting Equation"},
          {t:"f",l:"Accounting Equation",v:"Assets = Liabilities + Shareholders' Equity"},
          {t:"tbl",h:["Category","Examples","Classification"],r:[["Current Assets","Cash, AR, Inventory, Prepaid Expenses","Due within 1 year"],["Non-Current Assets","PP&E, Intangibles, Long-term Investments","Held beyond 1 year"],["Current Liabilities","AP, Accrued Expenses, Short-term Debt","Due within 1 year"],["Non-Current Liabilities","Long-term Debt, Deferred Tax","Due beyond 1 year"],["Equity","Common Stock, APIC, Retained Earnings","Residual interest"]]},
          {t:"h",v:"The Income Statement"},
          {t:"f",l:"Net Income Formula",v:"Net Income = Revenues - Cost of Goods Sold - Operating Expenses - Interest - Taxes"},
          {t:"p",v:"The income statement is prepared on the ACCRUAL basis — revenues are recognized when EARNED and expenses when INCURRED, regardless of when cash changes hands."},
          {t:"h",v:"The Statement of Cash Flows"},
          {t:"tbl",h:["Section","Contents","Key Items"],r:[["Operating Activities","Core business cash flows","Net income adjusted for non-cash items, working capital changes"],["Investing Activities","Long-term asset transactions","Purchase/sale of PP&E, investments"],["Financing Activities","Debt and equity transactions","Loans, stock issuance, dividends paid"]]},
          {t:"h",v:"Accrual vs Cash Basis"},
          {t:"b",v:["Accrual Basis: Revenue recognized when earned; expenses when incurred. Required under GAAP/IFRS.","Cash Basis: Revenue recorded when cash received; expenses when cash paid. Only used for small businesses or tax purposes."]},
          {t:"h",v:"Key Ratios from Financial Statements"},
          {t:"tbl",h:["Ratio","Formula","Measures"],r:[["Current Ratio","Current Assets / Current Liabilities","Short-term liquidity"],["Debt-to-Equity","Total Debt / Total Equity","Financial leverage"],["Net Profit Margin","Net Income / Revenue","Profitability"],["Return on Assets (ROA)","Net Income / Total Assets","Asset efficiency"],["Earnings Per Share","(Net Income - Preferred Dividends) / Shares","Per-share profitability"]]},
          {t:"tip",v:"Exam Tips: Assets = Liabilities + Equity ALWAYS balances. Net Income flows from Income Statement → Retained Earnings on Balance Sheet. Cash from Operations starts with Net Income (indirect method). Non-cash items (depreciation) are ADDED BACK in operating activities. GAAP requires accrual basis for external reporting."}

  {id:2,title:"Planning, Budgeting & Forecasting",weight:20,emoji:"📊",bar:"#639922",bg:"#EAF3DE",text:"#4A7A1A",strong:"#27500A",
    lessons:[
      {id:"2-1",title:"The Master Budget: Overview & Components",dur:"30 min",
        blocks:[
          {t:"h",v:"What Is the Master Budget?"},
          {t:"p",v:"The master budget is a comprehensive financial plan that integrates ALL departmental budgets into one coordinated document. It serves as the financial roadmap for the entire organization for a specific period (usually one year)."},
          {t:"h",v:"Two Main Components"},
          {t:"b",v:["Operating Budget: Plans for revenues and expenses — results in a Budgeted Income Statement","Financial Budget: Plans for cash flows and balance sheet items — includes the Cash Budget and Budgeted Balance Sheet"]},
          {t:"h",v:"The Operating Budget — Sequence"},
          {t:"s",v:["Step 1: Sales Budget — the STARTING POINT. All other budgets flow from this.","Step 2: Production Budget = Sales Units + Desired Ending Inventory - Beginning Inventory","Step 3: Direct Materials Budget = Production Needs + Desired Ending DM - Beginning DM","Step 4: Direct Labor Budget = Production Units x Standard Hours x Labor Rate","Step 5: Manufacturing Overhead Budget = Fixed OH + (Variable OH Rate x Activity)","Step 6: Selling & Administrative Budget","Step 7: Budgeted Income Statement — combines all above"]},
          {t:"f",l:"Production Budget Formula",v:"Required Production = Budgeted Sales + Desired Ending FG Inventory - Beginning FG Inventory"},
          {t:"h",v:"The Financial Budget — Sequence"},
          {t:"s",v:["Step 1: Capital Expenditures Budget — planned asset purchases","Step 2: Cash Budget — projects cash inflows and outflows, shows if financing needed","Step 3: Budgeted Balance Sheet — final output"]},
          {t:"h",v:"Cash Budget Structure"},
          {t:"tbl",h:["Section","Items"],r:[["Beginning Cash Balance","Cash on hand at period start"],["+ Cash Receipts","Collections from customers, other inflows"],["- Cash Disbursements","Payments for materials, labor, OH, SGA, taxes"],["= Cash Surplus / Deficit","Before financing"],["+/- Financing","Borrowings/repayments to maintain minimum balance"],["= Ending Cash Balance","Must meet minimum cash requirement"]]},
          {t:"h",v:"Types of Budgets"},
          {t:"b",v:["Static Budget: Fixed at one activity level — doesn't change with actual output","Flexible Budget: Adjusts to ACTUAL activity level — better for performance evaluation","Zero-Based Budget (ZBB): Every expense must be justified from zero each period — no automatic carryover","Rolling (Continuous) Budget: Always covers a fixed future period (e.g., 12 months) by adding a new month as each month ends"]},
          {t:"tip",v:"Exam Tips: Sales Budget is ALWAYS first. Production Budget feeds into Materials, Labor, and OH budgets. Cash Budget is the most tested Financial Budget component. Flexible Budget = more useful for variance analysis. ZBB eliminates budgetary slack. Rolling budgets improve planning continuity. Budgetary slack = intentionally underestimating revenue or overestimating costs."}
        ],
        quizzes:[]}
    ]},
  {id:3,title:"Performance Management",weight:20,emoji:"🎯",bar:"#7B3FA0",bg:"#F3E8FF",text:"#6A2E8F",strong:"#4A1F70",
    lessons:[
      {id:"3-1",title:"Flexible Budgets & Performance Evaluation",dur:"25 min",
        blocks:[
          {t:"h",v:"Static vs Flexible Budget"},
          {t:"p",v:"A static budget is prepared for ONE level of activity and doesn't change. A flexible budget ADJUSTS to the actual level of activity, making performance comparison meaningful. You cannot fairly compare actual costs at 9,000 units to a static budget prepared for 10,000 units."},
          {t:"tbl",h:["Feature","Static Budget","Flexible Budget"],r:[["Activity level","Fixed (one level)","Adjusts to actual output"],["Use","Planning","Performance evaluation"],["Variance analysis","Less meaningful","More meaningful and fair"],["Variable costs","Set at planned volume","Recalculated at actual volume"],["Fixed costs","Same","Same (unchanged)"]
]},
          {t:"h",v:"Flexible Budget Formula"},
          {t:"f",l:"Flexible Budget Amount",v:"Flexible Budget Cost = (Variable Cost Rate x Actual Activity) + Total Fixed Costs"},
          {t:"h",v:"Variance Analysis Framework"},
          {t:"f",l:"Total Budget Variance",v:"Total Variance = Actual Cost - Flexible Budget Cost"},
          {t:"p",v:"Example: Static budget for 10,000 units. Actual production: 9,000 units. Variable cost rate $5/unit. Fixed costs $20,000."},
          {t:"s",v:["Static Budget cost = ($5 x 10,000) + $20,000 = $70,000","Flexible Budget cost = ($5 x 9,000) + $20,000 = $65,000","Actual cost = $63,000","Variance vs Static = $63,000 - $70,000 = $7,000 Favorable (misleading)","Variance vs Flexible = $63,000 - $65,000 = $2,000 Favorable (fair comparison)"]},
          {t:"h",v:"The Balanced Scorecard"},
          {t:"p",v:"The Balanced Scorecard (BSC) measures performance across FOUR perspectives, linking day-to-day operations to long-term strategy:"},
          {t:"tbl",h:["Perspective","Question","Example Metrics"],r:[["Financial","How do we look to shareholders?","Revenue growth, ROI, EVA"],["Customer","How do customers see us?","Satisfaction scores, market share, retention"],["Internal Business Process","What must we excel at?","Cycle time, quality, defect rates"],["Learning & Growth","Can we continue to improve?","Employee training hours, innovation rate"]]},
          {t:"b",v:["BSC links strategy to operational measures across four dimensions","Prevents over-focus on financial metrics alone","Lagging indicators = financial results (past performance)","Leading indicators = process/learning metrics (predict future performance)"]},
          {t:"h",v:"Responsibility Accounting"},
          {t:"b",v:["Cost Center: Responsible for COSTS only (e.g., production department)","Revenue Center: Responsible for REVENUES only (e.g., sales team)","Profit Center: Responsible for both REVENUES and COSTS (e.g., a product division)","Investment Center: Responsible for revenues, costs, AND investment (e.g., a subsidiary) — measured by ROI or EVA"]},
          {t:"tip",v:"Exam Tips: Flexible budget is used for PERFORMANCE EVALUATION — comparing actual to flexible is the fair comparison. Static budget is used for PLANNING. Balanced Scorecard has 4 perspectives — Financial, Customer, Internal Process, Learning & Growth. Investment centers use ROI = Operating Income / Invested Assets. EVA = NOPAT - (WACC x Invested Capital)."}
        ],

  {id:4,title:"Cost Management",weight:15,emoji:"💰",bar:"#EF9F27",bg:"#FAEEDA",text:"#BA7517",strong:"#854F0B",
    lessons:[
      {id:"4-1",title:"Cost Behavior: Fixed, Variable & Mixed Costs",dur:"25 min",
        blocks:[
          {t:"h",v:"What Is Cost Behavior?"},
          {t:"p",v:"Cost behavior describes how costs change as activity levels change. Understanding cost behavior is essential for budgeting, decision-making, and performance evaluation."},
          {t:"h",v:"1. Variable Costs"},
          {t:"p",v:"Variable costs change proportionally with activity. They are CONSTANT PER UNIT but change in TOTAL."},
          {t:"tbl",h:["Activity","Total Variable Cost","Cost Per Unit"],r:[["1,000 units","$5,000","$5"],["2,000 units","$10,000","$5"],["3,000 units","$15,000","$5"]]},
          {t:"b",v:["Examples: Direct Materials, Sales Commissions, Packaging","Key rule: Total changes — Per unit stays the same"]},
          {t:"h",v:"2. Fixed Costs"},
          {t:"p",v:"Fixed costs remain CONSTANT IN TOTAL regardless of activity. Cost per unit decreases as production increases."},
          {t:"tbl",h:["Activity","Total Fixed Cost","Cost Per Unit"],r:[["1,000 units","$10,000","$10.00"],["2,000 units","$10,000","$5.00"],["4,000 units","$10,000","$2.50"]]},
          {t:"b",v:["Examples: Rent, Insurance, Salaries, Depreciation","Key rule: Total stays the same — Per unit changes"]},
          {t:"h",v:"3. Mixed Costs (Semi-Variable)"},
          {t:"p",v:"Mixed costs contain BOTH a fixed AND variable component. They must be separated using analytical methods."},
          {t:"f",l:"Mixed Cost Formula",v:"Y = a + bX   |   Y = Total Cost, a = Fixed, b = Variable Rate, X = Activity"},
          {t:"p",v:"Example: Electricity bill = $500 base (fixed) + $0.10 per KWH (variable). At 3,000 KWH: Y = $500 + ($0.10 x 3,000) = $800."},
          {t:"h",v:"High-Low Method"},
          {t:"s",v:["Step 1: Variable Rate = (High Cost - Low Cost) / (High Activity - Low Activity)","Step 2: Fixed Cost = Total Cost at High Point - (Variable Rate x High Activity)","Step 3: Write the equation: Y = Fixed Cost + (Variable Rate x X)"]},
          {t:"p",v:"Example: High = 10,000 units / $45,000. Low = 4,000 units / $21,000. Variable Rate = ($45,000-$21,000)/(10,000-4,000) = $4.00/unit. Fixed Cost = $45,000 - ($4 x 10,000) = $5,000. Equation: Y = $5,000 + $4.00X"},
          {t:"tbl",h:["Cost Type","Total Behavior","Per Unit Behavior","Examples"],r:[["Variable","Changes proportionally","Constant","Direct Materials, Commissions"],["Fixed","Constant","Changes (inversely)","Rent, Insurance, Salaries"],["Mixed","Changes (partially)","Changes","Electricity, Phone, Maintenance"]]},
          {t:"tip",v:"Exam Tips: Variable cost = constant per unit. Fixed cost = constant in total. High-Low weakness = uses only 2 data points. Regression Analysis is more accurate. Sunk costs = ALWAYS irrelevant. Opportunity costs = ALWAYS relevant."}
        ],
        quizzes:[
          {q:"A cost that is constant per unit but changes in total with activity is a:",o:["Fixed cost","Variable cost","Mixed cost","Step cost"],a:1,e:"Variable costs are CONSTANT PER UNIT but change PROPORTIONALLY in total. If production doubles, total variable cost doubles but cost per unit stays the same."},
          {q:"High: 8,000 units / $38,000. Low: 2,000 units / $14,000. Variable rate per unit =",o:["$3.00","$4.00","$4.75","$6.33"],a:1,e:"Variable Rate = ($38,000 - $14,000) / (8,000 - 2,000) = $24,000 / 6,000 = $4.00 per unit."},
          {q:"Using the data above (variable rate $4.00), Fixed Cost =",o:["$6,000","$8,000","$10,000","$14,000"],a:0,e:"FC = $38,000 - ($4 x 8,000) = $38,000 - $32,000 = $6,000. Verify: $14,000 - ($4 x 2,000) = $6,000."},
          {q:"Monthly rent of $10,000 regardless of production level is a:",o:["Variable cost","Mixed cost","Fixed cost","Step cost"],a:2,e:"Fixed cost: constant in TOTAL regardless of activity. Rent does not change whether you produce 100 or 10,000 units."},
          {q:"Y = $8,000 + $6X. At 3,000 units, Total Cost =",o:["$18,000","$24,000","$26,000","$30,000"],a:2,e:"Y = $8,000 + ($6 x 3,000) = $8,000 + $18,000 = $26,000."},
          {q:"Fixed cost per unit DECREASES when:",o:["Fixed costs increase in total","Variable costs decrease","Production volume INCREASES","Selling price increases"],a:2,e:"Fixed costs are constant in total. As production INCREASES, the same total fixed cost is spread over MORE units, so fixed cost per unit DECREASES."},
          {q:"The relevant range is best described as:",o:["The profitable activity range","The range where cost behavior assumptions are VALID","The break-even range","The range of acceptable selling prices"],a:1,e:"Relevant range: the activity range within which fixed and variable cost assumptions hold true. Outside this range, cost behavior patterns change."},
          {q:"A salesperson earns $2,000/month base + $50 commission per sale. This is a:",o:["Fixed cost","Variable cost","Mixed cost","Step cost"],a:2,e:"Mixed cost: FIXED component ($2,000 base) AND VARIABLE component ($50 per sale). Formula: Y = $2,000 + $50X."},
          {q:"The main WEAKNESS of the High-Low method is:",o:["It requires advanced software","It uses only 2 data points which may not be representative","It cannot calculate fixed costs","It only works for variable costs"],a:1,e:"High-Low weakness: uses ONLY 2 data points. If either is an outlier, the entire calculation is distorted. Regression Analysis uses ALL data points and is more reliable."},
          {q:"A factory adds a second supervisor when production exceeds 500 units/day. This is a:",o:["Variable cost","Mixed cost","Fixed cost","Step fixed cost"],a:3,e:"Step fixed cost: constant within a range then JUMPS to a higher level when activity crosses a threshold. Different from variable (no per-unit rate) and mixed (no continuous variable component)."}
        ]},
      {id:"4-2",title:"Cost-Volume-Profit (CVP) Analysis",dur:"30 min",
        blocks:[
          {t:"h",v:"What Is CVP Analysis?"},
          {t:"p",v:"Cost-Volume-Profit (CVP) analysis examines the relationship between costs, volume, and profit. It answers critical questions: How many units must we sell to break even? What sales are needed to reach a target profit? What happens to profit if sales drop 10%?"},
          {t:"h",v:"Key CVP Formulas"},
          {t:"f",l:"Contribution Margin (CM)",v:"CM = Sales Price per Unit - Variable Cost per Unit"},
          {t:"f",l:"CM Ratio",v:"CM Ratio = CM per Unit / Sales Price per Unit   OR   Total CM / Total Sales"},
          {t:"f",l:"Break-Even Point (Units)",v:"BEP Units = Total Fixed Costs / CM per Unit"},
          {t:"f",l:"Break-Even Point (Dollars)",v:"BEP Dollars = Total Fixed Costs / CM Ratio"},
          {t:"f",l:"Target Profit (Units)",v:"Units = (Fixed Costs + Target Profit) / CM per Unit"},
          {t:"f",l:"Target Profit (After Tax)",v:"Units = (Fixed Costs + [Target After-Tax Profit / (1 - Tax Rate)]) / CM per Unit"},
          {t:"h",v:"Example"},
          {t:"p",v:"Selling Price = $50. Variable Cost = $30. Fixed Costs = $40,000. Tax Rate = 25%."},
          {t:"s",v:["CM per Unit = $50 - $30 = $20","CM Ratio = $20 / $50 = 40%","BEP Units = $40,000 / $20 = 2,000 units","BEP Dollars = $40,000 / 0.40 = $100,000","Target Profit $15,000 after tax: Pre-tax = $15,000/(1-0.25) = $20,000. Units = ($40,000+$20,000)/$20 = 3,000 units"]},
          {t:"h",v:"Margin of Safety"},
          {t:"f",l:"Margin of Safety",v:"MOS = Actual Sales - Break-Even Sales   |   MOS % = MOS / Actual Sales x 100"},
          {t:"p",v:"The Margin of Safety shows how much sales can decline before the company reaches the break-even point. Higher MOS = lower risk."},
          {t:"h",v:"Operating Leverage"},
          {t:"f",l:"Degree of Operating Leverage (DOL)",v:"DOL = Total Contribution Margin / Operating Income"},
          {t:"p",v:"High DOL means a small % increase in sales causes a LARGE % increase in profit. It also means high risk — a small sales drop causes a large profit drop."},
          {t:"h",v:"Multi-Product CVP"},
          {t:"p",v:"When a company sells multiple products, use the WEIGHTED AVERAGE CM ratio based on the sales mix. BEP Dollars = Fixed Costs / Weighted Average CM Ratio."},
          {t:"tbl",h:["Metric","Formula","What It Tells You"],r:[["CM per Unit","Price - Variable Cost","Profit contribution per unit sold"],["CM Ratio","CM / Price","% of each sales dollar covering fixed costs"],["BEP Units","FC / CM per Unit","Minimum units to avoid a loss"],["Margin of Safety","Actual Sales - BEP Sales","Buffer before losses begin"],["DOL","Total CM / Operating Income","Profit sensitivity to sales changes"]]},
          {t:"tip",v:"Exam Tips: Contribution Margin covers FIXED costs first, then generates profit. CM Ratio x Change in Sales = Change in Operating Income. At BEP, operating income = $0. Fixed costs do NOT affect CM per unit. Tax affects target profit calculation only."}
        ],
        quizzes:[
          {q:"Selling price $80, variable cost $50. Contribution Margin per unit =",o:["$50","$30","$80","$20"],a:1,e:"CM = Selling Price - Variable Cost = $80 - $50 = $30. CM is the amount each unit contributes toward covering fixed costs and generating profit."},
          {q:"Fixed costs $60,000. CM per unit $25. Break-Even Point in units =",o:["1,500","2,000","2,400","3,000"],a:2,e:"BEP = Fixed Costs / CM per Unit = $60,000 / $25 = 2,400 units."},
          {q:"Selling price $100, variable cost $40. CM Ratio =",o:["40%","60%","25%","67%"],a:1,e:"CM = $100 - $40 = $60. CM Ratio = $60 / $100 = 60%. This means 60 cents of every sales dollar covers fixed costs and profit."},
          {q:"Fixed costs $50,000. CM Ratio 40%. Break-Even Sales Dollars =",o:["$100,000","$120,000","$125,000","$150,000"],a:2,e:"BEP Dollars = Fixed Costs / CM Ratio = $50,000 / 0.40 = $125,000."},
          {q:"Actual sales $200,000. BEP sales $150,000. Margin of Safety % =",o:["25%","75%","50%","33%"],a:0,e:"MOS = $200,000 - $150,000 = $50,000. MOS % = $50,000 / $200,000 = 25%. Sales can drop 25% before the company breaks even."},
          {q:"Fixed costs $40,000. Target profit $20,000. CM per unit $15. Required units =",o:["2,667","3,333","4,000","1,333"],a:2,e:"Units = (FC + Target Profit) / CM = ($40,000 + $20,000) / $15 = $60,000 / $15 = 4,000 units."},
          {q:"Total CM $120,000. Operating Income $40,000. Degree of Operating Leverage =",o:["0.33","3.0","2.5","4.0"],a:1,e:"DOL = Total CM / Operating Income = $120,000 / $40,000 = 3.0. A 10% increase in sales would increase operating income by 30% (10% x 3.0)."},
          {q:"Tax rate 30%. Target after-tax profit $14,000. Required pre-tax profit =",o:["$9,800","$14,000","$18,200","$20,000"],a:3,e:"Pre-tax profit = After-tax profit / (1 - Tax Rate) = $14,000 / (1 - 0.30) = $14,000 / 0.70 = $20,000."},
          {q:"If fixed costs INCREASE, the break-even point:",o:["Decreases","Stays the same","Increases","Cannot be determined"],a:2,e:"Higher fixed costs mean MORE units/revenue needed to cover those costs. BEP = Fixed Costs / CM, so if Fixed Costs increase, BEP increases."},
          {q:"CM Ratio is 35%. If sales increase by $100,000, operating income increases by:",o:["$100,000","$65,000","$35,000","$50,000"],a:2,e:"Change in Operating Income = CM Ratio x Change in Sales = 35% x $100,000 = $35,000. Fixed costs do not change, so all additional CM flows to profit."}
        ]},
      {id:"4-3",title:"Job Order Costing",dur:"25 min",
        blocks:[
          {t:"h",v:"What Is Job Order Costing?"},
          {t:"p",v:"Job Order Costing accumulates costs separately for each unique job, order, or batch. It is used when products are distinct and customizable — such as custom furniture, construction projects, printing, or professional services."},
          {t:"h",v:"Three Components of Product Cost"},
          {t:"b",v:["Direct Materials (DM): Raw materials traced directly to the job","Direct Labor (DL): Labor wages directly associated with the job","Manufacturing Overhead (MOH): Indirect costs applied using a predetermined rate"]},
          {t:"f",l:"Total Job Cost",v:"Total Job Cost = Direct Materials + Direct Labor + Applied Overhead"},
          {t:"h",v:"Predetermined Overhead Rate (POHR)"},
          {t:"p",v:"Since actual overhead is not known during production, companies calculate a POHR at the start of the year to apply overhead to jobs."},
          {t:"f",l:"Predetermined Overhead Rate",v:"POHR = Estimated Total Manufacturing Overhead / Estimated Total Activity Base (e.g., Direct Labor Hours)"},
          {t:"f",l:"Applied Overhead",v:"Applied OH = POHR x Actual Activity Used by the Job"},
          {t:"h",v:"Over/Under Applied Overhead"},
          {t:"f",l:"Over/Under Applied Overhead",v:"Difference = Applied Overhead - Actual Overhead | Over-applied: Applied > Actual | Under-applied: Applied < Actual"},
          {t:"p",v:"At year-end, the difference is disposed of — typically closed to Cost of Goods Sold (COGS) for small amounts, or prorated between WIP, FG, and COGS for large amounts."},
          {t:"h",v:"Job Cost Sheet"},
          {t:"p",v:"Each job has a Job Cost Sheet tracking all DM, DL, and OH charges. This is the subsidiary ledger for Work-in-Process (WIP) inventory."},
          {t:"h",v:"Worked Example"},
          {t:"p",v:"Estimated MOH: $240,000. Estimated DL Hours: 60,000. POHR = $240,000 / 60,000 = $4 per DLH. Job #101: DM $5,000, DL $3,000 (750 hrs), Applied OH = 750 x $4 = $3,000. Total Job Cost = $5,000 + $3,000 + $3,000 = $11,000."},
          {t:"tbl",h:["Item","Amount","Notes"],r:[["Direct Materials","$5,000","Traced to job via requisition"],["Direct Labor","$3,000","750 hrs x $4/hr"],["Applied Overhead","$3,000","750 DLH x $4 POHR"],["Total Job Cost","$11,000","Cost of Job #101"]]},
          {t:"tip",v:"Exam Tips: Job costing = UNIQUE products. Process costing = IDENTICAL products. POHR is set at YEAR START using estimates. Over-applied = CREDIT balance in MOH account. Under-applied = DEBIT balance. Closed to COGS at year-end."}
        ],
        quizzes:[
          {q:"Job Order Costing is most appropriate for:",o:["Mass production of identical products","Petroleum refining","Custom furniture manufacturing","Grain processing"],a:2,e:"Job costing is used when each unit or batch is unique and distinct. Custom furniture is made to order. Mass/identical production uses Process Costing."},
          {q:"Estimated overhead $300,000. Estimated machine hours 50,000. POHR per machine hour =",o:["$4","$5","$6","$7"],a:2,e:"POHR = Estimated MOH / Estimated Activity = $300,000 / 50,000 MH = $6 per machine hour."},
          {q:"POHR = $8/DLH. A job uses 200 DLH. Applied Overhead =",o:["$200","$800","$1,600","$400"],a:2,e:"Applied OH = POHR x Actual Activity = $8 x 200 DLH = $1,600."},
          {q:"Actual overhead incurred $180,000. Applied overhead $175,000. Result:",o:["$5,000 over-applied","$5,000 under-applied","$355,000 total overhead","No difference"],a:1,e:"Under-applied = Applied < Actual. $175,000 - $180,000 = -$5,000. We applied $5,000 LESS than actual. Under-applied = DEBIT balance in MOH."},
          {q:"Applied overhead $220,000. Actual overhead $200,000. The MOH account has a:",o:["$20,000 debit balance","$20,000 credit balance","$420,000 balance","Zero balance"],a:1,e:"Over-applied: Applied ($220,000) > Actual ($200,000). Over-applied = CREDIT balance of $20,000 in MOH account."},
          {q:"Job Cost Sheet: DM $8,000, DL $4,000, Applied OH $6,000. Total Job Cost =",o:["$12,000","$14,000","$18,000","$10,000"],a:2,e:"Total Job Cost = DM + DL + Applied OH = $8,000 + $4,000 + $6,000 = $18,000."},
          {q:"Under-applied overhead at year-end is typically:",o:["Added to Retained Earnings","Closed to Cost of Goods Sold (COGS)","Carried forward to next year","Subtracted from Sales Revenue"],a:1,e:"Small over/under-applied OH is closed to COGS. Large amounts are prorated between WIP, Finished Goods, and COGS."},
          {q:"The source document used to charge Direct Materials to a specific job is a:",o:["Time ticket","Materials Requisition Form","Purchase Order","Receiving Report"],a:1,e:"Materials Requisition Form: authorizes release of materials from the storeroom to production and identifies which job they belong to."},
          {q:"Job Cost Sheets are the subsidiary ledger for:",o:["Accounts Payable","Finished Goods Inventory","Work-in-Process (WIP) Inventory","Cost of Goods Sold"],a:2,e:"Job Cost Sheets = subsidiary ledger for WIP. Each job has its own sheet tracking DM, DL, and OH. The sum of all job cost sheets = total WIP balance."},
          {q:"A company uses DL cost as the overhead base. DL cost $50,000. Overhead rate 80%. Applied overhead =",o:["$40,000","$50,000","$62,500","$90,000"],a:0,e:"Applied OH = OH Rate x DL Cost = 80% x $50,000 = $40,000. When using DL cost as the base, the rate is a percentage of DL cost."}
        ]},
      {id:"4-4",title:"Process Costing",dur:"25 min",
        blocks:[
          {t:"h",v:"What Is Process Costing?"},
          {t:"p",v:"Process Costing is used when companies produce LARGE QUANTITIES of IDENTICAL products continuously through a series of processes. Examples: chemicals, paint, beverages, paper, cement, and food processing."},
          {t:"h",v:"Key Difference from Job Costing"},
          {t:"tbl",h:["Feature","Job Order Costing","Process Costing"],r:[["Products","Unique / custom","Identical / homogeneous"],["Cost tracking","Per job","Per process/department"],["Unit cost","Calculated per job","Average cost per equivalent unit"],["Examples","Custom furniture, construction","Oil refining, beverages, cement"]]},
          {t:"h",v:"Equivalent Units of Production (EUP)"},
          {t:"p",v:"Since some units are partially complete at period-end (Work-in-Process), we convert them to EQUIVALENT UNITS — the number of complete units that could have been produced with the same effort."},
          {t:"f",l:"Equivalent Units (Weighted Average)",v:"EUP = Completed Units + (Ending WIP Units x % Completion)"},
          {t:"p",v:"IMPORTANT: Materials and Conversion costs may have DIFFERENT completion %s. Materials are often added at the START (100%) while conversion (labor + overhead) accumulates gradually."},
          {t:"h",v:"Weighted Average Method vs FIFO"},
          {t:"b",v:["Weighted Average: Combines beginning WIP costs with current period costs. Simpler. EUP = units completed + ending WIP x %complete.","FIFO: Keeps beginning WIP costs separate. EUP = (Beginning WIP x % left to complete) + Units started and completed + (Ending WIP x % complete)."]},
          {t:"h",v:"5-Step Process Costing Procedure"},
          {t:"s",v:["Step 1: Summarize the flow of physical units","Step 2: Calculate Equivalent Units of Production (EUP)","Step 3: Summarize total costs to account for","Step 4: Calculate cost per equivalent unit","Step 5: Assign costs to completed units and ending WIP"]},
          {t:"h",v:"Example (Weighted Average)"},
          {t:"p",v:"Completed: 3,800 units. Ending WIP: 700 units (60% conversion). Total costs: DM $42,000, Conversion $28,000. DM added at start (100%)."},
          {t:"s",v:["EUP (DM): 3,800 + (700 x 100%) = 4,500 units","EUP (Conversion): 3,800 + (700 x 60%) = 4,220 units","Cost/EUP (DM): $42,000 / 4,500 = $9.33","Cost/EUP (Conv): $28,000 / 4,220 = $6.64","Total Cost/Unit: $9.33 + $6.64 = $15.97"]},
          {t:"tip",v:"Exam Tips: Process costing = identical products. Job costing = unique products. Weighted average is simpler. FIFO is more accurate. Materials at START = 100% complete. Conversion accumulates gradually. Normal spoilage = product cost. Abnormal spoilage = period cost (loss)."}
        ],
        quizzes:[
          {q:"Process costing is MOST appropriate for:",o:["Building construction","Custom aircraft manufacturing","Oil refining","Audit engagements"],a:2,e:"Oil refining produces homogeneous (identical) products continuously. Process costing is designed for mass production of identical items."},
          {q:"Completed units 5,000. Ending WIP 800 units at 50% conversion completion. EUP (Conversion) =",o:["5,400","5,800","5,000","4,600"],a:0,e:"EUP = 5,000 + (800 x 50%) = 5,000 + 400 = 5,400 equivalent units of conversion."},
          {q:"DM added at the start. Ending WIP is 500 units. EUP for DM (Weighted Avg) includes ending WIP at:",o:["0%","50%","75%","100%"],a:3,e:"Materials added at the START means all units in process have 100% of their materials. Ending WIP completion % applies only to conversion costs."},
          {q:"Total conversion costs $84,000. EUP conversion 4,200 units. Conversion cost per EUP =",o:["$15","$20","$18","$25"],a:1,e:"Cost per EUP = Total Costs / EUP = $84,000 / 4,200 = $20 per equivalent unit."},
          {q:"Under the FIFO method (vs Weighted Average), beginning WIP costs are:",o:["Added to current costs and averaged together","Ignored completely","Kept SEPARATE from current period costs","Transferred directly to COGS"],a:2,e:"FIFO keeps beginning WIP costs separate from current period costs. This gives a more accurate picture of current period performance."},
          {q:"Normal spoilage in process costing is treated as:",o:["Period cost — expensed immediately","Extraordinary loss","Product cost — included in cost of good units","Contra-revenue"],a:2,e:"Normal spoilage (expected waste) = PRODUCT COST — spread over good units. Abnormal spoilage (unexpected) = PERIOD COST (loss on income statement)."},
          {q:"If Direct Materials are added at the START, ending WIP (30% conversion complete) has DM completion of:",o:["30%","70%","0%","100%"],a:3,e:"Materials added at START = 100% complete for all units in process, regardless of conversion completion %."},
          {q:"Cost per EUP: DM $12, Conversion $8. Units completed = 4,000. Cost assigned to completed units =",o:["$48,000","$32,000","$80,000","$40,000"],a:2,e:"Total cost per complete unit = DM + Conversion = $12 + $8 = $20. Cost for completed units = $20 x 4,000 = $80,000."},
          {q:"The 5 steps of process costing begin with:",o:["Calculate cost per EUP","Assign costs to units","Summarize the flow of PHYSICAL units","Calculate equivalent units"],a:2,e:"Step 1 is always: Summarize the flow of PHYSICAL units. This is the foundation — you must track physical units before calculating EUP."},
          {q:"What is the main ADVANTAGE of process costing for mass production?",o:["More accurate cost per individual job","Simpler — costs are averaged across all equivalent units","Better for custom orders","Eliminates the need for overhead allocation"],a:1,e:"Process costing is simpler for mass production because costs are averaged over all equivalent units. No need to track costs per individual unit when all units are identical."}
        ]},
      {id:"4-5",title:"Activity-Based Costing (ABC)",dur:"30 min",
        blocks:[
          {t:"h",v:"Why ABC? The Problem with Traditional Costing"},
          {t:"p",v:"Traditional costing uses a SINGLE overhead rate based on volume (e.g., direct labor hours). This works when products are simple. But in modern manufacturing with diverse products, a single rate DISTORTS costs — high-volume products get over-costed, low-volume/complex products get under-costed."},
          {t:"h",v:"What Is Activity-Based Costing?"},
          {t:"p",v:"ABC assigns overhead costs more accurately by identifying ACTIVITIES that consume resources and using MULTIPLE cost drivers to trace costs to products. It answers: What actually causes costs?"},
          {t:"h",v:"ABC vs Traditional Costing"},
          {t:"tbl",h:["Feature","Traditional Costing","Activity-Based Costing"],r:[["Overhead rates","One plant-wide rate","Multiple rates (one per activity)"],["Cost drivers","Volume-based (DLH, units)","Activity-based (setups, orders, inspections)"],["Accuracy","Lower — distorts costs","Higher — reflects actual resource use"],["Complexity","Simple","More complex"],["Best for","Simple, single-product firms","Diverse products, modern manufacturing"]]},
          {t:"h",v:"4 Levels of Activity in ABC"},
          {t:"b",v:["Unit-level: Activities performed FOR EACH unit (e.g., machine hours, direct labor)","Batch-level: Activities performed FOR EACH BATCH (e.g., machine setups, quality inspections)","Product-level: Activities supporting a specific PRODUCT LINE (e.g., product design, engineering changes)","Facility-level: Activities supporting the ENTIRE FACILITY (e.g., plant security, building maintenance) — NOT assigned to products"]},
          {t:"h",v:"ABC Process — Step by Step"},
          {t:"s",v:["Step 1: Identify the major activities (cost pools)","Step 2: Determine the cost driver for each activity","Step 3: Calculate Activity Rate = Pool Cost / Cost Driver Quantity","Step 4: Apply to each product: Activity Rate x Product Usage of Cost Driver","Step 5: Calculate total overhead per unit"]},
          {t:"h",v:"Example"},
          {t:"p",v:"Machine setup pool $60,000 with 300 setups. Activity rate = $60,000/300 = $200/setup. Product A needs 60 setups: $200 x 60 = $12,000. Product B needs 240 setups: $200 x 240 = $48,000. Traditional costing based on DL hours would distort this significantly."},
          {t:"h",v:"Benefits and Limitations of ABC"},
          {t:"b",v:["Benefits: More accurate product costs, better pricing decisions, identifies non-value-added activities, supports process improvement","Limitations: Expensive to implement, requires significant data collection, not required by GAAP for external reporting, may be too complex for simple companies"]},
          {t:"tip",v:"Exam Tips: ABC uses MULTIPLE cost pools and drivers. Traditional uses ONE rate. Unit-level varies with units. Batch-level with batches. Product-level with product line. Facility-level is NOT assigned to products. ABC corrects: high-volume = over-costed, low-volume/complex = under-costed under traditional costing."}
        ],
        quizzes:[
          {q:"ABC differs from traditional costing primarily because ABC uses:",o:["One plant-wide overhead rate","Direct labor hours as the only base","Multiple cost pools and multiple cost drivers","Only variable costs"],a:2,e:"ABC uses MULTIPLE cost pools (activities) and MULTIPLE cost drivers, one for each activity. This provides more accurate cost allocation than a single plant-wide overhead rate."},
          {q:"Machine setup cost is an example of a:",o:["Unit-level activity","Batch-level activity","Facility-level activity","Product-level activity"],a:1,e:"Batch-level: Machine setups occur once per BATCH/production run, not per unit. Whether the batch is 10 or 10,000 units, only one setup is needed."},
          {q:"Plant security and building maintenance are examples of:",o:["Unit-level activities","Batch-level activities","Product-level activities","Facility-level activities"],a:3,e:"Facility-level (plant-level) activities support the entire facility and CANNOT be traced to individual products. These are not assigned to products in ABC."},
          {q:"Activity pool: Quality Inspection $90,000. Cost driver: 1,500 inspections. Activity rate =",o:["$45","$50","$60","$75"],a:2,e:"Activity Rate = Pool Cost / Total Cost Driver = $90,000 / 1,500 = $60 per inspection."},
          {q:"Activity rate $60/inspection. Product X uses 200 inspections. Inspection cost assigned to X =",o:["$6,000","$8,000","$12,000","$15,000"],a:2,e:"Cost Assigned = Activity Rate x Usage = $60 x 200 = $12,000."},
          {q:"Under traditional costing, high-volume standard products tend to be:",o:["Accurately costed","Under-costed","Over-costed","Priced correctly"],a:2,e:"Traditional costing over-costs high-volume products (too much overhead allocated based on DLH) and under-costs low-volume/complex products. ABC corrects this."},
          {q:"Engineering changes to support a specific product line are which type of activity?",o:["Unit-level","Batch-level","Product-level","Facility-level"],a:2,e:"Product-level activities support a SPECIFIC PRODUCT LINE. Engineering changes, product design, and product-specific advertising are product-level activities."},
          {q:"A major BENEFIT of ABC over traditional costing is:",o:["It is simpler to implement","It is required by GAAP","It provides more accurate product costs for diverse product lines","It eliminates overhead costs"],a:2,e:"ABC provides MORE ACCURATE cost information, especially when a company produces diverse products with different complexity and resource consumption patterns."},
          {q:"ABC identifies non-value-added activities (NVA). This helps management to:",o:["Increase NVA to improve quality","Eliminate or reduce NVA to lower costs","Price products higher","Increase batch sizes"],a:1,e:"Identifying NVA activities (e.g., rework, waiting, excessive inspection) allows management to ELIMINATE or REDUCE them, reducing costs without affecting customer value."},
          {q:"A product with LOW volume but HIGH complexity will be _____ under traditional costing vs ABC.",o:["Over-costed","Accurately costed","Under-costed","Not affected"],a:2,e:"Traditional costing bases overhead on volume. Low-volume complex products use fewer DLH but consume lots of batch/product-level activities. Traditional assigns them TOO LITTLE overhead — they are UNDER-COSTED."}
        ]},
      {id:"4-6",title:"Standard Costing & Variance Analysis",dur:"35 min",
        blocks:[
          {t:"h",v:"What Is Standard Costing?"},
          {t:"p",v:"Standard costing sets PREDETERMINED COSTS for what products SHOULD cost under normal operating conditions. Comparing actual costs to standard costs reveals VARIANCES — which managers investigate to control costs and improve efficiency."},
          {t:"h",v:"Standard Cost Components"},
          {t:"b",v:["Direct Materials Standard: Standard price per unit x Standard quantity per unit","Direct Labor Standard: Standard rate per hour x Standard hours per unit","Variable Overhead Standard: Standard rate x Standard hours per unit","Fixed Overhead Standard: Budgeted fixed OH / Budgeted activity"]},
          {t:"h",v:"Direct Materials Variances"},
          {t:"f",l:"Materials Price Variance (MPV)",v:"MPV = (Actual Price - Standard Price) x Actual Quantity Purchased | Favorable if Actual Price < Standard Price"},
          {t:"f",l:"Materials Quantity Variance (MQV)",v:"MQV = (Actual Quantity Used - Standard Quantity Allowed) x Standard Price | Favorable if Actual Qty < Standard Qty Allowed"},
          {t:"h",v:"Direct Labor Variances"},
          {t:"f",l:"Labor Rate Variance (LRV)",v:"LRV = (Actual Rate - Standard Rate) x Actual Hours Worked | Favorable if Actual Rate < Standard Rate"},
          {t:"f",l:"Labor Efficiency Variance (LEV)",v:"LEV = (Actual Hours - Standard Hours Allowed) x Standard Rate | Favorable if Actual Hours < Standard Hours Allowed"},
          {t:"h",v:"Variable Overhead Variances"},
          {t:"f",l:"Variable OH Spending Variance",v:"= (Actual Rate - Standard Rate) x Actual Hours"},
          {t:"f",l:"Variable OH Efficiency Variance",v:"= (Actual Hours - Standard Hours Allowed) x Standard Rate"},
          {t:"h",v:"Comprehensive Example"},
          {t:"p",v:"Standard: 3 lbs DM at $5/lb. Actual production: 1,000 units. Actual: 3,200 lbs purchased and used at $4.80/lb."},
          {t:"s",v:["MPV = ($4.80 - $5.00) x 3,200 = -$640 FAVORABLE (paid less per lb)","Standard Qty Allowed = 3 lbs x 1,000 units = 3,000 lbs","MQV = (3,200 - 3,000) x $5.00 = $1,000 UNFAVORABLE (used more lbs)","Total DM Variance = -$640 + $1,000 = $360 Unfavorable"]},
          {t:"tbl",h:["Variance","When Favorable","When Unfavorable"],r:[["MPV","Actual Price < Standard Price","Actual Price > Standard Price"],["MQV","Actual Qty < Standard Qty Allowed","Actual Qty > Standard Qty Allowed"],["LRV","Actual Rate < Standard Rate","Actual Rate > Standard Rate"],["LEV","Actual Hours < Standard Hours Allowed","Actual Hours > Standard Hours Allowed"]]},
          {t:"tip",v:"Exam Tips: ALWAYS use ACTUAL quantity for price variances, STANDARD price for efficiency variances. Standard Hours ALLOWED = Standard hrs/unit x Actual units produced. Favorable = actual < standard. Materials Price Variance at PURCHASE. Quantity Variance uses qty USED. Management by Exception focuses on SIGNIFICANT variances only."}
        ],
        quizzes:[
          {q:"Standard price $10/lb, Actual price $9.50/lb, Actual quantity purchased 2,000 lbs. Materials Price Variance =",o:["$1,000 Favorable","$1,000 Unfavorable","$500 Favorable","$500 Unfavorable"],a:0,e:"MPV = (AP - SP) x AQ = ($9.50 - $10.00) x 2,000 = -$1,000 = $1,000 FAVORABLE. Actual price was LESS than standard."},
          {q:"Standard qty 4 lbs/unit. Actual production 500 units. Actual qty used 2,200 lbs. Standard price $6/lb. Materials Quantity Variance =",o:["$1,200 Favorable","$1,200 Unfavorable","$600 Unfavorable","$600 Favorable"],a:1,e:"SQA = 4 x 500 = 2,000 lbs. MQV = (2,200 - 2,000) x $6 = $1,200 UNFAVORABLE. Used MORE than standard."},
          {q:"Standard labor rate $15/hr, Actual rate $16/hr, Actual hours worked 3,000. Labor Rate Variance =",o:["$3,000 Favorable","$3,000 Unfavorable","$1,500 Favorable","$1,500 Unfavorable"],a:1,e:"LRV = (AR - SR) x AH = ($16 - $15) x 3,000 = $3,000 UNFAVORABLE. Paid $1 more per hour than standard."},
          {q:"Standard hours 2 hrs/unit. Actual production 800 units. Actual hours 1,520. Standard rate $12. Labor Efficiency Variance =",o:["$960 Favorable","$960 Unfavorable","$480 Favorable","$480 Unfavorable"],a:0,e:"SHA = 2 x 800 = 1,600 hrs. LEV = (1,520 - 1,600) x $12 = -$960 = $960 FAVORABLE. Used FEWER hours than standard."},
          {q:"A favorable Materials Price Variance occurs when:",o:["More materials were used than standard","Materials cost LESS than the standard price","Fewer materials were used than standard","Labor was more efficient than expected"],a:1,e:"MPV is FAVORABLE when Actual Price < Standard Price — the company paid LESS per unit of material than expected."},
          {q:"Standard Hours Allowed is calculated as:",o:["Total actual hours worked","Budgeted hours for the period","Standard hours per unit x Actual units produced","Actual hours x Standard rate"],a:2,e:"Standard Hours Allowed (SHA) = Standard hours per unit x Actual units produced. This is the hours that SHOULD have been used for actual production level."},
          {q:"An unfavorable Materials Quantity Variance means:",o:["Materials cost more than expected","More materials were used than the standard quantity allowed","Fewer materials were used than standard","Labor was inefficient"],a:1,e:"MQV Unfavorable: Actual Quantity Used > Standard Quantity Allowed. The company used MORE material than it should have for the actual production level."},
          {q:"Management by Exception in variance analysis means:",o:["All variances are investigated equally","Only favorable variances are reviewed","Only SIGNIFICANT or LARGE variances are investigated","Only unfavorable variances are reviewed"],a:2,e:"Management by Exception: managers focus on SIGNIFICANT variances that require attention, ignoring minor/insignificant ones."},
          {q:"Total actual cost $45,000. Total standard cost $42,000. The total variance is:",o:["$3,000 Favorable","$3,000 Unfavorable","$87,000 total cost","Cannot be determined"],a:1,e:"Total Variance = Actual Cost - Standard Cost = $45,000 - $42,000 = $3,000 UNFAVORABLE. Actual exceeded standard."},
          {q:"The PRIMARY purpose of a standard cost system is to:",o:["Simplify bookkeeping","Eliminate all cost variances","Provide benchmarks for CONTROLLING costs and evaluating performance","Replace the budgeting process"],a:2,e:"Standard costing provides BENCHMARKS for comparison with actual results, enabling managers to CONTROL costs and evaluate performance through variance analysis."}
        ]},
      {id:"4-7",title:"Costing Methods: Variable vs Absorption Costing",dur:"30 min",
        blocks:[
          {t:"h",v:"Variable Costing vs Absorption Costing"},
          {t:"p",v:"Two methods exist for treating Fixed Manufacturing Overhead (Fixed MOH) in product costing. The difference affects inventory valuation and operating income when production differs from sales."},
          {t:"tbl",h:["Feature","Variable Costing","Absorption Costing"],r:[["Fixed MOH treatment","PERIOD cost — expensed immediately","PRODUCT cost — included in inventory"],["Required by GAAP/IFRS","No (internal use only)","Yes (external reporting)"],["Income affected by","Sales volume only","Both sales AND production volume"],["Inventory includes","DM + DL + Variable MOH only","DM + DL + Variable MOH + Fixed MOH"]]},
          {t:"h",v:"Key Formulas"},
          {t:"f",l:"Absorption Costing Unit Cost",v:"Unit Cost = DM + DL + Variable MOH + (Fixed MOH / Units Produced)"},
          {t:"f",l:"Variable Costing Unit Cost",v:"Unit Cost = DM + DL + Variable MOH only (Fixed MOH is a period cost)"},
          {t:"h",v:"Income Difference — The Key Rule"},
          {t:"f",l:"Reconciliation",v:"Absorption NI - Variable NI = Fixed MOH in Ending Inventory - Fixed MOH in Beginning Inventory"},
          {t:"b",v:["Production > Sales: Absorption NI > Variable NI (fixed MOH deferred in inventory)","Production < Sales: Absorption NI < Variable NI (fixed MOH released from inventory)","Production = Sales: Absorption NI = Variable NI (no difference)"]},
          {t:"h",v:"Example"},
          {t:"p",v:"Fixed MOH $60,000. Produced 10,000 units. Sold 8,000 units. Fixed MOH/unit = $6. Ending inventory = 2,000 units."},
          {t:"s",v:["Absorption: Fixed MOH in ending inventory = 2,000 x $6 = $12,000 (deferred)","Variable: All $60,000 expensed immediately","Absorption NI is $12,000 HIGHER than Variable NI"]},
          {t:"h",v:"Contribution Margin Income Statement (Variable Costing)"},
          {t:"tbl",h:["Line","Amount"],r:[["Sales Revenue","$XXX"],["- Variable Cost of Goods Sold","($XXX)"],["= Gross Contribution Margin","$XXX"],["- Variable Selling & Admin","($XXX)"],["= Contribution Margin","$XXX"],["- Fixed Manufacturing Overhead","($XXX)"],["- Fixed Selling & Admin","($XXX)"],["= Net Operating Income","$XXX"]]},
          {t:"tip",v:"Exam Tips: Absorption = GAAP required. Variable = management use only. When production > sales, absorption shows HIGHER income. Fixed MOH is the ONLY difference between the two methods. Contribution Margin format = variable costing income statement. Gross Profit format = absorption costing income statement."}
        ],
        quizzes:[
          {q:"Under absorption costing, fixed manufacturing overhead is treated as a:",o:["Period cost","Product cost","Sunk cost","Opportunity cost"],a:1,e:"Absorption costing treats fixed MOH as a PRODUCT cost — it goes into inventory and is only expensed when the product is sold. This is required under GAAP/IFRS for external reporting."},
          {q:"Under variable costing, fixed manufacturing overhead is:",o:["Added to inventory","A product cost","Expensed in the period incurred","Allocated based on units sold"],a:2,e:"Variable costing treats fixed MOH as a PERIOD cost — expensed immediately in the period incurred, regardless of how many units were sold."},
          {q:"Production 12,000 units. Sales 10,000 units. Compared to variable costing, absorption costing net income is:",o:["The same","Lower","Higher","Cannot be determined without more data"],a:2,e:"Production (12,000) > Sales (10,000) — 2,000 units in ending inventory. Under absorption, some fixed MOH is DEFERRED in inventory, making absorption NI HIGHER than variable NI."},
          {q:"Fixed MOH $80,000. Produced 8,000 units. Sold 6,000 units. Difference in NI (Absorption vs Variable) =",o:["$10,000","$20,000","$60,000","$80,000"],a:1,e:"Fixed MOH/unit = $80,000/8,000 = $10. Ending inventory = 2,000 units. Difference = 2,000 x $10 = $20,000. Absorption NI is $20,000 higher."},
          {q:"When production EQUALS sales, absorption and variable costing net income are:",o:["Absorption higher","Variable higher","Equal","Cannot be determined"],a:2,e:"When production = sales, there is no change in inventory. All fixed MOH is expensed under both methods in the same period. Therefore NI is EQUAL."},
          {q:"Variable costing is primarily used for:",o:["External financial reporting","Tax reporting","Internal management decisions","GAAP compliance"],a:2,e:"Variable costing is used for INTERNAL management decisions — CVP analysis, break-even analysis, and short-term pricing decisions. It is NOT accepted for external GAAP/IFRS reporting."},
          {q:"The contribution margin income statement format is associated with:",o:["Absorption costing","Variable costing","Job order costing","Process costing"],a:1,e:"The Contribution Margin income statement separates variable and fixed costs — this is the variable costing format. Absorption costing uses the traditional Gross Profit format (Sales - COGS = Gross Profit)."},
          {q:"Fixed MOH per unit = $5. Beginning inventory 1,000 units. Ending inventory 3,000 units. Absorption NI vs Variable NI:",o:["Absorption $10,000 higher","Absorption $10,000 lower","Absorption $5,000 higher","They are equal"],a:0,e:"Inventory INCREASED by 2,000 units (3,000 - 1,000). Fixed MOH deferred in ending inventory = 2,000 x $5 = $10,000. Absorption NI is $10,000 HIGHER."},
          {q:"Which costing method results in a lower net income when inventory DECREASES?",o:["Variable costing","Absorption costing","Both are equal","Depends on fixed cost level"],a:1,e:"When inventory decreases, fixed MOH previously deferred in beginning inventory is now RELEASED and expensed under absorption. This means absorption shows LOWER income when inventory decreases."},
          {q:"Under variable costing, which cost is NOT included in product cost?",o:["Direct Materials","Direct Labor","Variable Manufacturing Overhead","Fixed Manufacturing Overhead"],a:3,e:"Fixed Manufacturing Overhead is the ONLY cost excluded from product cost under variable costing. DM, DL, and Variable MOH are included in both variable and absorption costing product costs."}
        ]},
      {id:"4-8",title:"Joint Products & By-Products",dur:"25 min",
        blocks:[
          {t:"h",v:"What Are Joint Products?"},
          {t:"p",v:"Joint products arise from a SINGLE production process that simultaneously produces TWO OR MORE products. The costs incurred before the split-off point are called JOINT COSTS and cannot be directly traced to individual products."},
          {t:"f",l:"Key Terms",v:"Split-off Point: Where joint products become separately identifiable | Joint Costs: Costs incurred BEFORE split-off | Separable Costs: Costs incurred AFTER split-off for a specific product"},
          {t:"h",v:"Methods of Allocating Joint Costs"},
          {t:"tbl",h:["Method","Basis","Formula","Best For"],r:[["Physical Units","Volume (lbs, gallons)","Joint Cost x (Product Units / Total Units)","Simple, same physical measure"],["Sales Value at Split-off","Market value at split-off","Joint Cost x (Product Sales Value / Total Sales Value)","Most common — reflects economic value"],["Net Realizable Value (NRV)","Final sales price - separable costs","Joint Cost x (Product NRV / Total NRV)","When products need further processing"],["Constant Gross Margin %","Maintains same gross margin for all","More complex calculation","Rare on exams"]]},
          {t:"h",v:"Sales Value at Split-off Example"},
          {t:"p",v:"Joint costs $90,000. Product A: 1,000 units at $60/unit = $60,000. Product B: 1,000 units at $40/unit = $40,000. Total = $100,000."},
          {t:"s",v:["Product A allocation = $90,000 x ($60,000/$100,000) = $54,000","Product B allocation = $90,000 x ($40,000/$100,000) = $36,000"]},
          {t:"h",v:"Should We Process Further? — Sell or Process Decision"},
          {t:"f",l:"Process Further Rule",v:"Process further ONLY if: Incremental Revenue > Incremental Separable Costs | Joint costs are IRRELEVANT (sunk costs)"},
          {t:"p",v:"Example: Product X sells at split-off for $50. Can be processed further for $20 more to sell at $80. Incremental revenue = $30. Incremental cost = $20. Profit = $10. → Process further!"},
          {t:"h",v:"By-Products"},
          {t:"b",v:["By-products: Minor outputs from joint production with relatively low sales value","Two accounting methods:","1. Net Realizable Value Method: By-product NRV reduces joint costs allocated to main products","2. Production Method: By-product recognized as revenue when produced"]},
          {t:"tip",v:"Exam Tips: Joint costs are SUNK at split-off — NEVER relevant for sell-or-process decisions. Only INCREMENTAL revenues and costs after split-off matter. Sales Value at Split-off is the most common allocation method. NRV method: NRV = Final Price - Separable Costs. By-products have LOW relative value. Physical units method ignores market value — may distort profitability."}
        ],
        quizzes:[
          {q:"Joint costs are costs incurred:",o:["After the split-off point","Before the split-off point","Only for by-products","For marketing and distribution"],a:1,e:"Joint costs are incurred BEFORE the split-off point during the single process that produces all joint products simultaneously. They cannot be directly traced to individual products."},
          {q:"The split-off point is:",o:["Where products are sold","Where joint products become separately identifiable","Where by-products are separated from waste","The break-even point for joint production"],a:1,e:"The split-off point is where two or more joint products BECOME SEPARATELY IDENTIFIABLE and can be sold separately or processed further."},
          {q:"Joint costs $120,000. Product A NRV $80,000. Product B NRV $40,000. Joint costs allocated to A =",o:["$40,000","$60,000","$80,000","$90,000"],a:2,e:"NRV method: Total NRV = $80,000 + $40,000 = $120,000. Product A allocation = $120,000 x ($80,000/$120,000) = $80,000."},
          {q:"In a sell-or-process-further decision, joint costs are:",o:["Relevant — should be included","Irrelevant — sunk costs","Relevant only if large","Relevant if allocated using NRV"],a:1,e:"Joint costs are SUNK COSTS at the split-off point — they have already been incurred and cannot be changed. They are ALWAYS IRRELEVANT in sell-or-process decisions. Only incremental revenues and costs matter."},
          {q:"Product sells at split-off for $100. Processing further costs $30 extra and sells for $145. Decision:",o:["Sell at split-off — more profitable","Process further — $15 additional profit","Process further — $45 additional profit","Cannot determine without joint costs"],a:1,e:"Incremental revenue = $145 - $100 = $45. Incremental cost = $30. Incremental profit = $45 - $30 = $15. Process further is profitable by $15. Joint costs are irrelevant."},
          {q:"The Sales Value at Split-off method allocates joint costs based on:",o:["Units produced","NRV after further processing","Market value at the split-off point","Physical weight of each product"],a:2,e:"Sales Value at Split-off allocates joint costs based on the RELATIVE MARKET VALUE of each product at the split-off point. It is the most widely used and exam-tested method."},
          {q:"Joint costs $50,000. Product A: 500 units. Product B: 1,500 units. Physical units method — Product A allocation =",o:["$12,500","$37,500","$25,000","$10,000"],a:0,e:"Physical units: Total = 500 + 1,500 = 2,000 units. Product A = $50,000 x (500/2,000) = $50,000 x 25% = $12,500."},
          {q:"By-products are characterized by:",o:["High relative sales value","Low relative sales value","Equal importance to main products","Always requiring further processing"],a:1,e:"By-products have RELATIVELY LOW sales value compared to the main products. They emerge from the same production process but are secondary outputs. Their low value is what distinguishes them from joint products."},
          {q:"Separable costs are costs incurred:",o:["Before split-off","During joint processing","After split-off for a specific product","For all joint products together"],a:2,e:"Separable costs are incurred AFTER the split-off point for a specific individual product — such as additional processing, packaging, or marketing for just one of the joint products."},
          {q:"Which joint cost allocation method is MOST useful when products require different amounts of further processing?",o:["Physical Units","Sales Value at Split-off","Net Realizable Value (NRV)","Constant Gross Margin %"],a:2,e:"NRV (Net Realizable Value) is best when products require different amounts of further processing. NRV = Final Sales Price - Separable Costs, which accounts for the different processing costs each product needs after split-off."}
        ]},
      {id:"4-9",title:"Overhead Costs: Allocation & Applied Overhead",dur:"30 min",
        blocks:[
          {t:"h",v:"What Is Manufacturing Overhead?"},
          {t:"p",v:"Manufacturing Overhead (MOH) includes ALL manufacturing costs that cannot be directly traced to specific products. Unlike Direct Materials and Direct Labor, overhead must be ALLOCATED using a systematic method."},
          {t:"b",v:["Examples: Factory rent, utilities, depreciation, indirect labor, insurance, maintenance","Cannot be traced directly to a product — must be allocated","Includes BOTH fixed and variable components"]},
          {t:"h",v:"Departmental vs Plant-wide Overhead Rates"},
          {t:"tbl",h:["Approach","Description","When to Use"],r:[["Single Plant-wide Rate","One rate for entire factory","Simple products, homogeneous processes"],["Departmental Rates","Separate rate for each department","Products pass through different departments with different overhead levels"],["Activity-Based Costing","Rate per activity driver","Diverse products, modern manufacturing"]]},
          {t:"h",v:"Overhead Allocation Bases"},
          {t:"b",v:["Direct Labor Hours (DLH): Most traditional — works when labor-intensive","Direct Labor Cost: % of DL cost","Machine Hours: Best for automated/capital-intensive operations","Units Produced: Simple but only valid for single-product companies"]},
          {t:"h",v:"Departmental Overhead Rate Example"},
          {t:"p",v:"Dept A (Labor-intensive): Overhead $200,000, DLH 40,000. Rate = $5/DLH. Dept B (Automated): Overhead $300,000, MH 60,000. Rate = $5/MH. Job uses 10 DLH in Dept A and 5 MH in Dept B. Applied OH = (10 x $5) + (5 x $5) = $50 + $25 = $75."},
          {t:"h",v:"Service Department Cost Allocation"},
          {t:"p",v:"Service departments (HR, IT, Maintenance) support production departments but don't directly make products. Their costs must be allocated to production departments before calculating product costs."},
          {t:"tbl",h:["Method","Description","Accuracy"],r:[["Direct Method","Allocates service costs directly to production departments only","Simplest — ignores inter-service usage"],["Step-down Method","Allocates in sequence; once allocated, a dept receives no more","Moderate accuracy"],["Reciprocal Method","Recognizes ALL inter-service relationships using simultaneous equations","Most accurate — most complex"]]},
          {t:"h",v:"Over/Under Applied Overhead — Year-End Disposition"},
          {t:"b",v:["Small amount: Close entire balance to Cost of Goods Sold","Large amount: Prorate between WIP Inventory, Finished Goods Inventory, and COGS based on their relative balances"]},
          {t:"tip",v:"Exam Tips: Direct Method is simplest — ignores reciprocal services between service depts. Reciprocal Method is most accurate. Step-down is in between. Machine hours best for automated plants. DLH best for labor-intensive. Under-applied OH = costs UNDERSTATED in products — adjust COGS upward. Over-applied OH = costs OVERSTATED — adjust COGS downward."}
        ],
        quizzes:[
          {q:"Which overhead allocation base is MOST appropriate for a highly automated factory?",o:["Direct Labor Hours","Direct Labor Cost","Machine Hours","Units Produced"],a:2,e:"Machine Hours is most appropriate for automated factories where machines drive overhead costs (depreciation, maintenance, utilities). DLH is more appropriate for labor-intensive operations."},
          {q:"The Direct Method of service department allocation:",o:["Allocates to other service departments first","Ignores inter-service department usage","Uses simultaneous equations","Is the most accurate method"],a:1,e:"The Direct Method allocates service department costs ONLY to production departments, IGNORING any services provided between service departments. It is the simplest method but least accurate."},
          {q:"Which service cost allocation method is MOST accurate but most complex?",o:["Direct Method","Step-down Method","Reciprocal Method","Physical Units Method"],a:2,e:"The Reciprocal Method is MOST ACCURATE because it recognizes ALL mutual services between service departments using simultaneous equations. It is the most complex but captures the most complete picture."},
          {q:"Dept A: $150,000 overhead, 30,000 DLH. Dept B: $90,000 overhead, 18,000 MH. A job uses 4 DLH in A and 2 MH in B. Applied overhead =",o:["$20","$30","$30","$30"],a:1,e:"Rate A = $150,000/30,000 = $5/DLH. Rate B = $90,000/18,000 = $5/MH. Applied = (4 x $5) + (2 x $5) = $20 + $10 = $30."},
          {q:"Under-applied overhead means:",o:["Applied overhead > Actual overhead","Applied overhead < Actual overhead","No difference between applied and actual","Overhead was not allocated"],a:1,e:"Under-applied: Applied OH < Actual OH. The company charged LESS overhead to products than was actually incurred. Results in a DEBIT balance in the MOH account. At year-end, this increases COGS."},
          {q:"At year-end, a large amount of over-applied overhead should be:",o:["Written off entirely to COGS","Carried forward to next year","Prorated between WIP, Finished Goods, and COGS","Added to Retained Earnings"],a:2,e:"LARGE over/under-applied overhead should be PRORATED (allocated) between WIP Inventory, Finished Goods Inventory, and COGS based on their relative balances. Small amounts go entirely to COGS."},
          {q:"A single plant-wide overhead rate is MOST appropriate when:",o:["Products are diverse and complex","The factory is fully automated","Products are similar and processes are homogeneous","Multiple service departments exist"],a:2,e:"A single plant-wide rate works best when products are SIMILAR and pass through homogeneous processes with similar overhead consumption. For diverse products, departmental rates or ABC provide more accuracy."},
          {q:"The Step-down method of service cost allocation differs from the Direct Method because it:",o:["Uses simultaneous equations","Allocates to other service departments before production departments","Ignores all inter-service relationships","Only allocates variable costs"],a:1,e:"The Step-down method allocates service department costs to OTHER SERVICE DEPARTMENTS (in order) before allocating to production departments. Once a service dept has been allocated, it receives no more. More accurate than Direct, less accurate than Reciprocal."},
          {q:"Over-applied overhead creates a _____ balance in the Manufacturing Overhead account:",o:["Debit","Credit","Zero","Contra"],a:1,e:"Over-applied = Applied > Actual. The MOH account is credited when overhead is applied and debited when actual overhead is incurred. If applied exceeds actual, there are more credits than debits = CREDIT balance."},
          {q:"Why do companies use predetermined overhead rates instead of actual overhead rates?",o:["Actual rates are always too high","Products need a cost before actual overhead is known at year-end","GAAP requires predetermined rates","Actual overhead cannot be measured"],a:1,e:"Companies use POHR because actual overhead is only known at year-end, but products need costs throughout the year for pricing, billing, and financial statements. POHR allows timely cost assignment."}
        ]},
      {id:"4-10",title:"Responsibility Accounting & Transfer Pricing",dur:"30 min",
        blocks:[
          {t:"h",v:"What Is Responsibility Accounting?"},
          {t:"p",v:"Responsibility accounting is a system that measures performance based on CONTROLLABLE costs and revenues for each manager's area of responsibility. The key principle: managers should only be evaluated on what they CAN CONTROL."},
          {t:"h",v:"Four Types of Responsibility Centers"},
          {t:"tbl",h:["Center Type","Responsible For","Key Performance Measure"],r:[["Cost Center","Costs only (no revenue control)","Budget vs Actual cost variance"],["Revenue Center","Revenues only (no cost control)","Actual vs Target revenue"],["Profit Center","Both revenues AND costs","Operating Income / Profit"],["Investment Center","Revenues, costs, AND invested capital","ROI, EVA, Residual Income"]]},
          {t:"h",v:"Investment Center Metrics"},
          {t:"f",l:"Return on Investment (ROI)",v:"ROI = Operating Income / Invested Assets (Average)   OR   Profit Margin x Asset Turnover"},
          {t:"f",l:"Residual Income (RI)",v:"RI = Operating Income - (Required Rate of Return x Invested Assets)"},
          {t:"f",l:"Economic Value Added (EVA)",v:"EVA = NOPAT - (WACC x Invested Capital)   [NOPAT = Net Operating Profit After Tax]"},
          {t:"h",v:"ROI vs Residual Income — Key Difference"},
          {t:"p",v:"ROI problem: A manager may REJECT a project with ROI above the required rate if it lowers the division's current ROI. Residual Income SOLVES this — any project with positive RI should be accepted."},
          {t:"p",v:"Example: Division ROI = 20%. New project ROI = 16%. Required rate = 12%. Manager rejects project (lowers division ROI) even though it creates value (16% > 12%). RI = positive — should accept!"},
          {t:"h",v:"Transfer Pricing"},
          {t:"p",v:"When one division sells goods/services to another division within the same company, the TRANSFER PRICE is the internal price charged. It affects the profitability reported by both divisions."},
          {t:"tbl",h:["Method","Formula","When Used"],r:[["Market Price","External market price","When competitive market exists — most objective"],["Cost-based","Variable cost or Full cost","When no external market"],["Negotiated","Agreed between divisions","When divisions have bargaining power"],["Minimum Transfer Price","Selling division's variable cost + opportunity cost","Economic lower limit"]]},
          {t:"f",l:"Transfer Price Range",v:"Min TP = Variable Cost + Opportunity Cost (seller's perspective) | Max TP = Market Price (buyer's perspective)"},
          {t:"tip",v:"Exam Tips: Controllable costs ONLY for performance evaluation. Cost centers = no revenue. Investment centers use ROI, RI, or EVA. ROI can cause dysfunctional behavior (rejecting good projects). RI and EVA avoid this problem. Transfer price minimum = variable cost + opportunity cost. Market price transfer is most objective. EVA uses WACC; RI uses required rate of return."}
        ],
        quizzes:[
          {q:"A production department manager is evaluated only on manufacturing costs. This is a:",o:["Revenue Center","Profit Center","Cost Center","Investment Center"],a:2,e:"A Cost Center manager is responsible for COSTS ONLY — no control over revenues or investment decisions. The production department fits this perfectly. Performance measured by budget vs actual cost variance."},
          {q:"Division Operating Income $500,000. Invested Assets $2,500,000. ROI =",o:["5%","15%","20%","25%"],a:2,e:"ROI = Operating Income / Invested Assets = $500,000 / $2,500,000 = 20%."},
          {q:"Operating Income $400,000. Invested Assets $2,000,000. Required Rate 15%. Residual Income =",o:["$100,000","$300,000","$200,000","$70,000"],a:0,e:"RI = Operating Income - (Required Rate x Invested Assets) = $400,000 - (15% x $2,000,000) = $400,000 - $300,000 = $100,000."},
          {q:"The main PROBLEM with using ROI as a performance measure is that it may cause managers to:",o:["Accept all investment projects","Reject profitable projects that lower the division ROI","Overstate revenues","Understate costs"],a:1,e:"ROI dysfunction: A manager with 20% ROI may REJECT a project earning 16% (above the 12% required rate) because it lowers the division's average ROI. This is suboptimal for the company. RI/EVA solve this problem."},
