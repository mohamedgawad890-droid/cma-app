          {t:"f",l:"Total DM Variance",v:"Total DM Variance = (AP × AQ) − (SP × SQ) | AP = Actual Price, AQ = Actual Qty Used, SP = Standard Price, SQ = Standard Qty Allowed for actual output"},
          {t:"h",v:"DM Price Variance"},
          {t:"f",l:"DM Price Variance",v:"(AP − SP) × AQ | Positive = Unfavorable (paid more) | Negative = Favorable (paid less)"},
          {t:"tbl",h:["Cause","Unfavorable / Favorable"],r:[["Market price increases","Unfavorable"],["Poor purchasing decisions","Unfavorable"],["Market price decreases","Favorable"],["Better supplier negotiations","Favorable"]]},
          {t:"h",v:"DM Quantity (Efficiency) Variance"},
          {t:"f",l:"DM Quantity Variance",v:"(AQ − SQ) × SP | Positive = Unfavorable (used more) | Negative = Favorable (used less)"},
          {t:"tbl",h:["Cause","Unfavorable / Favorable"],r:[["Low quality materials","Unfavorable"],["Poor machine maintenance","Unfavorable"],["Abnormal spoilage / theft","Unfavorable"],["Better quality materials","Favorable"],["Improved worker performance","Favorable"]]},
          {t:"h",v:"Materials Purchase Price Variance"},
          {t:"f",l:"Purchase Price Variance",v:"(AP − SP) × Quantity PURCHASED (not used) | Benefits: identifies purchasing problems immediately"},
          {t:"h",v:"Relationship Between Variances"},
          {t:"f",l:"Relationship",v:"Price Variance + Quantity Variance = Total DM Variance"},
          {t:"tip",v:"Exam Tips: DM Price Variance uses AQ PURCHASED. DM Quantity Variance uses AQ USED vs SQ ALLOWED for actual output. SQ Allowed = Standard qty per unit × Actual units produced. Both variances use STANDARD PRICE as the common denominator for the quantity variance. Investigate ALL significant variances — both favorable and unfavorable."}
        ],
        quizzes:[]},
      {id:"3-3",title:"Direct Labor Variances",dur:"25 min",
        blocks:[
          {t:"h",v:"Total Direct Labor Variance"},
          {t:"f",l:"Total DL Variance",v:"Total DL Variance = (AR × AH) − (SR × SH) | AR = Actual Rate, AH = Actual Hours, SR = Standard Rate, SH = Standard Hours Allowed for actual output"},
          {t:"h",v:"DL Rate Variance (Price Variance)"},
          {t:"f",l:"DL Rate Variance",v:"(AR − SR) × AH | Positive = Unfavorable (paid more) | Negative = Favorable (paid less)"},
          {t:"tbl",h:["Cause","Direction"],r:[["Wage increases without updating standards","Unfavorable"],["Poor wage rate projections","Unfavorable"],["Using higher-skilled workers at premium rates","Unfavorable"],["Paying lower wages than standard","Favorable"]]},
          {t:"h",v:"DL Efficiency Variance (Quantity Variance)"},
          {t:"f",l:"DL Efficiency Variance",v:"(AH − SH) × SR | Positive = Unfavorable (more hours used) | Negative = Favorable (fewer hours used)"},
          {t:"tbl",h:["Cause","Direction"],r:[["Inexperienced or untrained workers","Unfavorable"],["Poor material quality slowing production","Unfavorable"],["Equipment breakdowns","Unfavorable"],["Skilled workers exceeding expectations","Favorable"],["Better training and improved methods","Favorable"]]},
          {t:"h",v:"Relationship Between Variances"},
          {t:"f",l:"Relationship",v:"Total DL Variance = Rate Variance + Efficiency Variance"},
          {t:"tip",v:"Exam Tips: DL Rate Variance = actual rate vs standard × actual hours worked. DL Efficiency Variance = actual hours vs standard hours allowed × STANDARD rate. Standard hours allowed = standard hours per unit × actual units produced. Buying cheaper DM may increase DL inefficiency (rework). Variances often interrelated."}
        ],
        quizzes:[]},
      {id:"3-4",title:"Multiple Input or Multiple Class Variances",dur:"30 min",
        blocks:[
          {t:"h",v:"Introduction"},
          {t:"p",v:"When MORE THAN ONE type of direct material or more than one WAGE CLASS of labor is used, the Quantity Variance is further broken into MIX and YIELD variances."},
          {t:"b",v:["Single input: Total → Price + Quantity","Multiple inputs: Total → Price + (Mix + Yield)","Mix Variance = change in proportion of inputs used","Yield Variance = change in total inputs used vs standard"]},
          {t:"h",v:"Mix Variance"},
          {t:"f",l:"Mix Variance",v:"Mix Variance = (WASP_AM − WASP_SM) × Total AQ | WASP_AM = Weighted Avg Std Price of Actual Mix | WASP_SM = Weighted Avg Std Price of Standard Mix"},
          {t:"p",v:"Interpretation: Positive = Unfavorable (using more of HIGH-cost inputs). Negative = Favorable (using more of LOW-cost inputs)."},
          {t:"h",v:"How to Calculate WASP"},
          {t:"b",v:["WASP for Actual Mix (WASP_AM): Multiply actual qty of each input × its standard price, add all, divide by total actual qty","WASP for Standard Mix (WASP_SM): Multiply standard qty allowed of each input × its standard price, add all, divide by total standard qty allowed"]},
          {t:"h",v:"Worked Example — WASP Calculation"},
          {t:"p",v:"Standard mix for 1,000 units of output: Material A = 600 kg at $4/kg standard; Material B = 400 kg at $10/kg standard. Total standard qty = 1,000 kg. Actual usage: Material A = 500 kg; Material B = 550 kg. Total actual qty = 1,050 kg."},
          {t:"tbl",h:["","Material A","Material B","Total"],r:[["Standard qty allowed","600 kg","400 kg","1,000 kg"],["Actual qty used","500 kg","550 kg","1,050 kg"],["Standard price","$4/kg","$10/kg","—"],["Std cost at actual qty","500×$4=$2,000","550×$10=$5,500","$7,500"],["Std cost at std qty","600×$4=$2,400","400×$10=$4,000","$6,400"]]},
          {t:"f",l:"WASP_AM (actual mix)",v:"$7,500 ÷ 1,050 kg = $7.143/kg"},
          {t:"f",l:"WASP_SM (standard mix)",v:"$6,400 ÷ 1,000 kg = $6.40/kg"},
          {t:"f",l:"Mix Variance",v:"(WASP_AM − WASP_SM) × Total AQ = ($7.143 − $6.40) × 1,050 = $0.743 × 1,050 = $780 UNFAVORABLE (used more high-cost Material B than standard)"},
          {t:"f",l:"Yield Variance",v:"(Total AQ − Total SQ) × WASP_SM = (1,050 − 1,000) × $6.40 = 50 × $6.40 = $320 UNFAVORABLE (used 50 kg more total than standard)"},
          {t:"f",l:"Total Quantity Variance",v:"Mix $780 U + Yield $320 U = $1,100 Unfavorable — verify: (AP×AQ)−(SP×SQ) method gives same result"},
          {t:"h",v:"Yield Variance"},
          {t:"f",l:"Yield Variance",v:"Yield Variance = (Total AQ − Total SQ) × WASP_SM | Positive = Unfavorable (used more total inputs) | Negative = Favorable (used fewer total inputs)"},
          {t:"h",v:"Relationship"},
          {t:"f",l:"Relationship",v:"Total Quantity Variance = Mix Variance + Yield Variance"},
          {t:"tbl",h:["Variance","What It Measures","Formula"],r:[["Price","Cost of each input vs standard","(AP − SP) × AQ"],["Mix","Proportion of inputs used","(WASP_AM − WASP_SM) × Total AQ"],["Yield","Total quantity efficiency","(Total AQ − Total SQ) × WASP_SM"]]},
          {t:"tip",v:"Exam Tips: Mix and Yield only calculated when MORE THAN ONE input type is used. WASP_AM = weighted average std price using actual proportions. WASP_SM = weighted average std price using standard proportions. Favorable mix = using more LOW-cost inputs. Favorable yield = using LESS total input than standard."}
        ],
        quizzes:[]},
      {id:"3-5",title:"Overhead Variances",dur:"35 min",
        blocks:[
          {t:"h",v:"Overhead Cost Overview"},
          {t:"tbl",h:["Type","Definition","Examples"],r:[["Variable OH (VOH)","Changes with production volume","Indirect materials, power usage"],["Fixed OH (FOH)","Constant within relevant range","Rent, salaries, depreciation"]]},
          {t:"h",v:"Variable Overhead Variances"},
          {t:"f",l:"Total VOH Variance",v:"Total VOH Variance = Actual VOH Incurred − Applied VOH | Applied VOH = Standard VOH Rate × Standard Qty of allocation base allowed for actual output"},
          {t:"f",l:"VOH Spending Variance (Price)",v:"(AP − SP) × AQ | AP = Actual VOH rate, SP = Standard VOH rate, AQ = Actual allocation base used"},
          {t:"f",l:"VOH Efficiency Variance (Quantity)",v:"(AQ − SQ) × SP | AQ = Actual allocation base used, SQ = Standard base allowed for actual output, SP = Standard VOH rate"},
          {t:"p",v:"VOH Efficiency Variance: measures efficiency in using the ALLOCATION BASE (e.g., DL hours). If labor hours are the base, same causes as DL Efficiency Variance."},
          {t:"f",l:"VOH Relationship",v:"VOH Spending Variance + VOH Efficiency Variance = Total VOH Variance"},
          {t:"h",v:"Fixed Overhead Variances"},
          {t:"f",l:"Total FOH Variance",v:"Total FOH Variance = Actual FOH Incurred − Applied FOH | Applied FOH = Standard FOH rate × Standard usage for actual output"},
          {t:"f",l:"FOH Spending Variance",v:"Actual FOH − Budgeted FOH | Positive = Unfavorable (spent more than budgeted)"},
          {t:"f",l:"FOH Production Volume Variance",v:"Budgeted FOH − Applied FOH | Positive = Unfavorable (produced less than planned — under-absorbed FOH)"},
          {t:"p",v:"FOH Volume Variance: NO link to actual costs — purely measures CAPACITY UTILIZATION. It shows how well fixed costs are absorbed based on actual vs planned output."},
          {t:"f",l:"FOH Relationship",v:"FOH Spending Variance + FOH Production Volume Variance = Total FOH Variance"},
          {t:"h",v:"Total Overhead Flexible Budget Variance"},
          {t:"f",l:"Total OH Flexible Budget Variance",v:"= Actual Total OH − Total Flexible Budget OH for Actual Output | Includes: VOH Spending + VOH Efficiency + FOH Spending | EXCLUDES: FOH Production Volume Variance"},
          {t:"h",v:"2-Variance, 3-Variance, and 4-Variance Methods Compared"},
          {t:"p",v:"The IMA tests all three overhead analysis methods. They differ only in how much detail is reported — all three arrive at the same total overhead variance."},
          {t:"tbl",h:["Method","Variances Reported","Detail Level"],r:[["2-Variance","(1) Budget (Controllable) Variance = VOH Spending + VOH Efficiency + FOH Spending  |  (2) Production Volume Variance = FOH Volume","Least detail — combines all controllable variances into one"],["3-Variance","(1) Spending Variance = VOH Spending + FOH Spending  |  (2) Efficiency Variance = VOH Efficiency  |  (3) Production Volume Variance = FOH Volume","Mid-level — separates efficiency from spending"],["4-Variance","(1) VOH Spending  (2) VOH Efficiency  (3) FOH Spending  (4) FOH Production Volume","Most detail — each variance reported separately"]]},
          {t:"f",l:"2-Variance: Budget (Controllable) Variance",v:"Actual Total OH − Flexible Budget OH for Actual Output | = VOH Spending + VOH Efficiency + FOH Spending"},
          {t:"f",l:"2-Variance: Production Volume Variance",v:"Flexible Budget FOH − Applied FOH | Same as the 4-variance FOH Volume Variance"},
          {t:"tip",v:"Exam Tips: VOH Spending = actual vs standard RATE per base unit. VOH Efficiency = allocation base efficiency. FOH Spending = actual vs BUDGETED fixed cost. FOH Volume = capacity utilization (no connection to actual spending). FOH Volume Unfavorable = produced LESS than planned. The Flexible Budget OH Variance EXCLUDES FOH Volume Variance. Know all three methods (2-, 3-, 4-variance) — the IMA tests all of them."}
        ],
        quizzes:[]},
      {id:"3-6",title:"Sales Variances",dur:"30 min",
        blocks:[
          {t:"h",v:"Introduction to Sales Variances"},
          {t:"p",v:"Sales variances measure differences between ACTUAL and BUDGETED results for revenues, variable costs, and contribution margin — based on UNITS SOLD (not produced). Unlike manufacturing variances which are based on production."},
          {t:"h",v:"Types of Sales Variances"},
          {t:"tbl",h:["Variance","Formula","Measures"],r:[["Static Budget Variance","Actual − Static Budget","Total difference (price + volume combined)"],["Flexible Budget Variance","Actual − Flexible Budget","Price/efficiency difference at actual volume"],["Sales Volume Variance","Flexible Budget − Static Budget","Impact of selling different units than planned"],["Selling Price Variance","(AP − SP) × AQ","Effect of charging different price than budget"]]},
          {t:"f",l:"Relationship",v:"Flexible Budget Variance + Sales Volume Variance = Static Budget Variance"},
          {t:"h",v:"Selling Price Variance"},
          {t:"f",l:"Selling Price Variance",v:"(AP − SP) × AQ | AP = Actual price, SP = Standard/budgeted price, AQ = Actual qty sold | Positive = FAVORABLE (sold at higher price)"},
          {t:"h",v:"Sales Volume Variance — Single Product"},
          {t:"f",l:"Sales Volume Variance",v:"(AQ − SQ) × SP | AQ = Actual qty sold, SQ = Budgeted qty, SP = Budgeted selling price | Positive = FAVORABLE (sold more units)"},
          {t:"h",v:"Variable Cost and CM Variances"},
          {t:"p",v:"Apply same formulas but SP replaced with budgeted variable cost per unit (for costs) or budgeted CM per unit (for CM). For costs: negative variance = Favorable (lower actual cost)."},
          {t:"h",v:"Multi-Product: Sales Quantity and Mix Variances"},
          {t:"f",l:"Sales Quantity Variance",v:"(AQ total − SQ total) × WASP_SM | WASP_SM = Weighted Avg Std Price for Standard Mix"},
          {t:"f",l:"Sales Mix Variance",v:"(WASP_AM − WASP_SM) × AQ total | WASP_AM = Weighted Avg Std Price for Actual Mix"},
          {t:"f",l:"Relationship",v:"Sales Quantity Variance + Sales Mix Variance = Total Sales Volume Variance"},
          {t:"tip",v:"Exam Tips: Sales variances based on UNITS SOLD (not produced). Selling Price Variance: positive = Favorable (opposite to cost variances). Sales Volume Variance: use BUDGETED CM per unit for contribution margin analysis. Multi-product: Volume splits into Quantity + Mix variances."}
        ],
        quizzes:[]},
      {id:"3-7",title:"Market Variances",dur:"25 min",
        blocks:[
          {t:"h",v:"Introduction to Market Variances"},
          {t:"p",v:"Market variances break down the SALES QUANTITY VARIANCE (for multi-product companies) or SALES VOLUME VARIANCE (for single-product companies) into two components based on EXTERNAL market data:"},
          {t:"b",v:["Market Size Variance (MSV): Change due to OVERALL MARKET DEMAND SIZE","Market Share Variance (MSHV): Change due to company's PROPORTION of the market"]},
          {t:"f",l:"Relationship",v:"Market Size Variance + Market Share Variance = Sales Quantity Variance (multi-product) OR Sales Volume Variance (single product)"},
          {t:"h",v:"Market Size Variance (MSV)"},
          {t:"f",l:"Market Size Variance",v:"(Actual Market Size − Expected Market Size) × Expected Market Share % × WASCMP_SM | WASCMP_SM = Weighted Avg Standard CM per unit for Standard Mix"},
          {t:"p",v:"Interpretation: Positive (F) = market GREW beyond expectations — more opportunity. Negative (U) = market CONTRACTED."},
          {t:"h",v:"Market Share Variance (MSHV)"},
          {t:"f",l:"Market Share Variance",v:"(Actual Market Share − Expected Market Share) × Actual Market Size × WASCMP_SM"},
          {t:"p",v:"Interpretation: Positive (F) = gained MORE market share than planned. Negative (U) = LOST market share to competitors."},
          {t:"h",v:"Why Market Variances Matter"},
          {t:"b",v:["Separate EXTERNAL factors (market size) from INTERNAL factors (market share)","A company can beat its sales budget only because the market grew (MSV favorable) but lose share (MSHV unfavorable) — this is a warning sign","Conversely, a company may miss budget because the market shrank, yet gained share — a positive internal performance signal"]},
          {t:"tip",v:"Exam Tips: MSV = external factor (industry demand change). MSHV = internal factor (competitive position). MSV favorable = industry grew. MSHV favorable = company captured more of the market. Together they explain the Sales Quantity Variance. Use CONTRIBUTION MARGIN per unit (not selling price) for multi-product analysis."}
        ],
        quizzes:[]},
      {id:"3-8",title:"Responsibility Centers",dur:"30 min",
        blocks:[
          {t:"h",v:"Responsibility Accounting System"},
          {t:"p",v:"A system that measures FINANCIAL RESULTS of each responsibility center separately, allowing combination of all centers' results to evaluate total company performance. Links PLANNING (budgets) with CONTROL (actual vs budget)."},
          {t:"b",v:["Purpose: Evaluate performance of subunits and managers","Provides motivation through clear accountability","Supports strategic decision-making","Key principle: Evaluate managers ONLY on what they CAN CONTROL"]},
          {t:"h",v:"Types of Responsibility Centers"},
          {t:"tbl",h:["Type","Responsible For","Performance Measure","Example"],r:[["Cost Center","Costs only","Efficiency (max productivity, min waste)","Production dept, IT dept"],["Revenue Center","Revenues only","Effectiveness (generate desired revenue)","Sales department"],["Profit Center","Both revenues and costs","Profitability","Store, product division"],["Investment Center","Profit AND ROI","ROI, Residual Income","Regional subsidiary"]]},
          {t:"h",v:"Manager vs. Unit Performance"},
          {t:"p",v:"KEY PRINCIPLE: Evaluate managers only on what THEY CAN CONTROL. A unit may underperform due to factors outside the manager's control. Evaluate: (1) Manager on controllable items, (2) Unit on ALL traceable items."},
          {t:"h",v:"Controllable vs. Non-Controllable Costs"},
          {t:"tbl",h:["Type","Definition","Include in Evaluation?"],r:[["Controllable","Manager can directly influence during the period","YES — include in manager's report"],["Non-Controllable","Outside manager's influence (allocated HQ costs)","NO — exclude from manager's evaluation"]]},
          {t:"h",v:"Common Costs vs. Shared Services Costs"},
          {t:"b",v:["Common Costs: Cannot be traced to a specific department on a cause-effect basis. Remain even if department is eliminated. Example: CEO salary.","Shared Services: Support functions used by multiple units, allocated based on usage. Example: IT, payroll, maintenance."]},
          {t:"h",v:"Common Cost Allocation Methods"},
          {t:"tbl",h:["Method","Description","Notes"],r:[["Stand-Alone","Each unit treated as independent; allocate based on proportion of usage","Viewed as 'fair' — proportional"],["Incremental","Rank units by size; primary bears most cost; remainder allocated to others","Supports smaller/newer units"]]},
          {t:"tip",v:"Exam Tips: 4 types of responsibility centers: Cost, Revenue, Profit, Investment. Investment center = ROI or RI. Manager evaluation = CONTROLLABLE costs only. Unit evaluation = ALL traceable costs. Common costs remain if unit eliminated. Shared services = allocated by usage. Stand-alone method = proportional allocation."}
        ],
        quizzes:[]},
      {id:"3-9",title:"Contribution Income Statement for Evaluation",dur:"30 min",
        blocks:[
          {t:"h",v:"Contribution Income Statement (CIS)"},
          {t:"p",v:"Classifies costs by BEHAVIOR (variable vs. fixed) rather than by function. Key difference from traditional (absorption) income statement: separates fixed costs and focuses on CONTRIBUTION MARGIN."},
          {t:"h",v:"Four Levels of the CIS"},
          {t:"h",v:"Level 1 — Manufacturing Contribution Margin (MCM)"},
          {t:"f",l:"MCM",v:"MCM = Net Revenues − Variable Manufacturing Costs | Variable Mfg Costs = DM + DL + Variable MOH"},
          {t:"p",v:"Shows funds available after covering variable manufacturing costs. Increases in MCM directly improve profit once fixed costs are covered."},
          {t:"h",v:"Level 2 — Contribution Margin (CM)"},
          {t:"f",l:"CM",v:"CM = MCM − Variable Non-Manufacturing Costs | Variable Non-Mfg = Variable selling, marketing, admin"},
          {t:"p",v:"Core profitability indicator — funds available to cover ALL fixed costs after ALL variable costs."},
          {t:"h",v:"Level 3 — Controllable Margin"},
          {t:"f",l:"Controllable Margin",v:"Controllable Margin = CM − Controllable Fixed Costs | Controllable Fixed = Costs manager can influence in < 1 year (e.g., supervisors' salaries, segment-specific advertising)"},
          {t:"p",v:"Measures SHORT-TERM manager performance. Excludes costs the manager cannot influence."},
          {t:"h",v:"Level 4 — Segment Margin"},
          {t:"f",l:"Segment Margin",v:"Segment Margin = Controllable Margin − Non-Controllable Traceable Fixed Costs | Non-Controllable Traceable = Traceable to segment but NOT under manager's short-term control (facility depreciation, property taxes)"},
          {t:"p",v:"Measures LONG-TERM segment performance. Used for decisions about keeping, expanding, or eliminating the segment. NON-CONTROLLABLE TRACEABLE costs WOULD BE ELIMINATED if the segment were closed."},
          {t:"h",v:"Manager vs. Segment Evaluation Summary"},
          {t:"tbl",h:["Evaluation","Costs Included","Purpose"],r:[["Manager","Controllable revenues & costs only","Short-term performance evaluation"],["Segment","ALL traceable fixed costs (incl. non-controllable)","Long-term keep/expand/close decision"]]},
          {t:"f",l:"Profit Margin Ratio",v:"Profit Margin Ratio = Net Income / Revenue | Improve by: increase sales, reduce costs, or increase sales faster than costs"},
          {t:"tip",v:"Exam Tips: CIS has 4 levels: MCM → CM → Controllable Margin → Segment Margin. MCM = Revenue − Variable Mfg costs. CM = MCM − Variable Non-Mfg. Controllable = CM − controllable fixed. Segment = Controllable − non-controllable traceable fixed. Non-controllable traceable fixed costs are ELIMINATED if segment is closed."}
        ],
        quizzes:[]},
      {id:"3-10",title:"Transfer Pricing",dur:"35 min",
        blocks:[
          {t:"h",v:"What Is Transfer Pricing?"},
          {t:"p",v:"A transfer price is the price charged for goods or services EXCHANGED BETWEEN SUB-UNITS of the same organization. The exchanged item is called an INTERMEDIATE PRODUCT."},
          {t:"b",v:["Selling division records REVENUE","Buying division records COST","At corporate level: internal transaction ELIMINATED — no effect on consolidated net income","But: affects DIVISIONAL profits → impacts performance evaluation of managers"]},
          {t:"h",v:"Objectives of a Transfer Pricing System"},
          {t:"b",v:["1. Promote GOAL CONGRUENCE — align divisional and company goals","2. Allow senior management to EVALUATE PERFORMANCE fairly","3. PRESERVE AUTONOMY in decentralized organizations","4. Motivate managers to control costs and use resources efficiently","5. Meet LEGAL/TAX requirements (arm's-length pricing for international)","6. Be PRACTICAL and easy to administer"]},
          {t:"h",v:"Transfer Pricing Methods"},
          {t:"tbl",h:["Method","Formula/Basis","Key Advantage","Key Disadvantage"],r:[["Market Price","External market price","Objective, fair, arm's-length","Buyer has no cost advantage vs external"],["Cost + Opportunity Cost","Outlay Cost + CM lost from forgone external sales","Compensates seller fairly","May not incentivize cost reduction"],["Variable Cost","Variable production cost only","Encourages internal purchase (excess capacity)","Hurts seller at full capacity"],["Full Cost","DM + DL + Allocated Fixed OH","Easy from accounting records","Fixed costs may mislead decisions"],["Cost Plus","Full or variable cost + markup","Seller earns profit","Markup negotiation may be subjective"],["Negotiated","Negotiated between managers","Flexible","Reflects negotiating skills, not efficiency"],["Arbitrary","Set by central management","Retains central control","Hurts divisional autonomy"],["Dual-Rate","Seller at market; buyer at variable cost","Both divisions report strong profits","Divisional profits don't add to corporate total"]]},
          {t:"h",v:"International Transfer Pricing"},
          {t:"b",v:["Tax authorities require ARM'S-LENGTH pricing (e.g., US IRC §482)","Companies cannot artificially shift income to low-tax jurisdictions","Customs: low transfer prices reduce import duties but invite scrutiny"]},
          {t:"h",v:"Guideline for Setting Transfer Prices"},
          {t:"f",l:"General Guideline",v:"Min Transfer Price = Outlay Cost + Opportunity Cost (CM lost from forgone external sales) | If seller at full capacity: must cover variable cost + lost CM | If seller has excess capacity: price ≥ variable cost"},
          {t:"tip",v:"Exam Tips: At FULL CAPACITY: min price = variable cost + lost CM from external sale. At EXCESS CAPACITY: min price = variable cost. Market price = most objective. Dual-rate: good for both divisions but divisional profits don't add up. International: arm's-length required. Transfer price affects divisional profits but NOT consolidated company profit."}
        ],
        quizzes:[]},
      {id:"3-11",title:"Performance Measures, ROI, and RI",dur:"30 min",
        blocks:[
          {t:"h",v:"Strategic Context"},
          {t:"p",v:"Performance measurement systems must ALIGN manager incentives with organizational objectives (goal congruence). Key issues: measures must link to strategy, balance short vs long-term, and motivate company-wide optimization."},
          {t:"b",v:["Risk: Cutting R&D boosts short-term profit but harms long-term competitiveness","Timing: Profit center managers need frequent data; top management needs summaries"]},
          {t:"h",v:"Return on Investment (ROI)"},
          {t:"f",l:"ROI",v:"ROI = Annual Operating Income / Assets Employed"},
          {t:"tbl",h:["Feature","Details"],r:[["Use","Compare divisions or projects; assess vs Required Rate of Return (RRR/Hurdle Rate)"],["RRR Basis","Often based on Weighted Average Cost of Capital (WACC)"],["Advantage","Widely understood, allows comparison across units"],["Limitation 1","Managers may REJECT profitable projects if project ROI < current division ROI (even if > RRR)"],["Limitation 2","Encourages short-termism — cut long-term investments to boost short-term ROI"],["Limitation 3","Distorted by accounting policy choices (inventory, depreciation)"]]},
          {t:"h",v:"Residual Income (RI)"},
          {t:"f",l:"Residual Income",v:"RI = Operating Income − (Assets Employed × Required Rate of Return) | RI > 0 → Investment beneficial"},
          {t:"tbl",h:["Feature","Details"],r:[["Advantage 1","Encourages acceptance of all projects with ROI > RRR (unlike ROI metric)"],["Advantage 2","Different RRRs can be set for different risk levels"],["Advantage 3","Varying investment charges by asset class"],["Limitation 1","Not scale-neutral — larger units may have higher RI due to size alone"],["Limitation 2","Sensitive to RRR changes"],["Limitation 3","Still affected by accounting policy differences"]]},
          {t:"h",v:"Accounting Policy Effects on ROI & RI"},
          {t:"b",v:["Inventory valuation (FIFO vs LIFO) affects income and assets","Depreciation method affects asset book value and expense","Asset capitalization thresholds","Use of full costing vs variable costing","Disposition of manufacturing variances"]},
          {t:"h",v:"Multinational Evaluation Challenges"},
          {t:"b",v:["Inflation and recession conditions vary by country","Currency exchange rates affect reported results","Tariffs, trade regulations differ","Solution: Adjust performance metrics for local operating conditions"]},
          {t:"h",v:"Practical Adjustments for Multinational Evaluation"},
          {t:"tbl",h:["Challenge","Practical Adjustment"],r:[["Currency fluctuations distort reported results","Evaluate using LOCAL CURRENCY results — measure performance in the subsidiary's home currency to eliminate FX noise"],["Inflation differs across countries","Adjust for local inflation rate — compare real (inflation-adjusted) growth, not nominal figures"],["Uncontrollable economic conditions","Separate CONTROLLABLE factors (manager decisions) from NON-CONTROLLABLE factors (macro environment, exchange rate movements)"],["Different asset costs across countries","Use CURRENT REPLACEMENT COST of assets rather than historical cost for comparability"]]},
          {t:"h",v:"Economic Value Added (EVA)"},
          {t:"p",v:"EVA is a refinement of Residual Income that uses after-tax figures and market-based values. It measures whether the company creates or destroys value above the true cost of all capital employed."},
          {t:"f",l:"EVA",v:"EVA = NOPAT − (WACC × Invested Capital) | NOPAT = Net Operating Profit After Tax | Invested Capital = total capital at market (or adjusted book) value"},
          {t:"tbl",h:["Feature","EVA vs RI"],r:[["Profit measure used","NOPAT (after-tax) — RI typically uses operating income (pre-tax)"],["Capital charge rate","WACC (market-derived) — RI may use a simpler hurdle rate"],["Asset base","Invested capital, often adjusted to market value — RI typically uses book value"],["Direction","EVA > 0 = value created; EVA < 0 = value destroyed — same logic as positive RI"],["Best use","Shareholder value analysis and executive compensation plans"]]},
          {t:"tip",v:"Exam Tips: ROI = Operating Income / Assets. RI = Operating Income − (Assets × RRR). ROI problem: managers reject good projects if project ROI < current ROI. RI advantage: accept all projects where RI > 0 (project ROI > RRR). Larger divisions naturally have higher RI — not scale-neutral. Both measures affected by accounting policies. EVA = NOPAT − (WACC × Invested Capital) — more rigorous than RI; uses after-tax profit and market-based capital. Multinational: evaluate in LOCAL CURRENCY to remove FX distortion."}
        ],
        quizzes:[]},
      {id:"3-12",title:"Multiple Performance Measures",dur:"35 min",
        blocks:[
          {t:"h",v:"Beyond Financial Measures"},
          {t:"p",v:"Traditional financial performance evaluation (quarterly profits) drives short-term thinking and neglects long-term strategy. The BALANCED SCORECARD (BSC) addresses this by integrating financial AND non-financial measures."},
          {t:"h",v:"The Balanced Scorecard (BSC)"},
          {t:"p",v:"Developed by KAPLAN & NORTON (1992). A performance management framework that translates strategic plans into a set of linked financial and operational objectives, measures, targets, and initiatives."},
          {t:"tbl",h:["Perspective","Goal","Example Measures"],r:[["Financial","Track financial success & shareholder value","Operating income, revenue growth, ROI, RI, gross margin %"],["Customer","Targeted market segments & satisfaction","Market share %, satisfaction scores, repeat customers %, on-time delivery"],["Internal Process","Improve operations to create customer value","Cycle time, production cost/unit, new products launched, defect rates"],["Learning & Growth","Build foundation for long-term improvement","Employee training hours, staff turnover, IT uptime, engagement scores"]]},
          {t:"p",v:"The perspectives are HIERARCHICAL — improvements in lower-level perspectives support higher-level objectives. Financial perspective = OUTCOME; others are LEAD INDICATORS (drivers)."},
          {t:"h",v:"Linking Strategy to Measures"},
          {t:"b",v:["Critical Success Factors (CSFs): Key activities essential to achieving strategic goals — must be limited in number and tied to strategy","Key Performance Indicators (KPIs): Quantitative measures for CSFs. Example: if 'Customer Service Excellence' is a CSF, KPI could be 'Average call wait time < 30 seconds'","Strategy Map: Visual cause-and-effect diagram — Learning → Internal Process → Customer → Financial"]},
          {t:"h",v:"BSC Benefits & Limitations"},
          {t:"tbl",h:["Benefits","Limitations"],r:[["Encourages long-term focus","Difficult to compare across business units (custom scorecards)"],["Aligns actions with strategy","Requires robust ERP/data systems"],["Links non-financial drivers to future financial results","Non-financial measures may lack reliability"],["Balanced — avoids single-metric trap","If non-financial targets don't lead to financial gains, measures must be re-evaluated"]]},
          {t:"h",v:"Customer & Product Profitability Analysis"},
          {t:"b",v:["Pareto principle: 80% of profits from 20% of customers","Identify high-value customers for retention and growth","Use ABC for product-level profitability","Relevant costs: avoidable = relevant; unavoidable = irrelevant when evaluating dropping a customer/product"]},
          {t:"h",v:"Tableau de Bord — French Predecessor to the BSC"},
          {t:"p",v:"The Tableau de Bord (French for 'dashboard') was developed in France in the early 20th century — predating the Balanced Scorecard by decades. The IMA tests students' ability to distinguish it from the BSC."},
          {t:"tbl",h:["Feature","Tableau de Bord","Balanced Scorecard"],r:[["Origin","France, early 1900s","Kaplan & Norton, USA, 1992"],["Structure","No fixed framework — management selects any financial and non-financial KPIs relevant to their unit","Fixed 4-perspective framework: Financial, Customer, Internal Process, Learning & Growth"],["Strategic linkage","Not explicitly linked to a strategy map or cause-and-effect hierarchy","Explicitly linked — strategy map shows cause-and-effect from L&G to Financial"],["Cascading","Can be cascaded by unit or level","Designed to cascade from corporate to business unit to individual"],["Flexibility","Highly flexible — each manager designs their own dashboard","More standardized — perspectives and linkages are defined"],["Similarity","Like the BSC, uses both financial and non-financial measures","Like TdB, avoids over-reliance on financial-only metrics"]]},
          {t:"tip",v:"Exam Tips: BSC = 4 perspectives: Financial (outcome), Customer, Internal Process, Learning & Growth (foundation). Financial = lagging indicator. Others = leading indicators. Learning enables Internal Process → enables Customer → drives Financial. CSF = what must go right. KPI = how we measure it. Strategy Map = visual cause-and-effect. Tableau de Bord = French predecessor; flexible, no fixed framework — contrast with BSC's structured 4-perspective approach."}
        ],
        quizzes:[]}
      ,{id:"3-13",title:"Financial Statement Analysis",dur:"35 min",
        blocks:[
          {t:"h",v:"Why Financial Statement Analysis?"},
          {t:"p",v:"Financial statement analysis evaluates a company's performance, financial health, and value using ratios computed from the financial statements. The CMA exam tests ratio calculation AND interpretation. Ratios must be compared to: prior periods (trends), industry averages, and specific benchmarks."},
          {t:"h",v:"1. Liquidity Ratios — Can the company pay short-term obligations?"},
          {t:"tbl",h:["Ratio","Formula","Interpretation"],r:[["Current Ratio","Current Assets / Current Liabilities","Higher = more liquidity. Below 1.0 = current liabilities exceed current assets — concern"],["Quick Ratio (Acid-Test)","(Cash + ST Investments + AR) / Current Liabilities","Stricter — excludes inventory. Better for businesses with slow inventory"],["Cash Ratio","(Cash + ST Investments) / Current Liabilities","Most conservative — only most liquid assets"],["Operating Cash Flow Ratio","CFO / Current Liabilities","Uses actual cash generated — best liquidity measure"]]},
          {t:"h",v:"2. Activity / Efficiency Ratios — How well are assets being used?"},
          {t:"tbl",h:["Ratio","Formula","Interpretation"],r:[["Accounts Receivable Turnover","Net Credit Sales / Average AR","Higher = faster collection. Low = slow collection or bad debts"],["Days Sales Outstanding (DSO)","365 / AR Turnover","Average days to collect payment. Lower is better"],["Inventory Turnover","COGS / Average Inventory","Higher = faster moving inventory. Low = slow-moving or obsolete stock"],["Days in Inventory","365 / Inventory Turnover","Average days to sell inventory"],["Asset Turnover","Net Sales / Average Total Assets","Revenue generated per dollar of assets. Higher = more efficient"],["Payables Turnover","COGS (or Purchases) / Average AP","How quickly the company pays suppliers"]]},
          {t:"h",v:"3. Profitability Ratios — How much profit does the company generate?"},
          {t:"tbl",h:["Ratio","Formula","Interpretation"],r:[["Gross Profit Margin","Gross Profit / Net Sales","% of sales remaining after COGS. Higher = pricing power or cost efficiency"],["Operating Profit Margin","Operating Income / Net Sales","% remaining after all operating costs"],["Net Profit Margin","Net Income / Net Sales","Bottom-line profitability per dollar of sales"],["Return on Assets (ROA)","Net Income / Average Total Assets","Profit generated per dollar of assets"],["Return on Equity (ROE)","Net Income / Average Shareholders' Equity","Return to common shareholders — key investor metric"]]},
          {t:"h",v:"DuPont Analysis — Decomposing ROE"},
          {t:"f",l:"DuPont Formula",v:"ROE = Net Profit Margin × Asset Turnover × Equity Multiplier | = (NI/Sales) × (Sales/Assets) × (Assets/Equity)"},
          {t:"p",v:"DuPont shows the THREE DRIVERS of ROE: profitability (margin), efficiency (turnover), and financial leverage (equity multiplier). A company can improve ROE by improving any of the three factors."},
          {t:"tbl",h:["Driver","Ratio","What It Reflects"],r:[["Profitability","Net Profit Margin","Pricing power, cost control"],["Efficiency","Asset Turnover","How well assets generate sales"],["Leverage","Equity Multiplier (Assets/Equity)","Financial risk — use of debt"]]},
          {t:"h",v:"4. Leverage / Solvency Ratios — Long-term financial risk"},
          {t:"tbl",h:["Ratio","Formula","Interpretation"],r:[["Debt-to-Equity (D/E)","Total Debt / Total Equity","Higher = more leverage/risk. Creditors prefer lower"],["Debt-to-Assets","Total Debt / Total Assets","% of assets financed by debt"],["Interest Coverage (Times Interest Earned)","EBIT / Interest Expense","Higher = more capacity to pay interest. Below 1.5 = concerning"],["Debt-to-Capital","Total Debt / (Total Debt + Total Equity)","Proportion of financing from debt"]]},
          {t:"h",v:"5. Market / Investor Ratios"},
          {t:"tbl",h:["Ratio","Formula","Interpretation"],r:[["Price/Earnings (P/E)","Market Price per Share / EPS","Growth expectations. Higher P/E = higher growth expected"],["Dividend Yield","Dividends per Share / Market Price","Income return on investment"],["Book Value per Share","Equity / Shares Outstanding","Accounting value per share — compare to market price"]]},
          {t:"tip",v:"Exam Tips: Liquidity — Current, Quick, Cash (progressively stricter). Activity — turnover ratios (higher = better). Convert to days = 365/turnover. Profitability — margins and returns. DuPont = Margin × Turnover × Leverage. Solvency — D/E, interest coverage (higher coverage = safer). Compare ratios to prior periods AND industry averages. Context always matters — a 'good' ratio depends on the industry."}
        ],
        quizzes:[]}
    ]},
  {id:4,title:"Cost Management",weight:15,emoji:"💰",bar:"#EF9F27",bg:"#FAEEDA",text:"#BA7517",strong:"#854F0B",
    lessons:[
      {id:"4-1",title:"Measurement Concepts & Classification of Costs",dur:"30 min",
        blocks:[
          {t:"h",v:"What Is Cost Behavior?"},
          {t:"p",v:"Cost behavior describes how costs change as activity levels change. Understanding cost behavior is essential for budgeting, decision-making, and performance evaluation."},
          {t:"h",v:"1. Variable Costs"},
          {t:"p",v:"Variable costs change proportionally with activity. They are CONSTANT PER UNIT but change in TOTAL."},
          {t:"tbl",h:["Activity","Total Variable Cost","Cost Per Unit"],r:[["1,000 units","$5,000","$5"],["2,000 units","$10,000","$5"],["3,000 units","$15,000","$5"]]},
          {t:"b",v:["Examples: Direct Materials, Sales Commissions, Packaging","Key rule: Total changes — Per unit stays the same"]},
          {t:"h",v:"2. Fixed Costs"},
          {t:"p",v:"Fixed costs remain CONSTANT IN TOTAL regardless of activity. Cost per unit decreases as production increases."},
          {t:"tbl",h:["Activity","Total Fixed Cost","Cost Per Unit"],r:[["1,000 units","$10,000","$10.00"],["2,000 units","$10,000","$5.00"],["4,000 units","$10,000","$2.50"]]},
          {t:"b",v:["Examples: Rent, Insurance, Salaries, Depreciation","Key rule: Total stays the same — Per unit changes"]},
          {t:"h",v:"3. Mixed Costs (Semi-Variable)"},
          {t:"p",v:"Mixed costs contain BOTH a fixed AND variable component. They must be separated using analytical methods."},
          {t:"f",l:"Mixed Cost Formula",v:"Y = a + bX   |   Y = Total Cost, a = Fixed, b = Variable Rate, X = Activity"},
          {t:"p",v:"Example: Electricity bill = $500 base (fixed) + $0.10 per KWH (variable). At 3,000 KWH: Y = $500 + ($0.10 x 3,000) = $800."},
          {t:"h",v:"High-Low Method"},
          {t:"s",v:["Step 1: Variable Rate = (High Cost - Low Cost) / (High Activity - Low Activity)","Step 2: Fixed Cost = Total Cost at High Point - (Variable Rate x High Activity)","Step 3: Write the equation: Y = Fixed Cost + (Variable Rate x X)"]},
          {t:"p",v:"Example: High = 10,000 units / $45,000. Low = 4,000 units / $21,000. Variable Rate = ($45,000-$21,000)/(10,000-4,000) = $4.00/unit. Fixed Cost = $45,000 - ($4 x 10,000) = $5,000. Equation: Y = $5,000 + $4.00X"},
          {t:"tbl",h:["Cost Type","Total Behavior","Per Unit Behavior","Examples"],r:[["Variable","Changes proportionally","Constant","Direct Materials, Commissions"],["Fixed","Constant","Changes (inversely)","Rent, Insurance, Salaries"],["Mixed","Changes (partially)","Changes","Electricity, Phone, Maintenance"]]},
          {t:"tip",v:"Exam Tips: Variable cost = constant per unit. Fixed cost = constant in total. High-Low weakness = uses only 2 data points. Regression Analysis is more accurate. Sunk costs = ALWAYS irrelevant. Opportunity costs = ALWAYS relevant."}
        ,
          {t:"h",v:"Other Important Cost Types"},
          {t:"tbl",h:["Cost Type","Definition","Decision Relevance"],r:[["Explicit (Out-of-Pocket)","Cash payment involved — wages, rent, materials","Recorded in accounting books"],["Implicit (Imputed)","No cash payment — not recorded","Owner's time, use of own capital"],["Opportunity Cost","Benefit LOST by not choosing the best alternative","ALWAYS relevant in decisions"],["Sunk Cost","Already incurred — cannot be recovered","ALWAYS irrelevant in decisions"],["Carrying Cost","Cost of holding inventory — storage, insurance, obsolescence","Relevant in inventory decisions"],["Committed Cost","Long-term infrastructure — hard to change","Largely unavoidable in short run"],["Discretionary Cost","Can be started/stopped — advertising, R&D, training","Management can control"],["Marginal Cost","Additional cost to produce ONE more unit","Relevant for output decisions"]]},
          {t:"h",v:"Cost Object, Cost Pool, Allocation Base & Cost Driver"},
          {t:"tbl",h:["Term","Definition","Example"],r:[["Cost Object","Anything for which cost is separately measured","Product, customer, department"],["Cost Pool","Group of indirect costs using the same allocation base","All factory overhead costs"],["Allocation Base","The cost driver used to allocate indirect costs","Direct labor hours, machine hours"],["Cost Driver","Factor that CAUSES costs to be incurred","Number of setups, orders, inspections"]]},
          {t:"h",v:"Step Costs & Relevant Range"},
          {t:"p",v:"Step costs remain FIXED within a range then JUMP when activity crosses a threshold. Step-fixed = wide steps (add a supervisor). Step-variable = narrow steps (resemble variable)."},
          {t:"p",v:"Relevant Range: The activity range where cost behavior assumptions are VALID. Outside this range, fixed costs may change and variable rates may differ."},
          {t:"tip",v:"Exam Tips: Sunk costs = ALWAYS irrelevant. Opportunity costs = ALWAYS relevant (even if not recorded). Explicit = cash paid and recorded. Implicit = no cash payment. Cost driver CAUSES costs. Allocation base IS the cost driver used to allocate indirect costs. Relevant range = where Y = a + bX holds true."}
        ],
        quizzes:[]},
      {id:"4-2",title:"Costing Methods: Standard, Normal & Actual Costing",dur:"30 min",
        blocks:[
          {t:"h",v:"Why Do We Need Costing Methods?"},
          {t:"p",v:"Before diving into specific costing systems, it is essential to understand the FRAMEWORK of cost measurement and cost accumulation. Two fundamental decisions drive how a company designs its costing system."},
          {t:"h",v:"Two Key Decisions in Costing"},
          {t:"b",v:["Decision 1 — Cost Accumulation: How are costs collected? Job Order Costing (by job) OR Process Costing (by department/process)","Decision 2 — Cost Measurement: How are costs measured? Actual Costing, Normal Costing, OR Standard Costing"]},
          {t:"h",v:"Cost Accumulation Systems"},
          {t:"tbl",h:["System","Products","Cost Tracking","Examples"],r:[["Job Order Costing","Unique/custom","Per job or batch","Construction, custom furniture, printing"],["Process Costing","Identical/homogeneous","Per process/department","Oil refining, beverages, cement"],["Hybrid (Operation Costing)","Partially standardized","Batch level","Clothing with custom finishing"]]},
          {t:"h",v:"Cost Measurement Methods"},
          {t:"tbl",h:["Method","DM & DL","Overhead","Pros / Cons"],r:[["Actual Costing","Actual costs","Actual overhead","Most accurate / Overhead only known at year-end — slow"],["Normal Costing","Actual costs","Predetermined rate x actual activity","Timely / Small over/under-applied OH difference"],["Standard Costing","Standard costs","Standard rate x standard activity","Best for control / Variances reveal inefficiencies"]]},
          {t:"h",v:"Product Costs vs Period Costs — Quick Review"},
          {t:"tbl",h:["Cost Type","Definition","Examples","Treatment"],r:[["Product Costs","Costs to MAKE the product","DM, DL, MOH","Inventory → COGS when sold"],["Period Costs","All other costs — NOT manufacturing","Selling, G&A, interest","Expensed immediately"]]},
          {t:"h",v:"The Cost of Quality Framework — Integration"},
          {t:"p",v:"All costing methods must consider quality costs. Whether using job order, process, or ABC costing, prevention and appraisal costs are product costs while failure costs are typically period costs (unless internal failures occur during production)."},
          {t:"tip",v:"Exam Tips: Job Order = unique products. Process Costing = identical products. Operation Costing = hybrid (both). Normal Costing uses POHR — most common in practice. Standard Costing = budgeted costs used for variance analysis. Product costs = DM + DL + MOH only. Period costs = everything else. All three measurement methods end up at the same point: actual costs — they just get there differently."}
        ,
          {t:"h",v:"Setting Standards — Ideal vs Practical"},
          {t:"tbl",h:["Standard Type","Definition","Practical Use"],r:[["Ideal (Perfection)","Maximum efficiency — no waste, no breaks, no defects","Motivational benchmark only — rarely achievable"],["Practical (Currently Attainable)","Achievable under normal, efficient conditions allowing for normal waste and downtime","Used for budgeting and variance analysis — most common"],["Historical","Based on past actual performance","May perpetuate inefficiencies from prior periods"]]},
          {t:"p",v:"Most companies use PRACTICAL STANDARDS for variance analysis because they are achievable yet challenging. Ideal standards may demotivate workers when variances are always unfavorable."},
          {t:"h",v:"How the Three Costing Methods Converge"},
          {t:"p",v:"All three methods (Actual, Normal, Standard) end at the same place — COGS on the income statement. They differ only in TIMING and HOW overhead is assigned. At year-end, over/under-applied overhead adjustments bring all methods to the same actual cost."},
          {t:"tip",v:"Exam Tips: Job Order = unique products. Process Costing = identical products. Operation Costing = hybrid (both). Normal Costing uses POHR — most common in practice. Standard Costing = budgeted costs used for variance analysis. Product costs = DM + DL + MOH only. Period costs = everything else. Practical standards most commonly used. Ideal standards = aspirational benchmark."}
        ],
        quizzes:[]},
      {id:"4-3",title:"Cost of Goods Sold and Manufactured (COGM)",dur:"25 min",
        blocks:[
          {t:"h",v:"The Manufacturing Cost Flow"},
          {t:"p",v:"Understanding how costs flow through a manufacturing company is fundamental to cost accounting. Costs flow through three inventory accounts before becoming an expense on the income statement."},
          {t:"f",l:"Cost Flow",v:"Raw Materials → Work-in-Process (WIP) → Finished Goods → Cost of Goods Sold"},
          {t:"h",v:"The Cost of Goods Manufactured (COGM) Statement"},
          {t:"s",v:["Start: Beginning WIP Inventory","+ Direct Materials Used (Beginning RM + Purchases - Ending RM)","+ Direct Labor","+ Manufacturing Overhead Applied","= Total Manufacturing Costs","+ Beginning WIP","- Ending WIP","= Cost of Goods Manufactured (COGM)"]},
          {t:"h",v:"Cost of Goods Sold (COGS) Calculation"},
          {t:"f",l:"COGS Formula",v:"COGS = Beginning Finished Goods + COGM - Ending Finished Goods"},
          {t:"h",v:"Full Example"},
          {t:"p",v:"Raw Materials: Beginning $10,000, Purchases $40,000, Ending $8,000. DL $25,000. MOH $15,000. WIP: Beginning $5,000, Ending $7,000. FG: Beginning $12,000, Ending $9,000."},
          {t:"s",v:["DM Used = $10,000 + $40,000 - $8,000 = $42,000","Total Mfg Costs = $42,000 + $25,000 + $15,000 = $82,000","COGM = $82,000 + $5,000 - $7,000 = $80,000","COGS = $12,000 + $80,000 - $9,000 = $83,000"]},
          {t:"h",v:"Prime Cost vs Conversion Cost"},
          {t:"tbl",h:["Cost Category","Components","Purpose"],r:[["Prime Cost","DM + DL","Direct/traceable manufacturing costs"],["Conversion Cost","DL + MOH","Costs to CONVERT RM into finished product"],["Total Product Cost","DM + DL + MOH","Full cost to manufacture a unit"]]},
          {t:"tip",v:"Exam Tips: COGM flows to COGS through Finished Goods. Three inventory accounts: Raw Materials → WIP → Finished Goods. Prime Cost = DM + DL. Conversion Cost = DL + MOH (DL appears in BOTH). Period costs (selling & admin) do NOT flow through inventory — expensed immediately. Manufacturing costs are ALWAYS product costs."}
        ,
          {t:"h",v:"Customer Life-Cycle Costing"},
          {t:"p",v:"Looks at total cost of ownership from the CUSTOMER'S perspective — all costs the buyer incurs during the entire time they own and use the product."},
          {t:"b",v:["Purchase price","Installation & setup","Operating costs (energy, supplies)","Maintenance & repairs over product life","Disposal / decommissioning at end of life"]},
          {t:"p",v:"Example: Machine costs $50,000. Over 10 years: energy $20,000, maintenance $15,000, disposal $5,000. Customer life-cycle cost = $90,000 — not just $50,000."},
          {t:"b",v:["A cheaper purchase price may have HIGHER operating costs → higher total cost of ownership","Companies use Customer LCC as a competitive tool: lowest total cost = selling point","Customer additional costs are NOT part of the company's life-cycle cost — they are separate"]},
          {t:"tip",v:"Exam Tips: Customer LCC = buyer's perspective (purchase + operating + maintenance + disposal). Company LCC = seller's perspective (R&D + design + manufacturing + marketing + support). Neither is required by GAAP — both are internal management tools."}
        ],
        quizzes:[]},
      {id:"4-4",title:"Joint Product Costing",dur:"30 min",
        blocks:[
          {t:"h",v:"What Are Joint Products?"},
          {t:"p",v:"Joint products arise from a SINGLE production process that simultaneously produces TWO OR MORE products. The costs incurred before the split-off point are called JOINT COSTS and cannot be directly traced to individual products."},
          {t:"f",l:"Key Terms",v:"Split-off Point: Where joint products become separately identifiable | Joint Costs: Costs incurred BEFORE split-off | Separable Costs: Costs incurred AFTER split-off for a specific product"},
          {t:"h",v:"Methods of Allocating Joint Costs"},
          {t:"tbl",h:["Method","Basis","Formula","Best For"],r:[["Physical Units","Volume (lbs, gallons)","Joint Cost x (Product Units / Total Units)","Simple, same physical measure"],["Sales Value at Split-off","Market value at split-off","Joint Cost x (Product Sales Value / Total Sales Value)","Most common — reflects economic value"],["Net Realizable Value (NRV)","Final sales price - separable costs","Joint Cost x (Product NRV / Total NRV)","When products need further processing"],["Constant Gross Margin %","Maintains same gross margin for all","More complex calculation","Rare on exams"]]},
          {t:"h",v:"Sales Value at Split-off Example"},
          {t:"p",v:"Joint costs $90,000. Product A: 1,000 units at $60/unit = $60,000. Product B: 1,000 units at $40/unit = $40,000. Total = $100,000."},
          {t:"s",v:["Product A allocation = $90,000 x ($60,000/$100,000) = $54,000","Product B allocation = $90,000 x ($40,000/$100,000) = $36,000"]},
          {t:"h",v:"Should We Process Further? — Sell or Process Decision"},
          {t:"f",l:"Process Further Rule",v:"Process further ONLY if: Incremental Revenue > Incremental Separable Costs | Joint costs are IRRELEVANT (sunk costs)"},
          {t:"p",v:"Example: Product X sells at split-off for $50. Can be processed further for $20 more to sell at $80. Incremental revenue = $30. Incremental cost = $20. Profit = $10. → Process further!"},
          {t:"h",v:"By-Products"},
          {t:"b",v:["By-products: Minor outputs from joint production with relatively low sales value","Two accounting methods:","1. Net Realizable Value Method: By-product NRV reduces joint costs allocated to main products","2. Production Method: By-product recognized as revenue when produced"]},
          {t:"tip",v:"Exam Tips: Joint costs are SUNK at split-off — NEVER relevant for sell-or-process decisions. Only INCREMENTAL revenues and costs after split-off matter. Sales Value at Split-off is the most common allocation method. NRV method: NRV = Final Price - Separable Costs. By-products have LOW relative value. Physical units method ignores market value — may distort profitability."}
        ,
          {t:"h",v:"Constant Gross Margin % Method"},
          {t:"p",v:"Allocates joint costs so ALL products end up with the SAME gross margin percentage as the overall combined gross margin."},
          {t:"s",v:["Step 1: Overall GM% = (Total Revenue - Total Costs) / Total Revenue","Step 2: Each product's Gross Profit = Revenue x GM%","Step 3: Each product's COGS = Revenue - Gross Profit","Step 4: Joint cost allocation = COGS - Separable costs"]},
          {t:"p",v:"Example: Joint costs $100,000. Product A: revenue $120,000, separable $10,000. Product B: revenue $80,000, separable $15,000. Total costs = $125,000. GM% = $75,000/$200,000 = 37.5%. Product A COGS = $120,000 x 62.5% = $75,000. Joint cost A = $75,000 - $10,000 = $65,000."},
          {t:"h",v:"By-Product Journal Entries — Production vs Sales Method"},
          {t:"tbl",h:["Step","Production Method","Sales Method"],r:[["At production","Dr. By-Product Inventory (NRV) | Cr. WIP — Main Product","No entry"],["Transfer to FG","Dr. FG (reduced cost) | Cr. WIP","Dr. FG (full cost) | Cr. WIP"],["At sale","Dr. Cash | Cr. By-Product Inventory + Gain","Dr. Cash | Cr. Other Income"]]},
          {t:"tip",v:"Exam Tips: Constant GM% = all products get same gross margin %. Production Method = by-product NRV reduces main product cost at production. Sales Method = recognized as income when sold. By-product NRV = Sales Price - Additional Processing Costs."}
        ],
        quizzes:[]},
      {id:"4-5",title:"Byproduct Costing",dur:"25 min",
        blocks:[
          {t:"h",v:"What Are By-Products?"},
          {t:"p",v:"By-products are LOW-VALUE outputs that arise naturally from producing the main product. They emerge from the same joint production process but have relatively minor economic significance compared to the main product."},
          {t:"b",v:["By-products have LOW relative sales value compared to main products","Emerge from the same production process — cannot be separately produced","Examples: sawdust from lumber, molasses from sugar refining, glycerin from soap production"]},
          {t:"h",v:"Net Realizable Value (NRV) of By-Product"},
          {t:"f",l:"NRV Formula",v:"NRV = Estimated Sales Price - Additional Processing Costs after Split-off"},
          {t:"h",v:"Method 1: Production Method (Recognized at Production)"},
          {t:"p",v:"By-product NRV is recognized as soon as it is PRODUCED and DEDUCTED from the main product's cost."},
          {t:"tbl",h:["Step","Journal Entry"],r:[["Record joint manufacturing costs","Dr. WIP – Joint 200,000 | Cr. Materials/Labor/OH 200,000"],["Recognize by-product at production","Dr. Inventory – By-Product (NRV) 12,000 | Cr. WIP – Main Product 12,000"],["Transfer main product to FG","Dr. FG – Main Product 188,000 | Cr. WIP 188,000"],["Sell by-product","Dr. Cash 15,000 | Cr. By-Product Inventory 12,000 | Cr. Revenue/Gain 3,000"]]},
          {t:"h",v:"Method 2: Sales Method (Recognized at Sale)"},
          {t:"p",v:"No entry is made for by-product until it is SOLD. Joint costs remain fully assigned to the main product."},
          {t:"tbl",h:["Step","Journal Entry"],r:[["Record joint costs","Dr. WIP 200,000 | Cr. Materials/Labor/OH 200,000"],["Transfer to FG","Dr. FG – Main Product 200,000 | Cr. WIP 200,000"],["Sell by-product","Dr. Cash 15,000 | Cr. Other Income 15,000"],["Processing costs","Dr. Processing Expense 3,000 | Cr. Cash 3,000"]]},
          {t:"h",v:"Production Method vs Sales Method — Key Differences"},
          {t:"tbl",h:["Feature","Production Method","Sales Method"],r:[["When recognized","At time of PRODUCTION","At time of SALE"],["Effect on main product","Reduces main product cost","No effect on main product cost"],["Inventory","By-product shown as inventory","No by-product inventory recorded"],["Income timing","Revenue matched to production","Revenue matched to sale"]]},
          {t:"tip",v:"Exam Tips: By-products = LOW relative value. NRV = Sales Price - Additional Processing Costs. Production Method: Dr. By-Product Inventory / Cr. WIP (reduces main product cost). Sales Method: no entry until sold, then Other Income. Main difference: WHEN recognized."}
        ],
        quizzes:[]},
      {id:"4-6",title:"Costing Systems: Process Costing",dur:"30 min",
        blocks:[
          {t:"h",v:"What Is Process Costing?"},
          {t:"p",v:"Process Costing is used when companies produce LARGE QUANTITIES of IDENTICAL products continuously through a series of processes. Examples: chemicals, paint, beverages, paper, cement, and food processing."},
          {t:"h",v:"Key Difference from Job Costing"},
          {t:"tbl",h:["Feature","Job Order Costing","Process Costing"],r:[["Products","Unique / custom","Identical / homogeneous"],["Cost tracking","Per job","Per process/department"],["Unit cost","Calculated per job","Average cost per equivalent unit"],["Examples","Custom furniture, construction","Oil refining, beverages, cement"]]},
          {t:"h",v:"Equivalent Units of Production (EUP)"},
          {t:"p",v:"Since some units are partially complete at period-end (Work-in-Process), we convert them to EQUIVALENT UNITS — the number of complete units that could have been produced with the same effort."},
          {t:"f",l:"Equivalent Units (Weighted Average)",v:"EUP = Completed Units + (Ending WIP Units x % Completion)"},
          {t:"p",v:"IMPORTANT: Materials and Conversion costs may have DIFFERENT completion %s. Materials are often added at the START (100%) while conversion (labor + overhead) accumulates gradually."},
          {t:"h",v:"Weighted Average Method vs FIFO"},
          {t:"b",v:["Weighted Average: Combines beginning WIP costs with current period costs. Simpler. EUP = units completed + ending WIP x %complete.","FIFO: Keeps beginning WIP costs separate. EUP = (Beginning WIP x % left to complete) + Units started and completed + (Ending WIP x % complete)."]},
          {t:"h",v:"5-Step Process Costing Procedure"},
          {t:"s",v:["Step 1: Summarize the flow of physical units","Step 2: Calculate Equivalent Units of Production (EUP)","Step 3: Summarize total costs to account for","Step 4: Calculate cost per equivalent unit","Step 5: Assign costs to completed units and ending WIP"]},
          {t:"h",v:"Example (Weighted Average)"},
          {t:"p",v:"Completed: 3,800 units. Ending WIP: 700 units (60% conversion). Total costs: DM $42,000, Conversion $28,000. DM added at start (100%)."},
          {t:"s",v:["EUP (DM): 3,800 + (700 x 100%) = 4,500 units","EUP (Conversion): 3,800 + (700 x 60%) = 4,220 units","Cost/EUP (DM): $42,000 / 4,500 = $9.33","Cost/EUP (Conv): $28,000 / 4,220 = $6.64","Total Cost/Unit: $9.33 + $6.64 = $15.97"]},
          {t:"tip",v:"Exam Tips: Process costing = identical products. Job costing = unique products. Weighted average is simpler. FIFO is more accurate. Materials at START = 100% complete. Conversion accumulates gradually. Normal spoilage = product cost. Abnormal spoilage = period cost (loss)."}
        ,
          {t:"h",v:"Weighted Average vs FIFO Method"},
          {t:"tbl",h:["Feature","Weighted Average","FIFO"],r:[["EUP","Combines prior + current period work","Separates prior from current"],["Cost per EUP","Averages ALL costs (prior + current)","Uses ONLY current period costs"],["Simplicity","Simpler","More complex"],["Accuracy","Less accurate when costs change","More accurate — reflects current period"],["BWIP","Mixed into current costs","Kept separate — completed first"]]},
          {t:"h",v:"Normal vs Abnormal Spoilage — Detailed"},
          {t:"tbl",h:["Type","Definition","Cost Treatment","Controllable?"],r:[["Normal Spoilage","Expected — part of the process","Allocated to GOOD units — product cost","No — unavoidable"],["Abnormal Spoilage","Exceeds normal — should NOT occur","Expensed as LOSS on income statement","Yes — management can prevent"]]},
          {t:"tip",v:"Exam Tips: Weighted Average = simpler, mixes periods. FIFO = more accurate, separates periods. Normal spoilage = product cost (in good units). Abnormal spoilage = period cost (loss on income statement). Both Weighted Average and FIFO EUP calculations ARE testable — master both methods and the 5-step procedure."}
        ],
        quizzes:[]},
      {id:"4-7",title:"Cost-Volume-Profit (CVP) Analysis",dur:"35 min",
        blocks:[
          {t:"h",v:"What Is CVP Analysis?"},
          {t:"p",v:"Cost-Volume-Profit (CVP) analysis examines the relationship between COSTS, VOLUME, and PROFIT. It is one of the most powerful tools in management accounting for break-even analysis, target profit planning, pricing decisions, and understanding business risk. CVP uses the VARIABLE COSTING framework."},
          {t:"h",v:"Key CVP Formulas"},
          {t:"f",l:"Contribution Margin (CM)",v:"CM = Sales Revenue − Variable Costs | CM per unit = Selling Price − Variable Cost per unit"},
          {t:"f",l:"Contribution Margin Ratio (CMR)",v:"CMR = CM / Sales Revenue = CM per unit / Selling Price per unit"},
          {t:"f",l:"Break-Even Point (Units)",v:"BEP (units) = Fixed Costs / CM per unit"},
          {t:"f",l:"Break-Even Point (Dollars)",v:"BEP ($) = Fixed Costs / CMR"},
          {t:"f",l:"Target Profit (Units)",v:"Units needed = (Fixed Costs + Target Profit) / CM per unit"},
          {t:"f",l:"Target Profit (Dollars)",v:"Sales $ needed = (Fixed Costs + Target Profit) / CMR"},
          {t:"h",v:"Worked Example"},
          {t:"p",v:"Selling price $50/unit. Variable cost $30/unit. Fixed costs $80,000. Target profit $20,000."},
          {t:"s",v:["CM per unit = $50 − $30 = $20","CMR = $20 / $50 = 40%","BEP (units) = $80,000 / $20 = 4,000 units","BEP ($) = $80,000 / 0.40 = $200,000","Target profit units = ($80,000 + $20,000) / $20 = 5,000 units","Target profit $ = ($80,000 + $20,000) / 0.40 = $250,000"]},
          {t:"h",v:"Margin of Safety"},
          {t:"f",l:"Margin of Safety (Units)",v:"MOS (units) = Actual Units − Break-Even Units"},
          {t:"f",l:"Margin of Safety (%)",v:"MOS% = (Actual Sales − BEP Sales) / Actual Sales × 100"},
          {t:"p",v:"The margin of safety shows how far sales can fall before the company begins losing money. If actual sales = 6,000 units and BEP = 4,000 units: MOS = 2,000 units. MOS% = 2,000/6,000 = 33.3%."},
          {t:"h",v:"Operating Leverage"},
          {t:"f",l:"Degree of Operating Leverage (DOL)",v:"DOL = Contribution Margin / Net Operating Income"},
          {t:"p",v:"High DOL = high fixed costs relative to variable costs. A company with DOL of 5 will see a 5% change in profit for every 1% change in sales. High DOL = more risk but more reward when sales increase."},
          {t:"h",v:"CVP Assumptions"},
          {t:"b",v:["Costs can be separated into fixed and variable components","Selling price is constant regardless of volume","Fixed costs remain constant within the relevant range","Variable cost per unit is constant","For multi-product: the sales mix stays constant","All production is sold (no inventory changes)"]},
          {t:"h",v:"Multi-Product Break-Even"},
          {t:"p",v:"When a company sells multiple products, use the WEIGHTED AVERAGE CM based on the sales mix."},
          {t:"f",l:"Weighted Avg CMR",v:"Wtd Avg CMR = (Product A CMR × Sales Mix %) + (Product B CMR × Sales Mix %) + ..."},
          {t:"f",l:"Multi-Product BEP",v:"BEP ($) = Total Fixed Costs / Weighted Average CMR"},
          {t:"p",v:"Example: Product A CMR=50%, Product B CMR=30%. Sales mix: A=60%, B=40%. Wtd Avg CMR = (50%×60%) + (30%×40%) = 30% + 12% = 42%. Fixed costs $84,000. BEP = $84,000/42% = $200,000."},
          {t:"h",v:"CVP Graph"},
          {t:"b",v:["The Total Revenue line starts at zero and rises with slope = selling price","The Total Cost line starts at Fixed Costs on the y-axis and rises with slope = variable cost per unit","Break-even point = intersection of TR and TC lines","Area to the left of BEP = loss zone","Area to the right of BEP = profit zone"]},
          {t:"tip",v:"Exam Tips: CM = Revenue − Variable Costs (NOT gross profit). CMR = CM/Revenue. BEP units = FC/CM per unit. BEP dollars = FC/CMR. Target profit: add target to numerator. MOS = actual − BEP. DOL = CM/NOI. High DOL = more volatile earnings. Multi-product: use weighted average CMR. CVP assumes constant selling price, constant VC/unit, constant FC total within relevant range."}
        ],
        quizzes:[]},
      {id:"4-8",title:"Job-Order and Life-Cycle Costing",dur:"30 min",
        blocks:[
          {t:"h",v:"What Is Job Order Costing?"},
          {t:"p",v:"Job Order Costing accumulates costs separately for each unique job, order, or batch. It is used when products are distinct and customizable — such as custom furniture, construction projects, printing, or professional services."},
          {t:"h",v:"Three Components of Product Cost"},
          {t:"b",v:["Direct Materials (DM): Raw materials traced directly to the job","Direct Labor (DL): Labor wages directly associated with the job","Manufacturing Overhead (MOH): Indirect costs applied using a predetermined rate"]},
          {t:"f",l:"Total Job Cost",v:"Total Job Cost = Direct Materials + Direct Labor + Applied Overhead"},
          {t:"h",v:"Predetermined Overhead Rate (POHR)"},
          {t:"p",v:"Since actual overhead is not known during production, companies calculate a POHR at the start of the year to apply overhead to jobs."},
          {t:"f",l:"Predetermined Overhead Rate",v:"POHR = Estimated Total Manufacturing Overhead / Estimated Total Activity Base (e.g., Direct Labor Hours)"},
          {t:"f",l:"Applied Overhead",v:"Applied OH = POHR x Actual Activity Used by the Job"},
          {t:"h",v:"Over/Under Applied Overhead"},
          {t:"f",l:"Over/Under Applied Overhead",v:"Difference = Applied Overhead - Actual Overhead | Over-applied: Applied > Actual | Under-applied: Applied < Actual"},
          {t:"p",v:"At year-end, the difference is disposed of — typically closed to Cost of Goods Sold (COGS) for small amounts, or prorated between WIP, FG, and COGS for large amounts."},
          {t:"h",v:"Job Cost Sheet"},
          {t:"p",v:"Each job has a Job Cost Sheet tracking all DM, DL, and OH charges. This is the subsidiary ledger for Work-in-Process (WIP) inventory."},
          {t:"h",v:"Worked Example"},
          {t:"p",v:"Estimated MOH: $240,000. Estimated DL Hours: 60,000. POHR = $240,000 / 60,000 = $4 per DLH. Job #101: DM $5,000, DL $3,000 (750 hrs), Applied OH = 750 x $4 = $3,000. Total Job Cost = $5,000 + $3,000 + $3,000 = $11,000."},
          {t:"tbl",h:["Item","Amount","Notes"],r:[["Direct Materials","$5,000","Traced to job via requisition"],["Direct Labor","$3,000","750 hrs x $4/hr"],["Applied Overhead","$3,000","750 DLH x $4 POHR"],["Total Job Cost","$11,000","Cost of Job #101"]]},
          {t:"tip",v:"Exam Tips: Job costing = UNIQUE products. Process costing = IDENTICAL products. POHR is set at YEAR START using estimates. Over-applied = CREDIT balance in MOH account. Under-applied = DEBIT balance. Closed to COGS at year-end."},
          {t:"h",v:"Operation Costing"},
          {t:"p",v:"Operation Costing is a HYBRID system combining elements of BOTH Job Order and Process Costing. It is used when products are produced in batches where all units in a batch share the same conversion process, but direct materials differ between batches (or product types)."},
          {t:"tbl",h:["Feature","Job Order Costing","Process Costing","Operation Costing"],r:[["Products","Unique, custom","Identical, homogeneous","Batches — similar but with material differences"],["Direct Materials","Traced to each job","Averaged across all units","Traced separately per WORK ORDER (batch)"],["Conversion Costs (DL+OH)","Traced to each job","Averaged across departments","Averaged across units in the batch — like process costing"],["Industries","Custom furniture, construction","Oil refining, chemicals","Apparel, food processing, electronics assembly"]]},
          {t:"h",v:"How Operation Costing Works"},
          {t:"b",v:["Work Orders: Each batch has a work order (similar to a job cost sheet) that tracks the batch","Direct Materials: Charged specifically to each work order based on the materials used for that batch","Conversion Costs: Applied uniformly to all units in the batch using a department rate (like process costing)","Result: Batches with expensive materials have higher unit costs; conversion costs per unit are the same for all batches passing through the same operation"]},
          {t:"f",l:"Unit Cost under Operation Costing",v:"Unit Cost = (Direct Materials for the Work Order / Units in Batch) + (Conversion Cost Rate × Equivalent Units)"},
          {t:"p",v:"Example: A clothing manufacturer produces Work Order A (wool coats) and Work Order B (cotton shirts) through the same Cutting and Sewing departments. Both batches use the same labor and machines — so conversion costs per unit are identical. But wool costs $30/unit and cotton costs $8/unit — so DM is traced separately to each work order."},
          {t:"tip",v:"Exam Tips: Operation costing = HYBRID of job and process. DM traced per WORK ORDER (like job costing). Conversion costs averaged per unit (like process costing). Used for BATCH manufacturing with different materials but same conversion process. Industries: apparel, food, electronics. Key phrase to identify: 'produced in batches with different materials but same operations.'"},
          {t:"h",v:"Life-Cycle Costing"},
          {t:"p",v:"Life-cycle costing accumulates ALL costs associated with a product during its ENTIRE LIFE — from design through disposal. Used for pricing decisions and profitability analysis."},
          {t:"b",v:["Upstream Costs (before production): R&D, design, prototyping, testing","Manufacturing Costs: DM, DL, MOH, purchasing","Downstream Costs (after production): Marketing, distribution, customer service, warranties, disposal"]},
          {t:"p",v:"Key difference: Life-cycle costing treats pre-production and after-sale costs as PRODUCT COSTS. Traditional costing treats them as period costs expensed when incurred."},
          {t:"h",v:"Customer Life-Cycle Costing"},
          {t:"p",v:"Looks at total cost of ownership from the CUSTOMER's perspective: purchase price + installation + operating costs + maintenance + disposal."},
          {t:"p",v:"Example: Machine costs $50,000. Energy $20,000, maintenance $15,000, disposal $5,000 over 10 years. Customer life-cycle cost = $90,000 — not just $50,000."},
          {t:"h",v:"Target Costing"},
          {t:"f",l:"Target Cost Formula",v:"Target Cost = Target Selling Price - Desired Profit Margin"},
          {t:"p",v:"Market-driven approach: start with what customers will pay, subtract required profit, result = maximum allowable cost. Engineers design the product to hit this cost target."},
          {t:"b",v:["80-90% of product costs are LOCKED IN during the design phase","Value Engineering: systematically redesign to achieve target cost without sacrificing quality","Traditional costing = cost-plus pricing (cost + markup). Target costing = price-minus approach"]},
          {t:"tip",v:"Exam Tips: Life-cycle costing includes ALL phases including pre-production and disposal. 80-90% of costs locked in at DESIGN — cheapest time to reduce costs. Customer LCC = buyer's total ownership cost. Target Cost = Price - Profit. Value engineering bridges gap between estimated and target cost."}
        ],
        quizzes:[]},
      {id:"4-9",title:"Overhead Costs and Allocation",dur:"30 min",
        blocks:[
          {t:"h",v:"What Is Manufacturing Overhead?"},
          {t:"p",v:"Manufacturing Overhead (MOH) includes ALL manufacturing costs that cannot be directly traced to specific products. Unlike Direct Materials and Direct Labor, overhead must be ALLOCATED using a systematic method."},
          {t:"b",v:["Examples: Factory rent, utilities, depreciation, indirect labor, insurance, maintenance","Cannot be traced directly to a product — must be allocated","Includes BOTH fixed and variable components"]},
          {t:"h",v:"Departmental vs Plant-wide Overhead Rates"},
          {t:"tbl",h:["Approach","Description","When to Use"],r:[["Single Plant-wide Rate","One rate for entire factory","Simple products, homogeneous processes"],["Departmental Rates","Separate rate for each department","Products pass through different departments with different overhead levels"],["Activity-Based Costing","Rate per activity driver","Diverse products, modern manufacturing"]]},
          {t:"h",v:"Overhead Allocation Bases"},
          {t:"b",v:["Direct Labor Hours (DLH): Most traditional — works when labor-intensive","Direct Labor Cost: % of DL cost","Machine Hours: Best for automated/capital-intensive operations","Units Produced: Simple but only valid for single-product companies"]},
          {t:"h",v:"Departmental Overhead Rate Example"},
          {t:"p",v:"Dept A (Labor-intensive): Overhead $200,000, DLH 40,000. Rate = $5/DLH. Dept B (Automated): Overhead $300,000, MH 60,000. Rate = $5/MH. Job uses 10 DLH in Dept A and 5 MH in Dept B. Applied OH = (10 x $5) + (5 x $5) = $50 + $25 = $75."},
          {t:"h",v:"Service Department Cost Allocation"},
          {t:"p",v:"Service departments (HR, IT, Maintenance) support production departments but don't directly make products. Their costs must be allocated to production departments before calculating product costs."},
          {t:"tbl",h:["Method","Description","Accuracy"],r:[["Direct Method","Allocates service costs directly to production departments only","Simplest — ignores inter-service usage"],["Step-down Method","Allocates in sequence; once allocated, a dept receives no more","Moderate accuracy"],["Reciprocal Method","Recognizes ALL inter-service relationships using simultaneous equations","Most accurate — most complex"]]},
          {t:"h",v:"Over/Under Applied Overhead — Year-End Disposition"},
          {t:"b",v:["Small amount: Close entire balance to Cost of Goods Sold","Large amount: Prorate between WIP Inventory, Finished Goods Inventory, and COGS based on their relative balances"]},
          {t:"tip",v:"Exam Tips: Direct Method is simplest — ignores reciprocal services between service depts. Reciprocal Method is most accurate. Step-down is in between. Machine hours best for automated plants. DLH best for labor-intensive. Under-applied OH = costs UNDERSTATED in products — adjust COGS upward. Over-applied OH = costs OVERSTATED — adjust COGS downward."}
        ,
          {t:"h",v:"Overhead Variances"},
          {t:"tbl",h:["Variance","Formula","Favorable When"],r:[["Variable OH Spending","Actual VOH - (Standard Rate x Actual Hours)","Actual rate < Standard rate"],["Variable OH Efficiency","(Actual Hours - Std Hours Allowed) x Standard Rate","Fewer hours used than standard"],["Fixed OH Budget (Spending)","Actual Fixed OH - Budgeted Fixed OH","Actual costs < Budget"],["Fixed OH Volume","Budgeted Fixed OH - Applied Fixed OH","Produced more than planned"]]},
          {t:"f",l:"Total OH Variance",v:"Total = Actual OH - Applied OH | Favorable: Applied > Actual (over-applied) | Unfavorable: Actual > Applied (under-applied)"},
          {t:"tip",v:"Exam Tips: Variable OH Efficiency Variance driven by LABOR hours (same driver as DL efficiency variance). Fixed OH Volume Variance = production more/less than capacity level in POHR. Over-applied OH = credit balance in MOH = favorable. Under-applied = debit balance = unfavorable."}
        ],
        quizzes:[]},
      {id:"4-10",title:"Accounting for Overhead",dur:"25 min",
        blocks:[
          {t:"h",v:"Accounting for Overhead — Complete Flow"},
          {t:"p",v:"Factory overhead includes ALL manufacturing costs that cannot be directly traced to specific units. The accounting flow involves two accounts: Manufacturing Overhead Control (actual) and Manufacturing Overhead Applied (applied)."},
          {t:"f",l:"Predetermined OH Rate (POHR)",v:"POHR = Budgeted Manufacturing Overhead / Budgeted Activity Level"},
          {t:"h",v:"Step 1 — Record Actual Overhead"},
          {t:"s",v:["Dr. Manufacturing Overhead Control (actual OH incurred)","Cr. Cash / Accounts Payable / Accumulated Depreciation / etc.","Example: Actual OH $51,000 → Dr. MOH Control 51,000 | Cr. Various 51,000"]},
          {t:"h",v:"Step 2 — Apply Overhead to Production"},
          {t:"s",v:["Dr. Work-in-Process (applied OH)","Cr. Manufacturing Overhead Applied","Example: POHR $20/DLH x 2,400 actual DLH = $48,000 applied → Dr. WIP 48,000 | Cr. MOH Applied 48,000"]},
          {t:"h",v:"Step 3 — Determine Under/Overapplied"},
          {t:"f",l:"Under/Overapplied",v:"Under-applied: Actual OH > Applied OH → Debit balance in MOH | Over-applied: Applied OH > Actual OH → Credit balance"},
          {t:"h",v:"Step 4 — Dispose of Variance"},
