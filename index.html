function isInstructor(){return STATE.user&&STATE.user.email===INSTRUCTOR_EMAIL;}

function timeAgo(ts){
  if(!ts)return'';
  const diff=Date.now()-new Date(ts).getTime();
  const mins=Math.floor(diff/60000);
  if(mins<1)return'Just now';
  if(mins<60)return`${mins}m ago`;
  const hrs=Math.floor(mins/60);
  if(hrs<24)return`${hrs}h ago`;
  const days=Math.floor(hrs/24);
  if(days<7)return`${days}d ago`;
  return new Date(ts).toLocaleDateString();
}

async function loadQuestions(){
  try{
    let snap;
    if(STATE.communityFilter!=='all'){
      snap=await db.collection('questions').where('section','==',STATE.communityFilter).get();
    } else {
      snap=await db.collection('questions').get();
    }
    STATE.communityQuestions=snap.docs
      .map(d=>({id:d.id,...d.data()}))
      .sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
    render();
  }catch(e){console.log('Load questions error:',e);render();}
}

async function loadReplies(qId){
  try{
    const snap=await db.collection('questions').doc(qId).collection('replies').orderBy('createdAt','asc').get();
    STATE.questionReplies=snap.docs.map(d=>({id:d.id,...d.data()}));
    render();
  }catch(e){console.log('Load replies error:',e);}
}

async function postQuestion(){
  const title=STATE.draftTitle.trim();
  const body=STATE.draftBody.trim();
  const section=STATE.draftSection||'General';
  if(!title||!body){alert('Please enter both a title and description for your question.');return;}
  const st=loadStudent();
  const btn=document.getElementById('post-q-btn');
  if(btn){btn.disabled=true;btn.textContent='Posting...';}
  try{
    const photoUrl=st?.photo&&st.photo.startsWith('http')?st.photo:'';
    await db.collection('questions').add({
      title,body,section,
      authorId:STATE.user.uid,
      authorName:st?.name||STATE.user.displayName||'Student',
      authorPhoto:photoUrl,
      createdAt:new Date().toISOString(),
      replyCount:0,upvotes:[],
    });
    STATE.showAskForm=false;
    STATE.draftTitle='';STATE.draftBody='';STATE.draftSection='General';
    await loadQuestions();
  }catch(e){alert('Error posting question: '+e.message);if(btn){btn.disabled=false;btn.textContent='Post Question';}}
}

async function postReply(qId){
  const body=STATE.draftReply.trim();
  if(!body){alert('Please write your reply first.');return;}
  const st=loadStudent();
  const btn=document.getElementById('post-reply-btn');
  if(btn){btn.disabled=true;btn.textContent='Posting...';}
  try{
    const rPhotoUrl=st?.photo&&st.photo.startsWith('http')?st.photo:'';
    await db.collection('questions').doc(qId).collection('replies').add({
      body,
      authorId:STATE.user.uid,
      authorName:st?.name||STATE.user.displayName||'Student',
      authorPhoto:rPhotoUrl,
      createdAt:new Date().toISOString(),
      isBestAnswer:false,
      upvotes:[],
    });
    await db.collection('questions').doc(qId).update({replyCount:firebase.firestore.FieldValue.increment(1)});
    STATE.draftReply='';
    await loadReplies(qId);
    // Update reply count in question list
    const qIdx=STATE.communityQuestions.findIndex(q=>q.id===qId);
    if(qIdx>-1)STATE.communityQuestions[qIdx].replyCount=(STATE.communityQuestions[qIdx].replyCount||0)+1;
  }catch(e){alert('Error posting reply.');if(btn){btn.disabled=false;btn.textContent='Post Reply';}}
}

async function upvoteQuestion(qId,e){
  e.stopPropagation();
  const uid=STATE.user.uid;
  const q=STATE.communityQuestions.find(q=>q.id===qId);
  if(!q)return;
  const upvotes=q.upvotes||[];
  const newUpvotes=upvotes.includes(uid)?upvotes.filter(u=>u!==uid):[...upvotes,uid];
  try{
    await db.collection('questions').doc(qId).update({upvotes:newUpvotes});
    q.upvotes=newUpvotes;render();
  }catch(e){console.log('Upvote error:',e);}
}

async function upvoteReply(qId,rId){
  const uid=STATE.user.uid;
  const r=STATE.questionReplies.find(r=>r.id===rId);
  if(!r)return;
  const upvotes=r.upvotes||[];
  const newUpvotes=upvotes.includes(uid)?upvotes.filter(u=>u!==uid):[...upvotes,uid];
  try{
    await db.collection('questions').doc(qId).collection('replies').doc(rId).update({upvotes:newUpvotes});
    r.upvotes=newUpvotes;render();
  }catch(e){console.log('Upvote reply error:',e);}
}

async function setBestAnswer(qId,rId){
  try{
    const batch=db.batch();
    STATE.questionReplies.forEach(r=>{
      batch.update(db.collection('questions').doc(qId).collection('replies').doc(r.id),{isBestAnswer:r.id===rId});
    });
    await batch.commit();
    STATE.questionReplies.forEach(r=>r.isBestAnswer=r.id===rId);
    render();
  }catch(e){alert('Error setting best answer.');}
}

async function deleteQuestion(qId,e){
  e.stopPropagation();
  if(!confirm('Delete this question and all its replies?'))return;
  try{
    const replies=await db.collection('questions').doc(qId).collection('replies').get();
    const batch=db.batch();
    replies.docs.forEach(d=>batch.delete(d.ref));
    batch.delete(db.collection('questions').doc(qId));
    await batch.commit();
    STATE.communityQuestions=STATE.communityQuestions.filter(q=>q.id!==qId);
    render();
  }catch(e){alert('Error deleting question.');}
}

async function deleteReply(qId,rId){
  if(!confirm('Delete this reply?'))return;
  try{
    await db.collection('questions').doc(qId).collection('replies').doc(rId).delete();
    await db.collection('questions').doc(qId).update({replyCount:firebase.firestore.FieldValue.increment(-1)});
    STATE.questionReplies=STATE.questionReplies.filter(r=>r.id!==rId);
    const qIdx=STATE.communityQuestions.findIndex(q=>q.id===qId);
    if(qIdx>-1)STATE.communityQuestions[qIdx].replyCount=Math.max(0,(STATE.communityQuestions[qIdx].replyCount||1)-1);
    render();
  }catch(e){alert('Error deleting reply.');}
}

function openQuestion(q){
  STATE.questionDetail=q;STATE.tab='question-detail';
  STATE.questionReplies=[];
  render();
  loadReplies(q.id);
}

}

function buildQuizModeQuestions(sectionId){
  const allQ=[];
  const sections=sectionId?S.filter(s=>s.id===sectionId):S;
  sections.forEach(sec=>{
    sec.lessons.forEach(l=>{
      l.quizzes.forEach(q=>{allQ.push({...q,lessonTitle:l.title,sectionTitle:sec.title,secEmoji:sec.emoji,secBar:sec.bar,secBg:sec.bg,secText:sec.text,secStrong:sec.strong});});
    });
  });
  // Shuffle
  for(let i=allQ.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[allQ[i],allQ[j]]=[allQ[j],allQ[i]];}
  return allQ.slice(0,sectionId?Math.min(allQ.length,50):Math.min(allQ.length,100));
}

async function startQuizMode(sectionId){
  STATE.tab='loading';render();
  if(sectionId){await ensureQuizzes(sectionId);}
  else{await Promise.all([1,2,3,4,5,6].map(i=>ensureQuizzes(i)));}
  const questions=buildQuizModeQuestions(sectionId);
  if(!questions.length){alert('No questions available for this section.');return;}
  STATE.quizMode={active:true,sectionId,idx:0,questions,answers:[],selected:null,done:false,questionTimes:[],quizStartTime:Date.now(),qTimerStart:Date.now(),qTimerElapsed:null};
  STATE.tab='quiz-mode';render();
}

function selectQuizModeAnswer(i){
  if(STATE.quizMode.selected!==null)return;
  stopQTimer();
  STATE.quizMode.qTimerElapsed=Date.now()-STATE.quizMode.qTimerStart;
  STATE.quizMode.selected=i;render();
}

function nextQuizModeQuestion(){
  const qm=STATE.quizMode;
  const q=qm.questions[qm.idx];
  const qmt=qm.qTimerElapsed||0;qm.questionTimes=[...(qm.questionTimes||[]),qmt];qm.answers.push({selected:qm.selected,correct:qm.selected===q.a});
  if(qm.idx+1>=qm.questions.length){qm.done=true;qm.selected=null;qm.quizEndTime=Date.now();render();return;}
  qm.idx++;qm.selected=null;qm.qTimerStart=Date.now();qm.qTimerElapsed=null;render();
}

function updateSearchResults(){
  STATE.searchQ=document.getElementById('search-input')?.value||'';
  const q=STATE.searchQ.toLowerCase().trim();
  const container=document.getElementById('search-results');
  if(!container)return;
  const results=[];
  if(q.length>=2){
    S.forEach(sec=>{sec.lessons.forEach(l=>{
      let score=0;
      if(l.title.toLowerCase().includes(q))score+=3;
      const blockText=l.blocks.map(b=>{if(b.v&&typeof b.v==='string')return b.v;if(Array.isArray(b.v))return b.v.join(' ');if(b.h)return b.h;return'';}).join(' ').toLowerCase();
      if(blockText.includes(q))score+=1;
      l.quizzes.forEach(qz=>{if(qz.q&&qz.q.toLowerCase().includes(q))score+=2;});
      if(score>0)results.push({sec,lesson:l,score});
    });});
    results.sort((a,b)=>b.score-a.score);
  }
  if(q.length<2){
    container.innerHTML='<div style="text-align:center;padding:40px 20px;color:#aaa"><div style="font-size:36px;margin-bottom:10px">🔍</div><div style="font-size:14px">Type at least 2 characters to search</div></div>';
  }else if(results.length===0){
    container.innerHTML=`<div style="text-align:center;padding:40px 20px;color:#aaa"><div style="font-size:36px;margin-bottom:10px">😕</div><div style="font-size:14px">No results for "<b>${esc(STATE.searchQ)}</b>"</div></div>`;
  }else{
    container.innerHTML=`<div style="font-size:12px;color:#888;margin-bottom:10px">${results.length} result${results.length>1?'s':''} for "<b>${esc(STATE.searchQ)}</b>"</div>`+
    results.slice(0,20).map(r=>{const done=lessonDone(r.lesson.id);return`<div onclick="STATE.tab='study';STATE.sectId=${r.sec.id};STATE.lessonId='${r.lesson.id}';render()" style="background:${done?r.sec.bg:'#f8f8f6'};border:.5px solid ${done?r.sec.text+'40':'#e0e0d8'};border-radius:10px;padding:10px 12px;margin-bottom:8px;cursor:pointer"><div style="font-size:10px;font-weight:500;color:${r.sec.text};margin-bottom:3px">${r.sec.emoji} ${esc(r.sec.title)}</div><div style="font-size:13px;font-weight:500;color:#1a1a1a">${esc(r.lesson.title)}</div><div style="font-size:11px;color:#888;margin-top:2px">${r.lesson.dur} · ${done?'✓ Completed':'Not started'}</div></div>`;}).join('');
  }
  // Update clear button
  const clearBtn=document.getElementById('search-clear');
  if(clearBtn)clearBtn.style.display=q.length>=2?'block':'none';
}

function renderSearch(){
  const q=(STATE.searchQ||'').toLowerCase().trim();
  const results=[];
  if(q.length>=2){
    S.forEach(sec=>{
      sec.lessons.forEach(l=>{
        let score=0;
        if(l.title.toLowerCase().includes(q))score+=3;
        const blockText=l.blocks.map(b=>{
          if(b.v&&typeof b.v==='string')return b.v;
          if(Array.isArray(b.v))return b.v.join(' ');
          if(b.h)return b.h;
          return '';
        }).join(' ').toLowerCase();
        if(blockText.includes(q))score+=1;
        l.quizzes.forEach(qz=>{if(qz.q&&qz.q.toLowerCase().includes(q))score+=2;});
        if(score>0)results.push({sec,lesson:l,score});

function renderTracker(){
  const tracker=loadTracker();
  const allLessons=S.flatMap(s=>s.lessons);
  const goodCount=allLessons.filter(l=>tracker[l.id]==='good').length;
  const badCount=allLessons.filter(l=>tracker[l.id]==='bad').length;
  const notRated=allLessons.length-goodCount-badCount;

  const sectCards=S.map(sec=>{
    const isOpen=STATE.trackerOpenSects?.includes(sec.id);
    const secGood=sec.lessons.filter(l=>tracker[l.id]==='good').length;
    const secBad=sec.lessons.filter(l=>tracker[l.id]==='bad').length;
    const lessonRows=isOpen?sec.lessons.map(l=>{
      const val=tracker[l.id]||'';
      return`<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;border-bottom:.5px solid ${sec.text}15">
        <span style="flex:1;font-size:13px;color:#333">${esc(l.title)}</span>
        <div style="display:flex;gap:6px;flex-shrink:0">
          <button onclick="setTrackerValue('${l.id}','good')" style="padding:5px 12px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;border:1px solid ${val==='good'?'#639922':'#d0d0d0'};background:${val==='good'?'#EAF3DE':'transparent'};color:${val==='good'?'#27500A':'#888'}">👍 Good</button>
          <button onclick="setTrackerValue('${l.id}','bad')" style="padding:5px 12px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;border:1px solid ${val==='bad'?'#E24B4A':'#d0d0d0'};background:${val==='bad'?'#FCEBEB':'transparent'};color:${val==='bad'?'#791F1F':'#888'}">👎 Bad</button>
        </div>
      </div>`;
    }).join(''):'';

    return`<div class="card" style="padding:0;overflow:hidden;margin-bottom:10px">
      <div onclick="STATE.trackerOpenSects=STATE.trackerOpenSects||[];const idx=STATE.trackerOpenSects.indexOf(${sec.id});if(idx>-1)STATE.trackerOpenSects.splice(idx,1);else STATE.trackerOpenSects.push(${sec.id});render()" 
        style="display:flex;align-items:center;gap:10px;padding:13px 14px;cursor:pointer;background:${sec.bg}">
        <span style="font-size:18px">${sec.emoji}</span>
        <div style="flex:1;min-width:0">
          <div class="ellipsis" style="font-size:13px;font-weight:500;color:${sec.strong}">${esc(sec.title)}</div>
          <div style="font-size:11px;color:${sec.text};margin-top:2px">
            ${secGood>0?`👍 ${secGood} good `:''}${secBad>0?`👎 ${secBad} bad`:''}${secGood===0&&secBad===0?'Not rated yet':''}
          </div>
        </div>
        <span style="font-size:18px;color:${sec.text};transition:transform .2s;transform:rotate(${isOpen?'90':'0'}deg)">›</span>
      </div>
      ${isOpen?`<div style="background:#fff">${lessonRows}</div>`:''}
    </div>`;
  }).join('');

  return`<div class="sh">
    <h2>Topic Tracker</h2>
    <p style="font-size:12px;color:#888;margin-top:2px">Rate each topic to track your strengths and weaknesses</p>
  </div>
  <div style="display:flex;gap:10px;padding:12px 16px;border-bottom:.5px solid #e0e0d8;flex-shrink:0">
    <div style="flex:1;background:#EAF3DE;border-radius:10px;padding:10px;text-align:center">
      <div style="font-size:20px;font-weight:500;color:#27500A">${goodCount}</div>
      <div style="font-size:11px;color:#3B6D11">👍 Good</div>
    </div>
    <div style="flex:1;background:#FCEBEB;border-radius:10px;padding:10px;text-align:center">
      <div style="font-size:20px;font-weight:500;color:#791F1F">${badCount}</div>
      <div style="font-size:11px;color:#A32D2D">👎 Need Work</div>
    </div>
    <div style="flex:1;background:#f5f5f0;border-radius:10px;padding:10px;text-align:center">
      <div style="font-size:20px;font-weight:500;color:#555">${notRated}</div>
      <div style="font-size:11px;color:#888">⬜ Not Rated</div>
    </div>
  </div>
  <div class="scroll-area pad" style="padding-top:14px">
    <div style="font-size:12px;color:#888;margin-bottom:12px">Tap a section to expand · Select Good or Bad for each topic</div>
    ${sectCards}
    <div style="height:20px"></div>
  </div>`;
}


async function sendPasswordReset(){
  const email=document.getElementById('auth-email')?.value?.trim();
  if(!email){alert('Please enter your email address first.');return;}
  try{
    await auth.sendPasswordResetEmail(email);
    alert('Password reset email sent to ' + email + '\n\nPlease check your inbox and spam folder.');
  }catch(e){alert('Error: ' + (e.message||'Could not send reset email. Check your email address.'));}
}

async function doAuth(){
  const isReg=STATE.authScreen==='register';
  const email=(document.getElementById('auth-email')?.value||'').trim();
  const pass=document.getElementById('auth-pass')?.value||'';
  const pass2=document.getElementById('auth-pass2')?.value||'';
  const name=(document.getElementById('auth-name')?.value||'').trim();
  STATE.authError='';
  if(!email||!pass){STATE.authError='Please enter email and password.';render();return;}
  if(isReg&&pass!==pass2){STATE.authError='Passwords do not match.';render();return;}
  if(isReg&&!name){STATE.authError='Please enter your full name.';render();return;}
  STATE.authLoading=true;render();
  try{
    if(isReg){
      const cred=await auth.createUserWithEmailAndPassword(email,pass);
      await cred.user.updateProfile({displayName:name});
    }else{
      await auth.signInWithEmailAndPassword(email,pass);
    }
  }catch(e){
    STATE.authLoading=false;
    STATE.authError=e.message.replace('Firebase: ','').replace(/ \(auth\/.*?\)/,'');
    render();
  }
}

function renderLessons(){
  const{sectId,lessonId,progress}=STATE;
  if(lessonId!==null){
    const sec=sect(sectId);const lesson=sec.lessons.find(l=>l.id===lessonId);const lessonIdx=sec.lessons.findIndex(l=>l.id===lessonId);const done=lessonDone(lesson.id);
    return`<div class="bh"><button class="bh-back" onclick="STATE.lessonId=null;render()">‹</button><div style="min-width:0"><div style="font-size:11px;font-weight:500;color:${sec.text}">${sec.emoji} ${esc(sec.title)}</div><div class="ellipsis" style="font-size:15px;font-weight:500;margin-top:1px">${lessonIdx+1}. ${esc(lesson.title)}</div></div></div>
    <div class="scroll-area pad"><div class="card" style="margin-top:14px;padding:4px 16px 16px">${lesson.blocks.map(b=>renderBlock(b,sec)).join('')}</div>
    <button class="btn" onclick="markDone('${lesson.id}')" style="margin-top:14px;background:${done?'#EAF3DE':sec.bar};color:${done?'#27500A':'#fff'}">${done?'✓ Completed — Back to lessons':'Mark as Complete ✓'}</button><div style="height:20px"></div></div>`;
  }
  if(sectId!==null){
    const sec=sect(sectId);
    const items=sec.lessons.map((l,i)=>{const done=lessonDone(l.id);return`<div class="card" onclick="STATE.lessonId='${l.id}';render()" style="cursor:pointer;border-color:${done?sec.text+'45':'#e0e0d8'}"><div class="row"><div style="width:32px;height:32px;border-radius:50%;background:${done?sec.bg:'#f0f0eb'};display:flex;align-items:center;justify-content:center;font-size:14px;color:${done?sec.strong:'#999'};border:1px solid ${done?sec.text+'40':'#e0e0d8'};flex-shrink:0;font-weight:500">${done?'✓':i+1}</div><div style="flex:1;min-width:0"><div class="ellipsis" style="font-size:14px;font-weight:500">${i+1}. ${esc(l.title)}</div><div style="font-size:12px;color:#888;margin-top:2px">${l.dur} · ${done?'Completed':'Not started'}</div></div><span style="color:#bbb;font-size:18px">›</span></div></div>`;}).join('');
    return`<div class="bh"><button class="bh-back" onclick="STATE.sectId=null;render()">‹</button><div><div style="font-size:16px;font-weight:500">${sec.emoji} ${esc(sec.title)}</div><div style="font-size:12px;color:#888;margin-top:1px">${sec.lessons.length} lessons · ${sec.weight}% of exam</div></div></div>
    <div class="scroll-area pad" style="padding-top:14px">${items}<div style="height:20px"></div></div>`;
  }
  const doneCount=STATE.progress.done.length;
  const items=S.map(sec=>{const done=sec.lessons.filter(l=>lessonDone(l.id)).length;return`<div class="card" onclick="STATE.sectId=${sec.id};render()" style="cursor:pointer"><div class="row"><div class="sect-icon" style="background:${sec.bg}">${sec.emoji}</div><div style="flex:1;min-width:0"><div class="ellipsis" style="font-size:14px;font-weight:500">${esc(sec.title)}</div><div style="font-size:12px;color:#888;margin-top:2px">${done}/${sec.lessons.length} done · ${sec.weight}% of exam</div></div><span style="color:#bbb;font-size:18px">›</span></div></div>`;}).join('');
  return`<div class="sh"><h2>All Lessons</h2><p>${doneCount} of ${TOTAL_LESSONS} completed</p></div><div class="scroll-area pad" style="padding-top:14px">${items}<div style="height:20px"></div></div>`;
}

function fmtTime(ms){if(!ms||ms<0)ms=0;const s=Math.floor(ms/1000);const m=Math.floor(s/60);return m>0?`${m}m ${s%60<10?'0':''}${s%60}s`:`${s}s`;}
function timerColor(ms){if(ms<60000)return{bg:'#EAF3DE',color:'#27500A',dot:'🟢'};if(ms<120000)return{bg:'#FAEEDA',color:'#854F0B',dot:'🟡'};return{bg:'#FCEBEB',color:'#791F1F',dot:'🔴'};}
function timerBadgeHTML(elapsed,answered){
  if(!answered){return`<span id="q-timer" style="display:inline-flex;align-items:center;gap:5px;background:#f0f0eb;border-radius:6px;padding:3px 10px;font-size:12px;font-weight:500;color:#555">⏱ <span id="q-timer-val">0s</span></span>`;}
  const tc=timerColor(elapsed);
  return`<span style="display:inline-flex;align-items:center;gap:5px;background:${tc.bg};border-radius:6px;padding:3px 10px;font-size:12px;font-weight:500;color:${tc.color}">${tc.dot} ${fmtTime(elapsed)}</span>`;
}
function totalTimeHTML(startTime,endTime,questionTimes){
  if(!startTime||!endTime)return'';
  const total=endTime-startTime;
  const avg=questionTimes&&questionTimes.length?Math.round(questionTimes.reduce((a,b)=>a+b,0)/questionTimes.length):0;

function goLesson(sId){STATE.sectId=sId;STATE.lessonId=null;STATE.tab='lessons';render();}
function markDone(lid){if(!STATE.progress.done.includes(lid)){saveProg({...STATE.progress,done:[...STATE.progress.done,lid]});setTimeout(syncLeaderboard,500);updateStreak();}STATE.lessonId=null;render();}
function getNextLesson(sectId,lessonId){const sec=sect(sectId);if(!sec)return null;const idx=sec.lessons.findIndex(l=>l.id===lessonId);if(idx===-1||idx>=sec.lessons.length-1){const sIdx=S.findIndex(s=>s.id===sectId);if(sIdx===-1||sIdx>=S.length-1)return null;return{sec:S[sIdx+1],lesson:S[sIdx+1].lessons[0]};}return{sec,lesson:sec.lessons[idx+1]};}
function doLessonQuiz(lid){startQuiz(lid);}
async function startQuiz(lessonId){
  const secId=lessonId.split('-')[0];
  if(!QUIZ_CACHE[secId]){STATE.tab='loading';render();await ensureQuizzes(secId);}
  let foundLesson=null,foundSect=null;
  for(const sec of S){for(const l of sec.lessons){if(l.id===lessonId){foundLesson=l;foundSect=sec;break;}}}
  if(!foundLesson){console.log('Lesson not found:',lessonId);return;}
  // Shuffle and pick 20 random questions
  const allQ=[...foundLesson.quizzes];
  for(let i=allQ.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[allQ[i],allQ[j]]=[allQ[j],allQ[i]];}
  const questions=allQ.slice(0,Math.min(20,allQ.length));
  STATE.quizState={lessonId,sId:foundSect.id,questions,idx:0,selected:null,answers:[],questionTimes:[],quizStartTime:Date.now(),qTimerStart:Date.now(),qTimerElapsed:null};
  STATE.tab='quiz-session';render();
}
function selectAnswer(i){if(STATE.quizState.selected!==null)return;stopQTimer();STATE.quizState.qTimerElapsed=Date.now()-STATE.quizState.qTimerStart;STATE.quizState={...STATE.quizState,selected:i};render();}
function nextQuestion(){
  const qs=STATE.quizState;const correct=qs.selected===qs.questions[qs.idx].a;const newAnswers=[...qs.answers,{selected:qs.selected,correct}];
  if(qs.idx+1>=qs.questions.length){const rightCount=newAnswers.filter(a=>a.correct).length;const p=STATE.progress;const ls=p.lessonScores||{};const ansArr=newAnswers.map(a=>a.selected);saveProg({...p,lessonScores:{...ls,[qs.lessonId]:{correct:rightCount,total:qs.questions.length,answers:ansArr}},mcqTotal:p.mcqTotal+qs.questions.length,mcqRight:p.mcqRight+rightCount});const qt2=[...(qs.questionTimes||[]),qs.qTimerElapsed||0];STATE.quizState={...qs,answers:newAnswers,done:true,questionTimes:qt2,quizEndTime:Date.now()};updateStreak();STATE.tab='quiz-results';render();}
  else{const qt=[...(qs.questionTimes||[]),qs.qTimerElapsed||0];STATE.quizState={...qs,idx:qs.idx+1,selected:null,answers:newAnswers,questionTimes:qt,qTimerStart:Date.now(),qTimerElapsed:null};render();}
}
function resetAll(){saveProg({done:[],lessonScores:{},mcqTotal:0,mcqRight:0});STATE.showReset=false;render();}
function askAboutResults(lessonId,pct){const lesson=S.flatMap(s=>s.lessons).find(l=>l.id===lessonId);STATE.chatDraft=`I just scored ${pct}% on the ${lesson?.title||'quiz'}. Can you help me review the weak areas?`;STATE.tab='chat';render();setTimeout(()=>{const el=document.getElementById('chat-input');if(el)el.value=STATE.chatDraft;},50);}

// ── LAZY QUIZ LOADER ─────────────────────────────────────────────────────────
const QUIZ_CACHE={};
async function ensureQuizzes(sectionId){
  const sid=String(sectionId);
  if(QUIZ_CACHE[sid])return;
  try{
    const res=await fetch('./questions/s'+sid+'.json');
    if(!res.ok)throw new Error('HTTP '+res.status);
    const data=await res.json();
    const sec=S.find(s=>String(s.id)===sid);
    if(sec){sec.lessons.forEach(l=>{if(data[l.id])l.quizzes=data[l.id];});}
    QUIZ_CACHE[sid]=true;
  }catch(e){console.error('Failed to load quizzes for section '+sid,e);}
}

function handlePhoto(input){
  const file=input.files[0];
  if(!file)return;
  if(file.size>2*1024*1024){alert('Photo is too large. Please choose an image under 2MB.');input.value='';return;}
  const reader=new FileReader();
  reader.onload=function(e){
    const b64=e.target.result;
    const preview=document.getElementById('photo-preview');
    if(preview){preview.innerHTML=`<img src="${b64}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;}
    window._pendingPhoto=b64;
  };
  reader.readAsDataURL(file);
}

async function uploadToCloudinary(base64data){
  try{
    const res=await fetch(base64data);const blob=await res.blob();
    const fd=new FormData();fd.append('file',blob);fd.append('upload_preset',CLD_PRESET);
    const r=await fetch(`https://api.cloudinary.com/v1_1/${CLD_CLOUD}/image/upload`,{method:'POST',body:fd});
    const d=await r.json();return d.secure_url||null;
  }catch(e){console.log('Cloudinary error:',e);return null;}
}

async function sendToSheet(data){
  try{
    await fetch('https://script.google.com/macros/s/AKfycbwwfDLTcBC70-zpLM0bySnOZN7XzReVVLXbE-_nJr_jFmIoRNRnBa2hw1P93iCI_tMscg/exec',{
      method:'POST',
      mode:'no-cors',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(data)
    });
  }catch(e){console.log('Sheet sync error:',e);}
}

async function submitProfile(){
  const get=(id)=>document.getElementById(id)?.value?.trim()||'';
  const name=get('f-name'),mobile=get('f-mobile'),email=get('f-email'),country=get('f-country');
  const university=get('f-university'),faculty=get('f-faculty'),gradyear=get('f-gradyear');
  const title=get('f-title'),company=get('f-company'),experience=get('f-experience');
  const level=get('f-level'),goal=get('f-goal'),examdate=get('f-examdate');
  const missing=[];
  if(!name)missing.push('Full Name');if(!mobile)missing.push('Mobile');if(!email)missing.push('Email');
  if(!country)missing.push('Country');if(!examdate)missing.push('Target Exam Date');
  if(!university)missing.push('University / Institution');if(!faculty)missing.push('Faculty / Major');if(!gradyear)missing.push('Graduation Year');
  const existingPhoto=loadStudent()?.photo||'';
  const pendingB64=window._pendingPhoto||'';
  if(!pendingB64&&!existingPhoto)missing.push('Profile Photo');
  if(missing.length>0){
    alert('Please complete all required fields:\n\n• '+missing.join('\n• '));return;
  }
  let photoUrl=existingPhoto;
  if(pendingB64&&pendingB64.startsWith('data:')){
    try{
      const fd=new FormData();fd.append('file',pendingB64);fd.append('upload_preset',CLD_PRESET);
      const res=await fetch(`https://api.cloudinary.com/v1_1/${CLD_CLOUD}/image/upload`,{method:'POST',body:fd});
      const cldData=await res.json();
      if(cldData.secure_url){photoUrl=cldData.secure_url;}else{photoUrl=pendingB64;}
    }catch(err){photoUrl=pendingB64;}
    window._pendingPhoto=null;
  }
  saveStudent({name,mobile,email,country,university,faculty,gradyear,title,company,experience,level,goal,examdate,photo:photoUrl,registeredAt:loadStudent()?.registeredAt||new Date().toISOString()});
  STATE.showProfileWarning=false;

  // Send to Google Sheets
  const fb2=loadFeedback();
  sendToSheet({
    name,mobile,email,country,university,faculty,gradyear,
    title,company,experience,level,goal,examdate,
    photo:photoUrl||'No Photo'
  });

  render();
  setTimeout(()=>{
    const el=document.getElementById('content-area');
    if(el)el.scrollTop=0;
  },50);
  alert('Welcome aboard! 🎓\n\nGreat to have you here. I\'ve received your info and I\'m ready to help you pass the CMA. Let\'s get to work! — Gawad');
}

function navTo(tab){
  if(!STATE.user&&tab!=='login'&&tab!=='loading'&&tab!=='onboarding'&&tab!=='quiz-mode'&&tab!=='quiz-mode-select'){STATE.tab='login';render();return;}
  if(tab!=='intro'&&tab!=='register'&&tab!=='login'&&tab!=='loading'&&tab!=='feedback'&&tab!=='community'&&tab!=='leaderboard'&&tab!=='search'&&tab!=='quiz-mode-select'&&tab!=='question-detail'&&tab!=='cbq'){
    const st=loadStudent();
    const fb=loadFeedback();
    const isComplete=st&&st.name&&st.mobile&&st.email&&st.country&&st.examdate&&st.photo&&st.university&&st.faculty&&st.gradyear;
    if(!isComplete){STATE.tab='register';STATE.showProfileWarning=true;render();return;}
  }
  STATE.showProfileWarning=false;
  if(tab==='lessons'&&tab!==STATE.tab){STATE.sectId=null;STATE.lessonId=null;}
  STATE.tab=tab;render();
}

      {type:'calc',id:'D2Q3',text:'Calculate total Overhead Applied for the entire year.',hint:'OH Applied = Actual DL Hours worked × POHR',exact:480000,tol:0,pre:'$',suf:'',fb:'OH Applied = 60,000 actual DLH × $8 = $480,000. Applied OH uses the ACTUAL activity level × predetermined rate — not actual overhead costs incurred.'},
      {type:'calc',id:'D2Q4',text:'Calculate the Under- or Over-Applied Overhead for the year.',hint:'Under/Over = Actual OH − Applied OH. Positive = Under-applied.',exact:12000,tol:0,pre:'$',suf:' under-applied',fb:'$492,000 − $480,000 = $12,000 Under-applied. Jobs were not charged enough overhead during the year.'},
      {type:'select',id:'D2Q5',text:'Under-applied overhead of $12,000 means:',opts:['More overhead was applied to jobs than actually incurred — COGS overstated','Less overhead was applied to jobs than actually incurred — COGS understated','Overhead was perfectly applied — no adjustment needed','Fixed costs were lower than expected'],ans:1,fb:'Under-applied = Actual > Applied. Jobs absorbed only $480,000 of $492,000 actual overhead. COGS and inventory are UNDERSTATED. At year-end, close $12,000 to COGS (debit COGS, increasing it).'},
      {type:'blank',id:'D2Q6',text:'Under-applied overhead is closed at year-end by [B1] Cost of Goods Sold. Over-applied overhead is closed by [B2] Cost of Goods Sold.',blanks:[{id:'B1',opts:['debiting (increasing)','crediting (decreasing)'],ans:'debiting (increasing)'},{id:'B2',opts:['debiting (increasing)','crediting (decreasing)'],ans:'crediting (decreasing)'}],fb:'Under-applied: actual > applied → COGS understated → DEBIT COGS. Over-applied: actual < applied → COGS overstated → CREDIT COGS. This closes the Manufacturing Overhead account to zero at year-end.'},
     ]},
    {id:'D3',num:3,title:'Process Costing — PureFlow Chemicals',topics:'Equivalent Units · Weighted Average · Cost per EU',
     case:'PureFlow Chemicals processes raw chemicals through a single department. Direct materials are added at the START of the process. Conversion costs are incurred evenly throughout.\n\nThe weighted average method is used. The cost accountant must calculate equivalent units, cost per EU, and the cost of units completed and transferred out.',
     exhibit:{headers:['Item','Units / Amount'],rows:[['Beginning WIP (50% conversion complete)','2,000 units'],['Units Started in Period','18,000 units'],['Units Completed & Transferred Out','17,000 units'],['Ending WIP (50% conversion complete)','3,000 units'],['DM Cost — Beginning WIP','$40,000'],['DM Cost — Added in Period','$320,000'],['Conversion Cost — Beginning WIP','$15,000'],['Conversion Cost — Added in Period','$170,000']]},
     questions:[
      {type:'calc',id:'D3Q1',text:'Calculate Equivalent Units for Direct Materials (Weighted Average).',hint:'DM is added at START — all units (transferred + EWIP) are 100% complete for DM.',exact:20000,tol:0,pre:'',suf:' EU',fb:'EU(DM) = 17,000 + 3,000 × 100% = 20,000. All units — transferred out AND in EWIP — are fully complete for DM since it was added at the start.'},
      {type:'calc',id:'D3Q2',text:'Calculate Equivalent Units for Conversion Costs (Weighted Average).',hint:'EU(Conv) = Units Transferred + Ending WIP × % complete for conversion',exact:18500,tol:0,pre:'',suf:' EU',fb:'EU(Conv) = 17,000 + 3,000 × 50% = 17,000 + 1,500 = 18,500. The 3,000 EWIP units are 50% converted = 1,500 equivalent fully-converted units.'},
      {type:'calc',id:'D3Q3',text:'Calculate the Cost per Equivalent Unit for Direct Materials.',hint:'WA: Total DM Cost = BWIP DM + Current DM. Divide by EU(DM).',exact:18,tol:0,pre:'$',suf:' per EU',fb:'Total DM = $40,000 + $320,000 = $360,000. CPU(DM) = $360,000 ÷ 20,000 = $18.00. Weighted average blends BWIP and current costs together.'},
      {type:'calc',id:'D3Q4',text:'Calculate total cost transferred to the next department (17,000 units).',hint:'CPU(Conv) = ($15,000 + $170,000) ÷ 18,500. Total CPU = CPU(DM) + CPU(Conv). Cost Transferred = 17,000 × Total CPU.',exact:476000,tol:50,pre:'$',suf:'',fb:'CPU(Conv) = $185,000 ÷ 18,500 = $10.00. Total CPU = $18 + $10 = $28. Cost transferred = 17,000 × $28 = $476,000.'},
      {type:'select',id:'D3Q5',text:'Why is the concept of Equivalent Units necessary in process costing?',opts:['To track individual job costs like in job order costing','To convert partially complete units into a full-unit equivalent for fair cost allocation','To eliminate the need for a predetermined overhead rate','To calculate the contribution margin per unit'],ans:1,fb:'In process costing, all units are indistinguishable — we cannot assign costs to individual units. EU converts partially complete units into their full-unit equivalent so we can calculate a meaningful cost per unit and fairly allocate costs between completed and in-process units.'},
      {type:'blank',id:'D3Q6',text:'Under Weighted Average, BWIP costs are [B1] with current period costs. Under FIFO, BWIP costs are [B2] from current period costs.',blanks:[{id:'B1',opts:['combined (blended)','separated','ignored'],ans:'combined (blended)'},{id:'B2',opts:['kept separate','combined','ignored'],ans:'kept separate'}],fb:'WA blends all costs → simpler but hides period-to-period changes. FIFO keeps BWIP separate → more accurate performance measurement. On the CMA exam, know both EU formulas: WA includes BWIP completion % in EU; FIFO adds work needed to complete BWIP separately.'},
     ]},
    {id:'D4',num:4,title:'Activity-Based Costing — TechParts Inc.',topics:'ABC vs Traditional Costing · Cost Drivers · Product Cost Distortion',
     case:'TechParts Inc. makes two products: Alpha (high-volume, simple) and Beta (low-volume, complex). The company uses a plant-wide overhead rate based on Direct Labor Hours.\n\nThe controller suspects cost distortion and wants to implement ABC with two overhead pools: Machine Setups and General Machining.',
     exhibit:{headers:['Item','Alpha','Beta','Total'],rows:[['Units Produced','10,000','1,000','11,000'],['Direct Labor Hours','20,000 DLH','5,000 DLH','25,000 DLH'],['Number of Machine Setups','10','40','50'],['Overhead — Machine Setups','—','—','$200,000'],['Overhead — General Machining','—','—','$300,000'],['Total Overhead','—','—','$500,000']]},
     questions:[
      {type:'calc',id:'D4Q1',text:'Calculate the traditional plant-wide overhead rate (based on DLH).',hint:'Traditional Rate = Total Overhead ÷ Total DL Hours',exact:20,tol:0,pre:'$',suf:' per DLH',fb:'Traditional Rate = $500,000 ÷ 25,000 DLH = $20/DLH. This single rate applies the same cost per DLH to both products — ignoring how differently they actually consume overhead resources.'},
      {type:'calc',id:'D4Q2',text:'Under traditional costing, calculate overhead cost per unit for Alpha.',hint:'Alpha overhead = 20,000 DLH × $20. Divide by 10,000 units.',exact:40,tol:0,pre:'$',suf:' per unit',fb:'Alpha OH = 20,000 × $20 = $400,000 ÷ 10,000 = $40/unit. Alpha uses 80% of total DLH so it absorbs $400,000 of the $500,000 total.'},
      {type:'calc',id:'D4Q3',text:'Using ABC, calculate overhead cost per unit for Beta.',hint:'Setup rate = $200,000 ÷ 50. Machine rate = $300,000 ÷ 25,000 DLH. Beta ABC OH = (40 setups × rate) + (5,000 DLH × rate). Divide by 1,000 units.',exact:220,tol:0,pre:'$',suf:' per unit',fb:'Setup rate = $4,000/setup. Machine rate = $12/DLH. Beta OH = (40 × $4,000) + (5,000 × $12) = $160,000 + $60,000 = $220,000 ÷ 1,000 = $220/unit. Traditional only charged $100 — a $120 understatement!'},
      {type:'select',id:'D4Q4',text:'Under ABC, Alpha costs $28/unit vs $40 traditional. Beta costs $220/unit vs $100 traditional. Which statement is correct?',opts:['Traditional accurately priced both products','Alpha is UNDERCOSTED and Beta is OVERCOSTED under traditional','Alpha is OVERCOSTED and Beta is UNDERCOSTED under traditional — traditional hides Beta\'s true complexity cost','Both methods are equally valid for pricing'],ans:2,fb:'ABC Alpha = (10 × $4,000 + 20,000 × $12) ÷ 10,000 = $28. Traditional overcosts Alpha ($40 vs $28) and massively undercosts Beta ($100 vs $220). Beta consumes 80% of setups but only 20% of DLH — traditional misses this entirely.'},
      {type:'drag',id:'D4Q5',text:'Match each cost driver to its most appropriate overhead activity:',items:['Number of Machine Setups','Direct Labor Hours','Number of Purchase Orders','Square Footage Occupied'],zones:['Batch Setup Activity','Machining Activity','Procurement Activity','Facility Activity'],correct:{'Number of Machine Setups':'Batch Setup Activity','Direct Labor Hours':'Machining Activity','Number of Purchase Orders':'Procurement Activity','Square Footage Occupied':'Facility Activity'},fb:'ABC matches each cost pool to the activity that DRIVES the cost: Setups → setup count. Machine time → DLH. Purchasing → PO count. Facility → space. Choosing the correct driver is the most critical step in ABC design.'},
      {type:'blank',id:'D4Q6',text:'Under traditional costing, high-volume simple products tend to be [B1] because they absorb too much overhead via DLH. Low-volume complex products tend to be [B2] because they consume disproportionate batch-level resources.',blanks:[{id:'B1',opts:['overcosted','undercosted','correctly costed'],ans:'overcosted'},{id:'B2',opts:['overcosted','undercosted','correctly costed'],ans:'undercosted'}],fb:'This is the classic ABC finding: traditional DLH-based costing cross-subsidizes complex products. High-volume products end up overpriced and low-volume complex products underpriced — leading to bad pricing and product mix decisions. ABC corrects this.'},
     ]},
    {id:'D5',num:5,title:'Joint Products — PetroRefine Corp.',topics:'Joint Cost Allocation · Further Processing Decision · Split-Off Point',
     case:'PetroRefine Corp. processes crude oil through a joint refining process costing $180,000. At the split-off point, three joint products emerge.\n\nManagement must (1) allocate joint costs for financial reporting using the physical units method, and (2) decide product by product whether to sell at split-off or process further.',
     exhibit:{headers:['Product','Output','Split-off Price','Further Process Cost','Price After Processing'],rows:[['Gasoline','5,000 gal','$25/gal','Not applicable','—'],['Diesel','3,000 gal','$20/gal','$30,000','$35/gal'],['Kerosene','2,000 gal','$15/gal','$40,000','$24/gal']]},
     questions:[
      {type:'calc',id:'D5Q1',text:'Using the physical units method, calculate the joint cost allocated to Gasoline.',hint:'Physical units: each product\'s share = its units ÷ total units. Total gallons = 10,000.',exact:90000,tol:0,pre:'$',suf:'',fb:'Gasoline = 5,000 ÷ 10,000 = 50%. Allocated = 50% × $180,000 = $90,000. Physical units allocates purely on quantity — simple but ignores relative sales values.'},
      {type:'calc',id:'D5Q2',text:'Calculate the incremental profit from further processing Diesel. Should it be processed further?',hint:'Incremental Revenue = (New price − Split-off price) × units. Net = Incremental Revenue − Further Processing Cost.',exact:15000,tol:0,pre:'$',suf:' net benefit',fb:'Incr. Revenue = ($35 − $20) × 3,000 = $45,000. Incr. Cost = $30,000. Net benefit = $15,000. YES — process Diesel further. It adds $15,000 of incremental value.'},
      {type:'calc',id:'D5Q3',text:'Calculate the incremental profit (loss) from further processing Kerosene. Should it be processed further?',hint:'Incremental Revenue = (New price − Split-off price) × units. Compare to Further Processing Cost.',exact:22000,tol:0,pre:'$',suf:' net LOSS — sell at split-off',fb:'Incr. Revenue = ($24 − $15) × 2,000 = $18,000. Incr. Cost = $40,000. Net loss = $22,000. NO — sell Kerosene at split-off. Further processing destroys $22,000 of value.'},
      {type:'select',id:'D5Q4',text:'The $180,000 joint processing cost is IRRELEVANT to the further processing decision. Why?',opts:['Joint costs are always immaterial','Joint costs are sunk costs — already incurred regardless of what happens after the split-off point','Joint costs are not allocated to individual products','Joint costs only matter for tax purposes'],ans:1,fb:'Joint costs are SUNK at the split-off point — incurred before the decision and unchangeable regardless of the choice made. Only INCREMENTAL revenues and costs beyond split-off are relevant. This is a core managerial accounting principle: sunk costs are always irrelevant.'},
      {type:'drag',id:'D5Q5',text:'Classify each product\'s optimal decision:',items:['Gasoline (no further processing option)','Diesel (net benefit $15,000)','Kerosene (net loss $22,000)'],zones:['Sell at Split-Off','Process Further'],correct:{'Gasoline (no further processing option)':'Sell at Split-Off','Diesel (net benefit $15,000)':'Process Further','Kerosene (net loss $22,000)':'Sell at Split-Off'},fb:'Rule: Process further ONLY when incremental revenue > incremental cost. Gasoline: sell at split-off (no option). Diesel: process further ($45K rev > $30K cost). Kerosene: sell at split-off ($18K rev < $40K cost).'},
      {type:'blank',id:'D5Q6',text:'In a further processing decision, joint costs are [B1] because they are [B2] costs already incurred before the split-off point.',blanks:[{id:'B1',opts:['relevant','irrelevant','sometimes relevant'],ans:'irrelevant'},{id:'B2',opts:['sunk','variable','avoidable'],ans:'sunk'}],fb:'Sunk costs = past costs, cannot be changed → ALWAYS irrelevant to decisions. The further processing decision only considers what changes AFTER split-off. Note: joint cost allocation method matters only for FINANCIAL REPORTING (inventory valuation) — never for operational decisions.'},
     ]},
  ],
  A:[
    {id:'A1',num:1,title:'Revenue Recognition — SkyBridge Software',topics:'ASC 606 · Five-Step Model · Performance Obligations · Allocation',
     case:'SkyBridge Software signs a contract with a client for $90,000. The contract includes three distinct performance obligations: a software license, implementation services, and 12 months of technical support.\n\nThe finance team must apply the ASC 606 five-step model to determine how much revenue to allocate to each obligation and when to recognize it.',
     exhibit:{headers:['Performance Obligation','Standalone Selling Price (SSP)','Recognition Timing'],rows:[['Software License','$60,000','?'],['Implementation Services','$20,000','?'],['Technical Support (12 months)','$20,000','?'],['Total SSP','$100,000','—'],['Contract Price','$90,000','—']]},
     questions:[
      {type:'calc',id:'A1Q1',text:'Calculate the revenue allocated to the Software License under ASC 606.',hint:'Allocate based on relative SSP. License proportion = $60,000 ÷ $100,000. Apply to contract price.',exact:54000,tol:0,pre:'$',suf:'',fb:'License = 60/100 × $90,000 = $54,000. ASC 606 Step 4 requires allocating the transaction price based on RELATIVE standalone selling prices — not the SSP directly, because the contract price differs from total SSP.'},
      {type:'calc',id:'A1Q2',text:'Calculate the revenue allocated to Technical Support.',hint:'Support proportion = $20,000 ÷ $100,000. Apply to $90,000.',exact:18000,tol:0,pre:'$',suf:'',fb:'Support = 20/100 × $90,000 = $18,000. Even though the SSP is $20,000, only $18,000 is allocated because the contract was priced at a discount ($90K vs $100K SSP total).'},
      {type:'calc',id:'A1Q3',text:'How much Technical Support revenue is recognized each month?',hint:'Support is recognized evenly over 12 months.',exact:1500,tol:0,pre:'$',suf:' per month',fb:'Monthly support revenue = $18,000 ÷ 12 = $1,500. Support is a performance obligation satisfied OVER TIME (the customer simultaneously receives and consumes the benefit each month).'},
      {type:'select',id:'A1Q4',text:'When is the Software License revenue of $54,000 recognized?',opts:['Evenly over 12 months like the support','At the point in time when the license is transferred to the customer','When the full $90,000 cash is collected','Only after implementation services are complete'],ans:1,fb:'A software license is typically recognized at a POINT IN TIME — when control transfers to the customer (delivery of the license key). It is a separate performance obligation from the support. If the license were a right-to-access (with ongoing updates), it would be over time.'},
      {type:'drag',id:'A1Q5',text:'Match each performance obligation to its revenue recognition pattern:',items:['Software License (control transfers at delivery)','Implementation Services (performed over weeks)','Technical Support (12-month contract)'],zones:['Point in Time','Over Time'],correct:{'Software License (control transfers at delivery)':'Point in Time','Implementation Services (performed over weeks)':'Over Time','Technical Support (12-month contract)':'Over Time'},fb:'ASC 606 Step 5: Recognize revenue when (or as) each PO is satisfied. Point in time = control transfers at a moment. Over time = customer simultaneously receives and consumes, entity creates/enhances asset customer controls, or no alternative use and right to payment.'},
      {type:'blank',id:'A1Q6',text:'ASC 606 Step 3 is to determine the [B1]. Step 4 allocates it based on [B2] selling prices.',blanks:[{id:'B1',opts:['transaction price','performance obligations','contract modification'],ans:'transaction price'},{id:'B2',opts:['standalone','contract','discounted'],ans:'standalone'}],fb:'The 5 steps: (1) Identify the contract. (2) Identify performance obligations. (3) Determine the TRANSACTION PRICE (total consideration). (4) Allocate to POs based on STANDALONE selling prices. (5) Recognize revenue when/as each PO is satisfied.'},
     ]},
    {id:'A2',num:2,title:'Inventory Costing — BrightGoods Trading',topics:'FIFO · LIFO · Weighted Average · LIFO Reserve',
     case:'BrightGoods Trading uses a periodic inventory system. Prices have been rising throughout the year. Management wants to compare results under all three cost flow assumptions and understand the LIFO reserve.\n\nThe company sold 700 units during the year.',
     exhibit:{headers:['Transaction','Units','Unit Cost','Total Cost'],rows:[['Beginning Inventory','200','$10.00','$2,000'],['Purchase 1','300','$12.00','$3,600'],['Purchase 2','500','$15.00','$7,500'],['Total Available','1,000','—','$13,100'],['Units Sold','700','—','?'],['Ending Inventory','300','—','?']]},
     questions:[
      {type:'calc',id:'A2Q1',text:'Calculate Ending Inventory under FIFO.',hint:'FIFO: ending inventory consists of the MOST RECENT purchases. 300 units remain.',exact:4500,tol:0,pre:'$',suf:'',fb:'FIFO EI = 300 units × $15.00 (most recent purchase) = $4,500. FIFO assumes the first units purchased are the first sold — so ending inventory holds the newest (highest cost) units.'},
      {type:'calc',id:'A2Q2',text:'Calculate COGS under LIFO (periodic).',hint:'LIFO: ending inventory consists of the OLDEST units. EI = 200 @ $10 + 100 @ $12. COGS = Total − EI.',exact:9900,tol:0,pre:'$',suf:'',fb:'LIFO EI = 200 × $10 + 100 × $12 = $2,000 + $1,200 = $3,200. LIFO COGS = $13,100 − $3,200 = $9,900. LIFO assumes newest units are sold first — COGS reflects current (higher) costs.'},
      {type:'calc',id:'A2Q3',text:'Calculate COGS under the Weighted Average method.',hint:'WA unit cost = Total Cost ÷ Total Units. WA COGS = Units Sold × WA unit cost.',exact:9170,tol:0,pre:'$',suf:'',fb:'WA unit cost = $13,100 ÷ 1,000 = $13.10. WA COGS = 700 × $13.10 = $9,170. Weighted average blends all costs equally — COGS falls between FIFO and LIFO in a rising price environment.'},
      {type:'calc',id:'A2Q4',text:'Calculate the LIFO Reserve at year-end.',hint:'LIFO Reserve = FIFO Ending Inventory − LIFO Ending Inventory',exact:1300,tol:0,pre:'$',suf:'',fb:'LIFO Reserve = $4,500 (FIFO EI) − $3,200 (LIFO EI) = $1,300. The LIFO reserve represents how much higher inventory (and net income) would be if the company used FIFO instead of LIFO.'},
      {type:'select',id:'A2Q5',text:'In a period of RISING prices, which statement about FIFO vs LIFO is correct?',opts:['FIFO produces higher COGS and lower net income than LIFO','LIFO produces lower COGS and higher net income than FIFO','FIFO produces lower COGS, higher net income, higher ending inventory, and higher taxes','LIFO and FIFO produce identical net income in rising prices'],ans:2,fb:'Rising prices: FIFO assigns older (cheaper) costs to COGS → LOWER COGS → HIGHER gross profit → HIGHER net income → HIGHER taxes. LIFO assigns newer (higher) costs to COGS → HIGHER COGS → LOWER income → LOWER taxes (tax advantage). FIFO better reflects current inventory values on the balance sheet.'},
      {type:'blank',id:'A2Q6',text:'LIFO is [B1] under IFRS. Under both GAAP and IFRS, inventory is written down when cost exceeds [B2].',blanks:[{id:'B1',opts:['prohibited','required','allowed'],ans:'prohibited'},{id:'B2',opts:['Net Realizable Value (NRV)','Fair Market Value','Replacement Cost'],ans:'Net Realizable Value (NRV)'}],fb:'IFRS prohibits LIFO — only FIFO and Weighted Average are allowed. LCNRV (Lower of Cost or Net Realizable Value) applies under both GAAP and IFRS: if NRV < cost, write down inventory. Under GAAP, write-downs cannot be reversed. Under IFRS, reversals ARE allowed if NRV recovers.'},
     ]},
    {id:'A3',num:3,title:'Depreciation & Asset Disposal — MetalWorks Corp.',topics:'Straight-Line · DDB · Book Value · Gain/Loss on Disposal',
     case:'MetalWorks Corp. acquired a manufacturing machine. Management is evaluating different depreciation methods and needs to calculate the financial impact of disposing of the machine after three years of straight-line depreciation.\n\nThe machine will be sold for $45,000 at the end of Year 3.',
     exhibit:{headers:['Item','Amount'],rows:[['Acquisition Cost','$120,000'],['Estimated Salvage Value','$20,000'],['Useful Life','5 years'],['Year 1 Production','30,000 units'],['Total Production Capacity','100,000 units'],['Disposal Price (end of Year 3)','$45,000']]},
     questions:[
      {type:'calc',id:'A3Q1',text:'Calculate the annual Straight-Line depreciation expense.',hint:'SL = (Cost − Salvage Value) ÷ Useful Life',exact:20000,tol:0,pre:'$',suf:' per year',fb:'SL = ($120,000 − $20,000) ÷ 5 = $100,000 ÷ 5 = $20,000/year. Straight-line is the simplest method — equal expense each year over the asset\'s useful life.'},
      {type:'calc',id:'A3Q2',text:'Calculate the Double-Declining Balance (DDB) depreciation for Year 1.',hint:'DDB rate = 2 ÷ Useful Life. Apply to book value at start of year. Salvage NOT deducted initially.',exact:48000,tol:0,pre:'$',suf:'',fb:'DDB rate = 2/5 = 40%. Year 1 = 40% × $120,000 = $48,000. DDB ignores salvage value in the rate calculation — but must STOP depreciating when book value reaches salvage value.'},
      {type:'calc',id:'A3Q3',text:'Calculate DDB depreciation for Year 2.',hint:'Year 2 BV = Cost − Year 1 DDB. Apply 40% to Year 2 BV.',exact:28800,tol:0,pre:'$',suf:'',fb:'Year 2 BV = $120,000 − $48,000 = $72,000. Year 2 DDB = 40% × $72,000 = $28,800. DDB accelerates depreciation — highest in early years, declining each year.'},
      {type:'calc',id:'A3Q4',text:'Calculate the book value after 3 years using Straight-Line depreciation.',hint:'Accumulated Depreciation (SL, 3 years) = 3 × annual SL. BV = Cost − Accum Dep.',exact:60000,tol:0,pre:'$',suf:'',fb:'Accum Dep = 3 × $20,000 = $60,000. BV = $120,000 − $60,000 = $60,000. This is the net book value — what remains on the balance sheet before disposal.'},
      {type:'calc',id:'A3Q5',text:'Calculate the Gain or Loss on disposal when the machine is sold for $45,000.',hint:'Gain/Loss = Proceeds − Book Value at disposal.',exact:15000,tol:0,pre:'$',suf:' LOSS',fb:'Loss = $45,000 − $60,000 = −$15,000 (loss). Proceeds < book value → LOSS on disposal. If proceeds > BV → GAIN. The gain/loss appears on the income statement under other income/expense.'},
      {type:'select',id:'A3Q6',text:'Which depreciation method produces the HIGHEST depreciation expense in Year 1?',opts:['Straight-Line — always the highest','Double-Declining Balance — accelerated method','Units of Production — depends on actual usage','All methods give the same Year 1 amount'],ans:1,fb:'DDB Year 1 = $48,000 vs SL = $20,000. DDB is an accelerated method — front-loads depreciation. Units of production Year 1 = ($100,000/100,000) × 30,000 = $30,000. DDB is highest. Accelerated methods are preferred for tax purposes (reduce taxable income faster).'},
     ]},
    {id:'A4',num:4,title:'Financial Statement Analysis — ClearPath Retailers',topics:'Liquidity Ratios · Solvency · Profitability · Interest Coverage',
     case:'ClearPath Retailers is being evaluated by both a bank (for a loan) and potential investors. The analyst must calculate key financial ratios from the statements to assess liquidity, solvency, and profitability.\n\nAll data is provided in the exhibit below.',
     exhibit:{headers:['Item','Amount'],rows:[['Cash','$50,000'],['Accounts Receivable','$80,000'],['Inventory','$120,000'],['Prepaid Expenses','$10,000'],['Total Assets','$800,000'],['Current Liabilities','$130,000'],['Long-Term Debt','$270,000'],['Total Equity','$400,000'],['Net Sales','$600,000'],['Cost of Goods Sold','$360,000'],['EBIT','$100,000'],['Interest Expense','$20,000'],['Net Income','$60,000']]},
     questions:[
      {type:'calc',id:'A4Q1',text:'Calculate the Current Ratio.',hint:'Current Ratio = Total Current Assets ÷ Current Liabilities. CA = Cash + AR + Inventory + Prepaid.',exact:2,tol:0.01,pre:'',suf:'x',fb:'Total CA = $50K + $80K + $120K + $10K = $260,000. Current Ratio = $260,000 ÷ $130,000 = 2.0x. A ratio of 2.0 means the company has $2 of current assets for every $1 of current liabilities — generally considered adequate.'},
      {type:'calc',id:'A4Q2',text:'Calculate the Quick Ratio (Acid-Test Ratio).',hint:'Quick Ratio = (Cash + AR) ÷ Current Liabilities. Excludes inventory and prepaid.',exact:1,tol:0.01,pre:'',suf:'x',fb:'Quick Ratio = ($50,000 + $80,000) ÷ $130,000 = $130,000 ÷ $130,000 = 1.0x. The quick ratio excludes inventory (less liquid) and prepaid expenses — a stricter liquidity test. A ratio of 1.0 means just enough liquid assets to cover current liabilities.'},
      {type:'calc',id:'A4Q3',text:'Calculate the Return on Equity (ROE).',hint:'ROE = Net Income ÷ Total Equity',exact:15,tol:0.1,pre:'',suf:'%',fb:'ROE = $60,000 ÷ $400,000 = 15%. ROE measures how efficiently the company generates profit from shareholders\' equity. Higher ROE = better returns for equity investors.'},
      {type:'calc',id:'A4Q4',text:'Calculate the Interest Coverage Ratio.',hint:'Interest Coverage = EBIT ÷ Interest Expense',exact:5,tol:0.05,pre:'',suf:'x',fb:'Interest Coverage = $100,000 ÷ $20,000 = 5.0x. The company earns $5 of operating income for every $1 of interest — strong debt service capacity. A ratio below 1.5x raises serious solvency concerns.'},
      {type:'drag',id:'A4Q5',text:'Classify each ratio into the correct category:',items:['Current Ratio','Debt-to-Equity Ratio','Return on Assets','Interest Coverage Ratio'],zones:['Liquidity Ratio','Solvency Ratio','Profitability Ratio'],correct:{'Current Ratio':'Liquidity Ratio','Debt-to-Equity Ratio':'Solvency Ratio','Return on Assets':'Profitability Ratio','Interest Coverage Ratio':'Solvency Ratio'},fb:'Liquidity: ability to meet short-term obligations (Current, Quick, Cash ratios). Solvency: ability to meet long-term debt obligations (D/E, Debt-to-Assets, Interest Coverage). Profitability: ability to generate profit (ROA, ROE, Gross Margin, Net Profit Margin).'},
      {type:'blank',id:'A4Q6',text:'The Quick Ratio excludes [B1] from current assets because it is less liquid. A current ratio ABOVE [B2] is generally considered a sign of adequate short-term liquidity.',blanks:[{id:'B1',opts:['inventory and prepaid expenses','accounts receivable','cash'],ans:'inventory and prepaid expenses'},{id:'B2',opts:['1.0','2.0','0.5'],ans:'1.0'}],fb:'The quick ratio strips out the least liquid current assets (inventory must be sold first, prepaid cannot be converted to cash). A current ratio > 1.0 means CA > CL (can cover obligations). The "ideal" ratio varies by industry — retail often runs 1.5–2.0x.'},
     ]},
    {id:'A5',num:5,title:'Bonds Payable — HorizonCo',topics:'Bond Issue Price · Discount · Effective Interest Method · Carrying Value',
     case:'HorizonCo issues 5-year bonds with a face value of $1,000,000 and a stated coupon rate of 8% (annual). At the time of issue, the market (effective) interest rate is 10%.\n\nThe finance team must calculate the issue price, record the discount, and apply the effective interest method for Year 1 amortization.',
     exhibit:{headers:['Item','Data'],rows:[['Face Value','$1,000,000'],['Coupon Rate (stated)','8% annual'],['Annual Coupon Payment','$80,000'],['Market Rate at Issuance','10%'],['Term','5 years'],['PV Annuity Factor (10%, 5 yrs)','3.791'],['PV Single Payment Factor (10%, 5 yrs)','0.621']]},
     questions:[
      {type:'calc',id:'A5Q1',text:'Calculate the issue price of the bonds.',hint:'Issue Price = PV of coupons + PV of face value. Use the provided PV factors.',exact:924280,tol:50,pre:'$',suf:'',fb:'PV of coupons = $80,000 × 3.791 = $303,280. PV of face = $1,000,000 × 0.621 = $621,000. Issue price = $924,280. Bonds issued BELOW face because market rate (10%) > coupon rate (8%) — investors demand a discount to earn market return.'},
      {type:'calc',id:'A5Q2',text:'Calculate the Discount on Bonds Payable at issuance.',hint:'Discount = Face Value − Issue Price',exact:75720,tol:50,pre:'$',suf:'',fb:'Discount = $1,000,000 − $924,280 = $75,720. The discount represents additional interest cost above the coupon — it will be amortized over 5 years, increasing interest expense each year.'},
      {type:'calc',id:'A5Q3',text:'Calculate Year 1 Interest Expense using the effective interest method.',hint:'Interest Expense = Beginning Carrying Value × Market Rate',exact:92428,tol:50,pre:'$',suf:'',fb:'Year 1 Interest Expense = $924,280 × 10% = $92,428. The effective interest method applies the market rate to the CARRYING VALUE — not the face value. Expense exceeds the $80,000 cash coupon because the bond was issued at a discount.'},
      {type:'calc',id:'A5Q4',text:'Calculate the discount amortized in Year 1.',hint:'Discount Amortized = Interest Expense − Cash Coupon Paid',exact:12428,tol:50,pre:'$',suf:'',fb:'Amortized = $92,428 − $80,000 = $12,428. Each year, the discount amortization INCREASES the carrying value of the bond, bringing it toward face value by maturity. The carrying value after Year 1 = $924,280 + $12,428 = $936,708.'},
      {type:'select',id:'A5Q5',text:'Because the market rate (10%) exceeds the coupon rate (8%), the bonds were issued:',opts:['At a premium — above face value','At face value — par','At a discount — below face value','At salvage value'],ans:2,fb:'Market rate > coupon rate → bonds issued at a DISCOUNT (below face). Buyers pay less than face because the coupon payments are below market. Conversely: market rate < coupon rate → premium (above face). Market rate = coupon rate → issued at par (face value).'},
      {type:'blank',id:'A5Q6',text:'Under the effective interest method, interest expense equals carrying value × [B1] rate. When bonds are issued at a discount, interest expense is [B2] than the cash coupon paid each period.',blanks:[{id:'B1',opts:['market (effective)','coupon (stated)','average'],ans:'market (effective)'},{id:'B2',opts:['higher','lower','equal'],ans:'higher'}],fb:'Effective interest method: Interest Expense = CV × market rate. Cash paid = Face × coupon rate. For discount bonds: CV < Face and market rate > coupon rate → Interest Expense > Cash paid. The difference is amortization of the discount, which increases CV each year until it reaches face value at maturity.'},
     ]},
  ],
  B:[
    // ── CBQ B1: Flexible Budget Analysis ─────────────────────
    {id:'B1',num:1,title:'Flexible Budget Analysis — Greenfield Manufacturing',topics:'Flexible Budget · Sales Volume Variance · Flexible Budget Variance',
     case:'Greenfield Manufacturing uses a standard costing and flexible budgeting system. At the start of the year, management prepared a static budget based on expected production and sales of 10,000 units.\n\nAt year-end, actual results showed production and sales of 12,000 units — 20% above plan. The CFO needs to separate the overall variance into its two components to correctly evaluate performance.',
     exhibit:{headers:['Item','Static Budget (10,000 units)','Actual Results (12,000 units)'],rows:[['Units Sold','10,000','12,000'],['Revenue','$500,000  ($50/unit)','$570,000  ($47.50/unit)'],['Variable Costs','$300,000  ($30/unit)','$375,000  ($31.25/unit)'],['Fixed Costs','$80,000','$85,000'],['Operating Income','$120,000','$110,000']]},
     questions:[
      {type:'calc',id:'B1Q1',text:'Calculate the Flexible Budget Operating Income at the actual volume of 12,000 units.',hint:'Flex Revenue = 12,000 × $50. Flex VC = 12,000 × $30. Fixed stays at $80,000.',exact:160000,tol:10,pre:'$',suf:'',fb:'Flex Revenue = 12,000 × $50 = $600,000. Flex VC = 12,000 × $30 = $360,000. Fixed = $80,000. Flex OI = $600,000 − $360,000 − $80,000 = $160,000.'},
      {type:'calc',id:'B1Q2',text:'Calculate the Sales Volume Variance (in Operating Income).',hint:'Sales Volume Variance = Flexible Budget OI − Static Budget OI',exact:40000,tol:10,pre:'$',suf:'',fb:'SV Variance = $160,000 − $120,000 = $40,000 Favorable. Selling more units than planned creates a favorable volume variance.'},
      {type:'calc',id:'B1Q3',text:'Calculate the Flexible Budget Variance (in Operating Income).',hint:'Flexible Budget Variance = Actual OI − Flexible Budget OI',exact:50000,tol:10,pre:'$',suf:'',fb:'FB Variance = $110,000 − $160,000 = −$50,000 Unfavorable. Despite selling more, higher variable costs and lower selling price per unit eroded profitability.'},
      {type:'select',id:'B1Q4',text:'The Sales Volume Variance is Favorable. What is the most accurate explanation?',opts:['The company charged a higher price than budgeted','The company sold more units than the static budget planned','The company controlled variable costs better than planned','Fixed costs were lower than budgeted'],ans:1,fb:'The Sales Volume Variance measures ONLY the effect of selling more (or fewer) units than planned — holding prices and costs at standard. Selling 2,000 extra units at the standard CM explains the $40,000 F variance.'},
      {type:'drag',id:'B1Q5',text:'Classify each variance as Favorable (F) or Unfavorable (U):',items:['Sales Volume Variance','Flexible Budget Variance','Overall Static Budget Variance','Selling Price Variance'],zones:['Favorable','Unfavorable'],correct:{'Sales Volume Variance':'Favorable','Flexible Budget Variance':'Unfavorable','Overall Static Budget Variance':'Unfavorable','Selling Price Variance':'Unfavorable'},fb:'SV = $40K F (more units). FB Variance = $50K U (higher VC + lower price). Overall = $10K U ($110K − $120K). Selling Price = ($47.50 − $50) × 12,000 = $30,000 U.'},
      {type:'blank',id:'B1Q6',text:'The flexible budget adjusts for changes in [B1], but does NOT adjust for changes in [B2] or selling price.',blanks:[{id:'B1',opts:['volume/activity level','fixed costs','selling price'],ans:'volume/activity level'},{id:'B2',opts:['variable cost per unit','sales units','contribution margin'],ans:'variable cost per unit'}],fb:'The flexible budget only adjusts revenue and variable costs for actual volume — it keeps the original standard price and standard variable cost per unit. It isolates the volume effect from efficiency and price effects.'},
     ]},
    // ── CBQ B2: Master Budget ─────────────────────────────────
    {id:'B2',num:2,title:'Master Budget — SkyLine Products',topics:'Production Budget · DM Purchases Budget · Budget Sequence',
     case:'SkyLine Products is preparing its annual master budget. The sales team has finalized the sales forecast, and management has set inventory policies.\n\nThe production manager must build the production budget and then the purchasing manager needs the direct materials purchases budget to coordinate with suppliers.',
     exhibit:{headers:['Item','Data'],rows:[['Budgeted Sales','8,000 units'],['Beginning Finished Goods','500 units'],['Desired Ending Finished Goods','800 units'],['DM Required per Unit','3 kg'],['DM Cost per kg','$4.00'],['Beginning DM Inventory','600 kg'],['Desired Ending DM Inventory','400 kg']]},
     questions:[
      {type:'calc',id:'B2Q1',text:'Calculate the number of units to be produced.',hint:'Production = Sales + Ending FG Inventory − Beginning FG Inventory',exact:8300,tol:0,pre:'',suf:' units',fb:'Production = 8,000 + 800 − 500 = 8,300 units. We need to produce more than we sell because desired ending inventory (800) exceeds beginning inventory (500).'},
      {type:'calc',id:'B2Q2',text:'Calculate the total Direct Materials (kg) needed for production.',hint:'DM Usage = Units to Produce × DM per Unit',exact:24900,tol:0,pre:'',suf:' kg',fb:'DM Usage = 8,300 units × 3 kg/unit = 24,900 kg. This is the USAGE budget — how much DM is consumed in production.'},
      {type:'calc',id:'B2Q3',text:'Calculate the Direct Materials to be PURCHASED (in kg).',hint:'Purchases = DM Usage + Ending DM Inventory − Beginning DM Inventory',exact:24700,tol:0,pre:'',suf:' kg',fb:'Purchases = 24,900 + 400 − 600 = 24,700 kg. We need less than usage because we are drawing down DM inventory (ending < beginning).'},
      {type:'calc',id:'B2Q4',text:'Calculate the total cost of Direct Materials purchases.',hint:'Cost = kg to Purchase × Cost per kg',exact:98800,tol:0,pre:'$',suf:'',fb:'DM Purchases Cost = 24,700 kg × $4.00/kg = $98,800.'},
      {type:'select',id:'B2Q5',text:'Which budget MUST be completed before the Direct Materials Purchases Budget can be prepared?',opts:['Cash Budget','Sales Budget only','Production Budget','Direct Labor Budget'],ans:2,fb:'The sequence is: Sales Budget → Production Budget → DM Usage Budget → DM Purchases Budget. The Production Budget must come first because DM usage depends on how many units will be produced — which depends on sales and inventory targets.'},
      {type:'blank',id:'B2Q6',text:'Production Budget formula: Units to Produce = Budgeted [B1] + Desired Ending [B2] − Beginning [B2].',blanks:[{id:'B1',opts:['Sales','Purchases','Production'],ans:'Sales'},{id:'B2',opts:['Raw Materials','Finished Goods','Work in Process'],ans:'Finished Goods'}],fb:'This formula is the core of the production budget. It ensures the company produces enough to meet sales demand AND achieve its desired ending inventory level, while avoiding overproduction of units already in beginning inventory.'},
     ]},
    // ── CBQ B3: Capital Budgeting ─────────────────────────────
    {id:'B3',num:3,title:'Capital Budgeting — Apex Industries',topics:'NPV · Payback Period · IRR Decision Rule',
     case:'Apex Industries is evaluating a new automated assembly machine. The CFO must apply capital budgeting techniques to decide whether to proceed.\n\nThe finance team has prepared the following data. The company\'s required rate of return (hurdle rate) is 12%. A PV annuity factor table has been provided.',
     exhibit:{headers:['Item','Amount'],rows:[['Initial Investment','$200,000'],['Useful Life','5 years'],['Salvage Value','$0'],['Annual Net Cash Inflows','$60,000 / year'],['Required Rate of Return','12%'],['PV Annuity Factor (12%, 5 yrs)','3.605'],['Calculated IRR','~15.2%']]},
     questions:[
      {type:'calc',id:'B3Q1',text:'Calculate the total Present Value of future cash inflows.',hint:'PV of Annuity = Annual Cash Flow × PV Annuity Factor',exact:216300,tol:50,pre:'$',suf:'',fb:'PV of Inflows = $60,000 × 3.605 = $216,300. This is the present value of all five annual cash flows discounted at 12%.'},
      {type:'calc',id:'B3Q2',text:'Calculate the Net Present Value (NPV) of the project.',hint:'NPV = PV of Inflows − Initial Investment',exact:16300,tol:50,pre:'$',suf:'',fb:'NPV = $216,300 − $200,000 = $16,300. Positive NPV means the project earns MORE than the required 12% — it creates value for shareholders.'},
      {type:'calc',id:'B3Q3',text:'Calculate the Payback Period (in years). Round to 2 decimal places.',hint:'Payback = Initial Investment ÷ Annual Cash Flow (even cash flows)',exact:3.33,tol:0.05,pre:'',suf:' years',fb:'Payback = $200,000 ÷ $60,000 = 3.33 years. The company recovers its investment in 3 years and 4 months.'},
      {type:'select',id:'B3Q4',text:'Based on NPV = $16,300 and IRR = 15.2%, what is the correct investment decision?',opts:['Reject — payback exceeds 3 years','Accept — both NPV > 0 and IRR > hurdle rate confirm value creation','Reject — IRR is too close to the hurdle rate','Accept based on payback period only'],ans:1,fb:'Both methods agree: NPV > 0 means value is created above the required return. IRR (15.2%) > hurdle rate (12%) confirms the same. When NPV and IRR agree, the decision is clear. NPV is the superior method — always trust NPV in conflicts.'},
      {type:'select',id:'B3Q5',text:'The MAJOR weakness of the Payback Period method is:',opts:['It is too difficult to calculate','It ignores cash flows after the payback period and ignores the time value of money','It requires knowledge of the discount rate','It always gives a shorter period than NPV'],ans:1,fb:'Payback ignores: (1) all cash flows AFTER recovery of investment — a project could pay back quickly then earn nothing; (2) the time value of money — $60,000 in year 1 is treated the same as $60,000 in year 5. It is used only as a RISK measure (liquidity).'},
      {type:'blank',id:'B3Q6',text:'When NPV is [B1] zero, the project earns exactly the required rate. When NPV is [B2] zero, the project should be accepted because it creates shareholder value.',blanks:[{id:'B1',opts:['greater than','equal to','less than'],ans:'equal to'},{id:'B2',opts:['greater than','equal to','less than'],ans:'greater than'}],fb:'NPV = 0: project earns exactly the hurdle rate — break-even in value terms. NPV > 0: earns MORE than required → ACCEPT. NPV < 0: earns LESS than required → REJECT. The IRR is actually the discount rate that makes NPV = 0.'},
     ]},
    // ── CBQ B4: Forecasting Methods ──────────────────────────
    {id:'B4',num:4,title:'Forecasting Methods — Bluebell Retail',topics:'Linear Regression · Exponential Smoothing · Smoothing Constant α',
     case:'Bluebell Retail uses quantitative forecasting to plan inventory and staffing. The analytics team has developed two forecasting models and needs to apply them to generate upcoming period forecasts.\n\nModel 1: Linear regression based on historical monthly sales data.\nModel 2: Exponential smoothing with smoothing constant α = 0.3.',
     exhibit:{headers:['Item','Data'],rows:[['Regression Equation','Y = $50,000 + $3,000X  (X = month number)'],['Forecast Month','Month 8'],['Smoothing Constant (α)','0.3'],['Prior Forecast (F₅)','$60,000'],['Actual Sales Month 5 (A₅)','$65,000'],['Rule: α close to 1.0','Reacts QUICKLY to recent changes'],['Rule: α close to 0','STABLE forecast, reacts slowly']]},
     questions:[
      {type:'calc',id:'B4Q1',text:'Using the regression equation, calculate the sales forecast for Month 8.',hint:'Substitute X = 8 into Y = $50,000 + $3,000X',exact:74000,tol:0,pre:'$',suf:'',fb:'Y = $50,000 + $3,000(8) = $50,000 + $24,000 = $74,000. The regression equation says sales grow by $3,000 per month (the slope = trend).'},
      {type:'calc',id:'B4Q2',text:'Using exponential smoothing (α = 0.3), calculate the forecast for Month 6.',hint:'F₆ = α × A₅ + (1 − α) × F₅',exact:61500,tol:10,pre:'$',suf:'',fb:'F₆ = 0.3 × $65,000 + 0.7 × $60,000 = $19,500 + $42,000 = $61,500. The new forecast weights recent actual (30%) more than the old forecast (70%).'},
      {type:'select',id:'B4Q3',text:'If α is changed from 0.3 to 0.9, what happens to the forecast?',opts:['It becomes more stable and less reactive','It becomes more reactive — recent actual data gets 90% weight','It eliminates random/irregular variation completely','The forecast equals the actual from last period'],ans:1,fb:'α = 0.9 means 90% weight on the most recent actual and only 10% on the old forecast. The forecast tracks recent changes very closely — highly reactive. α = 0.1 would be very stable (slow to react). Choose α based on how volatile the data is.'},
      {type:'select',id:'B4Q4',text:'In the regression equation Y = $50,000 + $3,000X, what does the slope ($3,000) represent?',opts:['Total sales when X = 0','The fixed cost component of sales','The average monthly INCREASE in sales (trend)','The forecast error from last period'],ans:2,fb:'In regression Y = a + bX: "a" ($50,000) = intercept (base sales when X=0). "b" ($3,000) = slope = the expected change in Y for each one-unit increase in X. Here, sales are expected to grow by $3,000 per month.'},
      {type:'drag',id:'B4Q5',text:'Match each forecasting method to its best application:',items:['Simple Moving Average','Linear Regression','Exponential Smoothing','Time Series Decomposition'],zones:['Stable data, no trend','Predicts Y from X (trend line)','Weights recent data more','Seasonal patterns'],correct:{'Simple Moving Average':'Stable data, no trend','Linear Regression':'Predicts Y from X (trend line)','Exponential Smoothing':'Weights recent data more','Time Series Decomposition':'Seasonal patterns'},fb:'Moving Average: good for stable data. Regression: identifies trend and relationship between variables. Exponential Smoothing: adapts to recent changes via α. Time Series Decomposition: separates trend, seasonal, cyclical, and random components.'},
      {type:'blank',id:'B4Q6',text:'Exponential smoothing formula: New Forecast = α × [B1] + (1 − α) × [B2].',blanks:[{id:'B1',opts:['Prior Forecast','Actual Last Period','Moving Average'],ans:'Actual Last Period'},{id:'B2',opts:['Prior Forecast','Actual Last Period','Regression Value'],ans:'Prior Forecast'}],fb:'F(t+1) = α × A(t) + (1−α) × F(t). The new forecast is a weighted average of: the most recent ACTUAL result (weighted by α) and the PRIOR FORECAST (weighted by 1−α). Higher α = more weight to actual = more responsive forecast.'},
     ]},
    // ── CBQ B5: Cash Budget ───────────────────────────────────
    {id:'B5',num:5,title:'Cash Budget — CrystalClear Ltd',topics:'Cash Receipts · Cash Disbursements · Financing Needs',
     case:'CrystalClear Ltd prepares a monthly cash budget to manage liquidity. The treasurer has gathered the following data for March and needs to determine whether external financing will be required.\n\nCompany policy: maintain a minimum cash balance of $10,000 at all times. A line of credit is available if needed.',
     exhibit:{headers:['Item','March Amount'],rows:[['Beginning Cash Balance','$20,000'],['Cash Sales','$80,000'],['Collections from Accounts Receivable','$45,000'],['Cash Purchases (Materials)','$60,000'],['Wages Paid','$25,000'],['Overhead Paid (cash)','$15,000'],['Equipment Purchase (capital)','$30,000'],['Minimum Required Cash Balance','$10,000']]},
     questions:[
      {type:'calc',id:'B5Q1',text:'Calculate Total Cash Available for March.',hint:'Total Cash Available = Beginning Cash + Cash Receipts (Sales + Collections)',exact:145000,tol:0,pre:'$',suf:'',fb:'Cash Available = $20,000 + $80,000 + $45,000 = $145,000. Beginning cash PLUS all cash inflows for the period = total cash available before any disbursements.'},
      {type:'calc',id:'B5Q2',text:'Calculate Total Cash Disbursements for March.',hint:'Add all cash outflows: purchases + wages + overhead + equipment',exact:130000,tol:0,pre:'$',suf:'',fb:'Disbursements = $60,000 + $25,000 + $15,000 + $30,000 = $130,000. Note: the equipment purchase is a cash outflow regardless of whether it is capital or operating in nature.'},
      {type:'calc',id:'B5Q3',text:'Calculate the Ending Cash Balance BEFORE any financing.',hint:'Ending Cash = Total Cash Available − Total Disbursements',exact:15000,tol:0,pre:'$',suf:'',fb:'Ending Cash (pre-financing) = $145,000 − $130,000 = $15,000. This is compared to the minimum required balance to determine if borrowing is needed.'},
      {type:'select',id:'B5Q4',text:'Does CrystalClear need to borrow from its line of credit in March?',opts:['Yes — ending cash is below the minimum','No — ending cash of $15,000 exceeds the $10,000 minimum','Yes — the equipment purchase must always be financed separately','Cannot determine without knowing accounts payable'],ans:1,fb:'Ending cash ($15,000) > Minimum required ($10,000) → NO borrowing needed. The company has a $5,000 cushion above its minimum. If ending cash had been below $10,000, the company would borrow just enough to reach $10,000.'},
      {type:'drag',id:'B5Q5',text:'Classify each item as Cash Receipt or Cash Disbursement in the cash budget:',items:['Collections from AR','Wages Paid','Equipment Purchase','Cash Sales'],zones:['Cash Receipt','Cash Disbursement'],correct:{'Collections from AR':'Cash Receipt','Wages Paid':'Cash Disbursement','Equipment Purchase':'Cash Disbursement','Cash Sales':'Cash Receipt'},fb:'Cash Receipts = all cash INFLOWS (sales, collections). Cash Disbursements = all cash OUTFLOWS regardless of type (operating or capital). The cash budget does not separate operating vs investing — it focuses purely on cash in vs cash out.'},
      {type:'blank',id:'B5Q6',text:'The cash budget starts with [B1] cash, adds all cash [B2] to get Total Cash Available, then subtracts all cash [B3] to find ending cash before financing.',blanks:[{id:'B1',opts:['ending','beginning','minimum'],ans:'beginning'},{id:'B2',opts:['receipts','disbursements','profits'],ans:'receipts'},{id:'B3',opts:['receipts','disbursements','liabilities'],ans:'disbursements'}],fb:'Cash Budget structure: (1) Beginning Cash + (2) Cash Receipts = Total Available. Then subtract (3) Cash Disbursements = Ending Cash pre-financing. Compare to minimum balance → borrow if short, repay if excess. Simple but critical for liquidity management.'},
     ]},
  ],
  E:[
    {id:'E1',num:1,title:'COSO Internal Control Framework — Apex Financial Services',topics:'COSO 5 Components · Control Deficiencies · Management Responsibility',
     case:'Apex Financial Services engaged an internal auditor to assess their internal control environment against the COSO Internal Control — Integrated Framework (2013).\n\nThe auditor identified four control deficiencies. Management must understand which COSO component is violated in each case and the severity classification of each deficiency.',
