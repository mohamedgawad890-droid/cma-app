<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CMA Prep — Mohamed Abdelgawad</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f0eb;color:#1a1a1a;overscroll-behavior:none}
#app{display:flex;flex-direction:column;height:100vh;max-width:600px;margin:0 auto;background:#fff;position:relative;overflow:hidden}
@media(min-width:620px){#app{border-radius:16px;margin:16px auto;height:calc(100vh - 32px);box-shadow:0 8px 40px rgba(0,0,0,.12)}}
.content{flex:1;overflow:hidden;display:flex;flex-direction:column}
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:16px}
.pad{padding:0 16px}
/* Nav */
.bottom-nav{display:flex;background:#fff;border-bottom:.5px solid #e0e0d8;flex-shrink:0;padding-top:env(safe-area-inset-top);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}.bottom-nav::-webkit-scrollbar{display:none}
.nav-btn{flex:1;min-width:64px;padding:10px 0 8px;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;color:#999;font-family:inherit;transition:color .15s;position:relative}
.nav-btn.active{color:#185FA5}
.nav-btn.active::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:24px;height:2.5px;background:#185FA5;border-radius:2px}
.nav-icon{font-size:24px;line-height:1}
/* Screen headers */
.sh{padding:16px 16px 12px;border-bottom:.5px solid #e0e0d8;flex-shrink:0}
.sh h2{font-size:18px;font-weight:500}
.sh p{font-size:12px;color:#888;margin-top:3px}
.bh{padding:13px 16px 11px;border-bottom:.5px solid #e0e0d8;display:flex;align-items:center;gap:10px;flex-shrink:0;background:#fff}
.bh-back{background:none;border:none;cursor:pointer;font-size:26px;color:#888;padding:0;line-height:1;font-family:inherit}
/* Cards */
.card{background:#fff;border:.5px solid #e0e0d8;border-radius:12px;padding:14px 16px;margin-bottom:10px}
.card:last-child{margin-bottom:0}
/* Info sections */
.info-section{margin-bottom:20px}
.info-title{font-size:16px;font-weight:500;color:#1a1a1a;margin-bottom:10px;padding-bottom:8px;border-bottom:2px solid #185FA520;display:flex;align-items:center;gap:8px}
.info-p{font-size:14px;color:#555;line-height:1.65;margin-bottom:8px}
/* Stats */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.stat{background:#f5f5f0;border-radius:10px;padding:12px 8px;text-align:center}
.stat-l{font-size:10px;color:#888;margin-bottom:3px}
.stat-v{font-size:20px;font-weight:500}
.stat-s{font-size:10px;color:#888;margin-top:2px}
/* Progress bars */
.pb{height:6px;background:#ebebea;border-radius:3px;overflow:hidden}
.pb-fill{height:100%;border-radius:3px;transition:width .5s ease}
/* Buttons */
.btn{padding:13px;border-radius:10px;font-size:14px;cursor:pointer;font-weight:500;width:100%;border:none;font-family:inherit;transition:opacity .15s}
.btn:active{opacity:.8}
.btn-primary{background:#185FA5;color:#fff}
.btn-outline{background:transparent;border:.5px solid #ccc;color:#333}
.btn-danger{background:#E24B4A;color:#fff}
.btn-sm{padding:9px 0;font-size:13px;border-radius:9px;cursor:pointer;font-weight:500;font-family:inherit;flex:1;border:none}
/* Lesson content */
.lh{font-size:16px;font-weight:500;margin:20px 0 8px;color:#1a1a1a}
.lp{font-size:14px;color:#555;line-height:1.65;margin-bottom:12px}
.formula{border-radius:8px;padding:12px 16px;margin:12px 0}
.formula-lbl{font-size:10px;font-weight:500;letter-spacing:.8px;text-transform:uppercase;margin-bottom:5px}
.formula-txt{font-family:'Courier New',monospace;font-size:13px;font-weight:500;line-height:1.5}
.tip{background:#FAEEDA;border-left:3px solid #EF9F27;border-radius:0 8px 8px 0;padding:12px 16px;margin:14px 0}
.tip-lbl{font-size:10px;font-weight:500;color:#854F0B;letter-spacing:.8px;margin-bottom:5px}
.tip-txt{font-size:13px;color:#633806;line-height:1.55}
.blist{list-style:none;margin:8px 0 14px}
.blist li{display:flex;gap:8px;margin-bottom:8px;font-size:14px;color:#555;line-height:1.5}
.slist{list-style:none;margin:8px 0 14px}
.slist li{display:flex;gap:10px;margin-bottom:10px;font-size:14px;color:#555;line-height:1.5;align-items:flex-start}
.snum{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0;margin-top:1px}
/* Table */
.tbl-wrap{overflow-x:auto;margin:12px 0;border-radius:8px;border:.5px solid #e0e0d8}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{padding:9px 12px;text-align:left;font-weight:500;border-bottom:1px solid rgba(0,0,0,.1)}
.tbl td{padding:8px 12px;border-bottom:.5px solid #e0e0d8;color:#555}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:nth-child(even) td{background:#f8f8f6}
/* Quiz */
.q-opt{padding:12px 14px;border-radius:10px;cursor:pointer;display:flex;gap:10px;align-items:flex-start;margin-bottom:10px;transition:all .2s;border:.5px solid #e0e0d8;background:#f5f5f0}
.q-opt:active{opacity:.8}
.q-circle{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0;margin-top:1px;border:.5px solid #bbb;background:#e5e5e0;color:#666}
.q-text{font-size:14px;color:#1a1a1a;line-height:1.45;flex:1}
/* Chat */
.chat-wrap{display:flex;align-items:flex-end;gap:8px;margin-bottom:14px}
.chat-wrap.user{flex-direction:row-reverse}
.chat-av{width:28px;height:28px;border-radius:50%;background:#E6F1FB;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.chat-bub{max-width:78%;padding:10px 14px;font-size:14px;line-height:1.55;white-space:pre-wrap;word-break:break-word}
.chat-bub.user{border-radius:18px 18px 4px 18px;background:#185FA5;color:#fff}
.chat-bub.assistant{border-radius:4px 18px 18px 18px;background:#f0f0eb;color:#1a1a1a}
/* Intro specific */
.profile-hero{background:linear-gradient(135deg,#0C447C 0%,#185FA5 60%,#378ADD 100%);padding:30px 20px 24px;text-align:center;color:#fff}
.profile-img{width:100px;height:100px;border-radius:50%;border:3px solid rgba(255,255,255,.8);object-fit:cover;margin-bottom:12px;display:block;margin-left:auto;margin-right:auto}
.profile-name{font-size:20px;font-weight:500;margin-bottom:4px}
.profile-title{font-size:13px;opacity:.85;margin-bottom:8px}
.profile-creds{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;margin-top:8px}
.cred-badge{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);border-radius:20px;padding:4px 12px;font-size:11px;font-weight:500}
.welcome-box{background:#EAF3DE;border-left:4px solid #639922;border-radius:0 10px 10px 0;padding:14px 16px;margin:16px 0}
.welcome-box p{font-size:14px;color:#27500A;line-height:1.65}
.part-card{border-radius:10px;overflow:hidden;margin-bottom:10px;border:.5px solid #e0e0d8}
.part-header{padding:12px 14px;display:flex;align-items:center;justify-content:space-between}
.part-topics{padding:2px 14px 12px}
.part-topic{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:.5px solid rgba(255,255,255,.15);font-size:13px}
.part-topic:last-child{border-bottom:none}
.cost-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:.5px solid #e0e0d8;font-size:14px}
.cost-row:last-child{border-bottom:none}
.cost-total{background:#E6F1FB;border-radius:8px;padding:12px 14px;margin-top:10px;display:flex;justify-content:space-between;font-weight:500;font-size:14px;color:#0C447C}
.window-card{display:flex;align-items:center;gap:12px;padding:12px 14px;background:#f5f5f0;border-radius:10px;margin-bottom:8px}
.window-month{font-size:13px;font-weight:500;color:#185FA5;width:120px;flex-shrink:0}
.action-step{display:flex;gap:12px;margin-bottom:14px;align-items:flex-start}
.action-num{width:28px;height:28px;border-radius:50%;background:#185FA5;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;flex-shrink:0;margin-top:1px}
.action-content h4{font-size:14px;font-weight:500;color:#1a1a1a;margin-bottom:3px}
.action-content p{font-size:13px;color:#555;line-height:1.5}
.score-circle{width:80px;height:80px;border-radius:50%;border:4px solid #185FA5;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 12px}
.ellipsis{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row{display:flex;align-items:center;gap:10px}
.row-sb{display:flex;align-items:center;justify-content:space-between}
.badge{font-size:11px;font-weight:500;padding:3px 9px;border-radius:6px;white-space:nowrap}
.sect-icon{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
</style>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

      {id:"1-1",title:"Overview of Financial Statements",dur:"30 min",
        blocks:[
          {t:"h",v:"The Four Core Financial Statements"},
          {t:"p",v:"External financial reporting communicates a company's financial position and performance to outside stakeholders — investors, creditors, regulators, and the public. The CMA exam tests deep knowledge of four core statements and how they interrelate."},
          {t:"b",v:["Balance Sheet (Statement of Financial Position): Snapshot of assets, liabilities, and equity at a point in time","Income Statement (P&L): Revenues and expenses over a period — shows profitability","Statement of Cash Flows: Cash inflows/outflows from Operating, Investing, and Financing activities","Statement of Changes in Equity: Changes in retained earnings, paid-in capital, and other equity components"]},
          {t:"h",v:"The Balance Sheet — Accounting Equation"},
          {t:"f",l:"Accounting Equation",v:"Assets = Liabilities + Shareholders' Equity"},
          {t:"tbl",h:["Category","Examples","Classification"],r:[["Current Assets","Cash, AR, Inventory, Prepaid Expenses","Due within 1 year"],["Non-Current Assets","PP&E, Intangibles, Long-term Investments","Held beyond 1 year"],["Current Liabilities","AP, Accrued Expenses, Short-term Debt","Due within 1 year"],["Non-Current Liabilities","Long-term Debt, Deferred Tax","Due beyond 1 year"],["Equity","Common Stock, APIC, Retained Earnings","Residual interest"]]},
          {t:"h",v:"The Income Statement"},
          {t:"f",l:"Net Income Formula",v:"Net Income = Revenues - Cost of Goods Sold - Operating Expenses - Interest - Taxes"},
          {t:"p",v:"The income statement is prepared on the ACCRUAL basis — revenues are recognized when EARNED and expenses when INCURRED, regardless of when cash changes hands."},
          {t:"h",v:"The Statement of Cash Flows"},
          {t:"tbl",h:["Section","Contents","Key Items"],r:[["Operating Activities","Core business cash flows","Net income adjusted for non-cash items, working capital changes"],["Investing Activities","Long-term asset transactions","Purchase/sale of PP&E, investments"],["Financing Activities","Debt and equity transactions","Loans, stock issuance, dividends paid"]]},
          {t:"h",v:"Accrual vs Cash Basis"},
          {t:"b",v:["Accrual Basis: Revenue recognized when earned; expenses when incurred. Required under GAAP/IFRS.","Cash Basis: Revenue recorded when cash received; expenses when cash paid. Only used for small businesses or tax purposes."]},
          {t:"h",v:"Key Ratios from Financial Statements"},
          {t:"tbl",h:["Ratio","Formula","Measures"],r:[["Current Ratio","Current Assets / Current Liabilities","Short-term liquidity"],["Debt-to-Equity","Total Debt / Total Equity","Financial leverage"],["Net Profit Margin","Net Income / Revenue","Profitability"],["Return on Assets (ROA)","Net Income / Total Assets","Asset efficiency"],["Earnings Per Share","(Net Income - Preferred Dividends) / Shares","Per-share profitability"]]},
          {t:"tip",v:"Exam Tips: Assets = Liabilities + Equity ALWAYS balances. Net Income flows from Income Statement → Retained Earnings on Balance Sheet. Cash from Operations starts with Net Income (indirect method). Non-cash items (depreciation) are ADDED BACK in operating activities. GAAP requires accrual basis for external reporting."}

  {id:2,title:"Planning, Budgeting & Forecasting",weight:20,emoji:"📊",bar:"#639922",bg:"#EAF3DE",text:"#4A7A1A",strong:"#27500A",
    lessons:[
{id:"2-1",title:"Strategic Planning: Overview, Mission & Goals",dur:"25 min",
        blocks:[
          {t:"h",v:"What Is Strategic Planning?"},
          {t:"p",v:"Strategic planning is the process that provides guidance regarding WHAT an organization needs to do to achieve its goals. It sets the direction of operations and answers: Who, What, When, Where, and How."},
          {t:"b",v:["Aligns decisions with objectives","Enhances coordination and control","Responds proactively to change","Leads to superior performance vs. competitors"]},
          {t:"h",v:"Types of Plans"},
          {t:"tbl",h:["Type","Time Horizon","Who Sets It","Focus"],r:[["Strategic","Long-term (5+ years)","Top executives / Board","Overall direction, mission, vision"],["Tactical","Intermediate (1–3 years)","Middle management","Department goals, resource allocation"],["Operational","Short-term (daily/weekly/monthly)","Front-line managers","Day-to-day activities, procedures"]]},
          {t:"h",v:"Mission, Vision & Goals"},
          {t:"tbl",h:["Term","Definition","Example"],r:[["Mission","WHY the organization exists — its core purpose","'Deliver the best customer experience'"],["Vision","WHERE the organization wants to be in the future","'Be the global leader in...'"],["Goals","Broad, long-term outcomes to achieve the mission","Increase market share by 20%"],["Objectives","Specific, measurable steps toward goals","Launch 3 new products by Q3"]]},
          {t:"h",v:"Competitive Advantage & Shareholder Value"},
          {t:"p",v:"The main goal of strategic planning: achieve SUPERIOR PERFORMANCE vs. competitors, leading to higher profitability and shareholder value."},
          {t:"b",v:["Competitive Advantage: Offering greater value (better service, lower cost) → higher profitability","Sources: Natural resources, skilled labor, location, technology, barriers to entry","Shareholder Value: Created through capital appreciation + dividends","Short-term vs long-term trade-offs: Cutting R&D = short-term gain, long-term risk (no innovation)"]},
          {t:"h",v:"The Strategic Planning Process"},
          {t:"b",v:["Step 1: Establish mission and vision","Step 2: Analyze external environment (opportunities & threats)","Step 3: Analyze internal environment (strengths & weaknesses)","Step 4: Formulate strategies","Step 5: Implement strategies","Step 6: Monitor and evaluate performance"]},
          {t:"tip",v:"Exam Tips: Strategic = 5+ years. Tactical = 1-3 years. Operational = daily/weekly. Mission = why we exist. Vision = future state. Goals = broad, long-term. Objectives = specific, measurable. Superior performance → higher profitability → shareholder value. Short-term cost cutting can destroy long-term competitive advantage."}
        ],
        quizzes:[
          {q:"Strategic plans typically cover a time horizon of:",o:["Days to weeks","1–3 years","5 or more years","Less than one year"],a:2,e:"Strategic plans are LONG-TERM (5+ years), set by top executives, and focus on the overall direction, mission, and vision of the organization."},
          {q:"A company's mission statement describes:",o:["Its future desired state","Why the organization exists and its core purpose","Its specific short-term objectives","Its financial targets"],a:1,e:"Mission = WHY the organization exists — its fundamental purpose and reason for being. Vision describes the FUTURE state. Goals and objectives are more specific targets."},
          {q:"Cutting R&D spending to meet short-term profit targets is an example of:",o:["Effective strategic planning","Sound competitive strategy","Trading long-term competitive advantage for short-term gain","Good shareholder value management"],a:2,e:"Cutting R&D generates short-term cost savings but eliminates innovation capability — sacrificing LONG-TERM competitive advantage for short-term gain. This destroys shareholder value over time."},
          {q:"The CORRECT hierarchy of planning from broadest to most specific is:",o:["Operational → Tactical → Strategic","Strategic → Operational → Tactical","Strategic → Tactical → Operational","Tactical → Strategic → Operational"],a:2,e:"Strategic (5+ years, top executives) → Tactical (1-3 years, middle management) → Operational (daily/weekly, front-line managers). Each level supports and implements the level above it."},
          {q:"Shareholder value is primarily created through:",o:["Increasing employee headcount","Capital appreciation and dividends","Reducing strategic planning","Maximizing short-term profits only"],a:1,e:"Shareholder value = returns through CAPITAL APPRECIATION (stock price increase) + DIVIDENDS (cash distributions). It is created through sustainable competitive advantage and superior long-term performance."},
          {q:"Tactical plans are typically set by:",o:["Board of directors","Top executives","Middle management","Front-line supervisors"],a:2,e:"TACTICAL plans (1-3 years) are set by MIDDLE MANAGEMENT — department heads and managers who translate strategic goals into specific departmental plans and resource allocations."},
          {q:"The strategic planning process begins with:",o:["Implementing strategies","Monitoring performance","Establishing mission and vision","Analyzing the external environment"],a:2,e:"The strategic planning process starts with ESTABLISHING MISSION AND VISION — defining why the organization exists and where it wants to go. Everything else (analysis, strategy, implementation) flows from this foundation."},
          {q:"A specific, measurable step toward achieving a goal is called a(n):",o:["Mission","Vision","Goal","Objective"],a:3,e:"OBJECTIVES are specific, measurable, time-bound steps toward achieving broader goals. Example: 'Increase online sales by 15% by December 31' is an objective. Goals are broader ('Grow revenue'). Mission/Vision are higher-level statements."},
          {q:"Competitive advantage is best defined as:",o:["Having the lowest cost structure in the industry","Offering greater value than competitors","Having the most employees","Being the oldest company in the industry"],a:1,e:"Competitive advantage = offering GREATER VALUE than competitors, resulting in higher profitability. This can be achieved through lower costs, superior quality, better service, innovation, or other differentiating factors."},
          {q:"Which of the following is a SOURCE of competitive advantage?",o:["High fixed costs","Poor employee training","Unique technology or patents","Undifferentiated products"],a:2,e:"Sources of competitive advantage: unique technology, patents, natural resources, skilled labor, strategic location, brand reputation, barriers to entry. Unique technology gives a company capabilities competitors cannot easily replicate."}
        ]}

        blocks:[
          {t:"h",v:"Layers of the External Environment"},
          {t:"tbl",h:["Layer","Description","Examples"],r:[["Industry Environment","Most direct impact on competition","Competitors, suppliers, customers, substitutes"],["National Environment","Country-level factors","Laws, taxes, economic growth, political stability"],["International Environment","Global forces","Currency rates, trade agreements, global competition"]]},
          {t:"h",v:"PESTLE Analysis"},
          {t:"p",v:"PESTLE identifies external factors that affect the organization's strategy:"},
          {t:"tbl",h:["Factor","Examples"],r:[["Political","Government regulations, trade policy, political stability, taxes"],["Economic","GDP growth, interest rates, inflation, unemployment, exchange rates"],["Social","Demographics, culture, attitudes, education levels, lifestyle trends"],["Technological","R&D, automation, digital transformation, patents, innovation rate"],["Legal","Employment law, safety regulations, IP law, consumer protection"],["Environmental","Climate change, sustainability regulations, carbon footprint, green energy"]]},
          {t:"h",v:"Porter's 5 Forces — Industry Analysis"},
          {t:"p",v:"Porter's 5 Forces model analyzes the competitive intensity and attractiveness of an industry:"},
          {t:"b",v:["1. Threat of New Entrants: High barriers to entry = less threat (economies of scale, patents, capital requirements)","2. Bargaining Power of Suppliers: Few suppliers or unique inputs = higher supplier power","3. Bargaining Power of Buyers: Many alternatives or large buyers = higher buyer power","4. Threat of Substitutes: Alternative products that meet same need = limits pricing power","5. Rivalry Among Existing Competitors: Many competitors, slow growth, high fixed costs = intense rivalry"]},
          {t:"h",v:"Internal Environment Analysis"},
          {t:"b",v:["Core Competencies: Unique capabilities that give competitive advantage — hard for competitors to imitate","Resource-Based View: Competitive advantage comes from valuable, rare, inimitable, non-substitutable resources (VRIN)","Value Chain Analysis: Identifying where value is created and costs can be reduced internally"]},
          {t:"tip",v:"Exam Tips: PESTLE = 6 external factors (Political, Economic, Social, Technological, Legal, Environmental). Porter's 5 Forces: New Entrants + Suppliers + Buyers + Substitutes + Rivalry. High rivalry = less attractive industry. Core competencies = VRIN (Valuable, Rare, Inimitable, Non-substitutable). External analysis = opportunities & threats. Internal analysis = strengths & weaknesses."}
        ],
        quizzes:[
          {q:"Porter's 5 Forces model is used to analyze:",o:["Internal strengths and weaknesses","The competitive intensity and attractiveness of an industry","A company's financial performance","Employee productivity"],a:1,e:"Porter's 5 Forces analyzes the COMPETITIVE INTENSITY and overall ATTRACTIVENESS of an industry by examining: New Entrants, Supplier Power, Buyer Power, Substitutes, and Competitive Rivalry."},
          {q:"Which factor in PESTLE analysis relates to government regulations and trade policy?",o:["Economic","Social","Political","Legal"],a:2,e:"POLITICAL factors include government regulations, trade policy, political stability, taxation, and government intervention in markets. Legal factors (laws, regulations) are sometimes combined with Political (PEST) but are separate in PESTLE."},
          {q:"High barriers to entry in an industry indicate:",o:["High threat from new entrants","Low threat from new entrants","High rivalry among existing competitors","High buyer power"],a:1,e:"High BARRIERS TO ENTRY (economies of scale, patents, high capital requirements, brand loyalty) = LOW threat from new entrants. New competitors cannot easily enter the market, protecting existing companies' profitability."},
          {q:"Core competencies are BEST described as:",o:["The most profitable products","Unique capabilities that provide competitive advantage and are hard to imitate","The highest-paid employees","Activities performed by all companies in the industry"],a:1,e:"Core competencies are UNIQUE CAPABILITIES that give competitive advantage and are DIFFICULT FOR COMPETITORS TO IMITATE. They represent what the company does exceptionally well compared to rivals."},
          {q:"External environment analysis identifies a company's:",o:["Strengths and weaknesses","Opportunities and threats","Revenue and costs","Employees and resources"],a:1,e:"External environment analysis identifies OPPORTUNITIES (favorable external conditions to exploit) and THREATS (unfavorable conditions to defend against). Internal analysis identifies Strengths and Weaknesses. Together = SWOT."},
          {q:"Which industry force is MOST significant when a few large customers control purchasing?",o:["Threat of new entrants","Threat of substitutes","Bargaining power of buyers","Rivalry among competitors"],a:2,e:"When a FEW LARGE CUSTOMERS control significant purchasing power, BUYER POWER is high. These customers can negotiate lower prices, demand better quality/service, or switch suppliers easily — reducing industry profitability."},
          {q:"Exchange rates and inflation are examples of which PESTLE factor?",o:["Political","Economic","Social","Technological"],a:1,e:"Exchange rates, inflation, interest rates, GDP growth, and unemployment are all ECONOMIC factors in PESTLE analysis. They affect costs, revenues, and investment decisions."},
          {q:"The VRIN framework for core competencies requires resources to be:",o:["Variable, Reliable, Integrated, Networked","Valuable, Rare, Inimitable, Non-substitutable","Visible, Responsive, Innovative, Necessary","Variable, Rational, Incentivized, Needed"],a:1,e:"VRIN: Valuable (provides competitive value), Rare (not widely available), Inimitable (hard to copy), Non-substitutable (no alternative achieves the same result). Resources meeting all four criteria provide SUSTAINED competitive advantage."},
          {q:"When many suppliers exist and switching costs are low, supplier power is:",o:["High","Low","Unchanged","Indeterminate"],a:1,e:"Low supplier power = many suppliers available + low switching costs. The company can easily switch suppliers, giving it negotiating power. High supplier power = few suppliers, unique inputs, or high switching costs."},
          {q:"Demographics and cultural attitudes are examples of which PESTLE factor?",o:["Political","Economic","Social","Legal"],a:2,e:"Demographics, cultural attitudes, education levels, lifestyle trends, and population changes are SOCIAL factors in PESTLE analysis. They affect consumer behavior, labor supply, and market opportunities."}
        ]}
,
      {id:"2-3",title:"Formulating & Implementing Strategies",dur:"25 min",
        blocks:[
          {t:"h",v:"SWOT Analysis"},
          {t:"p",v:"SWOT = Strengths, Weaknesses, Opportunities, Threats. Used to align internal capabilities with external conditions to formulate competitive strategies."},
          {t:"tbl",h:["Component","Internal/External","Positive/Negative","Action"],r:[["Strengths","Internal","Positive — what we do well","Use to exploit Opportunities"],["Weaknesses","Internal","Negative — areas to improve","Address to avoid Threats"],["Opportunities","External","Positive — favorable conditions","Match with Strengths"],["Threats","External","Negative — unfavorable conditions","Defend with Strengths"]]},
          {t:"h",v:"Levels of Strategy"},
          {t:"tbl",h:["Level","Focus","Examples"],r:[["Functional-Level","Internal operations: manufacturing, marketing, HR","Improve efficiency, quality, innovation"],["Business-Level","Market positioning, product strategy","Cost leadership, differentiation, focus"],["Corporate-Level","Portfolio management, diversification","Acquisitions, divestitures, vertical integration"]]},
          {t:"h",v:"Porter's Generic Competitive Strategies"},
          {t:"tbl",h:["Strategy","How","Target","Risk"],r:[["Cost Leadership","Lowest-cost producer","Broad market","Cost advantage lost if technology changes"],["Differentiation","Unique value customers pay premium for","Broad market","Imitation by competitors"],["Focus (Cost)","Lowest cost in a niche segment","Narrow market","Niche may disappear"],["Focus (Differentiation)","Unique value in a niche","Narrow market","Larger competitors enter niche"]]},
          {t:"h",v:"The Balanced Scorecard"},
          {t:"p",v:"The BSC translates strategy into MEASURABLE objectives across 4 perspectives:"},
          {t:"tbl",h:["Perspective","Question","Example Metrics"],r:[["Financial","How do we look to shareholders?","Revenue growth, ROI, EVA, profit margin"],["Customer","How do customers see us?","Satisfaction, market share, retention, NPS"],["Internal Process","What must we excel at?","Cycle time, defect rate, process efficiency"],["Learning & Growth","Can we continue to improve?","Employee training, innovation rate, R&D"]]},
          {t:"p",v:"BSC connects daily operations to long-term strategic goals. Financial perspective is the OUTCOME — the other 3 are drivers."},
          {t:"tip",v:"Exam Tips: SWOT — Strengths & Weaknesses = internal. Opportunities & Threats = external. Porter's Generic Strategies: Cost Leadership (low cost, broad), Differentiation (unique, broad), Focus (narrow niche). BSC 4 perspectives: Financial, Customer, Internal Process, Learning & Growth. BSC = translates strategy into measurable metrics."}
        ],
        quizzes:[
          {q:"In SWOT analysis, Opportunities and Threats are:",o:["Internal factors","External factors","Financial factors","Operational factors"],a:1,e:"Opportunities and Threats are EXTERNAL factors — conditions in the environment outside the company. Strengths and Weaknesses are INTERNAL factors — characteristics of the company itself."},
          {q:"A company that competes by offering the lowest prices across a broad market is following a:",o:["Focus strategy","Differentiation strategy","Cost Leadership strategy","Niche strategy"],a:2,e:"COST LEADERSHIP strategy: be the LOWEST-COST PRODUCER in a BROAD MARKET. Companies like Walmart and Amazon use cost leadership. The goal is to have lower costs than competitors and pass savings to customers."},
          {q:"The Balanced Scorecard's Learning & Growth perspective answers:",o:["How do we look to shareholders?","How do customers see us?","What must we excel at?","Can we continue to improve and create value?"],a:3,e:"Learning & Growth: 'Can we continue to improve?' focuses on employee skills, training, innovation capability, technology, and organizational learning — the FOUNDATION that enables all other BSC perspectives."},
          {q:"Porter's Differentiation strategy requires:",o:["Having the lowest cost structure","Offering unique value that customers will pay a premium for","Serving only a small niche market","Maximizing production volume"],a:1,e:"DIFFERENTIATION: offer UNIQUE VALUE that customers recognize and are willing to pay a PREMIUM for — superior quality, design, service, brand, features. Applied across a BROAD market (unlike Focus strategy)."},
          {q:"Strategy formulation at the BUSINESS LEVEL focuses on:",o:["Day-to-day operational efficiency","Market positioning and competitive strategy","Portfolio management and acquisitions","Employee training programs"],a:1,e:"Business-Level strategy focuses on MARKET POSITIONING — how the company competes in its market (cost leadership, differentiation, or focus). Functional-level = internal operations. Corporate-level = portfolio and diversification."},
          {q:"The Financial perspective of the Balanced Scorecard is considered the:",o:["Foundation for other perspectives","Outcome/result of the other three perspectives","Least important perspective","Only externally reported measure"],a:1,e:"The Financial perspective represents the OUTCOME — if the customer, internal process, and learning perspectives are executed well, the financial results follow. The other three perspectives are LEAD INDICATORS; financial is the LAG indicator."},
          {q:"A luxury goods company selling premium handbags to affluent customers is using:",o:["Cost leadership — broad","Differentiation — broad","Focus differentiation — narrow","Cost focus — narrow"],a:2,e:"FOCUS DIFFERENTIATION: unique/premium value targeting a NARROW market segment (affluent customers). The company doesn't compete across the whole market — it focuses on a specific niche with differentiated offerings."},
          {q:"Using internal strengths to exploit external opportunities describes which SWOT strategy?",o:["SO strategy","ST strategy","WO strategy","WT strategy"],a:0,e:"SO (Strengths-Opportunities) strategy: use INTERNAL STRENGTHS to take advantage of EXTERNAL OPPORTUNITIES. This is the most aggressive growth strategy — leveraging what you do well to capitalize on favorable external conditions."},
          {q:"The Balanced Scorecard was primarily designed to:",o:["Replace financial accounting","Translate strategy into measurable objectives across multiple perspectives","Measure only financial performance","Benchmark against competitors"],a:1,e:"BSC was designed by Kaplan and Norton to TRANSLATE STRATEGY into MEASURABLE OBJECTIVES across 4 balanced perspectives — moving beyond purely financial measures to capture the full picture of organizational performance."},
          {q:"Corporate-level strategy is primarily concerned with:",o:["Improving factory efficiency","Setting employee performance goals","Portfolio management, diversification, and acquisitions","Designing marketing campaigns"],a:2,e:"CORPORATE-LEVEL strategy: the highest level — managing the PORTFOLIO of businesses (which industries to compete in, acquisitions, divestitures, vertical integration). Different from Business-Level (how to compete in ONE market)."}
        ]}
,
      {id:"2-4",title:"Other Planning Tools",dur:"20 min",
        blocks:[
          {t:"h",v:"PEST Analysis"},
          {t:"p",v:"PEST is a simplified version of PESTLE focusing on 4 macro-environmental factors:"},
          {t:"tbl",h:["Factor","Key Considerations"],r:[["Political","Government regulations, trade policy, employment laws, political stability, tax policy"],["Economic","Exchange rates, interest rates, inflation, economic growth, business cycle, unemployment"],["Social","Cultural attitudes, demographics, education, population growth, lifestyle trends"],["Technological","R&D pace, automation, digital disruption, patent protection, technology transfer"]]},
          {t:"h",v:"Benchmarking"},
          {t:"p",v:"Benchmarking = comparing your processes, performance, or products against BEST-IN-CLASS standards to identify improvement opportunities."},
          {t:"tbl",h:["Type","Comparison Against","Purpose"],r:[["Internal Benchmarking","Best-performing division within the company","Identify and spread internal best practices"],["Competitive Benchmarking","Direct competitors","Understand relative competitive position"],["Functional Benchmarking","Best-in-class in a function (any industry)","Learn superior practices regardless of industry"],["Generic Benchmarking","Any organization with similar processes","Broadest learning — cross-industry innovation"]]},
          {t:"h",v:"Theory of Constraints (TOC)"},
          {t:"p",v:"TOC focuses on identifying and managing the BOTTLENECK — the single constraint limiting overall system throughput. Steps: Identify → Exploit → Subordinate → Elevate → Repeat."},
          {t:"b",v:["Throughput = Sales Revenue - Direct Materials","Exploit the bottleneck: maximize its output first","Subordinate: all other processes serve the bottleneck's pace","Elevate: if still constrained, invest to expand bottleneck capacity"]},
          {t:"h",v:"Gap Analysis"},
          {t:"p",v:"Gap analysis identifies the difference between CURRENT state and DESIRED state. Used in strategic planning to determine what needs to change to achieve goals."},
          {t:"b",v:["Current state: Where are we now?","Desired state: Where do we want to be?","Gap: The difference — what needs to change?","Action plan: How do we close the gap?"]},
          {t:"h",v:"Scenario Planning"},
          {t:"p",v:"Scenario planning develops multiple alternative futures ('scenarios') and strategies for each. Unlike forecasting (one outcome), scenario planning prepares for MULTIPLE possible futures."},
          {t:"tip",v:"Exam Tips: PEST = 4 factors (Political, Economic, Social, Technological). Benchmarking 4 types: Internal, Competitive, Functional, Generic. TOC = focus on the BOTTLENECK. Throughput = Revenue - DM. Gap analysis = current vs desired state. Scenario planning = multiple possible futures. BPR = radical redesign (not incremental)."}
        ],
        quizzes:[
          {q:"PEST analysis differs from PESTLE by excluding:",o:["Political and Economic factors","Social and Technological factors","Legal and Environmental factors","All 6 factors are the same"],a:2,e:"PESTLE has 6 factors. PEST has 4 factors — it excludes LEGAL and ENVIRONMENTAL. PEST is the simpler version focused on Political, Economic, Social, and Technological macro-environmental factors."},
          {q:"Benchmarking against best-in-class companies regardless of industry is called:",o:["Internal benchmarking","Competitive benchmarking","Functional benchmarking","Generic benchmarking"],a:3,e:"GENERIC benchmarking = comparing against ANY organization with similar processes, regardless of industry. The broadest form — learns from cross-industry leaders. Example: a hospital benchmarking hotel check-in processes for patient admissions."},
          {q:"In Theory of Constraints, 'Subordinate' means:",o:["Eliminate the bottleneck","All other processes should support the bottleneck's pace","Identify a new constraint","Invest in bottleneck capacity"],a:1,e:"Subordinate: ALL non-bottleneck processes should SUPPORT AND SERVE the bottleneck's pace. Non-bottleneck resources should not produce faster than the bottleneck can process — this creates unwanted inventory/WIP."},
          {q:"Gap analysis in strategic planning identifies:",o:["External opportunities only","The difference between current performance and desired future state","Variance between budget and actual","Porter's competitive forces"],a:1,e:"Gap analysis = CURRENT STATE vs DESIRED STATE. It identifies what needs to change to achieve strategic goals. The 'gap' is the shortfall between where you are and where you want to be — the basis for action planning."},
          {q:"Scenario planning is used to:",o:["Forecast a single most likely future","Prepare strategies for multiple possible futures","Analyze historical performance","Benchmark competitors"],a:1,e:"Scenario planning develops MULTIPLE alternative future scenarios and strategies for each. Unlike traditional forecasting (one outcome), it prepares the organization for various possible futures — especially useful in uncertain environments."},
          {q:"In TOC, Throughput is calculated as:",o:["Sales Revenue - All Variable Costs","Sales Revenue - Direct Materials","Revenue - Fixed Costs","Gross Profit"],a:1,e:"TOC Throughput = SALES REVENUE - DIRECT MATERIALS (truly variable costs). TOC treats DL and overhead as fixed in the short run. Maximizing throughput at the bottleneck maximizes total system profit."},
          {q:"Competitive benchmarking compares a company's performance to:",o:["Best internal division","Direct competitors","Any company with similar processes","Industry average only"],a:1,e:"COMPETITIVE benchmarking = comparing against DIRECT COMPETITORS. Purpose: understand relative competitive position and identify performance gaps vs. rivals. Most commonly discussed type but not always the most informative."},
          {q:"The FIRST step in the Theory of Constraints process is to:",o:["Elevate the constraint","Subordinate other processes","Identify the bottleneck","Exploit the constraint"],a:2,e:"TOC steps: 1) IDENTIFY the constraint/bottleneck, 2) EXPLOIT it (maximize its output), 3) SUBORDINATE other processes to it, 4) ELEVATE it if still needed, 5) REPEAT. Must identify before you can manage."},
          {q:"PEST analysis is most useful for:",o:["Analyzing internal strengths","Identifying macro-environmental factors affecting strategy","Measuring financial performance","Analyzing competitive rivalry"],a:1,e:"PEST (Political, Economic, Social, Technological) identifies MACRO-ENVIRONMENTAL external factors that affect the organization's strategy. It is a tool for EXTERNAL ANALYSIS at the broadest level — not internal or industry-specific."},
          {q:"Internal benchmarking compares performance to:",o:["Industry best practices","The company's direct competitors","The best-performing unit within the same company","Any company in the world"],a:2,e:"INTERNAL benchmarking: compare performance to the BEST-PERFORMING DIVISION, unit, or process within the SAME COMPANY. Purpose: identify and spread internal best practices across the organization."}
        ]}
,
{id:"2-5",title:"Budgeting Concepts",dur:"30 min",
        blocks:[
          {t:"h",v:"What Is a Budget?"},
          {t:"p",v:"A budget is a QUANTITATIVE plan for a specified period, expressing management's goals in financial terms. It is developed in ADVANCE of the operating period based on assumptions and forecasts."},
          {t:"h",v:"Purposes of Budgeting"},
          {t:"b",v:["1. Planning: Forces management to think ahead and set realistic goals","2. Communication: Communicates goals and expectations across the organization","3. Coordination: Aligns different departments toward common objectives","4. Control: Provides benchmarks for measuring actual performance","5. Motivation: Gives managers targets to work toward","6. Performance Evaluation: Budget vs actual comparisons identify variances"]},
          {t:"h",v:"The Planning-Budgeting-Control Cycle"},
          {t:"tbl",h:["Step","Description"],r:[["Planning","Set long/short-term goals and strategic direction"],["Budgeting","Convert plans into quantitative targets (the 'Profit Plan')"],["Execution","Budgets become operational guidelines for the period"],["Performance Evaluation","Compare actual results to budget — analyze variances"],["Reforecasting","Adjust budgets based on new information for next cycle"]]},
          {t:"h",v:"Types of Budgets"},
          {t:"tbl",h:["Type","Description"],r:[["Static (Master) Budget","Fixed for one planned activity level — does not change with actual activity"],["Flexible Budget","ADJUSTS to actual activity level — used for performance evaluation"],["Rolling (Continuous) Budget","Always covers a fixed future period (e.g., always 12 months ahead) — updated monthly"],["Zero-Based Budget","Every expense must be justified from ZERO each period — no automatic carry-over"],["Activity-Based Budget","Uses ABC cost drivers to build budget — more accurate for overhead"]]},
          {t:"h",v:"Participative vs. Top-Down Budgeting"},
          {t:"tbl",h:["Approach","Who Sets Budget","Advantage","Disadvantage"],r:[["Participative (Bottom-Up)","Managers who will be responsible","More realistic, higher buy-in, better motivation","Managers may pad budgets (budget slack)"],["Top-Down","Senior management","Aligned with strategy, efficient","Less buy-in, may be unrealistic at operational level"]]},
          {t:"h",v:"Behavioral Aspects of Budgeting"},
          {t:"b",v:["Budget Slack: Managers intentionally understate revenues or overstate costs to make targets easier to achieve","Dysfunctional Behavior: Gaming the budget — spending all budget at year-end to avoid cuts next year","Budgetary Bias: Consistent over or under-estimation in budget submissions","Solution: Stretch goals, participation, and regular review can reduce slack"]},
          {t:"tip",v:"Exam Tips: Flexible budget = ADJUSTS to actual activity. Static budget = FIXED at planned activity. Rolling budget = always covers same future period (updated monthly). Participative budgeting = higher motivation but risk of budget slack. Budget slack = understating revenues/overstating costs. Zero-based = justify ALL expenses each period."}
        ],
        quizzes:[
          {q:"A budget that adjusts to the actual level of activity is called a:",o:["Static budget","Master budget","Flexible budget","Zero-based budget"],a:2,e:"FLEXIBLE budget adjusts to the ACTUAL activity level, making it useful for performance evaluation. A static (master) budget is fixed at one planned activity level and does NOT change with actual activity."},
          {q:"A rolling (continuous) budget:",o:["Never changes once set","Is always updated to cover a fixed future period (e.g., always 12 months)","Is set to zero at the start of each period","Only covers capital expenditures"],a:1,e:"Rolling budget: always covers a FIXED FUTURE PERIOD (e.g., always 12 months ahead). As one month ends, a new month is added — the budget is continuously updated, providing always-current planning data."},
          {q:"Budget slack refers to:",o:["The time needed to prepare a budget","Intentionally understating revenues or overstating costs to make targets easier","The difference between static and flexible budget","Unused budget at year-end"],a:1,e:"Budget slack = managers DELIBERATELY making budgets EASIER TO ACHIEVE by understating revenue targets or overstating cost allowances. This is a major behavioral problem with participative budgeting."},
          {q:"Zero-based budgeting requires:",o:["Using last year's budget as the starting point","Every expense to be justified from zero each period","Budgeting only capital expenditures","Setting budgets only at the corporate level"],a:1,e:"Zero-based budgeting (ZBB): every expense must be JUSTIFIED FROM ZERO each period — no automatic carry-over of prior year amounts. More time-consuming but eliminates waste and entrenched spending."},
          {q:"The PRIMARY advantage of participative (bottom-up) budgeting is:",o:["Aligned with top management strategy","More realistic budgets with higher manager buy-in","Less time to prepare","Eliminates budget slack"],a:1,e:"Participative budgeting: managers who will be RESPONSIBLE for results SET their own budgets. Key advantage: MORE REALISTIC (they know operational details) and HIGHER BUY-IN (ownership increases motivation)."},
          {q:"The MAIN purpose of comparing actual results to budget is:",o:["Tax compliance","Performance evaluation and variance identification","External financial reporting","Payroll processing"],a:1,e:"Budget vs actual comparison provides PERFORMANCE EVALUATION — identifying variances (differences) between planned and actual results. This triggers corrective action and improves future planning."},
          {q:"A static budget is BEST used for:",o:["Performance evaluation when activity differs from plan","Planning and goal-setting before the period","Adjusting for actual volume changes","Managing cash flow"],a:1,e:"Static (master) budget is BEST for PLANNING AND GOAL-SETTING before the period begins. It is fixed at one activity level and not adjusted. For PERFORMANCE EVALUATION, a flexible budget is more appropriate because it adjusts for actual volume."},
          {q:"Kaizen budgeting differs from traditional budgeting because it:",o:["Uses zero as the starting point","Builds continuous improvement targets into budget assumptions","Adjusts to actual activity","Focuses only on cash flow"],a:1,e:"Kaizen budgeting BUILDS CONTINUOUS IMPROVEMENT targets into the budget — costs are expected to DECREASE each period as efficiency improves. Based on the kaizen philosophy of ongoing small improvements."},
          {q:"Which budgeting approach is MOST consistent with strategic planning objectives?",o:["Incremental budgeting","Top-down budgeting","Activity-based budgeting","Rolling budgeting"],a:1,e:"Top-down budgeting is MOST CONSISTENT with strategic planning because senior management ensures budgets reflect strategic priorities. However, it may lack operational realism compared to participative approaches."},
          {q:"The budget variance report primarily measures:",o:["Differences between two accounting periods","Differences between budgeted and actual results","Industry benchmarks vs company performance","Expected vs required production capacity"],a:1,e:"Budget variance report = BUDGETED vs ACTUAL results. Favorable variance = actual revenue > budget OR actual cost < budget. Unfavorable = actual revenue < budget OR actual cost > budget."}
        ]}
,
      {id:"2-6",title:"Establishing Standards",dur:"30 min",
        blocks:[
          {t:"h",v:"What Are Standard Costs?"},
          {t:"p",v:"Standard costs are PREDETERMINED (planned) costs of manufacturing one unit under NORMAL operating conditions. They serve as benchmarks for budgeting, variance analysis, and performance control."},
          {t:"b",v:["Standard cost = Standard Input Quantity × Standard Price per Input","Also called budgeted costs or planned costs — used interchangeably on the CMA exam","Used for DM, DL, and overhead — all three components of product cost"]},
          {t:"h",v:"Types of Standards"},
          {t:"tbl",h:["Type","Definition","Level","Use"],r:[["Ideal (Theoretical)","Perfect conditions — no waste, breakdowns, or idle time","Very tight — hard to achieve","Motivational benchmark only"],["Practical (Attainable)","Achievable with NORMAL effort — allows for expected inefficiency","Challenging but achievable","Most common for budgeting and control"],["Historical","Based on past actual performance — average of prior periods","May perpetuate past inefficiencies","Baseline only — not best practice"]]},
          {t:"h",v:"Setting Direct Materials Standards"},
          {t:"f",l:"DM Standard Cost per Unit",v:"Standard Price per lb × Standard Quantity per unit | Standard Price = Purchase price + Freight + Handling | Standard Quantity = Amount needed + Normal waste/spoilage"},
          {t:"h",v:"Setting Direct Labor Standards"},
          {t:"f",l:"DL Standard Cost per Unit",v:"Standard Rate per hour × Standard Hours per unit | Standard Rate = Base wage + Payroll taxes + Benefits | Standard Hours = Time for task + Normal idle/setup time"},
          {t:"h",v:"Setting Overhead Standards"},
          {t:"f",l:"Overhead Standard",v:"Predetermined OH Rate × Standard Activity Allowed for actual output | POHR = Budgeted OH / Budgeted Activity Level"},
          {t:"h",v:"Variance Analysis Overview"},
          {t:"p",v:"Comparing ACTUAL costs to STANDARD costs reveals VARIANCES that indicate efficiency or inefficiency:"},
          {t:"tbl",h:["Variance","Formula","Favorable When"],r:[["DM Price Variance","(Actual Price - Standard Price) × Actual Qty Purchased","Actual < Standard"],["DM Quantity Variance","(Actual Qty Used - Standard Qty Allowed) × Standard Price","Actual < Standard"],["DL Rate Variance","(Actual Rate - Standard Rate) × Actual Hours","Actual < Standard"],["DL Efficiency Variance","(Actual Hours - Standard Hours Allowed) × Standard Rate","Actual < Standard"]]},
          {t:"tip",v:"Exam Tips: Practical standards = most common. Ideal = perfect conditions (unachievable). DM Price Variance = purchasing efficiency. DM Quantity Variance = production efficiency. DL Rate = wage rate efficiency. DL Efficiency = labor time efficiency. Favorable = actual cost LESS than standard. Unfavorable = actual cost MORE than standard."}
        ],
        quizzes:[
          {q:"Which type of standard is MOST commonly used for budgeting and cost control?",o:["Ideal (theoretical) standard","Historical standard","Practical (attainable) standard","Maximum standard"],a:2,e:"PRACTICAL (Attainable) standards are most commonly used — challenging but achievable with NORMAL effort and efficiency. They allow for expected inefficiencies (breakdowns, rest time) unlike ideal standards."},
          {q:"Direct Materials Price Variance = (Actual Price - Standard Price) × Actual Quantity. If actual price is LESS than standard, the variance is:",o:["Unfavorable","Favorable","Zero","Cannot be determined"],a:1,e:"If Actual Price < Standard Price → we paid LESS than expected → FAVORABLE variance. The company saved money on material purchasing compared to the standard (budgeted) price."},
          {q:"The Direct Labor Efficiency Variance measures:",o:["The difference between actual and standard wage rates","Whether actual labor hours were more or less than standard for actual output","The total DL cost vs budget","Overtime premium costs"],a:1,e:"DL Efficiency Variance = (Actual Hours - Standard Hours Allowed) × Standard Rate. It measures LABOR TIME EFFICIENCY — whether workers took more or fewer hours than the standard for the actual output produced."},
          {q:"Standard costs are BEST described as:",o:["Historical average costs from prior years","Predetermined planned costs based on normal operating conditions","The highest costs ever incurred","Costs set by government regulation"],a:1,e:"Standard costs = PREDETERMINED planned costs under NORMAL operating conditions. They are set in advance (before production begins) and serve as benchmarks for budgeting and performance evaluation."},
          {q:"Ideal (theoretical) standards assume:",o:["Normal waste and downtime","Perfect efficiency — no waste, breakdowns, or idle time","Historical average performance","Industry average performance"],a:1,e:"Ideal standards = PERFECT conditions — no waste, no breakdowns, no idle time. They represent the maximum possible efficiency. Rarely achieved in practice and generally not used for practical budgeting."},
          {q:"The standard quantity for DM should include:",o:["Only the material that ends up in the final product","The required amount plus normal waste and spoilage","Maximum possible material usage","Historical average material usage"],a:1,e:"Standard DM quantity = material needed for the product PLUS NORMAL WASTE AND SPOILAGE. Using only the theoretical minimum ignores expected losses and would create unrealistic standards."},
          {q:"An Unfavorable DM Quantity Variance indicates that:",o:["Material was purchased above standard price","More material was USED than standard allowed for actual output","Less material was used than standard","Labor was inefficient"],a:1,e:"Unfavorable DM Quantity Variance = Actual Quantity Used > Standard Quantity Allowed for actual output. Workers used MORE material than standard — may indicate waste, spoilage, poor quality materials, or inexperienced workers."},
          {q:"If standard labor rate = $15/hr, actual rate = $17/hr, and actual hours = 500, DL Rate Variance =",o:["$1,000 Favorable","$1,000 Unfavorable","$500 Unfavorable","$500 Favorable"],a:1,e:"DL Rate Variance = (Actual Rate - Standard Rate) × Actual Hours = ($17 - $15) × 500 = $2 × 500 = $1,000 UNFAVORABLE (actual rate > standard = paid more than expected)."},
          {q:"Standard DL rate per hour includes:",o:["Base wage only","Base wage + payroll taxes + benefits","Overtime premiums only","Variable overhead rate"],a:1,e:"Standard DL rate = BASE WAGE + payroll taxes + employee benefits. It represents the full cost of one hour of direct labor, not just the base wage. This gives a complete standard cost per hour."},
          {q:"Variance analysis is PRIMARILY used for:",o:["External financial reporting","Tax planning","Performance control — identifying why actual costs differ from standard","Determining selling prices only"],a:2,e:"Variance analysis is a MANAGEMENT CONTROL tool. It identifies WHERE and WHY actual costs differ from standards, enabling management to investigate causes, take corrective action, and improve future performance."}
        ]}
,
      {id:"2-7",title:"Forecasting Techniques & Regression Analysis",dur:"25 min",
        blocks:[
          {t:"h",v:"What Is Forecasting?"},
          {t:"p",v:"Forecasting estimates FUTURE conditions to support planning and budgeting. All budgets are based on PREMISES — assumptions about what will happen in the future. Relevant premises vary by department."},
          {t:"h",v:"Quantitative Forecasting Methods"},
          {t:"tbl",h:["Method","Description","Best For"],r:[["Simple Moving Average","Average of the most recent N periods","Stable data, no trend"],["Weighted Moving Average","Recent periods get more weight than older ones","Data with some trend"],["Exponential Smoothing","Weighted average where weights decay exponentially","Responsive to recent changes"],["Linear Regression","Statistical best-fit line: Y = a + bX","When one variable predicts another"],["Time Series Analysis","Decompose into trend, seasonal, cyclical, random components","Seasonal patterns"]]},
          {t:"h",v:"Qualitative Forecasting Methods"},
          {t:"tbl",h:["Method","Description"],r:[["Delphi Method","Expert panel reaches consensus through anonymous rounds of questionnaires — no groupthink"],["Executive Opinion","Senior management judgment combined","Market Research","Customer surveys, focus groups"],["Sales Force Composite","Bottom-up: sales reps estimate their territory sales"]]},
          {t:"h",v:"Linear Regression — Key Concepts"},
          {t:"f",l:"Regression Equation",v:"Y = a + bX | a = Fixed cost (Y-intercept) | b = Variable cost rate (slope) | X = Activity level (cost driver)"},
          {t:"tbl",h:["Statistic","Meaning","Good Value"],r:[["R (Correlation)","Strength and direction of X-Y relationship","-1 to +1; close to ±1 is strong"],["R² (Coefficient of Determination)","% of variation in Y explained by X","0.90+ = strong; 0.70–0.89 = moderate; < 0.70 = weak"],["p-value","Probability result is due to chance","< 0.05 = statistically significant"]]},
          {t:"h",v:"Time Series Components"},
          {t:"b",v:["Trend (T): Long-term upward or downward direction","Seasonal (S): Regular variations within a year (e.g., holiday sales)","Cyclical (C): Longer-term economic cycles (years)","Random/Irregular (I): Unpredictable variations — cannot be forecast"]},
          {t:"tip",v:"Exam Tips: Regression = most accurate quantitative method. R² close to 1 = strong predictor. Delphi = anonymous experts (prevents groupthink). Moving average = smooths data. Exponential smoothing = gives more weight to recent data. Time series = Trend + Seasonal + Cyclical + Random. Regression best for cost estimation and demand forecasting."}
        ],
        quizzes:[
          {q:"The Delphi method of forecasting uses:",o:["Statistical regression of historical data","Anonymous expert opinions through rounds of questionnaires","Sales force estimates from the field","Simple averages of past periods"],a:1,e:"Delphi method: ANONYMOUS expert panel answers questionnaires in ROUNDS — results are summarized and fed back, experts revise their answers. Anonymous process prevents GROUPTHINK and dominant personalities from biasing results."},
          {q:"R² = 0.85 in a regression analysis means:",o:["The regression equation is 85% accurate","85% of the variation in cost is explained by the independent variable","The variable cost rate is $0.85","Fixed costs are 85% of total"],a:1,e:"R² = COEFFICIENT OF DETERMINATION. R² = 0.85 means 85% of the VARIATION in the dependent variable (Y) is EXPLAINED by the independent variable (X). Higher R² = better fit."},
          {q:"Exponential smoothing gives:",o:["Equal weight to all historical periods","More weight to older periods","More weight to recent periods","Weight only to the highest and lowest periods"],a:2,e:"Exponential smoothing gives DECREASING WEIGHTS to older observations — most recent data gets the highest weight. This makes the forecast RESPONSIVE to recent changes while still considering historical patterns."},
          {q:"Time series decomposition identifies which components?",o:["Revenue, costs, profit, cash flow","Trend, seasonal, cyclical, and random variations","Fixed, variable, mixed, and step costs","Internal, external, qualitative, and quantitative"],a:1,e:"Time series components: TREND (long-term direction), SEASONAL (within-year patterns), CYCLICAL (multi-year economic cycles), RANDOM/IRREGULAR (unpredictable noise). Decomposing these helps build more accurate forecasts."},
          {q:"The regression equation Y = $5,000 + $3X predicts total cost at 2,000 machine hours as:",o:["$5,000","$6,000","$11,000","$3,000"],a:2,e:"Y = $5,000 + ($3 × 2,000) = $5,000 + $6,000 = $11,000."},
          {q:"The MOST accurate quantitative forecasting method is:",o:["Simple moving average","Weighted moving average","Regression analysis","Delphi method"],a:2,e:"REGRESSION ANALYSIS is the most accurate quantitative method — it uses ALL historical data points objectively (least squares technique) to find the best-fit relationship. Moving averages use fewer data points and are less accurate."},
          {q:"A Correlation Coefficient (R) of -0.95 indicates:",o:["Weak negative relationship","Strong positive relationship","Strong negative relationship","No relationship"],a:2,e:"R = -0.95: close to -1 = STRONG NEGATIVE relationship. As X increases, Y decreases strongly. The negative sign indicates direction; the magnitude (0.95 close to 1) indicates STRENGTH."},
          {q:"Sales force composite forecasting is:",o:["Senior management combining their judgment","Statistical analysis of historical sales data","Bottom-up estimation by sales representatives for their territories","Expert panel consensus"],a:2,e:"Sales force composite: BOTTOM-UP approach — individual sales representatives estimate sales for their territories, then aggregated to a total. Leverages field knowledge but may contain bias (pessimism or optimism)."},
          {q:"A p-value of 0.03 in regression analysis indicates:",o:["The relationship is not statistically significant","The relationship is statistically significant (< 0.05)","R² is 0.03","The variable cost rate is $0.03"],a:1,e:"p-value < 0.05 = STATISTICALLY SIGNIFICANT — the relationship is unlikely to be due to chance (only 3% probability). p-value ≥ 0.05 = relationship not statistically significant at the 95% confidence level."},
          {q:"Which forecasting method is BEST for products with strong seasonal patterns?",o:["Simple moving average","Time series analysis with seasonal decomposition","Regression analysis only","Delphi method"],a:1,e:"Time series analysis with SEASONAL DECOMPOSITION is best for seasonal patterns — it explicitly identifies and models the seasonal component, allowing the forecast to capture regular within-year variations."}
        ]}
,
      {id:"2-8",title:"Learning Curves",dur:"25 min",
        blocks:[
          {t:"h",v:"What Is a Learning Curve?"},
          {t:"p",v:"A learning curve describes how LABOR EFFICIENCY IMPROVES as workers gain experience producing a product. As cumulative output DOUBLES, average labor time per unit decreases by a fixed percentage (the learning rate)."},
          {t:"b",v:["Early production = high cost and low productivity","Over time = workers learn → performance improves","Rate of improvement decreases as experience grows — learning slows down","Most significant for: complex, labor-intensive, first-time production runs"]},
          {t:"h",v:"Two Models of Learning Curves"},
          {t:"tbl",h:["Model","Applies To","Formula"],r:[["Cumulative Average Time Model","Average time per unit (cumulative)","When output doubles: New Avg Time = Previous Avg × Learning %"],["Incremental Unit Time Model","Time for the LAST unit only (marginal)","When output doubles: Last unit time = Previous last unit × Learning %"]]},
          {t:"h",v:"Cumulative Average Model — Example (80% Learning Rate)"},
          {t:"p",v:"1st unit = 100 hours. Learning rate = 80%."},
          {t:"tbl",h:["Cumulative Units","Average Hours/Unit","Total Hours"],r:[["1","100 hrs","100 hrs"],["2 (doubled)","100 × 80% = 80 hrs","160 hrs"],["4 (doubled)","80 × 80% = 64 hrs","256 hrs"],["8 (doubled)","64 × 80% = 51.2 hrs","409.6 hrs"]]},
          {t:"h",v:"Applications of Learning Curves"},
          {t:"b",v:["Production planning and budgeting: forecast labor hours as production increases","Labor cost forecasting: costs drop predictably as volume grows","Contract bidding: price competitively by anticipating future cost reductions","Setting standard costs: standards should reflect learning curve effects for new products","Make-or-buy decisions: in-house production may become cheaper over time as learning occurs","Capital budgeting: project future savings from learning effects"]},
          {t:"h",v:"Limitations of Learning Curves"},
          {t:"b",v:["Applies mainly to LABOR-INTENSIVE processes — automation reduces learning effect","Assumes continuous production — disruptions reset learning","Different workers learn at different rates","Not applicable to routine, repetitive simple tasks where maximum efficiency is already reached"]},
          {t:"tip",v:"Exam Tips: Cumulative Average Model = when output doubles, average time per unit decreases by learning %. Incremental Unit Model = last unit time decreases. 80% learning curve: 1 unit=100hrs, 2 units avg=80hrs, 4 units avg=64hrs. Total hours = average × cumulative units. Learning curves most relevant for NEW products and LABOR-INTENSIVE work."}
        ],
        quizzes:[
          {q:"An 80% learning curve means that when output DOUBLES, the average time per unit:",o:["Decreases by 20%","Decreases by 80%","Increases by 20%","Stays the same"],a:0,e:"80% learning curve: when cumulative production DOUBLES, average time per unit = 80% of the previous average. Average time DECREASES BY 20% (retains 80%). Example: 1st unit 100 hrs → 2 units average 80 hrs (100 × 80%)."},
          {q:"Under the Cumulative Average Time model with 80% learning, if the 1st unit takes 200 hours, the average time for 4 units is:",o:["160 hours","128 hours","200 hours","80 hours"],a:1,e:"1 unit = 200 hrs. 2 units (doubled): avg = 200 × 80% = 160 hrs. 4 units (doubled again): avg = 160 × 80% = 128 hrs. The average decreases each time cumulative output doubles."},
          {q:"If 4 units average 128 hours each, total labor hours for all 4 units =",o:["128 hours","256 hours","512 hours","64 hours"],a:2,e:"Total hours = Average per unit × Total cumulative units = 128 × 4 = 512 hours."},
          {q:"Learning curves are MOST significant for:",o:["Highly automated processes","Simple, routine, repetitive tasks","Complex, labor-intensive, new products","Mature products with stable production"],a:2,e:"Learning curves are most significant for COMPLEX, LABOR-INTENSIVE production of NEW products. Automation reduces the human learning effect. Simple routine tasks reach efficiency quickly with minimal further improvement."},
          {q:"The Cumulative Average Time model applies to:",o:["The time for the last unit produced","The average time per unit across all units produced so far","Fixed costs per unit","Variable overhead per unit"],a:1,e:"Cumulative Average Time model: when output doubles, the AVERAGE TIME PER UNIT (across ALL cumulative units) decreases by the learning percentage. Different from the Incremental Unit model, which tracks the LAST unit's time."},
          {q:"Using learning curves for contract bidding helps a company:",o:["Increase selling prices over time","Price competitively by anticipating future cost reductions as volume grows","Avoid learning investments","Set higher standards"],a:1,e:"Learning curve contract bidding: anticipate that labor costs will DECREASE as cumulative production grows. This allows COMPETITIVE PRICING — accepting lower prices early, knowing costs will fall as learning occurs."},
          {q:"A 90% learning curve indicates LESS improvement than an 80% curve because:",o:["90 > 80 means faster improvement","At 90%, average time retains 90% — only 10% reduction per doubling","Learning occurs only for the first few units","Automated plants use 90%"],a:1,e:"90% learning rate: average time RETAINS 90% when output doubles (only 10% reduction). 80% learning rate: retains 80% (20% reduction). A LOWER learning rate % = FASTER improvement. 80% < 90% means greater efficiency gains."},
          {q:"Standard costs for new products should ideally:",o:["Use the first unit time as the standard","Use ideal (theoretical) standards only","Reflect expected learning curve improvements over the production period","Ignore learning curves as unpredictable"],a:2,e:"Standard costs for new products should INCORPORATE LEARNING CURVE EFFECTS — standards should reflect the expected efficiency as workers gain experience. Using first-unit time as the standard would create permanent unfavorable variances."},
          {q:"The main limitation of learning curve analysis is that it:",o:["Is only applicable to overhead costs","Primarily applies to labor-intensive processes — automation reduces the effect","Always overestimates learning","Is illegal to use in contracts"],a:1,e:"Learning curves primarily apply to HUMAN LABOR in labor-intensive processes. Automated processes show little learning effect because machines don't learn the way humans do. Also assumes continuous production without disruptions."},
          {q:"1st unit takes 100 hours with 80% learning. Total hours for first 8 units =",o:["400","409.6","512","800"],a:1,e:"1 unit avg = 100 hrs (total = 100). 2 units avg = 80 hrs (total = 160). 4 units avg = 64 hrs (total = 256). 8 units avg = 51.2 hrs (total = 8 × 51.2 = 409.6 hrs)."}
        ]}
,
{id:"2-9",title:"Probability",dur:"25 min",
        blocks:[
          {t:"h",v:"What Is Probability?"},
          {t:"p",v:"Probability is a numerical measure of the LIKELIHOOD that a specific event will occur. Used in forecasting, decision-making, budgeting, and risk analysis."},
          {t:"b",v:["Range: 0 (impossible) to 1 (certain) — or 0% to 100%","All outcome probabilities must SUM to 1 (100%)","Example: P(rain) = 40%, P(no rain) = 60%. Total = 100%."]},
          {t:"h",v:"Expected Value"},
          {t:"f",l:"Expected Value (EV)",v:"EV = Σ (Outcome × Probability of that Outcome) | Sum of each possible outcome multiplied by its probability"},
          {t:"p",v:"Example: Project A: 40% chance of $100,000 profit, 60% chance of $20,000 profit. EV = (0.40 × $100,000) + (0.60 × $20,000) = $40,000 + $12,000 = $52,000."},
          {t:"h",v:"Sensitivity Analysis"},
          {t:"p",v:"Sensitivity analysis tests how SENSITIVE the outcome is to changes in key assumptions. It answers: 'What if this variable changes by 10%?'"},
          {t:"b",v:["One-way sensitivity: change ONE variable at a time","Best/Base/Worst case analysis: test optimistic, likely, and pessimistic scenarios","Break-even sensitivity: find the value where the decision changes"]},
          {t:"h",v:"Decision Trees"},
          {t:"p",v:"A decision tree is a visual diagram mapping DECISIONS and their possible OUTCOMES with associated probabilities. Used for complex sequential decisions."},
          {t:"b",v:["Square nodes = Decision points (choices management makes)","Circle nodes = Chance events (outcomes driven by probability)","Calculate: work RIGHT to LEFT — find expected value at each chance node","Choose the branch with highest expected value at decision nodes"]},
          {t:"h",v:"Standard Deviation & Risk"},
          {t:"p",v:"Standard deviation measures the SPREAD (variability) of possible outcomes around the expected value. Higher standard deviation = MORE RISK."},
          {t:"f",l:"Coefficient of Variation",v:"CV = Standard Deviation / Expected Value | Measures risk per unit of return — useful for comparing projects"},
          {t:"h",v:"Monte Carlo Simulation"},
          {t:"p",v:"Monte Carlo simulation runs THOUSANDS of scenarios with random values for uncertain variables to generate a DISTRIBUTION of possible outcomes. More sophisticated than sensitivity analysis — shows probability distribution of results."},
          {t:"tip",v:"Exam Tips: EV = Σ(outcome × probability). Probabilities must sum to 1. Decision trees: work right to left, choose highest EV. Standard deviation = risk measure. Higher CV = higher relative risk. Sensitivity = change one variable. Monte Carlo = thousands of random trials → distribution of outcomes. Use EV for decision-making under uncertainty."}
        ],
        quizzes:[
          {q:"Expected Value is calculated as:",o:["The most likely outcome","Sum of (each outcome × its probability)","The average of best and worst cases","The outcome with the highest probability"],a:1,e:"Expected Value = Σ(Outcome × Probability). It is the WEIGHTED AVERAGE of all possible outcomes, using probabilities as weights. It is NOT the most likely outcome — it represents the long-run average."},
          {q:"Project: 30% chance of $200,000 profit, 70% chance of $50,000 profit. Expected Value =",o:["$60,000","$95,000","$125,000","$200,000"],a:1,e:"EV = (0.30 × $200,000) + (0.70 × $50,000) = $60,000 + $35,000 = $95,000."},
          {q:"In a decision tree, square nodes represent:",o:["Chance events with probabilities","Decision points where management chooses","Expected value calculations","Probability distributions"],a:1,e:"Square nodes = DECISION POINTS — choices that management controls. Circle nodes = CHANCE EVENTS — probabilistic outcomes outside management control. Work RIGHT to LEFT: calculate EV at chance nodes, choose highest EV at decision nodes."},
          {q:"Sensitivity analysis tests:",o:["All possible outcomes simultaneously","How sensitive outcomes are to changes in key assumptions","Standard deviation of returns","Historical variance patterns"],a:1,e:"Sensitivity analysis tests how SENSITIVE the outcome is to changes in ONE key assumption at a time. Answers 'What if sales drop 10%?' or 'What if costs increase by 15%?' — identifies which variables most affect the decision."},
          {q:"Higher standard deviation for an investment indicates:",o:["Lower risk","Higher expected return","Higher risk (more variability in outcomes)","Better performance"],a:2,e:"Standard deviation measures VARIABILITY of outcomes around the expected value. HIGHER standard deviation = MORE RISK = outcomes are more spread out. The investor faces greater uncertainty about actual results."},
          {q:"The Coefficient of Variation (CV) is used to:",o:["Calculate expected value","Measure absolute risk","Compare risk per unit of return across different projects","Determine probability of success"],a:2,e:"CV = Standard Deviation / Expected Value. It measures RELATIVE RISK — risk per unit of expected return. Useful for comparing projects with DIFFERENT sizes or expected values. Higher CV = higher relative risk."},
          {q:"Monte Carlo simulation differs from basic sensitivity analysis because it:",o:["Is less accurate","Tests one variable at a time","Runs thousands of random scenarios to generate a probability distribution","Only analyzes best and worst cases"],a:2,e:"Monte Carlo: runs THOUSANDS of iterations with random values for multiple uncertain variables simultaneously, generating a DISTRIBUTION of possible outcomes. Basic sensitivity changes ONE variable at a time — less comprehensive."},
          {q:"If two outcomes each have 50% probability and their values are $80,000 and $20,000, the expected value =",o:["$80,000","$50,000","$60,000","$100,000"],a:1,e:"EV = (0.50 × $80,000) + (0.50 × $20,000) = $40,000 + $10,000 = $50,000."},
          {q:"Decision tree analysis works by:",o:["Analyzing decisions in order from left to right","Working right to left, calculating EV at chance nodes and choosing highest EV at decision nodes","Using standard deviation to select outcomes","Running simulations of each branch"],a:1,e:"Decision trees: work RIGHT to LEFT. 1) Calculate EV at each CHANCE node (circle) = sum of outcomes × probabilities. 2) At DECISION nodes (square), choose the branch with the highest EV. This identifies the optimal decision path."},
          {q:"Probabilities assigned to all possible outcomes in a decision must:",o:["Each be greater than 50%","Sum to exactly 1 (100%)","Be equal for all outcomes","Be at least 0.10 each"],a:1,e:"A fundamental probability rule: ALL possible outcomes must collectively have probabilities that SUM TO 1 (100%). If rain probability = 40%, then no-rain probability must = 60%. If any scenario is excluded, the total won't sum to 1."}
        ]}
,
      {id:"2-10",title:"Budget Methodologies",dur:"30 min",
        blocks:[
          {t:"h",v:"Master Budget Overview"},
          {t:"p",v:"The Master Budget (Static Budget) summarizes management's complete financial and operating plans for one fiscal year. It is STATIC — prepared for ONE planned activity level and does NOT change with actual activity."},
          {t:"b",v:["Operating Budgets: Sales, production, DM, DL, OH, S&A → leads to Budgeted Income Statement","Financial Budgets: Cash budget, capital expenditures → leads to Budgeted Balance Sheet and Cash Flow Statement"]},
          {t:"h",v:"Budget Methodologies Comparison"},
          {t:"tbl",h:["Method","Starting Point","Key Feature","Best For"],r:[["Incremental (Traditional)","Prior year budget + adjustments","Simple, fast","Stable environments"],["Zero-Based (ZBB)","Zero — justify ALL expenses","Eliminates waste, very thorough","Cost reduction initiatives"],["Activity-Based (ABB)","Activity drivers (ABC)","Links budget to cost drivers","Complex overhead environments"],["Kaizen","Prior year + improvement targets","Builds continuous improvement in","Lean organizations"],["Flexible Budget","Standard costs × actual activity","Adjusts to actual volume","Performance evaluation"],["Project Budget","Specific project activities","Project-specific start/end","Capital projects, R&D"]]},
          {t:"h",v:"Zero-Based Budgeting (ZBB) — Deep Dive"},
          {t:"b",v:["Requires every expense justified from ZERO — no automatic carry-over","Decision packages: managers create packages for each activity at different levels (minimum, current, enhanced)","Senior management ranks packages and funds based on strategic priorities","Advantage: eliminates entrenched spending, focuses on value","Disadvantage: very time-consuming, requires major management effort"]},
          {t:"h",v:"Activity-Based Budgeting (ABB)"},
          {t:"p",v:"ABB uses ABC cost drivers to build the budget bottom-up. If sales forecast = 10,000 units and each unit requires 2 machine setups, budget for setups = 20,000 setups × cost per setup."},
          {t:"h",v:"Flexible Budget"},
          {t:"f",l:"Flexible Budget Cost",v:"= (Standard Variable Cost per unit × Actual Units) + Budgeted Fixed Costs"},
          {t:"p",v:"Example: Static budget for 10,000 units. Actual = 9,000 units. Variable cost $5/unit. Fixed $20,000. Flexible budget cost = ($5 × 9,000) + $20,000 = $65,000. Comparing actual to FLEXIBLE budget is fair — same activity level."},
          {t:"tip",v:"Exam Tips: ZBB = justify ALL from zero (most time-consuming). Incremental = prior year + %. ABB = uses cost drivers. Kaizen = builds improvement targets. Flexible budget = (Std Variable Rate × Actual Units) + Fixed. Use flexible budget (not static) for FAIR performance evaluation at different activity levels."}
        ],
        quizzes:[
          {q:"Zero-based budgeting MOST effectively:",o:["Saves time in budget preparation","Eliminates entrenched spending by requiring all expenses to be justified","Uses last year as a starting point","Only applies to capital expenditures"],a:1,e:"ZBB requires EVERY expense to be justified from ZERO — eliminating spending that has persisted simply because it existed before. Most effective for COST REDUCTION and identifying non-value-added spending."},
          {q:"Activity-based budgeting (ABB) builds the budget using:",o:["Percentage increases from prior year","Cost drivers from ABC costing","Management judgment only","Industry benchmarks"],a:1,e:"ABB uses ABC COST DRIVERS — if you know activity levels and cost per activity, you can build a bottom-up budget. More accurate for overhead because it links costs to what actually CAUSES them."},
