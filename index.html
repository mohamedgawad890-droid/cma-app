          {t:"tbl",h:["Situation","Method","Journal Entry"],r:[["Small (immaterial)","Write off to COGS","Dr/Cr COGS for full variance amount"],["Large (material)","Prorate to WIP, FG, COGS","Allocate based on ending balances of each account"]]},
          {t:"p",v:"Proration Example: Underapplied $3,000. WIP $20,000 (10%), FG $30,000 (15%), COGS $150,000 (75%). WIP gets $300, FG gets $450, COGS gets $2,250."},
          {t:"h",v:"Overhead Variances"},
          {t:"tbl",h:["Variance","Formula","Favorable When"],r:[["Variable OH Spending","Actual VOH - (Std Rate x Actual Hrs)","Actual rate < Standard"],["Variable OH Efficiency","(Actual Hrs - Std Hrs Allowed) x Std Rate","Fewer hours than standard"],["Fixed OH Budget","Actual Fixed OH - Budgeted Fixed OH","Actual < Budget"],["Fixed OH Volume","Budgeted Fixed OH - Applied Fixed OH","Produced more than planned"]]},
          {t:"tip",v:"Exam Tips: MOH Control = actual (debit). MOH Applied = applied (credit). Under-applied = debit balance. Over-applied = credit balance. Immaterial → close to COGS. Material → prorate to WIP/FG/COGS. Fixed OH Volume Variance = production more/less than budgeted capacity."}
        ],
        quizzes:[]},
      {id:"4-11",title:"Activity-Based Costing (ABC)",dur:"30 min",
        blocks:[
          {t:"h",v:"Why ABC? The Problem with Traditional Costing"},
          {t:"p",v:"Traditional costing uses a SINGLE overhead rate based on volume (e.g., direct labor hours). This works when products are simple. But in modern manufacturing with diverse products, a single rate DISTORTS costs — high-volume products get over-costed, low-volume/complex products get under-costed."},
          {t:"h",v:"What Is Activity-Based Costing?"},
          {t:"p",v:"ABC assigns overhead costs more accurately by identifying ACTIVITIES that consume resources and using MULTIPLE cost drivers to trace costs to products. It answers: What actually causes costs?"},
          {t:"h",v:"ABC vs Traditional Costing"},
          {t:"tbl",h:["Feature","Traditional Costing","Activity-Based Costing"],r:[["Overhead rates","One plant-wide rate","Multiple rates (one per activity)"],["Cost drivers","Volume-based (DLH, units)","Activity-based (setups, orders, inspections)"],["Accuracy","Lower — distorts costs","Higher — reflects actual resource use"],["Complexity","Simple","More complex"],["Best for","Simple, single-product firms","Diverse products, modern manufacturing"]]},
          {t:"h",v:"4 Levels of Activity in ABC"},
          {t:"b",v:["Unit-level: Activities performed FOR EACH unit (e.g., machine hours, direct labor)","Batch-level: Activities performed FOR EACH BATCH (e.g., machine setups, quality inspections)","Product-level: Activities supporting a specific PRODUCT LINE (e.g., product design, engineering changes)","Facility-level: Activities supporting the ENTIRE FACILITY (e.g., plant security, building maintenance) — NOT assigned to products"]},
          {t:"h",v:"ABC Process — Step by Step"},
          {t:"s",v:["Step 1: Identify the major activities (cost pools)","Step 2: Determine the cost driver for each activity","Step 3: Calculate Activity Rate = Pool Cost / Cost Driver Quantity","Step 4: Apply to each product: Activity Rate x Product Usage of Cost Driver","Step 5: Calculate total overhead per unit"]},
          {t:"h",v:"Example"},
          {t:"p",v:"Machine setup pool $60,000 with 300 setups. Activity rate = $60,000/300 = $200/setup. Product A needs 60 setups: $200 x 60 = $12,000. Product B needs 240 setups: $200 x 240 = $48,000. Traditional costing based on DL hours would distort this significantly."},
          {t:"h",v:"Benefits and Limitations of ABC"},
          {t:"b",v:["Benefits: More accurate product costs, better pricing decisions, identifies non-value-added activities, supports process improvement","Limitations: Expensive to implement, requires significant data collection, not required by GAAP for external reporting, may be too complex for simple companies"]},
          {t:"tip",v:"Exam Tips: ABC uses MULTIPLE cost pools and drivers. Traditional uses ONE rate. Unit-level varies with units. Batch-level with batches. Product-level with product line. Facility-level is NOT assigned to products. ABC corrects: high-volume = over-costed, low-volume/complex = under-costed under traditional costing."},
          {t:"h",v:"Activity-Based Management (ABM)"},
          {t:"p",v:"ABM uses the COST INFORMATION FROM ABC to MANAGE and IMPROVE the business — not just to cost products. While ABC answers 'What do things cost?', ABM answers 'How can we reduce those costs and improve efficiency?'"},
          {t:"tbl",h:["ABM Type","Focus","Examples"],r:[["Operational ABM","Eliminate or reduce non-value-added activities","Eliminate unnecessary inspections, reduce setup times, streamline order processing"],["Strategic ABM","Use ABC data for long-term decisions","Product mix optimization, customer profitability, pricing, outsourcing decisions"]]},
          {t:"h",v:"Non-Value-Added (NVA) Activities — ABM Target"},
          {t:"b",v:["Scheduling — waiting for production to start","Moving — transporting materials between locations","Waiting — idle time between processes","Inspecting — checking for defects after the fact","Storing — holding inventory unnecessarily","Reworking — correcting defects"]},
          {t:"p",v:"ABM process: (1) Identify all activities using ABC, (2) Classify each as VA or NVA, (3) Eliminate or reduce NVA activities, (4) Benchmark remaining activities against best practices, (5) Continuously monitor and improve."},
          {t:"h",v:"ABM and Customer Profitability"},
          {t:"p",v:"ABM extends ABC logic to CUSTOMERS — assigning activity costs to customers based on the resources they consume. High-maintenance customers (many orders, returns, service calls) may be unprofitable despite high revenue."},
          {t:"f",l:"Customer Profitability",v:"Customer Profit = Revenue from Customer − COGS − Cost of Activities to Serve Customer"},
          {t:"tip",v:"Exam Tips: ABM = using ABC data for MANAGEMENT decisions. Operational ABM = reduce/eliminate NVA activities. Strategic ABM = product mix, pricing, customer selection using ABC info. NVA activities = waste (moving, waiting, storing, inspecting). ABC tells us WHERE costs occur; ABM tells us WHAT TO DO about them. Customer profitability analysis = ABM applied to customers."}
        ,
          {t:"h",v:"The 4 ABC Activity Levels"},
          {t:"tbl",h:["Level","Driven By","Examples","Cost Driver"],r:[["Unit-level","Each unit produced","DM, DL, machine power","Units produced"],["Batch-level","Each batch/setup","Machine setups, purchase orders, inspection per batch","Number of batches/setups"],["Product-level","Each product line","Product engineering, product advertising","Number of products"],["Facility-level","Overall facility","Plant rent, general management, building depreciation","Cannot be traced — allocated arbitrarily"]]},
          {t:"b",v:["Unit-level: varies with EVERY unit","Batch-level: varies with every BATCH (not every unit) — high-volume products benefit from batch economies","Product-level: supports a product line regardless of how many batches or units","Facility-level: necessary for overall operations — most difficult to assign to products"]},
          {t:"f",l:"Two-Stage ABC",v:"Stage 1: Resource Consumption Driver → allocates resources TO activities | Stage 2: Activity Consumption Driver → allocates activity costs TO products"},
          {t:"tip",v:"Exam Tips: Facility-level costs CANNOT be meaningfully traced to individual products. Batch-level costs driven by number of setups/batches, NOT units. Resource Consumption Driver = resources to activities. Activity Consumption Driver = activities to products/cost objects."}
        ],
        quizzes:[]},
      {id:"4-12",title:"Variable and Absorption Costing",dur:"30 min",
        blocks:[
          {t:"h",v:"Variable Costing vs Absorption Costing"},
          {t:"p",v:"Two methods exist for treating Fixed Manufacturing Overhead (Fixed MOH) in product costing. The difference affects inventory valuation and operating income when production differs from sales."},
          {t:"tbl",h:["Feature","Variable Costing","Absorption Costing"],r:[["Fixed MOH treatment","PERIOD cost — expensed immediately","PRODUCT cost — included in inventory"],["Required by GAAP/IFRS","No (internal use only)","Yes (external reporting)"],["Income affected by","Sales volume only","Both sales AND production volume"],["Inventory includes","DM + DL + Variable MOH only","DM + DL + Variable MOH + Fixed MOH"]]},
          {t:"h",v:"Key Formulas"},
          {t:"f",l:"Absorption Costing Unit Cost",v:"Unit Cost = DM + DL + Variable MOH + (Fixed MOH / Units Produced)"},
          {t:"f",l:"Variable Costing Unit Cost",v:"Unit Cost = DM + DL + Variable MOH only (Fixed MOH is a period cost)"},
          {t:"h",v:"Income Difference — The Key Rule"},
          {t:"f",l:"Reconciliation",v:"Absorption NI − Variable NI = Fixed MOH in Ending Inventory − Fixed MOH in Beginning Inventory"},
          {t:"h",v:"Full Reconciliation Example (with Beginning Inventory)"},
          {t:"p",v:"Fixed MOH $60,000. Produced 6,000 units. Sold 7,000 units. Beginning FG = 2,000 units. Ending FG = 1,000 units. Fixed MOH/unit = $60,000/6,000 = $10/unit."},
          {t:"s",v:["Fixed MOH in Ending Inventory = 1,000 × $10 = $10,000","Fixed MOH in Beginning Inventory = 2,000 × $10 = $20,000","Difference = $10,000 − $20,000 = −$10,000","Absorption NI is $10,000 LOWER than Variable NI","(Because inventory DECREASED — more fixed MOH released from beginning inventory than deferred in ending inventory)"]},
          {t:"p",v:"Rule of Thumb: Inventory INCREASES (prod > sales) → Absorption NI is HIGHER. Inventory DECREASES (sales > prod) → Absorption NI is LOWER. Inventory constant → NI is equal."},
          {t:"b",v:["Production > Sales: Absorption NI > Variable NI (fixed MOH deferred in inventory)","Production < Sales: Absorption NI < Variable NI (fixed MOH released from inventory)","Production = Sales: Absorption NI = Variable NI (no difference)"]},
          {t:"h",v:"Example"},
          {t:"p",v:"Fixed MOH $60,000. Produced 10,000 units. Sold 8,000 units. Fixed MOH/unit = $6. Ending inventory = 2,000 units."},
          {t:"s",v:["Absorption: Fixed MOH in ending inventory = 2,000 x $6 = $12,000 (deferred)","Variable: All $60,000 expensed immediately","Absorption NI is $12,000 HIGHER than Variable NI"]},
          {t:"h",v:"Contribution Margin Income Statement (Variable Costing)"},
          {t:"tbl",h:["Line","Amount"],r:[["Sales Revenue","$XXX"],["- Variable Cost of Goods Sold","($XXX)"],["= Gross Contribution Margin","$XXX"],["- Variable Selling & Admin","($XXX)"],["= Contribution Margin","$XXX"],["- Fixed Manufacturing Overhead","($XXX)"],["- Fixed Selling & Admin","($XXX)"],["= Net Operating Income","$XXX"]]},
          {t:"tip",v:"Exam Tips: Absorption = GAAP required. Variable = management use only. When production > sales, absorption shows HIGHER income. Fixed MOH is the ONLY difference between the two methods. Contribution Margin format = variable costing income statement. Gross Profit format = absorption costing income statement."}
        ,
          {t:"h",v:"Advantages & Limitations"},
          {t:"tbl",h:["","Absorption","Variable"],r:[["Advantages","GAAP required · Full cost per unit · Matches costs to revenue","Transparent profit impact · Better CVP · No production manipulation"],["Limitations","Income manipulated by overproduction · Misleading when sales are low","Not GAAP-compliant · Requires fixed/variable separation"]]},
          {t:"h",v:"Super-Variable (Throughput) Costing — The 3rd Method"},
          {t:"p",v:"Throughput costing treats ONLY direct materials as product costs. ALL other costs (DL, variable OH, fixed OH) are period costs expensed immediately."},
          {t:"tbl",h:["Method","Product Costs","Inventory Value"],r:[["Absorption","DM + DL + Variable MOH + Fixed MOH","Highest"],["Variable","DM + DL + Variable MOH","Middle"],["Throughput","Direct Materials ONLY","Lowest"]]},
          {t:"f",l:"Throughput Contribution",v:"Throughput = Sales Revenue - Direct Materials | Used in Theory of Constraints (TOC)"},
          {t:"tip",v:"Exam Tips: 3 methods ranked by inventory: Absorption > Variable > Throughput. Throughput = DM only as product cost. Absorption manipulation: produce MORE than you sell → defer fixed costs → higher income. Variable costing eliminates this manipulation since all fixed OH is expensed immediately."}
        ],
        quizzes:[]},
      {id:"4-13",title:"Shared Service Cost Allocation",dur:"35 min",
        blocks:[
          {t:"h",v:"What Are Shared Service Departments?"},
          {t:"p",v:"HR, IT, Legal, and Maintenance departments SUPPORT production departments but do not directly make products. Their costs must be allocated to user departments to achieve accurate product costing and fair performance evaluation."},
          {t:"h",v:"Single-Rate vs Dual-Rate Method"},
          {t:"tbl",h:["Feature","Single-Rate","Dual-Rate"],r:[["Fixed costs allocated by","Actual usage","BUDGETED usage"],["Variable costs allocated by","Actual usage","ACTUAL usage"],["Complexity","Simple","More accurate"],["Cost signal","May distort fixed cost signals","Accurate — fixed = committed capacity"]]},
          {t:"f",l:"Single Rate",v:"Rate = Total Budgeted Cost / Budgeted Activity Base | Allocation = Rate × Actual Usage"},
          {t:"p",v:"Single-Rate Example: IT total cost $120,000. Budgeted hours 12,000. Rate = $10/hr. Dept A uses 3,000 hrs → $30,000 allocated."},
          {t:"h",v:"Dual-Rate Method — Example"},
          {t:"p",v:"IT fixed costs $80,000. Variable rate $0.50/hr. Total budgeted hours 12,000. Dept A: budgeted 3,000 hrs, actual 3,200 hrs."},
          {t:"s",v:["Fixed allocation = $80,000 × (3,000/12,000) = $20,000 (BUDGETED usage)","Variable allocation = $0.50 × 3,200 = $1,600 (ACTUAL usage)","Total Dept A = $21,600"]},
          {t:"p",v:"KEY INSIGHT — Why Dual-Rate Is Better: Under Single-Rate, if Dept A cuts actual usage, its fixed cost allocation drops — but the company's total fixed IT costs don't change. This sends a WRONG signal. Dual-Rate fixes this: fixed costs based on budgeted (committed) capacity stay constant. Managers cannot 'game' their fixed allocation by reducing actual usage."},
          {t:"h",v:"Three Methods for Multiple Service Departments"},
          {t:"tbl",h:["Method","Reciprocal Services?","Accuracy","Complexity"],r:[["Direct","Ignored completely","Lowest","Simplest"],["Step-Down","Partial (sequence matters)","Moderate","Medium"],["Reciprocal","Fully recognized — simultaneous equations","Highest","Most complex"]]},
          {t:"h",v:"Direct Method"},
          {t:"p",v:"Allocates service costs ONLY to production departments, completely IGNORING services between service departments. Simplest but least accurate."},
          {t:"p",v:"Example: IT ($60,000) serves HR 20% and Production 80%. Maintenance ($40,000) serves HR 10% and Production 90%. Under Direct Method: Ignore IT→HR and Maintenance→HR. IT to Production = $60,000 × 100% = $60,000. Maintenance to Production = $40,000 × 100% = $40,000. Total to Production = $100,000."},
          {t:"h",v:"Step-Down Method"},
          {t:"p",v:"Allocates service departments in SEQUENCE. The first department allocated can assign costs to OTHER service departments before being closed. Once a department is closed, it receives NO MORE costs. More accurate than Direct; less than Reciprocal."},
          {t:"b",v:["Order MATTERS — allocate the department that serves the MOST other departments FIRST","Once a department is closed, it cannot receive additional allocations","Captures some reciprocal services — but not all"]},
          {t:"h",v:"Reciprocal Method"},
          {t:"p",v:"Uses SIMULTANEOUS EQUATIONS to fully recognize ALL mutual services between service departments. Most accurate but most complex. Set up equations: Total Cost of each service dept = Its own cost + % of other service dept it receives."},
          {t:"p",v:"Example: IT cost $60,000, receives 15% of Maintenance. Maintenance cost $40,000, receives 10% of IT. Equations: IT = $60,000 + 0.15M. M = $40,000 + 0.10(IT). Solve simultaneously → allocate the solved totals to production departments."},
          {t:"h",v:"Accuracy Ranking"},
          {t:"f",l:"Accuracy",v:"Reciprocal (best) > Step-Down (moderate) > Direct (simplest)"},
          {t:"tip",v:"Exam Tips: Dual-Rate: fixed by BUDGETED usage, variable by ACTUAL usage. Single-Rate: everything by actual usage. Direct Method: ignores ALL inter-service. Step-Down: partial, ORDER matters. Reciprocal: simultaneous equations, MOST accurate. Key exam point: Dual-Rate prevents managers from gaming their fixed allocation by cutting actual usage — fixed costs are committed capacity costs regardless of actual consumption."}
        ],
        quizzes:[]},
      {id:"4-14",title:"Standard Cost Variances: DM, DL & Overhead",dur:"35 min",
        blocks:[
          {t:"h",v:"What Are Standard Costs?"},
          {t:"p",v:"Standard costs are PREDETERMINED BENCHMARKS for what costs SHOULD BE under efficient operating conditions. When actual costs differ from standard costs, the difference is a VARIANCE. Variance analysis tells management WHERE costs got out of control and WHY."},
          {t:"h",v:"Direct Materials Variances"},
          {t:"f",l:"DM Price Variance",v:"DM Price Variance = (Actual Price − Standard Price) × Actual Quantity PURCHASED | F if AP < SP"},
          {t:"f",l:"DM Quantity (Usage) Variance",v:"DM Quantity Variance = (Actual Qty Used − Standard Qty Allowed) × Standard Price | F if AQ < SQ"},
          {t:"p",v:"Note: Price variance is calculated at PURCHASE (for timely reporting). Quantity variance is calculated at USE. Standard Qty Allowed = Standard qty per unit × Actual units produced."},
          {t:"h",v:"DM Variance Example"},
          {t:"p",v:"Standard: 2 lbs per unit at $5/lb. Actual: Produced 1,000 units. Purchased 2,100 lbs at $4.80/lb. Used 2,050 lbs."},
          {t:"s",v:["DM Price Variance = ($4.80 − $5.00) × 2,100 = (−$0.20) × 2,100 = $420 Favorable","Standard Qty Allowed = 2 × 1,000 = 2,000 lbs","DM Quantity Variance = (2,050 − 2,000) × $5.00 = 50 × $5 = $250 Unfavorable"]},
          {t:"h",v:"Direct Labor Variances"},
          {t:"f",l:"DL Rate Variance",v:"DL Rate Variance = (Actual Rate − Standard Rate) × Actual Hours | F if AR < SR"},
          {t:"f",l:"DL Efficiency Variance",v:"DL Efficiency Variance = (Actual Hours − Standard Hours Allowed) × Standard Rate | F if AH < SH"},
          {t:"p",v:"Standard Hours Allowed = Standard hours per unit × Actual units produced."},
          {t:"h",v:"DL Variance Example"},
          {t:"p",v:"Standard: 0.5 hours per unit at $18/hr. Actual: Produced 1,000 units. Actual hours 480 hrs at $19/hr."},
          {t:"s",v:["DL Rate Variance = ($19 − $18) × 480 = $1 × 480 = $480 Unfavorable","Standard Hours Allowed = 0.5 × 1,000 = 500 hrs","DL Efficiency Variance = (480 − 500) × $18 = (−20) × $18 = $360 Favorable"]},
          {t:"h",v:"Four Overhead Variances"},
          {t:"tbl",h:["Variance","Formula","Favorable When"],r:[["Variable OH Spending","Actual VOH − (Std Rate × Actual Hrs)","Actual rate < Standard"],["Variable OH Efficiency","(Actual Hrs − Std Hrs Allowed) × Std Rate","Fewer hours than standard"],["Fixed OH Budget","Actual Fixed OH − Budgeted Fixed OH","Actual < Budget"],["Fixed OH Volume","Budgeted Fixed OH − Applied Fixed OH","Produced more than planned"]]},
          {t:"h",v:"Responsibility for Variances"},
          {t:"tbl",h:["Variance","Typically Responsible","Common Causes"],r:[["DM Price","Purchasing dept","Better supplier deal, rush orders, market price change"],["DM Quantity","Production dept","Waste, spoilage, poor quality materials, untrained workers"],["DL Rate","HR / Payroll","Using skilled workers for routine tasks, overtime premium"],["DL Efficiency","Production supervisor","Machine breakdowns, poor scheduling, learning curve effects"],["Fixed OH Budget","Department managers","Actual fixed costs differing from budget"],["Fixed OH Volume","Production planning","Actual production above or below planned capacity"]]},
          {t:"h",v:"Journal Entries — Standard Cost System"},
          {t:"s",v:["Purchase DM: Dr. Raw Materials (std price) + Dr/Cr DM Price Variance | Cr. Accounts Payable (actual)","Use DM: Dr. WIP (std qty × std price) + Dr/Cr DM Qty Variance | Cr. Raw Materials","DL: Dr. WIP (std hrs × std rate) + Dr/Cr DL Rate + DL Eff Variances | Cr. Wages Payable","Apply OH: Dr. WIP (std hrs × std rate) | Cr. MOH Applied","Record actual OH: Dr. MOH Control | Cr. Various","Year-end: Dr/Cr OH variances | Cr/Dr COGS (or prorate)"]},
          {t:"h",v:"Favorable vs Unfavorable"},
          {t:"p",v:"FAVORABLE variance = actual cost < standard cost = good news. UNFAVORABLE variance = actual cost > standard cost = bad news. BUT: a favorable price variance from buying cheap materials can CAUSE an unfavorable quantity variance if the cheap materials have more waste."},
          {t:"tip",v:"Exam Tips: Price/Rate variances = calculated at the ACTUAL quantity (purchased for DM, worked for DL). Qty/Efficiency variances = compared at STANDARD price/rate. Standard Qty/Hours Allowed = standard per unit × ACTUAL units produced (not budgeted). Favorable = actual < standard. Unfavorable = actual > standard. Overhead Volume Variance = only exists under ABSORPTION costing — measures production vs planned capacity."}
        ],
        quizzes:[]},
      {id:"4-15",title:"Estimating Fixed and Variable Costs",dur:"30 min",
        blocks:[
          {t:"h",v:"Why Cost Estimation?"},
          {t:"p",v:"Managers need to predict future costs for budgeting, pricing, and decisions. Cost estimation methods determine the fixed and variable components of a mixed cost. The three main methods are: High-Low, Scatter Diagram, and Regression Analysis."},
          {t:"h",v:"Comparison of Methods"},
          {t:"tbl",h:["Method","Data Used","Accuracy","Complexity"],r:[["High-Low","2 data points only","Lowest — may be distorted by outliers","Very simple"],["Scatter Diagram","All data points (visual)","Moderate — subjective line fitting","Simple"],["Regression Analysis","All data points (statistical)","HIGHEST — objective, uses all data","More complex but standard"]]},
          {t:"h",v:"Regression Analysis"},
          {t:"p",v:"Regression analysis uses statistical techniques to fit the BEST LINE through all data points. It gives the most accurate cost equation by minimizing the sum of squared deviations."},
          {t:"f",l:"Regression Cost Equation",v:"Y = a + bX   |   a = Fixed Cost (intercept), b = Variable Cost Rate (slope), X = Activity Level"},
          {t:"h",v:"Key Regression Statistics"},
          {t:"tbl",h:["Statistic","Meaning","Good Value"],r:[["R² (Coefficient of Determination)","% of cost variation EXPLAINED by the activity driver","Close to 1.0 (100%) is best"],["R (Correlation Coefficient)","Strength and direction of relationship","Close to +1 or -1"],["t-statistic","Statistical significance of each variable","> 2 is generally significant"],["p-value","Probability the result is due to chance","< 0.05 (5%) is significant"]]},
          {t:"h",v:"Multiple Regression"},
          {t:"p",v:"Simple regression uses ONE independent variable (e.g., machine hours). Multiple regression uses TWO OR MORE variables to predict cost — more accurate when costs are driven by multiple factors."},
          {t:"p",v:"Example: Total cost = $5,000 + $3(machine hours) + $2(labor hours). Both machine hours AND labor hours drive costs."},
          {t:"h",v:"Learning Curve Effect"},
          {t:"p",v:"As workers gain experience producing a product, labor time per unit DECREASES. Each time CUMULATIVE production DOUBLES, average labor hours per unit decrease by a fixed percentage (the learning rate)."},
          {t:"f",l:"Cumulative Average-Time Model",v:"When cumulative output doubles, AVERAGE time per unit = previous average × learning rate"},
          {t:"f",l:"Incremental Unit-Time Model",v:"When cumulative output doubles, INCREMENTAL (last) unit time = previous last unit time × learning rate"},
          {t:"h",v:"Two Learning Curve Models Compared"},
          {t:"tbl",h:["Units","Cumulative Avg Model (80%)","Incremental Unit Model (80%)"],r:[["1 unit","100 hrs (avg)","100 hrs (last unit)"],["2 units","80 hrs avg (160 total)","80 hrs for 2nd unit only"],["4 units","64 hrs avg (256 total)","64 hrs for 4th unit only"],["8 units","51.2 hrs avg (409.6 total)","51.2 hrs for 8th unit only"]]},
          {t:"p",v:"KEY DIFFERENCE: Cumulative Average Model applies the learning rate to the AVERAGE of all units produced. Incremental Unit Model applies the learning rate to the LAST UNIT produced. The cumulative average model is more commonly tested on the CMA exam."},
          {t:"tip",v:"Exam Tips: Regression is MOST accurate — uses all data points. High-Low is LEAST accurate — only 2 points. R² close to 1.0 = strong relationship. R² = 0.85 means 85% of cost variation is explained by the activity. Learning curve: output doubles → average time drops by learning %. 80% learning curve is common exam example."}
        ],
        quizzes:[]},
      {id:"4-16",title:"Supply Chain & Lean Resource Management",dur:"30 min",
        blocks:[
          {t:"h",v:"What Is Supply Chain Management?"},
          {t:"p",v:"Supply Chain Management (SCM) coordinates the flow of materials, information, and money from RAW MATERIAL SUPPLIERS through MANUFACTURERS to END CUSTOMERS. The goal is to optimize the entire chain — not just individual companies."},
          {t:"h",v:"Key SCM Concepts"},
          {t:"tbl",h:["Concept","Description"],r:[["Supply Chain","All companies involved from raw materials to end customer"],["Upstream activities","Suppliers and raw materials (before the company)"],["Downstream activities","Distribution, retailers, end customers (after the company)"],["Bullwhip Effect","Small demand variations amplified upstream — causing excess inventory"],["Vendor-Managed Inventory","Supplier monitors and replenishes customer's inventory automatically"]]},
          {t:"h",v:"The Value Chain (Porter's Model)"},
          {t:"p",v:"Michael Porter's Value Chain identifies PRIMARY and SUPPORT activities that create value for customers. Cost management focuses on optimizing each activity."},
          {t:"b",v:["Primary Activities (directly create value): Inbound Logistics → Operations → Outbound Logistics → Marketing & Sales → Service","Support Activities (enable primary activities): Firm Infrastructure, HR Management, Technology Development, Procurement"]},
          {t:"h",v:"Value-Added vs Non-Value-Added Activities"},
          {t:"tbl",h:["Type","Definition","Action"],r:[["Value-Added (VA)","Customer WILLINGLY pays for it — changes form, fit, or function","Keep and optimize"],["Non-Value-Added (NVA)","Customer would NOT pay for it if they knew — waste","Eliminate or reduce"],["Business Non-Value-Added","Required by business but not valued by customer (e.g., accounting, compliance)","Minimize"]]},
          {t:"h",v:"Business Process Improvement Tools"},
          {t:"b",v:["Process Mapping / Flowcharts: Visualize the current process to identify waste and bottlenecks","Benchmarking: Comparing performance to best-in-class competitors or industry standards","Business Process Reengineering (BPR): Radical redesign of processes for dramatic improvement","Kaizen: Continuous small improvements by all employees","Six Sigma (DMAIC): Define, Measure, Analyze, Improve, Control"]},
          {t:"tip",v:"Exam Tips: Value Chain = Primary + Support activities. Primary activities directly create value. Non-value-added activities = waste → eliminate. Bullwhip effect = demand distortion growing upstream. Benchmarking = comparing to best practices. BPR = radical redesign (vs Kaizen = gradual improvement). SCM goal = optimize the ENTIRE chain, not just one company. Customer defines what is value-added."},
          {t:"h",v:"What Is Lean Management?"},
          {t:"p",v:"Lean management is a philosophy focused on ELIMINATING WASTE and creating value for the customer. Originating from the Toyota Production System, lean identifies seven types of waste (TIMWOOD) and works to eliminate them."},
          {t:"h",v:"7 Types of Waste (TIMWOOD)"},
          {t:"b",v:["T — Transportation: Moving materials unnecessarily","I — Inventory: Excess stock tying up capital","M — Motion: Unnecessary worker movement","W — Waiting: Idle time between processes","O — Overproduction: Making more than needed","O — Over-processing: More work than required","D — Defects: Errors requiring rework or scrap"]},
          {t:"h",v:"Just-in-Time (JIT) System"},
          {t:"p",v:"JIT is a pull-based production system where materials and products are produced or purchased ONLY when needed — in the exact quantity needed, at the exact time needed."},
          {t:"tbl",h:["Feature","Traditional System","JIT System"],r:[["Inventory","Large safety stock","Minimal — near zero",""],["Production trigger","Push (produce to forecast)","Pull (produce on demand)",""],["Defects","Acceptable defect rate","Zero defects goal",""],["Supplier relationship","Many suppliers, competitive","Few trusted suppliers, long-term",""],["Setup time","Long","Minimized",""],["Quality","Inspect after production","Built-in quality (TQM)"," "]]},
          {t:"h",v:"JIT Benefits & Risks"},
          {t:"b",v:["Benefits: Reduced inventory costs, less waste, faster production, higher quality, lower storage costs","Risks: Supply chain disruptions can halt production (no buffer stock), requires reliable suppliers, needs stable demand"]},
          {t:"h",v:"Kanban System"},
          {t:"p",v:"Kanban is the signal system used in JIT. Cards (kanban) authorize production or movement of materials only when needed — preventing overproduction."},
          {t:"h",v:"Theory of Constraints (TOC)"},
          {t:"p",v:"TOC focuses on identifying and managing the BOTTLENECK (constraint) — the process limiting overall throughput. The 5 steps: Identify → Exploit → Subordinate → Elevate → Repeat."},
          {t:"f",l:"Throughput Contribution",v:"Throughput = Sales Revenue - Direct Materials (variable costs only)"},
          {t:"tip",v:"Exam Tips: JIT = pull system (demand-driven). Traditional = push system (forecast-driven). JIT goal: zero inventory, zero defects. 7 wastes = TIMWOOD. Kanban = authorization card for JIT. TOC bottleneck = the WEAKEST LINK — focus all improvement efforts here. JIT requires reliable suppliers and stable demand. Main JIT risk = supply disruption."}
        ,
          {t:"h",v:"Lean Thinking — The 5 Principles"},
          {t:"b",v:["1. Specify Value: Define value from the CUSTOMER'S perspective — what are they willing to pay for?","2. Identify the Value Stream: Map ALL processes delivering the product — identify waste in the entire flow","3. Create Continuous Flow: Production flows SMOOTHLY without interruption or queuing","4. Establish Pull: Produce ONLY what is needed, WHEN it is needed — demand-driven (JIT)","5. Pursue Perfection: Continuously strive for zero waste, zero defects — kaizen mindset"]},
          {t:"h",v:"SMED — Single Minute Exchange of Dies"},
          {t:"p",v:"Reduces machine SETUP/CHANGEOVER time to under 10 minutes (single-digit minutes)."},
          {t:"b",v:["Internal tasks: Done while machine is STOPPED — convert to external where possible","External tasks: Done while machine is RUNNING — prepare beforehand","Benefits: Faster response to demand, smaller batch sizes, less downtime, supports JIT"]},
          {t:"h",v:"Lean Work Cells & Poka-Yoke"},
          {t:"b",v:["Lean Work Cells: U-shaped workstations. Workers cross-trained for multiple tasks. Reduces walking waste, improves communication, allows quick rebalancing","Poka-Yoke (Mistake Proofing): Devices/methods that PREVENT errors or immediately detect them. Examples: plug that only fits one way, sensors that stop machines if parts missing. Goal: eliminate possibility of human error"]},
          {t:"h",v:"Backflush Costing — JIT Accounting"},
          {t:"p",v:"Traditional costing records costs at each stage (purchase → WIP → finished goods). Backflush costing DELAYS recording until products are COMPLETED or SOLD, then 'flushes back' to assign costs."},
          {t:"b",v:["Used with JIT because inventory is near zero — no need for detailed WIP tracking","Trigger point: completion of goods OR sale of goods","Eliminates most WIP journal entries — greatly simplifies accounting","Weakness: Less detailed cost information during production"]},
          {t:"tip",v:"Exam Tips: Lean 5 Principles: Value → Value Stream → Flow → Pull → Perfection. SMED = setup time under 10 minutes. Internal = machine stopped. External = machine running. Poka-yoke = PREVENTS errors. Backflush costing = used with JIT, records costs at completion/sale not each stage. JIT is PULL; Traditional MRP is PUSH."}
        ],
        quizzes:[]},
      {id:"4-17",title:"Just-In-Time Systems and MRP, MRPII, ERP",dur:"30 min",
        blocks:[
          {t:"h",v:"Enterprise Resource Planning (ERP)"},
          {t:"p",v:"ERP systems integrate ALL business functions — finance, manufacturing, HR, sales, procurement, and inventory — into ONE unified database. This eliminates data silos and provides real-time information across the organization."},
          {t:"tbl",h:["Feature","Traditional Systems","ERP System"],r:[["Data","Separate databases per department","Single integrated database"],["Information flow","Manual transfers between systems","Automatic, real-time"],["Consistency","Data conflicts between departments","One version of the truth"],["Examples","Separate accounting, HR, inventory","SAP, Oracle, Microsoft Dynamics"]]},
          {t:"h",v:"Material Requirements Planning (MRP)"},
          {t:"p",v:"MRP is a PUSH-based production planning system that uses the Master Production Schedule (MPS) to determine WHAT materials to order, HOW MUCH to order, and WHEN to order them."},
          {t:"b",v:["Master Production Schedule (MPS): What finished products to make and when","Bill of Materials (BOM): List of all components needed to make each product","Inventory Records: Current stock on hand and on order","MRP Output: Purchase orders and production orders"]},
          {t:"f",l:"Net Requirements",v:"Net Requirements = Gross Requirements - On-hand Inventory - Scheduled Receipts"},
          {t:"h",v:"MRP II (Manufacturing Resource Planning)"},
          {t:"p",v:"MRP II extends MRP to include CAPACITY PLANNING, labor scheduling, machine scheduling, and financial planning. It integrates manufacturing with the broader business."},
          {t:"h",v:"ERP vs MRP vs MRP II"},
          {t:"tbl",h:["System","Scope","Focus"],r:[["MRP","Materials only","What/when to order materials"],["MRP II","Manufacturing resources","Materials + capacity + labor + finance"],["ERP","Entire enterprise","All business functions integrated"]]},
          {t:"h",v:"Benefits & Risks of ERP"},
          {t:"b",v:["Benefits: Real-time data, eliminates duplicate entry, better decision-making, improved inventory management, integrated financial reporting","Risks: Very expensive to implement, long implementation time (1-3 years), requires major process changes, data migration challenges, high training costs, implementation failures are common"]},
          {t:"tip",v:"Exam Tips: MRP = materials planning only (push system). MRP II = adds capacity and labor. ERP = entire enterprise integration. MRP uses BOM + MPS + inventory records. Net Requirements = Gross Requirements - On Hand - Scheduled Receipts. ERP biggest risk = implementation failure (cost overruns, disruption). JIT = pull system; MRP = push system."}
        ],
        quizzes:[]},
      {id:"4-18",title:"Capacity Level and Management Decisions",dur:"30 min",
        blocks:[
          {t:"h",v:"Types of Capacity"},
          {t:"tbl",h:["Capacity Type","Definition","Use"],r:[["Theoretical Capacity","Maximum output under PERFECT conditions — 24/7, no breaks, no defects","Theoretical benchmark only"],["Practical Capacity","Theoretical capacity minus NORMAL downtime (breaks, maintenance, holidays)","Realistic maximum achievable"],["Normal Capacity","Average expected capacity over 2-3 years considering seasonal fluctuations","Used for budgeting and POHR calculation"],["Actual Capacity","Capacity actually used in the current period","Actual results"]]},
          {t:"h",v:"Relevant Costing for Short-term Decisions"},
          {t:"p",v:"Relevant costs are FUTURE costs that DIFFER between alternatives. Irrelevant costs are the same regardless of the decision and should be IGNORED."},
          {t:"tbl",h:["Cost Type","Relevant?","Reason"],r:[["Sunk costs","NEVER","Already incurred — cannot be changed"],["Opportunity costs","ALWAYS","Real economic cost of choosing one alternative"],["Future differential costs","YES","Differ between alternatives — affect the decision"],["Allocated fixed costs","Usually NO","Same total regardless of decision"],["Avoidable costs","YES","Can be eliminated by choosing an alternative"]]},
          {t:"h",v:"Make or Buy Decision"},
          {t:"p",v:"Should we make a component internally or buy it from an outside supplier?"},
          {t:"f",l:"Make or Buy Rule",v:"Buy if: Outside Price < Avoidable Cost to Make | Consider qualitative factors (quality, reliability, strategic importance)"},
          {t:"h",v:"Special Order Decision"},
          {t:"p",v:"Should we accept a one-time order below normal selling price?"},
          {t:"f",l:"Special Order Rule",v:"Accept if: Special Order Price > Variable Cost per unit (AND there is excess capacity) | Fixed costs are irrelevant if capacity exists"},
          {t:"h",v:"Keep or Drop a Segment"},
          {t:"p",v:"Should we eliminate an unprofitable product, division, or segment?"},
          {t:"f",l:"Keep or Drop Rule",v:"Drop ONLY if: Avoidable fixed costs + lost CM > 0 (i.e., dropping improves profit) | Allocated fixed costs are IRRELEVANT"},
          {t:"h",v:"Constrained Resource Decision"},
          {t:"p",v:"When production is limited by a scarce resource, maximize contribution margin PER UNIT OF CONSTRAINT (not per unit of product)."},
          {t:"f",l:"Ranking with Constraint",v:"Rank products by: CM per unit of scarce resource = CM per unit / Resource units required per unit"},
          {t:"tip",v:"Exam Tips: Relevant costs = future + differential. Sunk costs NEVER relevant. Opportunity costs ALWAYS relevant. Special order: accept if price > variable cost AND excess capacity exists. Make or Buy: compare outside price to AVOIDABLE costs only. Keep or Drop: allocated fixed costs are IRRELEVANT. Constraint decision: rank by CM per unit of constraint, not CM per unit."}
        ],
        quizzes:[]},
      {id:"4-19",title:"Business Process Improvement & the Value Chain",dur:"25 min",
        blocks:[
          {t:"h",v:"Outsourcing Decisions"},
          {t:"p",v:"Outsourcing means having an EXTERNAL supplier perform an activity previously done internally. It is a strategic decision that goes beyond simple cost comparison — it involves competitive advantage, risk, and long-term strategy."},
          {t:"h",v:"Financial Analysis: Make vs Outsource"},
          {t:"f",l:"Outsource Decision Rule",v:"Outsource if: Outside Cost < Total Avoidable Internal Cost (variable + avoidable fixed costs)"},
          {t:"p",v:"Key: Only AVOIDABLE costs are relevant. Allocated fixed costs that continue regardless are IRRELEVANT."},
          {t:"h",v:"Qualitative Factors in Outsourcing"},
          {t:"b",v:["Quality control: Can supplier maintain required quality standards?","Reliability: Will deliveries be on time? Supply chain risk?","Confidentiality: Will proprietary information be protected?","Core competency: Is this activity a strategic competitive advantage? (Don't outsource core competencies!)","Flexibility: Can we quickly switch back if needed?","Workforce impact: Effect on employee morale and retention"]},
          {t:"h",v:"Strategic Cost Management"},
          {t:"p",v:"Strategic cost management aligns COST MANAGEMENT decisions with the company's COMPETITIVE STRATEGY. There are two basic strategies:"},
          {t:"tbl",h:["Strategy","Focus","Cost Management Emphasis"],r:[["Cost Leadership","Be the lowest-cost producer","Aggressive cost reduction, efficiency, economies of scale"],["Differentiation","Offer unique value customers pay premium for","Invest in quality, R&D, service — don't cut costs that support differentiation"]]},
          {t:"h",v:"Customer Profitability Analysis"},
          {t:"p",v:"Not all customers are equally profitable. Using ABC principles, customer profitability analysis assigns costs to CUSTOMERS (not products) based on the resources they consume."},
          {t:"b",v:["High-maintenance customers (many orders, returns, calls) cost more to serve","Simple analysis: Contribution Margin from customer - Cost to serve that customer","Result: Identify profitable vs unprofitable customers — consider dropping or repricing for unprofitable ones"]},
          {t:"h",v:"Balanced Scorecard & Strategy"},
          {t:"p",v:"The Balanced Scorecard (BSC) translates strategy into MEASURABLE objectives across 4 perspectives: Financial, Customer, Internal Process, and Learning & Growth. It connects daily operations to long-term strategic goals."},
          {t:"h",v:"Balanced Scorecard — Full Coverage"},
          {t:"p",v:"The Balanced Scorecard (BSC), developed by Kaplan and Norton, is a STRATEGIC PERFORMANCE MANAGEMENT system that translates an organisation's strategy into measurable objectives across four perspectives. It balances financial and non-financial measures, and short-term and long-term objectives."},
          {t:"tbl",h:["Perspective","Question Asked","Typical Measures"],r:[["Financial","How do we look to shareholders?","Revenue growth, ROI, EVA, profit margin, cost reduction"],["Customer","How do customers see us?","Market share, customer satisfaction, retention, on-time delivery, defect rate"],["Internal Process","What must we excel at internally?","Cycle time, quality rate, process efficiency, innovation pipeline"],["Learning & Growth","Can we continue to improve?","Employee training hours, skills gap, technology capability, employee satisfaction"]]},
          {t:"h",v:"Strategy Maps and Cause-Effect Relationships"},
          {t:"p",v:"A STRATEGY MAP links the four BSC perspectives in a cause-effect chain. The logic flows UPWARD: Learning & Growth ENABLES better Internal Processes → which DELIVERS better Customer outcomes → which DRIVES Financial results."},
          {t:"b",v:["Example chain: Employee training (L&G) → faster production cycle time (Process) → better on-time delivery (Customer) → higher customer retention (Customer) → increased revenue (Financial)","Every non-financial measure should have a logical path to financial results","Strategy maps make the strategy VISIBLE and testable — management can see if their assumptions hold"]},
          {t:"h",v:"Leading vs Lagging Indicators"},
          {t:"tbl",h:["Type","Definition","Example"],r:[["Lagging","Results already achieved — look backward","Revenue, net income, ROI, customer satisfaction score"],["Leading","Predictors of future results — look forward","Training hours, process improvement rate, R&D investment, employee skills gap"]]},
          {t:"p",v:"BSC uses BOTH — lagging indicators confirm past performance, leading indicators predict and drive future performance. Relying only on financial (lagging) measures misses the drivers of future success."},
          {t:"h",v:"BSC and Performance Compensation"},
          {t:"p",v:"When BSC measures are linked to compensation, employees are motivated to improve ACROSS ALL FOUR perspectives — not just short-term financial results. This prevents the common trap of cutting costs (good for short-term finance) at the expense of customer service, quality, or employee development (bad long-term)."},
          {t:"tip",v:"Exam Tips: BSC = 4 perspectives (Financial, Customer, Internal Process, Learning & Growth). Strategy map = cause-effect chain upward from L&G to Financial. Lagging = past results. Leading = future predictors. Both are needed. BSC prevents overemphasis on short-term financial metrics at the expense of long-term performance drivers. Kaplan & Norton developed the BSC."},
          {t:"h",v:"Accounting Process Redesign"},
          {t:"p",v:"As organisations adopt lean and process improvement initiatives, the accounting systems themselves must be REDESIGNED to support — rather than hinder — these improvements. Traditional accounting processes often create non-value-added work that contradicts lean principles."},
          {t:"tbl",h:["Traditional Accounting","Redesigned Lean Accounting"],r:[["Detailed variance reports encouraging local optimisation","Simplified reporting focused on system-level performance"],["Standard costing encouraging overproduction to absorb fixed costs","Throughput or value-stream costing aligned with lean flow"],["Monthly batch reporting — information arrives too late","Real-time or weekly visual reporting on the shop floor"],["Complex journal entries for every inventory movement","Backflush costing — record costs only at completion"],["Departmental cost reports encouraging local efficiency","Value-stream P&L reports showing end-to-end performance"]]},
          {t:"h",v:"Key Principles of Accounting Process Redesign"},
          {t:"b",v:["Eliminate non-value-added accounting tasks: If a report is not used for decisions, eliminate it","Simplify transaction processing: Backflush costing, combined journal entries, automated data capture","Align with lean: The accounting system should SUPPORT lean behaviour — not incentivise batch production or inventory build-up","Visual management: Replace complex reports with simple visual scorecards visible on the shop floor","Faster feedback: Managers need performance data in hours/days — not at month-end"]},
          {t:"tip",v:"Exam Tips: Accounting process redesign = applying BPR/lean thinking to the ACCOUNTING FUNCTION itself. Traditional standard costing can conflict with lean by rewarding overproduction. Backflush costing supports JIT/lean. The goal: accounting should add value and support operational decisions — eliminate reports and transactions nobody uses."},
          {t:"tip",v:"Exam Tips: Outsource if outside cost < avoidable internal cost. Allocated fixed costs IRRELEVANT. Don't outsource CORE COMPETENCIES. Cost leadership = minimize costs. Differentiation = invest to maintain uniqueness. Customer profitability = CM - cost to serve. BSC = 4 perspectives (Financial, Customer, Process, Learning). Strategy drives cost management decisions."}
        ],
        quizzes:[]},
      {id:"4-20",title:"Process Analysis",dur:"25 min",
        blocks:[
          {t:"h",v:"What Is Process Analysis?"},
          {t:"p",v:"Process analysis examines how work flows through an organization to identify inefficiencies, waste, and opportunities for improvement. It is a core tool in lean management and business process improvement."},
          {t:"h",v:"Process Mapping (Flowcharts)"},
          {t:"p",v:"Process maps visually document every step in a process — showing inputs, activities, decisions, and outputs. They reveal where waste occurs and where improvements can be made."},
          {t:"b",v:["Current State Map: Documents the process AS IT IS TODAY — reveals all waste and inefficiencies","Future State Map: Shows the IDEAL process after improvements are implemented","Gap Analysis: Identifies what needs to change to move from current to future state"]},
          {t:"h",v:"Value Stream Mapping (VSM)"},
          {t:"p",v:"VSM is a lean tool that maps the ENTIRE flow of materials and information from supplier to customer. It shows both value-added and non-value-added time, identifying waste in the entire value stream."},
          {t:"tbl",h:["Metric","Definition"],r:[["Cycle Time","Time to complete ONE unit from start to finish"],["Lead Time","Total time from customer order to delivery (includes waiting)"],["Process Time","Actual time spent working on the product (value-added)"],["Takt Time","Available production time / Customer demand rate — the production PACE needed"],["Value-Added Ratio","Process Time / Lead Time — higher is better"]]},
          {t:"h",v:"Takt Time"},
          {t:"f",l:"Takt Time",v:"Takt Time = Available Production Time / Customer Demand Rate"},
          {t:"p",v:"Example: Available time = 480 minutes/day. Customer demand = 120 units/day. Takt Time = 480/120 = 4 minutes/unit. Production must complete one unit every 4 minutes to meet demand."},
          {t:"h",v:"Throughput & Bottleneck Analysis"},
          {t:"b",v:["Throughput: Rate at which the system produces output","Bottleneck: The slowest process step — limits overall throughput","Improving any non-bottleneck step does NOT improve overall throughput","Only improving the bottleneck increases overall system output"]},
          {t:"h",v:"Theory of Constraints (TOC) — Full Coverage"},
          {t:"p",v:"The Theory of Constraints (Eliyahu Goldratt) states that every system has at least ONE constraint (bottleneck) that limits its performance. Rather than optimising every process, managers should focus ALL improvement efforts on the CONSTRAINT."},
          {t:"h",v:"The 5 Steps of TOC"},
          {t:"tbl",h:["Step","Action","Description"],r:[["1. Identify","Find the constraint","Locate the bottleneck — the process limiting overall throughput"],["2. Exploit","Get the most out of it","Maximise output from the constraint without major investment — eliminate downtime, prioritise the right products"],["3. Subordinate","Align everything else","All other processes must support the constraint — feed it at its pace, don't overproduce upstream"],["4. Elevate","Increase constraint capacity","Invest to expand bottleneck capacity — add machinery, overtime, outsource the bottleneck operation"],["5. Repeat","Find the new constraint","Once the bottleneck is resolved, a NEW constraint emerges — restart the 5-step process"]]},
          {t:"h",v:"Throughput Costing (Super-Variable Costing)"},
          {t:"p",v:"Throughput costing (also called super-variable costing) is the costing approach aligned with TOC. It treats ONLY direct materials as truly variable. All other costs — including direct labor and ALL overhead — are treated as FIXED period costs."},
          {t:"tbl",h:["Cost Method","Product Cost includes","Period Cost includes"],r:[["Absorption Costing","DM + DL + Fixed OH + Variable OH","SGA only"],["Variable Costing","DM + DL + Variable OH","Fixed OH + SGA"],["Throughput Costing","Direct Materials ONLY","DL + ALL OH (fixed & variable) + SGA"]]},
          {t:"f",l:"Throughput Contribution",v:"Throughput Contribution = Sales Revenue - Direct Materials Cost"},
          {t:"f",l:"Net Profit (TOC)",v:"Net Profit = Throughput Contribution - Total Operating Expenses (all other costs)"},
          {t:"h",v:"TOC Product Mix Decision — Throughput Margin per Bottleneck Hour"},
          {t:"p",v:"When the bottleneck limits capacity, produce the product with the HIGHEST throughput contribution per bottleneck hour first."},
          {t:"f",l:"Throughput per Bottleneck Hour",v:"Throughput per Bottleneck Hour = Throughput Contribution / Bottleneck Hours Required per Unit"},
          {t:"p",v:"Example: Product A — Sales $100, DM $40, bottleneck hours 2 → Throughput/hour = ($100-$40)/2 = $30/hr. Product B — Sales $80, DM $20, bottleneck hours 1 → Throughput/hour = ($80-$20)/1 = $60/hr. Prioritise Product B despite lower total contribution."},
          {t:"tip",v:"Exam Tips: TOC 5 Steps: Identify → Exploit → Subordinate → Elevate → Repeat. Throughput costing = ONLY direct materials are product cost. All other costs (even DL) are PERIOD costs. Throughput Contribution = Revenue - DM only. Rank products by throughput per BOTTLENECK HOUR (not total contribution margin). TOC philosophy: the whole system is only as fast as its slowest step."},
          {t:"tip",v:"Process Analysis Tips: Takt Time = Available Time / Demand Rate — sets the production pace. Cycle Time = time per unit. Lead Time includes ALL time (including waiting). Value-Added Ratio = Process Time / Lead Time. VSM shows material AND information flows. Bottleneck limits throughput — focus improvement there first. Current state map shows waste; future state map shows the ideal."}
        ],
        quizzes:[]},
      {id:"4-21",title:"Quality Management and Costs of Quality",dur:"25 min",
        blocks:[
          {t:"h",v:"What Are Quality Costs?"},
          {t:"p",v:"Quality costs are costs associated with PREVENTING, DETECTING, and CORRECTING poor quality. The CMA exam extensively tests the four categories of quality costs and the trade-offs between them."},
          {t:"h",v:"Four Categories of Quality Costs"},
          {t:"tbl",h:["Category","When Incurred","Examples","Goal"],r:[["Prevention","Before defects occur","Quality training, process design, supplier evaluation, quality circles","Prevent defects from happening"],["Appraisal","During/after production to DETECT defects","Inspection, testing, auditing, statistical quality control","Find defects before shipping"],["Internal Failure","Defects found BEFORE delivery to customer","Rework, scrap, downtime, re-inspection","Cost of defects caught internally"],["External Failure","Defects found AFTER delivery to customer","Warranty, returns, recalls, lost customers, legal costs","Most expensive — customer already affected"]]},
          {t:"h",v:"The Quality Cost Trade-off"},
          {t:"p",v:"Investing MORE in Prevention and Appraisal REDUCES Failure costs. The goal is to find the optimal total quality cost level."},
          {t:"b",v:["Prevention + Appraisal = Costs of CONFORMANCE (doing it right)","Internal Failure + External Failure = Costs of NON-CONFORMANCE (fixing mistakes)","External failure is the MOST EXPENSIVE category — defects reach the customer","Prevention is the CHEAPEST long-term strategy"]},
          {t:"h",v:"Total Quality Management (TQM)"},
          {t:"b",v:["TQM philosophy: Build quality IN from the start — everyone is responsible","Zero defects goal: Continuous improvement toward perfection","Kaizen: Japanese philosophy of continuous small improvements","Six Sigma: Statistical approach targeting 3.4 defects per million opportunities"]},
          {t:"h",v:"Quality Cost Report"},
          {t:"p",v:"Companies prepare quality cost reports showing the % of each category to total sales. A well-managed quality program has HIGH prevention/appraisal costs and LOW failure costs. Total quality costs should decrease over time as quality improves."},
          {t:"tip",v:"Exam Tips: 4 categories — Prevention, Appraisal, Internal Failure, External Failure. Prevention + Appraisal = Conformance costs. Internal + External Failure = Non-conformance costs. External failure is MOST EXPENSIVE. Prevention is CHEAPEST long-term. TQM = everyone responsible, zero defects goal. Kaizen = continuous improvement. More prevention spending → less failure spending."}
        ,
          {t:"h",v:"TQM Tools & Techniques"},
          {t:"b",v:["1. Quality Circles: Small employee groups meeting regularly to identify and solve quality problems — empowers workers","2. Statistical Quality Control (SQC): Control charts to monitor processes. In-control = random variation within limits. Out-of-control = assignable cause exists","3. Histograms: Bar charts showing frequency distribution of quality measurements","4. Pareto Diagram (80/20 Rule): Ranks defects from most to least frequent. 80% of problems come from 20% of causes — focus on vital few","5. Cause-and-Effect Diagram (Ishikawa / Fishbone): Maps root causes of quality problems. Categories: Manpower, Methods, Machines, Materials (4 Ms)"]},
          {t:"h",v:"Kaizen Costing"},
          {t:"p",v:"Kaizen (改善) means 'continuous improvement' in Japanese. Kaizen costing applies this philosophy directly to COST MANAGEMENT — setting cost REDUCTION targets each period and continuously working to achieve them through small, incremental improvements."},
          {t:"tbl",h:["Feature","Standard Costing","Kaizen Costing"],r:[["Philosophy","Maintain current standards — investigate variances","Continuously REDUCE costs below current actuals"],["Cost Targets","Set annually based on standard specifications","Set as incremental reductions from current actual costs each period"],["Variance Analysis","Actual vs Standard — find deviations","Actual vs Target Reduction — did we improve enough?"],["Focus","Control — keep costs at standard","Improvement — continuously lower the cost baseline"],["Time horizon","Annual budget cycle","Continuous — monthly or quarterly improvement cycles"]]},
          {t:"h",v:"How Kaizen Costing Works"},
          {t:"b",v:["Step 1 — Set reduction target: Management sets a cost reduction percentage (e.g., reduce unit cost by 3% per quarter)","Step 2 — Identify opportunities: Teams analyse processes to find waste elimination, efficiency gains, materials savings","Step 3 — Implement improvements: Small changes are made continuously — no big capital investment required","Step 4 — Measure results: Actual costs tracked against the reduction target each period","Step 5 — Reset baseline: Achieved cost level becomes the new baseline for the NEXT period's reduction target"]},
          {t:"p",v:"Key distinction: Kaizen costing is applied DURING the production phase (after the product is designed), making incremental improvements to existing processes. This contrasts with Target Costing which sets cost targets BEFORE and DURING design."},
          {t:"f",l:"Kaizen Cost Target",v:"Kaizen Target Cost = Current Actual Cost × (1 - Reduction Rate%)"},
          {t:"tip",v:"Exam Tips: Kaizen = continuous SMALL improvements during production. Standard costing = maintain standards. Kaizen costing = continuously REDUCE the cost baseline. Target costing = cost target set at DESIGN stage. Kaizen variance = actual cost reduction vs target reduction (not actual vs standard). Kaizen is linked to lean and TQM philosophy — eliminate waste incrementally. 'Kai' = change, 'Zen' = good."},
          {t:"h",v:"Total Productive Maintenance (TPM)"},
          {t:"p",v:"TPM is a maintenance philosophy that aims for ZERO BREAKDOWNS, ZERO DEFECTS, and ZERO ACCIDENTS by making equipment maintenance EVERYONE's responsibility — not just the maintenance department."},
          {t:"tbl",h:["TPM Pillar","Description"],r:[["Autonomous Maintenance","Operators perform routine maintenance on their own equipment — cleaning, lubricating, inspecting"],["Planned Maintenance","Scheduled preventive maintenance before failures occur"],["Focused Improvement","Cross-functional teams eliminate specific equipment losses"],["Overall Equipment Effectiveness (OEE)","Key TPM metric: OEE = Availability × Performance Rate × Quality Rate"]]},
          {t:"f",l:"OEE Formula",v:"OEE = Availability × Performance Rate × Quality Rate | 100% OEE = perfect production (never achieved in practice)"},
          {t:"p",v:"TPM Goal: Move from REACTIVE maintenance (fix when broken) to PROACTIVE maintenance (prevent failures before they occur). Reduces waste from machine downtime, reduced speed, and defects caused by poor equipment condition."},
          {t:"h",v:"ISO 9000 Quality Standards"},
          {t:"b",v:["ISO 9000 = internationally recognized quality management standards (International Organization for Standardization)","ISO 9001 = main certification standard — specifies requirements for a QUALITY MANAGEMENT SYSTEM","Certifies that PROCESSES are consistently managed — NOT that products are defect-free","Key principles: Customer focus, leadership, process approach, continual improvement","Benefits: International recognition, customer confidence, competitive advantage"]},
          {t:"tip",v:"Exam Tips: Pareto = 80% of defects from 20% of causes — focus on vital few. Ishikawa = identifies ROOT CAUSES — 4 Ms: Manpower, Methods, Machines, Materials. Control chart: points outside limits = process OUT of control. ISO 9001 = process certification (not product quality). Quality Circles = employee-driven continuous improvement."}
        ],
        quizzes:[]}
    ]},
  {id:5,title:"Internal Controls",weight:15,emoji:"🔒",bar:"#E24B4A",bg:"#FCEBEB",text:"#A32D2D",strong:"#791F1F",
    lessons:[
      {id:"5-1",title:"COSO Framework & Internal Control Fundamentals",dur:"25 min",
        blocks:[
          {t:"h",v:"What Are Internal Controls?"},
          {t:"p",v:"Internal controls are processes and procedures designed to provide REASONABLE ASSURANCE that an organization achieves its objectives in operations, financial reporting, and compliance. They protect assets, ensure accurate records, and promote operational efficiency."},
          {t:"h",v:"The COSO Framework — 5 Components"},
          {t:"p",v:"The Committee of Sponsoring Organizations (COSO) framework is the gold standard for internal control. It has five integrated components:"},
          {t:"b",v:["1. Control Environment: The foundation — tone at the top, ethical values, board oversight, organizational structure, competence commitment","2. Risk Assessment: Identifying and analyzing risks that threaten achieving objectives; includes fraud risk assessment","3. Control Activities: Policies and procedures that mitigate risks — authorizations, reconciliations, physical controls, segregation of duties","4. Information & Communication: Relevant information must be identified, captured, and communicated in a timely manner","5. Monitoring Activities: Ongoing evaluations and separate evaluations to ensure controls are present and functioning"]},
          {t:"h",v:"The COSO 17 Principles (2013 Framework)"},
          {t:"p",v:"Each of the five components contains specific PRINCIPLES that support it. All 17 principles must be present and functioning for internal control to be effective. The IMA exam tests these principles directly."},
          {t:"tbl",h:["Component","#","Principle"],r:[["Control Environment","1","Commitment to integrity and ethical values"],["Control Environment","2","Board exercises oversight responsibility (independence from management)"],["Control Environment","3","Management establishes structure, authority, and responsibility"],["Control Environment","4","Commitment to attract, develop, and retain competent individuals"],["Control Environment","5","Individuals are held accountable for their internal control responsibilities"],["Risk Assessment","6","Specify suitable objectives (clear enough to identify related risks)"],["Risk Assessment","7","Identify and analyze risks to achieving objectives"],["Risk Assessment","8","Assess fraud risk specifically"],["Risk Assessment","9","Identify and assess changes that could significantly impact internal control"],["Control Activities","10","Select and develop control activities that mitigate risks"],["Control Activities","11","Select and develop general IT controls over technology"],["Control Activities","12","Deploy control activities through policies and procedures"],["Information & Communication","13","Use relevant quality information to support internal control"],["Information & Communication","14","Communicate internal control information internally"],["Information & Communication","15","Communicate with external parties regarding internal control matters"],["Monitoring Activities","16","Conduct ongoing and/or separate evaluations of internal control"],["Monitoring Activities","17","Evaluate and communicate deficiencies to responsible parties"]]},
          {t:"tip",v:"Exam Tips — 17 Principles: Control Environment = Principles 1–5 (ethics, board, structure, competence, accountability). Risk Assessment = 6–9 (objectives, risk id, fraud risk, change). Control Activities = 10–12 (controls, IT controls, policies). Information & Communication = 13–15 (quality info, internal, external). Monitoring = 16–17 (ongoing/separate evaluations, communicate deficiencies). All 17 must be present and functioning."},
          {t:"h",v:"Types of Control Activities"},
          {t:"tbl",h:["Control Type","Description","Example"],r:[["Preventive","Stop errors/fraud BEFORE they occur","Requiring dual approval for payments"],["Detective","Identify errors/fraud AFTER they occur","Monthly bank reconciliations"],["Corrective","Fix identified problems","Adjusting entries after finding errors"],["Compensating","Alternative controls when primary isn't feasible","Manager review when segregation isn't possible"]]},
          {t:"h",v:"Segregation of Duties (SOD)"},
          {t:"p",v:"The most fundamental control principle. No single person should have control over all phases of a transaction. The four key duties that must be SEPARATED:"},
          {t:"b",v:["Authorization: Approving transactions","Recording: Entering transactions in the accounting system","Custody: Physical possession of assets","Reconciliation: Comparing records to physical assets"]},
          {t:"h",v:"Limitations of Internal Controls"},
          {t:"b",v:["Internal controls provide only REASONABLE (not absolute) assurance","Collusion: Two or more employees working together can override controls","Management Override: Management can bypass controls — a key fraud risk","Cost-Benefit: Controls should not cost more than the benefit they provide","Human Error: Mistakes happen even with good controls in place"]},
          {t:"h",v:"The Fraud Triangle"},
          {t:"b",v:["Pressure/Incentive: Financial need, performance targets, personal problems","Opportunity: Weak internal controls, ability to override controls","Rationalization: Justifying the fraud ('I deserve this', 'I'll pay it back')"]},
          {t:"tip",v:"Exam Tips: COSO has 5 components and 17 principles — Control Environment is the FOUNDATION (Principles 1–5). Segregation of Duties = most important preventive control. Preventive > Detective (better to prevent than detect). Reasonable assurance, NOT absolute assurance. Collusion and management override can bypass most controls. Fraud Triangle: Pressure + Opportunity + Rationalization. All 17 principles must be present and functioning for ICFR to be effective — the absence of any one principle is a deficiency."}
        ],
        quizzes:[]},
      {id:"5-2",title:"Risk Assessment & Enterprise Risk Management",dur:"25 min",
        blocks:[
          {t:"h",v:"What Is Risk Assessment?"},
          {t:"p",v:"Risk assessment is the second component of the COSO framework. It involves identifying and analyzing RISKS that could prevent the organization from achieving its objectives — including financial reporting, operational, and compliance objectives."},
          {t:"h",v:"Types of Risk"},
          {t:"tbl",h:["Risk Type","Description","Example"],r:[["Inherent Risk","Risk level BEFORE any controls are applied","Cash is always inherently risky"],["Residual Risk","Risk level AFTER controls are applied","Cash risk after reconciliations and dual controls"],["Control Risk","Risk that controls fail to prevent/detect errors","Reconciler colludes with cashier"],["Detection Risk","Risk that audit procedures miss a material error","Used in audit risk model"]]},
          {t:"h",v:"Enterprise Risk Management (ERM) — COSO ERM Framework"},
          {t:"p",v:"ERM is a broader framework that goes beyond financial controls to manage ALL risks that could affect the organization's strategy and value creation. COSO ERM (2017) has five components:"},
          {t:"b",v:["1. Governance & Culture: Leadership sets risk appetite and culture","2. Strategy & Objective-Setting: Aligning risk appetite with strategy","3. Performance: Identifying, assessing, and prioritizing risks","4. Review & Revision: Monitoring risk management practices","5. Information, Communication & Reporting: Sharing risk information"]},
          {t:"h",v:"Risk Appetite vs. Risk Tolerance"},
          {t:"tbl",h:["Term","Definition"],r:[["Risk Appetite","The AMOUNT and TYPE of risk an organization is willing to accept in pursuit of its objectives — set by the board"],["Risk Tolerance","The ACCEPTABLE VARIATION around the risk appetite — the operational range within which management works"],["Risk Threshold","The level at which risk becomes unacceptable and triggers escalation or action"]]},
          {t:"h",v:"Risk Response Strategies"},
          {t:"b",v:["AVOID: Eliminate the risk by not engaging in the activity","REDUCE: Implement controls to lower likelihood or impact","SHARE/TRANSFER: Insurance, outsourcing, hedging","ACCEPT: Acknowledge risk and do nothing (when cost > benefit)"]},
          {t:"tip",v:"Exam Tips: Inherent risk = BEFORE controls. Residual risk = AFTER controls. ERM is broader than COSO IC — covers strategy and value. Risk appetite is set by the BOARD. Four risk responses: Avoid, Reduce, Share, Accept. Risk tolerance = acceptable variation around appetite. Higher inherent risk → need stronger controls to reduce residual risk."}
        ],
        quizzes:[]},
      {id:"5-3",title:"Control Activities & Preventive Controls",dur:"25 min",
        blocks:[
          {t:"h",v:"Control Activities — The Third COSO Component"},
          {t:"p",v:"Control activities are the ACTIONS (policies and procedures) that help ensure management directives are carried out and that risks are mitigated to an acceptable level. They are the most visible and operational component of internal control."},
          {t:"h",v:"Categories of Control Activities"},
          {t:"tbl",h:["Category","Examples"],r:[["Authorization Controls","Requiring manager approval for expenses above $5,000; dual signatures on large checks"],["Reconciliations","Monthly bank reconciliations; comparing physical inventory to records"],["Physical Controls","Locked safes, security cameras, badge access, fencing"],["Performance Reviews","Budget-to-actual variance analysis; comparing results over time"],["Information Processing Controls","Edit checks, data validation, system access controls"],["Segregation of Duties","Separating authorization, recording, custody, reconciliation"]]},
          {t:"h",v:"Preventive vs. Detective Controls"},
          {t:"tbl",h:["Type","Goal","Examples","When It Acts"],r:[["Preventive","STOP errors/fraud before they occur","Dual approvals, access controls, SOD, data input validation","BEFORE transaction"],["Detective","FIND errors/fraud after they occur","Bank reconciliations, audits, exception reports, variance analysis","AFTER transaction"],["Corrective","FIX identified problems","Adjusting entries, system patches, disciplinary action","AFTER detection"]]},
          {t:"h",v:"Hard vs. Soft Controls"},
          {t:"b",v:["Hard Controls (Formal): Written policies, system access restrictions, approval workflows — easily observable and testable","Soft Controls (Informal): Ethical culture, management integrity, employee competence, tone at top — harder to observe but equally important"]},
          {t:"h",v:"Key Control Activities for Common Business Processes"},
          {t:"b",v:["Cash Receipts: Daily deposits, restrictive endorsements on checks, independent reconciliation","Purchasing/AP: Purchase orders, three-way match (PO, receiving report, invoice), separation of purchasing from payment","Payroll: HR approval for hiring/pay rates, separate payroll preparation and distribution, regular review of payroll register","Fixed Assets: Capitalization policy, periodic physical inventory, authorized approval for acquisitions/disposals"]},
          {t:"tip",v:"Exam Tips: Control activities = the ACTIONS (policies/procedures) that mitigate risks. Preventive is BETTER than detective. Three-way match = PO + Receiving Report + Invoice. SOD is the MOST important preventive control. Physical controls protect ASSETS. Reconciliations are DETECTIVE. Authorization = who can approve. Remember: hard controls are formal/documented; soft controls relate to culture."}
        ],
        quizzes:[]},
      {id:"5-4",title:"Information Systems Controls & IT Governance",dur:"30 min",
        blocks:[
          {t:"h",v:"IT Controls — Why They Matter"},
          {t:"p",v:"Modern businesses rely on information systems for virtually all financial transactions. Weak IT controls can undermine ALL other internal controls. The CMA exam tests both general IT controls (GITC) and application controls."},
          {t:"h",v:"General IT Controls (GITC)"},
          {t:"p",v:"GITC apply to the overall IT environment and provide the foundation for all application controls:"},
          {t:"tbl",h:["GITC Category","Description","Examples"],r:[["Access Controls","Who can access systems, data, and programs","User IDs, passwords, multi-factor authentication, role-based access"],["Change Management","Controlling changes to programs and systems","Testing requirements, change authorization, documentation"],["Computer Operations","Ensuring systems run as intended","Backup procedures, job scheduling, incident response"],["IT Security","Protecting data from threats","Firewalls, encryption, anti-virus, intrusion detection"]]},
          {t:"h",v:"Application Controls"},
          {t:"p",v:"Application controls are SPECIFIC to individual systems/applications and ensure completeness, accuracy, and validity of transactions:"},
          {t:"b",v:["Input Controls: Data validation, format checks, range checks, completeness checks — ensure accurate data entry","Processing Controls: Run-to-run totals, batch controls — ensure data is processed completely and accurately","Output Controls: Review of output reports, distribution controls — ensure output is complete and goes to right people"]},
          {t:"h",v:"Segregation of Duties in IT"},
          {t:"b",v:["Systems Analyst: Designs system specifications","Programmer: Writes and modifies code","Computer Operator: Runs the system day-to-day","Data Entry: Inputs transaction data","These functions must be SEPARATED — no one should both program AND operate a system"]},
          {t:"h",v:"Cloud Computing Controls"},
          {t:"b",v:["Data residency: Where is data physically stored?","Shared responsibility model: Cloud provider secures infrastructure; client secures data/applications","Key risks: Vendor dependency, data breach, compliance with regulations","SOC Reports (SOC 1, SOC 2): Third-party assurance reports on service organization controls"]},
          {t:"h",v:"CIA Security Triad"},
          {t:"tbl",h:["Principle","Definition","Control Examples"],r:[["Confidentiality","Data accessible only to AUTHORIZED users","Encryption, access controls, need-to-know"],["Integrity","Data is ACCURATE and complete — not tampered with","Hash functions, digital signatures, audit trails"],["Availability","Systems are ACCESSIBLE when needed","Redundancy, backups, disaster recovery"]]},
          {t:"h",v:"COBIT — IT Governance Framework"},
          {t:"p",v:"COBIT (Control Objectives for Information and Related Technologies) is the leading IT GOVERNANCE framework, developed by ISACA. While COSO provides the internal control framework for the whole organization, COBIT provides the governance and management framework specifically for ENTERPRISE IT. The two frameworks are complementary — COBIT maps to and extends COSO for the IT environment."},
          {t:"tbl",h:["COBIT Governance Objective","Purpose"],r:[["Evaluate, Direct & Monitor (EDM)","Board-level governance — set IT direction, evaluate IT investments, monitor IT performance"],["Align, Plan & Organize (APO)","Strategic IT planning — align IT with business strategy, manage resources"],["Build, Acquire & Implement (BAI)","Implement IT solutions — acquire and deploy technology and changes"],["Deliver, Service & Support (DSS)","Deliver IT services — ensure security, service continuity, and support"],["Monitor, Evaluate & Assess (MEA)","Monitor IT performance and controls — assess compliance"]]},
          {t:"b",v:["COBIT applies IT governance principles: stakeholder needs, covering the enterprise end-to-end, applying a single integrated framework, enabling a holistic approach, separating governance from management","COBIT vs COSO: COSO = broad internal control framework for the entire organization; COBIT = IT-specific governance and control framework. COBIT maps its control objectives to COSO components","COBIT vs ITIL: COBIT = governance and control (WHAT to do); ITIL = IT service management best practices (HOW to deliver services)","Key concept: COBIT helps management ensure IT aligns with business objectives, resources are used responsibly, and IT risks are managed appropriately"]},
          {t:"tip",v:"Exam Tips: GITC = GENERAL controls (apply to all systems). Application controls = SPECIFIC to one application. Input → Processing → Output. CIA Triad: Confidentiality, Integrity, Availability. In IT SOD: Analyst, Programmer, Operator, Data Entry must be separated. SOC 2 = service organization security and availability. Encryption protects CONFIDENTIALITY. Audit trails protect INTEGRITY. COBIT = IT GOVERNANCE framework (ISACA) — complementary to COSO; covers Evaluate/Direct/Monitor, Align/Plan/Organize, Build/Acquire/Implement, Deliver/Service/Support, Monitor/Evaluate/Assess. COBIT = governance (WHAT); ITIL = IT service delivery (HOW)."}
        ],
        quizzes:[]},
      {id:"5-5",title:"Sarbanes-Oxley (SOX) & Regulatory Compliance",dur:"25 min",
        blocks:[
          {t:"h",v:"Why SOX Was Enacted"},
          {t:"p",v:"The Sarbanes-Oxley Act (SOX) was enacted in 2002 following major corporate scandals (Enron, WorldCom, Tyco). It was designed to restore investor confidence by strengthening corporate governance, financial reporting integrity, and accountability of management."},
          {t:"h",v:"Key SOX Provisions"},
          {t:"tbl",h:["Section","Requirement","Who Is Responsible"],r:[["Section 302","CEO and CFO must PERSONALLY CERTIFY accuracy of financial reports","CEO & CFO"],["Section 404","Management must ASSESS and REPORT on internal controls over financial reporting (ICFR); external auditor must attest","Management + External Auditor"],["Section 409","Companies must DISCLOSE material changes on a RAPID BASIS (real-time disclosure)","Management"],["Section 906","Criminal penalties for knowingly certifying false reports — up to $5M fine, 20 years prison","CEO & CFO"]]},
          {t:"h",v:"Section 404 — Internal Control over Financial Reporting (ICFR)"},
          {t:"b",v:["Management must establish, maintain, and ASSESS the effectiveness of ICFR","External auditors of large accelerated filers must ATTEST to management's assessment","Framework used: COSO — the standard for evaluating ICFR","Annual report must include management's conclusion on whether ICFR is EFFECTIVE"]},
          {t:"h",v:"The Audit Committee"},
