          {q:"Product costs become expenses (COGS) when:",o:["They are incurred in the factory","They are paid in cash","The finished products are SOLD","The products are completed (moved to Finished Goods)"],a:2,e:"Product costs follow the inventory — they become COGS when products are SOLD, not when manufactured. They sit in WIP inventory (being made), then Finished Goods inventory (completed), then become COGS (sold). This is the matching principle."}
        ]}
    ]},
  {id:5,title:"Internal Controls",weight:15,emoji:"🔒",bar:"#E24B4A",bg:"#FCEBEB",text:"#A32D2D",strong:"#791F1F",
    lessons:[
      {id:"5-1",title:"COSO Framework & Internal Control Fundamentals",dur:"25 min",
        blocks:[
          {t:"h",v:"What Are Internal Controls?"},
          {t:"p",v:"Internal controls are processes and procedures designed to provide REASONABLE ASSURANCE that an organization achieves its objectives in operations, financial reporting, and compliance. They protect assets, ensure accurate records, and promote operational efficiency."},
          {t:"h",v:"The COSO Framework — 5 Components"},
          {t:"p",v:"The Committee of Sponsoring Organizations (COSO) framework is the gold standard for internal control. It has five integrated components:"},
          {t:"b",v:["1. Control Environment: The foundation — tone at the top, ethical values, board oversight, organizational structure, competence commitment","2. Risk Assessment: Identifying and analyzing risks that threaten achieving objectives; includes fraud risk assessment","3. Control Activities: Policies and procedures that mitigate risks — authorizations, reconciliations, physical controls, segregation of duties","4. Information & Communication: Relevant information must be identified, captured, and communicated in a timely manner","5. Monitoring Activities: Ongoing evaluations and separate evaluations to ensure controls are present and functioning"]},
          {t:"h",v:"Types of Control Activities"},
          {t:"tbl",h:["Control Type","Description","Example"],r:[["Preventive","Stop errors/fraud BEFORE they occur","Requiring dual approval for payments"],["Detective","Identify errors/fraud AFTER they occur","Monthly bank reconciliations"],["Corrective","Fix identified problems","Adjusting entries after finding errors"],["Compensating","Alternative controls when primary isn't feasible","Manager review when segregation isn't possible"]]},
          {t:"h",v:"Segregation of Duties (SOD)"},
          {t:"p",v:"The most fundamental control principle. No single person should have control over all phases of a transaction. The four key duties that must be SEPARATED:"},
          {t:"b",v:["Authorization: Approving transactions","Recording: Entering transactions in the accounting system","Custody: Physical possession of assets","Reconciliation: Comparing records to physical assets"]},
          {t:"h",v:"Limitations of Internal Controls"},
          {t:"b",v:["Internal controls provide only REASONABLE (not absolute) assurance","Collusion: Two or more employees working together can override controls","Management Override: Management can bypass controls — a key fraud risk","Cost-Benefit: Controls should not cost more than the benefit they provide","Human Error: Mistakes happen even with good controls in place"]},
          {t:"h",v:"The Fraud Triangle"},
          {t:"b",v:["Pressure/Incentive: Financial need, performance targets, personal problems","Opportunity: Weak internal controls, ability to override controls","Rationalization: Justifying the fraud ('I deserve this', 'I'll pay it back')"]},
          {t:"tip",v:"Exam Tips: COSO has 5 components — Control Environment is the FOUNDATION. Segregation of Duties = most important preventive control. Preventive > Detective (better to prevent than detect). Reasonable assurance, NOT absolute assurance. Collusion and management override can bypass most controls. Fraud Triangle: Pressure + Opportunity + Rationalization."}
        ],
        quizzes:[]}
    ]},
  {id:6,title:"Technology & Analytics",weight:15,emoji:"💻",bar:"#0A8A8A",bg:"#E0F7F7",text:"#0A6E6E",strong:"#075252",
    lessons:[
      {id:"6-1",title:"Data Analytics & Business Intelligence Fundamentals",dur:"25 min",
        blocks:[
          {t:"h",v:"The Role of Technology in Modern Finance"},
          {t:"p",v:"Technology and data analytics have transformed management accounting. Finance professionals are now expected to extract insights from large datasets, use BI tools, understand ERP systems, and evaluate cybersecurity risks. The CMA exam tests these competencies under Section 6."},
          {t:"h",v:"Four Types of Analytics"},
          {t:"tbl",h:["Type","Question It Answers","Complexity","Example"],r:[["Descriptive","What happened?","Low","Sales report showing last quarter revenue"],["Diagnostic","Why did it happen?","Medium","Drill-down analysis of why sales dropped"],["Predictive","What will happen?","High","Forecasting next quarter sales using regression"],["Prescriptive","What should we do?","Highest","Optimization model recommending pricing strategy"]]},
          {t:"h",v:"Key Data Concepts"},
          {t:"b",v:["Structured Data: Organized in rows/columns (databases, spreadsheets) — easy to analyze","Unstructured Data: No predefined format (emails, social media, videos) — requires special tools","Big Data: High Volume, Velocity, and Variety (the 3 Vs) — too large for traditional databases","Data Warehouse: Central repository of integrated data from multiple sources for analysis and reporting","Data Mining: Discovering patterns and relationships in large datasets using statistical tools"]},
          {t:"h",v:"ERP Systems"},
          {t:"p",v:"Enterprise Resource Planning (ERP) systems integrate ALL business processes into one system — finance, HR, supply chain, manufacturing, and sales share a SINGLE database. Examples: SAP, Oracle, Microsoft Dynamics."},
          {t:"b",v:["Benefits: Real-time data, eliminates data silos, improves accuracy, automates processes","Risks: High implementation cost, data migration challenges, requires extensive training","Internal Control consideration: ERP requires strong IT controls (access controls, audit trails)"]},
          {t:"h",v:"Cybersecurity & IT Controls"},
          {t:"b",v:["Confidentiality: Data accessible only to authorized users","Integrity: Data is accurate and complete, not tampered with","Availability: Systems are accessible when needed (uptime)","Key controls: Access controls, encryption, firewalls, backup procedures, disaster recovery plans"]},
          {t:"h",v:"Emerging Technologies"},
          {t:"b",v:["Robotic Process Automation (RPA): Software robots automating repetitive rule-based tasks (e.g., invoice processing, bank reconciliations)","Artificial Intelligence (AI) & Machine Learning: Detecting patterns, anomalies, and fraud in financial data","Blockchain: Distributed ledger providing transparent, tamper-proof transaction records","Cloud Computing: On-demand access to computing resources — reduces IT infrastructure costs"]},
          {t:"tip",v:"Exam Tips: 4 types of analytics in order: Descriptive → Diagnostic → Predictive → Prescriptive (complexity increases). Big Data = 3 Vs (Volume, Velocity, Variety). ERP integrates ALL business functions into ONE database. RPA automates REPETITIVE tasks. Blockchain = immutable distributed ledger. CIA Triad for cybersecurity: Confidentiality, Integrity, Availability."}
        ],
        quizzes:[]}
    ]}
];
const TOTAL_LESSONS=S.reduce((acc,s)=>acc+s.lessons.length,0);


// ─── STATE ────────────────────────────────────────────────────────────────────
function loadProg(){try{const d=localStorage.getItem('cma-html-v2');return d?JSON.parse(d):{done:[],lessonScores:{},mcqTotal:0,mcqRight:0};}catch{return{done:[],lessonScores:{},mcqTotal:0,mcqRight:0};}}
function saveProg(p){
  STATE.progress=p;
  try{localStorage.setItem('cma-html-v2',JSON.stringify(p));}catch{}
  if(STATE.user){db.collection('progress').doc(STATE.user.uid).set(p).catch(()=>{});}
  render();
}
function loadKey(){return localStorage.getItem('cma-api-key')||'';}
function saveKey(k){localStorage.setItem('cma-api-key',k);}

const STATE={tab:'loading',user:null,authScreen:'login',authError:'',authLoading:false,communityFilter:'all',questionDetail:null,showAskForm:false,communityQuestions:[],questionReplies:[],draftTitle:'',draftBody:'',draftSection:'General',draftReply:'',trackerOpenSects:[],sectId:null,lessonId:null,quizState:null,showProfileWarning:false,progress:{done:[],scores:{},mcqTotal:0,mcqRight:0},
  chatMsgs:[{r:'a',t:"Hi! I'm Mohamed Abdelgawad, your CMA Part 1 instructor. I have 17+ years of finance experience and I'm here to help you pass the CMA exam. Ask me anything! 🎓"}],
  chatLoading:false,apiKey:loadKey(),showKeyInput:false,showReset:false,chatDraft:''};

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function sect(id){return S.find(s=>s.id===id);}
function getPct(){return Math.round(STATE.progress.done.length/TOTAL_LESSONS*100);}
function getAcc(){const{mcqTotal,mcqRight}=STATE.progress;return mcqTotal>0?Math.round(mcqRight/mcqTotal*100):0;}
function lessonDone(lid){return STATE.progress.done.includes(lid);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ─── RENDER LESSON BLOCK ──────────────────────────────────────────────────────
function renderBlock(block,sec){
  const bg=sec.bg,tx=sec.text,st=sec.strong;
  switch(block.t){
    case'h':return`<div class="lh">${esc(block.v)}</div>`;
    case'p':return`<div class="lp">${esc(block.v)}</div>`;
    case'f':return`<div class="formula" style="background:${bg};border:1px solid ${tx}30"><div class="formula-lbl" style="color:${tx}">${esc(block.l)}</div><div class="formula-txt" style="color:${st}">${esc(block.v)}</div></div>`;
    case'tip':return`<div class="tip"><div class="tip-lbl">EXAM TIP</div><div class="tip-txt">${esc(block.v)}</div></div>`;
    case'b':return`<ul class="blist">${block.v.map(i=>`<li><span style="color:${tx};font-weight:500;flex-shrink:0">•</span><span>${esc(i)}</span></li>`).join('')}</ul>`;
    case's':return`<ol class="slist">${block.v.map((i,j)=>`<li><span class="snum" style="background:${bg};color:${st};border:1px solid ${tx}40">${j+1}</span><span>${esc(i)}</span></li>`).join('')}</ol>`;
    case'tbl':return`<div class="tbl-wrap"><table class="tbl"><thead><tr>${block.h.map(h=>`<th style="background:${bg};color:${st}">${esc(h)}</th>`).join('')}</tr></thead><tbody>${block.r.map(row=>`<tr>${row.map(c=>`<td>${esc(c)}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`;
    default:return'';
  }
}


// ─── STUDY SCREEN (merged Home + Lessons + Quiz) ─────────────────────────────
function renderStudy(){
  const{progress}=STATE;
  // ── Lesson reader ──────────────────────────────────────────────────────────
  if(STATE.lessonId!==null){
    let sec=sect(STATE.sectId);
    if(!sec){sec=S.find(s=>s.lessons.some(l=>l.id===STATE.lessonId));}
    if(!sec||!sec.lessons.find(l=>l.id===STATE.lessonId)){STATE.lessonId=null;render();return '';}
    STATE.sectId=sec.id;
    const lesson=sec.lessons.find(l=>l.id===STATE.lessonId);const done=lessonDone(lesson.id);
    return`<div class="bh"><button class="bh-back" onclick="STATE.lessonId=null;render()">‹</button>
      <div style="min-width:0"><div style="font-size:11px;font-weight:500;color:${sec.text}">${sec.emoji} ${esc(sec.title)}</div>
      <div class="ellipsis" style="font-size:15px;font-weight:500;margin-top:1px">${esc(lesson.title)}</div></div></div>
    <div class="scroll-area pad"><div class="card" style="margin-top:14px;padding:4px 16px 16px">${lesson.blocks.map(b=>renderBlock(b,sec)).join('')}</div>
    <button class="btn" onclick="markDone('${lesson.id}')" style="margin-top:14px;background:${done?'#EAF3DE':sec.bar};color:${done?'#27500A':'#fff'}">${done?'✓ Completed — Back':'Mark as Complete ✓'}</button>
    <div style="height:20px"></div></div>`;
  }
  const doneCount=progress.done.length;
  const pct=getPct();
  const sectCards=S.map(sec=>{
    const lessonsDone=sec.lessons.filter(l=>lessonDone(l.id)).length;
    const sp=Math.round(lessonsDone/sec.lessons.length*100);
    const secQuizDone=sec.lessons.filter(l=>progress.lessonScores?.[l.id]).length;
    const isOpen=STATE.sectId===sec.id;

function loadFeedbackFull(){try{const d=localStorage.getItem('cma-feedback-full-v1');return d?JSON.parse(d):{r1:0,r2:0,r3:0,r4:0,recommend:'',source:'',hardSection:'',contentWish:[],comments:'',improvements:''};}catch{return{r1:0,r2:0,r3:0,r4:0,recommend:'',source:'',hardSection:'',contentWish:[],comments:'',improvements:''};}}
function saveFeedbackFull(d){try{localStorage.setItem('cma-feedback-full-v1',JSON.stringify(d));}catch{}
  if(STATE.user){db.collection('feedback').doc(STATE.user.uid).set(d).catch(()=>{});}}

function setStarRating(field,n){
  const fb=loadFeedbackFull();fb[field]=n;saveFeedbackFull(fb);
  [1,2,3,4,5].forEach(i=>{const el=document.getElementById(`star-${field}-${i}`);if(el){el.textContent=i<=n?'⭐':'☆';el.style.opacity=i<=n?'1':'0.3';}});
}
function toggleWish(val){
  const fb=loadFeedbackFull();
  if(!fb.contentWish)fb.contentWish=[];
  const idx=fb.contentWish.indexOf(val);
  if(idx>-1)fb.contentWish.splice(idx,1);else fb.contentWish.push(val);
  saveFeedbackFull(fb);
  const el=document.getElementById(`wish-${val.replace(/\s/g,'-')}`);
  if(el){el.style.background=fb.contentWish.includes(val)?'#185FA5':'#f5f5f0';el.style.color=fb.contentWish.includes(val)?'#fff':'#555';el.style.border=fb.contentWish.includes(val)?'1px solid #185FA5':'.5px solid #d0d0d0';}
}
function submitFeedback(){
  const fb=loadFeedbackFull();

  fb.recommend=rec;fb.source=get('fb-source');fb.hardSection=get('fb-hard');
  fb.comments=get('fb-comments');fb.improvements=get('fb-improvements');
  const missing=[];
  if(!fb.r1||!fb.r2||!fb.r3||!fb.r4)missing.push('All star ratings');
  if(!fb.recommend)missing.push('Recommendation');
  if(!fb.source)missing.push('How you found the course');
  if(!fb.hardSection)missing.push('Hardest section');
  if(!fb.contentWish||fb.contentWish.length===0)missing.push('Content wishlist (select at least one)');
  if(!fb.comments)missing.push('Comments');
  if(!fb.improvements)missing.push('Areas of improvement');

  saveFeedbackFull(fb);
  const st=loadStudent();

function isInstructor(){return STATE.user&&STATE.user.email===INSTRUCTOR_EMAIL;}

function timeAgo(ts){
  if(!ts)return'';
  const diff=Date.now()-new Date(ts).getTime();
  const mins=Math.floor(diff/60000);
  if(mins<1)return'Just now';
  if(mins<60)return`${mins}m ago`;
  const hrs=Math.floor(mins/60);
  if(hrs<24)return`${hrs}h ago`;
  const days=Math.floor(hrs/24);
  if(days<7)return`${days}d ago`;
  return new Date(ts).toLocaleDateString();
}

async function loadQuestions(){
  try{
    let snap;
    if(STATE.communityFilter!=='all'){
      snap=await db.collection('questions').where('section','==',STATE.communityFilter).get();
    } else {
      snap=await db.collection('questions').get();
    }
    STATE.communityQuestions=snap.docs
      .map(d=>({id:d.id,...d.data()}))
      .sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
    render();
  }catch(e){console.log('Load questions error:',e);render();}
}

async function loadReplies(qId){
  try{
    const snap=await db.collection('questions').doc(qId).collection('replies').orderBy('createdAt','asc').get();
    STATE.questionReplies=snap.docs.map(d=>({id:d.id,...d.data()}));
    render();
  }catch(e){console.log('Load replies error:',e);}
}

async function postQuestion(){
  const title=STATE.draftTitle.trim();
  const body=STATE.draftBody.trim();
  const section=STATE.draftSection||'General';
  if(!title||!body){alert('Please enter both a title and description for your question.');return;}
  const st=loadStudent();
  const btn=document.getElementById('post-q-btn');
  if(btn){btn.disabled=true;btn.textContent='Posting...';}
  try{
    const photoUrl=st?.photo&&st.photo.startsWith('http')?st.photo:'';
    await db.collection('questions').add({
      title,body,section,
      authorId:STATE.user.uid,
      authorName:st?.name||STATE.user.displayName||'Student',
      authorPhoto:photoUrl,
      createdAt:new Date().toISOString(),
      replyCount:0,upvotes:[],
    });
    STATE.showAskForm=false;
    STATE.draftTitle='';STATE.draftBody='';STATE.draftSection='General';
    await loadQuestions();
  }catch(e){alert('Error posting question: '+e.message);if(btn){btn.disabled=false;btn.textContent='Post Question';}}
}

async function postReply(qId){
  const body=STATE.draftReply.trim();
  if(!body){alert('Please write your reply first.');return;}
  const st=loadStudent();
  const btn=document.getElementById('post-reply-btn');
  if(btn){btn.disabled=true;btn.textContent='Posting...';}
  try{
    const rPhotoUrl=st?.photo&&st.photo.startsWith('http')?st.photo:'';
    await db.collection('questions').doc(qId).collection('replies').add({
      body,
      authorId:STATE.user.uid,
      authorName:st?.name||STATE.user.displayName||'Student',
      authorPhoto:rPhotoUrl,
      createdAt:new Date().toISOString(),
      isBestAnswer:false,
      upvotes:[],
    });
    await db.collection('questions').doc(qId).update({replyCount:firebase.firestore.FieldValue.increment(1)});
    STATE.draftReply='';
    await loadReplies(qId);
    // Update reply count in question list
    const qIdx=STATE.communityQuestions.findIndex(q=>q.id===qId);
    if(qIdx>-1)STATE.communityQuestions[qIdx].replyCount=(STATE.communityQuestions[qIdx].replyCount||0)+1;
  }catch(e){alert('Error posting reply.');if(btn){btn.disabled=false;btn.textContent='Post Reply';}}
}

async function upvoteQuestion(qId,e){
  e.stopPropagation();
  const uid=STATE.user.uid;
  const q=STATE.communityQuestions.find(q=>q.id===qId);
  if(!q)return;
  const upvotes=q.upvotes||[];
  const newUpvotes=upvotes.includes(uid)?upvotes.filter(u=>u!==uid):[...upvotes,uid];
  try{
    await db.collection('questions').doc(qId).update({upvotes:newUpvotes});
    q.upvotes=newUpvotes;render();
  }catch(e){console.log('Upvote error:',e);}
}

async function upvoteReply(qId,rId){
  const uid=STATE.user.uid;
  const r=STATE.questionReplies.find(r=>r.id===rId);
  if(!r)return;
  const upvotes=r.upvotes||[];
  const newUpvotes=upvotes.includes(uid)?upvotes.filter(u=>u!==uid):[...upvotes,uid];
  try{
    await db.collection('questions').doc(qId).collection('replies').doc(rId).update({upvotes:newUpvotes});
    r.upvotes=newUpvotes;render();
  }catch(e){console.log('Upvote reply error:',e);}
}

async function setBestAnswer(qId,rId){
  try{
    const batch=db.batch();
    STATE.questionReplies.forEach(r=>{
      batch.update(db.collection('questions').doc(qId).collection('replies').doc(r.id),{isBestAnswer:r.id===rId});
    });
    await batch.commit();
    STATE.questionReplies.forEach(r=>r.isBestAnswer=r.id===rId);
    render();
  }catch(e){alert('Error setting best answer.');}
}

async function deleteQuestion(qId,e){
  e.stopPropagation();
  if(!confirm('Delete this question and all its replies?'))return;
  try{
    const replies=await db.collection('questions').doc(qId).collection('replies').get();
    const batch=db.batch();
    replies.docs.forEach(d=>batch.delete(d.ref));
    batch.delete(db.collection('questions').doc(qId));
    await batch.commit();
    STATE.communityQuestions=STATE.communityQuestions.filter(q=>q.id!==qId);
    render();
  }catch(e){alert('Error deleting question.');}
}

async function deleteReply(qId,rId){
  if(!confirm('Delete this reply?'))return;
  try{
    await db.collection('questions').doc(qId).collection('replies').doc(rId).delete();
    await db.collection('questions').doc(qId).update({replyCount:firebase.firestore.FieldValue.increment(-1)});
    STATE.questionReplies=STATE.questionReplies.filter(r=>r.id!==rId);
    const qIdx=STATE.communityQuestions.findIndex(q=>q.id===qId);
    if(qIdx>-1)STATE.communityQuestions[qIdx].replyCount=Math.max(0,(STATE.communityQuestions[qIdx].replyCount||1)-1);
    render();
  }catch(e){alert('Error deleting reply.');}
}

function loadTracker(){try{const d=localStorage.getItem('cma-tracker-v1');return d?JSON.parse(d):{};} catch{return{};}}
function saveTracker(d){
  try{localStorage.setItem('cma-tracker-v1',JSON.stringify(d));}catch{}
  if(STATE.user){db.collection('tracker').doc(STATE.user.uid).set(d).catch(()=>{});}
}

function setTrackerValue(lessonId,val){
  const t=loadTracker();
  if(t[lessonId]===val){delete t[lessonId];}else{t[lessonId]=val;}
  saveTracker(t);
  render();
}

function renderTracker(){
  const tracker=loadTracker();
  const allLessons=S.flatMap(s=>s.lessons);
  const goodCount=allLessons.filter(l=>tracker[l.id]==='good').length;
  const badCount=allLessons.filter(l=>tracker[l.id]==='bad').length;
  const notRated=allLessons.length-goodCount-badCount;

  const sectCards=S.map(sec=>{
    const isOpen=STATE.trackerOpenSects?.includes(sec.id);
    const secGood=sec.lessons.filter(l=>tracker[l.id]==='good').length;
    const secBad=sec.lessons.filter(l=>tracker[l.id]==='bad').length;
    const lessonRows=isOpen?sec.lessons.map(l=>{
      const val=tracker[l.id]||'';
      return`<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;border-bottom:.5px solid ${sec.text}15">
        <span style="flex:1;font-size:13px;color:#333">${esc(l.title)}</span>
        <div style="display:flex;gap:6px;flex-shrink:0">
          <button onclick="setTrackerValue('${l.id}','good')" style="padding:5px 12px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;border:1px solid ${val==='good'?'#639922':'#d0d0d0'};background:${val==='good'?'#EAF3DE':'transparent'};color:${val==='good'?'#27500A':'#888'}">👍 Good</button>
          <button onclick="setTrackerValue('${l.id}','bad')" style="padding:5px 12px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;border:1px solid ${val==='bad'?'#E24B4A':'#d0d0d0'};background:${val==='bad'?'#FCEBEB':'transparent'};color:${val==='bad'?'#791F1F':'#888'}">👎 Bad</button>
        </div>
      </div>`;
    }).join(''):'';

    return`<div class="card" style="padding:0;overflow:hidden;margin-bottom:10px">
      <div onclick="STATE.trackerOpenSects=STATE.trackerOpenSects||[];const idx=STATE.trackerOpenSects.indexOf(${sec.id});if(idx>-1)STATE.trackerOpenSects.splice(idx,1);else STATE.trackerOpenSects.push(${sec.id});render()" 
        style="display:flex;align-items:center;gap:10px;padding:13px 14px;cursor:pointer;background:${sec.bg}">
        <span style="font-size:18px">${sec.emoji}</span>
        <div style="flex:1;min-width:0">
          <div class="ellipsis" style="font-size:13px;font-weight:500;color:${sec.strong}">${esc(sec.title)}</div>
          <div style="font-size:11px;color:${sec.text};margin-top:2px">
            ${secGood>0?`👍 ${secGood} good `:''}${secBad>0?`👎 ${secBad} bad`:''}${secGood===0&&secBad===0?'Not rated yet':''}
          </div>
        </div>
        <span style="font-size:18px;color:${sec.text};transition:transform .2s;transform:rotate(${isOpen?'90':'0'}deg)">›</span>
      </div>
      ${isOpen?`<div style="background:#fff">${lessonRows}</div>`:''}
    </div>`;
  }).join('');

  return`<div class="sh">
    <h2>Topic Tracker</h2>
    <p style="font-size:12px;color:#888;margin-top:2px">Rate each topic to track your strengths and weaknesses</p>
  </div>
  <div style="display:flex;gap:10px;padding:12px 16px;border-bottom:.5px solid #e0e0d8;flex-shrink:0">
    <div style="flex:1;background:#EAF3DE;border-radius:10px;padding:10px;text-align:center">
      <div style="font-size:20px;font-weight:500;color:#27500A">${goodCount}</div>
      <div style="font-size:11px;color:#3B6D11">👍 Good</div>
    </div>
    <div style="flex:1;background:#FCEBEB;border-radius:10px;padding:10px;text-align:center">
      <div style="font-size:20px;font-weight:500;color:#791F1F">${badCount}</div>
      <div style="font-size:11px;color:#A32D2D">👎 Need Work</div>
    </div>
    <div style="flex:1;background:#f5f5f0;border-radius:10px;padding:10px;text-align:center">
      <div style="font-size:20px;font-weight:500;color:#555">${notRated}</div>
      <div style="font-size:11px;color:#888">⬜ Not Rated</div>
    </div>
  </div>
  <div class="scroll-area pad" style="padding-top:14px">
    <div style="font-size:12px;color:#888;margin-bottom:12px">Tap a section to expand · Select Good or Bad for each topic</div>
    ${sectCards}
    <div style="height:20px"></div>
  </div>`;
}


async function doAuth(){
  const isReg=STATE.authScreen==='register';
  const email=(document.getElementById('auth-email')?.value||'').trim();
  const pass=document.getElementById('auth-pass')?.value||'';
  const pass2=document.getElementById('auth-pass2')?.value||'';
  const name=(document.getElementById('auth-name')?.value||'').trim();
  STATE.authError='';
  if(!email||!pass){STATE.authError='Please enter email and password.';render();return;}
  if(isReg&&pass!==pass2){STATE.authError='Passwords do not match.';render();return;}
  if(isReg&&!name){STATE.authError='Please enter your full name.';render();return;}
  STATE.authLoading=true;render();
  try{
    if(isReg){
      const cred=await auth.createUserWithEmailAndPassword(email,pass);
      await cred.user.updateProfile({displayName:name});
    }else{
      await auth.signInWithEmailAndPassword(email,pass);
    }
  }catch(e){
    STATE.authLoading=false;
    STATE.authError=e.message.replace('Firebase: ','').replace(/ \(auth\/.*?\)/,'');
    render();
  }
}

function renderDashboard(){
  const{progress}=STATE;
  const pct=getPct(),acc=getAcc();
  const quizDone=Object.keys(progress.lessonScores||{}).length;
  const doneCount=progress.done.length;
  const sectCards=S.map(sec=>{
    const done=sec.lessons.filter(l=>lessonDone(l.id)).length;
    const sp=Math.round(done/sec.lessons.length*100);
    const sc=null;
    return`<div class="card">
      <div class="row" style="margin-bottom:10px">
        <div class="sect-icon" style="background:${sec.bg}">${sec.emoji}</div>
        <div style="flex:1;min-width:0">
          <div class="ellipsis" style="font-size:13px;font-weight:500">${esc(sec.title)}</div>
          <div style="font-size:11px;color:#888;margin-top:2px">${sec.weight}% of exam · ${sec.lessons.length} lessons${sc?` · Quiz: ${sc.correct}/${sc.total}`:''}</div>
        </div>
        <span class="badge" style="background:${sec.bg};color:${sec.strong}">${sp}%</span>
      </div>
      <div class="pb" style="margin-bottom:12px"><div class="pb-fill" style="width:${sp}%;background:${sec.bar}"></div></div>
      <div style="display:flex;gap:8px">
        <button class="btn-sm btn-outline" onclick="goLesson(${sec.id})" style="border:0.5px solid #ccc">Study</button>
        <button class="btn-sm" onclick="startQuiz(${sec.id})" style="background:${sec.bg};color:${sec.strong};border:1px solid ${sec.text}50">${sc?`Quiz (${sc.correct}/${sc.total})`:'Take Quiz'}</button>
      </div>
    </div>`;
  }).join('');
  return`<div style="padding:0 16px;overflow-y:auto;flex:1">
    <div style="padding:18px 0 14px">
      <h1 style="font-size:20px;font-weight:500">CMA Part 1</h1>
      <p style="font-size:13px;color:#888;margin-top:3px">Financial Planning, Performance & Analytics</p>
    </div>
    <div class="stat-grid">
      <div class="stat"><div class="stat-l">Progress</div><div class="stat-v">${pct}%</div><div class="stat-s">${doneCount}/${TOTAL_LESSONS} lessons</div></div>
      <div class="stat"><div class="stat-l">Accuracy</div><div class="stat-v">${acc}%</div><div class="stat-s">${progress.mcqRight}/${progress.mcqTotal} MCQs</div></div>
      <div class="stat"><div class="stat-l">Quizzes</div><div class="stat-v">${quizDone}/6</div><div class="stat-s">sections done</div></div>
    </div>
    <div style="background:#f5f5f0;border-radius:10px;padding:14px 16px;margin-bottom:14px">
      <div class="row-sb" style="margin-bottom:8px;font-size:13px">
        <span style="color:#555;font-weight:500">Overall Progress</span><span style="font-weight:500">${pct}%</span>
      </div>
      <div class="pb"><div class="pb-fill" style="width:${pct}%;background:#185FA5"></div></div>
      <div style="font-size:11px;color:#888;margin-top:6px">Target: 180 hours · Schedule exam by Month 4–5</div>
    </div>
    <div style="font-size:13px;font-weight:500;color:#555;margin-bottom:10px">Exam Sections</div>

}

// ─── LESSONS ──────────────────────────────────────────────────────────────────
function renderLessons(){
  const{sectId,lessonId,progress}=STATE;
  if(lessonId!==null){
    const sec=sect(sectId);const lesson=sec.lessons.find(l=>l.id===lessonId);const done=lessonDone(lesson.id);
    return`<div class="bh"><button class="bh-back" onclick="STATE.lessonId=null;render()">‹</button><div style="min-width:0"><div style="font-size:11px;font-weight:500;color:${sec.text}">${sec.emoji} ${esc(sec.title)}</div><div class="ellipsis" style="font-size:15px;font-weight:500;margin-top:1px">${esc(lesson.title)}</div></div></div>
    <div class="scroll-area pad"><div class="card" style="margin-top:14px;padding:4px 16px 16px">${lesson.blocks.map(b=>renderBlock(b,sec)).join('')}</div>
    <button class="btn" onclick="markDone('${lesson.id}')" style="margin-top:14px;background:${done?'#EAF3DE':sec.bar};color:${done?'#27500A':'#fff'}">${done?'✓ Completed — Back to lessons':'Mark as Complete ✓'}</button><div style="height:20px"></div></div>`;
  }
  if(sectId!==null){
    const sec=sect(sectId);
    const items=sec.lessons.map((l,i)=>{const done=lessonDone(l.id);return`<div class="card" onclick="STATE.lessonId='${l.id}';render()" style="cursor:pointer;border-color:${done?sec.text+'45':'#e0e0d8'}"><div class="row"><div style="width:32px;height:32px;border-radius:50%;background:${done?sec.bg:'#f0f0eb'};display:flex;align-items:center;justify-content:center;font-size:14px;color:${done?sec.strong:'#999'};border:1px solid ${done?sec.text+'40':'#e0e0d8'};flex-shrink:0;font-weight:500">${done?'✓':i+1}</div><div style="flex:1;min-width:0"><div class="ellipsis" style="font-size:14px;font-weight:500">${esc(l.title)}</div><div style="font-size:12px;color:#888;margin-top:2px">${l.dur} · ${done?'Completed':'Not started'}</div></div><span style="color:#bbb;font-size:18px">›</span></div></div>`;}).join('');
    return`<div class="bh"><button class="bh-back" onclick="STATE.sectId=null;render()">‹</button><div><div style="font-size:16px;font-weight:500">${sec.emoji} ${esc(sec.title)}</div><div style="font-size:12px;color:#888;margin-top:1px">${sec.lessons.length} lessons · ${sec.weight}% of exam</div></div></div>
    <div class="scroll-area pad" style="padding-top:14px">${items}<div style="height:20px"></div></div>`;
  }
  const doneCount=STATE.progress.done.length;
  const items=S.map(sec=>{const done=sec.lessons.filter(l=>lessonDone(l.id)).length;return`<div class="card" onclick="STATE.sectId=${sec.id};render()" style="cursor:pointer"><div class="row"><div class="sect-icon" style="background:${sec.bg}">${sec.emoji}</div><div style="flex:1;min-width:0"><div class="ellipsis" style="font-size:14px;font-weight:500">${esc(sec.title)}</div><div style="font-size:12px;color:#888;margin-top:2px">${done}/${sec.lessons.length} done · ${sec.weight}% of exam</div></div><span style="color:#bbb;font-size:18px">›</span></div></div>`;}).join('');
  return`<div class="sh"><h2>All Lessons</h2><p>${doneCount} of ${TOTAL_LESSONS} completed</p></div><div class="scroll-area pad" style="padding-top:14px">${items}<div style="height:20px"></div></div>`;
}

// ─── QUIZ SESSION ─────────────────────────────────────────────────────────────
function renderQuizSession(){
  const qs=STATE.quizState;if(!qs)return'';
  const sec=sect(qs.sId);const lessonTitle=S.flatMap(s=>s.lessons).find(l=>l.id===qs.lessonId)?.title||'';const q=qs.questions[qs.idx];const sel=qs.selected;
  const barW=Math.round(qs.idx/qs.questions.length*100);
  const opts=q.o.map((opt,i)=>{
    let bg='#f5f5f0',border='.5px solid #e0e0d8',textC='#1a1a1a',circBg='#e5e5e0',circC='#666',circBorder='.5px solid #bbb',circTxt=String.fromCharCode(65+i);
    if(sel!==null){if(i===q.a){bg='#EAF3DE';border='1px solid #639922';textC='#27500A';circBg='#c0dd97';circC='#27500A';circBorder='1px solid #639922';circTxt='✓';}else if(i===sel&&sel!==q.a){bg='#FCEBEB';border='1px solid #E24B4A';textC='#791F1F';circBg='#f7c1c1';circC='#791F1F';circBorder='1px solid #E24B4A';circTxt='✗';}else{textC='#888';}}
    const cursor=sel===null?'cursor:pointer':'cursor:default';
    return`<div class="q-opt" onclick="selectAnswer(${i})" style="background:${bg};border:${border};${cursor}"><div class="q-circle" style="background:${circBg};color:${circC};border:${circBorder}">${circTxt}</div><div class="q-text" style="color:${textC}">${esc(opt)}</div></div>`;
  }).join('');
  const explanation=sel!==null?`<div style="margin-top:14px;padding:13px 14px;border-radius:10px;background:${sel===q.a?'#EAF3DE':'#FCEBEB'};border:1px solid ${sel===q.a?'#639922':'#E24B4A'}"><div style="font-size:12px;font-weight:500;color:${sel===q.a?'#27500A':'#791F1F'};margin-bottom:5px">${sel===q.a?'Correct! Well done.':'Not quite — here is why:'}</div><div style="font-size:13px;color:${sel===q.a?'#3B6D11':'#A32D2D'};line-height:1.55">${esc(q.e)}</div></div>`:'';
  const nextBtn=sel!==null?`<button class="btn btn-primary" onclick="nextQuestion()" style="background:${sec.bar}">${qs.idx+1>=qs.questions.length?'See My Results':'Next Question →'}</button>`:`<button class="btn" style="background:#f0f0eb;color:#bbb;cursor:not-allowed">Select an answer to continue</button>`;
  return`<div class="bh"><button class="bh-back" onclick="STATE.tab='quiz';STATE.quizState=null;render()">‹</button><div style="flex:1"><div style="font-size:11px;font-weight:500;color:${sec.text}">${esc(lessonTitle)}</div><div style="font-size:14px;font-weight:500">Question ${qs.idx+1} of ${qs.questions.length}</div></div><span style="font-size:13px;color:#888">${barW}%</span></div>
  <div style="height:3px;background:#ebebea;flex-shrink:0"><div style="height:100%;width:${barW}%;background:${sec.bar};transition:width .4s"></div></div>
  <div class="scroll-area pad" style="padding-top:16px"><div class="card"><p style="font-size:15px;font-weight:500;line-height:1.55;margin-bottom:18px">${esc(q.q)}</p>${opts}${explanation}</div><div style="margin-top:12px">${nextBtn}</div><div style="height:20px"></div></div>`;
}

// ─── QUIZ RESULTS ─────────────────────────────────────────────────────────────
function renderQuizResults(){
  const qs=STATE.quizState;if(!qs)return'';
  const sec=sect(qs.sId);const correct=qs.answers.filter(a=>a.correct).length;const pctQ=Math.round(correct/qs.questions.length*100);const lessonTitle=S.flatMap(s=>s.lessons).find(l=>l.id===qs.lessonId)?.title||'';
  const gradeEmoji=pctQ>=80?'🏆':pctQ>=60?'👍':'📚';const gradeLabel=pctQ>=80?'Excellent!':pctQ>=60?'Good work!':'Keep studying!';
  const breakdown=qs.questions.map((q,i)=>`<div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;padding-bottom:${i<qs.questions.length-1?'10px':'0'};border-bottom:${i<qs.questions.length-1?'.5px solid #e0e0d8':'none'}"><span style="font-size:15px;flex-shrink:0">${qs.answers[i]?.correct?'✅':'❌'}</span><div><div style="font-size:13px;color:#333;line-height:1.4">Q${i+1}: ${esc(q.q)}</div>${!qs.answers[i]?.correct?`<div style="font-size:12px;color:#3B6D11;margin-top:3px">Correct: ${esc(q.o[q.a])}</div>`:''}</div></div>`).join('');
  return`<div class="scroll-area" style="padding:30px 16px 20px;text-align:center"><div style="font-size:52px">${gradeEmoji}</div><div style="font-size:20px;font-weight:500;margin-top:10px">${gradeLabel}</div><div style="font-size:46px;font-weight:500;color:${sec.text};margin:6px 0 2px">${pctQ}%</div><div style="font-size:14px;color:#888;margin-bottom:24px">${correct} out of ${qs.questions.length} correct</div>
  <div class="card" style="text-align:left;margin-bottom:14px"><div style="font-size:13px;font-weight:500;color:#555;margin-bottom:12px">Question Review</div>${breakdown}</div>
  <div style="display:flex;gap:10px;margin-bottom:12px"><button class="btn btn-outline" onclick="STATE.tab='quiz';STATE.quizState=null;render()">Back to Quizzes</button><button class="btn" onclick="startQuiz('${qs.lessonId}')" style="background:${sec.bar};color:#fff">Retake Quiz</button></div>
  <button onclick="askAboutResults('${qs.lessonId}',${pctQ})" style="width:100%;padding:12px;border-radius:10px;border:1px solid ${sec.text}50;background:${sec.bg};color:${sec.strong};font-size:13px;cursor:pointer;font-family:inherit;font-weight:500">Ask Mohamed to review weak areas ↗</button><div style="height:20px"></div></div>`;
}

// ─── PROGRESS ─────────────────────────────────────────────────────────────────

  const{progress}=STATE;const pct=getPct();

  return`<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:${i<S.length-1?'.5px solid #f0f0eb':'none'}">
    <div style="width:30px;height:30px;border-radius:8px;background:${sec.bg};display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0">${sec.emoji}</div>

      </div>

  const resetHTML=STATE.showReset?`<div style="background:#FCEBEB;border:1px solid #E24B4A;border-radius:10px;padding:14px 16px;margin-top:16px"><div style="font-size:13px;color:#791F1F;margin-bottom:12px;font-weight:500">This will delete all your progress. Are you sure?</div><div style="display:flex;gap:8px"><button class="btn btn-outline" onclick="STATE.showReset=false;render()" style="border-color:#A32D2D;color:#A32D2D">Cancel</button><button class="btn btn-danger" onclick="resetAll()">Yes, Reset</button></div></div>`:`<button class="btn btn-outline" onclick="STATE.showReset=true;render()" style="margin-top:16px;color:#aaa">Reset All Progress</button>`;
  return`<div style="overflow-y:auto;flex:1;padding:0 16px">

        </div>
        <div style="height:6px;background:rgba(255,255,255,.25);border-radius:3px;overflow:hidden">
          <div style="height:100%;width:${pct}%;background:#fff;border-radius:3px;transition:width .6s"></div>
        </div>
      </div>

// ─── ACTIONS ──────────────────────────────────────────────────────────────────
function goLesson(sId){STATE.sectId=sId;STATE.lessonId=null;STATE.tab='lessons';render();}
function markDone(lid){if(!STATE.progress.done.includes(lid)){saveProg({...STATE.progress,done:[...STATE.progress.done,lid]});}STATE.lessonId=null;render();}
function doLessonQuiz(lid){startQuiz(lid);}
function startQuiz(lessonId){
  let foundLesson=null,foundSect=null;
  for(const sec of S){for(const l of sec.lessons){if(l.id===lessonId){foundLesson=l;foundSect=sec;break;}}}
  if(!foundLesson){console.log('Lesson not found:',lessonId);return;}
  STATE.quizState={lessonId,sId:foundSect.id,questions:foundLesson.quizzes,idx:0,selected:null,answers:[]};
  STATE.tab='quiz-session';render();
}
function selectAnswer(i){if(STATE.quizState.selected!==null)return;STATE.quizState={...STATE.quizState,selected:i};render();}
function nextQuestion(){
  const qs=STATE.quizState;const correct=qs.selected===qs.questions[qs.idx].a;const newAnswers=[...qs.answers,{selected:qs.selected,correct}];
  if(qs.idx+1>=qs.questions.length){const rightCount=newAnswers.filter(a=>a.correct).length;const p=STATE.progress;const ls=p.lessonScores||{};saveProg({...p,lessonScores:{...ls,[qs.lessonId]:{correct:rightCount,total:qs.questions.length}},mcqTotal:p.mcqTotal+qs.questions.length,mcqRight:p.mcqRight+rightCount});STATE.quizState={...qs,answers:newAnswers,done:true};STATE.tab='quiz-results';render();}
  else{STATE.quizState={...qs,idx:qs.idx+1,selected:null,answers:newAnswers};render();}
}
function resetAll(){saveProg({done:[],lessonScores:{},mcqTotal:0,mcqRight:0});STATE.showReset=false;render();}
function askAboutResults(lessonId,pct){const lesson=S.flatMap(s=>s.lessons).find(l=>l.id===lessonId);STATE.chatDraft=`I just scored ${pct}% on the ${lesson?.title||'quiz'}. Can you help me review the weak areas?`;STATE.tab='chat';render();setTimeout(()=>{const el=document.getElementById('chat-input');if(el)el.value=STATE.chatDraft;},50);}
function saveApiKey(){const k=document.getElementById('api-key-input')?.value?.trim()||'';STATE.apiKey=k;STATE.showKeyInput=false;saveKey(k);render();}

// ─── RENDER ───────────────────────────────────────────────────────────────────
const TABS=[{id:'intro',label:'Guide',icon:'👤'},{id:'register',label:'Profile',icon:'🎓'},{id:'study',label:'Study',icon:'📚'},{id:'tracker',label:'Tracker',icon:'📌'},{id:'community',label:'Community',icon:'🌐'},{id:'feedback',label:'Feedback',icon:'⭐'}];
function activeNavTab(){if(STATE.tab==='quiz-session'||STATE.tab==='quiz-results'||STATE.tab==='dashboard'||STATE.tab==='lessons'||STATE.tab==='quiz')return'study';if(STATE.tab==='question-detail')return'community';return STATE.tab;}
function render(){
  const content=document.getElementById('content-area');const nav=document.getElementById('bottom-nav');if(!content||!nav)return;
  let html='';
  switch(STATE.tab){
    case'loading':html=renderLoading();break;case'login':html=renderLogin();break;case'intro':html=renderIntro();break;case'register':html=renderRegister();break;case'progress':html=renderProgress();break;case'study':html=renderStudy();break;case'quiz-session':html=renderQuizSession();break;case'quiz-results':html=renderQuizResults();break;case'tracker':html=renderTracker();break;case'feedback':html=renderFeedback();break;case'community':html=renderCommunity();break;case'question-detail':html=renderQuestionDetail();break;default:html=renderIntro();
  }
  content.innerHTML=html;
  content.style.display='flex';content.style.flexDirection='column';content.style.overflow=STATE.tab==='chat'?'hidden':'auto';
  if(STATE.tab==='loading'||STATE.tab==='login'){nav.style.display='none';}
  else{nav.style.display='flex';
    const active=activeNavTab();
    nav.innerHTML=TABS.map(t=>`<button class="nav-btn${t.id===active?' active':''}" onclick="navTo('${t.id}')"><span class="nav-icon">${t.icon}</span><span>${t.label}</span></button>`).join('');}
  if(STATE.tab==='chat'){setTimeout(()=>{const el=document.getElementById('chat-msgs');if(el)el.scrollTop=el.scrollHeight;},20);}
}

  try{localStorage.setItem('cma-student-v1',JSON.stringify(d));}catch{}

}

          <input id="f-gradyear" type="number" value="${fval('gradyear')}" placeholder="e.g. 2020" min="1990" max="2030" style="width:100%;padding:10px 12px;border-radius:8px;border:.5px solid #d0d0d0;font-size:14px;font-family:inherit;outline:none;color:#1a1a1a;background:#fafaf8">
        </div>
      </div>
      <div style="margin-bottom:12px">
        <label style="font-size:12px;color:#888;display:block;margin-bottom:5px">Current Job Title</label>
        <select id="f-title" style="width:100%;padding:10px 12px;border-radius:8px;border:.5px solid #d0d0d0;font-size:14px;font-family:inherit;outline:none;color:#1a1a1a;background:#fafaf8">
          <option value="">Select your title...</option>
          ${TITLES.map(t=>`<option value="${t}" ${fsel('title',t)}>${t}</option>`).join('')}
        </select>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div>
          <label style="font-size:12px;color:#888;display:block;margin-bottom:5px">Company / Organization</label>
          <input id="f-company" type="text" value="${fval('company')}" placeholder="Company name" style="width:100%;padding:10px 12px;border-radius:8px;border:.5px solid #d0d0d0;font-size:14px;font-family:inherit;outline:none;color:#1a1a1a;background:#fafaf8">
        </div>
        <div>
          <label style="font-size:12px;color:#888;display:block;margin-bottom:5px">Years of Experience</label>
          <input id="f-experience" type="number" value="${fval('experience')}" placeholder="e.g. 5" min="0" max="40" style="width:100%;padding:10px 12px;border-radius:8px;border:.5px solid #d0d0d0;font-size:14px;font-family:inherit;outline:none;color:#1a1a1a;background:#fafaf8">
        </div>
      </div>
    </div>

    <div class="info-title" style="font-size:14px;margin-bottom:10px">📊 CMA Study Profile <span style="font-size:11px;color:#aaa;font-weight:400">· optional</span></div>
    <div class="card" style="margin-bottom:14px">
      <div style="margin-bottom:12px">
        <label style="font-size:12px;color:#888;display:block;margin-bottom:5px">Your current accounting/finance level</label>
        <select id="f-level" style="width:100%;padding:10px 12px;border-radius:8px;border:.5px solid #d0d0d0;font-size:14px;font-family:inherit;outline:none;color:#1a1a1a;background:#fafaf8">
          <option value="">Select level...</option>
          ${LEVELS.map(l=>`<option value="${l}" ${fsel('level',l)}>${l}</option>`).join('')}
        </select>
      </div>
      <div style="margin-bottom:12px">
        <label style="font-size:12px;color:#888;display:block;margin-bottom:5px">Your CMA goal</label>
        <select id="f-goal" style="width:100%;padding:10px 12px;border-radius:8px;border:.5px solid #d0d0d0;font-size:14px;font-family:inherit;outline:none;color:#1a1a1a;background:#fafaf8">
          <option value="">Select goal...</option>
          ${GOALS.map(g=>`<option value="${g}" ${fsel('goal',g)}>${g}</option>`).join('')}
        </select>
      </div>
      <div>
        <label style="font-size:12px;color:#888;display:block;margin-bottom:5px">Target exam date (approximate)</label>
        <input id="f-examdate" type="month" value="${fval('examdate')}" style="width:100%;padding:10px 12px;border-radius:8px;border:.5px solid #d0d0d0;font-size:14px;font-family:inherit;outline:none;color:#1a1a1a;background:#fafaf8">
      </div>
    </div>

    <div style="background:#f5f5f0;border-radius:10px;padding:12px 14px;margin-bottom:12px;font-size:12px;color:#888;text-align:center;line-height:1.5">
      Fields marked * are required. The rest are optional but help personalize your learning experience.
    </div>
    <button onclick="submitProfile()" class="btn submit-profile-btn" style="background:#0C447C;color:#fff;font-size:15px;margin-bottom:8px">
      ${isComplete?'Update My Profile ✓':'Complete Profile & Unlock the App →'}
    </button>
    <div style="height:20px"></div>
  </div>`;
}

let _currentRating = loadFeedback().rating || 0;
function setRating(n){
  _currentRating = n;
  [1,2,3,4,5].forEach(i=>{
    const el=document.getElementById('star-'+i);
    if(el){el.textContent=i<=n?'⭐':'☆';el.style.opacity=i<=n?'1':'0.3';}
  });
}

function handlePhoto(input){
  const file=input.files[0];
  if(!file)return;
  if(file.size>2*1024*1024){alert('Photo is too large. Please choose an image under 2MB.');input.value='';return;}
  const reader=new FileReader();
  reader.onload=function(e){
    const b64=e.target.result;
    const preview=document.getElementById('photo-preview');
    if(preview){preview.innerHTML=`<img src="${b64}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;}
    window._pendingPhoto=b64;
  };
  reader.readAsDataURL(file);
}

async function uploadToCloudinary(base64data){
  try{
    const res=await fetch(base64data);const blob=await res.blob();
    const fd=new FormData();fd.append('file',blob);fd.append('upload_preset',CLD_PRESET);
    const r=await fetch(`https://api.cloudinary.com/v1_1/${CLD_CLOUD}/image/upload`,{method:'POST',body:fd});
    const d=await r.json();return d.secure_url||null;
  }catch(e){console.log('Cloudinary error:',e);return null;}
}

async function sendToSheet(data){
  try{
    await fetch('https://script.google.com/macros/s/AKfycbwwfDLTcBC70-zpLM0bySnOZN7XzReVVLXbE-_nJr_jFmIoRNRnBa2hw1P93iCI_tMscg/exec',{
      method:'POST',
      mode:'no-cors',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(data)
    });
  }catch(e){console.log('Sheet sync error:',e);}
}

async function submitProfile(){
  const get=(id)=>document.getElementById(id)?.value?.trim()||'';
  const name=get('f-name'),mobile=get('f-mobile'),email=get('f-email'),country=get('f-country');
  const university=get('f-university'),faculty=get('f-faculty'),gradyear=get('f-gradyear');
  const title=get('f-title'),company=get('f-company'),experience=get('f-experience');
  const level=get('f-level'),goal=get('f-goal'),examdate=get('f-examdate');
  const missing=[];
  if(!name)missing.push('Full Name');if(!mobile)missing.push('Mobile');if(!email)missing.push('Email');
  if(!country)missing.push('Country');if(!examdate)missing.push('Target Exam Date');
  const existingPhoto=loadStudent()?.photo||'';
  const pendingB64=window._pendingPhoto||'';
  if(missing.length>0){
    alert('Please complete all required fields:\n\n• '+missing.join('\n• '));return;
  }
  let photoUrl=existingPhoto;
  if(pendingB64&&pendingB64.startsWith('data:')){
    try{
      const fd=new FormData();fd.append('file',pendingB64);fd.append('upload_preset',CLD_PRESET);
      const res=await fetch(`https://api.cloudinary.com/v1_1/${CLD_CLOUD}/image/upload`,{method:'POST',body:fd});
      const cldData=await res.json();
      if(cldData.secure_url){photoUrl=cldData.secure_url;}else{photoUrl=pendingB64;}
    }catch(err){photoUrl=pendingB64;}
    window._pendingPhoto=null;
  }
  saveStudent({name,mobile,email,country,university,faculty,gradyear,title,company,experience,level,goal,examdate,photo:photoUrl,registeredAt:loadStudent()?.registeredAt||new Date().toISOString()});
  STATE.showProfileWarning=false;

  // Send to Google Sheets
  const fb2=loadFeedback();
  sendToSheet({
    name,mobile,email,country,university,faculty,gradyear,
    title,company,experience,level,goal,examdate,
    photo:photoUrl||'No Photo'
  });

  render();
  setTimeout(()=>{
    const el=document.getElementById('content-area');
    if(el)el.scrollTop=0;
  },50);
  alert('Profile saved! Welcome to CMA Prep 🎓\n\nYour data has been sent to your instructor.');
}

function navTo(tab){
  if(!STATE.user&&tab!=='login'&&tab!=='loading'){STATE.tab='login';render();return;}
  if(tab!=='intro'&&tab!=='register'&&tab!=='login'&&tab!=='loading'&&tab!=='feedback'&&tab!=='community'&&tab!=='question-detail'){
    const st=loadStudent();
    const fb=loadFeedback();
    const isComplete=st&&st.name&&st.mobile&&st.email&&st.country&&st.university&&st.faculty&&st.gradyear&&st.title&&st.company&&st.experience&&st.level&&st.goal&&st.examdate&&st.photo;
    if(!isComplete){STATE.tab='register';STATE.showProfileWarning=true;render();return;}
  }
  STATE.showProfileWarning=false;
  if(tab==='lessons'&&tab!==STATE.tab){STATE.sectId=null;STATE.lessonId=null;}
  STATE.tab=tab;render();
}
// ─── AUTH STATE LISTENER ──────────────────────────────────────────────────────
auth.onAuthStateChanged(async(user)=>{
  if(user){
    STATE.user=user;
    STATE.authLoading=false;
    try{
      const pd=await db.collection('progress').doc(user.uid).get();
      if(pd.exists){STATE.progress=pd.data();try{localStorage.setItem('cma-html-v2',JSON.stringify(pd.data()));}catch{}}
    }catch{}
    try{
      const sd=await db.collection('students').doc(user.uid).get();
      if(sd.exists){try{localStorage.setItem('cma-student-v1',JSON.stringify(sd.data()));}catch{}}
    }catch{}
    try{
      const td=await db.collection('tracker').doc(user.uid).get();
      if(td.exists){try{localStorage.setItem('cma-tracker-v1',JSON.stringify(td.data()));}catch{}}
    }catch{}
    const st=loadStudent();const fb=loadFeedback();
    const isComplete=st&&st.name&&st.mobile&&st.email&&st.country&&st.university&&st.faculty&&st.gradyear&&st.title&&st.company&&st.experience&&st.level&&st.goal&&st.examdate&&st.photo;
    STATE.tab=isComplete?'intro':'register';
    STATE.showProfileWarning=!isComplete;
  } else {
    STATE.user=null;STATE.tab='login';STATE.authLoading=false;
  }
  render();
});
