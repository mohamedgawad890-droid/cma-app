          {q:"Kaizen budgeting incorporates:",o:["Zero as the starting point","Continuous improvement targets into budget assumptions","Only capital expenditure planning","Activity-based cost allocation"],a:1,e:"Kaizen budgeting BUILDS IMPROVEMENT TARGETS into the budget — costs are expected to DECREASE each period as efficiency improves through continuous improvement. Based on the kaizen philosophy of ongoing small improvements."},
          {q:"A flexible budget for 9,000 units: variable cost $4/unit, fixed costs $30,000. Flexible budget total =",o:["$30,000","$66,000","$36,000","$270,000"],a:1,e:"Flexible Budget = (Variable Rate × Actual Units) + Fixed Costs = ($4 × 9,000) + $30,000 = $36,000 + $30,000 = $66,000."},
          {q:"Why is a flexible budget BETTER than a static budget for performance evaluation?",o:["It is easier to prepare","It adjusts to actual activity — making comparisons fair at the same volume","It eliminates all variances","It is required by GAAP"],a:1,e:"Flexible budget ADJUSTS to actual activity — you compare actual costs to what SHOULD have been spent at the actual level of activity. A static budget at a different volume creates unfair volume-driven variances that don't reflect actual cost efficiency."},
          {q:"The MOST time-consuming budgeting method is:",o:["Incremental budgeting","Zero-based budgeting","Rolling budgeting","Flexible budgeting"],a:1,e:"Zero-based budgeting is the MOST TIME-CONSUMING because every single expense must be justified from scratch. Managers create 'decision packages' at multiple levels for each activity, which senior management must review and prioritize."},
          {q:"The master budget is also called a:",o:["Flexible budget","Rolling budget","Static budget","Zero-based budget"],a:2,e:"The Master Budget = STATIC budget — prepared for ONE planned activity level before the period begins. It does not change with actual activity. The term 'static' highlights that it is FIXED, unlike a flexible budget that adjusts."},
          {q:"Incremental budgeting uses as its starting point:",o:["Zero for all expenses","Prior year budget + adjustments for known changes","Activity cost drivers","Management's ideal targets"],a:1,e:"Incremental budgeting: start with PRIOR YEAR budget and add/subtract for known changes (inflation, new projects, cost savings). Simple and fast — but can perpetuate past inefficiencies and waste."},
          {q:"Decision packages in ZBB represent:",o:["Items requiring board approval","Budget requests at different funding levels for each activity","Capital investment proposals","Monthly cash flow projections"],a:1,e:"ZBB decision packages: managers create PACKAGES showing each activity at different FUNDING LEVELS (minimum, current level, enhanced). Senior management ranks all packages and funds based on strategic priorities — ensuring highest-value activities are funded first."},
          {q:"Project budgeting is MOST appropriate for:",o:["Annual operating activities","One-time activities with a specific start and end date","Routine monthly expenses","Setting labor rate standards"],a:1,e:"Project budgeting applies to ONE-TIME activities with specific START and END dates — capital projects, R&D initiatives, system implementations. Unlike operating budgets that cover recurring activities, project budgets focus on achieving a defined deliverable."}
        ]}
,
      {id:"2-11",title:"Annual Profit Plan & Supporting Schedules",dur:"30 min",
        blocks:[
          {t:"h",v:"The Budgeting Cycle"},
          {t:"b",v:["Phase 1 — Planning: Forecasts & assumptions, set long/short-term goals","Phase 2 — Implementation: Convert plans into specific operating and financial budgets","Phase 3 — Performance Evaluation: Compare actual results vs. budget, analyze variances","Phase 4 — Reforecasting: Adjust budget based on new information","Continuous cycle — every budget period feeds into the next"]},
          {t:"h",v:"The Annual Profit Plan (Master Budget) Components"},
          {t:"p",v:"The profit plan starts with the SALES BUDGET (the starting point — everything flows from sales) and builds through supporting schedules:"},
          {t:"h",v:"Step 1: Sales Budget"},
          {t:"f",l:"Sales Budget",v:"Budgeted Sales Units × Budgeted Selling Price per Unit = Budgeted Sales Revenue"},
          {t:"h",v:"Step 2: Production Budget"},
          {t:"f",l:"Production Budget",v:"Units to Produce = Budgeted Sales Units + Desired Ending FG Inventory - Beginning FG Inventory"},
          {t:"h",v:"Step 3: Direct Materials Budget"},
          {t:"f",l:"DM Budget",v:"DM to Purchase = (DM needed for production + Desired Ending RM Inventory - Beginning RM Inventory) × Standard Price"},
          {t:"h",v:"Step 4: Direct Labor Budget"},
          {t:"f",l:"DL Budget",v:"Budgeted DL Hours = Units to Produce × Standard DL Hours per Unit | Budgeted DL Cost = DL Hours × Standard Rate per Hour"},
          {t:"h",v:"Step 5: Manufacturing Overhead Budget"},
          {t:"f",l:"MOH Budget",v:"Budgeted OH = (Variable OH Rate × Budgeted Activity) + Budgeted Fixed OH"},
          {t:"h",v:"Step 6: Selling & Administrative (S&A) Budget"},
          {t:"p",v:"Includes variable S&A costs (commissions, delivery) and fixed S&A costs (salaries, rent, advertising). These are PERIOD COSTS — not included in product cost."},
          {t:"h",v:"Step 7: Budgeted Income Statement"},
          {t:"s",v:["Sales Revenue (from Sales Budget)","- Cost of Goods Sold (DM + DL + MOH)","= Gross Profit","- Selling & Administrative Expenses","= Operating Income"]},
          {t:"tip",v:"Exam Tips: Sales Budget = FIRST and MOST IMPORTANT — all others depend on it. Production = Sales + Ending FG - Beginning FG. DM purchases = DM needed + Ending RM - Beginning RM. DL budget = Production units × std hours × std rate. MOH = variable rate × activity + fixed OH. S&A = period costs (not in product cost)."}
        ],
        quizzes:[
          {q:"The FIRST budget prepared in the master budget process is the:",o:["Production budget","Direct materials budget","Sales budget","Cash budget"],a:2,e:"SALES BUDGET is FIRST — it is the foundation. ALL other operating budgets (production, DM, DL, OH) and eventually financial budgets depend on the sales forecast. Nothing can be planned until you know how much you expect to sell."},
          {q:"Production Budget formula: Units to Produce =",o:["Budgeted Sales + Beginning FG - Ending FG","Budgeted Sales + Ending FG - Beginning FG","Beginning FG + Budgeted Sales","Ending FG - Beginning FG + Purchases"],a:1,e:"Units to Produce = Budgeted Sales + DESIRED ENDING FG Inventory - BEGINNING FG Inventory. You need to produce enough to meet sales PLUS build up desired ending inventory, minus what you already have at the start."},
          {q:"Budgeted Sales = 8,000 units. Desired Ending FG = 1,500. Beginning FG = 500. Units to Produce =",o:["8,000","8,500","9,000","7,500"],a:2,e:"Units to Produce = 8,000 + 1,500 - 500 = 9,000 units."},
          {q:"The Direct Materials purchase budget differs from DM USAGE because:",o:["They are always the same","DM purchases adjusts for desired ending and beginning RM inventory","DM usage includes only materials wasted","Purchases exclude variable costs"],a:1,e:"DM USAGE = materials needed for production. DM PURCHASES = usage + DESIRED ENDING RM - BEGINNING RM. You need to buy enough to cover production needs PLUS build desired ending RM inventory, minus what you already have."},
          {q:"The Direct Labor budget is calculated as:",o:["Sales units × standard labor hours × standard rate","Production units × standard DL hours × standard rate per hour","Actual hours × standard rate","Budgeted hours × actual rate"],a:1,e:"DL Budget = PRODUCTION UNITS × Standard DL Hours per unit × Standard Rate per hour. Uses PRODUCTION units (not sales) because DL is incurred in the factory during production."},
          {q:"Selling & Administrative costs are classified as:",o:["Product costs — included in inventory","Manufacturing overhead","Period costs — expensed when incurred","Variable costs only"],a:2,e:"S&A costs are PERIOD COSTS — expensed when incurred, NOT included in product cost or inventory. They appear on the income statement below gross profit. Manufacturing costs (DM, DL, MOH) are product costs."},
          {q:"The Budgeted Income Statement follows which format?",o:["Actual results from prior year","Sales Revenue - COGS = Gross Profit - S&A = Operating Income","Assets = Liabilities + Equity","Cash inflows - Cash outflows"],a:1,e:"Budgeted Income Statement: Sales Revenue - Budgeted COGS (DM+DL+MOH) = Gross Profit - S&A Expenses = Operating Income. Follows the same format as the actual income statement but uses BUDGETED (planned) numbers."},
          {q:"MOH Budget: Variable OH rate $3/DLH, budgeted DLH = 5,000, fixed OH = $20,000. Budgeted MOH =",o:["$15,000","$35,000","$20,000","$75,000"],a:1,e:"Budgeted MOH = (Variable Rate × Activity) + Fixed OH = ($3 × 5,000) + $20,000 = $15,000 + $20,000 = $35,000."},
          {q:"Production = 10,000 units. Standard DM = 3 lbs/unit at $4/lb. Desired Ending RM = 5,000 lbs. Beginning RM = 8,000 lbs. DM Purchases (lbs) =",o:["30,000 lbs","27,000 lbs","32,000 lbs","25,000 lbs"],a:1,e:"DM needed for production = 10,000 × 3 = 30,000 lbs. DM to purchase = 30,000 + 5,000 (desired ending) - 8,000 (beginning) = 27,000 lbs."},
          {q:"DM to purchase = 27,000 lbs at $4/lb. Budgeted DM cost =",o:["$108,000","$120,000","$27,000","$40,000"],a:0,e:"Budgeted DM cost = 27,000 lbs × $4/lb = $108,000."}
        ]}
,
{id:"2-12",title:"Preparing the Budget",dur:"30 min",
        blocks:[
          {t:"h",v:"The Complete Budget Preparation Sequence"},
          {t:"p",v:"After the operating budgets (Units 11), the financial budgets complete the master budget:"},
          {t:"b",v:["Step 8: Capital Expenditure Budget","Step 9: Cash Budget","Step 10: Budgeted Balance Sheet","Step 11: Budgeted Statement of Cash Flows"]},
          {t:"h",v:"Capital Expenditure Budget"},
          {t:"p",v:"Plans for purchases of LONG-TERM ASSETS (PP&E). Separate from the operating budget because capital items are capitalized and depreciated, not expensed immediately."},
          {t:"b",v:["Major capital investments require separate analysis (NPV, IRR)","Capital budget feeds depreciation expense into the operating budget","Links strategic investment plans to the financial budget"]},
          {t:"h",v:"Cash Budget — The Most Important Financial Budget"},
          {t:"p",v:"The cash budget tracks CASH INFLOWS and OUTFLOWS to ensure the company has sufficient liquidity."},
          {t:"tbl",h:["Section","Components"],r:[["Cash Inflows","Beginning cash balance + Cash collected from customers"],["Cash Outflows","DM purchases paid + DL paid + OH paid (ex. depreciation) + S&A paid + Capital expenditures + Debt repayments"],["Net Cash","Cash Inflows - Cash Outflows"],["Financing","Borrow if below minimum; repay if above"]]},
          {t:"f",l:"Cash Collected from Customers",v:"= Cash Sales + Collections on credit sales (based on collection pattern)"},
          {t:"p",v:"Example collection pattern: 60% collected in month of sale, 35% next month, 5% uncollectible. January sales = $100,000 → $60,000 collected in Jan, $35,000 in Feb."},
          {t:"h",v:"Budgeted Balance Sheet"},
          {t:"p",v:"Projects the ENDING BALANCE SHEET at the end of the budget period. Uses beginning balances plus all budgeted transactions (purchases, depreciation, payments, revenues)."},
          {t:"h",v:"Operating vs Capital Budgets"},
          {t:"tbl",h:["Feature","Operating Budget","Capital Budget"],r:[["Time horizon","One year (short-term)","Multiple years (long-term)",""],["Items","Revenue, operating costs, OH","Property, plant & equipment"],["Expensed","In period incurred","Depreciated over useful life"],["Approval","Department managers","Senior management/board"]]},
          {t:"tip",v:"Exam Tips: Cash budget = cash inflows vs outflows. Depreciation is NOT a cash outflow — exclude from cash payments. Collection pattern: apply % to credit sales. Capital expenditure = long-term assets. Capital budget items are CAPITALIZED (not expensed). Budgeted balance sheet uses BEGINNING balances + all budgeted changes."}
        ],
        quizzes:[
          {q:"The cash budget is PRIMARILY used to:",o:["Report profits to shareholders","Ensure sufficient liquidity and identify when borrowing is needed","Calculate depreciation expense","Prepare the tax return"],a:1,e:"Cash budget tracks CASH INFLOWS and OUTFLOWS to ensure the company has SUFFICIENT LIQUIDITY. It identifies periods when cash will be SHORT (need to borrow) or EXCESS (opportunity to repay debt or invest)."},
          {q:"Depreciation expense is EXCLUDED from cash payments in the cash budget because:",o:["It is included in the income statement","It is not a cash outflow — no cash is paid","It is a capital expenditure","It is a fixed cost"],a:1,e:"Depreciation is a NON-CASH expense — it reduces income but involves NO CASH PAYMENT. The cash was paid when the asset was purchased (reflected in the capital budget). Cash budget includes only actual cash flows."},
          {q:"January sales = $80,000. Collection pattern: 70% in month of sale, 25% next month. Cash collected in January from January sales =",o:["$80,000","$56,000","$20,000","$76,000"],a:1,e:"Cash collected in January = $80,000 × 70% = $56,000. The remaining 25% ($20,000) will be collected in February."},
          {q:"A capital expenditure budget covers:",o:["Daily operating expenses","Long-term asset purchases (PP&E)","Direct labor costs","Selling & administrative expenses"],a:1,e:"Capital expenditure budget = plans for LONG-TERM ASSET purchases (property, plant & equipment). Items are CAPITALIZED and DEPRECIATED over time — NOT expensed immediately. Requires separate analysis and senior management approval."},
          {q:"The budgeted balance sheet uses:",o:["Actual results only","Beginning balances plus ALL budgeted transactions for the period","Current market values","Industry average ratios"],a:1,e:"Budgeted balance sheet: START with BEGINNING BALANCES + add all budgeted transactions (purchases, payments, revenues, expenses, depreciation) to project the ENDING BALANCE SHEET at period end."},
          {q:"Cash budget: beginning cash $5,000. Collections $80,000. Payments $70,000. Minimum cash balance $10,000. Required borrowing =",o:["$0","$5,000","$10,000","$15,000"],a:1,e:"Ending cash before financing = $5,000 + $80,000 - $70,000 = $15,000. Minimum required = $10,000. Since $15,000 > $10,000, no borrowing needed. Wait — actually $15,000 ≥ $10,000. $0 borrowing needed."},
          {q:"Collections from customers in the cash budget are based on:",o:["This month's sales only","Collection patterns applied to credit sales","Invoices sent to customers","Gross sales revenue"],a:1,e:"Cash collections = apply COLLECTION PATTERNS to credit sales. Example: 60% collected in sale month, 35% next month. This reflects when cash actually ARRIVES, not when revenue is EARNED (accrual accounting)."},
          {q:"Capital expenditure items are CAPITALIZED meaning they are:",o:["Expensed immediately in the period of purchase","Added to the balance sheet as assets and depreciated over their useful life","Only recorded when sold","Excluded from all financial statements"],a:1,e:"CAPITALIZE = record as an ASSET on the balance sheet and DEPRECIATE over useful life. Contrast with EXPENSE = charge to income statement immediately. Capitalization spreads the cost over the periods benefited."},
          {q:"The cash budget comes AFTER which of the following budgets?",o:["Capital expenditure budget only","Sales, production, DM, DL, OH, S&A, and capital expenditure budgets","Production budget only","It is always prepared first"],a:1,e:"The cash budget is prepared LAST among operating and financial budgets — it incorporates ALL cash transactions from: DM purchases, DL payments, OH payments, S&A payments, capital expenditures, and customer collections."},
          {q:"October sales $100,000 (50% cash, 50% credit). Credit collections: 70% in month of sale, 30% next month. Total cash collected in October =",o:["$50,000","$85,000","$100,000","$70,000"],a:1,e:"Cash sales: $100,000 × 50% = $50,000 collected in October. Credit sales: $100,000 × 50% = $50,000 credit. Collections in October: $50,000 × 70% = $35,000. Total = $50,000 + $35,000 = $85,000."}
        ]}
,
      {id:"2-13",title:"Ongoing Budgetary Reporting",dur:"25 min",
        blocks:[
          {t:"h",v:"Purpose of Ongoing Budgetary Reporting"},
          {t:"p",v:"Once a budget is approved, it becomes the BENCHMARK for measuring actual performance. Throughout the year, organizations compare actual results to budget to identify VARIANCES and take corrective action."},
          {t:"b",v:["Period-specific comparison: Monthly or quarterly actual vs budget","Cumulative (YTD) comparison: Year-to-date actual vs year-to-date budget","Provides early warning of problems — allows timely corrective action","Improves future budgeting accuracy"]},
          {t:"h",v:"Variance Reporting"},
          {t:"tbl",h:["Variance Type","Definition","Action"],r:[["Favorable (F)","Revenue: Actual > Budget | Cost: Actual < Budget","Investigate — may be sustainable or one-time"],["Unfavorable (U)","Revenue: Actual < Budget | Cost: Actual > Budget","Investigate — identify cause and corrective action"]]},
          {t:"h",v:"Flexible Budget Analysis — Variance Decomposition"},
          {t:"p",v:"Comparing actual to FLEXIBLE budget separates variances into:"},
          {t:"tbl",h:["Variance","What It Measures","Formula"],r:[["Sales Volume Variance","Effect of selling MORE or FEWER units than budgeted","(Actual Units - Budgeted Units) × Budgeted CM per unit"],["Sales Price Variance","Effect of PRICE being different from budget","(Actual Price - Budgeted Price) × Actual Units"],["Flexible Budget Variance","Efficiency — was cost per unit higher or lower?","Actual Cost - Flexible Budget Cost"]]},
          {t:"h",v:"Management by Exception"},
          {t:"p",v:"Managers focus attention on SIGNIFICANT VARIANCES — those that exceed a threshold (e.g., >$10,000 or >5%). Routine, immaterial variances are not investigated. This allows efficient use of management time."},
          {t:"h",v:"Responsibility Reporting"},
          {t:"p",v:"Each manager receives a report showing ONLY the costs they CONTROL. Senior managers see aggregated totals; operational managers see detailed line items for their area."},
          {t:"b",v:["Controllable costs: Manager can directly influence — INCLUDE in their report","Uncontrollable costs: Cannot be influenced by this manager — EXCLUDE from their evaluation","Example: Production manager controls DM, DL, variable OH — NOT fixed rent allocated from corporate"]},
          {t:"tip",v:"Exam Tips: Flexible budget analysis separates Volume Variance (units sold) from Flexible Budget Variance (efficiency). Management by exception = focus on significant variances. Responsibility reporting = only CONTROLLABLE costs evaluated. Favorable cost variance = actual < budget. Unfavorable = actual > budget."}
        ],
        quizzes:[
          {q:"Management by exception means managers:",o:["Review all budget lines equally","Focus attention on significant variances that exceed a threshold","Only review favorable variances","Ignore all budget variances"],a:1,e:"Management by exception: focus on SIGNIFICANT VARIANCES (above a materiality threshold). Immaterial variances are ignored. This uses management time EFFICIENTLY — investigating only where something meaningful has gone wrong."},
          {q:"A Sales Volume Variance measures:",o:["The effect of selling price changes","The effect of selling more or fewer units than budgeted","The flexible budget vs actual cost difference","Fixed cost absorption"],a:1,e:"Sales Volume Variance = (Actual Units - Budgeted Units) × Budgeted CM per unit. It isolates the VOLUME effect — how much profit changed because we sold a different quantity than planned."},
          {q:"In responsibility reporting, a production manager should be evaluated on:",o:["All company costs including allocated corporate overhead","Only costs they directly CONTROL — DM, DL, variable OH","Fixed rent and depreciation from headquarters","Corporate S&A expenses"],a:1,e:"Responsibility reporting: managers evaluated ONLY on CONTROLLABLE costs — those they can directly influence. A production manager controls DM, DL, and variable overhead — NOT fixed rent or corporate allocated costs they cannot change."},
          {q:"Actual sales = 9,500 units. Budgeted sales = 10,000 units. Budgeted CM per unit = $20. Sales Volume Variance =",o:["$10,000 Favorable","$10,000 Unfavorable","$190,000 Favorable","$200,000 Unfavorable"],a:1,e:"Sales Volume Variance = (9,500 - 10,000) × $20 = -500 × $20 = -$10,000 = $10,000 UNFAVORABLE (sold fewer units than budgeted)."},
          {q:"A favorable cost variance in ongoing reporting means:",o:["Actual costs exceeded budget","Actual costs were LESS than budget","Revenue exceeded expectations","Management made no errors"],a:1,e:"Favorable cost variance = ACTUAL COSTS < BUDGET. The company spent LESS than planned. However, it should still be investigated — it may indicate quality reduction, production cut, or accounting error."},
          {q:"Year-to-date (cumulative) comparison in budgetary reporting:",o:["Only covers the current month","Compares total actual to total budget from start of year to current date","Is less useful than period-specific","Is only done at year-end"],a:1,e:"YTD comparison tracks performance from the START OF THE YEAR to current date. Useful for identifying trends and seasonal patterns that monthly reporting might miss. A bad month might be offset by a good prior period in the YTD view."},
          {q:"The flexible budget variance measures:",o:["The volume effect on profits","Cost efficiency — was cost per unit higher or lower than standard?","The sales price vs budget difference","Total budget variance only"],a:1,e:"Flexible budget variance = Actual Cost - Flexible Budget Cost (same volume). It isolates EFFICIENCY — were costs higher or lower per unit than standard? Removes the volume effect, showing pure cost efficiency."},
          {q:"Actual price = $48. Budgeted price = $50. Actual units = 8,000. Sales Price Variance =",o:["$2,000 Favorable","$16,000 Unfavorable","$16,000 Favorable","$2,000 Unfavorable"],a:1,e:"Sales Price Variance = (Actual Price - Budgeted Price) × Actual Units = ($48 - $50) × 8,000 = -$2 × 8,000 = -$16,000 = $16,000 UNFAVORABLE (sold at lower price than budgeted)."},
          {q:"Budget reporting frequency is TYPICALLY:",o:["Only at year-end","Annually only","Monthly or quarterly","Weekly only"],a:2,e:"Budget vs actual reporting is typically done MONTHLY OR QUARTERLY — frequent enough to identify problems early and take corrective action before they become major issues, but not so frequent as to create administrative burden."},
          {q:"The PRIMARY purpose of comparing actual results to budget is:",o:["Tax compliance","External financial reporting","Performance evaluation — identifying variances for corrective action","Payroll processing"],a:2,e:"The primary purpose is PERFORMANCE EVALUATION — identifying where actual results differ from plan (variances), investigating causes, and taking CORRECTIVE ACTION to get back on track or improve future planning."}
        ]}
,
      {id:"2-14",title:"Answering Budgeting Calculation Questions",dur:"30 min",
        blocks:[
          {t:"h",v:"4 Main Calculation Question Types on the CMA Exam"},
          {t:"h",v:"Type 1: Flexible Budget Amount"},
          {t:"f",l:"Flexible Budget",v:"= (Standard Variable Cost per unit × Actual Activity) + Budgeted Fixed Costs"},
          {t:"p",v:"Example: Standard VC = $5/unit. Actual production = 12,000 units. Fixed OH = $30,000. Flexible budget = ($5 × 12,000) + $30,000 = $90,000."},
          {t:"h",v:"Type 2: Units to Produce or Purchase"},
          {t:"f",l:"Production Budget",v:"Units to Produce = Sales + Ending FG - Beginning FG"},
          {t:"f",l:"DM Purchase",v:"Units to Purchase = Production × DM/unit + Ending RM - Beginning RM"},
          {t:"p",v:"Example: Sales 10,000. Ending FG 2,000. Beginning FG 1,500. Units to produce = 10,000 + 2,000 - 1,500 = 10,500."},
          {t:"h",v:"Type 3: Budget Variance Calculations"},
          {t:"tbl",h:["Variance","Formula"],r:[["DM Price Variance","(Actual Price - Std Price) × Actual Qty Purchased"],["DM Quantity Variance","(Actual Qty - Std Qty Allowed) × Std Price"],["DL Rate Variance","(Actual Rate - Std Rate) × Actual Hours"],["DL Efficiency Variance","(Actual Hours - Std Hours Allowed) × Std Rate"],["Sales Price Variance","(Actual Price - Budgeted Price) × Actual Units"],["Sales Volume Variance","(Actual Units - Budgeted Units) × Budgeted CM per unit"]]},
          {t:"h",v:"Type 4: Comprehensive Budget Problems"},
          {t:"p",v:"Multi-step problems combining several budgets. Always follow the sequence:"},
          {t:"s",v:["Step 1: Sales Budget → Revenue","Step 2: Production Budget → Units","Step 3: DM/DL/OH Budgets → Costs","Step 4: Budgeted Income Statement → Operating Income","Step 5: Cash Budget → Cash position"]},
          {t:"h",v:"Key Formulas Summary"},
          {t:"tbl",h:["Formula","Calculation"],r:[["Budgeted COGS","Beginning FG + Budgeted production cost - Ending FG"],["Gross Profit","Sales Revenue - COGS"],["Operating Income","Gross Profit - S&A Expenses"],["Cash collections","Cash sales + Collections on prior credit sales"]]},
          {t:"tip",v:"Exam Tips: Always identify FAVORABLE vs UNFAVORABLE. F = actual BETTER than standard. U = actual WORSE. DM/DL variances: Price/Rate = PURCHASING efficiency. Quantity/Efficiency = USAGE efficiency. Static budget = fixed quantity. Flexible budget = adjusts to actual quantity. Sales volume variance uses CM (not price) per unit."}
        ],
        quizzes:[
          {q:"Flexible Budget: Standard VC = $4/unit. Fixed costs = $25,000. Actual units = 8,000. Flexible budget total =",o:["$25,000","$32,000","$57,000","$64,000"],a:2,e:"Flexible Budget = (VC × Actual Units) + Fixed = ($4 × 8,000) + $25,000 = $32,000 + $25,000 = $57,000."},
          {q:"Budgeted sales 5,000. Ending FG desired 800. Beginning FG 300. Units to produce =",o:["5,000","5,300","5,500","4,500"],a:2,e:"Units to Produce = 5,000 + 800 - 300 = 5,500 units."},
          {q:"Standard DM price $10/lb. Actual price $9.50/lb. Actual qty purchased 2,000 lbs. DM Price Variance =",o:["$500 Favorable","$1,000 Favorable","$500 Unfavorable","$1,000 Unfavorable"],a:0,e:"DM Price Variance = (Actual - Standard) × Actual Qty = ($9.50 - $10.00) × 2,000 = -$0.50 × 2,000 = -$1,000... Wait: = ($9.50 - $10) × 2,000 = $(-0.50) × 2,000 = -$1,000 = $1,000 FAVORABLE (paid less than standard)."},
          {q:"Standard DL hours allowed 3,000. Actual hours 3,200. Standard rate $15/hr. DL Efficiency Variance =",o:["$3,000 Favorable","$3,000 Unfavorable","$45,000 Favorable","$48,000 Favorable"],a:1,e:"DL Efficiency Variance = (Actual Hours - Standard Hours Allowed) × Standard Rate = (3,200 - 3,000) × $15 = 200 × $15 = $3,000 UNFAVORABLE (used more hours than standard)."},
          {q:"Actual selling price $22. Budgeted price $20. Actual units 5,000. Sales Price Variance =",o:["$10,000 Unfavorable","$10,000 Favorable","$2,000 Favorable","$100,000 Favorable"],a:1,e:"Sales Price Variance = (Actual - Budgeted) × Actual Units = ($22 - $20) × 5,000 = $2 × 5,000 = $10,000 FAVORABLE (sold at higher price than budgeted)."},
          {q:"Actual units 9,000. Budgeted units 10,000. Budgeted CM per unit $25. Sales Volume Variance =",o:["$25,000 Favorable","$25,000 Unfavorable","$250,000 Unfavorable","$225,000 Favorable"],a:1,e:"Sales Volume Variance = (9,000 - 10,000) × $25 = -1,000 × $25 = -$25,000 = $25,000 UNFAVORABLE (sold 1,000 fewer units than planned)."},
          {q:"Standard DM = 4 lbs/unit at $5/lb. Actual production = 1,000 units. Actual DM used = 4,200 lbs. DM Quantity Variance =",o:["$1,000 Unfavorable","$1,000 Favorable","$21,000 Unfavorable","$4,000 Favorable"],a:0,e:"DM Quantity Variance = (Actual Qty - Standard Qty Allowed) × Standard Price = (4,200 - 4,000) × $5 = 200 × $5 = $1,000 UNFAVORABLE (used 200 more lbs than standard)."},
          {q:"Beginning FG inventory = $15,000. Budgeted production cost = $80,000. Ending FG desired = $20,000. Budgeted COGS =",o:["$75,000","$80,000","$95,000","$115,000"],a:0,e:"Budgeted COGS = Beginning FG + Production Cost - Ending FG = $15,000 + $80,000 - $20,000 = $75,000."},
          {q:"Sales = $200,000. COGS = $120,000. S&A = $40,000. Operating Income =",o:["$80,000","$40,000","$160,000","$200,000"],a:1,e:"Operating Income = Sales - COGS - S&A = $200,000 - $120,000 - $40,000 = $40,000. Gross Profit = $200,000 - $120,000 = $80,000. Operating Income = $80,000 - $40,000 = $40,000."},
          {q:"A favorable variance always means:",o:["Actual costs were lower than budget","The company performed above expectations in that area","Actual result was BETTER than standard/budget (lower cost or higher revenue)","The budget was set too low"],a:2,e:"FAVORABLE = actual result was BETTER than standard/budget. For COSTS: actual < budget = favorable. For REVENUES: actual > budget = favorable. It does NOT always mean costs were lower — favorable REVENUE variance means higher revenue."}
        ]}
,
      {id:"2-15",title:"Top-Level Planning and Analysis",dur:"25 min",
        blocks:[
          {t:"h",v:"Pro Forma Financial Statements"},
          {t:"p",v:"Pro forma means 'AS IF' — projected financial statements showing expected results IF a planned action occurs. Used for planning and decision-making, NOT historical reporting."},
          {t:"b",v:["Pro forma Income Statement: projected revenues, costs, and profits","Pro forma Balance Sheet: projected assets, liabilities, and equity","Pro forma Statement of Cash Flows: projected cash generation","Used for: merger analysis, new product launches, expansion decisions, financing requests"]},
          {t:"h",v:"Sales Forecasting for Top-Level Planning"},
          {t:"b",v:["Start with historical data, adjusted for future expectations","Internal factors: capacity, product lifecycle, pricing strategy","External factors: market growth, competition, economic conditions","Multiple methods: trend analysis, regression, market research, sales force composite"]},
          {t:"h",v:"Sensitivity Analysis & Scenario Analysis"},
          {t:"tbl",h:["Tool","Description","Output"],r:[["Sensitivity Analysis","Change ONE variable — observe effect on outcome","'If sales drop 10%, operating income falls by $X'"],["Scenario Analysis","Define complete alternative scenarios (best/base/worst)","Three complete financial projections"],["Break-even Analysis","Find the activity level where income = 0","Break-even units/revenue"],["What-if Analysis","Interactive modeling of multiple assumptions","Range of possible outcomes"]]},
          {t:"h",v:"Long-Range Planning"},
          {t:"p",v:"Long-range (strategic) plans typically cover 3–5+ years. They set the framework within which annual budgets are prepared."},
          {t:"b",v:["Annual budget = detailed 1-year plan within the long-range framework","Long-range plan = directional — less detailed, more strategic","Rolling forecasts update the long-range view as conditions change","Key inputs: growth assumptions, capital investment plans, market forecasts"]},
          {t:"h",v:"CVP Analysis in Top-Level Planning"},
          {t:"f",l:"Break-Even Point",v:"BEP (units) = Fixed Costs / CM per unit | BEP (revenue) = Fixed Costs / CM ratio"},
          {t:"f",l:"Target Profit",v:"Required Units = (Fixed Costs + Target Profit) / CM per unit"},
          {t:"f",l:"Margin of Safety",v:"Margin of Safety = Actual Sales - Break-Even Sales | Shows buffer before losses begin"},
          {t:"tip",v:"Exam Tips: Pro forma = projected statements for 'what if' scenarios. Scenario analysis = multiple complete scenarios (best/base/worst). Sensitivity = change ONE variable. BEP = FC / CM per unit. Target profit = (FC + Target) / CM per unit. Margin of Safety = Actual - BEP. Long-range plan = 3-5+ years. Annual budget = 1-year detail within long-range framework."}
        ],
        quizzes:[
          {q:"Pro forma financial statements are used for:",o:["Reporting historical results to regulators","Projecting expected results for planning and decision-making","Calculating actual tax liability","Auditing financial records"],a:1,e:"Pro forma statements are PROJECTED ('AS IF') financial statements — they show expected results if a planned action (merger, expansion, new product) occurs. Used for PLANNING AND DECISION-MAKING, not historical reporting."},
          {q:"Break-even point in UNITS = Fixed Costs / CM per unit. Fixed costs = $60,000. CM per unit = $15. Break-even =",o:["$900,000","2,000 units","4,000 units","$15 per unit"],a:2,e:"BEP = $60,000 / $15 = 4,000 units. At 4,000 units, total contribution margin exactly covers all fixed costs, resulting in zero operating profit."},
          {q:"Scenario analysis differs from sensitivity analysis because:",o:["It is less accurate","It changes ONE variable at a time","It defines complete alternative futures (best/base/worst) with all variables changed","It only works for financial projections"],a:2,e:"Scenario analysis: defines COMPLETE ALTERNATIVE SCENARIOS — all variables change together in a coherent story (best case: high growth + low costs; worst case: low growth + high costs). Sensitivity: changes ONE variable at a time."},
          {q:"Fixed costs = $80,000. Actual revenue = $200,000. BEP revenue = $160,000. Margin of Safety =",o:["$80,000","$40,000","$160,000","$200,000"],a:1,e:"Margin of Safety = Actual Sales - Break-Even Sales = $200,000 - $160,000 = $40,000. This is the BUFFER — how much revenue could decline before the company starts losing money."},
          {q:"Required units to achieve target profit: FC = $50,000, Target profit = $30,000, CM = $20/unit. Required units =",o:["2,500","4,000","1,500","3,500"],a:1,e:"Required Units = (FC + Target Profit) / CM = ($50,000 + $30,000) / $20 = $80,000 / $20 = 4,000 units."},
          {q:"Long-range plans typically cover:",o:["1 month","1 year","3–5 or more years","10 years minimum"],a:2,e:"Long-range (strategic) plans typically cover 3–5+ YEARS. They are directional and less detailed, setting the framework within which annual (1-year) budgets are prepared. Annual budgets implement the long-range plan for the current year."},
          {q:"A what-if analysis model allows:",o:["Only one scenario to be tested","Interactive modeling of multiple assumption combinations","Historical analysis only","Automatic variance correction"],a:1,e:"What-if analysis = INTERACTIVE MODELING allowing users to change multiple assumptions and immediately see the effect on outcomes. It explores a range of possible scenarios — more flexible than formal scenario analysis."},
          {q:"The relationship between annual budget and long-range plan is:",o:["Annual budget replaces long-range plan","Annual budget provides 1-year detail within the long-range framework","They are independent of each other","Long-range plan is more detailed"],a:1,e:"Annual budget = detailed 1-YEAR IMPLEMENTATION of the long-range strategic plan. The long-range plan sets strategic direction (3-5+ years); the annual budget translates this into specific targets for the current year."},
          {q:"Break-even analysis in top-level planning helps management understand:",o:["Historical cost patterns","The minimum activity level required to avoid losses","Current year budget variances","Employee productivity"],a:1,e:"Break-even analysis shows the MINIMUM ACTIVITY LEVEL (units or revenue) needed to cover all fixed and variable costs — avoiding losses. Critical for new product decisions, pricing strategy, and assessing risk."},
          {q:"Sensitivity analysis on a new product launch shows that a 10% reduction in unit price reduces operating income by $50,000. This indicates:",o:["Low sensitivity to price changes","The product is very sensitive to price — pricing decisions are critical","The fixed cost structure is too high","Variable costs must be reduced"],a:1,e:"HIGH SENSITIVITY to price = a 10% price change causing a large income impact. This tells management that PRICING IS CRITICAL — getting the price right matters significantly. It should focus management attention on pricing strategy and competitive positioning."}
        ]}
    ]},
  {id:3,title:"Performance Management",weight:20,emoji:"🎯",bar:"#7B3FA0",bg:"#F3E8FF",text:"#6A2E8F",strong:"#4A1F70",
    lessons:[
      {id:"3-1",title:"Flexible Budgets & Performance Evaluation",dur:"25 min",
        blocks:[
          {t:"h",v:"Static vs Flexible Budget"},
          {t:"p",v:"A static budget is prepared for ONE level of activity and doesn't change. A flexible budget ADJUSTS to the actual level of activity, making performance comparison meaningful. You cannot fairly compare actual costs at 9,000 units to a static budget prepared for 10,000 units."},
          {t:"tbl",h:["Feature","Static Budget","Flexible Budget"],r:[["Activity level","Fixed (one level)","Adjusts to actual output"],["Use","Planning","Performance evaluation"],["Variance analysis","Less meaningful","More meaningful and fair"],["Variable costs","Set at planned volume","Recalculated at actual volume"],["Fixed costs","Same","Same (unchanged)"]
]},
          {t:"h",v:"Flexible Budget Formula"},
          {t:"f",l:"Flexible Budget Amount",v:"Flexible Budget Cost = (Variable Cost Rate x Actual Activity) + Total Fixed Costs"},
          {t:"h",v:"Variance Analysis Framework"},
          {t:"f",l:"Total Budget Variance",v:"Total Variance = Actual Cost - Flexible Budget Cost"},
          {t:"p",v:"Example: Static budget for 10,000 units. Actual production: 9,000 units. Variable cost rate $5/unit. Fixed costs $20,000."},
          {t:"s",v:["Static Budget cost = ($5 x 10,000) + $20,000 = $70,000","Flexible Budget cost = ($5 x 9,000) + $20,000 = $65,000","Actual cost = $63,000","Variance vs Static = $63,000 - $70,000 = $7,000 Favorable (misleading)","Variance vs Flexible = $63,000 - $65,000 = $2,000 Favorable (fair comparison)"]},
          {t:"h",v:"The Balanced Scorecard"},
          {t:"p",v:"The Balanced Scorecard (BSC) measures performance across FOUR perspectives, linking day-to-day operations to long-term strategy:"},
          {t:"tbl",h:["Perspective","Question","Example Metrics"],r:[["Financial","How do we look to shareholders?","Revenue growth, ROI, EVA"],["Customer","How do customers see us?","Satisfaction scores, market share, retention"],["Internal Business Process","What must we excel at?","Cycle time, quality, defect rates"],["Learning & Growth","Can we continue to improve?","Employee training hours, innovation rate"]]},
          {t:"b",v:["BSC links strategy to operational measures across four dimensions","Prevents over-focus on financial metrics alone","Lagging indicators = financial results (past performance)","Leading indicators = process/learning metrics (predict future performance)"]},
          {t:"h",v:"Responsibility Accounting"},
          {t:"b",v:["Cost Center: Responsible for COSTS only (e.g., production department)","Revenue Center: Responsible for REVENUES only (e.g., sales team)","Profit Center: Responsible for both REVENUES and COSTS (e.g., a product division)","Investment Center: Responsible for revenues, costs, AND investment (e.g., a subsidiary) — measured by ROI or EVA"]},
          {t:"tip",v:"Exam Tips: Flexible budget is used for PERFORMANCE EVALUATION — comparing actual to flexible is the fair comparison. Static budget is used for PLANNING. Balanced Scorecard has 4 perspectives — Financial, Customer, Internal Process, Learning & Growth. Investment centers use ROI = Operating Income / Invested Assets. EVA = NOPAT - (WACC x Invested Capital)."}
        ],
        quizzes:[]}
    ]},
  {id:4,title:"Cost Management",weight:15,emoji:"💰",bar:"#EF9F27",bg:"#FAEEDA",text:"#BA7517",strong:"#854F0B",
    lessons:[
      {id:"4-1",title:"Measurement Concepts & Classification of Costs",dur:"30 min",
        blocks:[
          {t:"h",v:"What Is Cost Behavior?"},
          {t:"p",v:"Cost behavior describes how costs change as activity levels change. Understanding cost behavior is essential for budgeting, decision-making, and performance evaluation."},
          {t:"h",v:"1. Variable Costs"},
          {t:"p",v:"Variable costs change proportionally with activity. They are CONSTANT PER UNIT but change in TOTAL."},
          {t:"tbl",h:["Activity","Total Variable Cost","Cost Per Unit"],r:[["1,000 units","$5,000","$5"],["2,000 units","$10,000","$5"],["3,000 units","$15,000","$5"]]},
          {t:"b",v:["Examples: Direct Materials, Sales Commissions, Packaging","Key rule: Total changes — Per unit stays the same"]},
          {t:"h",v:"2. Fixed Costs"},
          {t:"p",v:"Fixed costs remain CONSTANT IN TOTAL regardless of activity. Cost per unit decreases as production increases."},
          {t:"tbl",h:["Activity","Total Fixed Cost","Cost Per Unit"],r:[["1,000 units","$10,000","$10.00"],["2,000 units","$10,000","$5.00"],["4,000 units","$10,000","$2.50"]]},
          {t:"b",v:["Examples: Rent, Insurance, Salaries, Depreciation","Key rule: Total stays the same — Per unit changes"]},
          {t:"h",v:"3. Mixed Costs (Semi-Variable)"},
          {t:"p",v:"Mixed costs contain BOTH a fixed AND variable component. They must be separated using analytical methods."},
          {t:"f",l:"Mixed Cost Formula",v:"Y = a + bX   |   Y = Total Cost, a = Fixed, b = Variable Rate, X = Activity"},
          {t:"p",v:"Example: Electricity bill = $500 base (fixed) + $0.10 per KWH (variable). At 3,000 KWH: Y = $500 + ($0.10 x 3,000) = $800."},
          {t:"h",v:"High-Low Method"},
          {t:"s",v:["Step 1: Variable Rate = (High Cost - Low Cost) / (High Activity - Low Activity)","Step 2: Fixed Cost = Total Cost at High Point - (Variable Rate x High Activity)","Step 3: Write the equation: Y = Fixed Cost + (Variable Rate x X)"]},
          {t:"p",v:"Example: High = 10,000 units / $45,000. Low = 4,000 units / $21,000. Variable Rate = ($45,000-$21,000)/(10,000-4,000) = $4.00/unit. Fixed Cost = $45,000 - ($4 x 10,000) = $5,000. Equation: Y = $5,000 + $4.00X"},
          {t:"tbl",h:["Cost Type","Total Behavior","Per Unit Behavior","Examples"],r:[["Variable","Changes proportionally","Constant","Direct Materials, Commissions"],["Fixed","Constant","Changes (inversely)","Rent, Insurance, Salaries"],["Mixed","Changes (partially)","Changes","Electricity, Phone, Maintenance"]]},
          {t:"tip",v:"Exam Tips: Variable cost = constant per unit. Fixed cost = constant in total. High-Low weakness = uses only 2 data points. Regression Analysis is more accurate. Sunk costs = ALWAYS irrelevant. Opportunity costs = ALWAYS relevant."}
        ,
          {t:"h",v:"Other Important Cost Types"},
          {t:"tbl",h:["Cost Type","Definition","Decision Relevance"],r:[["Explicit (Out-of-Pocket)","Cash payment involved — wages, rent, materials","Recorded in accounting books"],["Implicit (Imputed)","No cash payment — not recorded","Owner's time, use of own capital"],["Opportunity Cost","Benefit LOST by not choosing the best alternative","ALWAYS relevant in decisions"],["Sunk Cost","Already incurred — cannot be recovered","ALWAYS irrelevant in decisions"],["Carrying Cost","Cost of holding inventory — storage, insurance, obsolescence","Relevant in inventory decisions"],["Committed Cost","Long-term infrastructure — hard to change","Largely unavoidable in short run"],["Discretionary Cost","Can be started/stopped — advertising, R&D, training","Management can control"],["Marginal Cost","Additional cost to produce ONE more unit","Relevant for output decisions"]]},
          {t:"h",v:"Cost Object, Cost Pool, Allocation Base & Cost Driver"},
          {t:"tbl",h:["Term","Definition","Example"],r:[["Cost Object","Anything for which cost is separately measured","Product, customer, department"],["Cost Pool","Group of indirect costs using the same allocation base","All factory overhead costs"],["Allocation Base","The cost driver used to allocate indirect costs","Direct labor hours, machine hours"],["Cost Driver","Factor that CAUSES costs to be incurred","Number of setups, orders, inspections"]]},
          {t:"h",v:"Step Costs & Relevant Range"},
          {t:"p",v:"Step costs remain FIXED within a range then JUMP when activity crosses a threshold. Step-fixed = wide steps (add a supervisor). Step-variable = narrow steps (resemble variable)."},
          {t:"p",v:"Relevant Range: The activity range where cost behavior assumptions are VALID. Outside this range, fixed costs may change and variable rates may differ."},
          {t:"tip",v:"Exam Tips: Sunk costs = ALWAYS irrelevant. Opportunity costs = ALWAYS relevant (even if not recorded). Explicit = cash paid and recorded. Implicit = no cash payment. Cost driver CAUSES costs. Allocation base IS the cost driver used to allocate indirect costs. Relevant range = where Y = a + bX holds true."}
        ],
        quizzes:[
          {q:"A cost that is constant per unit but changes in total with activity is a:",o:["Fixed cost","Variable cost","Mixed cost","Step cost"],a:1,e:"Variable costs are CONSTANT PER UNIT but change PROPORTIONALLY in total. If production doubles, total variable cost doubles but cost per unit stays the same."},
          {q:"High: 8,000 units / $38,000. Low: 2,000 units / $14,000. Variable rate per unit =",o:["$3.00","$4.00","$4.75","$6.33"],a:1,e:"Variable Rate = ($38,000 - $14,000) / (8,000 - 2,000) = $24,000 / 6,000 = $4.00 per unit."},
          {q:"Using the data above (variable rate $4.00), Fixed Cost =",o:["$6,000","$8,000","$10,000","$14,000"],a:0,e:"FC = $38,000 - ($4 x 8,000) = $38,000 - $32,000 = $6,000. Verify: $14,000 - ($4 x 2,000) = $6,000."},
          {q:"Monthly rent of $10,000 regardless of production level is a:",o:["Variable cost","Mixed cost","Fixed cost","Step cost"],a:2,e:"Fixed cost: constant in TOTAL regardless of activity. Rent does not change whether you produce 100 or 10,000 units."},
          {q:"Y = $8,000 + $6X. At 3,000 units, Total Cost =",o:["$18,000","$24,000","$26,000","$30,000"],a:2,e:"Y = $8,000 + ($6 x 3,000) = $8,000 + $18,000 = $26,000."},
          {q:"Fixed cost per unit DECREASES when:",o:["Fixed costs increase in total","Variable costs decrease","Production volume INCREASES","Selling price increases"],a:2,e:"Fixed costs are constant in total. As production INCREASES, the same total fixed cost is spread over MORE units, so fixed cost per unit DECREASES."},
          {q:"The relevant range is best described as:",o:["The profitable activity range","The range where cost behavior assumptions are VALID","The break-even range","The range of acceptable selling prices"],a:1,e:"Relevant range: the activity range within which fixed and variable cost assumptions hold true. Outside this range, cost behavior patterns change."},
          {q:"A salesperson earns $2,000/month base + $50 commission per sale. This is a:",o:["Fixed cost","Variable cost","Mixed cost","Step cost"],a:2,e:"Mixed cost: FIXED component ($2,000 base) AND VARIABLE component ($50 per sale). Formula: Y = $2,000 + $50X."},
          {q:"The main WEAKNESS of the High-Low method is:",o:["It requires advanced software","It uses only 2 data points which may not be representative","It cannot calculate fixed costs","It only works for variable costs"],a:1,e:"High-Low weakness: uses ONLY 2 data points. If either is an outlier, the entire calculation is distorted. Regression Analysis uses ALL data points and is more reliable."},
          {q:"A factory adds a second supervisor when production exceeds 500 units/day. This is a:",o:["Variable cost","Mixed cost","Fixed cost","Step fixed cost"],a:3,e:"Step fixed cost: constant within a range then JUMPS to a higher level when activity crosses a threshold. Different from variable (no per-unit rate) and mixed (no continuous variable component)."}
        ,
          {q:"Which cost type is ALWAYS irrelevant in decision-making?",o:["Opportunity cost","Variable cost","Sunk cost","Discretionary cost"],a:2,e:"Sunk costs are past costs already incurred that CANNOT be changed. They are ALWAYS irrelevant because they do not differ between alternatives. Example: the $50,000 already spent on a machine — should not influence whether to continue a project."},
          {q:"Advertising and R&D costs that management can choose to spend or not are classified as:",o:["Committed costs","Sunk costs","Discretionary (flexible) costs","Implicit costs"],a:2,e:"Discretionary (flexible) costs are those management can choose to incur or not — advertising, R&D, employee training. They can be adjusted in the short run without immediate capacity impact."},
          {q:"A cost pool is best defined as:",o:["A single cost driver","A group of indirect costs allocated using the same base","The direct costs of a product","The opportunity cost of a resource"],a:1,e:"A cost pool is a GROUPING of related indirect costs that share the same cost driver/allocation base. Example: all factory overhead costs allocated using machine hours form a cost pool."},
          {q:"The relevant range in cost behavior refers to:",o:["The range of selling prices","The activity level where cost relationships are assumed to hold","The range of acceptable variances","The minimum production level"],a:1,e:"The relevant range is the range of activity levels over which the assumed cost behavior (fixed costs stay fixed, variable rate stays constant) is VALID. Outside this range, the relationships may not hold."}
        ]},
      {id:"4-2",title:"Costing Methods: Standard, Normal & Actual Costing",dur:"25 min",
        blocks:[
          {t:"h",v:"Why Do We Need Costing Methods?"},
          {t:"p",v:"Before diving into specific costing systems, it is essential to understand the FRAMEWORK of cost measurement and cost accumulation. Two fundamental decisions drive how a company designs its costing system."},
          {t:"h",v:"Two Key Decisions in Costing"},
          {t:"b",v:["Decision 1 — Cost Accumulation: How are costs collected? Job Order Costing (by job) OR Process Costing (by department/process)","Decision 2 — Cost Measurement: How are costs measured? Actual Costing, Normal Costing, OR Standard Costing"]},
          {t:"h",v:"Cost Accumulation Systems"},
          {t:"tbl",h:["System","Products","Cost Tracking","Examples"],r:[["Job Order Costing","Unique/custom","Per job or batch","Construction, custom furniture, printing"],["Process Costing","Identical/homogeneous","Per process/department","Oil refining, beverages, cement"],["Hybrid (Operation Costing)","Partially standardized","Batch level","Clothing with custom finishing"]]},
          {t:"h",v:"Cost Measurement Methods"},
          {t:"tbl",h:["Method","DM & DL","Overhead","Pros / Cons"],r:[["Actual Costing","Actual costs","Actual overhead","Most accurate / Overhead only known at year-end — slow"],["Normal Costing","Actual costs","Predetermined rate x actual activity","Timely / Small over/under-applied OH difference"],["Standard Costing","Standard costs","Standard rate x standard activity","Best for control / Variances reveal inefficiencies"]]},
          {t:"h",v:"Product Costs vs Period Costs — Quick Review"},
          {t:"tbl",h:["Cost Type","Definition","Examples","Treatment"],r:[["Product Costs","Costs to MAKE the product","DM, DL, MOH","Inventory → COGS when sold"],["Period Costs","All other costs — NOT manufacturing","Selling, G&A, interest","Expensed immediately"]]},
          {t:"h",v:"The Cost of Quality Framework — Integration"},
          {t:"p",v:"All costing methods must consider quality costs. Whether using job order, process, or ABC costing, prevention and appraisal costs are product costs while failure costs are typically period costs (unless internal failures occur during production)."},
          {t:"tip",v:"Exam Tips: Job Order = unique products. Process Costing = identical products. Operation Costing = hybrid (both). Normal Costing uses POHR — most common in practice. Standard Costing = budgeted costs used for variance analysis. Product costs = DM + DL + MOH only. Period costs = everything else. All three measurement methods end up at the same point: actual costs — they just get there differently."}
        ,
          {t:"h",v:"Single-Rate vs Dual-Rate Shared Service Allocation"},
          {t:"tbl",h:["Method","Fixed Costs","Variable Costs","Complexity"],r:[["Single-Rate","Combined — actual usage","Combined — actual usage","Simple"],["Dual-Rate","BUDGETED usage","ACTUAL usage","More accurate"]]},
          {t:"p",v:"Dual-Rate prevents a user department from reducing its fixed cost allocation by cutting actual usage — fixed costs are committed regardless of actual usage."},
          {t:"h",v:"Overhead Journal Entries — Complete Flow"},
          {t:"s",v:["1. Actual overhead: Dr. MOH Control / Cr. Cash/Payables/Accum Depreciation","2. Apply overhead: Dr. Work-in-Process / Cr. MOH Applied","3. Immaterial variance: Dr/Cr COGS","4. Material variance: Prorate to WIP, FG, and COGS"]},
          {t:"tip",v:"Exam Tips: Dual-Rate: fixed by BUDGETED, variable by ACTUAL. MOH Control = actual costs (Dr). MOH Applied = applied costs (Cr). Debit balance = under-applied. Credit balance = over-applied. Apply overhead: Dr. WIP / Cr. MOH Applied."}
        ],
        quizzes:[
          {q:"A company that makes both standardized shoes and custom finishes on each pair would MOST likely use:",o:["Pure Job Order Costing","Pure Process Costing","Operation Costing (Hybrid)","Activity-Based Costing"],a:2,e:"Operation Costing (Hybrid) is used when products are partially standardized (standardized production process — use process costing) but have some customization (custom finishing — use job order costing for that batch). Shoes are a classic example."},
          {q:"Under Normal Costing, overhead is applied using:",o:["Actual overhead rate x actual activity","Predetermined overhead rate x actual activity","Standard overhead rate x standard activity","Budgeted overhead rate x budgeted activity"],a:1,e:"Normal Costing: DM and DL at ACTUAL costs, Overhead at PREDETERMINED rate x ACTUAL activity. This provides timely product costs during the year without waiting for actual overhead to be known at year-end."},
          {q:"Standard Costing is MOST useful for:",o:["Tax reporting","External financial statements","Performance control and variance analysis","Calculating actual product costs"],a:2,e:"Standard Costing is primarily used for PERFORMANCE CONTROL — comparing actual costs to standard (budgeted) costs reveals VARIANCES that highlight inefficiencies or savings. It is the foundation of management control systems."},
          {q:"Under Actual Costing, the main DISADVANTAGE is:",o:["It requires too many journal entries","Overhead rates fluctuate and are only known at year-end","It ignores direct labor costs","It overstates product costs"],a:1,e:"Actual Costing's main disadvantage: actual overhead is only known at YEAR-END (after all overhead is incurred). This makes it impossible to know product costs during the year — too slow for timely pricing and decision-making."},
          {q:"Factory depreciation on production equipment is classified as:",o:["A period cost — expensed immediately","A product cost — manufacturing overhead","A period cost — selling expense","A product cost — direct labor"],a:1,e:"Factory depreciation is a PRODUCT COST — specifically Manufacturing Overhead. It is incurred in the factory to produce goods, so it flows through WIP → Finished Goods → COGS. (Office equipment depreciation would be a period cost.)"},
          {q:"Which costing method results in the MOST timely product cost information during the year?",o:["Actual Costing","Normal Costing","Standard Costing","Both Normal and Standard Costing"],a:3,e:"Both Normal and Standard Costing provide timely product costs because they use predetermined rates — overhead is applied throughout the year without waiting for actual totals. Actual Costing cannot provide product costs until year-end when actual overhead is known."},
          {q:"Sales commissions paid to the sales team are classified as:",o:["Product costs — part of COGS","Manufacturing overhead","Period costs — selling expense","Product costs — direct labor"],a:2,e:"Sales commissions are PERIOD COSTS — selling expenses. They are not related to manufacturing and are expensed in the period incurred. Only manufacturing costs (DM, DL, MOH) are product costs that flow through inventory."},
          {q:"Operation Costing (hybrid system) is appropriate when:",o:["All products are identical","All products are completely unique","Products share common processes but have different finishing/customization","The company has only one product"],a:2,e:"Operation Costing combines Process Costing (for common/standardized processing stages) with Job Order Costing (for unique customization batches). Ideal when products share most manufacturing steps but differ in some customization."},
          {q:"The DIFFERENCE between Normal and Standard Costing is:",o:["Normal uses actual DM/DL; Standard uses standard DM/DL","Normal uses predetermined overhead; Standard uses actual overhead","Normal costing does not calculate variances; Standard always does","They are identical in all respects"],a:0,e:"Normal Costing: Actual DM + Actual DL + (POHR x Actual Activity). Standard Costing: Standard DM + Standard DL + (Standard Rate x Standard Activity). The key difference is that Standard Costing uses STANDARD quantities and rates for ALL cost elements, enabling full variance analysis."},
          {q:"Product costs become expenses (COGS) when:",o:["They are incurred in the factory","They are paid in cash","The finished products are SOLD","The products are completed (moved to Finished Goods)"],a:2,e:"Product costs follow the inventory — they become COGS when products are SOLD, not when manufactured. They sit in WIP inventory (being made), then Finished Goods inventory (completed), then become COGS (sold). This is the matching principle."}
        ,
          {q:"The Dual-Rate method allocates fixed service costs based on:",o:["Actual usage","Budgeted usage","Equal shares","Total actual costs"],a:1,e:"Dual-Rate FIXED costs = allocated by BUDGETED usage. This reflects committed capacity and prevents distorted signals when actual usage fluctuates."},
          {q:"When overhead is applied to production, the journal entry is:",o:["Dr. MOH Control / Cr. Cash","Dr. WIP / Cr. MOH Applied","Dr. COGS / Cr. MOH","Dr. MOH Applied / Cr. WIP"],a:1,e:"Applying overhead: Dr. Work-in-Process / Cr. Manufacturing Overhead Applied. This transfers applied overhead into production costs."}
        ]},
      {id:"4-3",title:"Cost of Goods Sold and Manufactured (COGM)",dur:"25 min",
        blocks:[
          {t:"h",v:"The Manufacturing Cost Flow"},
          {t:"p",v:"Understanding how costs flow through a manufacturing company is fundamental to cost accounting. Costs flow through three inventory accounts before becoming an expense on the income statement."},
          {t:"f",l:"Cost Flow",v:"Raw Materials → Work-in-Process (WIP) → Finished Goods → Cost of Goods Sold"},
          {t:"h",v:"The Cost of Goods Manufactured (COGM) Statement"},
          {t:"s",v:["Start: Beginning WIP Inventory","+ Direct Materials Used (Beginning RM + Purchases - Ending RM)","+ Direct Labor","+ Manufacturing Overhead Applied","= Total Manufacturing Costs","+ Beginning WIP","- Ending WIP","= Cost of Goods Manufactured (COGM)"]},
          {t:"h",v:"Cost of Goods Sold (COGS) Calculation"},
          {t:"f",l:"COGS Formula",v:"COGS = Beginning Finished Goods + COGM - Ending Finished Goods"},
          {t:"h",v:"Full Example"},
          {t:"p",v:"Raw Materials: Beginning $10,000, Purchases $40,000, Ending $8,000. DL $25,000. MOH $15,000. WIP: Beginning $5,000, Ending $7,000. FG: Beginning $12,000, Ending $9,000."},
          {t:"s",v:["DM Used = $10,000 + $40,000 - $8,000 = $42,000","Total Mfg Costs = $42,000 + $25,000 + $15,000 = $82,000","COGM = $82,000 + $5,000 - $7,000 = $80,000","COGS = $12,000 + $80,000 - $9,000 = $83,000"]},
          {t:"h",v:"Prime Cost vs Conversion Cost"},
          {t:"tbl",h:["Cost Category","Components","Purpose"],r:[["Prime Cost","DM + DL","Direct/traceable manufacturing costs"],["Conversion Cost","DL + MOH","Costs to CONVERT RM into finished product"],["Total Product Cost","DM + DL + MOH","Full cost to manufacture a unit"]]},
          {t:"tip",v:"Exam Tips: COGM flows to COGS through Finished Goods. Three inventory accounts: Raw Materials → WIP → Finished Goods. Prime Cost = DM + DL. Conversion Cost = DL + MOH (DL appears in BOTH). Period costs (selling & admin) do NOT flow through inventory — expensed immediately. Manufacturing costs are ALWAYS product costs."}
        ,
          {t:"h",v:"Customer Life-Cycle Costing"},
          {t:"p",v:"Looks at total cost of ownership from the CUSTOMER'S perspective — all costs the buyer incurs during the entire time they own and use the product."},
          {t:"b",v:["Purchase price","Installation & setup","Operating costs (energy, supplies)","Maintenance & repairs over product life","Disposal / decommissioning at end of life"]},
          {t:"p",v:"Example: Machine costs $50,000. Over 10 years: energy $20,000, maintenance $15,000, disposal $5,000. Customer life-cycle cost = $90,000 — not just $50,000."},
          {t:"b",v:["A cheaper purchase price may have HIGHER operating costs → higher total cost of ownership","Companies use Customer LCC as a competitive tool: lowest total cost = selling point","Customer additional costs are NOT part of the company's life-cycle cost — they are separate"]},
          {t:"tip",v:"Exam Tips: Customer LCC = buyer's perspective (purchase + operating + maintenance + disposal). Company LCC = seller's perspective (R&D + design + manufacturing + marketing + support). Neither is required by GAAP — both are internal management tools."}
        ],
        quizzes:[
          {q:"The correct order of cost flow in manufacturing is:",o:["WIP → Raw Materials → Finished Goods → COGS","Raw Materials → Finished Goods → WIP → COGS","Raw Materials → WIP → Finished Goods → COGS","Finished Goods → WIP → Raw Materials → COGS"],a:2,e:"Costs flow: Raw Materials (purchased) → WIP (during production — DM + DL + MOH added) → Finished Goods (completed) → COGS (when sold)."},
          {q:"Beginning RM $8,000. Purchases $35,000. Ending RM $6,000. Direct Materials Used =",o:["$29,000","$37,000","$41,000","$43,000"],a:1,e:"DM Used = Beginning RM + Purchases - Ending RM = $8,000 + $35,000 - $6,000 = $37,000."},
          {q:"Total Mfg Costs $90,000. Beginning WIP $10,000. Ending WIP $14,000. COGM =",o:["$76,000","$86,000","$94,000","$104,000"],a:1,e:"COGM = Total Mfg Costs + Beginning WIP - Ending WIP = $90,000 + $10,000 - $14,000 = $86,000."},
          {q:"COGM $75,000. Beginning FG $20,000. Ending FG $15,000. COGS =",o:["$70,000","$80,000","$75,000","$110,000"],a:1,e:"COGS = Beginning FG + COGM - Ending FG = $20,000 + $75,000 - $15,000 = $80,000."},
          {q:"Conversion Cost includes:",o:["DM + DL","DL + MOH","DM + MOH","DM + DL + MOH"],a:1,e:"Conversion Cost = Direct Labor + Manufacturing Overhead. These are the costs to CONVERT raw materials into finished products. DM is excluded because it is the material being converted, not the conversion cost itself."},
          {q:"Prime Cost includes:",o:["DM + DL","DL + MOH","DM + MOH","DM + DL + MOH"],a:0,e:"Prime Cost = Direct Materials + Direct Labor. These are the PRIMARY direct costs that can be traced to the product. MOH is excluded because it is indirect and must be allocated."},
          {q:"Selling expenses and administrative salaries are:",o:["Product costs — go through WIP","Product costs — go through Finished Goods","Period costs — expensed immediately","Manufacturing overhead — allocated to products"],a:2,e:"Selling and administrative costs are PERIOD COSTS — expensed in the period incurred, NOT added to inventory. Only manufacturing costs (DM, DL, MOH) are product costs that flow through inventory."},
          {q:"DM Used $30,000. DL $20,000. MOH $15,000. Beginning WIP $8,000. Ending WIP $12,000. COGM =",o:["$61,000","$65,000","$69,000","$73,000"],a:0,e:"Total Mfg Costs = $30,000 + $20,000 + $15,000 = $65,000. COGM = $65,000 + $8,000 - $12,000 = $61,000."},
          {q:"Which of the following is a PRODUCT cost?",o:["Sales commissions","CEO salary","Factory supervisor salary","Advertising expense"],a:2,e:"Factory supervisor salary is a PRODUCT cost (manufacturing overhead) — it is incurred in the factory to produce goods. Sales commissions, CEO salary, and advertising are period costs expensed immediately."},
          {q:"Direct Labor appears in both:",o:["COGM and COGS","Prime Cost and Conversion Cost","Fixed and Variable costs","Product and Period costs"],a:1,e:"Direct Labor is included in BOTH Prime Cost (DM + DL) AND Conversion Cost (DL + MOH). It is the only cost that appears in both categories, which is why it is sometimes called a 'bridge' cost."}
        ,
          {q:"Customer life-cycle costing focuses on:",o:["The manufacturer's production costs","Total cost the customer incurs over ownership","Only the purchase price","Product development and design costs"],a:1,e:"Customer life-cycle costing = BUYER's perspective — total costs during ownership: purchase price + installation + operating costs + maintenance + disposal. Manufacturer's development costs are NOT included."},
          {q:"A customer buys equipment for $50,000. Over 5 years: operating costs $30,000, maintenance $10,000, disposal $5,000. Customer life-cycle cost =",o:["$50,000","$80,000","$90,000","$95,000"],a:3,e:"Customer LCC = $50,000 + $30,000 + $10,000 + $5,000 = $95,000. The total cost of ownership is nearly double the purchase price — this is why customers should consider life-cycle cost, not just purchase price."}
        ]},
      {id:"4-4",title:"Joint Product Costing",dur:"30 min",
        blocks:[
          {t:"h",v:"What Are Joint Products?"},
          {t:"p",v:"Joint products arise from a SINGLE production process that simultaneously produces TWO OR MORE products. The costs incurred before the split-off point are called JOINT COSTS and cannot be directly traced to individual products."},
          {t:"f",l:"Key Terms",v:"Split-off Point: Where joint products become separately identifiable | Joint Costs: Costs incurred BEFORE split-off | Separable Costs: Costs incurred AFTER split-off for a specific product"},
          {t:"h",v:"Methods of Allocating Joint Costs"},
          {t:"tbl",h:["Method","Basis","Formula","Best For"],r:[["Physical Units","Volume (lbs, gallons)","Joint Cost x (Product Units / Total Units)","Simple, same physical measure"],["Sales Value at Split-off","Market value at split-off","Joint Cost x (Product Sales Value / Total Sales Value)","Most common — reflects economic value"],["Net Realizable Value (NRV)","Final sales price - separable costs","Joint Cost x (Product NRV / Total NRV)","When products need further processing"],["Constant Gross Margin %","Maintains same gross margin for all","More complex calculation","Rare on exams"]]},
          {t:"h",v:"Sales Value at Split-off Example"},
          {t:"p",v:"Joint costs $90,000. Product A: 1,000 units at $60/unit = $60,000. Product B: 1,000 units at $40/unit = $40,000. Total = $100,000."},
          {t:"s",v:["Product A allocation = $90,000 x ($60,000/$100,000) = $54,000","Product B allocation = $90,000 x ($40,000/$100,000) = $36,000"]},
          {t:"h",v:"Should We Process Further? — Sell or Process Decision"},
          {t:"f",l:"Process Further Rule",v:"Process further ONLY if: Incremental Revenue > Incremental Separable Costs | Joint costs are IRRELEVANT (sunk costs)"},
          {t:"p",v:"Example: Product X sells at split-off for $50. Can be processed further for $20 more to sell at $80. Incremental revenue = $30. Incremental cost = $20. Profit = $10. → Process further!"},
          {t:"h",v:"By-Products"},
          {t:"b",v:["By-products: Minor outputs from joint production with relatively low sales value","Two accounting methods:","1. Net Realizable Value Method: By-product NRV reduces joint costs allocated to main products","2. Production Method: By-product recognized as revenue when produced"]},
          {t:"tip",v:"Exam Tips: Joint costs are SUNK at split-off — NEVER relevant for sell-or-process decisions. Only INCREMENTAL revenues and costs after split-off matter. Sales Value at Split-off is the most common allocation method. NRV method: NRV = Final Price - Separable Costs. By-products have LOW relative value. Physical units method ignores market value — may distort profitability."}
        ,
          {t:"h",v:"Constant Gross Margin % Method"},
          {t:"p",v:"Allocates joint costs so ALL products end up with the SAME gross margin percentage as the overall combined gross margin."},
          {t:"s",v:["Step 1: Overall GM% = (Total Revenue - Total Costs) / Total Revenue","Step 2: Each product's Gross Profit = Revenue x GM%","Step 3: Each product's COGS = Revenue - Gross Profit","Step 4: Joint cost allocation = COGS - Separable costs"]},
          {t:"p",v:"Example: Joint costs $100,000. Product A: revenue $120,000, separable $10,000. Product B: revenue $80,000, separable $15,000. Total costs = $125,000. GM% = $75,000/$200,000 = 37.5%. Product A COGS = $120,000 x 62.5% = $75,000. Joint cost A = $75,000 - $10,000 = $65,000."},
          {t:"h",v:"By-Product Journal Entries — Production vs Sales Method"},
          {t:"tbl",h:["Step","Production Method","Sales Method"],r:[["At production","Dr. By-Product Inventory (NRV) | Cr. WIP — Main Product","No entry"],["Transfer to FG","Dr. FG (reduced cost) | Cr. WIP","Dr. FG (full cost) | Cr. WIP"],["At sale","Dr. Cash | Cr. By-Product Inventory + Gain","Dr. Cash | Cr. Other Income"]]},
          {t:"tip",v:"Exam Tips: Constant GM% = all products get same gross margin %. Production Method = by-product NRV reduces main product cost at production. Sales Method = recognized as income when sold. By-product NRV = Sales Price - Additional Processing Costs."}
        ],
        quizzes:[
          {q:"Joint costs are costs incurred:",o:["After the split-off point","Before the split-off point","Only for by-products","For marketing and distribution"],a:1,e:"Joint costs are incurred BEFORE the split-off point during the single process that produces all joint products simultaneously. They cannot be directly traced to individual products."},
          {q:"The split-off point is:",o:["Where products are sold","Where joint products become separately identifiable","Where by-products are separated from waste","The break-even point for joint production"],a:1,e:"The split-off point is where two or more joint products BECOME SEPARATELY IDENTIFIABLE and can be sold separately or processed further."},
          {q:"Joint costs $120,000. Product A NRV $80,000. Product B NRV $40,000. Joint costs allocated to A =",o:["$40,000","$60,000","$80,000","$90,000"],a:2,e:"NRV method: Total NRV = $80,000 + $40,000 = $120,000. Product A allocation = $120,000 x ($80,000/$120,000) = $80,000."},
          {q:"In a sell-or-process-further decision, joint costs are:",o:["Relevant — should be included","Irrelevant — sunk costs","Relevant only if large","Relevant if allocated using NRV"],a:1,e:"Joint costs are SUNK COSTS at the split-off point — they have already been incurred and cannot be changed. They are ALWAYS IRRELEVANT in sell-or-process decisions. Only incremental revenues and costs matter."},
          {q:"Product sells at split-off for $100. Processing further costs $30 extra and sells for $145. Decision:",o:["Sell at split-off — more profitable","Process further — $15 additional profit","Process further — $45 additional profit","Cannot determine without joint costs"],a:1,e:"Incremental revenue = $145 - $100 = $45. Incremental cost = $30. Incremental profit = $45 - $30 = $15. Process further is profitable by $15. Joint costs are irrelevant."},
          {q:"The Sales Value at Split-off method allocates joint costs based on:",o:["Units produced","NRV after further processing","Market value at the split-off point","Physical weight of each product"],a:2,e:"Sales Value at Split-off allocates joint costs based on the RELATIVE MARKET VALUE of each product at the split-off point. It is the most widely used and exam-tested method."},
          {q:"Joint costs $50,000. Product A: 500 units. Product B: 1,500 units. Physical units method — Product A allocation =",o:["$12,500","$37,500","$25,000","$10,000"],a:0,e:"Physical units: Total = 500 + 1,500 = 2,000 units. Product A = $50,000 x (500/2,000) = $50,000 x 25% = $12,500."},
          {q:"By-products are characterized by:",o:["High relative sales value","Low relative sales value","Equal importance to main products","Always requiring further processing"],a:1,e:"By-products have RELATIVELY LOW sales value compared to the main products. They emerge from the same production process but are secondary outputs. Their low value is what distinguishes them from joint products."},
          {q:"Separable costs are costs incurred:",o:["Before split-off","During joint processing","After split-off for a specific product","For all joint products together"],a:2,e:"Separable costs are incurred AFTER the split-off point for a specific individual product — such as additional processing, packaging, or marketing for just one of the joint products."},
          {q:"Which joint cost allocation method is MOST useful when products require different amounts of further processing?",o:["Physical Units","Sales Value at Split-off","Net Realizable Value (NRV)","Constant Gross Margin %"],a:2,e:"NRV (Net Realizable Value) is best when products require different amounts of further processing. NRV = Final Sales Price - Separable Costs, which accounts for the different processing costs each product needs after split-off."}
        ,
          {q:"The Constant Gross Margin % method ensures that:",o:["Each product has the same total cost","Each product has the same gross margin %","Each product has the same NRV","Each product has the same unit cost"],a:1,e:"Constant Gross Margin % allocates joint costs so ALL products end up with the SAME gross margin percentage as the overall combined gross margin. It works backward from the overall GM%."},
          {q:"Under the Production Method, when a by-product is produced:",o:["No entry is made","By-product NRV is recorded as Other Income","By-product NRV reduces the main product cost","By-product is expensed immediately"],a:2,e:"Production Method: Dr. By-Product Inventory (NRV) / Cr. WIP — Main Product. This REDUCES the main product's cost by the by-product's NRV at the time of production."},
          {q:"Under the Sales Method of by-product accounting:",o:["By-product NRV reduces main product cost at production","No entry until by-product is sold","By-product is treated as a joint product","By-product costs are ignored"],a:1,e:"Sales Method: NO entry when by-product is produced. When SOLD, proceeds are recorded as Other Income. Joint costs remain fully assigned to the main product until the by-product is sold."}
        ]},
      {id:"4-5",title:"Byproduct Costing",dur:"25 min",
        blocks:[
          {t:"h",v:"What Are By-Products?"},
          {t:"p",v:"By-products are LOW-VALUE outputs that arise naturally from producing the main product. They emerge from the same joint production process but have relatively minor economic significance compared to the main product."},
          {t:"b",v:["By-products have LOW relative sales value compared to main products","Emerge from the same production process — cannot be separately produced","Examples: sawdust from lumber, molasses from sugar refining, glycerin from soap production"]},
          {t:"h",v:"Net Realizable Value (NRV) of By-Product"},
          {t:"f",l:"NRV Formula",v:"NRV = Estimated Sales Price - Additional Processing Costs after Split-off"},
          {t:"h",v:"Method 1: Production Method (Recognized at Production)"},
          {t:"p",v:"By-product NRV is recognized as soon as it is PRODUCED and DEDUCTED from the main product's cost."},
          {t:"tbl",h:["Step","Journal Entry"],r:[["Record joint manufacturing costs","Dr. WIP – Joint 200,000 | Cr. Materials/Labor/OH 200,000"],["Recognize by-product at production","Dr. Inventory – By-Product (NRV) 12,000 | Cr. WIP – Main Product 12,000"],["Transfer main product to FG","Dr. FG – Main Product 188,000 | Cr. WIP 188,000"],["Sell by-product","Dr. Cash 15,000 | Cr. By-Product Inventory 12,000 | Cr. Revenue/Gain 3,000"]]},
          {t:"h",v:"Method 2: Sales Method (Recognized at Sale)"},
          {t:"p",v:"No entry is made for by-product until it is SOLD. Joint costs remain fully assigned to the main product."},
          {t:"tbl",h:["Step","Journal Entry"],r:[["Record joint costs","Dr. WIP 200,000 | Cr. Materials/Labor/OH 200,000"],["Transfer to FG","Dr. FG – Main Product 200,000 | Cr. WIP 200,000"],["Sell by-product","Dr. Cash 15,000 | Cr. Other Income 15,000"],["Processing costs","Dr. Processing Expense 3,000 | Cr. Cash 3,000"]]},
          {t:"h",v:"Production Method vs Sales Method — Key Differences"},
          {t:"tbl",h:["Feature","Production Method","Sales Method"],r:[["When recognized","At time of PRODUCTION","At time of SALE"],["Effect on main product","Reduces main product cost","No effect on main product cost"],["Inventory","By-product shown as inventory","No by-product inventory recorded"],["Income timing","Revenue matched to production","Revenue matched to sale"]]},
          {t:"tip",v:"Exam Tips: By-products = LOW relative value. NRV = Sales Price - Additional Processing Costs. Production Method: Dr. By-Product Inventory / Cr. WIP (reduces main product cost). Sales Method: no entry until sold, then Other Income. Main difference: WHEN recognized."}
        ],
        quizzes:[
          {q:"By-products are characterized by:",o:["High relative sales value","Low relative sales value","Equal importance to main products","Always requiring further processing"],a:1,e:"By-products have RELATIVELY LOW sales value compared to main products. They emerge from the same production process but are secondary outputs — their low value distinguishes them from joint products."},
          {q:"Under the Production Method, when a by-product is produced:",o:["No entry is made","By-product NRV is recorded as Other Income","By-product NRV reduces the main product's cost","By-product is expensed immediately"],a:2,e:"Production Method: Dr. By-Product Inventory (NRV) / Cr. WIP — Main Product. The main product's cost is REDUCED by the by-product's NRV at the time of production."},
          {q:"Under the Sales Method of by-product accounting:",o:["By-product NRV reduces main product cost at production","No entry until by-product is sold","By-product is treated as a joint product","By-product costs are ignored"],a:1,e:"Sales Method: NO entry when by-product is produced. When SOLD, proceeds are recorded as Other Income. Joint costs remain fully assigned to the main product."},
