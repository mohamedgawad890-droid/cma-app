<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CBQ Practice — CMA Part 1</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#0C447C">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f0eb;color:#1a1a1a;overscroll-behavior:none}
#app{display:flex;flex-direction:column;height:100vh;max-width:600px;margin:0 auto;background:#fff;position:relative;overflow:hidden}
@media(min-width:620px){#app{border-radius:16px;margin:16px auto;height:calc(100vh - 32px);box-shadow:0 8px 40px rgba(0,0,0,.12)}}
@media(min-width:900px){body{background:#dde3ea}#app{flex-direction:row;max-width:1280px;border-radius:16px;margin:16px auto;height:calc(100vh - 32px)}#sidebar{display:flex!important;flex-direction:column;width:200px;min-width:200px;border-right:.5px solid #e0e0d8;padding:16px 8px;overflow-y:auto;flex-shrink:0}.content{flex:1;min-width:0;overflow:hidden;display:flex;flex-direction:column}}
#sidebar{display:none}
.brand{padding:8px 14px 16px;border-bottom:.5px solid #e0e0d8;margin-bottom:8px}
.brand-name{font-size:15px;font-weight:700;color:#0C447C}
.brand-sub{font-size:12px;color:#888;margin-top:2px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;cursor:pointer;font-size:14px;color:#555;border:none;background:none;width:100%;text-align:left;font-family:inherit;transition:all .15s}
.nav-item:hover{background:#f5f5f0}
.nav-item.active{background:#E6F1FB;color:#0C447C;font-weight:500}
.content{flex:1;overflow:hidden;display:flex;flex-direction:column}
.header{padding:14px 16px 12px;border-bottom:.5px solid #e0e0d8;flex-shrink:0;background:#fff}
.header-top{display:flex;align-items:center;gap:10px}
.back-btn{background:none;border:none;cursor:pointer;font-size:26px;color:#888;padding:0;line-height:1;font-family:inherit;flex-shrink:0}
.header-title{font-size:17px;font-weight:600;color:#1a1a1a;flex:1}
.header-sub{font-size:13px;color:#888;margin-top:3px}
.sec-tabs{display:flex;gap:6px;padding:10px 16px;background:#fff;border-bottom:.5px solid #e0e0d8;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
.sec-tabs::-webkit-scrollbar{display:none}
.sec-tab{padding:6px 14px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;border:none;font-family:inherit;transition:all .15s}
.sec-tab.active{background:#0C447C;color:#fff}
.sec-tab:not(.active){background:#f0f0eb;color:#555}
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:20px}
/* CBQ List */
.cbq-list{padding:12px 16px}
.cbq-card{background:#fff;border:.5px solid #e0e0d8;border-radius:14px;padding:16px;margin-bottom:10px;cursor:pointer;transition:all .2s}
.cbq-card:hover{border-color:#185FA5;box-shadow:0 2px 12px rgba(24,95,165,.1)}
.cbq-card-top{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.cbq-num{width:38px;height:38px;border-radius:10px;background:#E6F1FB;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#0C447C;flex-shrink:0}
.cbq-badge{padding:4px 10px;border-radius:20px;font-size:12px;font-weight:500}
/* Case */
.case-box{background:#f8f8f6;border:.5px solid #e0e0d8;border-radius:12px;padding:16px;margin:12px 16px 0}
.case-label{font-size:11px;font-weight:700;color:#185FA5;letter-spacing:.8px;margin-bottom:8px}
.case-text{font-size:14px;color:#444;line-height:1.7}
.exhibit-wrap{overflow-x:auto;margin-top:12px;border-radius:8px;border:.5px solid #d0d0d8}
.exhibit-tbl{width:100%;border-collapse:collapse;font-size:13px}
.exhibit-tbl th{padding:8px 12px;text-align:left;font-weight:600;background:#E6F1FB;color:#0C447C;border-bottom:1px solid #c0d4ea}
.exhibit-tbl td{padding:7px 12px;border-bottom:.5px solid #e0e0d8;color:#444}
.exhibit-tbl .num{text-align:right;font-family:'Courier New',monospace}
/* Questions */
.q-block{margin:14px 16px 0;border:.5px solid #e0e0d8;border-radius:12px;overflow:hidden}
.q-header{padding:12px 14px;background:#fafaf8;border-bottom:.5px solid #e0e0d8;display:flex;gap:10px;align-items:flex-start}
.q-num{width:24px;height:24px;border-radius:50%;background:#185FA5;color:#fff;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.q-type-badge{font-size:10px;padding:2px 8px;border-radius:10px;background:#EEEDFE;color:#534AB7;font-weight:700;letter-spacing:.5px;flex-shrink:0;margin-top:3px}
.q-text{font-size:14px;color:#1a1a1a;line-height:1.55;font-weight:500;flex:1}
.q-body{padding:12px 14px}
/* Calc */
.calc-wrap{display:flex;align-items:center;gap:8px}
.calc-prefix{font-size:16px;color:#555;font-weight:500}
.calc-input{border:.5px solid #d0d0d8;border-radius:8px;padding:10px 12px;font-size:16px;font-family:'Courier New',monospace;color:#1a1a1a;background:#fafaf8;outline:none;width:170px;text-align:right;transition:border-color .15s}
.calc-input:focus{border-color:#185FA5;background:#fff}
.calc-input.correct{border-color:#639922;background:#EAF3DE;color:#27500A}
.calc-input.wrong{border-color:#E24B4A;background:#FCEBEB;color:#791F1F}
/* Select */
.select-opts{display:flex;flex-direction:column;gap:7px}
.select-opt{padding:11px 14px;border-radius:8px;border:.5px solid #d0d0d8;cursor:pointer;font-size:14px;color:#444;transition:all .15s;background:#fafaf8;user-select:none;line-height:1.4}
.select-opt:hover{border-color:#185FA5;background:#f0f6ff}
.select-opt.selected{border-color:#185FA5;background:#E6F1FB;color:#0C447C;font-weight:500}
.select-opt.correct{border-color:#639922;background:#EAF3DE;color:#27500A;font-weight:500}
.select-opt.wrong{border-color:#E24B4A;background:#FCEBEB;color:#791F1F}
/* Drag */
.drag-source{display:flex;flex-wrap:wrap;gap:7px;padding:8px 0 12px}
.drag-area{display:flex;gap:10px;flex-wrap:wrap}
.drag-col{flex:1;min-width:120px}
.drag-col-label{font-size:11px;font-weight:700;color:#888;letter-spacing:.5px;margin-bottom:7px;text-align:center}
.drop-zone{min-height:46px;border:1.5px dashed #c0c8d8;border-radius:8px;padding:6px;background:#fafaf8;transition:all .2s;display:flex;flex-direction:column;gap:5px}
.drop-zone.over{border-color:#185FA5;background:#EEF5FF}
.drop-zone.correct{border-color:#639922;border-style:solid;background:#EAF3DE}
.drop-zone.wrong{border-color:#E24B4A;border-style:solid;background:#FCEBEB}
.drag-chip{padding:7px 11px;border-radius:7px;background:#E6F1FB;color:#0C447C;font-size:13px;font-weight:500;cursor:grab;user-select:none;border:.5px solid #b0c8e0;text-align:center;touch-action:none}
.drag-chip:active{cursor:grabbing}
/* Blank */
.blank-sentence{font-size:14px;color:#444;line-height:2}
.blank-sel{border:.5px solid #185FA5;border-radius:6px;padding:4px 8px;font-size:13px;font-family:inherit;color:#0C447C;background:#E6F1FB;outline:none;cursor:pointer;font-weight:500}
.blank-sel.correct{border-color:#639922;background:#EAF3DE;color:#27500A}
.blank-sel.wrong{border-color:#E24B4A;background:#FCEBEB;color:#791F1F}
/* Feedback */
.q-fb{margin-top:10px;padding:10px 12px;border-radius:8px;font-size:13px;line-height:1.55;display:none}
.q-fb.show{display:block}
.q-fb.ok{background:#EAF3DE;border-left:3px solid #639922;color:#27500A}
.q-fb.no{background:#FCEBEB;border-left:3px solid #E24B4A;color:#791F1F}
/* Bottom */
.bottom-bar{padding:12px 16px;border-top:.5px solid #e0e0d8;background:#fff;flex-shrink:0;display:flex;gap:10px;align-items:center}
.btn{padding:13px;border-radius:10px;font-size:15px;cursor:pointer;font-weight:600;border:none;font-family:inherit;transition:opacity .15s;flex:1}
.btn:active{opacity:.8}
.btn-primary{background:#185FA5;color:#fff}
.btn-success{background:#639922;color:#fff}
.score-pill{background:#E6F1FB;border-radius:20px;padding:6px 14px;font-size:13px;font-weight:700;color:#0C447C;white-space:nowrap;flex-shrink:0}
/* Results */
.res-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:16px 0}
.res-stat{background:#f5f5f0;border-radius:10px;padding:12px 8px;text-align:center}
.res-stat-l{font-size:11px;color:#888;margin-bottom:4px}
.res-stat-v{font-size:22px;font-weight:700}
.hidden{display:none!important}
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div class="brand"><div class="brand-name">CMA PREP</div><div class="brand-sub">by Gawad</div></div>
    <button class="nav-item" onclick="location.href='./index.html'"><span style="font-size:18px">📚</span> Back to App</button>
    <button class="nav-item active"><span style="font-size:18px">🧩</span> CBQ Practice</button>
  </div>
  <div class="content">
    <div class="header">
      <div class="header-top">
        <button class="back-btn" onclick="goBack()">‹</button>
        <div><div class="header-title" id="hTitle">🧩 CBQ Practice</div><div class="header-sub" id="hSub">Case-Based Questions — New 2026 Format</div></div>
      </div>
    </div>
    <div class="sec-tabs" id="secTabs">
      <button class="sec-tab active" onclick="setSection(0)">📊 Section C</button>
      <button class="sec-tab" onclick="setSection(1)">💰 Section D</button>
      <button class="sec-tab" onclick="setSection(2)">📋 Section A</button>
      <button class="sec-tab" onclick="setSection(3)">📅 Section B</button>
      <button class="sec-tab" onclick="setSection(4)">🔒 Section E</button>
      <button class="sec-tab" onclick="setSection(5)">💡 Section F</button>
    </div>
    <div class="scroll-area" id="scrollArea">
      <div id="listView"></div>
      <div id="detailView" class="hidden"></div>
      <div id="resultsView" class="hidden"></div>
    </div>
    <div class="bottom-bar hidden" id="bottomBar">
      <span class="score-pill" id="scorePill">0 / 0</span>
      <button class="btn btn-primary" id="mainBtn" onclick="mainAction()">Check Answers</button>
    </div>
  </div>
</div>
<script>
// ════════════════════════════════════════════════════════════════
// DATA — Section C: Performance Management (5 CBQs)
// ════════════════════════════════════════════════════════════════
const DATA = {
  C:[
    // ── CBQ 1: Variance Analysis ──────────────────────────────
    {id:'C1',num:1,title:'Variance Analysis — NovaTech Manufacturing',topics:'DM Variance · DL Variance · Responsibility',
     case:'NovaTech Manufacturing produces industrial control panels using a standard costing system. For November, the production department completed 4,000 units.\n\nThe purchasing manager bought materials from a new supplier at a lower price. However, the production manager reports that workers used more material and more hours than standard due to machine setup issues.\n\nThe CFO needs a complete variance analysis to identify deviations and assign responsibility.',
     exhibit:{headers:['Item','Standard','Actual'],rows:[['Units Produced','4,000','4,000'],['DM per unit','2.5 kg @ $8.00/kg','2.8 kg @ $7.50/kg'],['DL per unit','1.5 hrs @ $20.00/hr','1.7 hrs @ $20.50/hr'],['Fixed OH','$48,000','$51,200']]},
     questions:[
      {type:'calc',id:'C1Q1',text:'Calculate the DM Price Variance for November.',hint:'(AP − SP) × AQ purchased. AQ = 4,000 × 2.8',exact:5600,tol:10,pre:'$',suf:'',fb:'DM Price Variance = (AP − SP) × AQ = ($7.50 − $8.00) × 11,200 kg = −$0.50 × 11,200 = $5,600 Favorable. Cheaper purchase price = favorable.'},
      {type:'calc',id:'C1Q2',text:'Calculate the DM Quantity Variance.',hint:'(AQ used − SQ allowed) × SP',exact:9600,tol:10,pre:'$',suf:'',fb:'DM Qty Variance = (AQ − SQ) × SP = (11,200 − 10,000) × $8.00 = $9,600 Unfavorable. More material used than standard.'},
      {type:'calc',id:'C1Q3',text:'Calculate the DL Rate Variance.',hint:'(AR − SR) × AH. AH = 4,000 × 1.7',exact:3400,tol:10,pre:'$',suf:'',fb:'DL Rate Variance = (AR − SR) × AH = ($20.50 − $20.00) × 6,800 hrs = $3,400 Unfavorable. Paid more per hour than standard.'},
      {type:'select',id:'C1Q4',text:'The DM Price Variance responsibility belongs to:',opts:['Production Manager','Purchasing Manager','Plant Superintendent','CFO'],ans:1,fb:'The Purchasing Manager negotiates and controls the price paid for materials, making them responsible for the Price Variance.'},
      {type:'drag',id:'C1Q5',text:'Classify each variance as Favorable (F) or Unfavorable (U):',items:['DM Price Variance','DM Qty Variance','DL Rate Variance','DL Efficiency Variance'],zones:['Favorable','Unfavorable'],correct:{'DM Price Variance':'Favorable','DM Qty Variance':'Unfavorable','DL Rate Variance':'Unfavorable','DL Efficiency Variance':'Unfavorable'},fb:'DM Price: Favorable (cheaper). DM Qty: Unfavorable (more used). DL Rate: Unfavorable (higher hourly pay). DL Efficiency: Unfavorable (more hours used).'},
      {type:'blank',id:'C1Q6',text:'The DM Quantity Variance is the responsibility of the [B1], because it reflects the efficiency of [B2] usage in production.',blanks:[{id:'B1',opts:['Purchasing Manager','Production Manager','CFO'],ans:'Production Manager'},{id:'B2',opts:['labor','material','overhead'],ans:'material'}],fb:'The Production Manager controls shop floor operations, including how efficiently materials are consumed.'},
     ]},
    // ── CBQ 2: ROI vs Residual Income ─────────────────────────
    {id:'C2',num:2,title:'ROI vs. Residual Income — Apex Group',topics:'ROI · Residual Income · Goal Congruence',
     case:'Apex Group operates two independent divisions evaluated on ROI. The CFO suspects that the ROI system is causing goal incongruence — managers are rejecting investments that would benefit the overall company.\n\nA new project requires $500,000 investment and generates $70,000 in annual operating income. The required rate of return for both divisions is 12%.',
     exhibit:{headers:['','Division Alpha','Division Beta'],rows:[['Assets Employed','$5,000,000','$2,000,000'],['Operating Income','$700,000','$260,000'],['New Project — Investment','$500,000','$500,000'],['New Project — Income','$70,000','$70,000']]},
     questions:[
      {type:'calc',id:'C2Q1',text:'What is Division Alpha\'s current ROI?',hint:'Operating Income ÷ Assets Employed',exact:14,tol:0.1,pre:'',suf:'%',fb:'ROI = $700,000 ÷ $5,000,000 = 14%'},
      {type:'calc',id:'C2Q2',text:'What is Division Alpha\'s current Residual Income (RI)?',hint:'Operating Income − (Assets × Required Rate)',exact:100000,tol:10,pre:'$',suf:'',fb:'RI = $700,000 − ($5,000,000 × 12%) = $700,000 − $600,000 = $100,000'},
      {type:'calc',id:'C2Q3',text:'What is the RI of the new project alone?',hint:'Project Income − (Investment × Required Rate)',exact:10000,tol:10,pre:'$',suf:'',fb:'Project RI = $70,000 − ($500,000 × 12%) = $70,000 − $60,000 = $10,000 Positive → adds value.'},
      {type:'select',id:'C2Q4',text:'If Alpha is measured by ROI, will the manager accept the new project? (Project ROI = 14%)',opts:['Yes — 14% ROI is high enough to accept','No — it will dilute the division ROI if combined average falls','Yes — positive ROI always accepted','No — ROI is below the hurdle rate'],ans:1,fb:'New combined ROI = ($700K+$70K) ÷ ($5M+$500K) = $770K ÷ $5.5M = 14.0%. Barely changes, but the fear of dilution causes managers to reject. At higher current ROI, managers reject anything that pulls their metric down.'},
      {type:'select',id:'C2Q5',text:'Which metric better aligns divisional managers with company goals?',opts:['ROI — easy percentage comparison','Residual Income — accepts any project earning above the hurdle rate','ROI — penalizes large assets','Both are equally effective'],ans:1,fb:'RI promotes goal congruence: accept any project with positive RI (earns above required rate) = good for the company. ROI creates dysfunctional behavior when current ROI exceeds the hurdle rate.'},
      {type:'blank',id:'C2Q6',text:'When a division\'s ROI already [B1] the required rate, managers tend to [B2] projects that earn above the hurdle rate, harming the company.',blanks:[{id:'B1',opts:['is below','exceeds','equals'],ans:'exceeds'},{id:'B2',opts:['accept','reject','delay'],ans:'reject'}],fb:'This is the classic goal incongruence problem: high-performing divisions (ROI > hurdle) reject value-creating projects that would dilute their metric. RI solves this.'},
     ]},
    // ── CBQ 3: EVA & DuPont ──────────────────────────────────
    {id:'C3',num:3,title:'EVA & DuPont Analysis — Meridian Corp',topics:'EVA · WACC · DuPont ROI',
     case:'Meridian Corp is a listed manufacturer. The board wants to know if the company is creating shareholder value.\n\nCapital structure: 60% equity (cost 14%) and 40% debt (after-tax cost 6%). Net Sales = $8,000,000. NOPAT = $520,000. Net Income = $480,000. Total Assets (= Invested Capital) = $4,000,000.',
     exhibit:{headers:['Item','Amount'],rows:[['Net Sales','$8,000,000'],['NOPAT','$520,000'],['Net Income','$480,000'],['Invested Capital','$4,000,000'],['Equity (60%)','@ 14%'],['Debt (40%)','@ 6% after-tax']]},
     questions:[
      {type:'calc',id:'C3Q1',text:'Calculate WACC.',hint:'(Wd × Kd) + (We × Ke)',exact:10.8,tol:0.1,pre:'',suf:'%',fb:'WACC = (40% × 6%) + (60% × 14%) = 2.4% + 8.4% = 10.8%'},
      {type:'calc',id:'C3Q2',text:'Calculate EVA.',hint:'NOPAT − (WACC × Invested Capital)',exact:88000,tol:10,pre:'$',suf:'',fb:'EVA = $520,000 − (10.8% × $4,000,000) = $520,000 − $432,000 = $88,000'},
      {type:'select',id:'C3Q3',text:'The EVA of $88,000 means:',opts:['Meridian is destroying value (WACC > NOPAT)','Meridian is creating value — it earns more than its cost of capital','Meridian is breaking even','EVA needs market price to interpret'],ans:1,fb:'Positive EVA = value created. Meridian earns $88,000 more than what investors require. EVA > 0 → good for shareholders.'},
      {type:'calc',id:'C3Q4',text:'Calculate Asset Turnover (DuPont component).',hint:'Net Sales ÷ Total Assets',exact:2,tol:0.05,pre:'',suf:'x',fb:'Asset Turnover = $8,000,000 ÷ $4,000,000 = 2.0x'},
      {type:'drag',id:'C3Q5',text:'Match each formula to its DuPont component:',items:['Net Income ÷ Sales','Sales ÷ Total Assets','Profit Margin × Asset Turnover'],zones:['Profit Margin','Asset Turnover','DuPont ROI'],correct:{'Net Income ÷ Sales':'Profit Margin','Sales ÷ Total Assets':'Asset Turnover','Profit Margin × Asset Turnover':'DuPont ROI'},fb:'Profit Margin = Net Income ÷ Sales. Asset Turnover = Sales ÷ Assets. DuPont ROI = Profit Margin × Asset Turnover.'},
      {type:'blank',id:'C3Q6',text:'EVA uses [B1] (not Net Income) and [B2] as the cost of capital, making it more comprehensive than simple RI.',blanks:[{id:'B1',opts:['NOPAT','EBIT','Gross Profit'],ans:'NOPAT'},{id:'B2',opts:['WACC','Required Rate of Return','Cost of Equity'],ans:'WACC'}],fb:'EVA = NOPAT − (WACC × Invested Capital). NOPAT removes tax distortions. WACC reflects both debt and equity costs.'},
     ]},
    // ── CBQ 4: Balanced Scorecard ────────────────────────────
    {id:'C4',num:4,title:'Balanced Scorecard — Sunrise Hospital Group',topics:'BSC · KPIs · Strategy Alignment',
     case:'Sunrise Hospital Group is implementing the Balanced Scorecard (BSC) framework to link strategy to performance measurement.\n\nThe CEO states: "Financial success comes from satisfying patients. Patient satisfaction requires excellent internal processes. Excellent processes require investing in our people and systems."\n\nManagement must classify KPIs into the four BSC perspectives.',
     exhibit:{headers:['KPI','BSC Perspective (?)'],rows:[['Return on Equity','?'],['Patient Satisfaction Score','?'],['Average Treatment Time','?'],['Staff Training Hours','?'],['Cost per Patient','?'],['Employee Turnover Rate','?']]},
     questions:[
      {type:'drag',id:'C4Q1',text:'Drag each KPI to the correct BSC perspective:',items:['Return on Equity','Patient Satisfaction Score','Average Treatment Time','Staff Training Hours'],zones:['Financial','Customer','Internal Process','Learning & Growth'],correct:{'Return on Equity':'Financial','Patient Satisfaction Score':'Customer','Average Treatment Time':'Internal Process','Staff Training Hours':'Learning & Growth'},fb:'Financial → ROE. Customer → Patient Satisfaction. Internal Process → Treatment Time. Learning & Growth → Training Hours.'},
      {type:'select',id:'C4Q2',text:'In the BSC cause-and-effect chain, which perspective is the FOUNDATION driving all others?',opts:['Financial','Customer','Internal Process','Learning & Growth'],ans:3,fb:'Learning & Growth is the root: invest in people → improve processes → satisfy customers → achieve financial results. It all starts from the bottom.'},
      {type:'select',id:'C4Q3',text:'"Patient Satisfaction Score" is a:',opts:['Purely lagging indicator — measures past results','Lagging indicator for operations AND leading indicator for financial results','Purely leading indicator — predicts future only','Neither — not a valid performance metric'],ans:1,fb:'BSC metrics are often both: Patient Satisfaction lags operational performance (past service quality) but leads future revenue and loyalty (leading financial indicator). This dual nature is a BSC strength.'},
      {type:'select',id:'C4Q4',text:'The main advantage of BSC over traditional financial reporting is:',opts:['It eliminates financial statements','It links non-financial drivers to long-term financial outcomes','It focuses only on customer satisfaction','It replaces budgeting'],ans:1,fb:'BSC provides a balanced, multi-perspective view connecting non-financial drivers (processes, people, customers) to long-term financial success — something pure financial statements cannot show.'},
      {type:'blank',id:'C4Q5',text:'The [B1] perspective covers operational efficiency (e.g., treatment time), while the [B2] perspective covers skills and systems needed to sustain those operations.',blanks:[{id:'B1',opts:['Financial','Customer','Internal Process','Learning & Growth'],ans:'Internal Process'},{id:'B2',opts:['Financial','Customer','Internal Process','Learning & Growth'],ans:'Learning & Growth'}],fb:'Internal Process = HOW we operate. Learning & Growth = WHAT enables us to operate well (people, technology, culture).'},
     ]},
    // ── CBQ 5: Transfer Pricing ──────────────────────────────
    {id:'C5',num:5,title:'Transfer Pricing — Vertex Industries',topics:'Transfer Price · Capacity · Goal Congruence',
     case:'Vertex Industries has two divisions. The Components Division makes a part (variable cost $45/unit, external price $80). Capacity: 20,000 units/year.\n\nScenario A: Division is at FULL capacity (20,000 units sold externally).\nScenario B: Division has 5,000 units of spare capacity.\n\nThe Assembly Division requests 5,000 units internally. It can source externally at $80.',
     exhibit:{headers:['Item','Value'],rows:[['Variable Cost per unit','$45'],['External Market Price','$80'],['Annual Capacity','20,000 units'],['Scenario A — Current Output','20,000 (full capacity)'],['Scenario B — Current Output','15,000 (spare = 5,000)'],['Requested Transfer','5,000 units']]},
     questions:[
      {type:'calc',id:'C5Q1',text:'Minimum transfer price at FULL capacity (Scenario A)?',hint:'Min TP = Variable Cost + Opportunity Cost per unit',exact:80,tol:0.5,pre:'$',suf:'',fb:'At full capacity, to give 5,000 units to Assembly, Components gives up 5,000 external sales. Min TP = $45 + ($80−$45) = $45 + $35 = $80. Opportunity cost = lost CM = $35/unit.'},
      {type:'calc',id:'C5Q2',text:'Minimum transfer price with SPARE capacity (Scenario B)?',hint:'No opportunity cost when spare capacity available',exact:45,tol:0.5,pre:'$',suf:'',fb:'With spare capacity, no external sales are foregone. Opportunity cost = $0. Min TP = Variable Cost = $45 only.'},
      {type:'select',id:'C5Q3',text:'At full capacity with TP = $80, which statement is TRUE for the overall company?',opts:['Company gains — internal transfer saves costs','Company is indifferent — no overall benefit or cost from the internal transfer','Company loses — Components foregoes premium sales','Company gains — Assembly pays less than market'],ans:1,fb:'At TP = $80 (= external price), Components is indifferent between internal and external. Assembly pays same as market. Overall company: no gain or loss (unless selling/shipping costs are saved on internal transfers).'},
      {type:'select',id:'C5Q4',text:'The PRIMARY purpose of a transfer pricing system is to:',opts:['Minimize total tax liability','Measure divisional performance fairly and encourage decisions that benefit the whole company','Maximize the supplying division\'s profit','Match external market prices exactly'],ans:1,fb:'Transfer pricing serves two goals: (1) fair performance measurement of each division, and (2) goal congruence — decisions that benefit each division should also benefit the overall company.'},
      {type:'blank',id:'C5Q5',text:'Min TP formula = Variable Cost + [B1]. With spare capacity, the [B1] equals zero, so Min TP = [B2] cost only.',blanks:[{id:'B1',opts:['Fixed Cost','Opportunity Cost','Selling Price'],ans:'Opportunity Cost'},{id:'B2',opts:['total','variable','fixed'],ans:'variable'}],fb:'Min TP = Variable Cost + Opportunity Cost. Opportunity cost = CM foregone per unit when capacity is given up. With spare capacity: opportunity cost = $0, so Min TP = variable cost.'},
     ]},
  ],
  D:[
    {id:'D1',num:1,title:'CVP Analysis — NovaStar Electronics',topics:'Break-Even · Target Profit · Margin of Safety',
     case:'NovaStar Electronics manufactures a single product. Management wants to use Cost-Volume-Profit analysis to plan for the upcoming year and evaluate different profit scenarios.\n\nThe tax rate is 30%. Current actual sales are 14,000 units. A line manager has proposed increasing fixed costs by $32,000 to upgrade machinery — management needs to quantify the impact on break-even.',
     exhibit:{headers:['Item','Amount'],rows:[['Selling Price per Unit','$80'],['Variable Cost per Unit','$48'],['Fixed Costs (annual)','$320,000'],['Income Tax Rate','30%'],['Current Actual Sales','14,000 units'],['Target After-Tax Profit','$140,000']]},
     questions:[
      {type:'calc',id:'D1Q1',text:'Calculate the Contribution Margin per unit.',hint:'CM = Selling Price − Variable Cost per unit',exact:32,tol:0,pre:'$',suf:'',fb:'CM per unit = $80 − $48 = $32. Every unit sold contributes $32 toward covering fixed costs and then generating profit.'},
      {type:'calc',id:'D1Q2',text:'Calculate the Break-Even Point in units.',hint:'BEP (units) = Fixed Costs ÷ CM per unit',exact:10000,tol:0,pre:'',suf:' units',fb:'BEP = $320,000 ÷ $32 = 10,000 units. At exactly 10,000 units, total contribution margin equals total fixed costs — zero profit.'},
      {type:'calc',id:'D1Q3',text:'How many units must be sold to achieve an after-tax profit of $140,000?',hint:'Convert after-tax to pre-tax first: Pre-tax = After-tax ÷ (1 − tax rate). Then: Units = (FC + Pre-tax profit) ÷ CM',exact:16250,tol:0,pre:'',suf:' units',fb:'Pre-tax target = $140,000 ÷ 0.70 = $200,000. Units = ($320,000 + $200,000) ÷ $32 = $520,000 ÷ $32 = 16,250 units.'},
      {type:'calc',id:'D1Q4',text:'Calculate the Margin of Safety in units at current sales of 14,000 units.',hint:'MOS = Actual Sales − Break-Even Sales',exact:4000,tol:0,pre:'',suf:' units',fb:'MOS = 14,000 − 10,000 = 4,000 units. The company can afford to lose 4,000 units of sales before reaching break-even. MOS% = 4,000 ÷ 14,000 = 28.6%.'},
      {type:'select',id:'D1Q5',text:'If fixed costs increase by $32,000 due to the machinery upgrade, what is the new Break-Even Point?',opts:['9,000 units','10,000 units — unchanged','11,000 units','12,500 units'],ans:2,fb:'New BEP = ($320,000 + $32,000) ÷ $32 = $352,000 ÷ $32 = 11,000 units. Every $32 increase in FC raises BEP by one unit.'},
      {type:'blank',id:'D1Q6',text:'Margin of Safety measures the amount by which actual sales [B1] break-even sales. A higher MOS indicates [B2] operating risk.',blanks:[{id:'B1',opts:['exceed','fall below','equal'],ans:'exceed'},{id:'B2',opts:['higher','lower','the same'],ans:'lower'}],fb:'MOS is a safety cushion — how far sales can fall before the company hits break-even. Higher MOS = more buffer = LOWER risk of loss.'},
     ]},
    {id:'D2',num:2,title:'Job Order Costing — PrecisionCraft Workshop',topics:'POHR · Job Cost Sheet · Under/Over-Applied Overhead',
     case:'PrecisionCraft Workshop uses a job order costing system with a predetermined overhead rate (POHR) based on direct labor hours.\n\nAt the start of the year, management estimated total overhead of $480,000 and total direct labor hours of 60,000. Job #201 was completed during the year for a key customer.',
     exhibit:{headers:['Item','Data'],rows:[['Estimated Annual Overhead','$480,000'],['Estimated DL Hours','60,000'],['Job #201 — Direct Materials','$12,000'],['Job #201 — DL Hours','500 hours'],['DL Wage Rate','$18 per hour'],['Actual OH Incurred (year)','$492,000'],['Actual DL Hours (year)','60,000']]},
     questions:[
      {type:'calc',id:'D2Q1',text:'Calculate the Predetermined Overhead Rate (POHR).',hint:'POHR = Estimated Overhead ÷ Estimated Cost Driver (DL Hours)',exact:8,tol:0,pre:'$',suf:' per DLH',fb:'POHR = $480,000 ÷ 60,000 DLH = $8 per DLH. Set at the start of the year and used to apply overhead to all jobs throughout the year.'},
      {type:'calc',id:'D2Q2',text:'Calculate the total cost of Job #201.',hint:'Job Cost = DM + DL + Applied OH. DL = 500 hrs × $18. Applied OH = 500 hrs × POHR',exact:25000,tol:0,pre:'$',suf:'',fb:'DL = 500 × $18 = $9,000. Applied OH = 500 × $8 = $4,000. Total = $12,000 + $9,000 + $4,000 = $25,000.'},
      {type:'calc',id:'D2Q3',text:'Calculate total Overhead Applied for the entire year.',hint:'OH Applied = Actual DL Hours worked × POHR',exact:480000,tol:0,pre:'$',suf:'',fb:'OH Applied = 60,000 actual DLH × $8 = $480,000. Applied OH uses the ACTUAL activity level × predetermined rate — not actual overhead costs incurred.'},
      {type:'calc',id:'D2Q4',text:'Calculate the Under- or Over-Applied Overhead for the year.',hint:'Under/Over = Actual OH − Applied OH. Positive = Under-applied.',exact:12000,tol:0,pre:'$',suf:' under-applied',fb:'$492,000 − $480,000 = $12,000 Under-applied. Jobs were not charged enough overhead during the year.'},
      {type:'select',id:'D2Q5',text:'Under-applied overhead of $12,000 means:',opts:['More overhead was applied to jobs than actually incurred — COGS overstated','Less overhead was applied to jobs than actually incurred — COGS understated','Overhead was perfectly applied — no adjustment needed','Fixed costs were lower than expected'],ans:1,fb:'Under-applied = Actual > Applied. Jobs absorbed only $480,000 of $492,000 actual overhead. COGS and inventory are UNDERSTATED. At year-end, close $12,000 to COGS (debit COGS, increasing it).'},
      {type:'blank',id:'D2Q6',text:'Under-applied overhead is closed at year-end by [B1] Cost of Goods Sold. Over-applied overhead is closed by [B2] Cost of Goods Sold.',blanks:[{id:'B1',opts:['debiting (increasing)','crediting (decreasing)'],ans:'debiting (increasing)'},{id:'B2',opts:['debiting (increasing)','crediting (decreasing)'],ans:'crediting (decreasing)'}],fb:'Under-applied: actual > applied → COGS understated → DEBIT COGS. Over-applied: actual < applied → COGS overstated → CREDIT COGS. This closes the Manufacturing Overhead account to zero at year-end.'},
     ]},
    {id:'D3',num:3,title:'Process Costing — PureFlow Chemicals',topics:'Equivalent Units · Weighted Average · Cost per EU',
     case:'PureFlow Chemicals processes raw chemicals through a single department. Direct materials are added at the START of the process. Conversion costs are incurred evenly throughout.\n\nThe weighted average method is used. The cost accountant must calculate equivalent units, cost per EU, and the cost of units completed and transferred out.',
     exhibit:{headers:['Item','Units / Amount'],rows:[['Beginning WIP (50% conversion complete)','2,000 units'],['Units Started in Period','18,000 units'],['Units Completed & Transferred Out','17,000 units'],['Ending WIP (50% conversion complete)','3,000 units'],['DM Cost — Beginning WIP','$40,000'],['DM Cost — Added in Period','$320,000'],['Conversion Cost — Beginning WIP','$15,000'],['Conversion Cost — Added in Period','$170,000']]},
     questions:[
      {type:'calc',id:'D3Q1',text:'Calculate Equivalent Units for Direct Materials (Weighted Average).',hint:'DM is added at START — all units (transferred + EWIP) are 100% complete for DM.',exact:20000,tol:0,pre:'',suf:' EU',fb:'EU(DM) = 17,000 + 3,000 × 100% = 20,000. All units — transferred out AND in EWIP — are fully complete for DM since it was added at the start.'},
      {type:'calc',id:'D3Q2',text:'Calculate Equivalent Units for Conversion Costs (Weighted Average).',hint:'EU(Conv) = Units Transferred + Ending WIP × % complete for conversion',exact:18500,tol:0,pre:'',suf:' EU',fb:'EU(Conv) = 17,000 + 3,000 × 50% = 17,000 + 1,500 = 18,500. The 3,000 EWIP units are 50% converted = 1,500 equivalent fully-converted units.'},
      {type:'calc',id:'D3Q3',text:'Calculate the Cost per Equivalent Unit for Direct Materials.',hint:'WA: Total DM Cost = BWIP DM + Current DM. Divide by EU(DM).',exact:18,tol:0,pre:'$',suf:' per EU',fb:'Total DM = $40,000 + $320,000 = $360,000. CPU(DM) = $360,000 ÷ 20,000 = $18.00. Weighted average blends BWIP and current costs together.'},
      {type:'calc',id:'D3Q4',text:'Calculate total cost transferred to the next department (17,000 units).',hint:'CPU(Conv) = ($15,000 + $170,000) ÷ 18,500. Total CPU = CPU(DM) + CPU(Conv). Cost Transferred = 17,000 × Total CPU.',exact:476000,tol:50,pre:'$',suf:'',fb:'CPU(Conv) = $185,000 ÷ 18,500 = $10.00. Total CPU = $18 + $10 = $28. Cost transferred = 17,000 × $28 = $476,000.'},
      {type:'select',id:'D3Q5',text:'Why is the concept of Equivalent Units necessary in process costing?',opts:['To track individual job costs like in job order costing','To convert partially complete units into a full-unit equivalent for fair cost allocation','To eliminate the need for a predetermined overhead rate','To calculate the contribution margin per unit'],ans:1,fb:'In process costing, all units are indistinguishable — we cannot assign costs to individual units. EU converts partially complete units into their full-unit equivalent so we can calculate a meaningful cost per unit and fairly allocate costs between completed and in-process units.'},
      {type:'blank',id:'D3Q6',text:'Under Weighted Average, BWIP costs are [B1] with current period costs. Under FIFO, BWIP costs are [B2] from current period costs.',blanks:[{id:'B1',opts:['combined (blended)','separated','ignored'],ans:'combined (blended)'},{id:'B2',opts:['kept separate','combined','ignored'],ans:'kept separate'}],fb:'WA blends all costs → simpler but hides period-to-period changes. FIFO keeps BWIP separate → more accurate performance measurement. On the CMA exam, know both EU formulas: WA includes BWIP completion % in EU; FIFO adds work needed to complete BWIP separately.'},
     ]},
    {id:'D4',num:4,title:'Activity-Based Costing — TechParts Inc.',topics:'ABC vs Traditional Costing · Cost Drivers · Product Cost Distortion',
     case:'TechParts Inc. makes two products: Alpha (high-volume, simple) and Beta (low-volume, complex). The company uses a plant-wide overhead rate based on Direct Labor Hours.\n\nThe controller suspects cost distortion and wants to implement ABC with two overhead pools: Machine Setups and General Machining.',
     exhibit:{headers:['Item','Alpha','Beta','Total'],rows:[['Units Produced','10,000','1,000','11,000'],['Direct Labor Hours','20,000 DLH','5,000 DLH','25,000 DLH'],['Number of Machine Setups','10','40','50'],['Overhead — Machine Setups','—','—','$200,000'],['Overhead — General Machining','—','—','$300,000'],['Total Overhead','—','—','$500,000']]},
     questions:[
      {type:'calc',id:'D4Q1',text:'Calculate the traditional plant-wide overhead rate (based on DLH).',hint:'Traditional Rate = Total Overhead ÷ Total DL Hours',exact:20,tol:0,pre:'$',suf:' per DLH',fb:'Traditional Rate = $500,000 ÷ 25,000 DLH = $20/DLH. This single rate applies the same cost per DLH to both products — ignoring how differently they actually consume overhead resources.'},
      {type:'calc',id:'D4Q2',text:'Under traditional costing, calculate overhead cost per unit for Alpha.',hint:'Alpha overhead = 20,000 DLH × $20. Divide by 10,000 units.',exact:40,tol:0,pre:'$',suf:' per unit',fb:'Alpha OH = 20,000 × $20 = $400,000 ÷ 10,000 = $40/unit. Alpha uses 80% of total DLH so it absorbs $400,000 of the $500,000 total.'},
      {type:'calc',id:'D4Q3',text:'Using ABC, calculate overhead cost per unit for Beta.',hint:'Setup rate = $200,000 ÷ 50. Machine rate = $300,000 ÷ 25,000 DLH. Beta ABC OH = (40 setups × rate) + (5,000 DLH × rate). Divide by 1,000 units.',exact:220,tol:0,pre:'$',suf:' per unit',fb:'Setup rate = $4,000/setup. Machine rate = $12/DLH. Beta OH = (40 × $4,000) + (5,000 × $12) = $160,000 + $60,000 = $220,000 ÷ 1,000 = $220/unit. Traditional only charged $100 — a $120 understatement!'},
      {type:'select',id:'D4Q4',text:'Under ABC, Alpha costs $28/unit vs $40 traditional. Beta costs $220/unit vs $100 traditional. Which statement is correct?',opts:['Traditional accurately priced both products','Alpha is UNDERCOSTED and Beta is OVERCOSTED under traditional','Alpha is OVERCOSTED and Beta is UNDERCOSTED under traditional — traditional hides Beta\'s true complexity cost','Both methods are equally valid for pricing'],ans:2,fb:'ABC Alpha = (10 × $4,000 + 20,000 × $12) ÷ 10,000 = $28. Traditional overcosts Alpha ($40 vs $28) and massively undercosts Beta ($100 vs $220). Beta consumes 80% of setups but only 20% of DLH — traditional misses this entirely.'},
      {type:'drag',id:'D4Q5',text:'Match each cost driver to its most appropriate overhead activity:',items:['Number of Machine Setups','Direct Labor Hours','Number of Purchase Orders','Square Footage Occupied'],zones:['Batch Setup Activity','Machining Activity','Procurement Activity','Facility Activity'],correct:{'Number of Machine Setups':'Batch Setup Activity','Direct Labor Hours':'Machining Activity','Number of Purchase Orders':'Procurement Activity','Square Footage Occupied':'Facility Activity'},fb:'ABC matches each cost pool to the activity that DRIVES the cost: Setups → setup count. Machine time → DLH. Purchasing → PO count. Facility → space. Choosing the correct driver is the most critical step in ABC design.'},
      {type:'blank',id:'D4Q6',text:'Under traditional costing, high-volume simple products tend to be [B1] because they absorb too much overhead via DLH. Low-volume complex products tend to be [B2] because they consume disproportionate batch-level resources.',blanks:[{id:'B1',opts:['overcosted','undercosted','correctly costed'],ans:'overcosted'},{id:'B2',opts:['overcosted','undercosted','correctly costed'],ans:'undercosted'}],fb:'This is the classic ABC finding: traditional DLH-based costing cross-subsidizes complex products. High-volume products end up overpriced and low-volume complex products underpriced — leading to bad pricing and product mix decisions. ABC corrects this.'},
     ]},
    {id:'D5',num:5,title:'Joint Products — PetroRefine Corp.',topics:'Joint Cost Allocation · Further Processing Decision · Split-Off Point',
     case:'PetroRefine Corp. processes crude oil through a joint refining process costing $180,000. At the split-off point, three joint products emerge.\n\nManagement must (1) allocate joint costs for financial reporting using the physical units method, and (2) decide product by product whether to sell at split-off or process further.',
     exhibit:{headers:['Product','Output','Split-off Price','Further Process Cost','Price After Processing'],rows:[['Gasoline','5,000 gal','$25/gal','Not applicable','—'],['Diesel','3,000 gal','$20/gal','$30,000','$35/gal'],['Kerosene','2,000 gal','$15/gal','$40,000','$24/gal']]},
     questions:[
      {type:'calc',id:'D5Q1',text:'Using the physical units method, calculate the joint cost allocated to Gasoline.',hint:'Physical units: each product\'s share = its units ÷ total units. Total gallons = 10,000.',exact:90000,tol:0,pre:'$',suf:'',fb:'Gasoline = 5,000 ÷ 10,000 = 50%. Allocated = 50% × $180,000 = $90,000. Physical units allocates purely on quantity — simple but ignores relative sales values.'},
      {type:'calc',id:'D5Q2',text:'Calculate the incremental profit from further processing Diesel. Should it be processed further?',hint:'Incremental Revenue = (New price − Split-off price) × units. Net = Incremental Revenue − Further Processing Cost.',exact:15000,tol:0,pre:'$',suf:' net benefit',fb:'Incr. Revenue = ($35 − $20) × 3,000 = $45,000. Incr. Cost = $30,000. Net benefit = $15,000. YES — process Diesel further. It adds $15,000 of incremental value.'},
      {type:'calc',id:'D5Q3',text:'Calculate the incremental profit (loss) from further processing Kerosene. Should it be processed further?',hint:'Incremental Revenue = (New price − Split-off price) × units. Compare to Further Processing Cost.',exact:22000,tol:0,pre:'$',suf:' net LOSS — sell at split-off',fb:'Incr. Revenue = ($24 − $15) × 2,000 = $18,000. Incr. Cost = $40,000. Net loss = $22,000. NO — sell Kerosene at split-off. Further processing destroys $22,000 of value.'},
      {type:'select',id:'D5Q4',text:'The $180,000 joint processing cost is IRRELEVANT to the further processing decision. Why?',opts:['Joint costs are always immaterial','Joint costs are sunk costs — already incurred regardless of what happens after the split-off point','Joint costs are not allocated to individual products','Joint costs only matter for tax purposes'],ans:1,fb:'Joint costs are SUNK at the split-off point — incurred before the decision and unchangeable regardless of the choice made. Only INCREMENTAL revenues and costs beyond split-off are relevant. This is a core managerial accounting principle: sunk costs are always irrelevant.'},
      {type:'drag',id:'D5Q5',text:'Classify each product\'s optimal decision:',items:['Gasoline (no further processing option)','Diesel (net benefit $15,000)','Kerosene (net loss $22,000)'],zones:['Sell at Split-Off','Process Further'],correct:{'Gasoline (no further processing option)':'Sell at Split-Off','Diesel (net benefit $15,000)':'Process Further','Kerosene (net loss $22,000)':'Sell at Split-Off'},fb:'Rule: Process further ONLY when incremental revenue > incremental cost. Gasoline: sell at split-off (no option). Diesel: process further ($45K rev > $30K cost). Kerosene: sell at split-off ($18K rev < $40K cost).'},
      {type:'blank',id:'D5Q6',text:'In a further processing decision, joint costs are [B1] because they are [B2] costs already incurred before the split-off point.',blanks:[{id:'B1',opts:['relevant','irrelevant','sometimes relevant'],ans:'irrelevant'},{id:'B2',opts:['sunk','variable','avoidable'],ans:'sunk'}],fb:'Sunk costs = past costs, cannot be changed → ALWAYS irrelevant to decisions. The further processing decision only considers what changes AFTER split-off. Note: joint cost allocation method matters only for FINANCIAL REPORTING (inventory valuation) — never for operational decisions.'},
     ]},
  ],
  A:[
    {id:'A1',num:1,title:'Revenue Recognition — SkyBridge Software',topics:'ASC 606 · Five-Step Model · Performance Obligations · Allocation',
     case:'SkyBridge Software signs a contract with a client for $90,000. The contract includes three distinct performance obligations: a software license, implementation services, and 12 months of technical support.\n\nThe finance team must apply the ASC 606 five-step model to determine how much revenue to allocate to each obligation and when to recognize it.',
     exhibit:{headers:['Performance Obligation','Standalone Selling Price (SSP)','Recognition Timing'],rows:[['Software License','$60,000','?'],['Implementation Services','$20,000','?'],['Technical Support (12 months)','$20,000','?'],['Total SSP','$100,000','—'],['Contract Price','$90,000','—']]},
     questions:[
      {type:'calc',id:'A1Q1',text:'Calculate the revenue allocated to the Software License under ASC 606.',hint:'Allocate based on relative SSP. License proportion = $60,000 ÷ $100,000. Apply to contract price.',exact:54000,tol:0,pre:'$',suf:'',fb:'License = 60/100 × $90,000 = $54,000. ASC 606 Step 4 requires allocating the transaction price based on RELATIVE standalone selling prices — not the SSP directly, because the contract price differs from total SSP.'},
      {type:'calc',id:'A1Q2',text:'Calculate the revenue allocated to Technical Support.',hint:'Support proportion = $20,000 ÷ $100,000. Apply to $90,000.',exact:18000,tol:0,pre:'$',suf:'',fb:'Support = 20/100 × $90,000 = $18,000. Even though the SSP is $20,000, only $18,000 is allocated because the contract was priced at a discount ($90K vs $100K SSP total).'},
      {type:'calc',id:'A1Q3',text:'How much Technical Support revenue is recognized each month?',hint:'Support is recognized evenly over 12 months.',exact:1500,tol:0,pre:'$',suf:' per month',fb:'Monthly support revenue = $18,000 ÷ 12 = $1,500. Support is a performance obligation satisfied OVER TIME (the customer simultaneously receives and consumes the benefit each month).'},
      {type:'select',id:'A1Q4',text:'When is the Software License revenue of $54,000 recognized?',opts:['Evenly over 12 months like the support','At the point in time when the license is transferred to the customer','When the full $90,000 cash is collected','Only after implementation services are complete'],ans:1,fb:'A software license is typically recognized at a POINT IN TIME — when control transfers to the customer (delivery of the license key). It is a separate performance obligation from the support. If the license were a right-to-access (with ongoing updates), it would be over time.'},
      {type:'drag',id:'A1Q5',text:'Match each performance obligation to its revenue recognition pattern:',items:['Software License (control transfers at delivery)','Implementation Services (performed over weeks)','Technical Support (12-month contract)'],zones:['Point in Time','Over Time'],correct:{'Software License (control transfers at delivery)':'Point in Time','Implementation Services (performed over weeks)':'Over Time','Technical Support (12-month contract)':'Over Time'},fb:'ASC 606 Step 5: Recognize revenue when (or as) each PO is satisfied. Point in time = control transfers at a moment. Over time = customer simultaneously receives and consumes, entity creates/enhances asset customer controls, or no alternative use and right to payment.'},
      {type:'blank',id:'A1Q6',text:'ASC 606 Step 3 is to determine the [B1]. Step 4 allocates it based on [B2] selling prices.',blanks:[{id:'B1',opts:['transaction price','performance obligations','contract modification'],ans:'transaction price'},{id:'B2',opts:['standalone','contract','discounted'],ans:'standalone'}],fb:'The 5 steps: (1) Identify the contract. (2) Identify performance obligations. (3) Determine the TRANSACTION PRICE (total consideration). (4) Allocate to POs based on STANDALONE selling prices. (5) Recognize revenue when/as each PO is satisfied.'},
     ]},
    {id:'A2',num:2,title:'Inventory Costing — BrightGoods Trading',topics:'FIFO · LIFO · Weighted Average · LIFO Reserve',
     case:'BrightGoods Trading uses a periodic inventory system. Prices have been rising throughout the year. Management wants to compare results under all three cost flow assumptions and understand the LIFO reserve.\n\nThe company sold 700 units during the year.',
     exhibit:{headers:['Transaction','Units','Unit Cost','Total Cost'],rows:[['Beginning Inventory','200','$10.00','$2,000'],['Purchase 1','300','$12.00','$3,600'],['Purchase 2','500','$15.00','$7,500'],['Total Available','1,000','—','$13,100'],['Units Sold','700','—','?'],['Ending Inventory','300','—','?']]},
     questions:[
      {type:'calc',id:'A2Q1',text:'Calculate Ending Inventory under FIFO.',hint:'FIFO: ending inventory consists of the MOST RECENT purchases. 300 units remain.',exact:4500,tol:0,pre:'$',suf:'',fb:'FIFO EI = 300 units × $15.00 (most recent purchase) = $4,500. FIFO assumes the first units purchased are the first sold — so ending inventory holds the newest (highest cost) units.'},
      {type:'calc',id:'A2Q2',text:'Calculate COGS under LIFO (periodic).',hint:'LIFO: ending inventory consists of the OLDEST units. EI = 200 @ $10 + 100 @ $12. COGS = Total − EI.',exact:9900,tol:0,pre:'$',suf:'',fb:'LIFO EI = 200 × $10 + 100 × $12 = $2,000 + $1,200 = $3,200. LIFO COGS = $13,100 − $3,200 = $9,900. LIFO assumes newest units are sold first — COGS reflects current (higher) costs.'},
      {type:'calc',id:'A2Q3',text:'Calculate COGS under the Weighted Average method.',hint:'WA unit cost = Total Cost ÷ Total Units. WA COGS = Units Sold × WA unit cost.',exact:9170,tol:0,pre:'$',suf:'',fb:'WA unit cost = $13,100 ÷ 1,000 = $13.10. WA COGS = 700 × $13.10 = $9,170. Weighted average blends all costs equally — COGS falls between FIFO and LIFO in a rising price environment.'},
      {type:'calc',id:'A2Q4',text:'Calculate the LIFO Reserve at year-end.',hint:'LIFO Reserve = FIFO Ending Inventory − LIFO Ending Inventory',exact:1300,tol:0,pre:'$',suf:'',fb:'LIFO Reserve = $4,500 (FIFO EI) − $3,200 (LIFO EI) = $1,300. The LIFO reserve represents how much higher inventory (and net income) would be if the company used FIFO instead of LIFO.'},
      {type:'select',id:'A2Q5',text:'In a period of RISING prices, which statement about FIFO vs LIFO is correct?',opts:['FIFO produces higher COGS and lower net income than LIFO','LIFO produces lower COGS and higher net income than FIFO','FIFO produces lower COGS, higher net income, higher ending inventory, and higher taxes','LIFO and FIFO produce identical net income in rising prices'],ans:2,fb:'Rising prices: FIFO assigns older (cheaper) costs to COGS → LOWER COGS → HIGHER gross profit → HIGHER net income → HIGHER taxes. LIFO assigns newer (higher) costs to COGS → HIGHER COGS → LOWER income → LOWER taxes (tax advantage). FIFO better reflects current inventory values on the balance sheet.'},
      {type:'blank',id:'A2Q6',text:'LIFO is [B1] under IFRS. Under both GAAP and IFRS, inventory is written down when cost exceeds [B2].',blanks:[{id:'B1',opts:['prohibited','required','allowed'],ans:'prohibited'},{id:'B2',opts:['Net Realizable Value (NRV)','Fair Market Value','Replacement Cost'],ans:'Net Realizable Value (NRV)'}],fb:'IFRS prohibits LIFO — only FIFO and Weighted Average are allowed. LCNRV (Lower of Cost or Net Realizable Value) applies under both GAAP and IFRS: if NRV < cost, write down inventory. Under GAAP, write-downs cannot be reversed. Under IFRS, reversals ARE allowed if NRV recovers.'},
     ]},
    {id:'A3',num:3,title:'Depreciation & Asset Disposal — MetalWorks Corp.',topics:'Straight-Line · DDB · Book Value · Gain/Loss on Disposal',
     case:'MetalWorks Corp. acquired a manufacturing machine. Management is evaluating different depreciation methods and needs to calculate the financial impact of disposing of the machine after three years of straight-line depreciation.\n\nThe machine will be sold for $45,000 at the end of Year 3.',
     exhibit:{headers:['Item','Amount'],rows:[['Acquisition Cost','$120,000'],['Estimated Salvage Value','$20,000'],['Useful Life','5 years'],['Year 1 Production','30,000 units'],['Total Production Capacity','100,000 units'],['Disposal Price (end of Year 3)','$45,000']]},
     questions:[
      {type:'calc',id:'A3Q1',text:'Calculate the annual Straight-Line depreciation expense.',hint:'SL = (Cost − Salvage Value) ÷ Useful Life',exact:20000,tol:0,pre:'$',suf:' per year',fb:'SL = ($120,000 − $20,000) ÷ 5 = $100,000 ÷ 5 = $20,000/year. Straight-line is the simplest method — equal expense each year over the asset\'s useful life.'},
      {type:'calc',id:'A3Q2',text:'Calculate the Double-Declining Balance (DDB) depreciation for Year 1.',hint:'DDB rate = 2 ÷ Useful Life. Apply to book value at start of year. Salvage NOT deducted initially.',exact:48000,tol:0,pre:'$',suf:'',fb:'DDB rate = 2/5 = 40%. Year 1 = 40% × $120,000 = $48,000. DDB ignores salvage value in the rate calculation — but must STOP depreciating when book value reaches salvage value.'},
      {type:'calc',id:'A3Q3',text:'Calculate DDB depreciation for Year 2.',hint:'Year 2 BV = Cost − Year 1 DDB. Apply 40% to Year 2 BV.',exact:28800,tol:0,pre:'$',suf:'',fb:'Year 2 BV = $120,000 − $48,000 = $72,000. Year 2 DDB = 40% × $72,000 = $28,800. DDB accelerates depreciation — highest in early years, declining each year.'},
      {type:'calc',id:'A3Q4',text:'Calculate the book value after 3 years using Straight-Line depreciation.',hint:'Accumulated Depreciation (SL, 3 years) = 3 × annual SL. BV = Cost − Accum Dep.',exact:60000,tol:0,pre:'$',suf:'',fb:'Accum Dep = 3 × $20,000 = $60,000. BV = $120,000 − $60,000 = $60,000. This is the net book value — what remains on the balance sheet before disposal.'},
      {type:'calc',id:'A3Q5',text:'Calculate the Gain or Loss on disposal when the machine is sold for $45,000.',hint:'Gain/Loss = Proceeds − Book Value at disposal.',exact:15000,tol:0,pre:'$',suf:' LOSS',fb:'Loss = $45,000 − $60,000 = −$15,000 (loss). Proceeds < book value → LOSS on disposal. If proceeds > BV → GAIN. The gain/loss appears on the income statement under other income/expense.'},
      {type:'select',id:'A3Q6',text:'Which depreciation method produces the HIGHEST depreciation expense in Year 1?',opts:['Straight-Line — always the highest','Double-Declining Balance — accelerated method','Units of Production — depends on actual usage','All methods give the same Year 1 amount'],ans:1,fb:'DDB Year 1 = $48,000 vs SL = $20,000. DDB is an accelerated method — front-loads depreciation. Units of production Year 1 = ($100,000/100,000) × 30,000 = $30,000. DDB is highest. Accelerated methods are preferred for tax purposes (reduce taxable income faster).'},
     ]},
    {id:'A4',num:4,title:'Financial Statement Analysis — ClearPath Retailers',topics:'Liquidity Ratios · Solvency · Profitability · Interest Coverage',
     case:'ClearPath Retailers is being evaluated by both a bank (for a loan) and potential investors. The analyst must calculate key financial ratios from the statements to assess liquidity, solvency, and profitability.\n\nAll data is provided in the exhibit below.',
     exhibit:{headers:['Item','Amount'],rows:[['Cash','$50,000'],['Accounts Receivable','$80,000'],['Inventory','$120,000'],['Prepaid Expenses','$10,000'],['Total Assets','$800,000'],['Current Liabilities','$130,000'],['Long-Term Debt','$270,000'],['Total Equity','$400,000'],['Net Sales','$600,000'],['Cost of Goods Sold','$360,000'],['EBIT','$100,000'],['Interest Expense','$20,000'],['Net Income','$60,000']]},
     questions:[
      {type:'calc',id:'A4Q1',text:'Calculate the Current Ratio.',hint:'Current Ratio = Total Current Assets ÷ Current Liabilities. CA = Cash + AR + Inventory + Prepaid.',exact:2,tol:0.01,pre:'',suf:'x',fb:'Total CA = $50K + $80K + $120K + $10K = $260,000. Current Ratio = $260,000 ÷ $130,000 = 2.0x. A ratio of 2.0 means the company has $2 of current assets for every $1 of current liabilities — generally considered adequate.'},
      {type:'calc',id:'A4Q2',text:'Calculate the Quick Ratio (Acid-Test Ratio).',hint:'Quick Ratio = (Cash + AR) ÷ Current Liabilities. Excludes inventory and prepaid.',exact:1,tol:0.01,pre:'',suf:'x',fb:'Quick Ratio = ($50,000 + $80,000) ÷ $130,000 = $130,000 ÷ $130,000 = 1.0x. The quick ratio excludes inventory (less liquid) and prepaid expenses — a stricter liquidity test. A ratio of 1.0 means just enough liquid assets to cover current liabilities.'},
      {type:'calc',id:'A4Q3',text:'Calculate the Return on Equity (ROE).',hint:'ROE = Net Income ÷ Total Equity',exact:15,tol:0.1,pre:'',suf:'%',fb:'ROE = $60,000 ÷ $400,000 = 15%. ROE measures how efficiently the company generates profit from shareholders\' equity. Higher ROE = better returns for equity investors.'},
      {type:'calc',id:'A4Q4',text:'Calculate the Interest Coverage Ratio.',hint:'Interest Coverage = EBIT ÷ Interest Expense',exact:5,tol:0.05,pre:'',suf:'x',fb:'Interest Coverage = $100,000 ÷ $20,000 = 5.0x. The company earns $5 of operating income for every $1 of interest — strong debt service capacity. A ratio below 1.5x raises serious solvency concerns.'},
      {type:'drag',id:'A4Q5',text:'Classify each ratio into the correct category:',items:['Current Ratio','Debt-to-Equity Ratio','Return on Assets','Interest Coverage Ratio'],zones:['Liquidity Ratio','Solvency Ratio','Profitability Ratio'],correct:{'Current Ratio':'Liquidity Ratio','Debt-to-Equity Ratio':'Solvency Ratio','Return on Assets':'Profitability Ratio','Interest Coverage Ratio':'Solvency Ratio'},fb:'Liquidity: ability to meet short-term obligations (Current, Quick, Cash ratios). Solvency: ability to meet long-term debt obligations (D/E, Debt-to-Assets, Interest Coverage). Profitability: ability to generate profit (ROA, ROE, Gross Margin, Net Profit Margin).'},
      {type:'blank',id:'A4Q6',text:'The Quick Ratio excludes [B1] from current assets because it is less liquid. A current ratio ABOVE [B2] is generally considered a sign of adequate short-term liquidity.',blanks:[{id:'B1',opts:['inventory and prepaid expenses','accounts receivable','cash'],ans:'inventory and prepaid expenses'},{id:'B2',opts:['1.0','2.0','0.5'],ans:'1.0'}],fb:'The quick ratio strips out the least liquid current assets (inventory must be sold first, prepaid cannot be converted to cash). A current ratio > 1.0 means CA > CL (can cover obligations). The "ideal" ratio varies by industry — retail often runs 1.5–2.0x.'},
     ]},
    {id:'A5',num:5,title:'Bonds Payable — HorizonCo',topics:'Bond Issue Price · Discount · Effective Interest Method · Carrying Value',
     case:'HorizonCo issues 5-year bonds with a face value of $1,000,000 and a stated coupon rate of 8% (annual). At the time of issue, the market (effective) interest rate is 10%.\n\nThe finance team must calculate the issue price, record the discount, and apply the effective interest method for Year 1 amortization.',
     exhibit:{headers:['Item','Data'],rows:[['Face Value','$1,000,000'],['Coupon Rate (stated)','8% annual'],['Annual Coupon Payment','$80,000'],['Market Rate at Issuance','10%'],['Term','5 years'],['PV Annuity Factor (10%, 5 yrs)','3.791'],['PV Single Payment Factor (10%, 5 yrs)','0.621']]},
     questions:[
      {type:'calc',id:'A5Q1',text:'Calculate the issue price of the bonds.',hint:'Issue Price = PV of coupons + PV of face value. Use the provided PV factors.',exact:924280,tol:50,pre:'$',suf:'',fb:'PV of coupons = $80,000 × 3.791 = $303,280. PV of face = $1,000,000 × 0.621 = $621,000. Issue price = $924,280. Bonds issued BELOW face because market rate (10%) > coupon rate (8%) — investors demand a discount to earn market return.'},
      {type:'calc',id:'A5Q2',text:'Calculate the Discount on Bonds Payable at issuance.',hint:'Discount = Face Value − Issue Price',exact:75720,tol:50,pre:'$',suf:'',fb:'Discount = $1,000,000 − $924,280 = $75,720. The discount represents additional interest cost above the coupon — it will be amortized over 5 years, increasing interest expense each year.'},
      {type:'calc',id:'A5Q3',text:'Calculate Year 1 Interest Expense using the effective interest method.',hint:'Interest Expense = Beginning Carrying Value × Market Rate',exact:92428,tol:50,pre:'$',suf:'',fb:'Year 1 Interest Expense = $924,280 × 10% = $92,428. The effective interest method applies the market rate to the CARRYING VALUE — not the face value. Expense exceeds the $80,000 cash coupon because the bond was issued at a discount.'},
      {type:'calc',id:'A5Q4',text:'Calculate the discount amortized in Year 1.',hint:'Discount Amortized = Interest Expense − Cash Coupon Paid',exact:12428,tol:50,pre:'$',suf:'',fb:'Amortized = $92,428 − $80,000 = $12,428. Each year, the discount amortization INCREASES the carrying value of the bond, bringing it toward face value by maturity. The carrying value after Year 1 = $924,280 + $12,428 = $936,708.'},
      {type:'select',id:'A5Q5',text:'Because the market rate (10%) exceeds the coupon rate (8%), the bonds were issued:',opts:['At a premium — above face value','At face value — par','At a discount — below face value','At salvage value'],ans:2,fb:'Market rate > coupon rate → bonds issued at a DISCOUNT (below face). Buyers pay less than face because the coupon payments are below market. Conversely: market rate < coupon rate → premium (above face). Market rate = coupon rate → issued at par (face value).'},
      {type:'blank',id:'A5Q6',text:'Under the effective interest method, interest expense equals carrying value × [B1] rate. When bonds are issued at a discount, interest expense is [B2] than the cash coupon paid each period.',blanks:[{id:'B1',opts:['market (effective)','coupon (stated)','average'],ans:'market (effective)'},{id:'B2',opts:['higher','lower','equal'],ans:'higher'}],fb:'Effective interest method: Interest Expense = CV × market rate. Cash paid = Face × coupon rate. For discount bonds: CV < Face and market rate > coupon rate → Interest Expense > Cash paid. The difference is amortization of the discount, which increases CV each year until it reaches face value at maturity.'},
     ]},
    // ── CBQ A6: Leases (ASC 842) ─────────────────────────────
    {id:'A6',num:6,title:'Leases (ASC 842) — FlexSpace Corp',topics:'ASC 842 · Finance vs Operating Lease · ROU Asset · Lease Liability · Interest Expense',
     case:'FlexSpace Corp signs a 4-year lease for manufacturing equipment on January 1. The company must determine the lease classification under ASC 842, record the Right-of-Use (ROU) asset and lease liability at inception, and calculate Year 1 expenses.\n\nNo ownership transfer occurs at lease end, and there is no purchase option. The asset has an economic life of 6 years and a fair value of $110,000.',
     exhibit:{headers:['Lease Term','Annual Payment (end of year)','Implicit Rate','PV Annuity Factor (6%, 4 yrs)','Economic Life','Fair Value of Asset'],rows:[['4 years','$30,000','6%','3.465','6 years','$110,000']]},
     questions:[
      {type:'calc',id:'A6Q1',text:'Calculate the present value of lease payments (initial lease liability).',hint:'PV = Annual Payment × PV Annuity Factor',exact:103950,tol:10,pre:'$',suf:'',fb:'PV = $30,000 × 3.465 = $103,950. This becomes BOTH the initial lease liability AND the ROU asset on the balance sheet at commencement. Under ASC 842, ALL leases with terms > 12 months must be recognized on the balance sheet.'},
      {type:'select',id:'A6Q2',text:'Under ASC 842, this lease is classified as a Finance Lease because:',opts:['The lease term (4 yrs) exceeds 75% of economic life (6 yrs)','The PV of lease payments ($103,950) is ≥ 90% of fair value ($110,000) — 94.5%','Ownership transfers at end of lease','The asset has no alternative use to the lessor'],ans:1,fb:'PV/FV = $103,950 ÷ $110,000 = 94.5% ≥ 90% → Finance Lease criterion met. Note: lease term test fails (4/6 = 67% < 75%). Only ONE criterion needs to be met for finance lease classification. The 5 criteria: (1) Ownership transfer, (2) Purchase option, (3) Lease term ≥ 75% economic life, (4) PV ≥ 90% fair value, (5) Specialized asset.'},
      {type:'calc',id:'A6Q3',text:'Calculate Year 1 interest expense on the lease liability.',hint:'Interest = Beginning Lease Liability × Implicit Rate',exact:6237,tol:10,pre:'$',suf:'',fb:'Year 1 Interest = $103,950 × 6% = $6,237. For a finance lease, interest expense is recorded SEPARATELY from amortization of the ROU asset — similar to a financed purchase. This is a key difference from an operating lease (which records a single straight-line lease cost).'},
      {type:'calc',id:'A6Q4',text:'Calculate Year 1 amortization expense for the ROU asset (straight-line over lease term).',hint:'Annual Amortization = ROU Asset ÷ Lease Term',exact:25988,tol:50,pre:'$',suf:'',fb:'Annual Amortization = $103,950 ÷ 4 years = $25,987.50 ≈ $25,988. For a FINANCE lease, the ROU asset is amortized over the lease term (not economic life, since no ownership transfer). Total Year 1 P&L impact: $6,237 interest + $25,988 amortization = $32,225 — front-loaded compared to operating lease\'s $30,000 straight-line cost.'},
      {type:'drag',id:'A6Q5',text:'Classify each item under Finance Lease accounting:',items:['ROU Asset','Lease Liability','Interest Expense','Amortization of ROU Asset'],zones:['Balance Sheet','Income Statement'],correct:{'ROU Asset':'Balance Sheet','Lease Liability':'Balance Sheet','Interest Expense':'Income Statement','Amortization of ROU Asset':'Income Statement'},fb:'ASC 842 Finance Lease: Balance Sheet → ROU Asset (non-current asset) + Lease Liability (current & non-current portions). Income Statement → Interest Expense (finance cost, declining each year) + Amortization Expense (straight-line, constant each year). Total expense is front-loaded vs. a flat operating lease cost.'},
      {type:'blank',id:'A6Q6',text:'Under ASC 842, the ROU asset and lease liability are initially measured at the [B1] of future lease payments. An operating lease records a single [B2] lease cost, while a finance lease records interest and amortization separately.',blanks:[{id:'B1',opts:['present value','future value','face value'],ans:'present value'},{id:'B2',opts:['straight-line','accelerated','declining balance'],ans:'straight-line'}],fb:'Both finance and operating leases recognize an ROU asset and liability = PV of remaining payments. The KEY difference is P&L treatment: Operating lease → single straight-line lease cost (rent-like). Finance lease → interest expense (declining) + amortization (constant) = front-loaded total expense. Operating lease better for income optics in early years.'},
     ]},
    // ── CBQ A7: Cash Flow Statement ───────────────────────────
    {id:'A7',num:7,title:'Cash Flow Statement — RetailPrime Corp',topics:'Indirect Method · Operating · Investing · Financing · Non-cash Items',
     case:'RetailPrime Corp\'s accountant must prepare the Statement of Cash Flows for the year using the indirect method. The income statement and balance sheet changes have been compiled, along with selected transaction data.\n\nThe company sold equipment during the year at a gain. All other transactions are as described in the exhibit.',
     exhibit:{headers:['Item','Amount'],rows:[['Net Income','$120,000'],['Depreciation Expense','$35,000'],['Gain on Sale of Equipment','$12,000'],['Increase in Accounts Receivable','$18,000'],['Decrease in Inventory','$25,000'],['Increase in Accounts Payable','$8,000'],['Purchase of New Equipment','$(80,000)'],['Proceeds from Equipment Sale','$32,000'],['Issuance of Long-Term Bonds','$100,000'],['Repayment of Bank Loan','$(40,000)'],['Cash Dividends Paid','$(20,000)']]},
     questions:[
      {type:'calc',id:'A7Q1',text:'Calculate Net Cash Provided by Operating Activities (CFO).',hint:'Start with Net Income. Add back non-cash items (depreciation). Remove non-operating gains. Adjust for working capital changes.',exact:158000,tol:0,pre:'$',suf:'',fb:'CFO = $120,000 NI + $35,000 depreciation − $12,000 gain − $18,000 AR increase + $25,000 inventory decrease + $8,000 AP increase = $158,000. Key rule: increases in current assets are OUTFLOWS (uses of cash); increases in current liabilities are INFLOWS (sources of cash).'},
      {type:'calc',id:'A7Q2',text:'Calculate Net Cash Used in Investing Activities (CFI).',hint:'Investing = long-term asset transactions. Include both equipment purchase AND proceeds from sale.',exact:48000,tol:0,pre:'$',suf:' outflow',fb:'CFI = −$80,000 (purchase) + $32,000 (sale proceeds) = −$48,000 net outflow. Note: the FULL $32,000 proceeds appear here — not $20,000 book value. The $12,000 gain is removed from CFO precisely because the full proceeds belong in CFI. Double-counting is avoided this way.'},
      {type:'calc',id:'A7Q3',text:'Calculate Net Cash Provided by Financing Activities (CFF).',hint:'Financing = debt and equity transactions with lenders and investors.',exact:40000,tol:0,pre:'$',suf:'',fb:'CFF = +$100,000 bonds − $40,000 loan repayment − $20,000 dividends = $40,000 net inflow. Dividends PAID = financing outflow under US GAAP (IFRS allows operating or financing). Dividends RECEIVED = operating or investing under GAAP (operating or financing under IFRS).'},
      {type:'select',id:'A7Q4',text:'Why is the $12,000 gain on equipment sale SUBTRACTED in the operating section?',opts:['Because gains are not real cash flows','Because the full sale proceeds ($32,000) are reported in investing — keeping the gain in NI would double-count the cash','Because gains reduce taxes','Because equipment is a current asset'],ans:1,fb:'The cash received from the sale ($32,000) is properly reported as an investing inflow. Net income already includes the $12,000 gain. If we don\'t subtract it from CFO, the $12,000 would be counted twice: once in NI (operating) and once in CFI (investing). The subtraction in CFO eliminates this double-count.'},
      {type:'drag',id:'A7Q5',text:'Classify each item in the indirect method cash flow statement:',items:['Depreciation add-back','Increase in Accounts Receivable','Purchase of Equipment','Issuance of Bonds','Dividends Paid'],zones:['Operating','Investing','Financing'],correct:{'Depreciation add-back':'Operating','Increase in Accounts Receivable':'Operating','Purchase of Equipment':'Investing','Issuance of Bonds':'Financing','Dividends Paid':'Financing'},fb:'Operating: all NI adjustments (non-cash items + working capital changes). Investing: long-term asset transactions (buy/sell PP&E, investments, lending). Financing: transactions with capital providers — debt (borrow/repay) and equity (issue stock, pay dividends, buy back shares).'},
      {type:'blank',id:'A7Q6',text:'Depreciation is added back to net income because it is a [B1] expense that reduces income but does NOT reduce cash. The gain on asset sale is subtracted because the full proceeds are reported under [B2] activities.',blanks:[{id:'B1',opts:['non-cash','variable','operating'],ans:'non-cash'},{id:'B2',opts:['investing','operating','financing'],ans:'investing'}],fb:'Indirect method logic: start with accrual-based NI and convert to cash basis. Add back non-cash charges (depreciation, amortization). Remove non-operating items (gains/losses on asset sales — belongs in CFI). Adjust for working capital changes. Result = cash actually generated from core operations.'},
     ]},
    // ── CBQ A8: Deferred Taxes ────────────────────────────────
    {id:'A8',num:8,title:'Deferred Taxes — PrecisionTech Corp',topics:'Deferred Tax Liability · Deferred Tax Asset · Temporary vs Permanent Differences · Tax Expense',
     case:'PrecisionTech Corp reports pre-tax book income of $300,000 for the year. The tax department has identified three items that create differences between book and taxable income.\n\nThe corporate tax rate is 25%. The finance team must calculate the deferred tax balances and total income tax expense.',
     exhibit:{headers:['Item','Book Treatment','Tax Treatment','Type of Difference'],rows:[['Depreciation','$60,000 (straight-line)','$100,000 (MACRS accelerated)','Temporary'],['Warranty Expense','$30,000 (accrued at sale)','$0 (deductible when paid)','Temporary'],['Municipal Bond Interest','$10,000 income recognized','Not taxable — exempt','Permanent']]},
     questions:[
      {type:'calc',id:'A8Q1',text:'Calculate the Deferred Tax Liability (DTL) created by the depreciation difference.',hint:'DTL = (Tax Depreciation − Book Depreciation) × Tax Rate',exact:10000,tol:0,pre:'$',suf:'',fb:'Depreciation difference = $100,000 − $60,000 = $40,000. DTL = $40,000 × 25% = $10,000. Accelerated tax depreciation makes taxable income LOWER now → tax savings now but higher taxes later → LIABILITY. The company has a future obligation to pay these taxes when the temporary difference reverses.'},
      {type:'calc',id:'A8Q2',text:'Calculate the Deferred Tax Asset (DTA) created by the warranty difference.',hint:'DTA = Warranty Expense (book only) × Tax Rate',exact:7500,tol:0,pre:'$',suf:'',fb:'Warranty difference = $30,000 − $0 = $30,000. DTA = $30,000 × 25% = $7,500. Book recognizes warranty expense NOW but tax only allows deduction when warranty is PAID → taxable income is HIGHER now → prepaid taxes → ASSET. The DTA represents future tax savings when the warranty is actually paid and becomes deductible.'},
      {type:'calc',id:'A8Q3',text:'Calculate taxable income for the year.',hint:'Start with book income. Subtract extra tax depreciation. Add back warranty (not yet deductible). Subtract municipal bond interest (permanent — never taxable).',exact:280000,tol:0,pre:'$',suf:'',fb:'Taxable Income = $300,000 − ($100,000−$60,000) + $30,000 − $10,000 = $300,000 − $40,000 + $30,000 − $10,000 = $280,000. The municipal bond interest reduces taxable income permanently (it\'s never taxable). This is why the effective tax rate differs from the statutory 25%.'},
      {type:'calc',id:'A8Q4',text:'Calculate total Income Tax Expense for the year (book basis).',hint:'Tax Expense = Current Tax Payable + Net Deferred Tax Expense (DTL − DTA)',exact:72500,tol:0,pre:'$',suf:'',fb:'Current tax payable = $280,000 × 25% = $70,000. Net deferred expense = DTL $10,000 − DTA $7,500 = $2,500. Total Tax Expense = $70,000 + $2,500 = $72,500. Check: ($300,000 − $10,000 permanent) × 25% = $290,000 × 25% = $72,500 ✓. Permanent differences affect the EFFECTIVE tax rate; temporary differences affect TIMING only.'},
      {type:'select',id:'A8Q5',text:'Which item creates a PERMANENT difference (not reversing in future periods)?',opts:['Accelerated depreciation — reverses as asset depreciates','Warranty expense — reverses when warranty is paid','Municipal bond interest — exempt from tax in all periods','All three are permanent differences'],ans:2,fb:'Permanent differences NEVER reverse — they affect the effective tax rate forever. Examples: municipal bond interest (tax-exempt income), fines/penalties (not deductible), life insurance premiums. Temporary differences reverse over time: depreciation reverses over asset life; warranty reverses when paid. Permanent differences create NO deferred tax; only temporary differences create DTAs/DTLs.'},
      {type:'blank',id:'A8Q6',text:'A Deferred Tax Liability arises when taxable income is [B1] than book income in the current period, creating a future tax [B2]. A Deferred Tax Asset arises when taxable income is higher than book income, representing future tax [B3].',blanks:[{id:'B1',opts:['lower','higher','equal'],ans:'lower'},{id:'B2',opts:['obligation (payable)','benefit (savings)','credit'],ans:'obligation (payable)'},{id:'B3',opts:['savings (benefits)','obligations','losses'],ans:'savings (benefits)'}],fb:'DTL: Low taxable income NOW → low tax NOW → higher tax LATER = liability (owe future taxes). DTA: High taxable income NOW → high tax NOW → lower tax LATER = asset (prepaid taxes, future savings). Mnemonic: DTL = "Deferred Tax Later-obligation"; DTA = "Deferred Tax Advantage." Both arise from TEMPORARY differences only.'},
     ]},
    // ── CBQ A9: Earnings Per Share ────────────────────────────
    {id:'A9',num:9,title:'Earnings Per Share — BlueStar Corp',topics:'Basic EPS · Diluted EPS · Weighted Average Shares · Treasury Stock Method',
     case:'BlueStar Corp reports net income of $450,000 for the year ended December 31. The company has both common shares and potentially dilutive securities outstanding.\n\nThe finance team must calculate basic and diluted EPS following ASC 260, applying the weighted average and treasury stock method.',
     exhibit:{headers:['Item','Details'],rows:[['Net Income','$450,000'],['Preferred Dividends (non-convertible)','$0'],['Shares Jan 1','100,000 common shares'],['Shares Apr 1','Issued 20,000 new shares (9 months remaining)'],['Shares Oct 1','Repurchased 10,000 treasury shares (3 months remaining)'],['Stock Options Outstanding','10,000 options, exercise price $30'],['Average Market Price','$40 per share']]},
     questions:[
      {type:'calc',id:'A9Q1',text:'Calculate the Weighted Average Shares Outstanding (WASO) for Basic EPS.',hint:'Weight each share tranche by fraction of year outstanding: 100,000×(12/12) + 20,000×(9/12) − 10,000×(3/12)',exact:112500,tol:0,pre:'',suf:' shares',fb:'WASO = 100,000×1.00 + 20,000×0.75 − 10,000×0.25 = 100,000 + 15,000 − 2,500 = 112,500. New shares issued Apr 1 are outstanding 9/12 of the year. Treasury shares repurchased Oct 1 reduce shares for 3/12 of the year. Stock options are NOT included in basic EPS — only in diluted.'},
      {type:'calc',id:'A9Q2',text:'Calculate Basic EPS.',hint:'Basic EPS = (Net Income − Preferred Dividends) ÷ WASO',exact:4,tol:0.01,pre:'$',suf:'',fb:'Basic EPS = $450,000 ÷ 112,500 = $4.00. No preferred dividends to subtract. Basic EPS uses only actual shares outstanding — no adjustment for potentially dilutive options or convertible securities. It represents earnings attributable to each common share actually outstanding.'},
      {type:'calc',id:'A9Q3',text:'Using the Treasury Stock Method, calculate the NET dilutive shares added from the stock options.',hint:'Proceeds = options × exercise price. Hypothetical buyback = proceeds ÷ market price. Net dilutive = options − buyback.',exact:2500,tol:0,pre:'',suf:' shares',fb:'Proceeds = 10,000 × $30 = $300,000. Hypothetical buyback at market = $300,000 ÷ $40 = 7,500 shares. Net dilutive = 10,000 − 7,500 = 2,500 shares. The treasury stock method assumes proceeds are used to buy back shares at the average market price — only the "extra" shares that couldn\'t be repurchased are dilutive.'},
      {type:'calc',id:'A9Q4',text:'Calculate Diluted EPS.',hint:'Diluted WASO = Basic WASO + net dilutive shares from options.',exact:3.91,tol:0.02,pre:'$',suf:'',fb:'Diluted WASO = 112,500 + 2,500 = 115,000. Diluted EPS = $450,000 ÷ 115,000 = $3.913 ≈ $3.91. Diluted EPS is always ≤ Basic EPS because adding shares to the denominator reduces EPS. If adding a security INCREASES EPS (antidilutive), it is EXCLUDED from diluted EPS calculation.'},
      {type:'select',id:'A9Q5',text:'A stock option with an exercise price of $45 when the average market price is $40 would be:',opts:['Dilutive — always included in diluted EPS','Antidilutive — excluded from diluted EPS because it would increase EPS','Included at half weight in diluted EPS','Treated the same as a stock dividend'],ans:1,fb:'Exercise price ($45) > Market price ($40): the treasury stock method would produce a NEGATIVE net dilutive shares (proceeds buy MORE shares than options granted), which would INCREASE EPS. Antidilutive securities are EXCLUDED from diluted EPS because the goal is to show the MOST diluted (lowest) possible EPS. Rule: always exclude any security that increases EPS.'},
      {type:'blank',id:'A9Q6',text:'Basic EPS uses [B1] shares outstanding. Diluted EPS adds [B2] dilutive shares from options (using the treasury stock method) to show the maximum potential dilution.',blanks:[{id:'B1',opts:['weighted average actual','total authorized','total issued'],ans:'weighted average actual'},{id:'B2',opts:['net','gross','authorized'],ans:'net'}],fb:'Basic EPS = (NI − Pref Div) ÷ WASO (actual shares only). Diluted EPS = (NI − Pref Div + convertible adjustments) ÷ (WASO + net dilutive shares). Treasury stock method: options grant shares but proceeds buy back shares → only the NET additional shares are added. This reflects the realistic dilution if all dilutive securities were exercised/converted simultaneously.'},
     ]},
    // ── CBQ A10: OCI & Comprehensive Income ──────────────────
